indicative_content:
- Web application security
- Native application security (mobile apps, desktops apps etc.)
- Intrusion detection/prevention systems
- Malicious software
- Secure software engineering
- Incident response and recovery
learning_outcomes:
- Assess a variety of security issues, vulnerabilities and fixes that arise in applications
  and categorise them by using information from CERT, OWASP and other trusted services.
- Compare the capabilities and limitations of intrusion detection systems and intrusion
  prevention systems.
- Appraise different threats posed by various categories of malware and explain different
  techniques to defend against them.
- Justify the need for appropriate incident response and recovery measures.
- Assess how security can be integrated into the software development process.
- Formulate a variety of security attacks in a simulated environment.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts. The
  student will be encouraged to participate in class discussions and ask questions
  to support their learning process.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
