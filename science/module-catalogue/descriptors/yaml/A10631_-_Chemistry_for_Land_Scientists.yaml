assessment_criteria:
- '<40%: No understanding of the basic principles of chemistry. Inadequate practical
  skills in the associated laboratories.'
- '40%-49%: Has a superficial knowledge of the concepts outlined in the indicative
  content. Has a basic level of competency and skills in the associated laboratories..'
- '50%-59%: Able to clearly describe concepts encountered in the indicative content.
  Displays good practical skills in the associated practicals.'
- '60%-69%: In addition to the above, able to apply problem-solving skills to new
  similar problems. Has a high level of skill in the associated laboratories.'
- '70%-100%: All the previous to an excellent level. Demonstrates an ability to put
  a numerical solution into a context and assess whether such solutions are meaningful.
  Engages in class discussions and has a high level of proficiency in the associated
  laboratories.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
