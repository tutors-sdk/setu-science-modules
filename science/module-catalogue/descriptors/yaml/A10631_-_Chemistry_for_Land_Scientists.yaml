aim: This is a basic chemistry course dealing with the general principles and practical
  techniques of chemistry for land scientists (Forestry, Agriculture and Horticulture).
  No previous knowledge of chemistry is assumed. This is a very applied module with
  a strong emphasis on laboratory-based teaching.
