indicative_content:
- Matter, atomic structure and the periodic table
- Chemical reactions, the mole concept and stoichiometry
- Electronic structure of an atom and bonding
- Chemistry of water including H bonding solvent ability, surface tension, osmosis
  and conductivity
- Acid and bases including definitions of acids and bases, neutralisation reactions,
  pH, buffers and buffering capacity, role of pH and alkalinity on water and soil
  quality
- Endothermic and exothermic reactions
learning_outcomes:
- Describe the nuclear atom.
- Calculate reaction yields using balanced chemical reactions.
- Distinguish between ionic and covalent bonding, and outline intermolecular bonding
  and relate to solvent properties.
- Describe the structure and properties of water.
- Explain the difference between acidity and basicity, calculate theoretical pH and
  buffering capacity and their role in water and soil quality.
- Communicate by written and verbal means the results of theory and practical-based
  exercises.
- Demonstrate a keen awareness of the safe handling and disposal of chemicals and
  good laboratory practice (GLP).
