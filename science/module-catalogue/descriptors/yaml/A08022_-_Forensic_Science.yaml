aim: This module will introduce the student to the world of the forensic scientist.
  The scientific principles associated with a range of forensic disciplines in the
  areas of impression, trace, biological and chemical evidence will be introduced.
  Students will learn how to employ simple tests to identify suspect substances in
  crimes related to the above disciplines. Students will learn how to interpret their
  findings and apply their conclusions methodically to a variety of criminal scenarios.
  Case studies detailing how these forensic techniques helped to solve true crimes
  will reinforce the scientific principles involved. The procedures involved in the
  collection of evidence at a crime scene will also be demonstrated, as will the procedures
  needed to maintain the chain of custody of evidence.
