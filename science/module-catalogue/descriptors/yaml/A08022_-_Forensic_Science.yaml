assessment_criteria:
- '<40%: The learner will demonstrate little or no understanding of the fundamentals
  of the learning outcomes. Will display a lack of competence with regards to an understanding
  of the basic practices of forensic science.'
- '40%-49%: The learner will demonstrate limited understanding of the fundamentals
  of the learning outcomes. Will display some ability with regard to an understanding
  of the basic practices of forensic science.'
- '50%-59%: As well as the above, the learner will demonstrate reasonable understanding
