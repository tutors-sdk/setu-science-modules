indicative_content:
- 'Fingerprints: historical development, collection, interpreting fingerprint patterns,
  databases'
- 'Impressions: collecting and interpreting footprint, tyre mark and bite mark patterns'
- 'Anthropology: establishing the biological profile of a victim through the analysis
  of bones & teeth'
- 'Questioned documents: handwriting analysis & methods to detect document alterations'
- 'Toxicology: mode of action of poisons & drugs of abuse, presumptive & confirmatory
  tests for drugs'
- 'Serology: presumptive and confirmatory tests for body fluids, and ABO blood grouping'
- 'Bloodstain pattern analysis: establishing the order of events at the crime scene'
- 'DNA profiling: DNA structure & function, DNA profiling protocols, databases, random
  match probability'
- 'Trace evidence: collecting, analysing and interpreting hair, fibre, glass, soil
  and paint evidence'
- 'Crime scene investigation: crime scene procedures, chain of custody of evidence,
  preventing evidence contamination'
learning_outcomes:
- Identify methods to collect a variety of physical evidence from a crime scene following
  the rules of evidence.
- Explain the practices involved in the routine testing of impression, trace, biological
  and chemical evidence.
- Employ simple forensic techniques to test on impression, trace, biological and chemical
  evidence.
- Interpret the results of a range of forensic tests on impression, trace, biological
  and chemical evidence.
- Discuss the outcomes of case studies where forensic science played a key role in
  the criminal investigation process.
