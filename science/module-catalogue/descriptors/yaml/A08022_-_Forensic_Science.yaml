  with regard to an understanding of the basic practices of forensic science.'
- '60%-69%: In addition, the learner will demonstrate more detailed knowledge of the
  learning outcomes. Will display good competence with regards to an understanding
  of the basic practices of forensic science.'
- '70%-100%: All of the above to excellent levels. In addition, the learner will demonstrate
  comprehensive knowledge and understanding of all learning outcomes. Will display
  advanced competence and independence with regards to an understanding of the basic
  practices of forensic science.'
