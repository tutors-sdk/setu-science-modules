indicative_content:
- Prokaryotic and Eukaryotic basic cell structure
- Nutrition and culture of microorganisms
- History, biology and diversity of organisms
- Microscopy and staining techniques
- Cell reproduction and introduction to genetics
- Introduction to ecology
learning_outcomes:
- Explain basic microbial cell structure and reproduction.
- Recognise the diversity of organisms and distinguish between major groups of organisms.
- Use standard laboratory techniques to demonstrate aseptic technique, basic microscopy
  and staining skills and other relevant practical work.
- Describe the fundamentals of ecology.
- Outline key concepts in genetics at an introductory level.
- Record results of laboratory work using worksheets.
- Record results of tutorial work using an online learning platform (Moodle).
learning_and_teaching_methods:
- Introductory biology is delivered in a multi-modal approach.
- The module consists of lectures, laboratory practicals and online tutorials (on-
  or off-site).
- The teaching strategy is to adopt a blended learning approach. Lecture sessions
  are delivered using a flipped classroom style.
- Resource material is made available to the student prior to the lecture session.
  The session is delivered in a non-didactic manner.
- The student completes e-activities in the form of quizzes which are designed pre-
  and post-lecture sessions.
- Audio and video files of module content are provided to cater for the variety of
  learner types (class size < 50).
- Laboratory practicals and tutorial sessions are linked.
- Pre-practical quizzes are used as an formative learning method and these can be
  completed during tutorial session on or off-site.
- All of the above are delivered through Moodle e-learning platform.
