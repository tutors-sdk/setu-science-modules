assessment_criteria:
- '<40%: No understanding of basic biological concepts. Unable to carry out practical
  skills in laboratory.'
- '40%-49%: Some understanding of biological concepts and has basic level of competency
  in the required skills in microbiology.'
- '50%-59%: A clear understanding of the biological concepts presented. Good practical
  skills.'
- '60%-69%: In addition to the above, shows good critical thinking skills, engages
  in debate in class and has a high level of efficiency in the microbiology lab.'
- '70%-100%: All of the above to an excellent level.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
