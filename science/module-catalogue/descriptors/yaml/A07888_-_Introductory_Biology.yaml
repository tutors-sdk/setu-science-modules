aim: The aim of this module is to introduce the student to the fundamentals of biology.
  Basic cell structure, diversity of organisms, introductory genetics and ecology
  will be covered, together with relevant supporting practical skills. This module
  is designed to be delivered across all laboratory based 1st year science programmes.
