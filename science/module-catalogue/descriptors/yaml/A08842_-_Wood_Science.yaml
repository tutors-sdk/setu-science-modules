indicative_content:
- Fundamental properties and characteristics of wood
- Tree growth and wood formation
- Juvenile wood and reaction wood
- Cell structures and composition in softwoods and hardwoods
- Wood chemistry and cell composition
- Identification of timbers
- Natural durability and timber degrade
- Moisture content, shrinkage and movement in wood
- Wood density and strength properties
- Energy properties of wood
- Effect of forest management practices on wood quality
learning_outcomes:
- Describe aspects of tree growth, macro- and microscopic wood structure and chemical
  composition of wood.
- Describe the variation in wood properties; density, strength, natural durability
  and the causes of variation.
- Explain the effect of forest management operations on wood properties.
- Complete basic laboratory procedures, alone and in a group, on softwood and hardwood
  timber samples and slides.
- Use standard procedures to assess and compare wood properties, moisture content,
  anisotropy, basic and bulk density and strength.
- Record and present laboratory experiment results, carry out calculations and draw
  conclusions.
learning_and_teaching_methods:
- 'Lectures: will be used to describe the nature of tree growth and the characteristics
  and properties of wood.'
- 'Laboratory Practicals: will be used to develop analytical skills and practical
  measurement techniques in assessing wood properties and identifying wood and wood
  cell types.'
- 'Independent Learning: reading recommended reference books, supplementary papers
  and handouts, and viewing recommended web based material to consolidate knowledge
  of the module content.'
