aim: This module is designed to provide the student with a basic understanding of
  wood as a raw material. The module will introduce the student to the nature of tree
  growth. The structure and properties of wood will be described in lectures and assessed
  in practicals. The student will gain an understanding of the role of wood characteristics
  in determining the use of wood. A key element of the module deals with the effect
  of forest management practices on the characteristics of wood, and how forest managers
  may modify wood quality through forest operations.
