reference: A13783
full_title: Mathematics for Problem Solving
short_title: Maths for Problem Solving
credits: 5
level: Introductory
author: AVEREKER
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Mathematics and Physics
aim: This module introduces students to problem solving techniques using algebraic,
  linear programming, calculus and graph theory methods. Students will experience
  an applied element to the module which will involve creating pseudocode for the
  implementation of appropriate problem solving methods.
