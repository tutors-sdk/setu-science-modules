reference: A13104
full_title: Forest Establishment
short_title: Forest Establishment
credits: 5
level: Introductory
author: ABOOTH
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: This course is designed to give students an overview of forestry establishment
  practices. This will include seed collection, through to sowing in a forest nursery,
  and from there onto the planting site and all the establishment practices associated
  with it. Students will learn to carry out forest development plans and planting
  plans. They will also attain some of the necessary practical skills needed for establishing
  a forest, such as formative shaping, planting and weed control.
