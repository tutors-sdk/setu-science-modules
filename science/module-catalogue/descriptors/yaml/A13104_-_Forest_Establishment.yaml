indicative_content:
- Seed and seed procurement
- Seed processing and storage
- Forest nursery practice
- Lifting storing handling plants
- 'Forest establishment practices: cultivation, drainage, species selection, fencing,
  vegetation control, stocking'
- Site description, mapping
- Formative shaping of broadleaves
learning_outcomes:
- Discuss the different methods of seed collection, storage and use, for the main
  forest species in Ireland.
- Summarise the main components and operations of a forest nursery.
- Explain the main establishment procedures used in plantation forestry.
- Demonstrate the ability to assess, describe and map forest sites.
- Demonstrate some practical skills associated with the establishment phase of a plantation.
