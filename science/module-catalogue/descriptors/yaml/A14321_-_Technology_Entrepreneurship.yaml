indicative_content:
- Lean start-up principles
- Lean analytics and metrics
- Minimal viable product(MVP) design and testing
- Defining and developing value propositions
- Business model design
- Revenue model design
- Pitching to investors and customers
learning_outcomes:
- Describe the principles and practices of lean start-up.
- Demonstrate the technology start-up process using lean principles.
- Design business models and revenue models appropriate to different technology enterprises
  and their contexts.
- Develop lean analytics and metrics to support decision making in the technology
  enterprise.
- Demonstrate the process and usage of minimal viable product (MVP) design.
- Articulate their technology enterprise concept in a business context.
learning_and_teaching_methods:
- Lectures will be used to introduce the principles and provenance of lean start-up.
- Video presentations, group work, role play and in class discussions will be used
  to illustrate examples of lean start-up practices.
- Students are expected to familiarise themselves with web sites, fora and blogs associated
  with technology entrepreneurship and lean start-up.
- Students are expected to undertake independent reading.
- Video presentations and pitches will be used to demonstrate examples and best practice
  of articulating the value proposition and technology start-up concept.
- Individual or group-based technology start-up assignment. Continuous assessment
  will also incorporate an oral presentation, pitch or exhibition to an internal and/or
  external audience.
