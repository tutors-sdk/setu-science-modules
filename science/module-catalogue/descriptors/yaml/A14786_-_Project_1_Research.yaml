indicative_content:
- Write succinct and referenced, well-structured reports
- Introduction
- Analysis of research questions
- Literature review
- Research methodology
learning_outcomes:
- Appraise a research area.
- Create appropriate research questions.
- Complete a literature review.
- Select an appropriate research methodology and data gathering technique.
learning_and_teaching_methods:
- The students will be introduced to the theory of conducting research through a series
  of meetings with their supervisor,which will be interactive and discursive in nature.
- The Supervisor will meet and guide the student on a weekly basis to develop a coherent
  and achiveable research document.
