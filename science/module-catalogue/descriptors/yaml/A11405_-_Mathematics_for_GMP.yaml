indicative_content:
- 'Mathematics fundamentals: fractions and percentages; units of measurement (S.I.
  units) & scientific notation; use of formulae; decimal places and significant digits;
  using a scientific calculator, including statistics mode; algebraic manipulation'
- 'Statistics fundamentals: basic concepts; statistics and data defined; variables
  and variable measure (scale, ordinal, nominal). Variable type/role (experimental
  v observational, predictor v response). Descriptive v inferential statistics. Sampling
  (probability v non-probability sampling). Measures of central tendency (mean, median,
  mode) and spread (quartiles, standard deviation, range); plots -- histogram, stem
  and leaf, ogives, boxplot, bar chart, pie-chart, pareto diagrams'
- The normal distribution; calculating probabilities and quartiles; applications,
  e.g. impacts on defective ppm of change in process parameters; assessing normality
  - probability plots
- Acceptance sampling; operating characteristics curves. the binomial distribution.
- 'Simple regression: scatter plots and graphical estimation of regression equation;
  prediction'
- 'Software: using MS Excel; basic tabular calculations; Excel''s statistical functions
  (mean, SD, normal, binomial, regression etc.); add-ins - Solver, data analysis;
  constructing / configuring charts in Excel'
learning_outcomes:
- Complete arithmetic calculations and simple percentage calculations.
- Use fundamental concepts to solve problems in linear algebra.
- Use formula and calculators to calculate measures of centre and spread.
- Illustrate data using histograms, ogives, scatter plots and stem and leaf diagrams.
- Complete simple regression and use regression equation for prediction.
- Use software to carry out statistical calculations.
