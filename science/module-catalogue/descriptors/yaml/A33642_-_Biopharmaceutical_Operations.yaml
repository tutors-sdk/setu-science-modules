aim: This module will provide the learner with an in depth understanding of the key
  operations involved in the manufacture of a Biopharmaceutical product. Key areas
  covered in the module are Upstream and Downstream Processing, Biopharmaceutical
  stabilisation and formulation, Lyophilisation of Biopharmaceuticals, packaging,
  sterilisation and containment and critical manufacturing operations.
