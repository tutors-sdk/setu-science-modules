assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of Biopharmaceutical
  production or Lyophilisation. Lack of competence with regard to associated assignments.'
- '40%-49%: Will be able to show a limited understanding of the fundamentals of Biopharmaceutical
  Operations, but may have some difficulty with applying this theory. Will display
  some ability with regard to basic overviews of processing.'
- '50%-59%: As well as the above, the candidate will be able to show a reasonable
  understanding of the complexities of Biopharmaceutical Processing. Will display
  reasonable competence with regard to associated unit processes and underlying principles.'
- '60%-69%: In addition, the candidate will demonstrate a more detailed knowledge
  of the Biopharmaceutical operations, the associated equipment and the sterilised
  environment.'
- '70%-100%: All of the above to an excellent level. In addition, the candidate will
  be able to demonstrate comprehensive of all aspects of Biopharmaceutical Operations,
  critical processing parameters and effects on product quality as well as product
  testing and sterile manufacturing capabilities.'
