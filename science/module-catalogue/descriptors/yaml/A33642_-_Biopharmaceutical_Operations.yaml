indicative_content:
- 'Upstream Processing: Media selection and Scale-up issues. Critical Processing parameters
  for cell growth. Process monitoring. The use, type, design and operation of Bioreactors.'
- 'Downstream Processing: Harvesting, Cell disruption -- Intracellular/Extracellular,
  centrifugation, extraction, filtration and purification techniques, membranes, chromatography
  systems.'
- 'Lyophilisation: Freeze-drying processing. Scale-up and stabilisation of biopharmaceutical
  compounds.'
- Analytical techniques for development and monitoring of lyophilised Biopharmaceutical
  formulations.
- Container integrity and Packaging of Biopharmaceuticals.
- Clean room containment and sterilisation, CIP/SIP. Layout and Design. HVAC. Environmental
  monitoring
learning_outcomes:
- Demonstrate a clear understanding the upstream and downstream processing of biopharmaceuticals
  and critical processing parameters involved.
- Determine key operations involved in lyophilisation of Biopharmaceutical products.
- Characterise and evaluate finished biopharmaceutical products.
- Appraise and review formulation activities for biopharmaceutical compounds.
- Interpret and evaluate techniques used to ensure sterility in Biopharmaceutical
  production.
