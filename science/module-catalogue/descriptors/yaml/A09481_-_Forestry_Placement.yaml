aim: The BSc in Forestry values experience-based learning opportunities for students,
  and the forestry placement module is one important element of this. Placement facilitates
  students in developing their forestry career by creating links with forestry companies
  and organisations, and gaining recognition from potential employers of the student's
  competence and capability. This module is designed to give the student experience
  of working within a professional forestry company or organisation. The placement
  is organised by the student with the support and guidance of the forestry placement
  co-ordinator. The student will gain experience in practical and professional forest
  management. Students are also encouraged to seek placements abroad, in order to
  broaden their knowledge of international forestry practice. Forestry students have
  completed placements in Ireland, the UK, Scandinavia, Central Europe and North America.
  The objectives of work placement module in the BSc in Forestry are to improve student
  employability skills, leading to a job-ready forestry graduate; to relate to the
  workplace the knowledge and competences gained by the student in the academic programme;
  and to foster closer engagement between the student, the programme and the forestry
  sector.
