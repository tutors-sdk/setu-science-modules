indicative_content:
- The forestry placement module is a mandatory module in Year 2 Semester 2 of the
  BSc in Forestry, and consists of a period of at least fifteen weeks duration in
  a professional forestry organisation in Ireland and/or abroad.
- 'Students will participate in placement preparation workshops and skills training.
  Placement preparation activities will include: preparation of CV and company-specific
  cover letters; interview preparation; health and safety and effective communication.'
- Placement opportunities may be identified by the student or placement co-ordinator.
  Students may apply for more than one placement opportunity but will be expected
  to accept a placement opportunity that conforms to the forestry placement module
  requirements. Placements may only proceed, and will only be assessed, with the approval
  of the work placement co-ordinator.
- Students that have completed placement requirements by May of each year will be
  assessed in the Semester 2 assessment period. Alternatively, if the placement requirements
  are completed by August of that year, then students are assessed in the Autumn assessment
  period.
- Students are assessed on a Pass / Fail basis. Each student will maintain a work
  journal, signed weekly by their employer and carry out an individual project related
  to their placement subject to arrangement with the placement co-ordinator. Employers
  will be supplied with a placement evaluation form to provide feedback to the student
  and WIT on performance during placement. Students will prepare a short presentation
  on their placement for the following years students.
- All placement assessment work will be lodged with the placement co-ordinator by
  specified dates for summer or autumn evaluation.
- The technical work role will vary with each placement, but may involve forest establishment,
  inventory and mapping, forest protection, harvesting, habitat management, timber
  measuring and marketing, or other roles. All placements will allow a student to
  gain transferable skills in personal effectiveness, communications and business
  organisation.
- Personal effectiveness relates to punctuality, work output and quality, dependability,
  performing tasks in accordance with directions, using own initiative, adaptability
  and applying theory to practice
- Communication relates to listening skills, communicating verbally and in writing
  with co-workers, supervisors, employers and clients.
- Business organisation refers to how the organisation is structured, the roles within
  the organisation, the clients, customers, suppliers and regulatory authorities with
  whom the organisation interacts and the policies and procedures used within the
  organisation.
- Record of placement experience in the form of a Daily Diary and a portfolio of relevant
  material. Particulars of features of the host organisation, description of enterprise
  areas, inventory of machinery and technology employed, overview of client base.
learning_outcomes:
- Construct a professional CV and prepare for interview to secure placement.
- Plan learning objectives for the placement.
- Operate independently and/or as part of a team towards the set objectives of the
  forestry enterprise.
- Apply competently their forestry knowledge and skills in a range of settings.
- Practise safely, forestry related skills and employ good environmental practices.
- Examine their personal, professional and technical achievements on the placement.
- Communicate their activities and assessment of the forestry enterprise in a professional
  manner.
- Complete a presentation documenting work practices and experiences using Microsoft
  PowerPoint.
learning_and_teaching_methods:
- Workshops on preparing written employment application materials, health and safety
  and insurance requirements on placement, potential forestry employers and student
  experiences of forestry placement.
- Communication between student and forestry placement co-ordinator before, during
  and after placement, including a workplace meeting of the employer, student and
  placement co-ordinator, to ensure successful outcomes.
- Practical learning experience from a host forestry organisation.
- Practical learning experience keeping a work diary and preparing a report and presentation.
- Working and relating with other co-workers, supervisors and clients.
- Working within a structured work environment, following policies, procedures and
  best practice.
