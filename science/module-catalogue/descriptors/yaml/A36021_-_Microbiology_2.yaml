  stage: 3
  semester: 5
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Evolution and differences/similarities between the three domains of life, with a
  focus on microbial branches (bacteria/archaea/fungi)
- Viruses, including bacteriophage life cycles
- Genotypic and phenotypic methods for microbial classification
- Microbial metabolism
- 'Cultivation of micro-organisms: culture maintenance, media, equipment, sterilisation'
- Identification and enumeration of micro-organisms
- Micro-organisms and disease
- 'Practicals: isolation & identification of a range of microorganisms, using different
  culturing methods'
learning_outcomes:
- Complete the isolation, classification, and maintenance of a wide range of micro-organisms.
- Prepare media for culture of micro-organisms.
- Compare the methods used in microbial taxonomy, both phenotypic and genotypic.
- Differentiate between major groups of bacteria, fungi and viruses important in molecular
  and biopharmaceutical science.
- Analyse the mechanisms by which micro-organisms cause disease.
- Interpret current knowledge and scientific research related to a particular microorganism.
learning_and_teaching_methods:
- Lectures on the indicative content will be delivered, incorporating active learning
  activities and formative assessment (ungraded quizzes).
- Laboratory investigations will reinforce and support theoretical elements of the
  module.
- In-class presentation on a microbial species of the student's choice (peer-to-peer
  learning).
