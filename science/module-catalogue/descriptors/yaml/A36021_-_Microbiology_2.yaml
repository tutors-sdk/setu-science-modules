assessment_criteria:
- '<40%: No understanding of the basic principles of microbiology and the handling
  of micro-organisms.'
- '40%-49%: The student has a basic understanding of the fundamental principles of
  the module. May have some difficulty with applying this theory.'
- '50%-59%: The student has a good understanding of microbiology both theoretical
  and the evaluation of practical data.'
- '60%-69%: In addition to the above shows a high level of competence and efficiency
  in microbiology.'
- '70%-100%: Student demonstrates a high level of understanding of microbiology plus
  is able to critically evaluate and discuss the significance of the module.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
