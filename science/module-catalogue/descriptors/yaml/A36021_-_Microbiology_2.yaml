cluster: Biology
aim: This module is intended to build on the microbiology knowledge and skills introduced
  in the module 'Microbiology 1'. It explores the evolution and diversity of microbes,
  including bacteria, archaea, fungi and viruses.
programmes:
- timetable: SCIE-0045
  code: WD_SMBIO_D
