reference: A08381
full_title: Tillage Crop Production
short_title: Tillage Crop Production
credits: 5
level: Introductory
author: DFEWER
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will enable the student to acquire principles, knowledge and skills
  needed to grow and manage common tillage crops, including cereals, alternative combinable
  crops, potatoes and forage crops. It will provide students with an in-depth overview
  of tillage crop production, and provide the practical experience of monitoring tillage
  crops.
