indicative_content:
- Market outlets and quality standards
- Rotation and crop establishment
- Variety selection
- Plant nutrition and plant growth regulators
- Plant pests and control
- Plant diseases and control
- Weeds and their control
- Harvesting and storage
- Economics of crop production
learning_outcomes:
- Describe market outlets and quality standards for tillage crops.
- Explain crop rotations and establishment of tillage crops.
- Describe variety selection and its role in crop management.
- Describe crop nutrition and plant growth regulators.
- Identify a range of crop pests, diseases and weeds.
- Describe a range of pests, diseases and weeds and appropriate control strategies.
- Describe the harvesting and storage of crops.
- Discuss the economics of crop production.
