indicative_content:
- Lexical Contexts covered may include - music; sleep; the body; crime and punishment
- Grammatical Features covered may include - gerunds and infinitives; used to, be
  used to and get used to; past modals; would rather; verbs of the senses; the passive
  (all forms); have something done
- Discourse/Functions- relaying information; having an argument; describing objects
  using your senses; writing a description of a photo; writing an opinion article
- Exercise Types - Multiple-choice, gap-fill, close tests, word formation, sentence
  transformation, question and answer comprehensions, group definition activities,
  pairwork, information gap, anecdote descriptions, questionnaires, roleplays
learning_outcomes:
- Discuss a range of topics exploiting the language systems (lexis, grammar) and skills
  (productive and interactive) covered in the module.
- Distinguish among a variety of short and extended spoken texts within the lexical
  contexts covered in the module.
- Demonstrate an understanding of a variety of text types within the lexical contexts
  covered in the module for general academic purposes, and display those reading skills
  practised within the module.
- Construct detailed informal written texts demonstrating a command of the lexical
  and grammatical elements covered in the module.
- Demonstrate awareness of cultural diversity based on class discussion and independent
  reflection.
learning_and_teaching_methods:
- Adopting a broadly communicative and integrated approach to language teaching, methods
  may include inter-active seminars, short talks and presentations and workshops using
  both traditional and ICT-based materials. Emphasis will be placed on class participation,
  independent learning and skills development. Teaching approaches that recognise
  and foster a variety of learning and teaching styles and/or promote learner motivation
  may be employed.
