aim: The student will learn the fundamentals of linear electrical circuits and their
  components. The student will study the mathematical tools used to represent and
  analyse electrical circuits and will learn a range of techniques to design DC and
  AC circuits. There will also be comprehensive study of DC and AC circuits in the
  laboratory setting, and circuits will also be implemented by the student using National
  Instruments Circuit Design Suite (Multisim).
