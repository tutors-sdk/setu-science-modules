assessment_criteria:
- '<40%: Unable to demonstrate a basic understanding of elementary DC and AC circuits.
  An understanding of very little of the course content.'
- '40%-49%: Able to provide partial solutions to DC and AC circuit problems.'
- '50%-59%: Able to analyse and provide solutions to circuit problems. Demonstrate
  an understanding of the mathematical techniques used in circuit analysis.'
- '60%-69%: Able to apply given problem-solving techniques to new similar circuit
  problems. Demonstrates an ability to design a system from a number of component
  parts.'
- '70%-100%: All the previous to an excellent level.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
