indicative_content:
- 'DC circuit analysis: review of combination DC circuits; loading potential and current
  dividers; Kirchoff''s laws, voltage and current sources; principle of superposition'
- 'Equivalent circuits: Thevenin''s theorem; Norton''s theorem; maximum power transfer
  theorem'
- 'AC circuit analysis: introduction to alternating current and voltages; mathematical
  representations of alternating currents and voltages (sinusoids, rectangular and
  polar); equivalent circuits'
- 'Phasor mathematics: complex impedance of electrical components; impedance diagrams,
  analysis of AC circuits; RLC circuits, resonance and Q factor'
- 'Electronic filters: filter classification and applications; passive filters: first
  order low-pass, high-pass, and band-pass; Bode plots and frequency response'
learning_outcomes:
- Analyse a range of DC and AC circuits.
- Determine the response of resistor, capacitor and inductor networks to sinusoidal
  waveforms.
- Apply Thevenin and Norton theorems to simplify a circuit for analysis.
- Examine a range of first-order filter circuits.
- Construct, implement and test a range of DC and AC circuits in the integrated practical
  programme.
- Model a range of DC and AC circuits using National Instruments Design Suite (Multisim).
learning_and_teaching_methods:
- 'Lectures: Lectures will be used to introduce new topics and their related concepts.'
- 'Practicals: The practical element will allow students to design implement and test
  electric circuits, interpret and report experimental results.'
- 'Tutorials: Apply problem solving skills to generate solutions to DC and AC circuit
  problems.'
