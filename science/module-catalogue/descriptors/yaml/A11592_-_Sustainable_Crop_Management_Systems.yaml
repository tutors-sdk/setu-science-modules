reference: A11592
full_title: Sustainable Crop Management Systems
short_title: Sustainable Crop Mgmt Systems
credits: 5
level: Advanced
author: JGERAGHTY
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module is designed for students who already have an intermediate knowledge
  of crop production. The course will start by looking at plant physiology and factors
  affecting plant growth. It will then look at crop nutrition and the role of macro-nutrients
  and micro-nutrients in the plant. The role of alternative crops will be explored,
  including their end use. The management and operation of sustainable cropping systems
  will be examined and compared with intensive systems. New developments in plant
  breeding and biotechnology will also be covered.
