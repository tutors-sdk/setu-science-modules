assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter. Unable to
  analyse key topics in the course.'
- '40%-49%: Demonstrate a good knowledge of the key learning outcomes of the course
  with basic evaluation of aspects.'
- '50%-59%: Demonstrate a good level of knowledge with the aptitude to integrate and
  critically evaluate the various components of the course.'
- '60%-69%: Demonstrate more detailed knowledge of the key topics, including critical
  evaluation of the roles and impacts of different crop production methods.'
- '70%-100%: Demonstrate a comprehensive knowledge and understanding of all learning
  outcomes, including the ability to integrate and critically analyse the various
  components of the course.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
