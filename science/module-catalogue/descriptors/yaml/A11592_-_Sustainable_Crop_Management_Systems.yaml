indicative_content:
- Plant physiology and plant growth
- Crop nutrition for sustainable production
- Production of alternative crops and their end uses
- Sustainable cropping systems, no-tillage and conservation agriculture
- Conventional plant breeding and genetically enhanced crop technologies
learning_outcomes:
- Establish the interaction between plant physiology and factors affecting plant growth.
- Determine appropriate crop nutrition including macro and micro nutrients to optimise
  sustainable crop growth and development.
- Evaluate the role of alternative crops and their uses in modern agriculture.
- Compare the management of conventional intensive systems with sustainable cropping
  systems.
- Critique developments in conventional plant breeding systems and biotechnology systems
  in crop production and development.
- Prepare a critical analysis of a published research journal paper.
