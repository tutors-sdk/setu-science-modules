indicative_content:
- A compendium of language exercises and tasks from the prescribed textbook Savoir-faire
  le franais luniversit. G. Anjelvin.
- 'Contexts / themes that may be used to achieve the learning outcomes for this level
  may include the following:'
- a. Youth issues
- b. France in French cinema
- 'c. Europe: EU, international affairs'
- d. Science, medecial research The French education system and some problems facing
  education
- e. Tourism and travel
- f. Sport
learning_outcomes:
- Oral Production
- With attention to pronunciation and intonation, the learner is expected to be able
  to:.
- give clear descriptions and presentations on a wide range of subjects, expanding
  and supporting ideas with subsidiary points and relevant examples;.
- develop a basic argument, expanding and supporting his / her points of view at some
  length with subsidiary points and relevant examples;.
- use a register of language and non-verbal behaviour appropriate to everyday conversations
  with native speakers.
- Written Production
- The learner is expected to be able to:.
- express and exchange news and views effectively in writing and relate to those of
  others;.
- write short articles conveying simple information and getting across comprehensively
  the points he / she feels are important;.
- use the appropriate register to address him/herself to friends, service people,
  etc.
- Aural Reception (Listening)
- The learner is expected to be able to:.
- follow extended speech and complex lines of argument provided the topic is reasonably
  familiar and the direction of the talk is signposted by explicit markers;.
- understand announcements and messages on concrete topics spoken in standard dialect
  at normal speed.
- Visual Reception (Reading)
- The learner is expected to be able to:.
- have developed an active reading vocabulary appropriate to the level but may still
  experience difficulty with low frequency idioms;.
- be able to understand lengthy complex instructions including details on conditions
  and warnings.
- have developed a comprehensive system of identification, storage and retrieval of
  lexical items appropriate to this level.
- Audio-visual Reception
- The learner is expected to be able to:.
- understand the general topic of media broadcasts and short films with the support
  of contextual information and / or visual clues.
learning_and_teaching_methods:
- Interactive seminars will be the main teaching approach. A variety of media will
  be used in the teaching process (traditional print materials, audio and video material,
  CALL programmes and online language learning resources). The course will be characterised
  by a high level of student participation in both classroom activities and self-directed
  learning activities outside the classroom.
