aim: 'Aim: The module aims to: give the student an understand the main ideas of complex
  text on both concrete and abstract topics, including technical discussions in his
  / her field of specialisation; facilitate the student in engaging in spontaneous
  discussion in the target language; enable the student to produce clear detailed
  text on a wide range of subjects and explain a viewpoint on a topical issue giving
  the advantages and disadvantages of various options; enable the student to demonstrate
  a level of intercultural and sociolinguistic competence appropriate to interaction
  with native speakers in a variety of everyday situations; encourage the student
  to use a good lexical range appropriate to the skills required at this level; enable
  the student to handle situations outside my his/her own cultural background, accepting
  the possibility of different ways of thinking and behaving.'
