reference: A33961
full_title: Database Design and Development
short_title: DB Design and Development
credits: 5
level: Advanced
author: RSHANAHAN
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Database and Analytics
aim: This module will introduce the student to the principles and practice of designing
  and implementing efficient and secure database systems. The student will gain competence
  in designing relational databases using Entity Relationship Modelling. They will
  implement relational databases using SQL data definition language. They will query
  the relational database using SQL data manipulation language. The students will
  be introduced to the concepts and use of NoSQL databases.
programmes:
- timetable: DATA-0018
  code: WD_KBUSY_G
  name: Higher Diploma in Science in Business Systems Analysis
  stage: 1
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Database Environment; Relational Database Analysis and Design
- ER modelling of DB concepts
- Development of Conceptual model to Logical model
- Physical Database Design;
- Database Implementation
- Database Security & Data Protection
- Introduction to NoSQL Databases
learning_outcomes:
- Appraise the role of a database and its management system.
- Create Entity Relationship (ER) diagrams from business scenarios and reproduce those
  diagrams into normalised relations ready for database implementation.
- Construct a physical database design.
- Implement a relational database using SQL Data Definition Language (DDL).
- Construct queries on a relational database using SQL Data Manipulation Language
  (DML).
- Investigate Database Security Procedures; Introduce concepts of Data Protection
  (DGPR, CCPA).
- Introduce NoSQL Databases
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures using incremental steps to accomplish a skill.
- The continuous assessment will require the student to apply the theory and practical
  knowledge to a new business scenario.
