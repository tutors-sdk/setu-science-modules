reference: A07542
full_title: Agriculture Project
short_title: Agriculture Project
credits: 5
level: Intermediate
author: TWOODCOCK
history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: The module is designed to equip students with the skills necessary to organise
  and implement a project related to the course. Students will work in groups, and
  in doing so develop teamwork skills. They will learn how to apply previously gained
  skills to implement a project, to draw conclusions and make recommendations based
  on analysis of results. Classes will be provided to develop the data analysis and
  project formatting skills of the students. Each group will present their project
  work in a final detailed report, while each individual student will present a poster
  outlining the main findings of the project.
programmes:
- timetable: PROJ-0015
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 3
  semester: 6
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Title of the project and project structure
- Literature review will be produced based on the project topic
- Methods used should be clearly laid out
- Results will be developed, either using data generated by the student group, or
  by extrapolating and developing a separate dataset
- Discussion of research findings should draw comparisons between student project
  and relevant peer reviewed journal publications
- Conclusions should be drawn, giving an indication of the relevance of the project
  findings in an agricultural context
- Recommendations on what direction future research should take or how the findings
  could be adapted
learning_outcomes:
- Organise and implement a project related to the course. Students to be actively
  involved in the development of the project structure and project plan.
- Apply skills relating to data analysis, information mining and thesis formatting
  to implement a project.
- Utilise skills acquired in LO2 in the production of project report.
- Analyse data and interpret results.
- Establish conclusions and make recommendations based on analysis of results.
- Assemble the project findings.
- Justify project conclusions
learning_and_teaching_methods:
- Training in database access skills in the library.
- Tutorial and assignments relating to data analysis and formatting.
- Training in communication skills including presentation skills.
