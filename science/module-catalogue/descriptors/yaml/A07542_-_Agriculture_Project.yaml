assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills.'
- '40%-49%: Will be able to show a basic knowledge of the key learning outcomes including
  how to organise and implement a project and present the final project report.'
- '50%-59%: As well as the above the student will be able to draw conclusions and
  make recommendations, compose a detailed report of the project and give a good presentation
  of the final project report.'
- '60%-69%: In addition, the student will be able to make detailed recommendations
  based on analysis of results, compose a very good report of the project and give
  a very good presentation of the final project report.'
- '70%-100%: The learner will be able to make detailed recommendations based on analysis
  of results, compose an excellent report of the project and give an excellent presentation
  of the final project report.'
