indicative_content:
- 'Marketing an Overview: Concepts, Principles and the Small Business Context'
- The Marketing Environment for agricultural enterprises - Macro & Micro Environmental
  Forces
- Market Segmentation; Market Positioning; Target Market Analysis
- Consumer Buyer Behaviour
- The Marketing Mix - Product, Pricing, Distribution & Promotional Strategies and
  Campaigns for Agricultural businesses
- Branding
- Services Marketing
- Market Research for Small businesses
- Marketing Strategy and Planning
learning_outcomes:
- Examine the factors that affect marketing decisions for small agricultural businesses.
- Analyse the key elements of the marketing mix for agricultural products and services.
- Examine the process of strategic marketing planning for agricultural businesses.
- Analyse effective marketing campaigns for agricultural products and services.
