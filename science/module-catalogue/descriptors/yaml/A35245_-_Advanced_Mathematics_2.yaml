indicative_content:
- 'Space analytic geometry: plane and its equation, spatial line and its equation,
  surface and its equation, space curve and its equation, some quadric surfaces.'
- 'Differential calculus of functions of several variables: the concept of multivariate
  function, partial derivatives, total differential, multivariate function derivative
  method, the derivation of implicit function formula, multivariate function differential
  calculus geometry application, directional derivative and gradient, extreme value
  of a function of many variables.'
- 'Integration of functions of several variables: the concepts, properties, calculation
  methods and applications of double integral and triple integral'
- 'Curvilinear integral and surface integral: the concepts, properties, calculation
  methods of two types of curvilinear integral and surface integral, Green formula,
  Gaussian formula, Stokes'' theorem, flux and divergence, loop flow and curl.'
- 'Infinite series: the concept and properties of series of constant series, the convergence
  method of series of constant series, power series and its expansion, Fourier series.'
- 'Ordinary differential equation: first-order differential equation, high-order linear
  differential equations, linear differential equation with constant coefficients,
  the application of differential equations.'
learning_outcomes:
- Demonstrate problem-solving skills.
- Transform the spatial geometry problem into algebra problem through vector and coordinate
  system, , and improve the spatial imagination ability and operation ability, cultivate
  the comprehensive problem solving ability through the quadric surface to carry on
  the subject association.
- Learn the theory of functions with several variables, including the limit, continuity,
  differentiation, Taylor expansion, extreme and so on, find and classify extreme
  of a function of multiple variables, derive the Taylor polynomial of a function
  of multiple variables.
- Compute integrals of several variables and integrals for curve and curved surface.
- Learn the theory of series, including number series and function series.
- Solve elementary first and second order differential equations.
learning_and_teaching_methods:
- Delivery of the module will be through lectures, tutorials, discussion, and practice.
- The lectures will enable students to obtain the important basic concepts, properties
  and knowledge system of analytic geometry of space, limit of multivariate function,
  continuous, total differential, integrals of several variables and integrals for
  curve and curved surface, infinite series, ordinary differential equation and will
  develop theory, lead students through worked examples and introduce the context
  for the module material.
- The tutorial classes will underpin and rehearse the skills covered in lectures.
  Students will be encouraged, through the problem sheets, to construct valid and
  precise mathematical arguments and will be expected to produce solutions using appropriate
  mathematical notation.
- The discussion and practical sessions will be used to discuss applications of the
  theory and to utilize and implement mathematical software.
- The practical programme is designed to re-enforce the strong interconnections between
  the mathematical concepts covered in this module and Computer Science concepts using
  Computer Algebra Systems (CAS) and guided development of students' own code. A typical
  activity consists of investigating a number of basic quadrature techniques and their
  application to problems in computer science.
