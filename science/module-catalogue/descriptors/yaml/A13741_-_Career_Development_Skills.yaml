indicative_content:
- 'Self-awareness: reflection workshops and exercises to identify personal skills,
  abilities, interests and motivations and relate these to career opportunities'
- 'Social Media and Online Reputation: how to use and leverage social networks to
  maximise chances of getting a job'
- Investigating the job market in a discipline / industry area
- 'Career Preparation: CV preparation, career planning, e-portfolio development'
- 'Interviews: preparing and delivering an interview presentation'
- 'Career Planning: developing an appropriate personal career development plan'
learning_outcomes:
- Critique their personal strengths and aptitudes, and critically evaluate their position
  in the relevant jobs market.
- Construct an appropriate personal career development plan, with an appropriate industry
  focus.
- Create an advanced graduate career portfolio and develop skills for different employment
  interview scenarios.
- Evaluate the theoretical concepts of experiential and work-based learning.
- Evaluate the role of critical reflection in work based learning.
learning_and_teaching_methods:
- The module will be delivered by a combination of lectures, group discussions, workshops,
  individual and group presentations, simulation interviews and peer group feedback.
- For online delivery the lectures and practical's will be a combination of comprehensive
  rich media instructional content (notes), interactive synchronous video (live webinars/classes)
  and asynchronous interactive video playback (on-demand)
