indicative_content:
- 1. Wind, hydro and solar power
- 2. CHP and trigeneration
- 3. Nuclear power
- 4. Energy storage technology and fuel cells
- 5. Waste heat recovery and utilisation
learning_outcomes:
- On successful completion of this module, students will be capable of explaining
  the principles of heat and power generation.
- Analyse the characteristics and performance of alternative energy systems.
- Apply standard calculation techniques to solve problems involving energy supply
  and demand.
- Demonstrate an understanding of energy storage technology.
- Recognise and understand the comparative cost benefits of different low and zero
  carbon technologies.
