indicative_content:
- Work placement in a biopharmaceutical, or course related, company for a minimum
  of 15 weeks, with exposure to a range of laboratory, processing and scientific activities.
- Exposure to a range of laboratory techniques, working to quality systems and standards.
- Preparation of reports, both oral and written, on work carried out over the period
  of placement.
- Presentation of reports at seminar and oral, if relevant.
- Maintenance of a work log of placement, critical evaluation and reflection on both
  the experience itself, as well as the professional development achieved.
- Interpretation and critical evaluation of results of scientific experimentation.
- Ability to work individually and as part of a team.
learning_outcomes:
- Develop skills to plan a programme of work.
- Perform laboratory analysis or scientifically based experimental work to validated
  standards.
- Operate independently and/or as part of a team towards set objectives.
- Apply competently their biology and biopharmaceutical science knowledge and skills
  in a range of settings.
- Critically appraise, reflect and report on personal, professional and technical
  achievements.
learning_and_teaching_methods:
- Work based learning - practical learning experience from industrial placement.
- Training in laboratory work carried out in a regulated environment working to accredited
  standards.
- Reporting of scientific data and analysis.
- Submission of a report and reflective work log on completion of the placement period.
