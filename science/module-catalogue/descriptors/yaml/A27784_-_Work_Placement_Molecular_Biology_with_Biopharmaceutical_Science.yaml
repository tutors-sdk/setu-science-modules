full_title: Work Placement (Molecular Biology with Biopharmaceutical Science)
short_title: Work Placement (Biology)
credits: 30
level: Intermediate
author: AHEARNE
history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: Students will be placed for work experience in a biopharmaceutical (or related)
  company or research laboratory for a minimum of 15 weeks for Semester 6. The placement
  will be monitored by the employer and WIT staff, with the student keeping a reflective
  work log. The placement is designed to enable the student to apply and develop their
  knowledge and skills in a working environment while meeting the needs of industry,
  thus providing the student with a broader skills-base and enhancing their professional
  development.
