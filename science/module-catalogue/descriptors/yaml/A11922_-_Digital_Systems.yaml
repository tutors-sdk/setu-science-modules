reference: A11922
full_title: Digital Systems
short_title: Digital Systems
credits: 5
level: Intermediate
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electronics
aim: This module follows on from the module called Finite State Machines and builds
  on concepts introduced there. As the required size and complexity of digital systems
  increases, the designer is forced to implement the design using specialised devices,programmable
  logic devices(PLDs') and field-programmable gate arrays(FPGAs'). This module will
  study the options available and examine HDL in terms of its translation into hardware
  elements or synthesis. The operating characteristics, manufacturers specifications
  and applications of D/A and A/D converters will be investigated. Address decoding
  schemes, together with good design principles and troubleshooting techniques will
  also be covered.
