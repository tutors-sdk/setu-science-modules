indicative_content:
- Memory Devices
- Programmable Logic Devices
- Address Decoding Schemes
- A/D and D/A Conversion
- Synthesis using HDL
- Good Design Principles
- Troubleshooting Digital Systems
learning_outcomes:
- Explain how ROM and RAM devices operate, how they may be expanded to increase word
  length and capacity and incorporated in address decoding schemes.
- Appreciate the flexibility of programmable logic devices and undertake synchronous
  and asynchronous design solutions using PLDdevices.
- Use HDL as a basis for FSM synthesis.
- Analyse D/A and A/D conversion techniques, interpret the relevant performance characteristics
  and recognise typical conversion errors.
- Demonstrate the importance of good design principles and the significance of troubleshooting
  techniques.
- Construct, test and simulate specified digital systems, relevant to the theory lectures
  in a laboratory setting.
