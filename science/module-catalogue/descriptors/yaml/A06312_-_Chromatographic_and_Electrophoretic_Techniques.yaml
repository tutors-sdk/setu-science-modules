indicative_content:
- Basics of solution preparation and associated calculations (concentration, dilutions)
- Basics of intermolecular interactions
- Introduction to chromatography and description of the main sorption mechanisms
- Basic equations of chromatography for the extraction of qualitative and quantitative
  information from chromatograms
- Principles, practices, apparatus and applications of thin layer chromatography
- Principles, practices, instrumentation and applications of reversed phase and normal
  phase high performance liquid chromatography
- Principles, practices, instrumentation and applications of gas chromatography
- Principles, practices, instrumentation and applications of alternative modes of
  liquid chromatography
- Principles, practices, instrumentation and applications of gel electrophoresis
- Associated laboratory-based experiments to supplement and augment the above content
learning_outcomes:
- Describe the difference between molecules based upon their relative polarity.
- Describe the principles and practices of thin layer chromatography and its applications
  in the analytical laboratory.
- Discuss the instrumentation, apparatus and sample preparation required for high
  performance liquid chromatography, gas chromatography and ion chromatography.
- Describe the instrumentation, apparatus and sample preparation required for gel
  and electrophoretic techniques.
- Describe how the above chromatographic and electrophoretic techniques can be applied
  to the separation of analytes in a wide range of environments e.g. pharmaceutical,
  environmental, food, clinical.
- Operate associated laboratory instrumentation for the analysis of real samples.
