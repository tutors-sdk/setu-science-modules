aim: This module will provide a comprehensive understanding of the theory and practice
  of a variety of chromatographic and electrophoretic techniques, including thin layer
  chromatography, liquid chromatography, gas chromatography, and gel electrophoresis.
  A necessary background will be provided to give the student the ability to select
  an appropriate separation technique for a given class of analyte.
