assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills.'
- '40%--59%: Will be able to show a good knowledge of the key learning outcomes, including
  the main aspects of project management and marketing principles. The student will
  be able to write and present a quality case study on project management and a marketing
  plan for an agri-business.'
- '60%--69%: In addition, the student will demonstrate more detailed knowledge of
  all the topics, including human health developments and trends. The student will
  also be able to write and present a good quality case study on project management
  and a marketing plan for an agri-business.'
- '70%--100%: The learner will be able to demonstrate comprehensive knowledge and
  understanding of all learning outcomes, including project cost measurement, market
  research, and the marketing mix. The student will write and present a related high
  quality case study on project management and a marketing plan for an agri-business.'
