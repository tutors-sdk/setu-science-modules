indicative_content:
- 'Business planning and project design: work breakdown structure, critical path network,
  project risk management, change management, and quality control.'
- Project cost measurement and management using the concept of earned value.
- Managing a project team -- leadership, resource allocation, administration, the
  role of the project manager, project completion and handover
- 'Consumer and organisational buying behaviour: factors impacting consumer, household
  and organisational buying behaviour; steps in the buying process; the concept of
  derived demand.'
- Market research into market segmentation, positioning and branding strategies.
- The Marketing Mix -- co-ordinating product, pricing, distribution and promotional
  strategies for effective marketing campaigns
learning_outcomes:
- Describe and illustrate project plans to estimate project duration using appropriate
  software tools.
- Prepare business planning guidelines to cater for change management and project
  risk associated with transition to organic systems.
- Demonstrate a detailed knowledge and comprehension of the human resource aspects
  of developing projects - organisation, roles, skillsets required.
- Estimate and evaluate project costs, report on project earned value, and analyse
  project cost variances.
- Critically assess the importance of marketing to a farming business and evaluate
  key marketing fundamentals e.g. target market segmentation, positioning and branding
  strategy.
- Design and develop an integrated marketing plan for a farming business with new
  product offering(s).
- Select, appraise and summarize relevant case examples for developments in project
  management and market research from the published literature.
learning_and_teaching_methods:
- Online lectures with live participatory discussion sessions
- Case studies on agroforestry and enhanced biodiversity on organic farms
- Webinar presentations with experienced practitioners
