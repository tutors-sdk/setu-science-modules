aim: The module will equip participants with methodologies to undertake project planning
  and implementation aimed at delivering desired results. The challenge of converting
  to organic and biological production and successfully planning this transition will
  be analysed and discussed. Participants will be able to estimate project duration
  and associated costs and develop skills necessary to plan, control, monitor project
  schedules and manage human resources. Integrated with this the marketing component
  of the course will introduce the participant to the principles of marketing and
  how these can be applied successfully in the Irish and European marketplace. Factors
  influencing the consumer buying process, identifying appropriate markets, new product
  development and associated marketing mix elements, including targeted communications
  using online platforms will be addressed.
