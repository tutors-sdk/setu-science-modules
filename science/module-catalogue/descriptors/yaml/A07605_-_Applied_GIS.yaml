reference: A07605
full_title: Applied GIS
short_title: Applied GIS
credits: 5
level: Introductory
author: MPEDINI
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: In this module students will create thematic maps using a commercial GIS software
  package (ArcGIS). The module is very practical and will enable students to use online
  base maps, import georeferenced digital maps/aerial photos, and create thematic
  maps relevant to forestry. Students will also be able to incorporate their own GPS
  survey data into the GIS maps. The module will equip the student with the skills
  required to create maps for the Forest Management Plan module in third year.
