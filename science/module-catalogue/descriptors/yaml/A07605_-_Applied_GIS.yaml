indicative_content:
- Basic concepts of GIS
- ArcGIS and the file structure of ArcGIS projects (ArcCatalogue and ArcMap)
- Creating data frames and feature layers incl. using base maps
- 'Importing external data: digital maps, digital orthophotos, and GPS data'
- Managing attribute table
- Creating and editing features
- Using the symbology tool
- Creating layouts and printing maps
learning_outcomes:
- Describe the key concepts of Geographical Information Systems (GIS).
- Apply fundamental routines in ArcGIS, i.e. create a map document, set data frame
  properties and add layers, Draw and edit polygon, line, and point themes, cut polygons,
  manage attribute tables, use symbols and legends, create and print layouts to scale.
- Apply back ground layers for heads-up digitising using ArcGIS base maps, OSI digital
  maps and orthophotos.
- Complete maps that are targeted towards the end-user by proper use of symbology
  and map layout.
- Display Irish GIS data downloaded from the Internet.
- Use data from a GNSS receiver and convert the map projection to the Irish grid systems
  (IG and ITM).
learning_and_teaching_methods:
- Key concepts will be described in a small number of lectures.
- The teaching of key skills will take place in an IT lab where all students will
  have access to the GIS software. During class time the lecturer will demonstrate
  the use of the GIS while students follow on their own PC. Notes and flash movies
  prepared by the lecturer will act as support.
- Students will prepare their assignment in their own time.
