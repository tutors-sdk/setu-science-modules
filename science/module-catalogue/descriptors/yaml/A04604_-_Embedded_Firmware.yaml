indicative_content:
- Architecture of Embedded Systems and programming model.
- Instruction set and assembly language programming.
- Subroutines, parameter passing, and good programming practice
- Exceptions and interrupts, Vectored Interrupt controller (VIC), C and assembly language
  constructs for Structured Programming.
- APCS compliant modules , Mixed programming/translation in C and assembly
- Polling and interrupt driven I/O, accessing and programming I/O devices, timer devices.
- Software development tools, Application Programming Interface (API), libraries.
- Program design, modular programming, testing, debugging and verification, documentation
  and maintenance
learning_outcomes:
- Demonstrate knowledge and understanding of processor's instructions and its peripheral
  devices.
- Create programs in Assembly language, C language and mixed languages using APCS
  standard.
- Analyse and translate C language software into Assembly language and vice-versa.
- Design application programs, and document it, in C/Assembly language using structured
  and modularised approaches.
- Use software development tools to write, compile, test and debug programs.
- Create and use software libraries and API.
