full_title: HRM in Manufacturing
short_title: HRM in Manufacturing
credits: 5
level: Intermediate
author: BWHELAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: On completion of this module, the student will be capable of applying the principles
  of human and general management, and of understanding the importance of strategic
  human resource management to the success of the organisation's business plan.
programmes:
- timetable: HRMB-0088
  code: WD_SGMPT_D
