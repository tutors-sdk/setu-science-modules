  stage: 1
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Management functions, levels of management, strategic management (mission statement,
  business plan, functional plans and goals)
- Leadership theories and styles
- Organisational environment; external analysis (STEP G), task analysis (Porters 5
  forces), internal (SWOT, stakeholders)
- 'Change and organisation culture: change in organisations, change process, change
  and the individual; culture, how it is created and maintained, different types,
  changing organisational culture'
- Human resource planning (analysis and forecasting), succession planning
- Recruitment, selection and induction; job analysis, job description, competency-based
  interviewing, selection options including psychometrics, assessment centres, emotional
  intelligence
- Motivation and reward; motivational theories, different reward approaches
- Performance management and appraisal
- Individual and organisational learning; staff development and training
- 'Perception: influence on HRM processes, diversity in organisations'
learning_outcomes:
- Apply the principles of human resource management.
- Demonstrate how strategic HRM supports and influences the organisation's strategic
  business plan.
- Apply motivation and leadership skills to team and self- management.
- Use various techniques for interview and appraisal.
- Plan and implement learning strategies for self, individuals and groups.
- Produce the key findings of a report in a MS PowerPoint presentation.
learning_and_teaching_methods:
- Lectures.
- Case studies.
- Presentations.
- Role play/mock appraisals.
