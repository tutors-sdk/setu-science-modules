indicative_content:
- 'Introduction to Minitab: loading datasets; obtaining summary statistics; generating
  charts (simple, multiple-clustered); identifying and locating outliers; data subset
  selection; deriving/calculating new variables'
- 'Statistical process control (SPC): control charts for variables (mean, cusum, S,
  range); control charts for attributes (np, p, c, u); identifying out of control
  signals'
- 'Introduction to statistical inference: two sample t-test (independent and paired).
  Conducting the analysis and interpreting the output - confidence intervals v p values;
  testing assumptions; non-parametric tests; reporting findings'
- 'Experimental design: terminology - experimental units, factors (design/nuisance/etc.),
  levels, randomisation, replication, blocking; completely randomised designs; randomised
  block design; experimental design in Minitab; one-way ANOVA and assumptions; post-hoc
  analysis.'
- 'Factorial designs: main and interaction effects - estimation and visual representation'
- 'Advanced topics: fractional factorial design; nested factors; split plot'
- 'Regression: regression applications in experimental design; interpreting regression
  analysis output from Minitab'
learning_outcomes:
- Construct variable and attribute control charts.
- Compute summary statistics using Minitab.
- Analyse comprehensively a statistical inference involving the difference in means
  between two groups.
- Apply ANOVA and critically interpret the analysis.
- Communicate the principles and the terminology of experimental design.
- Illustrate possible application areas for some advanced concepts in experimental
  design, e.g. interaction effects, random factors, split plot, regression models.
