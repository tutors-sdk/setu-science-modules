credits: 5
level: Intermediate
author: FLEONARD
history_comment: ''
school: Science and Computing
department: Science
cluster: Mathematics and Physics
aim: This module will expose the student to further control chart constructs. It will
  also introduce the student to the principles and practice of experimental design
  using a suitable statistical package such as Minitab. The student will learn how
  to identify the appropriate design type for introductory problems, correctly conduct
  the experiments, input the data in to Minitab, perform the appropriate analysis
  and properly interpret the output.
