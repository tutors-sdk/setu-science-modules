indicative_content:
- Review of basic fluid properties. Fluid statics. Bernoulli and continuity equations.
- Behaviour of real fluids. Flow in bounded systems
- Flow in pipelines. Friction effects. General energy equation. Pump sizing and selection
- 'External flow: boundary layer, drag and lift'
- Dimensional analysis and similarity
- 'Analysis of fluid flow in rotodynamic machinery such as: centrifugal pump, Francis
  turbine and Pelton wheel'
learning_outcomes:
- Design simple fluids systems accounting for the various energy losses the fluid
  experience and select a suitable pump.
- Explain the origin of lift and drag in a variety of external flow scenarios and
  evaluate consequent drag and lift forces.
- Apply dimensional analysis and similarity techniques.
- Analyse simple fluid flows and determine important fluid parameters in such flows.
- Describe a range of turbomachines and analyse fluid flow in same.
