aim: This module builds on the fundamentals of fluids established in the Fluid Mechanics
  module in year 3 of this programme. The approach is to look at real fluids in real
  applications. It further develops the principles underlying the subject and demonstrates
  how these are used for the design of hydraulic components and systems.
