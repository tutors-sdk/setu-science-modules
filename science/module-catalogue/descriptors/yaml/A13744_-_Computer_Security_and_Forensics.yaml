indicative_content:
- 'Introduction to computer security: security threats; attack methods; common vulnerabilities;
  security services'
- 'Cryptography: symmetric encryption; modern encryption; block vs stream ciphers;
  public key cryptography'
- 'Message authentication and integrity: hash functions; collisions; MACs; digital
  signatures; digital certificates'
- 'Network security: TLS/SSL; wireless security, SSH, firewalls'
- 'Secure Web Application development: SQL Injection; Cross Site Scripting, CSRF'
- Security policy and procedures
- Secure coding best practice
- Introduction to computer forensics, the forensic process
- File systems and recovery of data
- Live response
- Network data, types of data, collecting and analysing data from a network
- Web forensics, HTTP headers, cookies, browser / server log analysis, proxy servers,
  capturing web pages, web form server-side data, web activity reconstruction, DNS
- E-mail forensics, e-mail activity reconstruction, message headers, message attachments,
  tracing online e-mail
- Mobile device forensics
learning_outcomes:
- Assess the various security threats and attack methods to which an organisation
  may be susceptible.
- Appraise the role of cryptography in computer security, including its benefits and
  limitations.
- Test and use cryptographic software and configure network and system security tools.
- Evaluate the specific security concerns pertinent when developing web applications.
- Recommend security measures when developing code.
- Utilise forensic tools to analyse a file system and recover deleted data.
- Perform a live response and gather network data.
- Investigate web based services/applications.
- Trace and analyse email data.
- Collect electronic evidence from modern devices such as smart phones or tablets.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
