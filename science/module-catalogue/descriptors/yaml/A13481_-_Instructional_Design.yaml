indicative_content:
- Theories of learning
- Implications of pedagogical approaches to the effective design of training and learning
  solutions
- The instructional design process
- Evaluation of current instructional design technologies and delivery systems
learning_outcomes:
- Evaluate key assumptions within the main learning paradigms.
- Assess the practical implications of pedagogical approaches to the effective design
  of training and learning solutions.
- Evaluate current instructional technologies and assess the practical implications
  in designing effective training and learning solutions.
- Design and develop an effective training solution based upon theoretical assumptions
  explored in the module.
learning_and_teaching_methods:
