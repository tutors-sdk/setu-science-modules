indicative_content:
- Plant identification of 60 plants to include bedding plants
- Describe and categorise plant material (bulbs and annuals)
- Prepare displays of bedding plants
- Pruning techniques - formative pruning of trees, pruning of a variety of shrubs,
  climbers and perennials
- Turfgrass maintenance
learning_outcomes:
- Identify a range plants to include bedding plants using their correct botanical
  name.
- Describe and categorise plant material (bulbs and annuals).
- Plan a display of bedding plants.
- Determine and describe appropriate pruning techniques.
- Describe turfgrass maintenance techniques.
