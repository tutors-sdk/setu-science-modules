assessment_criteria:
- '<40%: Not able to identify 40% of plants with botanical names, cannot describe
  any pruning techniques, cannot describe turfgrass maintenance, cannot select bedding
  plants.'
- 40%-49%:Can identify at least 40% of plants with botanical names, basic description
  of turfgrass maintenance, can describe key pruning techniques but fails to consistently
  use them correctly, limited selection of bedding plants.
- '50%-59%: All of the above and achieves 50% of plants identified and selects correct
  pruning technique, good description of turfgrass maintenance techniques, acceptable
  selection of bedding plants.'
- '60%-69%: All the above with 60% of plants identified correctly with no spelling
  errors, and an understanding of more complex pruning techniques, and good bedding
  plant selection.'
- '70%-100%: All of the above and 70% of plants identified correctly with no spelling
  errors, consistently applies pruning techniques and has a complete understanding
  of turfgrass maintenance.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
