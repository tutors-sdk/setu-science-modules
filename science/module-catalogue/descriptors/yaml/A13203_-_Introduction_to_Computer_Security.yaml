indicative_content:
- Vulnerabilities, types of attack, security services
- Overview of encryption and authentication
- Randomness & entropy
- Symmetric block & stream ciphers, public key cryptography
- Authentication and hash functions
- Key management & digital certificates
- Security policy & procedures
- Applications
learning_outcomes:
- Describe and categorise potential computer security threats and attacks and the
  security services that can be implemented to address them.
- Explain the role played by both technology and security policy in supporting security
  services.
- Describe various cryptographic approaches and techniques for the provision of secrecy,
  authentication, integrity and non-repudiation.
- Use commercial encryption software for secrecy of data and authentication purposes.
- Communicate technical information effectively.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts. The
  student will be encouraged to participate in class discussions and ask questions
  to support their learning process.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
