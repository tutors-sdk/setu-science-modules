aim: The module will provide students with an understanding of international and Irish
  energy policy, the current status and future trends in Ireland's energy requirement,
  and the roles of energy efficiency and renewable energy in securing energy supply.
  The module will focus on illustrating opportunities for bioenergy as an alternative
  farm or forest enterprise, and provide students with the skill set required to carry
  out basic resource assessments. The module includes several field trips to both
  small- and large-scale renewable energy projects (e.g. wind farm, AD plant etc.).
