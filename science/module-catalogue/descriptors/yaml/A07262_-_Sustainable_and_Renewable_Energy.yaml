indicative_content:
- Basics of energy, forms, units, quantification, fuels, conversion and generation
- Global, European & Irish energy supply and demand
- Sustainable energy and the environment
- International & Irish energy policies
- Energy conservation
- 'Renewable energy sources & technology: bioenergy, wind, solar, hydro, wave'
- 'Bioenergy in Ireland: wood, energy crops, liquid biofuels and anaerobic digestion
  case studies'
- Resource assessment and supply chain development
- Financial analysis of energy production from renewables
learning_outcomes:
- Appraise the physical and technological principles of energy generation, in particular
  the range of bioenergy resources, conversion technologies and markets.
- Assess the challenges involved in sustainable energy and the potential solutions
  available through conservation, efficiency and renewables.
- Solve basic problems relating to fuel and energy quantification, conversion and
  financial analysis.
- Compare the available bioenergy pathways and comment on their relative technical
  and financial importance in an Irish context.
- Compare Irish energy policy with that of other countries (EU & non-EU countries),
  and recommend areas of improvement in Irish policy.
learning_and_teaching_methods:
- 'Lectures: will introduce basic energy principles, the technologies and energy supply
  systems available and provide a basis for the case study and elective project element
  of the module.'
- 'Fieldtrips: will provide examples of best operating practice in the areas of energy
  conservation, wind and biomass energy implementation. Case studies, based on these
  field trips will guide the student in identifying critical parameters in developing
  successful implementation of sustainable energy.'
