indicative_content:
- 'Mechanics: SI units; vectors; Newtons laws; gravitation; projectiles; energy; conservation
  laws; uniform circular motion'
- 'Electricity: Ohm''s law; simple resistor networks; Mains electricity and electrical
  safety'
- 'Light: Electromagnetic spectrum; Reflection; Refraction; Diffraction; Interference'
- 'Measurement: Introduction to the general principles of measurement'
learning_outcomes:
- Use the SI system of units to carry out formula-based calculations.
- Define the significant terms associated with mechanics, electricity, light and measurement.
- Describe and discuss the application of the physics concepts introduced related
  to a limited number of real world scenarios/devices.
- Use laboratory equipment in a safe and accurate manner.
- Report on and critically assess a range of experiments relating to the course content.
learning_and_teaching_methods:
- 'Lectures: The lectures will introduce the theory content to the student.'
- 'Practical programme: The practical element allows the student to put into practice
  the theoretical concepts covered in the lectures.'
- Live and video-based demonstrations
