indicative_content:
- 'History of Graphic Design: studies of influences and cultures'
- Visual Styles & Approaches
- 'Graphic Information Design: The Image and Its Role in Design, Infographics'
- Expressive Typography
- Advanced Colour Theory
- Graphic Design Processes
learning_outcomes:
- Evaluate historical influences, styles and cultures in graphic design.
- Arrange and design an infographic campaign.
- Design text as art and apply expressive typography.
- Design and create a graphic design project from problem to solution.
learning_and_teaching_methods:
