assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter.'
- '40%-49%: Will be able to show a good knowledge of the key learning outcomes including
  how to develop their competencies as a business professional.'
- '50%-59%: As well as the above the student will be able to demonstrate a good understanding
  of the key learning outcomes as well as be able to exercise judgement and convey
  a professional image.'
- '60%-69%: In addition, the student will demonstrate more detailed knowledge of all
  the topics and be able to employ reflective thought as well as decision making and
  problem solving.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of all learning outcomes and be able to recognise the inter-relationship between
  their role as a business professional and the effective operation of the organisation.'
