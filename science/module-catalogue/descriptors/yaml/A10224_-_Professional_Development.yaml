indicative_content:
- 'The modern work context: recent trends in management; changing role of managers;
  the personal demands on the modern manager; personal assessment of management skills'
- 'Self-Awareness: defining self -awareness; influences on the development of self;
  importance of self-awareness for work place success; developing improved self-awareness'
- 'Personality: understanding personality in the workplace; using personality in developing
  self-understanding and career development; constructive use of difference; personality
  and organisation development'
- 'Intelligence: defining intelligence; types of intelligence; distinguishing between
  IQ, EQ, multiple intelligence and practical intelligence and their role in managerial
  professional development'
- 'Learning: stages of learning; approaches to learning; identify preferred learning
  styles; using learning styles for lifelong learning and developing others; learning
  to delegate'
- 'Time management: defining time management; developing a time log; assessing priorities;
  master scheduling and timetabling'
- 'Stress: understanding stress and the sources of stress; costs of stress; identifying
  personal stressors; developing coping strategies for stress management'
- 'Problem solving: steps in rational problem solving; developing creative problem
  solving skills; establishing ethical and participative decision making criteria;
  promoting creative thinking in organisations'
learning_outcomes:
- Evaluate and develop competencies as a business professional.
- Interpret the inter-relationship between the role of the business professional and
  the effective operation of the organisation.
- Formulate reflective thought to adapt behaviour to context.
- Discriminate between alternative courses of action for ethical and effective decision
  making and problem solving.
