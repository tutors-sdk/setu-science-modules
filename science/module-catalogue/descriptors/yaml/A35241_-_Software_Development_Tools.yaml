indicative_content:
- Use of complex constructs and data structures associated with the chosen programming
  language.
- Programming techniques for well-behaved, well-designed, robust applications.
- Extensive use of software development tools throughout the development process e.g.
  version control, build systems, Continuous Integration/Continuous Delivery (CI/CD),
  profiling tools, code analysis, test-driven development, project management platforms,
  etc
- Read, understand, and consume APIs compatible with the chosen programming language
  e.g. command line interfaces (CLI), RestAPI frameworks, persistence, etc.
learning_outcomes:
- This module will be presented by a combination of lectures and computer-based practicals
  whilst capitalising on a web-enhanced learning environment.
- The lectures will be used to introduce new topics and their related concepts.
- A cooperative learning/peer tutoring (e.g. pair-programming, classroom forum support)
  approach will be adopted during the practical sessions.
- Self-directed learning will be encouraged throughout the duration of the module.
