assessment_criteria:
- '<40%: Not able to identify 40% of plants using their botanical names, unable to
  describe maintenance practices, applications and design principles.'
- '40%-49%: Can identify at least 40% of plants using their botanical names, can describe
  maintenance practices, plant uses, and design principles, and complete floral assembly.'
- '50%-59%: All of the above and can correctly identify at least 50% of plants.'
- '60%-69%: All of the above with at least 60% of plants identified correctly with
  no spelling errors.'
- '70%-100%: All of the above and at least 70% of plants identified correctly with
  no spelling errors.'
