indicative_content:
- Functional use of interior plants, market potential
- Theory of design, appraise features of good design in interior landscaping, range
  of products available for the industry e.g.planters and watering systems
- Identify a wide range of interior foliage and flowering plants, their requirements
  and suitability for different situations
- 'Site evaluation: Site survey and analysis, measure light temperature and relative
  humidity of interior landscape'
- 'Maintenance: Acclimatisation, cleaning, pruning, watering, feeding, pest and disease
  control'
- Materials for floristry, identify flower, foliage and materials, and care for and
  preparation of flowers and foliage material at all stages
- 'Design in floristry: Principles and elements in floristry design and their application
  - Colour wheel, depth of colour and harmonies colours for special occasions'
- 'Mechanics: Wire, securing, receptacles, frames, display holders, and accessories'
- 'Floristry assembles: Wired assemblies, presentation bouquets, and corporate arrangements'
learning_outcomes:
- Explore potential applications of interior landscaping.
- Appraise features of good design of interior landscape features.
- Demonstrate and practice care requirements for interior plants, cut flowers, and
  equipment.
- Analyse the suitability of a site for an interior display.
- Plan a maintenance programme for range of interior plant displays.
- Determine influences of a site on the selection and management of interior displays.
- Compare and contrast principles of floral design.
- Create floral assemblies.
