reference: A08347
full_title: Interior Landscaping and Floristry
short_title: Interiors and Floristry
credits: 5
level: Intermediate
author: DFLANAGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Horticulture
aim: This module covers two complimentary areas; floral design and interior plantscaping.
  The module will enable the student to identify, select and understand the use of
  a wide range of interior plants. It will also enable the student to identify, use
  floral materials, and create suitable compositions.
