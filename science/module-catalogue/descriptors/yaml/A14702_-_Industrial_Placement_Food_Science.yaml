indicative_content:
- Work placement in a food business company for an extended period, with exposure
  to a range of laboratory, processing and business activities
- Exposure to a range of quality and food safety systems or standards and be capable
  of evaluating the effectiveness of these
- Preparation of reports, both oral and written, on work carried out over the period
  of placement
- Presentation of reports at seminar and oral
- Maintenance of a log of work experience, critical evaluation and reflection on both
  the experience itself, as well as the professional development achieved during the
  experience
- Interpretation and critical evaluation of results of scientific or business procedures
  carried out during the placement
- Ability to work individually and as part of a team
learning_outcomes:
- Construct a professional CV and prepare for interview to secure placement.
- Plan learning objectives for the placement.
- Operate independently and/or as part of a team towards the set objectives of the
  food based business or food research facility.
- Apply competently their food science knowledge and skills in a range of settings.
- Practise safely, laboratory and food industry related skills and employ good environmental
  practices.
- Examine their personal, professional and technical achievements on the placement.
- Communicate their activities and assessment of the food related enterprise in a
  professional manner.
learning_and_teaching_methods:
- Reporting of scientific and / or business data.
- Scientific or business report and appraisal.
- Weekly log of activity.
- Oral presentation.
