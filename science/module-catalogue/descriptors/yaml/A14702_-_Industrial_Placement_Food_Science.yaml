reference: A14702
full_title: Industrial Placement (Food Science)
short_title: Industrial Placement (Food Sc)
credits: 30
level: Intermediate
author: EKENT
history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: Students will be placed for work experience in food processing/food business/research
  for three months during the first semester of the third year of their programme
  (i.e. September to December). The aim of this placement is to expose the student
  to the organisation and management of an industrial production/research facility.
  The placement is designed to allow learners to apply and develop their knowledge
  and skills in a food company or research facility, working to accredited quality
  standards, thus enhancing their professional development.
