reference: A14402
full_title: Farm Buildings
short_title: Farm Buildings
credits: 5
level: Intermediate
author: SWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Engineering
aim: This module is designed to give the student the theory and practice of basic
  farm building projects. Students will learn about building materials, how to plan
  a building project, and how to carry out basic construction and maintenance tasks
  associated with a farm building project.
programmes:
- timetable: CONS-0016
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 3
  semester: 6
  status: M
prerequisites: []
