reference: A13487
full_title: Computer Networks (ICT Skills)
short_title: Computer Networks (ICT Skills)
credits: 5
level: Advanced
author: LBWHITE
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Networks and Cloud
aim: This module introduces data communications terminology and concepts, network
  protocols and models. Students will use protocol analysis software to explore various
  network protocol operations. An examination of TCP/IP, IP addressing and Ethernet
  is presented as well as a brief introduction to Routing and Wireless LANs. Practical
  skills are an essential part of this module.
programmes:
- timetable: COMP-0519
  code: WD_KCOSC_G
  name: Higher Diploma in Science in Computer Science
  stage: 4
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Introduction to Computer Networks and Protocols
- OSI and TCP/IP models
- Ethernet
- Network Layer Protocols and Functionality
- IP Addressing and subnetting
- Routing
- Transport Layer Protocols and Functionality
- Application Layer Protocols and Functionality e.g. HTTP, FTP, DNS, SMTP
- Wireless LANs
learning_outcomes:
- Compare network protocol models to explain the layers of communications in data
  networks.
- Evaluate the major components, operation and functionality of a computer network
  and commonly used protocols and services.
- Design, calculate and apply subnet masks and addresses.
- Build a simple Ethernet network using routers and switches.
- Configure routers and switches using command line interface.
- Determine the operations and features of network protocols and services using protocol
  inspection software.
- Implement a basic wireless network.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures.
- The continuous assessment will require the student to apply the theory and practical
  knowledge to a business solution.
