assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter. Failure to
  meet the objectives of projects. Unable to carry out or submit independent study
  and research.'
- '40%-49%: Ability to show a basic knowledge of research methodologies and basic
  competency in their use. Basic level of knowledge of chosen research topic.'
- '50%-59%: As well as the above, the student will be able to demonstrate an understanding
  of some of the complexities of research methodologies and a good competency in their
  use. Display an adequate level of knowledge of chosen research topic supplemented
  by an ability to present this knowledge in a clear and concise manner.'
- '60%-69%: In addition to the above, the student will demonstrate a more detailed
  knowledge of research methodologies and a high level of competence in their use.
  Display a high level of knowledge of chosen research topic, supplemented by an ability
  to present this knowledge to a high technical standard.'
- '70%-100%: All of the above to an excellent level. In addition, the student will
  demonstrate an advanced knowledge of research methodologies, as well as excellent
  and proficient competence in their use. Display a thorough level of knowledge of
  chosen research topic, supplemented by an ability to critically evaluate and discuss
  the topic in relation to a wider scientific context. The above advanced knowledge
  of the topic will be supported by superior reporting and presentation skills.'
