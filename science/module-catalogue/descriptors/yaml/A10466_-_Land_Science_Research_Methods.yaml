indicative_content:
- Experimental design.
- Scientific report-writing skills.
- Presentation skills
- Literature search strategies, including databases, literature, journal and internet
  resources.
- Scientific referencing according to Harvard referencing guidelines.
learning_outcomes:
- Choose scientific literature relevant to a specialised research topic from a variety
  of sources.
- Compile a literature review on a chosen research topic, using an appropriate referencing
  system.
- Critique the literature sourced.
- Design a specialised research project plan.
learning_and_teaching_methods:
- Lectures
- Library resources including databases (ScienceDirect, Web of Science, etc)
- Tutorials
- Self-directed study.
