history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: This module will introduce techniques that are necessary in a research environment,
  such as scientific reporting writing skills, presentation skills, utilising literature
  search strategies (database, journal and internet) and scientific referencing. This
  will be coupled with the planning and design of a scientific research project on
  their chosen topic in the context of a literature review. Where necesssary, due
  to seasonal factors involved in research in agriculture, horticulture or forestry,
  some students may also have to initiate setting up of their projects in this semester.
