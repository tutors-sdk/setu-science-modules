indicative_content:
- 'Introduction to Data Mining: frameworks, inputs, outputs'
- 'Exploratory Data Mining: relationships, clustering and network analysis using appropriate
  algorithms and methods'
- 'Predicting outcomes: classification, regression and time-series analysis'
learning_outcomes:
- Categorise typical fundamental Data Mining problems.
- Appraise the concepts and fundamentals of Classification, Prediction and Clustering
  and their solution techniques.
- Evaluate the use of typical Data Mining methods and their appropriate implementation.
- Solve Data Mining problems using the Data Mining methods learnt.
- Assemble and interpret results of the Data Mining methods learnt.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures.
- Students will apply typical methods of Data Mining to data sets provided in the
  practical classes.
- Students will apply appropriate Data Mining methods to a data set for the purposes
  of continuous assessment.
- Students will interpret and present the findings produced in the practical classes
  and continuous assessment.
