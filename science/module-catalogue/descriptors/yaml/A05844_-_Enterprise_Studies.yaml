aim: This module focuses on providing the student with a set of skills useful for
  employment within an engineering enterprise in terms of developing the ability to
  work in teams, to communicate within a range of stakeholders, to develop problem
  solving skills and to increase awareness of ethical considerations, including health
  and safety issues.
