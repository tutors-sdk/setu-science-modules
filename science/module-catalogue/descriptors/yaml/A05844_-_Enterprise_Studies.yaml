indicative_content:
- Project management and production system networks (resource management, setting
  realistic milestones, marshalling available resources).
- Maintenance, performance, quality and reliability measures (quality assurance techniques,
  productivity measures, equipment effectiveness).
- Workplace behaviour and expectations, and maximising placement outcomes (guidelines
  to effective meetings, reporting requirements, record keeping, effective teamwork,
  identification of learning outcomes and activities).
- Engineering ethics and communications (requirement for ethical standards in professional
  and private capacity, reports, presentation skills).
learning_outcomes:
- Apply project management skills in engineering environments.
- Communicate standard engineering system performance criteria to a range of stakeholders.
- Evaluate the requirements of professional conduct and the responsibilities of engineers
  in a range of circumstances.
- Propose a coherent team-based approach for industrial and commercial environments.
