aim: To provide students with knowledge of fundamental managerial skills and ethical
  and social responsibility of businesses, evaluate forms of business ownership and
  practical skills for decision making (cost-volume-profit analysis, relevant costs
  and revenues, pricing and capital investment appraisal).
