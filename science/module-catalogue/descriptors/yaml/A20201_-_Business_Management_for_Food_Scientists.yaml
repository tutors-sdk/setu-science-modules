indicative_content:
- 'Management skills: difference between management and leadership, management functions,
  effective management skills'
- 'Ethics and social responsibility: defining ethical behaviour, social responsibility
  in business versus profits, social responsibility towards society and the environment,
  consumers, employees and investors using'
- social responsibility towards society and the environment, consumers, employees
  and investors using food business examples
- 'Forms of business ownership: distinguish between sole trader, partnership, company;
  factors to consider when determining an appropriate form of business ownership'
- 'Decision making: cost-volume-profit analysis, relevant costs and revenues, pricing
  (price taker/setter,pricing policies), capital investment appraisal'
learning_outcomes:
- Appraise fundamental managerial skills and discuss ethical and social responsibilities
  of a business.
- Compare different forms of business ownership.
- Determine relevant costs and revenues, and evaluate pricing options and use break-even
  calculations,.
- Assess an investment opportunity within a financial context.
learning_and_teaching_methods:
- Lectures.
- Class and group discussions.
- Self study of assigned readings, exercises and texts.
- Pre-lecture preparation of readings, exercises and texts for participation in lectures.
