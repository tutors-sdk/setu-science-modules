indicative_content:
- Visual Design
- Interaction Design
- Usability and Accessibility
- Human Computer Interaction (HCI) & User Centred Design (UCD)
- Guidelines and Standards
- Evaluation and Testing
learning_outcomes:
- Demonstrate an understanding of the underlying issues and principles of UX.
- Demonstrate, at a fundamental level through written and practical work, the links
  between UX and Human Factors.
- Apply the principles of UCD, to the capture of user requirements providing a basis
  for design that is fit for purpose.
- Construct appropriate user interfaces for specific applications and specific users
  using low and high fidelity prototyping.
- Explain the usability and accessibility of an interface with respect to different
  user populations.
learning_and_teaching_methods:
- Lectures --will be used to introduce and discuss UX concepts.
- Practicals/Workshops -- will be used to develop and apply the concepts introduced
  and discussed during lectures.
- Student Independent Learning -- Students will research and apply the various concepts
  introduced and discussed during lectures.
- Students will use MS Office and Adobe Creative Cloud.
