indicative_content:
- 'Role of regulatory authorities: USA FDA, HPRA, UK MHRA'
- 'Introduction to pharmaceuticals: terminology and general requirements'
- 'Classification of pharmaceuticals: topical, solid dose, parenterals and aerosols'
- Chemical structures and synthesis of pharmaceutical products
- Overview of API processing and formulation development
- Historical and modern drug development
- Explanation of Good Manufacturing Practice (GMP) and its role in pharmaceutical
  production
- Roles, responsibilities and career prospects within the pharmaceutical industry
- Biotechnology in food, pharmaceuticals, agriculture and the environment
- 'Overview of a typical biotechnology process: inputs, process & outputs'
- Brief introduction to the principles of genetic engineering of microbes, plants
  & animals and its potential
- Fundamentals of biologics and biopharmaceuticals
learning_outcomes:
- Describe the roles and structure within the pharmaceutical industry.
- Describe a typical biotechnological and pharmaceutical process.
- Identify the impact of regulation and GMP on pharmaceutical production.
- Describe the evolution and discovery of pharmaceutical products.
- Communicate scientific material to peers.
- Illustrate effective teamwork in conjunction with colleagues.
learning_and_teaching_methods:
- Lectures.
- Groupwork to produce presentations.
- Class discussions.
- Blended learning.
- Self-directed study.
