indicative_content:
- Categories of forest management plans
- Planning aims and objectives
- The legal and regulatory framework for forest management plans
- The structure and preparation of a forest management plan
- Forest Management Software/Forest Information Systems
- The yield class/site index system
- Static yield tables and dynamic yield models
- Forecasting timber yield, assortment distribution and future standing volume
- Calculating annual budget for timber revenue, operations costs and forest valuation
- Assessing wind-throw hazard and other growing conditions
- Species dependent silvicultural cost models
- Managing biodiversity in a forestry context
- Analysis and presentation of forest management data
- Evaluating a forest management plan in relation to the owner's objectives, management
  constraints and sustainability
- Submission of forest management plans through the Forest Service IFORIS/iNET portal
learning_outcomes:
- Utilise the concepts of strategic, tactical, and operational forest planning in
  the context of a forest management plan.
- Analyse the aims and constraints given by the forest owner in order to formulate
  operational management objectives.
- Utilise the British Forestry Commission's Yield Class system and the internationally
  used site index.
- Utilise both static and dynamic yield models as tools for making prognosis of future
  timber growth, timber yield and harvest revenue.
- Collect and compile data from different sources and describe a forest comprehensively
  in terms of its economic, social, and environmental values.
- Designate prescriptions at stand level and develop local cost models for various
  tree species based on management objectives and local growing conditions.
- Produce a map-based Forest Management Plan for a five-year period.
- Analyse the financial implication of the planning decisions in terms of annual cash
  flows and changes in forest value.
learning_and_teaching_methods:
- Lectures will be used to introduce the theory.
- Field trips will be used to demonstrate field work procedures and for students to
  carry out field registration, as well as meeting foresters on site to experience
  how planning decisions are carried through in the management of a forest property.
- Computer practicals will be used to generate the geodatabase for the forest property
  data, and to prepare maps and cost and revenue forecasts.
