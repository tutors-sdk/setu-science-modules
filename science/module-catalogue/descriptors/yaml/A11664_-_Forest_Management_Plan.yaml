aim: This is a 10 credit module whose final outcome is a comprehensive five-year Forest
  Management Plan for a medium-sized property. The demands on forestry as a provider
  of timber, recreation, environmental and social benefits are ever increasing and
  complex. In order to reach a sustainable balance, foresters need planning tools.
  In this module students will experience the planning process of a Forest Management
  Plan. The focus of the module will allow students to gain professional skills in
  using models for timber growth, and calculating clear-fell and thinning yield. In
  preparing a Forest Management Plan for a five-year period the student will have
  to synthesise all the knowledge and skills acquired over the three programme years.
  Preparing a plan will have to be done with the forest owner's aims and objectives
  in mind, as well as the constraints given by legislation, environmental guidelines
  and local social issues.
