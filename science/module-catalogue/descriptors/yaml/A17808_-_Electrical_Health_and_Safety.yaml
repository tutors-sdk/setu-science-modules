indicative_content:
- 'Work Practices in Hazardous Environments: General principles, ignition properties
  and apparatus protection.'
- Standards, Directives, Practices and ATEX legislation.
- Relevant Statutory Bodies within the Electrical Engineering Sector.
- Legislation relating to overhead cables, underground cables, risk assessment, safety
  plans
- Health and safety duties under the common law, Principle of ``reasonable practicable''
- Duties of Project Supervisor Design Process (PSDP)
learning_outcomes:
- Determine the selection and use of electrical apparatus in potentially explosive
  atmospheres.
- Distinguish the Statutory Bodies within the Electrical Engineering Sector.
- Determine the Health & Safety requirements in relation to the Electrical Engineering
  Sector.
- Apply common law and legislative principles to the Health & Safety role of the electrical
  engineer.
