indicative_content:
- Lexical Contexts covered may include - the environment and weather; expressions
  with take; feelings, ed/ing adjectives;
- Grammatical Features covered may include - position of adverbs and adverbials; zero
  and first conditional and future time clauses; unreal conditionals; structures after
  wish
- Discourse/Functions covered may include - discussing reading habits/books; telling
  anecdotes about extreme weather/life experiences; expressing feelings/regrets; writing
  a for and against blog post; writing a mini-article
- 'Exercise Types: Multiple-choice, gap-fill, close tests, word formation, sentence
  transformation, question and answer comprehensions, group definition activities,
  pairwork, information gap, anecdote descriptions, questionnaires, roleplays'
learning_outcomes:
- Produce a range of spoken communications exploiting the language systems (lexis,
  grammar) and skills (productive and interactive) covered in the module.
- Interpret a variety of short and extended spoken texts within the lexical contexts
  covered in the module.
- Classify a variety of text types within the lexical contexts covered in the module
  for general academic purposes, and display those reading skills practised within
  the module.
- Prepare stylistically appropriate informal written texts demonstrating a command
  of the lexical and grammatical elements covered in the module.
- Demonstrate awareness of cultural diversity based on class discussion and independent
  reflection.
learning_and_teaching_methods:
- Adopting a broadly communicative and integrated approach to language teaching, methods
  may include inter-active seminars, short talks and presentations and workshops using
  both traditional and ICT-based materials. Emphasis will be placed on class participation,
  independent learning and skills development. Teaching approaches that recognise
  and foster a variety of learning and teaching styles and/or promote learner motivation
  may be employed.
