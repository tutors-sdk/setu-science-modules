  and Organisational Psychology (Vols. 1 and 2)_. USA: Sage, 2001.'
- 'Arnold, C. and R. Randall. _Work Psychology_. 5th ed. England: Prentice Hall, 2010.'
- 'Robbins, S.P. and T.A. Judge. _Organizational Behavior_. 16th ed. USA: Pearson
  Education, 2015.'
