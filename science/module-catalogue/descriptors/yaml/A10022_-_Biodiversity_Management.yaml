indicative_content:
- An overview of biodiversity conservation - concepts and definitions
- Outline the threats to biodiversity and explain the need for conservation strategies
- In situ and ex situ methods for conservation of threatened species and small populations
- 'SACs, SPAs and pNHAs: their selection, protection and management'
- Habitat restoration and species reintroduction
learning_outcomes:
- Assess the concepts and definitions of biodiversity.
- Interpret the patterns of national and international biodiversity, assess the threats
  to biodiversity and critique the need for conservation.
- Compare and contrast the in situ and ex situ methods available for conservation.
- Distinguish between the categories of protected areas, the criteria for their selection
  and management techniques.
- Evaluate opportunities for conservation outside protected areas.
- Distinguish the opportunities and methods for habitat restoration and species reintroduction.
- Prepare a biodiversity management plan for a site.
