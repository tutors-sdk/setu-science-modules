aim: This module is a general introduction to the management and conservation of biological
  diversity. The module is divided into four parts. (1) This part provides an outline
  of the major elements of global biodiversity, its geographical distribution and
  evolution and examines the threats to biodiversity and the need to manage and conserve
  it. (2) This part focuses on conservation at species and population level, looking
  at the techniques and opportunities available for both in situ and ex situ conservation.
  (3) Introduces management and conservation issues at an ecosystem level, e.g. coastal,
  riparian, plantation forest, farmland etc. Protected areas form a critical conservation
  tool at this level, and the module examines the categories of protected areas, criteria
  for selection etc. The opportunities for habitat restoration and species reintroduction
  are also explored. (4) This last part reflects on challenges in the future and outlines
  possible solutions.
