indicative_content:
- Benefits of trees and valuation of trees
- Tree establishment and management; species selection, planting including semi-mature
  trees, pruning, tree response to wounding
- Decay detection in trees
- Tree pests and pathogens
- Tree hazard assessment and management
- Importance and management of veteran, ancient and heritage trees
- Protection of trees in the development process
- Amenity woodland management
learning_outcomes:
- Debate the benefits of trees and apply a method for valuing amenity trees.
- Relate the processes involved in tree establishment and maintenance to the development
  of healthier trees.
- Compare a range of technologies for detecting decay in trees.
- Inspect trees for hazards and propose appropriate solutions.
- Explain the principles of managing trees (including veteran, ancient, and heritage
  trees), including pest and pathogen impact.
- Associate the potential impacts of the development process on trees with the strategies
  used to protect trees in this context.
- Analyse the importance of amenity woodlands and explain the processes involved in
  managing these woodlands.
