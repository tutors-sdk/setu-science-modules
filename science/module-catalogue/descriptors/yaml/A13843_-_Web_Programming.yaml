reference: A13843
full_title: Web Programming
short_title: Web Programming
credits: 5
level: Advanced
author: RBIRNEY
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Software and Web Development
aim: This module introduces the student to the principles of web programming. The
  student will use a responsive framework to develop a web front-end. Students will
  also be introduced to client-side and server-side scripting techniques and will
  gain competency in developing full stack web applications that incorporate database
  access.
