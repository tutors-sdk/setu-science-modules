indicative_content:
- Responsive web front-end frameworks
- 'Client-side scripting: interactivity; client side data processing'
- 'Server-side programming: database connectivity; CRUD (Create, Read, Update, Delete)
  functions'
- Publishing web pages using FTP (File Transfer Protocol)
- Website deployment
- Website security
learning_outcomes:
- Develop a web front-end using a responsive framework.
- Construct and deploy a web application based on the client/server application model.
- Develop a web application that utilises client-side scripting techniques.
- Integrate database access in a web application using server side scripting techniques.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student.
- The student will be encouraged to participate in class discussions and ask questions
  to support their learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures, and allow them to develop practical skills in web development.
- Supplementary material will be accessible online.
