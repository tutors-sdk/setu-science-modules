indicative_content:
- 'Time domain: transient analysis of a 2nd order ( RLC), underdamped, critical &
  overdamping solutions, and component estimation for given waveforms'
- Frequency Domain Analysis:Transfer functions, Bode plots, pole-zero plots and root
  locus diagrams are developed for simple 1st & 2nd order passive (RLC) filters.
- 'Two Port Networks: transmission matrices are used for cascaded filters.'
- 'Filter families: Butterworth, Chebyshev & Bessel filters - Transfer functions,
  Bode (amplitude & phase) plots & pole zero plots. Cauer ladder implementaions, effect
  of phase on pulse shape.'
- Introduction to Maxwell's equations.
learning_outcomes:
- Illustrate the time and frequency response of 1st and 2nd order passive electrical
  systems.
- Determine equivalent circuits and component values from given responses.
- Design passive circuits (up to 2nd order) to give desired responses.
- Use two-port network matrices to analyse cascaded circuits.
- Apply Maxwell's equations and constitutive equations to simple uniform field situations.
- Perform practical experiments, use simulations and present clearly in reports.
