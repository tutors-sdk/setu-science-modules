aim: "This course builds on the D.C. Circuit Theory and A.C. Circuit Theory modules\
  \ and covers time domain and frequency domain analysis of second order electrical\
  \ systems. A physical and diagrammatic approach is taken to the introduction of\
  \ Maxwell's eqns as a generalisation of the basic electrical laws (e.g. Ohm's law,\
  \ Kirchhoff's voltage law, Amp\xE8re's circuital law). Physical interpretations\
  \ of curl, divergence etc and the surface and line integrals are emphasised."
