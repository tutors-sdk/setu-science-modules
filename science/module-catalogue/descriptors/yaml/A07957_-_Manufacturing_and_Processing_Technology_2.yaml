reference: A07957
full_title: Manufacturing and Processing Technology 2
short_title: Manufac & Process Technology 2
credits: 10
level: Intermediate
author: AHAYDEN
history_comment: ''
school: Science and Computing
department: Science
cluster: Pharmaceutical Science
aim: This module will provide the student with an in-depth knowledge of the equipment
  utilised in manufacturing in the pharmaceutical and biopharmaceutical industries,
  how it operates as well as the processes themselves. The module describes in detail
  the scale-up issues and development cycle surrounding such processes. It also gives
  a basic introduction to aspects such as process control, risk assessment and process
  analytical technology (PAT).
