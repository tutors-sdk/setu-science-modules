  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Process development, tasks and activities from discovery to technology transfer
- Extraction, chemical synthesis, semi-synthesis, biopharmaceutical production
- 'Pharmaceutical operations: review of facility design and plant layout; processing
  documentation'
- 'Process control: a basic overview of the important components in a control system'
- 'Chemical and Bio-reactors: design, control and operation, reaction kinetics'
- 'Construction and operation of separation equipment: liquid-liquid extraction, distillation,
  filtration'
- Drying, milling and powder properties
- Mechanisms of heat transfer, heat exchange equipment
- Down-stream biopharmaceutical processing; cleaning and sterile operation
- Aspects in scale-up and pilot plant production
- Quality by Design (QBD), Risk assessment and Process Analytical Technology (PAT)
learning_outcomes:
- Compare and contrast the operations involved in the synthesis and purification of
  (bio)pharmaceuticals on a large scale.
- Illustrate and appraise the operation and control of processing equipment including
  (bio)reactors, liquid-liquid extractors, filters, dryers and milling equipment.
- Examine the importance of design, layout and process control to (bio)pharmaceutical
  operations.
- Examine critical milestones and pertinent issues surrounding chemical process development
  and scale-up.
- Analyse and classify risk and learn how to reduce risk through process understanding
  and experimental design.
- Research individual processes and their underlying theory.
- Complete and record laboratory experiments to establish pharmaceutical structure
  and chirality.
learning_and_teaching_methods:
- Lectures.
- E-learning via Moodle.
- Visits to nominated pharmaceutical companies.
- Set problems.
- Written assignments and in-class discussion.
