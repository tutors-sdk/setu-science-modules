reference: A07892
full_title: Agricultural Science Farm Placement
short_title: Agri Science Farm Placement
credits: 30
level: Intermediate
author: SWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: This module is designed to give the student experience of practical farming on
  a high quality farm. The placement aims to allow learners to apply and develop their
  knowledge and skills. The farm placement is organised by Teagasc, and the student
  will be placed on a mixed farm enterprise in order to gain a broad experience of
  farming. The student will be monitored by the host farmer, by Teagasc staff, and
  the student will also keep a reflective work log. The completion of this work log
  will develop the student's ability to engage in reflective learning. Students are
  also encouraged to seek placements overseas, e.g. New Zealand, UK.
