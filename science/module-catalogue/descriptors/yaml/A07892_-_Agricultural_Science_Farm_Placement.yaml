  semester: 6
  status: E
prerequisites: []
corequisites: []
indicative_content:
- 'Placement requirements: a minimum of 15 weeks on a host farm organised by Teagasc;
  the student will be punctual, use safe working practices, avail of learning opportunities'
- 'Performance of work: work output and quality, dependability, performing tasks in
  accordance with directions, using initiative, adaptability and apply theory to practice'
- Relating, communicating and working with co-workers/team members, or with the host
  farmer and family members, and with people who do business with the farmer
- 'Record of placement experience (reflective work log): particulars of features of
  the host farm, inventory of machinery, livestock movements, enterprise details,
  duties carried out and end of placement summary'
- Maintenance of a work log of placement, critical evaluation and reflection on both
  the experience itself, as well as the professional development achieved
- Guidelines for the student, Institute and employers on the aims, objectives, and
  expectations of the module (learning agreement/guidelines)
learning_outcomes:
- Construct a professional CV and prepare for interview to secure placement.
- Appraise the aims, expectations and objectives of the employer, Institute and student
  to the successful completion of placement.
- Operate independently and/or as part of a team towards the set objectives of the
  farm enterprise and relate effectively to co-workers and host farmer family members.
- Apply, under supervision, their agricultural knowledge and skills in the day to
  day planning and operations on the farm.
- Practise safely, agriculture related skills and employ both good environmental practices
  and those associated with good animal health and welfare.
- Appraise, reflect and report on personal, professional and technical achievements.
- Communicate their activities and assessment of the farm enterprise in a professional
  manner.
learning_and_teaching_methods:
- Practical learning experience from a host farmer.
- Working and relating with other farm workers as well as the host farm family.
- Practical learning experience of health and safety on a farm.
- Maintain a daily diary.
