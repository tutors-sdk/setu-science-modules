reference: A13864
full_title: Audio Visual 1
short_title: Audio Visual 1
credits: 5
level: Introductory
author: ROCONNOR
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Media Production
aim: This module teaches the fundamentals of sound, music, sound recording and editing
  using timeline-based tools and introduces the basics of video production.
programmes:
- timetable: COMP-0642
  code: WD_KCOMP_B
  name: Bachelor of Science (Honours) in Applied Computing
  stage: 2
  semester: 3
  status: E
prerequisites: []
corequisites: []
indicative_content:
- Basic music theory
- 'Characteristics of sound: amplitude; frequency; timbre'
- Sound recording
- Digital Audio Workstations (DAWs)
- Delivery formats
- Basic video production
- Copyright
learning_outcomes:
- Interpret basic sheet music and translate printed sheet music to a digital format.
- Examine the qualities of sound and musical design as they are applied to digital
  media productions.
- Construct a simple but original musical composition, using designated music hardware
  and software packages.
- Produce and publish a media asset, which contain sequences of multi-layered audio
  with some simple visuals.
learning_and_teaching_methods:
- This module will be characterised by student participation in both formal theoretical
  and practical/studio classroom activities in which students learn theoretical concepts
  and apply them immediately using dedicated hardware and software.
- Studio classes will be delivered in two 2-hour blocks.
- Apple Mac computer lab with relevant hardware & software (kept up to date at least
  annually e.g. GarageBand, iMovie, Ableton Live).
- Accessible, professional sound proofed recording studios with professional microphones
  and audio workstations (Vibe FM studios).
- Stock AV Library subscription (e.g. AudioBlocks, VideoBlocks).
