reference: A08428
full_title: Agricultural Science Industrial Placement
short_title: Agri Sci Industrial Placement
credits: 30
level: Intermediate
author: SWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: This module will allow learners to apply and develop their skills in the agri-food
  industry. Students will be placed for work experience for a minimum of 15 weeks
  during semester two of third year. The industrial placement will be organised by
  WIT and monitored by the employer and WIT staff, with the student keeping a reflective
  work log. The placement is designed to meet the needs of industry, while providing
  the student with a broader skills-base. It is envisaged that the practical element
  of employment will complement the course content and help develop skills that are
  essential in today's work environment. The completion of a reflective work log will
  develop the student's ability to engage in reflective learning.
