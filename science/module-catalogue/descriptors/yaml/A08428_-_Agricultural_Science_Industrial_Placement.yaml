indicative_content:
- Industrial placement in an agri-food company for a minimum of 15 weeks, with exposure
  to a range of laboratory, processing and business activities
- Exposure to a range of laboratory techniques working to Standard Operating Procedures
  (SOPs) in a Good Laboratory Practice (GLP) context with the ability to carry out
  work following instructions, according to these SOPs
- Preparation of reports, both oral and written, on work carried out over the period
  of placement
- Maintenance of a work log of placement, critical evaluation and reflection on both
  the experience itself, as well as the professional development achieved
- Guidelines for the student, Institute and employers on the aims, objectives, and
  expectations of the module (learning agreement/guidelines).
learning_outcomes:
- Construct a professional CV and prepare for interview to secure placement.
- Appraise the aims, expectations and objectives of the employer, Institute and student
  to the successful completion of placement.
- Operate independently and/or as part of a team towards the set objectives of the
  industrial enterprise and relate effectively to co-workers and supervisors.
- Apply, under supervision, their acquired knowledge through application to practice
  and working in a regulatory environment.
- Practise safely, agri-food industry related skills and employ good environmental
  practices those associated with good laboratory practice.
- Appraise, reflect and report on personal, professional and technical achievements.
- Communicate their activities and assessment of the industrial enterprise in a professional
  manner.
learning_and_teaching_methods:
- Practical learning experience from industrial placement.
- Weekly log of activity.
- Working and relating with other co-workers and clients.
