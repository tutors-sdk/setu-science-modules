reference: A10025
full_title: Financial Management Systems
short_title: Financial Management Systems
credits: 5
level: Intermediate
author: LWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: To provide students with knowledge and practical skills to use financial information
  to manage working capital, evaluate an investment opportunity in financial terms,
  source finance and comply with obligations relating to Value Added Tax (VAT) in
  a small/medium enterprise (SME).
programmes:
- timetable: MGTS-0006
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 3
  semester: 6
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Introduction to finance: the finance function, role of financial management, insurable
  and uninsurable risks'
- 'Working capital: management of the elements of working capital (inventory, receivables,
  payables, cash)'
- 'Investment appraisal: discounting, Net Present Value (NPV), payback'
- 'Financing: factors affecting the availability of finance, main sources of finance
  available to an SME, gearing'
- 'VAT: how the VAT system operates, registration, records, returns'
learning_outcomes:
- Manage the elements of working capital in an SME.
- Determine an appropriate investment opportunity in financial terms.
- Determine the factors affecting sources of finance and describe appropriate finance
  options in an SME.
- Complete the basic requirements of the VAT system.
learning_and_teaching_methods:
- Lectures.
- Class and group discussions.
- Pre-lecture preparation of readings and exercises for in-class discussion.
- Self-study of assigned readings, exercises and texts.
