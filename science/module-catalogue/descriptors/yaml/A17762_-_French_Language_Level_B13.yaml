indicative_content:
- A compendium of language exercises and tasks from the prescribed textbook Savoir-faire
  - le francais a l'universite. G. Anjelvin.
- 'Contexts / themes that may be used to achieve the learning outcomes for this level
  may include the following:'
- a. Curriculum vitae
- b. Language learning
- c. Psychological description of people
- d. France in French cinema
- e. Environment and development
- f. Education and college education
- Complementary pronouns replacing things or ideas
- e. Present subjunctive - will, obligation, desire
- c. Conditional present
- b. Direct and indirect personal pronouns
- 'a. Expression of the past: perfect and imperfect'
- ':omgiostoc structures that will be covered at this level will include the following:
  Linguistic structures that will be covered at this level will include the following'
- DVD segments on various topics from the programme "Regards"
- Comphrehension using literary extracts
- d. Feminine adjectives
learning_outcomes:
- Oral Production
- The learner is expected to be able to:.
- enter unprepared into and maintain conversation on familiar topics, express personal
  opinions and greetings and exchange information on topics that are familiar, of
  personal interest or pertinent to everyday life e.g. family, hobbies, work, travel
  and current events;.
- give a prepared presentation on a familiar topic within his / her field which is
  clear enough to be followed without difficulty most of the time and in which the
  main points are explained with reasonable precision;.
- make his / her opinions and reactions understood as regards solutions to problems
  or practical questions of where to go, what to do, how to organise an event (e.g.
  an outing).
- Written Production
- The learner is expected to be able to:.
- write accounts of experiences, describing feelings and reactions in connected text;.
- write very brief reports to a standard conventionalised format which pass on routine
  factual information and state reasons for actions.
- Aural Reception (listening)
- The learner is expected to be able to:.
- follow much of what is said around him / her on general topics provided interlocutors
  avoid very idiomatic usage and articulate clearly;.
- follow a talk within his / her own field provided the subject matter is familiar
  and the presentation straightforward and clearly structured.
- Visual Reception (reading)
- The learner is expected to be able to:.
- identify the main themes in clearly signalled argumentative texts;.
- deduce the meaning of occasional unknown words from the context and grasp sentence
  meaning provided the topic discussed is familiar.
learning_and_teaching_methods:
- Interactive seminars will be the main teaching approach. A variety of media will
  be used in the teaching process (traditional print materials, audio and video material,
  CALL programmes and online language learning resources). The course will be characterised
  by a high level of student participation in both classroom activities and self-directed
  learning activities outside the classroom.
