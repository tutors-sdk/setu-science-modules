aim: 'Aim: The module aims to: give the student an understanding of the main points
  of clear standard input on familiar matters regularly encountered in work, school,
  leisure etc; enable the student to deal with most situations likely to arise whilst
  travelling in an area where the language is spoken; enable the student to produce
  connected, detailed texts on topics which are familiar or of personal interest;
  facilitate the student in developing the skills to describe experiences, dreams,
  hopes and ambitions and give reasons and explanations for opinions and plans. give
  the student the skills to obtain and analyse information about cultural beliefs,
  values and behaviour.'
