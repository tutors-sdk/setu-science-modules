assessment_criteria:
- '<40%: Little understanding of the basic protein chemistry and enzymology. Unable
  to carry out critical thinking or practical skills.'
- '40%-49%: Is able to understand basic protein chemistry and enzymology. May have
  some difficulty with critical thinking and problem solving.'
- '50%-59%: All of the above including a good understanding of theoretical protein
  chemistry and enzymology and demonstration of good practical skills.'
- '60%-69%: Show a high level of competence and efficiency in theoretical and practical
  protein chemistry and enzymology.'
- '70%-100%: All of the above to an excellent level. The ability to describe and discuss
  theoretical and practical protein chemistry, enzymology and show initiative.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
