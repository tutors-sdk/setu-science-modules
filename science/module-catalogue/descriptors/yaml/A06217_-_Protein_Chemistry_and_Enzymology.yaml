indicative_content:
- Primary, secondary, tertiary and quaternary structure of proteins
- Denaturation and precipitation of proteins
- Protein and enzyme extraction and purification methods
- 'Principles of enzyme catalysis: substrate specificity, chemical nature of enzyme
  catalysis, cofactors'
- Enzyme inhibition and clinical inhibitors
- 'Enzyme technology: industrial applications, immobilisation and biosensors'
learning_outcomes:
- Communicate the various levels of protein structure.
- Examine a variety of extraction and purification methods used for proteins/enzymes.
- Explore the catalytic principles and the biochemistry of enzyme action.
- Compare and contrast different types of enzyme inhibition and determine the importance
  of enzyme inhibitors in pharmacology and biochemistry.
- Analyse and interpret data obtained from experimental analysis of proteins and enzymes
  and communicate these effectively.
learning_and_teaching_methods:
- Lectures.
- Library work (self-directed study).
- Practical laboratory work.
- Student engagement will be enhanced through a blended teaching approach, combining
  on-line learning through interactive use of the Moodle virtual e-learning environment
  with lectures and in-class discussions.
