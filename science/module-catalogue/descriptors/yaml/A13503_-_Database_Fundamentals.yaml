indicative_content:
- Database Concepts
- Relational Model
- Conceptual Data Modelling
- Logical Data Modelling
- Normalisation
- SQL -- Data Definition and Data Manipulation
learning_outcomes:
- Analyse database terminologies, database structures and components.
- Appraise the elements of the Relational Model.
- Model and construct Entity Relationship (ER) diagrams for business scenarios.
- Transform an ER diagram into a set of relations, which are ready for database implementation.
- Transform unnormalised relations into a set of normalised relations through the
  rules of normalisation which adhere to relational data model principles.
- Construct Data Manipulation and Data Definition statements.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures, and/or tutorials, and
  computer-based practicals.
- The lectures will be used to introduce new topics and their related concepts. The
  student will be encouraged to manage their own learning by asking questions as well
  as being presented with problems similar to those presented in lectures.
- The practical element is fundamental. The aim is to provide the student with the
  skills and confidence to apply what has been demonstrated and learned.
