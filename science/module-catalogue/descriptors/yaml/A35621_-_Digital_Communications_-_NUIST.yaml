aim: Digital Communications builds on a theory typically covered in an undergraduate
  programme in basic modulation, propagation and signal recovery techniques over wireless,
  copper and optical media. The module deals with error detecting and correcting codes,
  multi-carrier systems, signal recovery in a digital system and optical communications
  from fundamentals to Wavelength Division Multiplexing (WDM).
