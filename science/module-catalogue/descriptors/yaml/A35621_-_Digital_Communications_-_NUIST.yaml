indicative_content:
- 'Signal recovery: digital filtering with adaptive equalisation'
- Error detection (cyclic codes) and error correcting codes using linear block codes
- Orthogonal multi-carrier communications over wireless and copper media
- Optical Communications (components, budgetting, Wavelength Division Multiplexing
  operation and impact of non-linear behaviourering, Four wave mixing and Cross Phase
  Modulation)
learning_outcomes:
- Contrast the different approaches to and successes of, both in theory and pracice,
  error detecting and correcting codes.
- Analyse the performance defining parameters of orthogonal, multi-carrier communications
  and how these can be effected under various scenarios.
- Assess the merits and operation in practice of optical communications, defining
  the key relevant parameters and their relationships.
- Examine and critique the theory and practical techniques in adaptive digital filtering.
- Demonstrate a practical ability to develop, troubleshoot, test, analyse and report
  on Digital Communications.
