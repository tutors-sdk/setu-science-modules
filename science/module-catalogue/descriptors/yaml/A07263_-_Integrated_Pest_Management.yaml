indicative_content:
- Forecasting and economic thresholds
- Decision support systems for pest management
- Pest monitoring using on-site monitors (e.g. splashometers re disease spores), diagnostic
  kits (e.g. immunoassay), pheromone traps
- Resistant crop varieties/cultivars, mixed cultivars, transgenic crops
- Cultural control (rotation, mechanical, undersowing, cover crops, GM)
- Biological control (beneficial predators, microbes Bt)
- Reduced and targeted use of selective pesticides
learning_outcomes:
- Evaluate the contribution that IPM currently makes in the management of pests, and
  how this contribution could be extended further.
- Critique the ecology of crop-pest relationships and infer how a multidisciplinary
  approach can be taken to pest management.
- Recommend what IPM measures are appropriate to use in particular pest situations.
- Assemble and assess data relevant to pest management.
- Design an integrated approach to dealing with a selected crop-pest scenario.
