assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills.'
- '40%-49%: Will be able to show a good knowledge of the key learning outcomes, including
  the contribution that IPM makes in the management of pests. The student will be
  able to write and present a case study.'
- '50%-59%: As well as the above, the student will be able to demonstrate a good understanding
  of crop-pest relationships and a multidisciplinary approach to pest management.
  The student will be able to write and present a quality case study.'
- '60%-69%: In addition, the student will demonstrate more detailed knowledge of all
  the topics, including how to determine what IPM measures to use in particular situations.
  The student will also be able to write and present a good quality case study.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of all learning outcomes, including the role of pest management and be able to write
  and present a high quality case study.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
