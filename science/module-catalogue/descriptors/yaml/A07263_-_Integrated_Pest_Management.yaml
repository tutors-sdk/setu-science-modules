aim: The module is designed for students who have a basic knowledge of agricultural
  or horticultural cropping systems or silviculture. It takes a multidisciplinary
  approach to crop-pest relationships in agriculture, horticulture and forestry, with
  examples and case studies drawn from all three disciplines. The students will carry
  out a case study on some aspect of IPM based on a literature search. Students who
  wish to be added to the Department of Agriculture SUD database need to select this
  elective and complete a shadowing exercise upon completion of their studies.
