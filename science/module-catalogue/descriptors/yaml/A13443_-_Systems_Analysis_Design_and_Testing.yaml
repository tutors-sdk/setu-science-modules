indicative_content:
- The Development Process
- Roles involved in the development process
- Planning & Requirements
- Analysis & Design
- Testing
- Implementation
- Post Implementation
learning_outcomes:
- Identify systems development stages and the roles of the personnel involved.
- Describe the requirements for the proposed system.
- Identify the feasibility of the proposed system.
- Model the proposed system requirements.
- Identify appropriate testing techniques for a system.
- Define the steps involved in migrating to the proposed system.
- Describe all areas of maintenance/user support functions.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and a computer-based
  practical.
- The lectures will be used to introduce new topics and their related concepts. The
  student will be encouraged to manage their own.
- Learning by asking questions and entering class discussions.
- In practical classes the student will be presented with problems similar to those
  presented in lectures. The aim of the practicals is to provide the student with
  the skills and confidence to apply what has been demonstrated and learned.
