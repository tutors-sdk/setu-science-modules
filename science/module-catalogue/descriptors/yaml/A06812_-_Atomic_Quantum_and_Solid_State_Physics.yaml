indicative_content:
- 'Introduction to wave mechanics: the wave function and Schrodinger''s equation;
  separation of variables; time-independent equation'
- Application of Schrodinger's equation to infinite and finite square well potentials
- Scattering and tunnelling
- Probability densities, expectation values and uncertainty; Heisenberg's uncertainty
  principle
- The hydrogen atom, the quantum numbers, electron wave functions and probability
  densities; the periodic table
- 'Electrons in metals: the QM free electron model, the Fermi-Dirac distribution function
  and the density of states function'
- 'The band theory of solids: the Kronig-Penney model, the tight-binding approximation'
- Band structure of metals, insulators and semiconductors
- Diamagnetism, ferromagnetism, paramagnetism and electron paramagnetic resonance
- 'Simulations: Schrodinger''s equation, eigenvalues and eigenfunctions in the lattice'
learning_outcomes:
- Apply Schrodinger's equation to a series of well-defined potential fields generating
  solutions for the wave function.
- Use his/her knowledge of the wave function to ascertain important properties of
  the system such as energy, probability of location, expectation values.
- Apply Schrodinger's equation to the hydrogen atom obtaining solutions incorporating
  the appropriate quantum numbers.
- Apply quantum mechanics to electrons in atoms, metals and the crystal lattice.
- Use simulation methodologies in the investigation and analysis of atomic and solid
  state phenomena.
