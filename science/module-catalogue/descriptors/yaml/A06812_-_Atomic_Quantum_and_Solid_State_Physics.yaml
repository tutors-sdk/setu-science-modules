reference: A06812
full_title: Atomic, Quantum and Solid State Physics
short_title: Atomic, Quantum & Solid State
credits: 5
level: Intermediate
author: GGALLAGHER
history_comment: ''
school: Science and Computing
department: Science
cluster: Mathematics and Physics
aim: In this module the student meets formal quantum mechanics for the first time.
  Schrodinger's equation is introduced and applied to a range of situations, from
  the hydrogen atom to the crystal lattice, and the solutions are interrogated to
  provide information on a range of observables. The module concludes with an introduction
  to the quantum theory of magnetism.
