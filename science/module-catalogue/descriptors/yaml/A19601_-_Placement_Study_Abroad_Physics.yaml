indicative_content:
- Students will be required to attend classes in the host institute and undertake
  all assignments and examinations required. The credits earned will count up to a
  minimum of 20 ECTS for the semester.
- At least 20 credits must be earned from subjects on a physics degree (or a related
  discipline) and must form part of a learning agreement between the host university,
  the student and WIT's Department of Science.
- Students will be required to complete a placement portfolio which will contain a
  set of reflective journals, detailing their study experience and outlining their
  personal and professional understanding, learning and growth.
learning_outcomes:
- Complete intermediate level (or higher) subjects amounting to 20 ECTS credits (or
  equivalent) as per a learning agreement in the host university/college.
- Develop cross-cultural communication skills, possibly including second language
  skills.
- Demonstrate an ability to study in a foreign country.
- Complete weekly reflective logs to document their learning experiences, which will
  amount to 10 ECTS credits.
learning_and_teaching_methods:
- Lectures, tutorials, group work and assignments in host university
- Study abroad preparatory meetings
- Review with study abroad co-ordinator
