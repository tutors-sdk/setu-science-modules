indicative_content:
- The student will receive pre-departure support in preparing for a successful study
  abroad semester.
- The student will prepare a learning agreement detailing the modules of study (minimum
  20 ECTS) chosen to be relevant to the student's programme and agreed with the Study
  Abroad Co-ordinator before departure. The student may elect, subject to approval
  in the learning agreement, to take more than the minimum 20 ECTS in modules at the
  host institute. Language and/or culture studies may form part of the Study Abroad
  learning agreement where appropriate.
- Students will be required to attend classes in the host institute and undertake
  all assignments and examinations required. Credits earned will be worth up to a
  minimum of 20 ECTS for the semester.
- Up to a further 10 ECTS will be awarded for the completion of a study abroad portfolio
  containing a set of reflective journals detailing the international study experience
  and outlining personal and professional understanding, learning and growth. Documented
  evidence of language learning and/or a presentation summarising the student's experience
  may also form part of the portfolio. The maximum ECTS awarded to this module will
  be 30 ECTS.
learning_outcomes:
- Demonstrate competency in the modules undertaken in the host institute as per the
  learning agreement amounting to at least 20 ECTS credits (or equivalent).
- Develop cross-cultural communication skills, potentially including second language
  skills.
- Demonstrate an ability to reflect critically on the independent learning and self-management
  that studying abroad requires.
- Compose a study abroad portfolio consisting of a set of reflective journals, detailing
  their study experience, and outlining their personal and professional understanding,
  learning and growth. A presentation summarising the student's experience may also
  form part of the portfolio.
learning_and_teaching_methods:
- The range and variety of teaching and learning methods will depend on the modules
  studied at the partner institution. However, it is expected to consist of lectures,
  practical classes, group work, assignments, and examinations.
- In addition to study and assessment at the partner institution, a reflective log
  or journal of learning and cultural experiences and/or presentation (portfolio)
  will be submitted to the SETU Study Abroad Co-ordinator for assessment on completion
  of the study abroad period.
