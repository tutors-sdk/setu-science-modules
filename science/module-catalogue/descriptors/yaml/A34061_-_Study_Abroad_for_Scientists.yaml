aim: The Study Abroad module is offered to students to strengthen their studies through
  experiencing learning in an international environment. This module will enable the
  student to benefit from studying and living abroad by developing intercultural awareness
  and competence through reflection on the experience, enhancing personal development
  and allowing scope to transfer the knowledge and skills acquired to both academic
  and future work. It will allow expansion of the student s programme-specific knowledge
  and understanding, and awareness of operating in an international context. Where
  appropriate, this module will enhance the student s language skills and aid the
  student in developing strategies for more effective language learning.
