indicative_content:
- Normal and abnormal physiological function of different systems in farm animals
- Pathologies of economically important diseases
- Animal welfare and behaviour
- Health management
- Biosecurity assessment of a site
- Economic implications of diseases at a farm and national level
learning_outcomes:
- Appraise and abnormal physiological status of various systems in farm animals.
- Evaluate and discuss important concepts of animal welfare and behaviour.
- Evaluate current and evolving herd health issues.
- Assess the various disease diagnostics techniques available.
- Assess herd health status and management practices and recommend effective disease
  prevention and control measures.
- Evaluate the development of mastitis, SCC and benefits of Cellcheck -- the national
  mastitis control programme.
- Evaluate the development of lameness and usefulness of locomotion scoring and hoof
  scoring as a management tool.
- Prepare a report on a specified herd health issue.
