reference: A07889
full_title: Animal Health, Welfare and Behaviour
short_title: Animal Health, Welfare & Behav
credits: 5
level: Advanced
author: SWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: The aim of this module is to provide students with an in-depth understanding
  of different physiological systems in the body. Students will learn about dysfunctions
  in these systems and how they relate to animal and herd health. Additionally, students
  will have an appreciation of the pathogenesis of economically important diseases,
  and the role of Animal Health Ireland in the control/eradication of disease. They
  will also have the ability to implement effective disease prevention and control
  measures. Students will also have an appreciation of the fundamentals of animal
  welfare and behaviour.
