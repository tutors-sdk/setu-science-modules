indicative_content:
- 'Business plans: purpose of business plan, difference between business plan and
  feasibility study, business plan tests, structure and content'
- 'Forms of business ownership: sole trader, partnership, company'
- 'Working capital: management of the elements of working capital in a small business
  (inventory, receivables, payables, cash)'
- 'Budgeting: budget process, conflicting roles of budgeting, preparation and monitoring
  of cash budgets'
- 'Decision making: cost-volume-profit (single and multi-product break-even, target
  profit, margin of safety)'
- 'Decision making: pricing (price taker/setter, pricing policies)'
- 'Decision making: sourcing finance (sources, factors influencing types and sources
  of finance)'
learning_outcomes:
- Differentiate the required elements of a business plan.
- Distinguish between forms of business ownership.
- Manage the elements of the working capital in a small business.
- Employ the budgetary process and prepare and monitor a cash budget in a small business.
- Use cost-volume-profit analysis, evaluate pricing options and determine appropriate
  sources of finance for a small business.
learning_and_teaching_methods:
- Lectures.
- Class and group discussions.
- Pre-lecture preparation of readings and exercises for in-class participation.
- Self-study of assigned readings, exercises and texts.
