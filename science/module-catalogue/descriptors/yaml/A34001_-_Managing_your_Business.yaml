reference: A34001
full_title: Managing your Business
short_title: Managing your Business
credits: 5
level: Intermediate
author: MWAGENAAR
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: This module will provide students with knowledge and practical skills to prepare
  a business plan, distinguish between forms of business ownership, and use financial
  information for managing working capital, budgeting and decision making (cost-volume-profit,
  pricing decisions, sourcing finance) in a small business context.
