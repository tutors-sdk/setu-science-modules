assessment_criteria:
- '<40%: Inadequate achievement of the learning outcomes.'
- '40%-49%: Will be able to show a basic level of achievement in relation to the key
  learning outcomes. Relatively poor analytical and communication skills.'
- '50%-59%: Reasonable achievement of learning outcomes. Good analytical and communication
  skills.'
- '60%-69%: In addition, the student will demonstrate more detailed achievements of
  project goals including demonstrating an ability to evaluate knowledge acquired.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of all learning outcomes, predict general trends in behaviour including exceptional
  behaviour, and critically evaluate and relate topics.'
