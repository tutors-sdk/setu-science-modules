indicative_content:
- 'Projects will be based on areas such as: developing and validating analytical procedures,
  environmental analysis, cell culture technology, molecular biology, microbiology,
  enzymology, applied immunology, computational biology and bioinformatics.'
learning_outcomes:
- Plan, organize and carry out a research project.
- Formulate and test hypotheses.
- Select advanced scientific skills to generate and analyse data and diagnose and
  troubleshoot technical problems.
- Develop a personal work plan and accept responsibility for own work.
- Develop independent thinking and scientific critical judgement to make effective
  decisions, including a critical reflection of the project in the context of green
  practices and institute, national and global sustainability initiatives.
- Formulate effective communicate skills to disseminate scientific information in
  a variety of forms including oral presentation.
- Construct a properly referenced report of the project by sourcing, interpreting
  and applying appropriate and referenced literature.
learning_and_teaching_methods:
- Project work - practical laboratory and online based.
- Workshop on green and sustainable practices in research
