indicative_content:
- 'Brief introduction to birth and history of Artificial intelligence, as well as
  essential concepts and methods:'
- 1. Search methods (deep first Search, broad first search, uniform cost search, greedy
  search, A* search, graph search)
- 2. Supervised learning (Linear/logistic regression and classification)
- 3. Unsupervised learning (clustering and dimensionality reduction)
- 4. Reinforcement learning (Q-learning)
- 5. Introduction to genetic algorithms and deep learning
- 6. Data preprocessing
learning_outcomes:
- Understand what constitutes ``Artificial'' Intelligence and how to identify systems
  with Artificial Intelligence.
- Understand the limitations of current Artificial Intelligence techniques.
- Familiarity with Artificial Intelligence techniques, such as Searching, Neural Networks,
  and Machine Learning.
- Recognize how Artificial Intelligence enables capabilities that are beyond conventional
  technology, for example, prediction and classification, self-driving cars, and robotics.
- Ability to apply Artificial Intelligence methods and engineering techniques for
  solving narrowly defined problems.
learning_and_teaching_methods:
- This module will be teaching through a variety of ways, including direct instructions,
  discussions, and case-based practical studies.
- The topics of Artificial Intelligence and their related concepts will be introduced
  and explained by instructors in the direct instructions.
- Students in this module are required to engage in discussions and class exercises,
  thereby enhancing their participation.
- The case-based practical studies implemented in this module will assist students
  in gaining problem-based skills that result in significant improvement in their
  critical thinking and active participation in the learning process
- Self-directed learning will also be encouraged throughout the duration of the module.
