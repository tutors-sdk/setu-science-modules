reference: A35728
full_title: Introduction to Artificial Intelligence
short_title: Intro to AI
credits: 5
level: Introductory
author: ADAVY
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Mathematics and Physics
aim: This Module is an introductory Module, which focuses on inspiring students' interest
  in artificial intelligence. It lays the foundation for students' follow-up study
  of machine learning, neural network and deep learning, computer vision and pattern
  recognition, game theory, and application. Through the study of this Module, students
  will be introduced to the fundamental theories and techniques used in the field
  of Artificial Intelligence, including searching, knowledge representation, machine
  learning, and so on. By the end of this course, students will have clear ideas of
  AI, and some of the major developments of AI of today, and be able to make use of
  available development tools to explore some areas of application such as iris flowers
  classification, handwritten digits recognition, and so on.
