assessment_criteria:
- '<40%: Inability to express any knowledge/concepts of Artificial Intelligence. Inability
  to attend to any discussion. Inability to produce an algorithm to solve a simple
  problem.'
- '40-49%: Understand basic concepts of certain topics of Artificial Intelligence
  and able to explain them in their own words. Can recognize search, regression, classification
  and clustering type of problems.'
- '50-59%: Be able to identify potentially applicable Artificial Intelligence techniques
  for solving problems. Can develop modeling and make theoretical analysis.'
- '60-69%: All the above and in addition, can explain the differences between different
  learning methods and make use of their performance measurement metrics.'
- '70-100%: All previous to an excellent level.'
