indicative_content:
- Physical chemistry of structured surfactant systems, including micelles, emulsions,
  microemulsions, gels, foams and aerosols
- 'Polymer science: molecular weight averages, polymer synthesis, polymer characterisation
  techniques, properties, industrial, pharmaceutical and biomedical applications of
  polymers'
- 'Quantum mechanics: early quantum mechanical observations, photoelectric effect,
  particle/wave duality, DeBroglie''s hypothesis, Young''s double slit for electrons
  and waves. Heisenberg uncertainty principle. Postulates of quantum mechanics, observables
  and operators. Bohr atom, Schrodinger equation, wavefunctions and eigenfunctions,
  energy quantisation, expectation values; QM solutions of particle in a box, barrier
  penetration, harmonic oscillator, hydrogen atom'
- Modes of heat transfer and associated problems; detailed treatment of thermodynamics;
  four Laws of Thermodynamics; third law and absolute entropy; heat machines, Carnot
  cycle and its relevance
learning_outcomes:
- Determine the importance and use of surfactants, have an in depth knowledge of interfacial
  chemistry as well as related structures and processes.
- Assess methods for polymer synthesis, relate physical and chemical properties of
  polymer to synthesis route and applications, characterize polymers. Discuss the
  use of polymers in pharmaceutical science.
- Solve problems and write derivations based upon the laws of thermodynamics.
- Distinguish between the three modes of heat transfer and solve associated problems.
- Evaluate the important experiments and the Bohr model of the atom that led to the
  development of quantum physics.
- Solve basic eigenvalue equations and quantum mechanical problems based on the Schrodinger
  equation for simple potentials, state the Heisenberg uncertainty principle and discuss
  the ramifications of it.
