aim: This module covers a range of advanced topics in physical chemistry, including
  interfacial chemistry and polymer science. The quantum mechanics component involves
  an analysis of the mechanics behind standard physical chemistry problems. Heat transfer
  and thermodynamics concepts covered include modes of heat transfer, laws of thermodynamics,
  internal energy, heat, work, PV diagrams, enthalpy, entropy, Gibbs free energy and
  the Carnot Cycle.
