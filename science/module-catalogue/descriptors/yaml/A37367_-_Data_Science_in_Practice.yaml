indicative_content:
- Theory of advanced data mining methods
- Use of advanced data mining methods in the context of business analytics
- 'Data mining algorithms: Association Rules; Classification; Clustering;'
- Implementation, evaluation and interpretation of results using advanced data mining
  techniques
- Fundamental of the analysis of unstructured data
- Introduction to Text and Web mining techniques
learning_outcomes:
- Prepare results from an advanced analytics project using an appropriate Data Mining
  process.
- Choose and apply appropriate data mining methods to a data set.
- Evaluate results from data mining conducted on a data set.
- Evaluate and determine appropriate advanced data mining techniques.
- Appraise the use of analytics on unstructured data in relation to text and web mining.
learning_and_teaching_methods:
- Lectures will introduce the fundamentals and concepts in the area. Labs will implement
  those concepts using data sets.
- In the labs, the student will prepare the data, perform analysis, evaluate the results
  and report on the findings.
- In the continuous assessment the student will apply what they have learned in the
  labs and lectures to a new data set within a business context.
