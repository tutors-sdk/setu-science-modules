aim: The module aims to develop the learner's competence in the application of modern
  techniques of data analysis in the context of analytical method development. The
  learner will be enabled to apply statistical analysis processes to data sets and
  interpret the results in order to quantify data quality and compare data sets. These
  data sets will deal with real world applications from the pharmaceutical and food
  industries. The learner will also develop competence in a range of process control
  tools and minimisation strategies. Continuous improvement and data-driven decisions
  will also be emphasised throughout the course of the programme.
