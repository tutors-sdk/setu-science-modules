indicative_content:
- 'Descriptive statistics: graphical methods of display, measures of centre and spread'
- 'Precision and error measurement: relative and fixed bias, random errors, propagation
  of errors and accuracy, comparing and combining standard deviations and means of
  data sets, limit of detection'
- 'Sampling distributions: point estimation, sampling from continuous and discrete
  distributions'
- 'Statistical inference: inference for single, two or more samples'
- Analysis of data through case studies in `real world' applications in the pharmaceutical
  and food industries
- 'Statistical process control: multivariate statistical process control, process
  monitoring and control strategies, process capability indices in statistics, Shewhart
  control charts, CUSUM charts, moving average and moving range charts'
- Sampling plans and the statistical analysis of the quality of batches
learning_outcomes:
- Assess analytical data using appropriate descriptive statistics tests.
- Assess data sets based on applied inter-comparison significance tests.
- Assess analytical data using statistical software packages.
- Assemble and integrate process capability indices as a statistical measure of process
  capability.
- Justify the usefulness of Shewhart control charts, CUSUM charts and other control
  charts to control a process.
- Evaluate sampling plans and statistical analysis of quality in product batches.
