indicative_content:
- Formulating a project proposal
- Understanding and writing specifications
- Planning actions, time management, book logging
- Conducting research for knowledge development on project theme
- Applying new acquired knowledge and existing knowledge to unfamiliar problems
- Designing appropriate solutions
- Developing communication skills (writing and presentation skills)
learning_outcomes:
- Specify a project proposal taking into account factors such as project requirements,
  ergonomics, safety, ethics, and relevant standards.
- Develop realistic goals,based on available resources & difficulty of tasks for the
  milestones required to complete a project.
- Formulate solutions to problems by assessing alternative solutions and presenting
  design decisions.
- Apply technical knowledge to unfamiliar problems having identified knowledge gaps,
  searched published sources of information and having due regard to plagiarism.
- Communicate in an effective manner, by presenting the project theme/specification
  in an interactive Q & A setting.
learning_and_teaching_methods:
- Library and web based research
- Interaction with project supervisors and lecturing staff for guidelines
- Independent work
- Interaction with peers
