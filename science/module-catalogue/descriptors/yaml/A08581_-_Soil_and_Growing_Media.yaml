cluster: Horticulture
aim: This module is designed to equip students with a basic knowledge of soils including
  soil formation, composition and properties. Students will also learn about the macronutrients
  and micronutrients involved in plant nutrition. The student will learn how to carry
  out soil sampling and a range of soil analyses. The student will carry out an analysis
  of a selected soil.
