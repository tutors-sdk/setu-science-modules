assessment_criteria:
- '<40%: Unable to outline key concepts. Cannot perform basic soil analysis.'
- '40%-49%: Basic knowledge of the key learning outcomes including soil formation,
  composition and properties. Can perform basic soil analysis.'
- '50%-59%: As well as the above, demonstrates an understanding of some of the complexities
  of soil management.'
- '60%-69%: In addition to the above, the student demonstrates a more detailed knowledge
  of soil management and a high level of competence in the area.'
- '70%-100%: All of the above to an excellent level. Advanced knowledge of the topic
  is supported by superior skills.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
