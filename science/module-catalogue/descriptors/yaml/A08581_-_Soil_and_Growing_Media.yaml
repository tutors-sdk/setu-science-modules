indicative_content:
- Soil formation, composition and classification
- Physical, chemical and biological properties of soils and growing media
- Plant nutrition
- Soil sampling and analysis
learning_outcomes:
- Describe the processes involved in the formation of soil.
- Describe the physical, chemical and biological properties of soils and growing media
  and the classification of soils.
- Discuss the role in plants and sources of macronutrients and micronutrients.
- Discuss a range of alternative growing media.
- Interpret a soil report and determine fertiliser requirements.
- Use a range of laboratory techniques to characterise soils and growing media.
