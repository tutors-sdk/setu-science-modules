indicative_content:
- Structured programming to address 3D modelling, animation and customization practice
- Animation techniques for Motion Capture, Facial Animation and Lip Synching
- 3D animation production asset management
- Visual effects (VFX) - incorporate physics elements into animation production
- 'Integration of 3D Animated assets across multiple media sectors: TV, Gaming, Engineering
  and Corporate'
learning_outcomes:
- Appraise key facial rigging techniques.
- Evaluate and apply motion capture techniques for CGI use.
- Assess the practical principles of VFX integration with animated CGI scenes.
- Evaluate the principles and practice of automated modelling, animation and customized
  techniques using scripting and computational expressions.
- Critique the principles of asset, environment and timeline management for 3d animation
  transmedia projects.
