indicative_content:
- Introduction to Computer Networks and Protocols
- OSI and TCP/IP models
- IPv4 Addressing and subnetting
- IPv6
- Transport Layer Protocols and Functionality
- Application Layer Protocols and Functionality
- Multimedia Protocols
- Quality of Service (QoS)
- Resource Management
learning_outcomes:
- Use network protocol models and tools to explain communications in data networks.
- Examine in detail the major components, operation and functionality of a computer
  network and commonly used protocols and services.
- Examine the technologies used for streaming multimedia over the Internet.
- Design, calculate and apply subnet masks and addresses.
- Build a simple network using routers and switches.
- Examine issues related to the configuration and management of resources required
  in multimedia environments.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures.
- The continuous assessment will require the student to apply the theory and practical
  knowledge to a business solution.
