reference: A11530
full_title: Applied Mathematics for Scientists
short_title: Applied Maths for Scientists
credits: 5
level: Introductory
author: FLEONARD
history_comment: ''
school: Science and Computing
department: Science
cluster: Mathematics and Physics
aim: This module looks at modelling a range of scientific phenomena using differential
  equations such as population growth, bacterial destruction, heat transfer, drug
  diffusion, viral propagation, radioactive decay, kinematics, etc. An introduction
  to partial differentiation is provided, with applications to optimisation. Multiple
  integrals are presented and are applied to the evaluation of volumes.
