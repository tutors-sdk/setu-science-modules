assessment_criteria:
- '<40%: Unable to do multiple variable calculus or manipulate differential equations.'
- '40%-49%: Able to do basic multiple variable calculus and manipulate simple differential
  equations.'
- '50%-59%: Able to solve a variety of multiple variable calculus problems and manipulate
  a range of differential equations.'
- '60%-69%: Able to tackle a comprehensive range of theoretical and applied problems
  in multiple variable calculus and in differential equations.'
- '70%-100%: As above and have an authoritative understanding of the methods and applications
  of multiple variable calculus and in differential equations.'
