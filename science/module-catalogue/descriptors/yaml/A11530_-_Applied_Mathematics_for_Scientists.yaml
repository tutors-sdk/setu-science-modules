indicative_content:
- 'Calculus of several variables (differential and integral): find and classify stationary
  points on a surface; applied optimisation problems; evaluate multiple integrals'
- 'Differential equations: modelling dynamical systems; developing differential equations;
  various methods for solving differential equations'
- 'Plots: plotting the solution to a differential equation'
learning_outcomes:
- Calculate and apply partial derivatives to optimisation problems.
- Calculate multiple integrals.
- Employ various techniques to solve differential equations.
- Construct a plot of a solution to a differential equation.
