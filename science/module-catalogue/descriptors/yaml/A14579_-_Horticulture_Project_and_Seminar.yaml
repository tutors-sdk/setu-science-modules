indicative_content:
- 'The scientific method(s): generating and using null and alternative hypotheses;
  examining what is a researchable question'
- 'Working effectively as part of a team: what to expect from your peers, from your
  supervisor, and methods to overcome motivational challenges within a team'
- 'Structuring a research project: deciding number of replicates, random block design
  generation, positive and negative controls, working titles, project outline, and
  timing'
- 'Collecting and interpreting data: designing and administering questionnaires, planning
  and conducting interviews, using internet-based facilities to share group data,
  and pitfalls to avoid when interpreting data'
- 'Presenting results: graphical and tabular presentation of data, and explanation
  of data quality using standard deviation and standard error'
- 'Designing scientific posters: generating impactful, clear and attractive poster
  presentations'
- 'Presentation skills: examining the effective use of narrative-based presentation
  of scientific data; methods of overcoming performance anxiety and building resilience'
- 'Writing reports: getting started, structuring, and revising written reports, guarding
  against plagiarism and evaluating the written report'
learning_outcomes:
- Formulate a horticulture-related hypothesis using the scientific method.
- Set up a horticultural experiment and collect data as part of a team.
- Prepare a report outlining methods, results and significance of the outcomes of
  a horticulture-related study.
- Design, and present a poster presentation as part of a team on a body of research.
- Appraise the methods used and data collected during the course of a horticulture-related
  study.
- Establish the limitations and opportunities for improvement within a horticulture-related
  study.
