aim: This module provides the opportunity to collect, analyse and present horticulture-related
  data obtained from a group project. Projects and groups will be assigned to students.
  Projects may involve growth experiments, surveys of societal or consumer attitudes
  or inclinations, or may be design oriented. Projects will be implemented by the
  group and written up individually. Groups will then work together at the end of
  the semester to present their findings in a poster seminar.
