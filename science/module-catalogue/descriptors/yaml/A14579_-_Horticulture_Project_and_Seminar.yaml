assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter. Lacking in
  technical ability/skill and understanding to work effectively as a researcher. Functions
  poorly as a member of a team.'
- '40%-49%: Demonstrates a limited knowledge of scientific method(s) and experiment
  design and implementation. Shows some technical ability/skill in carrying out and
  reporting on practical tasks. Limited function as a member of a team.'
- '50%-59%: Demonstrates satisfactory general knowledge of scientific method(s) and
  experiment design and implementation. Logically and competently carries out practical
  tasks. Works well as a member of the team and is often one of the first to show
  initiative in a group.'
- '60%-69%: Demonstrates sound knowledge of experiment design and implementation of
  experiments according to scientific methods. Practicals and reports completed to
  high standard. Works effectively as a team member and shows continued initiative
  within a working group.'
- '70%-100%: Demonstrates excellent technical ability, awareness, and aptitude for
  working as a researcher. Delivers insightful scientific writing and presents data
  with impact. Develops high competency in data analysis and shows leadership qualities
  during group work.'
