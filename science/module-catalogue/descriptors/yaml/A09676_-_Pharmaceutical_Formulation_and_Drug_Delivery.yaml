aim: The module will cover the main technologies related to finished product pharmaceutical
  formulation and manufacture. Strategies for formulation will be included. Students
  will carry out an integrated set of experiments from preparation, through formulation,
  to production and analysis of pharmaceutical products. Work will include formulation,
  blending, compression, physical testing and analysis.
