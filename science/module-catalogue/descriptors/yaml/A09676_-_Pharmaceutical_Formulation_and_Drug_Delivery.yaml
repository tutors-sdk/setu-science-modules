indicative_content:
- 'Review of pharmaceutical dosage forms: tablets, capsules, injectables, aerosols,
  creams, ointments and emulsions, suspensions and solutions'
- 'Overview of pharmaceutical development pathway: pre-clinical, clinical and pharmaceutical'
- 'Development pharmaceutics: pre-formulation studies purpose and implementation,
  role of excipients; drug properties: physical, chemical, powder flow determination
  and factors affecting powder flow, polymorphism'
- 'Aerosols: formulation, excipients used, pressurised spraying devices'
- 'Transdermal delivery systems (TDSS): types of TDDS (single layer, multilayer, matrix
  system), functions of excipients used, compatibility studies, adhesion; dissolution
  testing required, uniformity/dissolution testing'
- Development, manufacture and testing of pharmaceutical products; unit processes
  in formulation including mixing, blending and granulation, tabletting
- 'Types of modified release oral dosage forms, disintegrating and non-disintegrating
  types: manufacture and testing, dissolution testing/bioavailability'
- 'Stability testing of a product: long-term testing, accelerated testing, maintenance
  of its properties throughout the shelf life; assignment of a shelf life; testing
  to ICH guidelines'
- Development and manufacture of pharmaceutical suspensions
learning_outcomes:
- Appraise the principles of pharmaceutical development, manufacture for a range of
  dosage forms including solid dose, suspensions semi-solids and aerosols.
- Prepare a protocol for the development pharmaceutics of a finished dosage form,
  based upon the properties of the active pharmaceutical ingredient and the required
  bioavailablity.
- Propose and justify a simple formulation and method of manufacture demonstrating
  a firm understanding of the principle of formulation.
- Appraise the development and manufacture of immediate and modified release products
  oral dosage forms, suspensions, aerosols and the rationale for their use.
- Prepare and implement a protocol for the stability testing of a pharmaceutical product,
  utilising a reduced testing regiment where appropriate.
