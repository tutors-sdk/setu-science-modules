assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of pharmaceutical
  formulation and drug delivery. Lack of competence with regard to associated laboratory
  skills, practices and instrumentation.'
- '40%-49%: Will be able to show limited understanding of the fundamentals of pharmaceutical
  formulation and drug delivery. Will display some ability with regard to associated
  laboratory skills, practices and instrumentation.'
- '50%-59%: As well as the above, the student will be to show reasonable understanding
  of the fundamentals of pharmaceutical formulation and drug delivery. Will display
  reasonable competence with regard to associated laboratory skills, practices and
  instrumentation.'
- '60%-69%: In addition, the student will demonstrate more detailed knowledge of pharmaceutical
  formulation and drug delivery and show ability to analyse problems in this area.
  Will display very good competence with regard to associated laboratory skills, practices
  and instrumentation.'
- '70%-100%: All previous to an excellent level. In addition, the learner will be
  able to demonstrate comprehensive knowledge and understanding of pharmaceutical
  formulation and drug delivery, excellent reasoning skills and well thought out arguments.
  The learner will also display advanced competence and independence with regard to
  associated laboratory skills, practices and instrumentation.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
