  stage: 1
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Pharmaceutical dosage forms solid oral dosage forms and disperse systems
- 'Excipient types and functions: material properties'
- Pre-formulation studies
- 'Formulation development: solid dosage forms; propose and assess simple formulations'
- 'Finished dosage form testing: dissolution profiles'
- Stability testing
- Effects of particle size of blending and dissolution
- Suspensions formulation and testing
learning_outcomes:
- Classify the properties and uses of common pharmaceutical excipients.
- Propose a protocol for a pre-formulation study on an API in advance of formulation
  trials for a range of dosage forms.
- Apply the principles of preformulation to simple mixtures to produce formulations.
- Construct a protocol for the stability testing of a pharmaceutical product.
- Demonstrate the operation and uses of dissolution apparatus and techniques and complete
  a dissolution test to determine drug release.
- Propose a formulation for both a stable suspension and solid oral dosage forms with
  appropriate choice of excipients.
- Plan appropriate specifications for the control of the quality of the dosage forms
  studied.
