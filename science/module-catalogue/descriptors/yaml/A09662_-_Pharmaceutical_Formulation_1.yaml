reference: A09662
full_title: Pharmaceutical Formulation 1
short_title: Pharmaceutical Formulation 1
credits: 10
level: Intermediate
author: ADONEGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Pharmaceutical Science
aim: This module will cover the main technologies related to finished product pharmaceutical
  formulation. Strategies for formulation of solid oral dosage forms and disperse
  systems will be discussed, and students will carry out an integrated set of experiments
  thereon.
programmes:
- timetable: PHAR-0003
  code: WD_SGMPT_D
