reference: A06805
full_title: Mathematics for Forestry
short_title: Mathematics for Forestry
credits: 5
level: Introductory
author: ADALYWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Mathematics and Physics
aim: This is an introductory course in mathematics for foresters. It is assumed that
  the student has knowledge of basic arithmetic and algebra for this module. The course
  material is made relevant to practicing foresters where it introduces the geometry
  applied to angles, length, area, volume and density. Functions and graph interpretation
  are also introduced.
