assessment_criteria:
- '<40%: Very limited knowledge and understanding of key concepts of mensuration,
  trigonometry and linear and non-linear models. Lacking in technical ability/skill
  and understanding to carry out assessments. Failure to meet the objectives of assessments.'
- '40%-49%: Demonstrate a limited knowledge of mensuration, trigonometry and linear
  and non-linear models. Show some technical ability/skill in carrying out assessments.
  Attempt made to meet objectives and carry out independent study.'
- '50%-59%: Demonstrate satisfactory general knowledge of mensuration, trigonometry
  and linear and non-linear models. Logically and competently carry out assessments.
  Satisfactory handling and awareness in carrying out independent study.'
- '60%-69%: Demonstrate sound knowledge of mensuration, trigonometry and linear and
  non-linear models. Show ability to analyse problems and logically interpret results.'
- '70%-100%: Demonstrate the ability to analyse and design solutions to applied mathematical
  problems to a high standard, for a range of complex or unseen problems.'
