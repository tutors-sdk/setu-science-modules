  stage: 1
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Use of scientific calculator
- Precision, accuracy and SI units
- Geometry of regular and irregular shapes
- 'Mensuration: areas; volume and density'
- 'Trigonometry: degrees; radians; angles of elevation/depression; angles of elevation/depression;
  sine rule and cosine rule; area'
- Use technology to graph linear, polynomial and growth functions.
- 'Linear functions: Solution of linear simultaneous equations'
- 'Polynomial functions: solution of quadratic equations and turning points'
- 'Growth functions: indices; logarithms; solution of exponential and logarithm equations'
learning_outcomes:
- Use appropriate international units (SI units) for the forestry industry.
- Compute arithmetic and algebraic calculations.
- Apply the geometry involved in the computation of length, area, volume and density
  where relevant to the forestry industry.
- Use and apply trigonometric functions in the context of land surveying.
- Construct the graphs of linear, polynomial and growth functions using appropriate
  technology (e.g. excel).
- Interpret the graphs of linear, polynomial and growth functions.
- Interpret the results of applied mathematical problems.
learning_and_teaching_methods:
- Lectures, In-class exercises, discussion
- Self-directed learning is emphasized.
- Student learning is supported with notes, online material, use of technology and
  feedback
