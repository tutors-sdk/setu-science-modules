indicative_content:
- Introduction to Linux - Use of the command line, Customising the shell, File and
  directory management, Basic text editing, Useful commands and utilities, Text processing
- Introduction to Bash Shell Scripting - Basic bash script syntax, Variables, Conditionals,
  Loops, Shell commands
- Variables and Data Types
- Lists
- Basic Operators
- String Formatting
- Flow of Control
- Loops
- Functions
- Classes and Objects
- Dictionaries
- Modules and Packages
- Advanced Functionality - Generators, Decorators, Regular Expressions, Exception
  Handling, Sets, Serialisation, Partial Functions, Code Introspection, Closures
learning_outcomes:
- Use the command shell to administer a Unix-like operating system, including basic
  shell commands, the Unix manual, and a text editor.
- Write short shell scripts to automate simple repetitive and scheduled tasks.
- Design complex scripts in a scripting language such as Python.
- Develop complex scripts in a scripting language such as Python.
learning_and_teaching_methods:
- This course will be presented by a combination of lectures and computer-based practicals
  whilst capitalising on a web-enhanced learning environment
- The lectures will be used to introduce new topics and their related concepts
- The emphasis on course delivery will be hands-on, problem solving both individually
  and in small class groups using problem based worksheets during the practical sessions
- Self-directed learning will be encouraged throughout the duration of the module
