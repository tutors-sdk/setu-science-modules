corequisites: []
indicative_content:
- Golf course architecture, design and planning
- Construction of golf course features
- Maintenance of golf course features
- Golf course ecology and habitats
- Impact of the rules of golf on course maintenance
- Golf course nutrition, growth regulation and modification of growing environments
learning_outcomes:
- Explore the principles of planning, construction and maintenance of golf courses.
- Complete operations in golf course maintenance.
- Explore the principles of environmentally sound management.
- Examine the value of ecology and habitats and their impact on the golf course environment.
- Relate the influence of the rules of golf on management and maintenance.
- Justify the use of fertilisers and chemicals in golf course management.
- Determine appropriate maintenance regimes for golf course features.
- Examine current management practices on a golf course.
