indicative_content:
- 'Themes that will be used to achieve the learning outcomes for this module will
  include:'
- Studying and living abroad
- Health, fitness and personal image
- Politics
- Various cultural themes including portraits of cities in German speaking countries
- Environment
- 'Linguistic structures will build on those introduced in Level B1.2. Additional
  forms to be covered in this module include:'
- Word formation
- Future perfect
- Nominalising of verbs
- Adjectives with prepositions
- Conditional tense for wishes, conditions and comparisons
learning_outcomes:
- 'Speaking: Debate topical issues while displaying a good lexical range in an appropriate
  register.'
- 'Writing: Produce creative, documentative or emotive texts in various genres specific
  to the context.'
- 'Listening: React appropriately to and identify the different components of complex
  speech on varied topics.'
- 'Reading: Display both skimming and scanning techniques in reading as well as the
  ability to infer the meaning of unknown, non-culturally specific, lexical items
  from context.'
- Demonstrate intercultural awareness and independent reflection.
learning_and_teaching_methods:
- Activity-based teaching and learning focused on what learners bring to the classroom
  and the active role that learners play in the language acquisition process will
  be emphasised.
- A variety of media will be used in the teaching process (print, audio-visual materials,online
  learning resources and tandem learning).
- The course will be characterised by a high level of student participation in both
  classroom activities and self-directed learning.
