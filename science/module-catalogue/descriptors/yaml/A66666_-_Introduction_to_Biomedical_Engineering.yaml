reference: A66666
full_title: Introduction to Biomedical Engineering
short_title: Intro to Bio-Med
credits: 5
level: Advanced
author: ''
history_comment: ''
school: Engineering
department: Engineering Technology
cluster: Engineering
aim: This module aims to advance the students' knowledge of the fundamentals of biomedical
  engineering; specifically in respect of the analysis and evaluation of complex biomedical
  devices. A comprehensive review of the design, operation and manufacture of advanced
  biomedical engineering technologies (electromechanical domains) is undertaken; with
  particular emphasis on associated industry driven technology, business and regulatory
  roadmaps. \emph{Bachelor of Science}\emph{(Honours)}\emph{in Physics for Modern
  Technology} - Stage 4 Semester 8 (WD_KPHTE_B) [Elective] Biomedical Engineering
  -- Past, Present and Future Advanced Biomedical Instrumentation [electro-mechanical
  domains] Biomechanical Systems & Technologies [materials, cellular/tissue/organ
  mechanics and associated technologies] Cardiovascular Systems & Technologies [materials,
  cellular/tissue/organ mechanics and associated technologies] Advanced Biotechnologies
  [drug delivery, tissue engineering, nanobiotechnology] Demonstrate a knowledge and
  comprehension of the fundamental concepts of biomedical engineering as applied in
  the analysis of advanced biomedical devices. Demonstrate an ability to apply the
  knowledge and comprehension gained in analysing and relating macroscopic biomedical
  engineering and device performance parameters to fundamental biomedical engineering
  theory and the associated manufacturing processes. Demonstrate an ability to evaluate
  partial and/or full design criteria as used in the development, manufacture and
  use of advanced biomedical devices. Various Journal & Conference Publications (directed).
