indicative_content:
- Planning & User Experience
- Design & User Experience
- 'Development: Content Management Systems, What You See Is What You Get (WYSIWYG)
  Authoring'
- Web Publishing
- Responsive Development / Frameworks (Cross Platform App Development)
- 'Website Maintenance: Search Engine Optimisation , Testing & Approval, Launch &
  Transition'
learning_outcomes:
- Demonstrate an ability to document and complete the planning stage of a Web Development
  project.
- Apply Web UX guidelines to the design of an interactive website.
- Demonstrate an ability to construct a responsive website using a Content Management
  System.
- Demonstrate an ability to develop an interactive website using industry standard
  web authoring tools.
- Publish and test an interactive website.
learning_and_teaching_methods:
- This is a lab based module. This module will be delivered using 2 hours of computer-based
  Lectures, along with 2 hour of computer-based Practicals each week.
- The Lectures will introduce new concepts and theory relating to the web development
  process. The practicals will allow the students to design and develop websites using
  industry standard web authoring software.
