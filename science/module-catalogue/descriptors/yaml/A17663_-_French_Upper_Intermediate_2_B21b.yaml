indicative_content:
- "Translation: th\xE8me and version"
- Comprehension texts (literary and argumentative)
- DVD segments on various topics from the programme Regards
- Language for specific purpose
- a. News items
- 'b. Aspects of French society: economics, politics, religion'
- 'c. Vocabulary developement: synonyms and antonyms'
- d. collocations
- e. Logical connectors
- f. Subjunctive in expression of possibility, impossibility, doubt, purpose...
- g. Relative pronouns; c'est...+ relative pronoun
- h. Double negation
learning_outcomes:
- 'Speaking: Debate topical issues while displaying a good lexical range in an appropriate
  register.'
- 'Writing: Produce creative, documentative or emotive texts in various genres specific
  to the context.'
- 'Listening: React appropriately to the main idea of complex speech on varied topics.'
- 'Reading: Display both skimming and scanning techniques in reading as well as the
  ability to infer the meaning of unknown, non-culturally specific, lexical items
  from context.'
- 'Intercultural competence: Show evidence of critical awareness of how his/her own
  behaviour and practices and those of speakers of the target language are influenced
  by their cultural background.'
learning_and_teaching_methods:
- Interactive seminars, variety of media (traditional print, audio and video materials,
  online language learning resources and may also include:Tandem Learning, Content
  & Language Integrated Learning, Self-directed learning, Blended learning, European
  Language Portfolio, Transferable skills, Online learning resources...
