aim: The Professional Communications and Research Methods module is designed to develop
  student knowledge, skills and competencies in professional communications and research
  methods including, project management, research methods (quantitative and qualitative),
  technical presentations and writing skills, health and safety and ethics in engineering.
  The student will attain skills in critical assessment of high end technologies from
  secondary research sources and their integration towards technology convergence.
