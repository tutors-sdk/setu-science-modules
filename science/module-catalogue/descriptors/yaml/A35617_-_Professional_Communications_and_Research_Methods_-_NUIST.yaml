indicative_content:
- 'Project Management Skills: Project planning incorporating time and resource management'
- Technical writing and Presentation Skills
- Secondary Research Techniques including patent searching, academic journal searching
  and Boolean search strategies
- Quantitative and Qualitative Research Methods
- Critical analysis of experimental data using SPSS and associated techniques
- Introduction to Intellectual Property Rights
learning_outcomes:
- Write technical reports, communicating a balanced review of complex and/or controversial
  ideas; demonstrate appropriate academic and professional standards of written communication,
  including spelling, grammar, structure, citation, and presentation in both electronic
  and hardcopy forms.
- Develop an engineering project plan and to effectively manage time/resources when
  conducting a project.
- Conduct secondary research and critically evaluate secondary information sources.
- Use statistical analysis software.
- Effectively communicate to both technical and non-technical audiences.
- Present and defend a detailed and feasible research proposal on a specific topic
  of interest.
- Critically evaluate the research designs and techniques identified for a research
  project.
learning_and_teaching_methods:
- Statistical procedures for methodology and sampling
- Guest Lectures on selected topics common with module themes from the programme
- Guide to effective technical writing and academic journal submissions
- Case studies for critical analysis
- Communications workshops
- Presentation skills
