indicative_content:
- "A compendium of language exercises and tasks from the prescribed textbook Savoir-faire\
  \ Le fran\xE7ais a' l'universite'."
- Vocabulary for special purpose
- a. News items
- 'b. Aspects of French society: economy, ecology, education'
- "c. Parlons fran\xE7ais, c'est facile webdocs"
- d. Comprehension and stylistic study of literary texts
- e. Synonyms and antonyms
- f. Indicative and subjunctive modes
- g. Logical connectors
- h. Adjectives and prepositions - verbs with prepositions
- i. Collocations and idioms
learning_outcomes:
- 'Speaking: Develop an argument supporting views with opinion and relevant examples
  on a wide range of topics; Use an appropriate register of language and non-verbal
  behaviour.'
- 'Writing: Write short passages conveying information using a register appropriate
  to context with more complex structures and lexis in order to successfully complete
  a variety of tasks. Describe situations, express and respond to opinions.'
- 'Listening: React to extended discourse with concrete topics, signposted by explicit
  markers.'
- 'Reading: Comprehend longer texts in a broader range of genres.'
learning_and_teaching_methods:
- Interactive seminars, variety of media (traditional print, audio and video materials,
  online language learning resources and may also include:Tandem Learning, Content
  & Language Integrated Learning, Self-directed learning, Blended learning, European
  Language Portfolio, Transferable skills, Online learning resources...
