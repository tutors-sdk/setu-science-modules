cluster: Mathematics and Physics
aim: This module covers motion under a central force, conservative forces and oscillations
  collisions. It introduces Lagrangian mechanics, special relativity and statistical
  physics.
programmes:
- timetable: PHYI-0025
  code: WD_KPHTE_B
