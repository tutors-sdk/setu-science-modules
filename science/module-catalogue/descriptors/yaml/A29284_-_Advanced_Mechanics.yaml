indicative_content:
- 'Oscillating systems: forced harmonic oscillator (damped and driven)'
- 'Motion under a central force: orbits in an inverse square force field, Euler-Lagrange
  mechanics'
- 'Collisions and conservation laws: Rutherford scattering and interaction cross-section'
- 'Rigid body motion: centre of mass; rotation about an axis; parallel and perpendicular
  axis theorems; the energy equation'
- 'Kinetic theory: Maxwell and Boltzmann distributions'
- 'Special relativity: introduction to kinematics and dynamics'
- 'Practical programme: Experiments to measure; moments of inertia of rods and discs
  etc.; study of driven harmonic oscillator and resonance'
learning_outcomes:
- Construct and solve problems in classical mechanics.
- Construct and solve problems in special relativity.
- Construct and solve some problems in statistical physics.
- Complete laboratory work and present technical reports on their work.
