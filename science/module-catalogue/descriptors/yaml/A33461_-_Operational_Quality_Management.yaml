assessment_criteria:
- '< 40%: Little or no demonstration of an understanding of the fundamentals of the
  learning outcomes. Lack of competence with associated laboratory skills & practices
  & an inability to carry out critical thinking.'
- '40%--49%: Will show a limited understanding of the fundamentals of the learning
  outcomes. May have some difficulty with applying critical thinking and problem-solving.
  Will display some ability with associated laboratory skills & practices.'
- '50%--59%: As well as the above, the candidate will show a good understanding of
  the fundamentals of the learning outcomes with demonstration of some critical thinking
  & problem-solving skills. Will display good competence with associated laboratory
  skills & practices.'
- '60%--69%: In addition, will demonstrate more detailed knowledge of all learning
  outcomes, very good critical thinking skills & a high level of competence & efficiency
  in associated laboratory practicals.'
- '70%--100%: All the above to an excellent level. In addition, will demonstrate a
  comprehensive knowledge & understanding of all learning outcomes & be able to discuss
  the area. Will display advanced competence & independence with associated laboratory
  skills & practices.'
