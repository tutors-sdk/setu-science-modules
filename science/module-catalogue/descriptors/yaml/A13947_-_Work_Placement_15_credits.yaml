reference: A13947
full_title: Work Placement (15 credits)
short_title: Work Placement (15 credits)
credits: 15
level: Advanced
author: RBIRNEY
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Professional Skills
aim: The purpose of the three-month work placement is to require the student to apply
  the knowledge, skills and competencies gained through the academic phase of the
  course through putting them into practice in a relevant workplace environment. This
  will allow the students to consolidate, deepen and contextualise their learning
  and thereby enhance their employability.
programmes:
- timetable: PLAC-0135
  code: WD_KBUSY_G
  name: Higher Diploma in Science in Business Systems Analysis
  stage: 2
  semester: 4
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Work Placement: The student is required to actively engage in and successfully
  complete a three-month placement in a work setting approved by WIT'
- 'Learning Agreement: At the outset of the Placement the Student will complete a
  Learning Agreement'
- 'Applied Learning Portfolio: During the course of the placement students are required
  to maintain an Applied Learning Portfolio'
- 'Alternative Industry-led Project: Where a student cannot secure an appropriate
  Work Placement they are required to complete an Industry-Led Project'
learning_outcomes:
- Assess workplace/industry-led project problems and utilise knowledge, skills and
  competencies acquired to develop creative solutions.
- Compare theory to practice and contextualise the theoretical knowledge gained in
  the programme to a relevant area of professional practice.
- Develop advanced communication and interpersonal skills and communicate effectively
  in a professional manner.
- Critique the learning experience resulting from the work placement/industry-led
  project.
- Evaluate personal skills and competencies along with strengths and areas for further
  growth and development.
learning_and_teaching_methods:
- Students will undergo an induction briefing prior to the beginning of the placement
  and have access to an academic supervisor during the placement period.
- The applied learning portfolio is designed to foster self-reflection on the learning
  gained through participation in the work placement.
