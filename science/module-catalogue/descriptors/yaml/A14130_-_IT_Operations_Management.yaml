indicative_content:
- The Role & Organisation of the IT Operations Department
- IT Infrastructure & Management
- Enterprise Systems Implementation
- IT Operations Management Frameworks
- IT Service Management
- IT Governance
- IT Service Sourcing
- IT Strategic Planning
learning_outcomes:
- Appraise the role of the IT Operations Department within the organisation.
- Determine how reference frameworks can be utilised for operations management.
- Distinguish between the different elements of IT services management.
- Recommend how an organisation might apply a robust approach to IT governance.
- Select between alternative options for the appropriate sourcing of an organisation's
  IT services.
- Select between different approaches for the development of an information systems
  strategy to support the organisation.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and computer based practicals.
- The lectures will be used to introduce new topics and their related concepts. Lectures
  will be supplemented by participative case studies and independent reading on the
  issues covered in the lecture material.
- The practical element is intended to provide the student with the skills needed
  to use and understand technologies available to assist in IT operations management.
