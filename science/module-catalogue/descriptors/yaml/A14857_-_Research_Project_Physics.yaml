assessment_criteria:
- '<40%: Poor understanding of the scientific principles behind the research project,
  inadequate level of research work performed in terms of quality and quantity of
  research output. Poor level of communication with project supervisor. Poor quality
  of final report in terms of structure, referencing, readability, interpretation
  and analysis of results. Inadequate communication skills evident through a poor
  project presentation.'
- '40%-49%: Basic understanding of the scientific principles behind the research project,
  adequate level of research work performed in terms of quality and quantity of research
  output. Adequate level of communication with project supervisor. Acceptable quality
  of final report in terms of structure, referencing, readability, interpretation
  and analysis of results. Adequate communication skills evident through a project
  presentation.'
- '50%-59%: Good understanding of the scientific principles behind the research project,
  good level of research work performed in terms of quality and quantity of research
  output. Good level of communication with project supervisor. Good standard of final
  report in terms of structure, referencing, readability, interpretation and analysis
  of results. Good communication skills evident through a project presentation, supplemented
  by an ability to present the knowledge in a clear and precise manner.'
- '60%-69%: Very good understanding of the scientific principles behind the research
  project, very good level of research work performed in terms of quality and quantity
  of research output. Very good level of communication with project supervisor. Very
  good standard of final report in terms of structure, referencing, readability, interpretation
  and analysis of results. Very good communication skills evident by an ability to
  present the knowledge to a high technical standard'
- '70%-100%: All previous to an excellent level. Shows initiative and demonstrates
  an ability to abstract ideas and reflect on the process.'
