aim: This module provides the student with the experience of working on an extended
  research project in collaboration with a project supervisor. The student will have
  selected their project and carried out a literature review as part of the 'Research
  Methodology and Literature Review' module in semester 7. The student will embark,
  under the guidance of his/her supervisor, on the development of the solution to
  a specified research problem. In addition to the students' supervisor, students
  will be timetabled for one full day in a dedicated project lab where lecturers will
  examine project-specific technical problems and provide support for the student.
  At the end of the module, the student will disseminate their findings through a
  dissertation, and will be expected to defend the project with a final presentation,
  including a demonstration where appropriate.
