indicative_content:
- Planning and design of a scientific research project
- Implementation of research project
- Research project management
- Production of documentation associated with the project
- Presentation of practical aspects and outcomes of project
learning_outcomes:
- Develop a disciplined approach to undertaking a research project.
- Develop a range of skills in the application of physics, mathematics and computing
  to the solution of a research problem.
- Plan a set of research activities; assess and design the appropriate equipment for
  the research task.
- Select appropriate research methods, tools and techniques for the research task.
- Appraise different research methodologies and be able to progress to postgraduate
  level study and research.
- Produce a final dissertation which details the essential scientific and practical
  aspects and outcomes of the project to the appropriate deadline.
- Produce a presentation and a demo where appropriate, which summarises the essential
  scientific and practical aspects and outcomes of the project.
learning_and_teaching_methods:
- Consultations with project supervisor.
- Preparation of project dissertation.
- Oral presentation.
- Self-directed learning.
