indicative_content:
- 'Introduction to computer security: security threats; attack methods; common vulnerabilities;
  security services'
- 'Cryptography: symmetric encryption; modern encryption; block vs stream ciphers;
  public key cryptography'
- 'Message authentication and integrity: hash functions; collisions; MACs; digital
  signatures; digital certificates'
- 'Computer system security: Access controls, TLS/SSL, SSH, firewalls'
- Distributed Ledger Technology, trust and managing consensus using cryptography
- Privacy and data governance when storing and working with data
learning_outcomes:
- Assess the various security threats and attack methods to which data may be susceptible.
- Appraise the role of cryptography in computer and data security, including its benefits
  and limitations.
- Test and use cryptographic software and set up secure systems for managing data.
- Evaluate the benefits of distributed ledgers (including blockchain), including their
  transparency, resistance to tampering, and decentralised nature.
- Appraise the role of privacy protection when collecting, storing and performing
  operations on personal data.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
