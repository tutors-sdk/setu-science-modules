indicative_content:
- Cultivation of a range of fruit top and soft fruit on small garden scale, e.g. apples,
  raspberries, gooseberries, blackcurrants, strawberries
- Cultivation of a range vegetables on a small garden scale e.g. onions, salads, tomatoes,
  carrots, cabbage, broccoli, range of herbs, range of cucurbits
- 'Principles of design, use of plant materials: Colour, form, texture, structure
  and layout'
- Water features, construction methods, and maintenance regimes
- Factors in managing estates and parks. Layout design and history of parks and estates
- Maintenance of parks and mixed borders
- 'Growing conditions and selection of ornamentals for the following situations: Ponds,
  seasonal bedding, hedging, screening, shelter, seaside, climbing, walls, ground
  cover, shade, dry banks, slope stabilisation, and small gardens'
- Ornamental plant identification by relevant characteristics such as leaf and twig,
  bud and twig, flower, berry, stem using the binomial system
- Specialist plants groups e.g. alpines, ferns, grasses, and bamboos
- Care and management of naturalistic plantings e.g. wild flower meadows
learning_outcomes:
- Appraise the growing of fruit and vegetable crops on a small scale.
- Demonstrate the use of a range of ornamental plants in the landscape.
- Recommend appropriate plants for specific site situations.
- Determine the impact of park management on public spaces.
- Demonstrate appropriate garden maintenance techniques e.g. planting, pruning, weeding,
  mowing, and edging.
- Plan a mixed border demonstrating principles of good design.
- Use scientific names to identify live specimens of ornamental perennials, annuals,
  bulbs, trees and shrubs.
learning_and_teaching_methods:
- Lectures.
- Demonstrations followed by practical work.
- Instruction supported by plant samples.
