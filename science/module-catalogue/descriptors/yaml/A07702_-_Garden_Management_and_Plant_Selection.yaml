assessment_criteria:
- '<40%: Not able to identify 40% of plants. Very limited knowledge and understanding
  of the subject matter. Lacking in technical ability/skill and understanding to carry
  out practical/professional tasks.'
- '40%-49%: Able to identify at least 40% of plants. Demonstrates a limited knowledge
  of the subject matter. Shows some technical ability/skill in carrying out and reporting
  on practical/professional tasks.'
- '50%-59%: Able to identify at least 50% of plants Demonstrates satisfactory general
  knowledge of the main issues within the subject. Logically and competently carry
  out practical/professional tasks.'
- '60%-69%: Able to identify at least 60% of plants. Demonstrates sound knowledge
  of the subject matter and performs practical/professional tasks efficiently.'
- '70%-100%: Able to identify at least 70% of plants. Demonstrates authoritative and
  extensive understanding of the subject. Demonstrates imaginative approach, excellent
  technical ability, awareness, and aptitude in carrying out tasks.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
