indicative_content:
- Planning guidelines, regulations governing buildings and landscape features, steps
  in building developments, justifying building developments
- Foundations, squaring out a site, transferring levels, pegging out foundations,
  mixing concrete and mortar
- Timber materials e.g. fencing, and decking
- Construction using concrete blocks, bricks, laying paving units, slabs, setting
  up gradients, assembling screeds, and building dry stone walls
- Plan, elevation and section drawings
- Quantifying materials for component structures, minimum specifications, estimating
  quantity of concrete, costings for block walls, brick walls, paving, fences etc..
learning_outcomes:
- Describe planning laws and regulations.
- Complete safely a range building and maintenance tasks associated with landscape
  and horticultural building construction.
- Interpret, read and draft plans and specifications.
- Describe good environmental practices in constructing buildings.
- Describe good practices for safety and health in constructing buildings.
- Estimate quantities and costings for structures such as block walls, brick walls,
  paving, fences etc.
