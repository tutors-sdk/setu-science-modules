reference: A07953
full_title: Food Business
short_title: Food Business
credits: 5
level: Intermediate
author: EDUGGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: This course aims to introduce the student to the strategy of food business in
  Ireland, the EU and internationally. A broad review of the environment in which
  it operates culminating in a student led quantitative and qualitative research into
  new consumer products in Ireland.
