aim: This course is designed for postgraduate students who have knowledge and experience
  in the land sciences and food production, processing, and marketing. The module
  will investigate human nutrition requirements including the role of macronutrients
  and micronutrients as part of healthy balanced diets. There will be a review of
  the scientific evidence and trends in nutrient content of common foods. The role
  of key nutrition requirements for healthy lifestyles will be explained for nutritional
  related diseases. The objective of this course is for graduates to be conversant
  with human dietary requirements, current food eating trends, and the critical need
  for balanced healthy diets.
