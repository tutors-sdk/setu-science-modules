indicative_content:
- Human food dietary requirements for balanced nutrition
- Dietary behaviour, factors affecting food choice, e.g. social and cultural factors,
  food labelling
- Trends and developments to optimise health, non-nutrients, e.g. phytochemicals,
  prebiotics, functional foods, biofortification, GE food ingredients, personalised
  nutrition, nutrigenomics
- Human illnesses and diseases associated with poor nutrition (diabetes, colon cancer,
  obesity etc.)
- Food safety from a microbiological and toxicological perspective with an emphasis
  on organic food
- National policy and regulation on food safety relating to organic food production
  and sale
learning_outcomes:
- Demonstrate a detailed knowledge and comprehension of balanced nutrition requirements
  in the human diet.
- Assemble the relevant factors and give examples of influences affecting human dietary
  behaviour.
- Describe and evaluate the role of various non-nutrient ingredients in healthy human
  diets.
- Explain and illustrate the vital role of nutrition in the aetiology of dietary related
  human diseases.
- Demonstrate a detailed knowledge, and categorize the application, of food safety
  measures in relation to production and processing with an emphasis on organic food.
- Appraise and critique contemporary published evidence and findings for developing
  human health and nutrition-related trends.
- Select, interpret, and summarize relevant research and health study information
  on food, health and nutrition from a variety of literature and scientific sources.
