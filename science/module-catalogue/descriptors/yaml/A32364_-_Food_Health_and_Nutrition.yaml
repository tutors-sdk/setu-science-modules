assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills.'
- '40%--59%: The learner will be able to demonstrate a good understanding of human
  nutrition requirements for human health and welfare. The student will be able to
  write and present a topical case study.'
- '60%--69%: In addition to the above, the student will demonstrate more detailed
  knowledge of all the module topics covered, including human health developments
  and trends. The student will also be able to write and present a good quality case
  study.'
- '70%--100%: The learner will be able to demonstrate comprehensive knowledge and
  understanding of all learning outcomes, including the vital role of nutrition in
  human health and diseases associated with poor nutrition and write and present a
  related high quality case study.'
