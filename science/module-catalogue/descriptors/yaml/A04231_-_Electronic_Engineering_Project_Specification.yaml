indicative_content:
- Projects are selected in collaboration with industry, based on research themes carried
  out by researchers at postgraduate level, in collaboration with other academic institutions
  and on occasion at the suggestion of the student themselves.
- Literature Research (Periodicals, IEEE search engines, Internet)
- Project Management (appraise the problem, break into constituent parts, identify
  milestones, based on time, difficulty, other resources available and overall ability
  to achieve the goals)
- Early Milestones
- Presentation through seminar / report on progress
learning_outcomes:
- Perform a thorough literature search including on-line scientific engineering databases,
  in a given area and compile the salient expressions, synopses, alternative techniques
  and their own proposed approach.
- Write realistic goals, based on available resources, difficulty of tasks and required
  learning/existing abilities for the milestones required to finally complete a project.
- Defend a proposed course of action, based on rational reasoning, resources and abilities.
- Present a project context, status quo and projected outcome to peers and staff in
  an open forum/seminar.
- Organise component orders, within the project budget and complying with the Institute's
  process for placing orders and recognising suppliers.
- Develop and maintain a professional relationship with the supervisor and maintain
  a log of meetings.
learning_and_teaching_methods:
- One-to-one weekly scheduled meetings with supervisor
- Problem-based learning (posing of project-specific problems where student researches
  and devises an appropriate solution, typically over a 1- or 2-week period)
- Independent learning through a thorough reading of the project area.
