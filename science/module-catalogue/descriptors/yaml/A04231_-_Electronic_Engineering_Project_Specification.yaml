history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electronics
aim: The aim of the final year project subject is to augment the theoretical material,
  covered in the course, by exposing the student to circuit design and software development
  in a work laboratory environment. The benefits derived from co-operating with industry
  are recognised and where possible industrial based projects will be considered for
  assigning as student projects. In this semester, the students are encouraged to
  follow safe systems and working practices and to apply appropriate management techniques
  (personal and institute resource management, deciding achievable goals and sticking
  to them, etc.) and to develop their knowledge of the chosen topic, by performing
  literature and Internet searches and interviewing appropriate staff.
