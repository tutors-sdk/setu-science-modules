indicative_content:
- Classification of pests, diseases, disorders and weeds
- Identification of pests, diseases, disorders and weeds
- Effect of pests, diseases, disorders and weeds on plant growth
- Control measures and IPM techniques for minimising infestations of pests, diseases,
  disorders and weeds, sustainably in crops
- Main types, application methods, formulations and modes of action of pesticides,
  plant pesticide resistance
- Outline the risks and benefits associated with pesticide use including plant pesticide
  resistance, methods of reducing contamination of the environment, and routes of
  contamination of the body, and the appropriate use of PPE when working with pesticides
- Current EU and National Legislation including Statutory Instrument `Good Plant Protection
  Practice' (GPPP) in relation to pesticides. Maintenance of records, and safe handling,
  storage, transport, use and disposal of unused pesticides, empty containers, and
  application equipment (i.e. a `system of work').
- Carry out risk assessment, and development of strategies for dealing with accidents
  and incidents involving spillages, contamination and poisoning
- Calibration, mixing and correct use and storage of a knapsack sprayer, slug pellet
  operator, and weedlick. Interpretation of pesticide labels and Safety Data Sheets
  (SDS).
learning_outcomes:
- Identify a range of horticultural pests, diseases, disorders and weeds.
- Describe the effects of infestations of pests, diseases, disorders and weeds on
  crops.
- Describe life cycles, monitoring and control methods for pests, diseases, disorders
  and weeds.
- Describe the main types, formulations, modes of action, and resistance to pesticides.
- Describe the current pesticide regulations.
- Operate a knapsack sprayer, calculate and make up spray mix, correctly apply a pesticide,
  demonstrate effective cleaning, storage, and calibration of equipment.
