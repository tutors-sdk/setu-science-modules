aim: This module is designed to equip students with knowledge of nursery stock production,
  management and planning. Students will learn nursery stock specific skills of planting,
  potting, crop protection and will perform cultural techniques for bedding plant,
  trees and shrub production. Plant health and exporting regulations are also covered.
