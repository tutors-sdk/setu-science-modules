assessment_criteria:
- '<40%: Very limited knowledge of plant production methods and cannot demonstrate
  understanding of plant production. Unable to complete practical skills or exercises.'
- '40%-49%: Demonstrates a limited knowledge of plant production systems and processes.
  Limited technical ability but demonstrates ability to learn and understand new skills.'
- '50%-59%: Demonstrates satisfactory general knowledge of the main areas of nursery
  stock production. Competently carries out practical tasks and skills. Reports and
  projects adequately structured and referenced.'
- '60%-69%: Demonstrates sound knowledge of nursery stock production principles and
  systems. Demonstrates ability to interpret and analyse technical information logically.
  Projects, reports and exams coherent and soundly structured illustrating wide and
  in depth reading on subject coupled with the proper use of references.'
- '70%-100%: Demonstrates authoritative handling of complex material and a highly
  developed and extensive understanding of the subject. Demonstrate imaginative approach,
  excellent technical ability, awareness, and aptitude in carrying out and reporting
  on practical/professional tasks.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
