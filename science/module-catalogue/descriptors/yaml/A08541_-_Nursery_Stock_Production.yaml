indicative_content:
- 'Bedding plants: Nutritional programmes, Production of a range of bedding plants,
  Plan a crop protection programme'
- 'Liner production: Sources of material, Propagation systems, Perform cultural techniques,
  Nutritional programmes'
- 'Containerised trees, shrubs and herbaceous plants: Compost specification for various
  production programmes, Demonstrate potting skills, Growing-on systems, Plan a crop
  protection programme, Perform cultural techniques'
- 'Open ground trees and shrubs: Soil preparation operations before planting, Budding
  and grafting for field tree production, Planting techniques, Plan a crop protection
  programme, Perform cultural techniques, Harvesting techniques'
- 'Nursery stock management: Plan the physical layout of a nursery, Schedule production
  programmes of the above, Nursery irrigation systems, Monitor crop performance'
- 'Quality assurance schemes: Quality standard specification for bedding, liners,
  trees, shrubs and herbaceous plants'
- Sustainable plant production systems and use of contemporary new developments.
learning_outcomes:
- Demonstrate in a safe working environment, a range of cultural tasks associated
  with nursery stock production including, budding, grafting, potting and planting.
- Appraise the production of nursery stock crops such as bedding plants, liners, containerised
  plants and open ground stock.
- Propose a crop protection programme appropriate to the nursery stock crop grown
  e.g. bedding plants, liners, containerised plants and open ground production systems.
- Determine appropriate nutritional programs and compost specifications for a nursery
  stock crop.
- Appraise a range of irrigation methods.
- Investigate the effects of various propagation environments and materials for the
  production of liners.
- Relate the requirements of the nursery stock quality assurance schemes and standard
  specifications to management strategies.
