indicative_content:
- 'Pharmacokinetics: principles of drug absorption, distribution, metabolism and excretion'
- 'Relationship of ADME to routes of administration: first pass metabolism and role
  of blood brain barrier; bioequivalence of similar formulations'
- 'Central role of log P, pKa and log D values in Pharmacokinetics: Lipinski''s rules
  relating ADME to molecular structure'
- 'Drug metabolism: phase 1 and phase 2 metabolic reactions, drug- protein binding;
  structure, examples and role of pro-drugs; synthetic and metabolic precursor pro-drugs'
- 'Pharmacodynamics: receptor theory, agonists/antagonists, log dose response curves;
  structure and mode of action of various receptor types'
- 'Modification of neurotransmission in pharmacodynamics: neurotransmitter agonists/antagonists/reuptake
  inhibitors'
- Adrenergic (sympathetic) and cholinergic (parasympathetic) neurohumoral transmission;
  monoamine oxidase inhibitors
- Examples of modification of neurotransmitters and related drug structures to give
  selective action based on receptor sub-types
- Examples of development of selective agonists/antagonists for treatment of asthma
  and selective cardiac drugs
- 'Mode of action of G protein receptor: amplification and cascade effects'
- 'Therapeutic index: importance of ED50 and LD50 in drug safety and plasma level
  monitoring'
- 'Structure/activity relationships: overview of quantitative structure/activity relationships
  (QSAR), isosteres and role of molecular modelling'
- 'Case study: development and role of Tamoxifen as a selective estrogen receptor
  modulator; role of estrogen synthesis inhibitors'
- 'Principles and classification of types of asymmetric synthesis of pharmaceuticals;
  single enantiomer and racemic drugs: role of eutomers and distomers'
- Role of chiral auxiliaries, asymmetric induction, mole ratio chiral reagents and
  chiral catalysts; examples of asymmetric synthesis of pharmaceuticals
learning_outcomes:
- Evaluate the importance of, and factors controlling, the absorption, distribution,
  metabolism and elimination of drugs.
- Evaluate and explain the role of receptor theory in pharmacodynamics and its relationship
  to modification of neurohumoral transmission.
- Determine the structure activity relationships for selected classes of drugs.
- Propose examples of synthetic routes for heterocyclic pharmaceuticals.
- Predict and evaluate asymmetric pharmaceutical synthetic methods.
