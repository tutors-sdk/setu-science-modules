aim: This module covers an overview of pharmacology, with an emphasis on the relationship
  between chemical structure and biological activity of pharmaceuticals. The development
  and use of asymmetric synthetic methods for pharmaceuticals and the importance of
  heterocylic compounds as pharmaceuticals are included.
