assessment_criteria:
- '<40%: No understanding of the basic principles of pharmacology, drug design and
  synthesis.'
- '40%-49%: Ability to understand the basic principles of pharmacology, drug design
  and synthesis. May have some difficulty with applying the theory.'
- '50%-59%: All the above, in addition to the ability to demonstrate an understanding
  of some of the complexities of the topics and predict some trends in analytical
  results.'
- '60%-69%: In addition, shows a high level of competence and efficiency in the area
  of pharmacology, drug design and synthesis and demonstrates an ability to evaluate
  detailed knowledge acquired in the module to new material.'
- '70%-100%: All previous to an excellent level. The learner will be able to demonstrate
  comprehensive knowledge and understanding of pharmacology, drug design and synthesis,
  predict general trends in behaviour, including exceptional behaviour and critically
  evaluate and relate topics that overlap all of the topics.'
