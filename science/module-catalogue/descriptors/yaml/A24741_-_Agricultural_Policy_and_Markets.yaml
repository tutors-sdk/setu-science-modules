aim: The purpose of this module is to study and evaluate the wider economic environment
  which impinges on the agricultural sector. A diverse range of topics are studied
  which have a bearing on the economic prospects of the sector and/or influence the
  contribution of agriculture to wider social and environmental objectives. A review
  of the important data sources and associated applications is covered.
