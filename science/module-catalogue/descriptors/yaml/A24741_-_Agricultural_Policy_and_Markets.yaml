assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter.'
- '40%-49%: Will be able to show a good knowledge of the key learning outcomes including
  the contribution that agriculture makes to the Irish economy. The student will be
  able to source relevant data and present it in the assignment and in the exam.'
- '50%-59%: As well as the above the student will be able to demonstrate a good understanding
  of agriculture policies and markets in the Irish economy and in the wider EU and
  world context. The student will be able to source relevant data and present it in
  a clear manner in the assignment and in the exam.'
- '60%-69%: In addition, the student will demonstrate more detailed knowledge of all
  the topics including the impact of European and world trade on Irish agriculture.
  The student will be able to source key data and present it in a clear manner in
  the assignment and in the exam.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of all learning outcomes, including the current and future trends in Irish, EU and
  competitor trading blocks. The student will be able to source key data and present
  it in a convincing manner in the assignment and in the exam.'
