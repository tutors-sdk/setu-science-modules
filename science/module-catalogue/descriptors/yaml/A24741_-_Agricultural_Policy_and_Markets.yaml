indicative_content:
- The contribution of agriculture to the national economy; review of developments
  in main agricultural enterprises
- 'Agriculture data sourcing and analysis: Compendium of Agricultural Statistics (Dept
  of Agriculture, Food and the Marine); National Farm Survey - current and recent
  trends (Teagasc); Situation and outlook in agriculture - current year (DAFM); Aggregate
  output, input and incomes - current and recent years (CSO); International data (OECD)'
- 'Principles of agricultural policy: Rationale for support for agriculture; The policy
  cycle; Alternative support measures; Agriculture as provider of public goods; economic,
  social and environmental implications'
- 'European Union and the CAP: CAP origins, development and reform; EU agriculture
  budget and Ireland''s contribution; non-market CAP policies and other policies impacting
  on agriculture'
- 'Delivery of CAP agricultural services online: Pillar 1 - Production: Basic payment
  scheme, Greening and ecological focus areas; Pillar 2 - Rural Development: Agri-environment(GLAS
  online); Beef data and genomics programme; Knowledge transfer groups; Targeted applied
  modernisation scheme(TAMS), General Data Protection Regulation(GDPR)'
- 'International Trade in agricultural products: Current and emerging trade patterns;
  WTO rules and commitments; Trade conflicts'
- Brexit implications for agricultural trade:- UK, Northern Ireland, European Union
  and Ireland
- 'Long term trends analysis: Population; incomes; lifestyle/market preferences; environmental
  protection/energy conservation/global warming'
learning_outcomes:
- Appraise current developments in the national and international economic environment.
- Evaluate the contribution of agriculture to national economic, social and environmental
  objectives.
- Critique the key features of agriculture support policy regimes.
- Assess the implications for agriculture of likely trends emanating from the sector
  itself or from outside the sector.
- Source and analyse data relevant to general performance and the agricultural sector
  in particular.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures, guest lectures, practicals
  and field trips.
- The lectures will be used to introduce new topics and their related concepts while
  the practicals will reinforce the theory topics and afford the opportunity to engage
  in assignment work.
- Practical work will also allow for independent research, presentations, peer learning
  and peer review.
