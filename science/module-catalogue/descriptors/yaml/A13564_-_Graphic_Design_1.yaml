indicative_content:
- Drawing and Illustration Skills for Communication
- 'Composition: Shape, Space, Communication'
- 'Typography: Classifications, Anatomy, Kerning, Communication'
- 'Layout: Grids, Collage, Communication'
- 'Logo design: Principles, Positive and Negative Space, Logo Generation - Personality
  Profiling, Paper Design'
learning_outcomes:
- Demonstrate drawing and illustration skills.
- Demonstrate the anatomy of type and its structure.
- Apply 2D shapes to illustrate composition.
- Demonstrate layout structure and design.
- Demonstrate the evolution of logo design to create a logo on paper.
learning_and_teaching_methods:
- Classes should be delivered in two two-hour blocks.
- This module will be delivered using two hours of computer-based lectures, along
  with two hours of computer-based practicals each week.
