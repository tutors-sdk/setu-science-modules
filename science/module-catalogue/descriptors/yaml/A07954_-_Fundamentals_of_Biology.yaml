indicative_content:
- 'The cell: cell structure; prokaryotic versus eukaryotic and animal versus plant,
  cell organelles and their roles, fluid mosaic model of biological membranes etc.'
- 'Biological molecules: protein, carbohydrate and lipid structure and biological
  function'
- 'Enzymology: definition, enzyme properties, enzyme classes and enzyme specificity
  in biological organisms; factors affecting enzyme activity; applications of enzymes'
- 'Immunology: antibodies, antigens and the immune response; vaccination; applications
  of antibody:antigen interactions'
- 'Microbiology: introduction to bacteria, fungi and viruses; positive and negative
  roles of microorganisms; sources of biological contamination, hygiene control; microbiological
  techniques; biological control'
- 'Environmental biology: environmental biocycles; carbon, nitrogen biocycles; water,
  soil and air pollution control and monitoring'
learning_outcomes:
- Use standard laboratory techniques to isolate, purify and stain bacteria and fungi
  for microscopic examination.
- Use standard laboratory techniques and rapid detection methods to assess biological
  contamination, determine hygiene levels and identify a number of micro-organisms.
- Describe the structure of a number of microorganisms.
- Describe the concepts of cells, biological molecules, microorganisms and biological
  contamination.
- Identify procedures to prevent biological contamination of product and environment.
- Discuss environmental bio-cycles and the importance of environmental pollution control.
- Record results of laboratory work using a combination of formal written laboratory
  reports and worksheets.
learning_and_teaching_methods:
