indicative_content:
- Soil formation and composition
- 'Soil physical properties: texture and structure'
- 'Soil chemical properties: pH, CEC and plant nutrition'
- 'Soil biological properties: organic matter and ecology'
- Soil compaction, erosion and drainage
- Soil classification
- Soil sampling and analysis
- Nutrient management planning
learning_outcomes:
- Explain the processes involved in soil formation.
- Describe soil composition and soil classification, correlate to soil functionality.
- Discuss the soil properties of texture and structure, and relate to soil degradation
  processes and soil management.
- Describe the function of key plant nutrients, their movement and availability in
  soils, and relate to management of organic and inorganic fertilisers.
- Classify and describe soil organic matter and soil biological organisms, and relate
  to soil quality and management.
- Complete a basic soil analysis to identify a given soil profile and defend findings.
- Complete a whole farm nutrient management plan.
- Use a range of laboratory techniques to characterise soils.
