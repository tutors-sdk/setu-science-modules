history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module is designed to equip students with a introductory understanding of
  the physical, chemical and biological properties of soil. The student will also
  gain an appreciation of what governs soil quality, and an insight into soil degradation
  processes, including how these can be prevented and corrected. Students will learn
  about the macronutrients and micronutrients involved in plant nutrition, including
  the preparation of a farm nutrient management plan. The student will practice soil
  sampling and conduct a range of both lab and field-based physical, chemical and
  biological practical analysis of soils, culminating in the identification of a given
  soil profile in situ.
