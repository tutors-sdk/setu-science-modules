indicative_content:
- 'Contexts / themes that will be used to achieve the learning outcomes for this level
  may include:'
- a. Lifestyle trends regarding health, fitness, nutrition , shopping
- b. Pro and Contra taking sides on current issues relevant to learners lives and
  justifying viewpoints
- c. Planning activities/trips
- d. Describing recent films, books, music and cultural events
- 'Linguistic structures to be covered at this level will include:'
- 'a. Consolidation of grammatical structures to include: perfect tense, adjectives
  (including comparative and superlative), conjunctions and subordinate clauses, definite
  and indefinite articles in the nominative and accusative'
- b. Prepositions (accusative and dative)
- c. Relative pronouns (nominative and accusative)
- d. Reflexive verbs (accusative and dative)
- e. Modal verbs, mgen and lassen
- f. Verbs with separable and inseperable prefixes
- g. Passive (Introduction)
learning_outcomes:
- Spoken Production and Interaction.
- 'The learner is expected to be able to: enter unprepared into and maintain conversation
  on familiar topics, express personal opinions and greetings and exchange information
  on topics that are familiar, of personal interest or pertinent to everyday life
  e.g. family, hobbies, work, travel and current events; give a prepared presentation
  on a familiar topic within his / her field which is clear enough to be followed
  without difficulty most of the time and in which the main points are explained with
  reasonable precision; make his / her opinions and reactions understood as regards
  solutions to problems or practical questions of where to go, what to do, how to
  organise an event (e.g. an outing).'
- Writing
- 'The learner is expected be able to: write accounts of experiences, describing feelings
  and reactions in connected text; write very brief reports to a standard conventionalised
  format which pass on routine factual information and state reasons for actions.'
- Listening
- 'The learner is expected to be able to: follow much of what is said around him /
  her on general topics provided interlocutors avoid very idiomatic usage and articulate
  clearly; follow a talk within his / her own field provided the subject matter is
  familiar and the presentation straightforward and clearly structured.'
- Reading
- 'The learner is expected to be able to: identify the main themes in clearly signalled
  argumentative texts; deduce the meaning of occasional unknown words from the context
  and grasp sentence meaning provided the topic discussed is familiar.'
- Intercultural Competence
- 'The learner is expected to be able to: behave in accordance with the expectations
  of the other culture in most everyday situations both private and professional.'
learning_and_teaching_methods:
- Interactive seminars will be the main teaching approach. A variety of media will
  be used in the teaching process (traditional print materials, audio and video material,
  CALL programmes and online language learning resources). The course will be characterised
  by a high level of student participation in both classroom activities and self-directed
  learning activities outside the classroom.
