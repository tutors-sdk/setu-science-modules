aim: 'The module aims to: give the student an understanding of the main points of
  clear standard input on familiar matters regularly encountered in work, school,
  leisure etc; enable the student to deal with most situations likely to arise whilst
  travelling in an area where the language is spoken; train the student to produce
  connected, detailed texts on topics which are familiar or of personal interest;
  enable the student to describe experiences, dreams, hopes and ambitions and give
  reasons and explanations for opinions and plans; facilitate the student in obtaining
  and analysing information about cultural beliefs, values and behaviour.'
