aim: 'This module builds upon and continues on from the second year module entitled,
  Introductory Telecommunications Theory & the third year module entitled, Mobile
  Wireless Telecommunications-1. This module focuses primarily on advanced digital
  modulation techniques in the context of commercial cellular systems: 2G-Second Generation
  based modulation schemes (primarily GSM), 3G-Third Generation based modulation schemes
  (primarily Universal Mobile Telecommunications System (UMTS)), and 4G-Fourth Generation
  based modulation schemes (primarily Long Term Evolution (LTE) and Digital Video
  Broadcasting-Terrestrial (DVB-T)), and frames them in the context of the state of
  the art approach of Software Defined Radio (SDR). A practical program runs in parallel
  with lectures and tutorials to enhance and reinforce the student''s understanding
  of the theory, using experience and technical information gleaned from the numerical
  modeling. This is realised by utilising off-the-shelf USB TV receivers, partnered
  with a standard PC, furnished with appropriate software suites (Python, C/C++, GnuRadio,
  etc (facilitating the PC with a Linux capability to access this hardware will be
  necessary)), as a laboratory workstation.'
