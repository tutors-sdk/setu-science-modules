indicative_content:
- 'Advanced Digital Modulation - 2nd Gen (2G): Partial Response Signalling (PRS) pulse
  shaping, spectral compression, narrowband constant envelope modulation. Architectural
  implementation of Gaussian MSK modulator & associated BER performance, matched filtering
  (equalization) demodulator requirement.'
- 'Advanced Digital Modulation - 3rd Gen (3G): CDMA -- Direct Sequence & Frequency
  Hopping. Root Raised Cosine (RRC) wideband pulse shaping, rake receiver delay locked
  loop receiver architecture incorporating RRC matched filter. Spreading codes / selection
  criteria. Auto & cross correlation.'
- 'Advanced Digital Modulation - Fourth Generation (4G): Orthogonal Frequency Division
  Multiplex (OFDM). MultiMode transmission & implications for wireless channel propagation,
  ISI. DVB-T, DRM, ADSL, LTE.'
- 'Architecture / Infrastructure: SDR architecture and implementation. ADC architectures
  and principles for SDR. DVB-T USB module Radio Frequency front-end receiver (utilising
  Free-Software Foundation / GNU Radio software tools) for SDR. Toward MIMO architectures,
  Smart Antenna architectures.'
learning_outcomes:
- Discuss and differentiate between modulation and access schemes in terms of implementation
  and spectral efficiency.
- Describe the theory for the need for advanced modulation schemes, the motivating
  factors and drivers for their employment in modern mobile wireless cellular telecommunications
  systems, and the technical implications of their implementation with current technology.
- Express the physical layer modulation schemes associated with 2G, 3G & 4G cellular
  communications systems using advanced numerical modelling techniques.
- Frame the digital modulation principles in the context of state of the art SDR implementation
  entities and verify this exercise through robust numerical models.
- Construct numeric & circuit level simulations of telecommunications systems, such
  that a partnering physical layer apparatus can be constructed in a laboratory setting.
- Write meaningful practical reports, commensurate with a prescribed format, that
  includes adequate presentation of numerical / circuit simulation and experimental
  results, relevant calculations and meta information, and draw relevant conclusions.
