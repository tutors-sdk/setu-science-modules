  name: Independent Learning
  part_time: ''
assessment_methods:
- learning_outcomes: 1,2,3,4,5,6
  main: true
  name: Final Project
  weighting: 100
assessment_criteria:
- '<40%: Inadequate achievement of the learning outcomes (insufficient level of research
  work performed and/or poor report writing and oral presentation skills suggesting
  a poor standard and an inadequate knowledge of the research topic at hand).'
- '40%-49%: Will be able to show a basic level of achievement in relation to the key
  learning outcomes (an adequate level of research work performed together with adequate
  report writing and presentation skills).'
- '50%-59%: As well as the above, the student will be able to demonstrate a good understanding
  of some of the complexities of the topics and evaluate some results (a good level
  of research work performed together with good report writing and presentation skills).'
- '60%-69%: In addition to the above, the student will demonstrate more detailed achievements
  of project goals and demonstrate an ability to evaluate knowledge acquired through
  a very high standard of research work performed supplemented with a high standard
  of report writing, placing results in context to scientific literature, and presentation
  skills.'
- '70%-100%: All previous to an excellent level. In addition, the learner will be
  able to demonstrate comprehensive knowledge and understanding of all learning outcomes,
  predict general trends in behaviour, including exceptional behaviour, and critically
  evaluate and relate topics to scientific literature, demonstrated through an excellent
  standard of research work performed supplemented with a superior standard of report
  writing and presentation skills.'
