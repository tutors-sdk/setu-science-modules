reference: A36022
full_title: Research Project and Methodologies (Biology L7)
short_title: Res Project & Meth (Biol L7)
credits: 5
level: Intermediate
author: NKENNEDY
history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: This module consists of a research and development project, which will give students
  the facility to plan and carry out a body of work, based significantly on their
  own initiative. Students will also be introduced to the tools central to research
  methodologies including search strategies for accessing the scientific literature,
  appropriate referencing techniques and scientific writing skills.
programmes:
- timetable: RESA-0219
  code: WD_SMBIO_D
  name: Bachelor of Science in Molecular Biology with Biopharmaceutical Science
  stage: 3
  semester: 6
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Projects will be based on areas such as: molecular biology, microbiology, enzymology,
  environmental analysis, bioremediation & biocatalysis and analytical procedures'
- Students will search the scientific literature for research papers relevant to the
  project topic and produce a short background/introduction and discussion of project
  results in relation to these papers within their project report
learning_outcomes:
- Plan, organise and carry out a basic research and development project.
- Use library resources to search the scientific literature and databases relevant
  to the project.
- Analyse data generated and compare to results from selected papers in the scientific
  literature.
- Develop a personal work plan, including self-directed training on sustainability,
  and responsibility for own work.
- Communicate project data in an oral format, using visual aids.
- Complete a detailed written report, including a short review of relevant scientific
  literature, summary of the project, and relation of results to selected papers from
  scientific literature.
learning_and_teaching_methods:
- 'Supervised project work: practical laboratory-based.'
- 'IT tutorials: Use library resources to search the scientific literature and databases
  relevant to a chosen research topic.'
- Consultations with project supervisor.
- Self-directed training on sustainability.
