indicative_content:
- 'Internet and Web: HTTP; Client-server architecture; Session management'
- 'Design Patterns: Microservices; Publisher-Subscriber; MVC (Model View Controller);
  ORM (Object Relational Mapping)'
- 'Web Application frameworks: In-depth case studies'
- 'Web API Design patterns and principles: REST'
- Data persistence
- 'Developer tool suite: Build automation; Test automation; Scaffolding; Version Control'
learning_outcomes:
- Develop a medium-sized Single Page Web App using best practice design principles
  and patterns.
- Develop a web API using best practice design principles.
- Setup and integrate suitable workflow automation tools for enterprise web development.
- Choose particular solutions for non-functional requirements, including session management,
  client-server communication and security, for a user requirement set.
- Propose and select open-source platforms and tools for the specification, documentation
  and testing of application components.
learning_and_teaching_methods:
- Combination of lectures and computer-based practicals.
- The lectures will cover the theory and supporting technologies behind enterprise
  web development.
- The lab-based practicals, building on the theoretical knowledge from lectures, provide
  exposure to the frameworks, tools and practical skills required to develop and build
  enterprise web apps.
- The practical content will use industry standard technologies, tools and techniques.
- Student will be encouraged to enhance their lab work and assessment submissions
  using self-directed research and learning into the state-of-the-art for enterprise
  web app development.
