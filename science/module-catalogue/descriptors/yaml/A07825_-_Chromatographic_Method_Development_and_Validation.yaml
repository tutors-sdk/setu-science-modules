reference: A07825
full_title: Chromatographic Method Development and Validation
short_title: Chroma Method Dev & Validation
credits: 5
level: Intermediate
author: DCONNOLLY
history_comment: ''
school: Science and Computing
department: Science
cluster: Analytical Science
aim: This module provides an outline of method planning and development in the analytical
  process. The importance and practices of validation activities and analytical method
  transfer will be described. This module also expands on the theory of chromatographic
  separation techniques to give an advanced understanding of the use of High Performance
  Liquid Chromatography (HPLC) and Gas Chromatography (GC) with respect to pharmaceutical,
  food and environmental applications. A necessary background will be provided to
  give the student the ability to select an appropriate separation technique and develop
  a method for a given analysis. The principles and practices of the validation of
  chromatographic methods will also be emphasised.
