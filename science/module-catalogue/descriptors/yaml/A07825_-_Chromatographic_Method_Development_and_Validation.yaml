indicative_content:
- Optimisation and the quantitative evaluation of liquid-liquid extraction methods
- Principles of chromatographic band broadening and strategies used to minimise band
  broadening in both HPLC and GC methods
- Quantitative evaluation of chromatographic performance
- Design of HPLC columns (particle technology and stationary phase chemistry)
- Method development strategies for neutral and ionisable molecules in reversed phase
  liquid chromatography
- Development of gradient methods in liquid chromatography
- Qualitative and quantitative analysis in liquid chromatography
- Method validation strategies
- Sample preparation strategies prior to chromatography, including filtration, centrifugation,
  ultrafiltration, preconcentration
- Associated laboratory-based experiments to supplement and augment the above content
learning_outcomes:
- Determine the keys factors associated with method development and relate how method
  parameters will affect subsequent chromatography.
- Demonstrate the principles and practices of analytical method validation and outline
  a systematic approach to validation experimentation.
- Apply High Performance Liquid Chromatography (HPLC) and Gas Chromatography (GC)
  to the separation of analytes.
- Compare and contrast the techniques, instrumentation, apparatus and sample preparation
  techniques for HPLC and GC.
- Operate, calibrate and qualify associated laboratory instrumentation for sample
  analysis.
- Employ a variety of sample preparation procedures to pre-treat a sample prior to
  chromatographic analysis.
