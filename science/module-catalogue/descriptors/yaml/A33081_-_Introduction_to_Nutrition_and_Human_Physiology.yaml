aim: This module introduces the study of nutrition and the basics of human physiology.
  The student will gain an understanding of the fundamentals of the functioning of
  the human body from homeostasis to the functioning of cells and the various body
  systems. The student will also develop their knowledge in the role of nutrients
  in human health and evaluate diets using current methods.
