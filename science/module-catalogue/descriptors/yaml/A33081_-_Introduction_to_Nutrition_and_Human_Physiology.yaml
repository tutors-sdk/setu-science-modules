indicative_content:
- Basics of nutrition
- Fundamentals of human physiology including homeostasis and cellular physiology.
- Structure and functions of the various body systems with nutritional significance
  including the cardiovascular, nervous, digestive, hepatic, renal, respiratory, muscular
  and immune systems.
- 'Nutrients in food and their role in health: proteins, fats, carbohydrates, vitamins,
  minerals.'
- Food habits and their impact on nutritional intake.
- Dietary analysis and assessment of dietary intake.
learning_outcomes:
- Define nutrition and discuss the basics of a healthy diet.
- Explain homeostasis and cellular physiology as related to nutrition.
- Describe the structure and functions of body systems and their role in maintaining
  homeostasis.
- Explain the role of nutrients in health.
- Discuss the influences of food habits on nutritional intake.
- Evaluate diets using a dietary analysis programme.
