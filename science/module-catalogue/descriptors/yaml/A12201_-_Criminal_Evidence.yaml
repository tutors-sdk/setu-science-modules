indicative_content:
- Items and classification of evidence. Function of Judge and jury in criminal cases.
  Relevance, and weight of evidence
- The burden and standard of proof in criminal cases
- 'The testimony of witnesses. The competence and compellability of witnesses: spouses
  and former spouses; the children; the accused; co-accused as witnesses in criminal
  cases'
- Corroboration in criminal cases
- Hearsay in criminal cases. Confessions
- Unlawfully obtained evidence - admissibility and judicial discretion
- Character of evidence
- Similar fact evidence
- Expert and opinion evidence - preparation and presentation of export witness reports
- Privilege
learning_outcomes:
- Assess the rules which govern the admissibility and receivability of evidence during
  the criminal trial.
- Summarise the critical facts, legal issues and decisions in court judgments which
  concern the rules of criminal evidence.
- Demonstrate both a practical and theoretical understanding of the rules which govern
  the admissibility of witness testimony during the criminal trial process including
  the evidence of expert witnesses.
- Generate an expert witness report based on the student's interpretation of technical
  information discerned from a hypothetical scenario.
