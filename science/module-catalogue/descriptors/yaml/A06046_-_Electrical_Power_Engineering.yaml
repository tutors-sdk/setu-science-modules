indicative_content:
- Power generation network sources; traditional, wind power and solar.
- Power transmission topologies and equipment.
- Power distribution topologies and equipment.
- Centralised and distributed network management
- Protective relays, strategies and associated transducers.
- Preventative Maintenance & Electrical Safety
- Load, BIL, Power flow, Fault, and stability calculations
- 'Typical project: Design applications to calculate load unbalance and/or perform
  a power flow analyse for a network.'
learning_outcomes:
- Describe the operation, application, control and function of typical electrical
  transmission equipment and switchgear.
- Describe the operation, application, control and function of typical electrical
  distribution equipment and switchgear.
- Describe and compare transmission and distribution topologies.
- Explain the preventative maintenance procedures and the safety requirements for
  typical medium voltage and high voltage equipment.
- Perform typical distribution and transmission calculations, circuit design and simulation
  e.g. Load, BIL, Power flow, Fault, and stability calculations.
- Demonstrate the professional, ethical and effective communication skills of a professional
  engineer.
learning_and_teaching_methods:
- The course will consist of lectures, laboratories, mini project and formative assessments.
- The emphasis on course delivery will to engage the student in the learning of the
  material, through the integration of the course materials, with the real case studies
  in laboratories and mini project.
- The formative assignments will be used to provide an opportunity for the student
  to engage with the material, before it is applied, to maximise the learning opportunities
  for the student.
- Self-directed learning, moodle, and recommended software.
