reference: A09830
full_title: Tax for Horticulture
short_title: Tax for Horticulture
credits: 5
level: Intermediate
author: LWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: This module will provide students with knowledge and practical skills to comply
  with obligations relating to the self-assessment and payment of Value Added Tax
  (VAT), Income Taxes, Universal Social Charge (USC), Pay Related Social Insurance
  (PRSI) and minimise business exposure to Capital Gains Tax (CGT) and Capital Acquisitions
  Tax (CAT).
