indicative_content:
- 'VAT: how the VAT system operates, registration, records, returns'
- 'Income taxes, USC and PRSI: how to calculate taxable income. Calculation of liability
  (owner''s liability and on behalf of employees); required records; payment and filing
  obligations'
- 'CGT: how CGT operates; business related exemptions and reliefs'
- 'CAT: how CAT operates; reliefs for the acquisition of a farm or business'
learning_outcomes:
- Complete the basic requirements of the VAT system.
- Calculate taxable income and liability for the purpose of income taxes and determine
  payment and filing obligations.
- Prepare income tax, USC and PRSI records required as an employer.
- Illustrate how CGT and CAT operates, and the exemptions and reliefs available to
  reduce business exposure to CGT and CAT liability on the transfer of a farm or business.
learning_and_teaching_methods:
- Lecturers and practical exercises.
- Class and group discussions.
- Pre-lecture preparation of readings and exercises for in-class discussion.
- Self-study of assigned readings, exercises and texts.
