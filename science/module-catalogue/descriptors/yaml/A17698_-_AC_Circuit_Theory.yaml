reference: A17698
full_title: A.C. Circuit Theory
short_title: A.C. Circuit Theory
credits: 5
level: Introductory
author: PJCREGG
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electrical Engineering
aim: This module follows on from D.C. Circuit Theory. From RC & RL step response,
  square wave response is considered leading to sinusoidal response. Reactance and
  impedance are introduced and treated through phasor and complex representations.
  Frequency response of series RC, RL circuits is considered leading to series resonant
  RLC circuits. AC generators and motors, and transformers are treated with equivalent
  circuits. Teaching is carried out in the classroom and laboratory.
