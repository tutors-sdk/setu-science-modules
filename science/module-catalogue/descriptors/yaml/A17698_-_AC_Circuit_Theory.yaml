indicative_content:
- 'Analysis: reactance, impedance, phasor, complex, resonance, power factor correction'
- Electromagnetic Induction & AC machines, inductive energy, free wheeling diodes
learning_outcomes:
- Treat an AC circuit and predict the amplitudes and phases of voltages and currents.
- Produce magnitude and phase plots for series RC, RL & RLC circuits.
- Describe the generation of sinusoidal AC voltage, based on a simple generator model.
- Treat a transformer and AC motor through equivalent circuits.
- Demonstrate a practical ability to develop, troubleshoot, test, analyse and report
  on AC circuits.
