assessment_criteria:
- '<40%: No understanding of the basic concept of regulatory affairs and compliance.
  Unable to carry out critical thinking of subject area.'
- '40%-49%: Is able to understand the regulatory affairs and compliance philosophies.
  May have some difficulty with critical thinking.'
- '50%-59%: All the above in addition to evaluation of legislation and documentation.
  Correctly make suggestions for correct incorporation of new legislation and able
  to write quality documentation.'
- '60%-69%: In addition to the above, good critical thinking and decision making abilities.
  Shows a high level of competence and efficiency in the subject area.'
- '70%-100%: All previous to excellent level. Be able to describe and discuss regulatory
  affairs and compliance to the legislation pertaining to the pharmaceutical and healthcare
  industries.'
