reference: A33502
full_title: Regulatory affairs
short_title: Regulatory affairs
credits: 10
level: Advanced
author: ADONEGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Quality, Regulatory and Compliance
aim: This module will develop the students competency in identifying, interpreting
  and applying the regulations and procedures involved in obtaining and maintaining
  marketing authorisations in European and worldwide markets, and procedures to ensure
  compliance to pharmaceutical legislation.
programmes:
- timetable: PHAR-0022
  code: WD_SGMPT_B
  name: BSc (Hons) in Good Manufacturing Practice and Technology
  stage: 4
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Introduction to regulatory agencies, national EU and export markets
- Overview of the development of the regulations including directivsd egulations and
  guidelines including 2001/83/EC
- Role of the regulatory affairs professional in compliance and inspections in the
  pharmaceutical industry
- Application procedures for Marketing authorisation including National centralised
  Decentralised nad mutual recognition procedures
- Legal basis for applications, technical requirements and the common technical document
- Maintenance of marketing authorisations , renewals variations
- Introduction to pharmacovigilance
learning_outcomes:
- Determine the agencies operating within the global pharmaceutical sector and their
  role in the regulation of all aspects of the regulation for the pharmaceutical industry.
- Appraise the importance of the role of the regulatory affairs professional and their
  link to operations functions within the industry from development phase, to ensure
  compliance at all stages.
- Compare and contrast the possible application routes to be followed to obtain a
  marketing authorisation in various markets, and apply a suitable strategy to meet
  the company's objectives and ensure a successful outcome.
- Evaluate the relevant information necessary to be submitted to obtain and maintain
  marketing authorisations in major markets and compilation of the required documentation
  for submission of initial and ongoing submissions.
- Monitor the post-marketing obligations of the pharmaceutical manufacturer and MA
  holder in the on-going safety monitoring of pharmaceutical products to ensure compliance
  with the regulations.
