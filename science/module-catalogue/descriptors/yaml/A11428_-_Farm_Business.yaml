- 'McDonnell, J., M. Kirk, K. Connolly, C. Finlay and T. Curran. _A Guide to Transferring
  the Family Farm_. Ireland: Teagasc, 2015.'
- 'O''Sullivan, M. _The Farmers Handbook_. Ireland: Agriculture Advisory Alliance,
  2016.'
supplementary_material:
