assessment_criteria:
- '<40%: Inadequate understanding of the fundamentals of farm business and insufficient
  competence in their use.'
- '40%-49%: Ability to show a basic knowledge. Basic level of knowledge of chosen
  topic.'
- '50%-59%: As well as the above, the student will be able to demonstrate an understanding
  of some of the complexities of farm business management competency in their use.'
- '60%-69%: In addition to the above, the student will demonstrate a more detailed
  knowledge of farm business and a high level of competence in the area use. Display
  a high level of knowledge of chosen research topic, supplemented by an ability to
  present this knowledge to a high technical standard.'
- '70%-100%: All of the above to an excellent level. The above advanced knowledge
  of the topic will be supported by superior skills.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
essential_material:
