reference: A11428
full_title: Farm Business
short_title: Farm Business
credits: 5
level: Intermediate
author: TWOODCOCK
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: This module will enable the student to acquire an in-depth knowledge of farm
  business planning, as well as succession and inheritance issues. The module will
  enable students to interpret farm accounts and outline how financial performance
  can be improved.
