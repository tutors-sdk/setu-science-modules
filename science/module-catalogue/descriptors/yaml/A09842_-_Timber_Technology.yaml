corequisites: []
indicative_content:
- The market for wood-based products in Ireland
- Round wood grading and storage
- Round wood conversion processes in softwood and hardwood sawmills
- Timber drying
- Wood preservation and wood modification
- Engineered timber products incl. panel boards
- Wood combustion and combustion technology
learning_outcomes:
- Describe the Irish supply chain for wood-based products.
- Outline the production flow in softwood mills, hardwood mills, and board mills using
  the correct terminology.
- Name and explain the grading parameters for round wood and sawn timber and relate
  it to forest management decisions.
- Describe the requirements for storage of round wood logs and sawn timber.
- Define the key concepts of the wood/water relationships involved in timber drying.
- Describe basic combustion technology and relate it to the developing wood energy
  market in Ireland.
- Describe the possibilities for enhancing wood properties through timber preservation,
  engineered wood products and wood modification.
- Compare the effectiveness of different strategies adopted by sawmills to maximise
  yield from round wood.
learning_and_teaching_methods:
- Key concepts will be described in detail in lectures.
- A number of field trips will be organised to Irish wood industries, where the interrelation
  between the round wood material and the finished product will be explored along
  with current production technology.
- Students will be encouraged to independently study recommended reading and video
  clips provided on the module's Moodle page.
