reference: A09842
full_title: Timber Technology
short_title: Timber Technology
credits: 5
level: Introductory
author: MPEDINI
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: In this module students will deal with wood as an end product rather than as
  a raw material. Through factory visits students will be studying the main conversion
  processes from round wood to finished product. Students will also get the opportunity
  to explore the properties and limitations of wood as a material in conjunction with
  other materials (wood composites). Finally, the possibilities of improving timber
  properties through preservative treatment and wood modification will be explored.
