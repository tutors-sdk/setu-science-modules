reference: A13090
full_title: Food Traceability and Bioanalysis
short_title: Food Traceability Bioanalysis
credits: 5
level: Advanced
author: DOMEARA
history_comment: ''
school: Science and Computing
department: Science
cluster: Food Science
aim: This module introduces the student to the concerns arising from the increasing
  globalisation of the food supply chain, and addresses the systems used to ensure
  food safety and traceability throughout the supply chain, from producer to consumer.
  In addition, the students will advance their knowledge and skills in genetics and
  genomics in relation to food traceability and diagnostics. Students will also learn
  about genetically modified foodstuffs and how they are detected. The module will
  highlight the regulations within the EU, and will focus on current and emerging
  methods of food traceability, both electronic and diagnostic (assays and molecular).
