indicative_content:
- EU traceability legislation, its current relevance with an emphasis on recent case
  studies
- Emerging food safety, traceability and security issues
- Traceability systems
- DNA-based diagnostic methodologies such as real-time PCR, DNA sequencing, bioinformatics,
  single nucleotide polymorphisms (SNPs) and metabarcoding
- Non-molecular based methodologies for food authentication such as chromatography,
  immunoassays and electronic traceability systems
- Review learning progress using continuous assessment methodologies
- Review and compare relevant literature articles
learning_outcomes:
- Compare the essential components of a food traceability and management system, and
  discuss the reasons and strategies required for food recall and withdrawal actions.
- Critique food safety and security issues and their influence on future food production.
- Evaluate the benefits and disadvantages of genetic manipulation of a plant or animal
  to agriculture and society.
- Evaluate the uses and applications of DNA-based diagnostic technologies in relation
  to food/feed safety and traceability systems.
- Design and optimise diagnostic assays for food traceability.
- Compare various methods for use in food authentication and traceability.
- Appraise the legislative systems governing food/feed traceability (RASFF, TRACES
  etc.).
learning_and_teaching_methods:
