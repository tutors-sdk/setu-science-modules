indicative_content:
- Work placement in pharmaceutical or related company or research laboratory, with
  exposure to a range of laboratory and scientific activities
- Exposure to a range of laboratory techniques working to Standard Operating Procedures
  (SOPs) in a Good Laboratory Practice (GLP) context & ability to carry out work following
  instructions, according to these SOPs
- Preparation of reports, both oral and written, on work carried out over an extended
  time frame, including maintenance of a weekly activity and reflection journal
- Presentation of reports at seminar and oral, if appropriate
- Assessment of the quality systems that apply in a regulated pharmaceutical company
  (or research equivalent) in the context of knowledge acquired in the course content
  of the degree programme
- Interpretation and critical evaluation of results of scientific experimentation
- Ability to work individually and as part of a team
learning_outcomes:
- Plan for an interview to secure placement.
- Plan learning objectives for the placement.
- Operate independently and/or as part of a team towards the set objectives of the
  pharmaceutical / Healthcare or related enterprise.
- Apply competently their pharmaceutical knowledge and skills in a range of settings.
- Practise safely pharmaceutical / Healthcare related skills and employ good manufacturing
  practices.
- Examine their personal, professional and technical achievements on the placement.
- Communicate their activities and assessment of the pharmaceutical / Healthcare or
  related enterprise in a professional manner.
- Critically reflect upon their learning experiences by using weekly reflective logs
  as a self-assessment tool and produce an end-of-placement written report (assignment).
learning_and_teaching_methods:
- Training in laboratory work carried out in a regulated environment working to accredited
  good laboratory practice (GLP) standards.
- Reporting of scientific data and analysis to GLP standards.
- Scientific report and self-assessment using a weekly activity and reflection journal.
