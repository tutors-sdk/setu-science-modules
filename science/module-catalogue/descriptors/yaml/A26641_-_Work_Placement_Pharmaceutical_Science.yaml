reference: A26641
full_title: Work Placement (Pharmaceutical Science)
short_title: Work Placement (Pharm Science)
credits: 30
level: Intermediate
author: HHUGHES
history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: Students will be placed for work experience in a pharmaceutical or related company
  or a research laboratory for approximately nine months, between January and September
  of the third year of their programme. The nine months placement is designed to meet
  the needs of industry, but a minimum of 15 weeks placement is required to gain the
  credits for the module. The placement is designed to allow learners to apply and
  develop their knowledge and skills in a pharmaceutical company or related environment,
  working to accredited quality standards, thus enhancing their professional development.
  The placement will be supervised by a WIT lecturer and an industrial supervisor.
  Each student is expected to monitor their own performance by maintaining a weekly
  activity and reflection journal. Additionally, they will be required to submit a
  final report (assignment) on their placement detailing what they did and the skills
  they learned. The employer submits an evaluation of the students work at the end
  of the placement. Placement is assessed on a pass/fail basis. In order to gain credits
  for this module, the student must submit all relevant documentation to the placement
  coordinator. A mid-placement review will take place in the form of a site visit
  by the academic supervisor, where feasible, with on-going monitoring of the student
  by the industrial supervisor. Any problems will be dealt with in a timely manner.
