  status: M
prerequisites: []
corequisites: []
indicative_content:
- Definition of calibration; review of the purpose of calibration and frequency of
  calibration; the role of the National Standards Authority of Ireland (NSAI) and
  international bodies
- Review of GMP requirements for equipment calibration and the maintenance of calibration
  documentation (procedure and records); identification of calibrated from non-calibrated
  equipment
- Measurement techniques mass, temperature dimension, pressure and the extent of these
  in pharmaceutical industry - calibration of instruments for these measurements
- Setting up logbooks for the calibration
- 'Choose from the following list of equipment: analytical balance, callipers, pH
  meter, conductivity meter, hygrometers, UV-visible spectrometers, microscopes'
- Volumetric flasks and graduated cylinders, pipettes, micro-pipettes, thermometers,
  autoclaves, incubators, fridges, freezers
- Calibration, operation and maintenance of equipment
- Primary and secondary calibration in temperature measurement
learning_outcomes:
- Discuss the principles of calibration in Quality Assurance and the external agencies
  involved.
- Distinguish between calibrated and non-calibrated equipment, calibration certificates
  and records.
- Explain the principles of measurement and techniques involved for routine process
  use and for calibration.
- Summarise a calibration procedure and carry out a calibration of a simple item of
  equipment.
