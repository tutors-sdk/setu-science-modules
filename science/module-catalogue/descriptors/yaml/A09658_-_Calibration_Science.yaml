reference: A09658
full_title: Calibration Science
short_title: Calibration Science
credits: 5
level: Introductory
author: ADONEGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Quality, Regulatory and Compliance
aim: This module covers all aspects of calibration within the pharmaceutical industry.
  Students will learn and observe the practice of performing calibration on routine
  items of equipment. They will be given the skills to develop a calibration schedule
  taking into consideration the frequency, how critical the equipment is to the manufacturing
  process and is GMP compliant.
