corequisites: []
indicative_content:
- Students will be required to attend at their voluntary work-placement at the required
  dates and times and carry out their assigned duties in a professional manner
- Students will be required to meet with their voluntary work-place and college mentor
  to discuss their progress
- Students will be required to complete their work-placement as per their learning
  agreement
learning_outcomes:
- Show enhanced communication & interpersonal skills.
- Employ personal autonomy and take responsibility for own work and behaviour in a
  work place.
- Demonstrate a greater level of management, analytical and teamwork skills.
- Integrate relevant practical work experience with academic theory.
learning_and_teaching_methods:
- Work experience.
- Review with employer.
- Review with college mentor.
