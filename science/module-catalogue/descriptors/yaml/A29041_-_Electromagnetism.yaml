indicative_content:
- Electric force, field and potential, Gauss's law, capacitors and dielectrics.
- EMF, DC circuits, Kirchoff's laws and Wheatstone bridge;
- Magnetic fields, force on a moving charge, force on a current carrying wire. Biot-Savart
  and Ampere's laws. Hall Effect.
- Electric and magnetic dipoles.
- Electromagnetic induction, Faraday's and Lenz's Laws.
- Transformer and basic AC circuits
- 'Vector Calculus: Differentiation, integration, Line, surface and volume integrals,
  Div, Grad, Curl.'
- Divergence theorem, Stokes' Theorem.
- Maxwell equations integral and differential forms and the wave equation
learning_outcomes:
- Apply electric and magnetic field laws to solve a range of problems.
- Define and explain a range of basic terms in electromagnetism.
- Use vector calculus to solve problems in electromagnetism.
- Apply problem-solving and investigative techniques in a laboratory context.
- Communicate practical work effectively in the form of laboratory reports.
learning_and_teaching_methods:
- Lectures
- Tutorials
- laboratory work. The integrated practical programme is designed to run in parallel
  with lectures and allows the student to develop a range of experimental skills.
  The importance of planning of experiments, data acquisition, and data analysis will
  be emphasized throughout.
