indicative_content:
- Nature of projects, project lifecycles and project stages
- 'Development methodologies: Waterfall; Lean; Kaizen; Agile; Scrum'
- Organisational influence on projects and project life cycles
- 'Role and skills of project managers: Leadership; Resource Allocation; HR Implications'
- Project Planning and Estimation
- 'Project Execution: reporting and communication'
- 'Project Completion and Handover: monitoring and control'
- Change Management tools and techniques
- Strategic and Environmental drivers of change
- Understanding and overcoming resistance to change
learning_outcomes:
- Justify systems analysis and design project management skills.
- Evaluate the risks, issues, and critical success factors associated with systems
  analysis & design and software development projects.
- Create a project plan, informed by appropriate industry standards and including
  scope definition, risk assessment, task breakdown, team selection, estimates, communication
  mechanisms and progress evaluation and reporting using an appropriate project lifecycle.
- Manage project planning, estimation, monitoring and control, communication and reporting
  by employing appropriate software.
- Critique the role of change management in project management.
learning_and_teaching_methods:
- The module will be delivered by lectures, practical computer lab lectures, class
  discussion, case studies and self-directed learning.
- For online delivery, the lectures and practical's will be a combination of comprehensive
  rich media instructional content (notes), interactive synchronous video (live webinars/classes)
  and asynchronous interactive video playback (on-demand).
