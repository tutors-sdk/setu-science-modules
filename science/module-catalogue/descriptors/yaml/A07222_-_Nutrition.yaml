reference: A07222
full_title: Nutrition
short_title: Nutrition
credits: 5
level: Introductory
author: EKENT
history_comment: ''
school: Science and Computing
department: Science
cluster: Food Science
aim: This module introduces the study of nutrition and the foundations of healthy
  eating. It will cover nutrients in food, and their role in health and the application
  of nutritional knowledge.
programmes:
- timetable: SCIE-0031
  code: WD_SFDSC_D
  name: Bachelor of Science in Food Science with Business
  stage: 2
  semester: 3
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Study of nutrition and food habits
- Assessing nutritional status
- Basics of a healthy diet
- Dietary analysis, assessing dietary intake
- 'The nutrients in food and their role in health: proteins, fats, carbohydrates,
  vitamins, minerals'
- The application of nutritional knowledge, pregnancy and lactation, infants, children
  and adolescents, adults and the elderly population
learning_outcomes:
- Define nutrition and discuss the basics of a healthy diet.
- Identify ways of assessing nutritional status.
- Discuss the influences on eating habits.
- Discuss nutrients in various food groups.
- Explain the role of nutrients in health.
- Review diets using dietary analysis programmes.
- Discuss the application of nutritional knowledge across the life span.
learning_and_teaching_methods:
- Lectures.
- Case studies.
- Group discussions and presentations.
- Use of Dietary Analysis computer programme.
