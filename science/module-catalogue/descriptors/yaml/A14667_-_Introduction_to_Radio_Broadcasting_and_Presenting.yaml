reference: A14667
full_title: Introduction to Radio Broadcasting and Presenting
short_title: Radio Broadcasting
credits: 10
level: Introductory
author: ROCONNOR
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Media Production
aim: The module is a broad, practical introduction to writing for radio and to practical
  skills of radio presentation including news reading, editing and recording skills.
  It includes an overview of the Irish radio industry, programming, journalism and
  music policy and legal considerations for broadcasters.
programmes:
- timetable: ''
  code: WD_BRADO_SP
  name: Certificate in Introduction to Radio Broadcast Journalism & Presenting
  stage: 1
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Overview of the Irish radio landscape: history, structures and organisation'
- Introduction to the work of a professional radio journalist and presenter
- Introduction to radio broadcast legislation and BAI codes for presenters and journalists.
- Introduction to practical skills of radio broadcasting and presenting including
  news reading; interviewing for audio; scriptwriting for audio; journalistic recording
  and editing; skills of on-air reading and speech presentation; skills of on-air
  programme presenting.
learning_outcomes:
- Plan scripts and running orders for a radio broadcast.
- Record and edit audio material for radio broadcast.
- Present speech content in a radio setting.
- Apply legal and ethical guidelines relating to broadcast media.
- Appraise the role of the radio journalist and presenter within the Irish radio industry.
learning_and_teaching_methods:
- The module will be delivered using a combination of lectures and practical sessions
  including practical seminars conducted by experienced industry practitioners on
  their experience of various roles in the industry.
- The practical sessions will take place in a working commercial radio broadcasting
  environment and will include group and individual work.
- All students are required to complete a Reflective Journal in which they document
  and contextualise their developing practical skills and theoretical knowledge.
- The programme does include a significant component of independent learning most
  notably where students work, individually and in groups, through a structured, progressive
  sequence of practical assignments that are aligned with the module learning outcomes.
