assessment_criteria:
- '<40%: Unable to research, prepare and present radio content. Unable to use the
  appropriate tools for recording and editing. Unable to demonstrate any understanding
  of the broadcast domain.'
- '40%-49%: Be able to research, prepare and present simple radio content and use
  the appropriate tools.'
- '50%-59%: In addition, be able to research, prepare and present more complex content
  that demonstrate a deeper understand of the broadcast domain. Demonstrate an ability
  to discover and integrate related knowledge in other knowledge domains. Strict adherence
  to legal and ethical guidelines'
- '60%-69%: All of the above, plus be able to add features to a complex radio content
  not presented in the module by experimenting with the appropriate skills and tools.'
- '70%-100%: All the above to an excellent level. Be able to analyse and design sophisticated
  broadcast content to a high standard for a range of both complex and unforeseen
  requirements through the use and modification of appropriate skills and tools.'
