indicative_content:
- The Relational Model and Relational Database Management System (RDBMS)
- Database Analysis & Design
- Entity Relationship Modelling & Normalisation
- SQL Data definition & manipulation
- Data persistence, ACID transaction management and distributed databases
learning_outcomes:
- Examine a business scenario to design a suitable relational database solution.
- Construct entity relationship (ER) diagrams from business scenarios and reproduce
  those diagrams as normalised relations ready for database implementation.
- Construct a physical database design.
- Create a relational database in business using SQL Data Definition Language (DDL).
- Construct queries on a relational database using SQL Data Manipulation Language
  (DML).
- Discuss the concepts of data persistence, ACID transaction management and database
  distribution.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures.
- The practical classes will encourage group work particularly for the relational
  modelling module content.
