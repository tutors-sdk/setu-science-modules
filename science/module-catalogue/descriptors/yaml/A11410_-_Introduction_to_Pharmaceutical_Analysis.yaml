reference: A11410
full_title: Introduction to Pharmaceutical Analysis
short_title: Intro to Pharma Analysis
credits: 10
level: Introductory
author: EOWENS
history_comment: ''
school: Science and Computing
department: Science
cluster: Analytical Science
aim: The aim of the module is to introduce the student to the basic principles of
  chemical analysis for the identification, purification and separation of organic
  molecules. The techniques discussed will be techniques that are routinely used in
  the QC/QA or research laboratories of a pharmaceutical company.
programmes:
- timetable: PHAR-0008
  code: WD_SGMPT_C
  name: Higher Certificate in Science in Good Manufacturing Practice and Technology
  stage: 1
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Identify common organic functional groups
- Name simple organic compounds including isomers, saturated and unsaturated compounds
- 'Introduction to spectroscopic techniques: Ultraviolet (UV), Infrared (IR)'
- 'Introduction to chromatographic techniques: High Performance Liquid Chromatography
  (HPLC), Gas Chromatography (GC)'
- Use of Karl Fischer titration for moisture determination in quality control
- Melting point determinations for sample purity
- Thermogravimetric and Differential Scanning Calorimetry (DSC) analysis for sample
  composition and purity determination
- Refractometry for sample composition and purity determination
- Viscosity and specific gravity for sample composition and purity determination
learning_outcomes:
- Identify the organic functional groups in a pharmaceutical compound, name basic
  organic compounds using IUPAC nomenclature.
- Describe the basic components and basic principles of UV/Vis, IR, HPLC and GC instrumentation.
- Record an IR spectra of a solid and a liquid sample and identify characteristic
  absorption peaks of pharmaceutical compounds.
- Record a UV/Vis spectrum and a calibration graph. Using the calibration graph determine
  the concentration of a sample and its molar extinction coefficient.
- Construct a calibration graph of peak area against concentration for a compound
  using HPLC and GC; use the calibration graph to determine the concentration of a
  sample; separate a simple two component mixture using HPLC and GC.
- Determine the mp, tg, decomposition temperature, viscosity, specific gravity, water
  content and refraction index of a sample for composition and purity comparison..
- Communicate by written means the results of practical investigations.
