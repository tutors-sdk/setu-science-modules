indicative_content:
- Control weeds using cultural and chemical methods
- Prepare ground by digging, harrowing, rotovating and raking
- Establish a lawn by seeding and sodding
- Plant a range of plants including spring flowering annuals, bulbs, trees and shrubs
- Plant care and maintenance including deadheading, thinning, division, training and
  support
learning_outcomes:
- Show how to prepare the ground for seed sowing and planting.
- Control weeds by chemical and cultural means.
- Show how to prepare the ground and establish a lawn by seeding and sodding.
- Demonstrate how to plant a range of plants and bulbs.
- Demonstrate a range of plant maintenance tasks.
- Complete a record of activities and observations.
- Operate in a team or individually to complete a series of tasks.
learning_and_teaching_methods:
- Practical demonstrations and assignments.
