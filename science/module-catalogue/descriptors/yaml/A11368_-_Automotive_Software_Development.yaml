indicative_content:
- Vehicle electronic architectures
- Automotive software lifecycle
- Automotive software analysis methods and design patterns
- AUTOSAR architecture
- AUTOSAR workflow and tools
- Model Based Development process
- Model specification and code generation tools
- Automotive software testing
learning_outcomes:
- Select how software applications are structured and distributed in an automotive
  environment.
- Critique the AUTOSAR software architecture.
- Integrate industry-standard workflow and tools to develop automotive software.
- Set-up model based development techniques.
- Produce test specifications for distributed software functions.
- Design AUTOSAR standard software components.
learning_and_teaching_methods:
- Combination of lectures and lab-based practicals.
- The lectures will cover the theory and underlying technologies in automotive software
  development.
- The lab-based practicals, building on the theoretical knowledge from the lectures,
  provide the practical skills to design, simulate and test automotive software applications.
- Students will be encouraged to enhance their lab work and assessment submissions
  using self-directed research and learning into the broader automotive industry topics
  and current issues.
