cluster: Business
aim: This module is designed to develop organisational behavioural skills and competencies
  necessary to be an effective manager. It explores areas such as motivation, conflict,
  negotiation, teams and change in order to enhance the students understanding of
  the link between the human elements of the organisation and organisational effectiveness.
