indicative_content:
- 'Motivating and developing others: Understanding motivation; performance evaluations;
  giving and receiving constructive feedback'
- 'Effective negotiation: key elements in a negotiation; distributive and integrative
  bargaining; the bargaining zone and the stages of negotiation; ethical and unethical
  negotiation tactics'
- 'Managing conflict: perspectives on conflict; stages in the conflict process; levels
  of conflict; sources of conflict; managing conflict'
- 'Managing change: external and internal triggers of organisational change; characteristics
  of human response to change; nature of resistance to change; overcoming resistance'
- 'Team-building: team development; team roles; effective teams; diversity in teams;
  sources of problems in teams'
learning_outcomes:
- Integrate theoretical knowledge of organisational behaviour with practical situations.
- Develop the competencies needed to ethically manage behaviours in organisations.
- Determine the importance of continually developing behavioural competencies in organisations.
- Modify behaviour based on experience and reflection.
