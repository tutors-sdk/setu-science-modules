assessment_criteria:
- '<40%: Inability to understand the basic concepts encountered in this module.'
- '40%-49%: Ability to demonstrate a basic understanding of advanced concepts in physical
  optics and photonic devices.'
- '50%-59%: Ability to understand and explain advanced concepts in physical optics
  and photonic devices and describe some applications of photonic systems.'
- '60%-69%: All the above, and in addition, apply problem-solving techniques to problems
  in photonics. Describe some key optical applications of photonic systems used in
  communications and metrology.'
- '70%-100%: All previous to an excellent level. Demonstrates an ability to comprehensively
  discuss the course material and analyse and design a range of photonic systems.'
