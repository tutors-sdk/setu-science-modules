indicative_content:
- Einstein relations, optical feedback and threshold conditions, resonator modes
- 'Laser types: gas, solid-state, semiconductor, quantum well, vertical cavity, and
  parametric lasers'
- Frequency stabilisation, distributed feedback structures
- Mode locking, Q switching
- Optical waveguiding, propagation in optical fibres
- Dielectric waveguide, optical fibre waveguide, waveguide modes
- Fiber-optic communications and technology
- Optical fibre fabrication
- Attenuation and scattering mechanisms
- Dispersion, pulse spreading and bandwidth effects; dispersion compensation
- Optical sources and detection
- 'Light emitting diodes and laser diodes: structures and characteristics; modulation
  schemes'
- Photomultipliers, p-n, pin and avalanche photodiodes, quantum efficiency, response
  speed, bandwidth; noise issues
learning_outcomes:
- Interpret the theory underpinning advanced photonic devices.
- Design and evaluate a range of photonic systems used in communications and metrology.
- Design and test optical communications networks.
- Design and manage various photonic systems.
