reference: A11421
full_title: Introduction to Animal Breeding and Welfare
short_title: Animal Breeding and Welfare
credits: 5
level: Introductory
author: JRYAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will enable the student to acquire the knowledge and skills to manage
  a farm in a way that satisfies the welfare requirements of livestock. It will enable
  the student to acquire the principles, knowledge and skills needed to breed and
  calf cows and rear calves to 12 weeks of age.
programmes:
- timetable: AGRI-0101
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 1
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Reproductive diseases of dairy cows, suckler cows, cattle and sheep
- Dairy and suckler cow welfare
- Cattle welfare
- Breeding management of dairy and suckler cows and young stock
- Sire selection
- Calving process
- Calving problems
- Management and programme for calf rearing
- Systems of calf rearing
learning_outcomes:
- Describe reproductive diseases of dairy cows, suckler cows , cattle and sheep.
- Complete safely a range of skills associated with breeding, calving, feeding with
  both cows and calves due regard to good environmental practice and the animal's
  health and welfare.
- Describe the management and operation requirements associated with both cows and
  calves during the breeding cycle.
- Describe good practices for animal health and welfare.
