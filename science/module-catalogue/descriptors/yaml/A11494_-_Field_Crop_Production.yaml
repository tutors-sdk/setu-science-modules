corequisites: []
indicative_content:
- 'Brassicas: Plan production and management schedules for all year round cabbage,
  sprouts, cauliflower and broccoli production'
- 'Rootcrops: Plan production and management scheduled for vegetable root crops: carrots
  such as parsnips and swedes'
- Potato production and storage
- 'Fruit: Apple production and storage. Extended season strawberry production'
- Onion production and storage
- Evaluate the economics of mixed vegetables, potatoes and fruit
- Produce a plan for 25 ha of mixed vegetables
learning_outcomes:
- Analyse the production of a range of vegetables including brassicas, rootcrops.
- Analyse the production of potatoes.
- Compare different production systems used for fruit crops such as apples, strawberries.
- Plan a production programme for 25ha of mixed vegetables.
- Appraise the economics of producing food crops.
- Demonstrate skills associated with vegetable and fruit production employing proper
  health and safety practices.
- Distinguish good environmental practices in food crop production.
