reference: A13361
full_title: Smart Grid Technology / Renewable Energies
short_title: Smart Grid Tech / Renew Engy
credits: 5
level: Advanced
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Engineering
aim: The student will learn that while the existing electrical power, transmission
  and distribution system has served the world well that a number of factors including
  the intermittency of the increasingly important renewable resources mean that a
  more agile, monitored and distributed grid, a smart grid, will form a part of their
  future. This course begins by highlighting the bountiful but unreliable nature of
  the dominant renewables in use on the electrical grid, wind, hydro and solar photovoltaic.
  The matching of supply and demand, as well as unyielding target of mains frequency
  together with the only slightly less rigid voltage targets, will then be covered.
  At this point, the challenge should be clear, so the final sections of the course
  deal with the solution and technology that would make up the smart grid. This begins
  with consumer monitoring and incentives through smart metering and demand side management,
  follows on with technology to automatically address grid problems and finally is
  completed with an overview of energy storage technologies. Practical work will involve
  building an automated measurement system based on LabVIEW and using the Smart Grid
  Project developed in the previous year of the course.
