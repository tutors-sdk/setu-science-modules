indicative_content:
- Electric grid renewables
- Introduction to energy resources (wind, solar, hydro)
- 'Electrical energy fundamentals: voltage, frequency and supply/demand'
- Challenges of distributed, renewable energy grid integration
- Smart electrical, smart metering and demand side management
- Smart grid sensing, measurement, communications, control & automation
- Energy storage
learning_outcomes:
- Identify the key parameters influencing the electrical power output from a renewable
  energy resources (Wind, Solar, hydro).
- Compare the difficulties posed by integrating renewable energy into a grid with
  the integration of fossil fuel generators.
- Evaluate the relationship between, and requirements imposed for, voltage and frequency
  in an electrical grid and fluctuations in supply/demand.
- Design a smart electrical grid based on current and proposed future technology identifying
  each of the key components, their key parameters and scope and finally their relative
  impacts in addressing typical and atypical grid requirements.
- Test some basic grid fundamentals on a smart grid demonstrator developed by the
  student, based on the Smart Grid Project completed in the previous year of this
  course.
