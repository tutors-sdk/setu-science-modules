indicative_content:
- Role of pharmacopoeias and ICH in pharmaceutical analysis and regulation; contents
  of typical monographs
- Overview of types of pharmaceutical formulations; detailed description of tablet
  production and typical tablet contents
- Structure, function and use of excipients in tablet formulations
- Introduction to statistical quality control in the pharmaceutical Industry; application
  to QC charts for defective products
- 'Operating curves and sampling in pharmaceutical analysis: single and double sampling
  plans'
- Assay and identity testing of pharmaceuticals by pharmacopoeial methods; physical
  tests for tablets
- 'Structure and degradation of typical pharmaceutical products: reaction types and
  examples; stability studies and shelf-life prediction'
- Information sources for pharmaceuticals; use of library and on line resources
learning_outcomes:
- Describe the role of pharmacopoeias in the pharmaceutical industry.
- Use a Pharmacopoeial monograph to analyse drug formulations.
- Describe the content and production of a typical tablet formulation.
- Discuss, with examples, the stability of drug formulations.
- Describe the application of statistical quality control in pharmaceutical production.
- Use Pharmacopeial procedures to identify and test pharmaceuticals.
