cluster: Pharmaceutical Science
aim: This module gives an insight into the application of analytical science to pharmaceutical
  products, and the role of pharmacopoeias in the regulation of the safety and quality
  of pharmaceutical products. The module gives an overview of pharmaceutical production
  and the different types of drug formulations.
