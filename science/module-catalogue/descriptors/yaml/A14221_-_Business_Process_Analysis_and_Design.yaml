assessment_criteria:
- '<40%: Unable to interpret and describe key concepts of business process analysis
  and design.'
- '40%-59%: Be able to describe and discuss key concepts of business process analysis
  and design and ability to discover and integrate related knowledge in other knowledge
  domains.'
- '60%-69%: Be able to solve problems within business process analysis and design
