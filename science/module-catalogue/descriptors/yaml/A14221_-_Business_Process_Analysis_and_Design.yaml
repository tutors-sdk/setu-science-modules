indicative_content:
- Overview of business process change
- Business process management
- Modelling organisations and processes
- Business process analysis
- Business process design
- Process performance management
- Business process management technologies
learning_outcomes:
- Justify the role of business process management within organisations.
- Construct models using appropriate techniques to capture the nature of business
  process.
- Select and apply appropriate analytic techniques to characterise business process
  performance.
- Design business process using appropriate techniques.
- Evaluate the role of information technologies in support of business processes.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and computer based practicals.
- The lectures will be used to introduce new topics and their related concepts. Lectures
  will be supplemented by participative case studies and independent reading on the
  issues covered in the lecture material.
- The practical element is intended to provide the student with the skills needed
  to use and understand technologies available to assist in business process analysis
  and design.
