indicative_content:
- Market analysis and trends
- 'Garden centre planning: Types of garden centre, location, site development, creating
  identity, range of products, security'
- Shop layout and customer flow
- 'Stock control: Planning purchases, making orders, receiving plants, environmental
  requirements, standing areas for plants'
- Promotion and product display, sale promotion, packaging, maintenance of displays,
  quality assurance schemes
- Display and maintenance of plants, sales techniques
learning_outcomes:
- Explore market and industry trends for garden centres.
- Propose recommendations on garden centre planning, including the creation of a safe
  working environment.
- Plan customer flow and product displays.
- Examine stock control systems, management and pricing.
- Explore opportunities for garden centres to balance cash flow.
- Inspect a garden centre layout.
