reference: A06688
full_title: Garden Centre Operations
short_title: Garden Centre Operations
credits: 5
level: Intermediate
author: DFLANAGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Horticulture
aim: This module is designed to equip students with knowledge of garden centre management
  and planning. Students will also learn about promotion, sales methods, display and
  maintenance of garden centre plants. The student will learn how to critique a garden
  centre.
