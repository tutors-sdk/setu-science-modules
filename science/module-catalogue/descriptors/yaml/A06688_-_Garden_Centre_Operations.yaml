assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter. Lacking in
  technical ability/skill and understanding to carry out practical/professional tasks.
  Failure to meet the objectives of projects. Unable to carry out or submit independent
  study and research.'
- '40%-49%: Demonstrates a limited knowledge of the subject matter. Shows some technical
  ability/skill in carrying out and reporting on practical/professional tasks. Attempts
  made to meet objectives and carry out independent study and research. Final result
  lacks balance and arguments undeveloped.'
- '50%-59%: Demonstrates satisfactory general knowledge of the main issues within
  the subject. Logically and competently carries out practical/professional tasks.
  Satisfactory handling and awareness in carrying out independent study and research.
  Reporting and projects adequately structured and referenced.'
- '60%-69%: Demonstrates sound knowledge of the subject matter. Shows ability to analyse
  and logically argue in an effective and mature style. Demonstrates initiative and
  the ability to criticise methods used and appreciation of experimental design when
  carrying out practical/professional tasks. Projects and reporting coherent and soundly
  structured illustrating wide and in depth reading on subject coupled with the proper
  use of references.'
- '70%-100%: Demonstrates authoritative handling of complex material and a highly
  developed and extensive understanding of the subject. Provide well focused analysis
  and convincing argument on the subject. Demonstrates imaginative approach, excellent
  technical ability, awareness, and aptitude in carrying out and reporting on practical/professional
  tasks. Shows initiative, individual thought, and enthusiasm in self-study and independent
  learning.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
