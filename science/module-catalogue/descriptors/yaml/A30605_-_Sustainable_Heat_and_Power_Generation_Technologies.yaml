learning_outcomes:
- Explain the principles of heat and power generation.
- Analyse the characteristics and performance of alternative energy systems.
- Apply standard calculation techniques to solve problems involving energy supply
  and demand.
- Describe, compare and contrast energy storage technologies.
- Calculate and compare costs and benefits of different low and zero carbon technologies.
