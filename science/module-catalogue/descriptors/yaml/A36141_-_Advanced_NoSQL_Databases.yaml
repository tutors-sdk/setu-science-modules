indicative_content:
- Emergence & Drivers of NoSQL databases
- NoSQL Database Concepts & Document Oriented Modelling Techniques
- 'Types of NoSQL Databases: Key-value databases, Document databases, Column family
  databases and Graph databases'
- CAP Theorem
- Data Persistence, Database Consistency and Replication
- Distribution of data and functionality
- NoSQL Database Sharding techniques & Strategies
learning_outcomes:
- Appreciate & explain the relevance and application of NoSQL databases in Organisations.
- Design, Construct and Maintain a schemaless NoSQL database solution.
- Investigate the appropriateness and application of Sharding on NoSQL database Clusters.
- Assess and make judgements on the relevance of data consistency, availability and
  network partition tolerance in relation to NoSQL databases.
- Appraise the application of replication techniques to improve end user productivity
  and efficiency.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures.
- The continuous assessment will require the student to apply the theory and practical
  knowledge gained in the lectures and practicals to design, develop fully operational
  NoSQL database solution to a new business scenario or problem.
