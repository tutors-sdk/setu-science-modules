indicative_content:
- Operating Systems Introduction
- Number Bases
- Boolean Algebra
- Data Representation formats
- Central Processing Units
- Memory Hierarchies
- Operating System utilities
learning_outcomes:
- Identify and explain the role various hardware components play in a computer system.
- Use an operating system on a chosen computer architecture.
- Demonstrate an ability to configure systems using the command line.
- Build and configure an application from source code on an identified platform.
learning_and_teaching_methods:
- This is a skills-based module. Theory is covered in lectures, but the emphasis is
  on lab-based activities.
- The lab hours will be timetabled together.
