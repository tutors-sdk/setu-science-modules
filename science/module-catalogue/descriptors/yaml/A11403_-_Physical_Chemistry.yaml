indicative_content:
- Kinetic molecular theory of gases and the properties of real gases
- Colligative properties of solutions and vapour liquid equilibria
- The first and second laws of thermodynamics; the criterion for spontaneity; Gibbs
  free energy and its relationship to the equilibrium constant
- Chemical kinetics and equilibrium; experimental methods for determining rate laws;
  temperature dependence on rate laws; radiochemical dating and pharmaceutical shelf-life
- Aqueous acid base equilibria
- Solubility and complexation equilibria
learning_outcomes:
- Describe the behaviours of a real and an ideal gas, use the van der Waals equation,
  and relate the van der Waals coefficients to molecular structure. Apply the equation
  for root mean speed, mean free path and Maxwell-Boltzman distribution.
- Apply the integrated rate laws and half-life equations for zero, first and second
  order rate equations. Determine rate laws for zero, first and second order reactions
  using different experimental methodologies.
- Apply the Arrhenius equation to determine the relationship between temperature and
  reaction rate.
- Calculate the change in internal energy, enthalpy and Gibbs free energy of a system.
  Identify the criterion for spontaneity.
- Determine Ka, Kb, Ka, pKb, and describe its relationship between strength and molecular
  structure.
- Determine the solubility of an ionic compound and describe the factors which affect
  its solubility.
- Use a range of techniques to examine the kinetics, energy changes and equilibrium
  constant of a system.
- Communicate by written and verbal means the results of theory and practical-based
  exercises.
