aim: This module will discuss the molecular theory of gases, the behaviour of real
  gases, colligative properties of solutions, vapour liquid equilibria, aqueous acid
  base equilibria, solubility and complexation equilibria, kinetics, and equilibria
  and chemical thermodynamics.
