reference: A13883
full_title: Introduction to Media Development
short_title: Intro. to Media Development
credits: 5
level: Introductory
author: ROCONNOR
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Media Production
aim: This module introduces students to the concepts, tools and technologies surrounding
  media development. Students will gain high-level experience with many of the concepts
  used in media development including user experience, storytelling, digital media
  (social, image, audio & video) and digital media programming.
