prerequisites: []
corequisites: []
indicative_content:
- User Experience fundamentals
- Media delivery platforms, media formats & media tools
- User-centric programming
- Lo-fidelity prototyping
- Digital image manipulation
- Timeline based editing for audiovisual media
- 'Social media: Conversation prism'
learning_outcomes:
- Recall the theoretical and practical principles of user experience.
- Discuss at least one national or international user interface design standard.
- Employ pre-recorded audio/visual media to a prescribed set of requirements.
- Publish an asset online.
learning_and_teaching_methods:
- This module take a practical-driven approach. Concepts are introduced in short talks
  and then worked on in practice through a lab/studio exercises.
- 'Sample assessment: Create and post a video to social media platforms to promote
  a product, place, person or thing.'
- Studio Classes will be delivered in two 2-hour blocks.
- Apple Mac Computer Lab with relevant hardware & software (kept up to date at least
  annually e.g. Adobe CC, iMovie, GarageBand).
- Access to handheld cameras.
