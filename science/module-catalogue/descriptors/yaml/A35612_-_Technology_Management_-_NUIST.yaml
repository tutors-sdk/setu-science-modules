aim: The aim of this module is to prepare individuals with a strategic mind-set, relevant
  to the biomedical sector of Ireland, fine tuned communication skills, and the ability
  to drive enhanced performance through the use of technology. Complex case studies
  involving organisational theory, conflict resolution and effective strategic management
  are core to this module.
