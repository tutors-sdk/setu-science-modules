indicative_content:
- 'Engineering and Technology Management: The management process: Empowerment and
  effective leadership'
- 'Engineering and Technology Management: The regional & Global Context: Sources of
  competitive advantage: Insights into professional imperatives'
- Ethics in Engineering / Technology
- 'Intellectual Property: Creating, Application and Protection: Learning Organisations'
- 'Manufacturing and Production Management: Strategies and Tools'
- 'Manufacturing & Production Management: Strategic importance of maintenance and
  reliability'
- Career Development in a technology company. Managing your boss, peers and subordinates
learning_outcomes:
- Using Kotter's Eight Step Model, synthesise change management tools specific to
  the optimisation of R&D processes in high value organisations.
- Apply the knowledge and comprehension gained in the analysis of complex Enterprise
  Technology Management case studies to provide best in-class frameworks for SME and
  MNC organisations.
- Evaluate complete and/or partial management strategies in respect of the research,
  design and manufacture of modern technological products; both with and without the
  aid of industry standard software support tools.
- Synthesise complete and/or partial management strategies in respect of the research,
  design and and manufacture of modern technological products; both with and without
  the aid of industry standard software support tools.
