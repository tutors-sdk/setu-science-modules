aim: 'The logical outputs of digital circuits are determined by the logical function
  being performed and the logical input states at that particular moment. The design
  of combinational logic circuits is arguably the most important topic in logic design
  and a thorough understanding of the principles of combinational design is an essential
  prerequisite to the design of more complex sequential systems, e.g. counters, registers
  and memories, and categorised as: asynchronous or synchronous. Programmable implementations
  may also be investigated.'
