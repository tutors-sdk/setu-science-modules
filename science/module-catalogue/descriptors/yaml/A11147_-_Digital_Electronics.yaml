indicative_content:
- Number Systems.
- Boolean Algebra, Operators and Codes.
- Applications of combinational & sequential logic.
- Combinational and sequential implementations in digital circuits.
- Logic families.
learning_outcomes:
- Explain the fundamental concepts of combinational and sequential logic design.
- Construct, simplify and convert Boolean expressions.
- Define, analyse and design combinational and sequential logic circuits using SSI/MSI
  components.
- Explain the differences between asynchronous and synchronous sequential circuits
  and implement counter and register applications.
- Interpret data sheets and display a good understanding of the main characteristics
  of the different logic families.
- Demonstrate the ability to build, simulate and test digital circuits.
- Demonstrate a thorough knowledge of number systems, binary operations and codes.
