indicative_content:
- 'Introduction to Quality Management: quality concepts, fitness for use, factors
  affecting quality'
- 'Total Quality Management: quality improvement programmes, customer satisfaction'
- 'Quality Auditing: types of audits, how to conduct a compliance audit'
- 'Teamwork: leadership roles, working as part of a team, key requirements'
- 'Human Resource Development: key aspects of training'
- Problem Solving Techniques and their uses; Pareto Analysis, Cause and Effect Analysis,
  Brainstorming, 5 Why's, Statistical Process Control
- Overview of Quality System standards, documentation
learning_outcomes:
- Communicate in an organisation which has a quality system and standards.
- Design a quality plan for auditing and compliance.
- Examine professional behaviour and develop good communication skills.
- Use techniques of critical thinking, problem-solving and decision making.
- Interpret the various quality standards for preparation of relevant documentation.
