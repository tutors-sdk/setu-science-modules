assessment_criteria:
- '<40%: No understanding of the basic concept of quality management. Unable to carry
  out critical thinking or problem solving techniques.'
- '40%-49%: Is able to understand the quality management philosophies. May have some
  difficulty with critical thinking and problem solving.'
- '50%-59%: All the above in addition to problem solving techniques and teamwork abilities.
  Correctly make suggestions for problem solving in an industrial environment.'
- '60%-69%: In addition to the above, good critical thinking and decision making abilities.
  Shows a high level of competence and efficiency in the quality management techniques.'
- '70%-100%: All previous to excellent level. Be able to describe and discuss quality
  management in a production environment and show initiative in approaching problems.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
