aim: This module covers aspects of quality management, including quality systems and
  standards, quality auditing, teamwork, human resource development and problem-solving
  techniques. It prepares the student for work in a pharmaceutical, food or agri-food
  company, which operate under strict guidelines for production and quality outputs.
