indicative_content:
- Operating System Kernel, Services and Utilities
- System Start-up and Recovery
- 'Filesystems: File Management; File Permissions, etc'
- 'Devices: Mounting/Unmounting; Smart Devices, etc'
- File Sharing
- System Services
- Operating System Monitoring
- Shell Scripting
- Virtualisation
learning_outcomes:
- Explain the behaviour of system services during the boot process and recovery mode.
- Examine various file systems and demonstrate the configuration, navigation, and
  maintenance of a Linux file system using system utilities.
- Demonstrate the use of monitoring tools on a modern operation system.
- Describe the process of planning, implementing and maintaining a small mixed network.
- Automate system management functions by writing shell scripts.
- Appraise and integrate developing technologies through the use of virtualisation
  software.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures.
- The continuous assessment will require the student to apply the theory and practical
  knowledge to a business solution.
