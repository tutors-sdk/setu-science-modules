reference: A09761
full_title: Contamination Control Cleanroom Management
short_title: Contamination Control
credits: 10
level: Introductory
author: BWHELAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Biology
aim: This module covers aspects of Cleanroom design, installation and maintenance.
  Students will be able to work in a Grade A/B Cleanroom and learn the importance
  of cleaning, routine operation and monitoring to maintain the integrity of the area
  to produce Parenteral products.
programmes:
- timetable: FDSC-0011
  code: WD_SGMPT_C
  name: Higher Certificate in Science in Good Manufacturing Practice and Technology
  stage: 2
  semester: 3
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Cleanroom design and classification; fundamentals of air filtration: principles
  of HEPA filtration and HVAC systems'
- Disinfectant efficacy testing, testing the effectiveness of cleaning agents; cleaning
  validation
- Media fill trials using various combinations of equipment/staff/shift patterns;
  environmental monitoring programmes; particulate, microbial, in the 'at rest' and
  'in operation' states
- Barrier/isolator technology as used in the control of contamination in pharmaceutical
  manufacturing facilities
- Clothing and housekeeping practices for the clean room staff and maintenance contractors;
  critical control of clean room entrance practices
- Principles of steam sterilisation and vaporised hydrogen peroxide
- Cleaning, decontamination and segregation of working areas within clean rooms; introduction
  to specialised methods of cleaning and decontaminating clean rooms
learning_outcomes:
- Apply the principles of A/B Cleanroom design and associated barrier technology for
  sterile manufacturing.
- Complete in-media simulation trials to qualify the cleanroom facility, personnel
  and operations.
- Explain how to de-contaminate and monitor the A/B Cleanroom facility.
- Describe a cleaning validation strategy.
learning_and_teaching_methods:
- Lectures.
- Review of literature on aseptic processing.
