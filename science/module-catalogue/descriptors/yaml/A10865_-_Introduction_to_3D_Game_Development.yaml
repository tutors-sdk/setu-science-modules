indicative_content:
- Collision detection
- Navigation
- Environment creation
- Javascript coding
- Object instantiation
- Artificial intelligence
- Rigid bodies
- Assets creation and management
- 3D animation
- User interface
learning_outcomes:
- Code a 3-Dimensional game with the Unity engine with a corresponding GUI.
- Code game mechanics using Javascript.
- Employ both bespoke assets (audio, textures, 3D objects), and built-in assets (audio,
  textures, 3D objects), to create indoors and outdoors environments.
- Code and use navigation (first- and third-person controllers), collision detection,
  and cameras (e.g., view ports, multiple cameras, layers, etc.).
- Use rigid-bodies, particles effects, and manage 3D animations for improved realism.
- Employ and manage NPCs (e.g, AI, Finite-State Machines and navigation).
learning_and_teaching_methods:
- Since this module is focused on developing practical programming skills (i.e., game
  programming for mobile devices), the four contact hours will be delivered in the
  computer labs in the form of two 2-hour practicals.
- Due to the very practical nature of the skills to be acquired in this module, these
  practical sessions will be centred around the idea of learning by doing, whereby
  students develop proficiency in the specified skill set through guided activities,
  and whereby lecturers provide short formal presentations of relevant concepts and
  technologies, as well as practical tips, feedback, and best practices.
