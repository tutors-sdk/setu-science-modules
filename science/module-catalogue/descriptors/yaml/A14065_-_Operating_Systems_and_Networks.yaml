indicative_content:
- Operating system structure, components, services and utilities, virtualisation
- 'Process Management: in-memory process data structures, concurrency, threads, CPU
  scheduling, interprocess communication'
- 'Memory management: memory hierarchy'
- Virtual memory
- File management
- 'Networking concepts: OSI Model, TCP/IP overview; LAN Technologies (Ethernet), IP
  addressing'
- 'Routing: static routes and various dynamic routing protocols between LANs'
- 'Wireless Technologies: 802 Architecture'
learning_outcomes:
- Investigate the memory management, process management and file management components
  of a modern operating system with regard to operation principles, data structure
  requirements and algorithms used.
- Discuss the basic concepts and components of networking.
- Configure a contemporary operating system through the use of command line instructions
  and scripts.
- Communicate the main concepts of wireless and mobile networks.
- Investigate the IP routing process and design and implement an IP addressing scheme
  for a given network scenario.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- This module adopts a hands-on practical approach with weekly laboratories that make
  use of virtualisation and simulation tools.
- Self-directed learning.
