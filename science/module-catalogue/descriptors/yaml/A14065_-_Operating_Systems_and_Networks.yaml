reference: A14065
full_title: Operating Systems and Networks
short_title: Operating Systems and Networks
credits: 5
level: Intermediate
author: DOHALLORAN
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Networks and Cloud
aim: This module introduces the fundamental concepts of operating systems and computer
  networking. The module will concentrate on core operating system components such
  as memory management, process management, file systems and virtualisation. The module
  will provide the student with an understanding of networking terminology, protocol
  models and devices. A brief introduction to routing and wireless technologies will
  also be provided. The student will use simulation and virtualisation tools in the
  practical element of this module.
