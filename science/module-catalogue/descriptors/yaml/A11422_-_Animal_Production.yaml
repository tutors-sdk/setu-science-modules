reference: A11422
full_title: Animal Production
short_title: Animal Production
credits: 5
level: Introductory
author: JRYAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will enable the student to acquire a basic knowledge and the skills
  needed for operating a modern beef, dairy or sheep farm. The student will learn
  about the feeding and management requirements of livestock. Students will gain an
  insight into animal health and welfare, operator health and safety, and good environmental
  practices.
programmes:
- timetable: AGRI-0004
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 1
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Milk quality and yield
- Dairy facilities
- Feeding & management dairy cows
- Diseases of cows
- Rearing replacement cows, breeding cattle
- Economics of dairy production
- Systems of lamb production and associated sheep tasks
- Diseases of sheep
- Economics of sheep production
- Feeding and management of sheep
- Suckler calf production
- Systems of cattle production and associated tasks
- Diseases of cattle
- Economics of cattle production
- Health & safety, First Aid
learning_outcomes:
- Describe the management requirements of different animal production systems such
  as calf to beef, spring milk production and mid season sheep.
- Complete safely operations associated with different animal production systems such
  as cattle to beef, spring milk production and mid season sheep with due regard to
  good environmental practice and the animal's health and welfare.
- Describe good environmental practices in animal production.
- Describe appropriate actions to promote and maintain good animal health and welfare.
- Identify areas where improvement in animal production can be made on the farm.
