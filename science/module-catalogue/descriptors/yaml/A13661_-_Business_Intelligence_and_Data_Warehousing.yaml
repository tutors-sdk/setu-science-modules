indicative_content:
- Introduction to Business Intelligence (BI) concepts, tools and technologies
- Different types of Organisation memory
- 'Data Warehouse Architecture: Design and Development'
- Data Quality and Management. Process of Extraction, Transformation and Loading (ETL)
  of a Data Warehouse
- Data Warehouse Implementation, Maintenance and Trends
- Business Intelligence Tools & Techniques
- Data mining -- fundamentals of analytics -- reading datasets, applying techniques
  required for decision making
- Big data, Text and Web mining -- techniques and data load processes for building
  analysis.
learning_outcomes:
- Assess different types of Organisations Memory for BI solutions.
- Evaluate Data Quality Management and ETL utilities for a Data Warehouse.
- Appraise pre-processing and preparation on the data sets.
- Design and develop a Data Warehouse solution in terms of meeting business requirements.
- Appraise and use Data, Text and Web mining techniques and processes.
- Assess different Integration tools and Processing tools for unstructured, semi-structured
  with structured data.
- Evaluate guidance on Data Governance, Ethics and Policies.
learning_and_teaching_methods:
- The students will be introduced to the theory of the module in lectures, which will
  be interactive and discursive in nature.
- Some topics will be supported with appropriate case studies and examples.
- The theory will be applied in a series of practicals that will be problem solving
  focused and work towards a predefined assignment, all of which is to be completed
  by the end of the semester.
