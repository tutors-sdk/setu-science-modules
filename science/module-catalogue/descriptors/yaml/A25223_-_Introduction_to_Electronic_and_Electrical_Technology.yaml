indicative_content:
- Applications of Boolean Algebra
- Combinational and sequential logic circuits and applications
- Arithmetic circuits, oneshots, multiplexers, decoders and encoders
- Electrical and personal safety, Earthing systems, fuses, MCB's and RCB's
- Cable installation and termination techniques, Electrical Wiring sytems
- Electrical Drawing and schematic generation.
learning_outcomes:
- Explain the fundamental concepts of combinational and sequenctial logic design.
- Evaluate, simplify and covert Boolean expressions.
- Define, analyse, design and build combinational and sequential logic circuits using
  SSI/MSI components.
- Be aware of electrical safety procedures and the function of earthing systems, fuses,
  MCB's and RCB's within Electrical circuits.
- Demonstrate an ability to construct simple electrical wiring systems and basic electrical
  control circuits.
- Generate an electrical schematic using appropriate CAD tools,.
learning_and_teaching_methods:
- Lectures, presentations, reading and problem solving in class.
- Practical electrical installations will be performed in the Workshop
- The student will read supplementary material in their own time.
- Project work, as assigned by the lecturer.
