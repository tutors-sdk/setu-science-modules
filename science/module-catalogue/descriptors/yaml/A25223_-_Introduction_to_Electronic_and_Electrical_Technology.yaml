aim: The aim of this module is to introduce students to the fundamentals of Digital
  Electronics and also to introduce the students to basic Electrical Installation
  practice and Electrical Safety. The principles of combinational and sequential logic,
  circuit elements and their applications are covered. Essential electrical safety,
  protection circuit elements, and good wiring circuitry implementation are included
  via a comprehensive workshop based element. Students will also use CAD to produce
  electrical drawings.
