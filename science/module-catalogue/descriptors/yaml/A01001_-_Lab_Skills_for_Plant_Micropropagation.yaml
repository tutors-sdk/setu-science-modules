assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter. Lacking in
  technical ability/skill and understanding to work effectively in a plant laboratory.'
- '40%-49%: Demonstrate a limited knowledge of the subject matter. Show some technical
  ability/skill in carrying out and reporting on practical tasks.'
- '50%-59%: Demonstrates satisfactory general knowledge of the main issues within
  the subject. Student can logically and competently carry out practical tasks.'
- '60%-69%: Demonstrates sound knowledge of the subject matter. Practicals and reports
  completed to high standard.'
- '70%-100%: Demonstrates excellent technical ability, awareness, and aptitude for
  working with cultured plant cells. Delivers insightful scientific writing. Develops
  high competency in practical areas.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
