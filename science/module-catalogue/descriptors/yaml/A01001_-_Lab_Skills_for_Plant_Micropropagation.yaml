indicative_content:
- 'Maintaining sterile conditions: practice the principles of maintaining sterile
  environments and using lab equipment and glassware correctly to maintain sterility
  and prevent cross contamination'
- 'Commonly used lab calculations: dilutions, molar concentration, commonly used units
  and measurements and converting between these units'
- 'Lab solutions: preparing and sterilizing nutrient media and other common lab solutions
  such as phytohormone stock solutions and reagent doses. Budgeting in the lab'
- 'Measuring plant productivity/stress using parameters such as: stomatal frequency,
  proline content, photosynthetic pigment concentrations and extent of mycorrhizal
  inoculation'
- 'Lab equipment: calibrate and use of a pH meter and a conductivity meter, and the
  safe use of centrifuges and autoclaves'
- 'Plant/cyanobacterial cell cultures: components of nutrient media. Establishment
  and continuous culture of plant callus and liquid cultures. Evaluating the growth
  rate and viability of cultured plant cells'
- 'Micropropagation of plant clones: propagation of whole plants from sterile ex-plant
  material'
- 'Cell death in plants: types of cell death in plants including programmed cell death
  and necrosis and the role of cell death in the plant hypersensitive response. Methods
  of inducing cell death in plants for scientific study, and enumerating two different
  types of cell death using staining techniques'
learning_outcomes:
- Demonstrate the techniques used to maintain aseptic conditions in a plant lab.
- Prepare sterile nutrient media and complete an on-going sub-culturing regime for
  liquid plant and cyanobacterial cell cultures, plant callus and ex-plants.
- Use and troubleshoot a range of commonplace lab equipment.
- Calculate the weight of reagents needed to establish solutions of known concentrations
  and demonstrate proficiency in converting between the units commonly used in the
  plant science laboratory.
- Experiment scientifically, interpret the data obtained, appraise observations, and
  plan further experimentation.
- Investigate concepts/protocols used in laboratory plant science and evaluate their
  use.
