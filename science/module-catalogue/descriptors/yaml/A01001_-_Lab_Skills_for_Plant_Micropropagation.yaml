aim: The module has been designed to enhance the education of science students who
  will benefit from knowledge of plant culturing techniques, or for students who might
  require knowledge of establishment and maintenance of environments suitable for
  sterile culturing of plant, animal or bacterial cultures. Horticultural plant science
  requires innovation and this module will provide students with the basic requirements
  to pursue lab-based project work, and eventually level 9 study in plant science.
