indicative_content:
- 'Food Product Development Innovation: food identification and awareness in food
  product development; culinary ingredients and associated cooking processes; impact
  on food supply and models of food choice; cultural specificity; defining new product
  development concepts, processes and characteristics; Concept generation and ideation
  models; new product development trends, success and failure rates in food product
  development, incorporating competitor analysis and voice of the consumer'
- 'Entrepreneurship: entrepreneurs and entrepreneurship; creativity and opportunity
  recognition; the ingredients of starting a business; capturing and retaining customers;
  ingredients of starting a business; intellectual property issues'
- 'Consumer Behaviour: introduction to consumer behaviour, diversity of consumer behaviour,
  consumer research; the consumer as an individual: needs and motivation; personality,
  perception, learning, attitudes'
- 'Market Research: nature of marketing research theory - role in managerial-decision
  making; process of marketing research and limitations thereof; research design:
  definition of research design; research design alternatives; marketing research
  proposal; Secondary Data Collection and Analysis: primary versus secondary data;
  introduction to primary research data collection methods - quantitative methods;
  qualitative methods'
- 'Sensory Science: sensory methodologies (discrimination tests, descriptive analysis,
  preference or hedonic testing); design of experiment and analysis for sensory testing'
- 'Literature Search: searching the literature - effective use of library information
  sources, science databases, internet; scientific referencing and scientific writing
  skills; preparing an effective PowerPoint presentation on a research topic'
learning_outcomes:
- Evaluate the concepts, theories and practices of product development processes.
- Assess and critique food commodities, their associated characteristics and alterations
  during various wet and dry cooking processes.
- Interpret the fundamentals of food trends, food choices, food supply chains and
  cultural diversity within a gastronomic context.
- Formulate a new food product concept through evaluation and application of various
  food ideation models.
- Critique new product development success factors and reasons for failure within
  an innovative market orientated environment.
- Evaluate consumer behaviour and its applications in marketing.
- Appraise markets and competitors and explain the steps in the marketing research
  process.
- Determine the role and importance of information in the management decision process.
- Develop an entrepreneurial marketing strategy.
- Compile, report and present a review of information on a chosen research topic.
learning_and_teaching_methods:
- Lectures will provide the theory for varied aspects of the module.
- Practical classes in the kitchens will enable students to learn culinary skills.
