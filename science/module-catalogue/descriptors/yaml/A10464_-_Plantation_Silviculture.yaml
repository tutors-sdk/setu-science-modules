reference: A10464
full_title: Plantation Silviculture
short_title: Plantation Silviculture
credits: 5
level: Intermediate
author: NMCCARTHY
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: This module will introduce the whole concept of plantation forestry and the rationales
  behind it. Students will learn about production from plantation forests, and the
  economic, environmental, social and policy issues associated with practice. They
  will learn how to optimise the layout and design of plantations adhering to environmental
  constraints, and study specialised forms of plantation forest along with silvicultural
  systems.
