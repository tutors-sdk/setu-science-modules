indicative_content:
- 'Static Electric Fields: review of Maxwell''s eqns, boundary conditions, Laplace
  equation, field in a trough - analytic solution, numerical approx. and ANSYS.'
- 'Conductors and Insulators: blocks and spheres in fields, induced charges, charge
  density, charge on partial sphere - by geometric simplification and by analytic
  integration. a.c quasi-conductors and quasi-insulators.'
- 'Steady Magnetic Fields: review of Maxwell''s eqns, boundary conditions, magnetic
  scalar & vector potentials, force on a dipole.'
- 'Transmission lines and couplers: Impedance of parallel plate, microstrip ( Hammerstad
  approx.), co-axial; RF hybrids - rat race, quadrature hybrid - function & scattering
  matrix description, phase and group velocity'
- 'Electromagnetic Waves: polarization, power density terms from an antenna: near-field,
  far-field; 3-d (far field) radiation patterns, beamwidth,directivity, gain, Poynting
  vector.'
learning_outcomes:
- Treat the behaviour and characteristics of static electric & magnetic fields at
  boundaries between media.
- Derive the capacitance/inductance and characteristic impedance of standard transmission
  lines.
- Design basic RF couplers, co-axial cables and transmission lines (co-axial, microstrip).
- 'Recognise the basic antennas: short dipole, half-wave dipole and determine the
  key antenna parameters - beam size, directivity & gain, from radiation patterns.'
- Complete the practical program which involves lab experiments and simulations with
  reports.
