reference: A15581
full_title: Electromagnetic Fields & Waves
short_title: Electromagnetic Fields & Waves
credits: 5
level: Advanced
author: PJCREGG
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electronics
aim: This module covers electromagnetic theory with applications in transmission lines,
  couplers and antennas. Maxwell's equations are applied to find boundary conditions
  for static fields. Charge distribution on conducting and insulating blocks in static
  electric fields are treated with emphasis on the sphere. Solutions for total charge
  are obtained though integral methods which also serve for radiation pattern analysis.
  Analysis and design of RF couplers and microstrip lines and assessment of antennas
  is a key goal. Good mathematical and analytical skills are required for this module.
