indicative_content:
- Advanced organic synthesis; Use of nuclear magnetic resonance spectrometry (NMR),
  gas chromatography-mass spectrometry (GC-MS),liquid chromatography-mass spectroscopy
  (LC-MS), infra-red (IR) and UV-kinetics for characterisation and analysis.
- Diode array and advanced high performance liquid chromatography (HPLC) method development
- Chiral separations by GC, LC and CE
- Atomic spectroscopy, GFAAS and associated interferences
- Surface analysis and characterisation of pharmaceutical materials including polymorphism,
  scanning electron microscopy (SEM), interfacial tensiometers and solid state nuclear
  magnetic resonance spectroscopy
- Advanced laboratory work associated with the main techniques included in the module
learning_outcomes:
- Appraise advanced analytical instrumentation.
- Critique advanced GC, LC, MS, CE, SEM and atomic spectroscopy techniques.
- Design advanced experiments using an appropriate range of techniques in an integrated
  manner.
- Interpret complex analytical data and experimental results.
- Manage computer-based expert systems in chromatographic method development.
- Comment on the significance of experimental results/data.
