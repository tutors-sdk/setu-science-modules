aim: 'This module is an in-depth course in advanced analytical and laboratory techniques.
  This will include additional aspects of organic and physical chemistry synthesis
  relating to pharmaceutical science, in addition to their appropriate analysis using:
  Gas Chromatography (GC), Mass Spectrometry (MS), Liquid Chromatography (LC), Capillary
  Electrophoresis (CE), Atomic Spectroscopy (AS), Scanning Electron Microscopy (SEM)
  and Nuclear Magnetic Resonance Spectroscopy (NMR).'
