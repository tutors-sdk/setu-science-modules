assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of advanced
  analytical science. Lack of competence with regard to associated laboratory skills,
  practices and instrumentation.'
- '40%-49%: Will be able to show a limited understanding of the fundamentals of advanced
  analytical science. Will display some ability with regard to associated laboratory
  skills, practices and instrumentation.'
- '50%-59%: As well as the above, the student will be to show a reasonable understanding
  of the fundamentals of advanced analytical science and predict some trends in analytical
  results. Will display reasonable competence with regard to associated laboratory
  skills, practices and instrumentation.'
- '60%-69%: In addition, the student will demonstrate a more detailed knowledge of
  advanced analytical science and show ability to analyse problems in this area. Will
  display very good competence with regard to associated laboratory skills, practices
  and instrumentation.'
- '70%-100%: All of the above to an excellent level. In addition, the learner will
  be able to demonstrate a comprehensive knowledge and understanding of advanced analytical
  science, excellent reasoning skills and well thought out arguments. Will display
  advanced competence and independence with regard to associated laboratory skills,
  practices and instrumentation.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory
