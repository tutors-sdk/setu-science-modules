indicative_content:
- "A compendium of language exercises and tasks from the prescribed textbook Savoir-faire\
  \ - Le fran\xE7ais a' l'universite'."
- 'Contexts / themes that may be used to achieve the learning outcomes for this level
  may include the following:'
- Curriculum vitae
- Psychological description of people
- France in French cinema
- Education and college education
- Conditional present, forming hypothesis/es
- Reflexive verbs (present)
- Direct and indirect personal pronouns
- 'Expression of the past: perfect and imperfect'
- Comphrehension using literary extracts
- "Parlons fran\xE7ais, c'est facile (web docs)"
- Feminine adjectives
learning_outcomes:
- 'Speaking: Converse spontaneously by exchanging information and expressing opinions
  on familiar topics through clear articulation.'
- 'Writing: Write more complex accounts of experiences as well as personal texts.'
- 'Listening: Display evidence of understanding of general points and some specific
  details about common and topics related to the content of the module. Identify the
  main points in media clips which relate to the content.'
- 'Reading: Identify the main themes and some detail in written texts on familiar
  and unfamiliar topics in known genres. Deduce meaning of unknown words and phrases
  from context and familiarity with the topic.'
learning_and_teaching_methods:
- Interactive seminars, variety of media (traditional print, audio and video materials,
  online language learning resources and may also include:Tandem Learning, Content
  & Language Integrated Learning, Self-directed learning, Blended learning, European
  Language Portfolio, Transferable skills, Online learning resources)
