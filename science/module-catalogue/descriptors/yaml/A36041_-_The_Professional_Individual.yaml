assessment_criteria:
- '<40%: Unable to present self as a professional through their written work,no reflection.'
- '40%-49%: Able to present knowledge of self as a professional through their written
  work, Reflections are descriptive.'
- '50%-59%: Understands professional practice and can apply this in relation to self-
  evidenced through their written and presented work.'
- '60%-69%: Presented work shows evidence of analysis regarding their professional
  persona; in the structure, content and format of their written work.'
- '70%-100%: Excellent presented work; illustrates the evaluation of self as a professional
  and evaluation of professional practice through presented materials.'
