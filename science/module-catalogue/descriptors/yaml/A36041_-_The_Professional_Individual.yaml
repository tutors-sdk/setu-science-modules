indicative_content:
- 'Emotional intelligence and self awareness: definition of emotional intelligence
  and self awareness; distinguishing IQ from EQ; influences on development of self;
  the modern work context; the personal demands on the modern manager; importance
  of emotional intelligence and self awareness for work place success; developing
  improved emotional intelligence and self awareness'
- 'Stress management: understanding stress and it''s sources; organisational and individual
  costs of stress; identifying personal stressors; coping strategies for stress management
  - problem and emotion focussed; positive perspectives on stress'
- 'Impression management and business etiquette: face-work and politeness, regulating
  information; barriers to making the intended impression; negotiating social transitions;
  work-based impression management; ethical issues in impression management'
- 'Interview skills: picking the right job; staying motivated in your job search;
  preparation for the interview; the interview itself,; follow up in success and failure'
- 'Creative decision making and planning: establishing criteria for participative
  decision making; promoting creative thinking in organisations; communicating a vision;
  personal and organisational goal setting; evaluating and monitoring goals'
- 'Preparation for work placement: CV development; industry profiling; understanding
  key skills and requirements; presentation of professional self'
learning_outcomes:
- Express their potential strengths as a business professional.
- Employ reflective thought to adapt behaviour to context.
- Construct an appropriate personal career development plan and professional profile,
  to include a skills needs analysis and CV.
- Examine their transferable skills for integration and progression in the workplace.
learning_and_teaching_methods:
