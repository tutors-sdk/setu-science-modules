indicative_content:
- 'Infrared spectroscopy: prediction of major absorbance bands from chemical structural
  elements in molecules'
- 'Mass spectrometry: basic principles, instrumentation, isotopes and fragmentation
  patterns'
- 'NMR spectroscopy: basic principles, instrumentation, detailed interpretation of
  proton and carbon-13 NMR spectra'
- Use of UV-Vis, NMR, IR and mass spectra in structural elucidation of organic molecules
- Application of techniques in the characterisation of synthesised products and unknowns
  in laboratory practicals
learning_outcomes:
- Determine the structure of an organic compound from an analysis of combined spectral
  data.
- Relate the theory of the techniques of NMR and MS to the characterisation of organic
  compounds.
- Analyse the different spectroscopic techniques used in organic chemistry.
- Use practical techniques to determine the structure of a synthesised product and
  an unknown structure.
