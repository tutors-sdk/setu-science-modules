assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of the
  advanced spectroscopic analysis of organic compounds. Lack of competence with regard
  to associated laboratory skills, practices and instrumentation.'
- '40%-49%: Will be able to show a limited understanding of the fundamentals of the
  advanced spectroscopic analysis of organic compounds, but may have some difficulty
  with applying this theory. Will display some ability with regard to associated laboratory
  skills, practices and instrumentation.'
- '50%-59%: As well as the above, the student will be to show a reasonable understanding
  of the complexities of the advanced spectroscopic analysis of organic compounds,
  and predict some trends in analytical results. Will display reasonable competence
  with regard to associated laboratory skills, practices and instrumentation.'
- '60%-69%: In addition, the student will demonstrate a more detailed knowledge of
  the advanced spectroscopic analysis of organic compounds and show ability to analyse
  problems in this area. Will display very good competence with regard to associated
  laboratory skills, practices and instrumentation.'
- '70%-100%: All of the above to an excellent level. In addition, the learner will
  be able to demonstrate comprehensive knowledge and understanding of the advanced
  spectroscopic analysis of organic compounds, predict general trends in behaviour,
  including exceptional behaviour and critically evaluate and relate topics. Will
  display advanced competence and independence with regard to associated laboratory
  skills, practices and instrumentation.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
