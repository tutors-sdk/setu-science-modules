indicative_content:
- Evolution of ICT in the Agri Food Sector
- Guest Lecturers and Seminars
- State of the art in Agri Food ICT Application
- Sensor Technology and connectivity application and demonstrations
learning_outcomes:
- Appraise current best practice within the Agri Food sector.
- Compare different capabilities of sensing technologies across the sector.
- Assess the principles of Agro Food ICT technologies.
- Demonstrate methodologies and techniques for the analysis of Agri Data to produce
  reports based on seminars and field trips.
- Discuss the evolution of ICT in the Agri Food Sector.
- Explore ICT services and technologies from the perspective of security, privacy
  and cost.
- Compare and contrast the main technologies used in the Agri Food sector.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures, guest lectures, practicals
  and field trips.
- The lectures will be used to introduce new topics and their related content.
- Many topics will be supported with case studies and examples.
- The student will be encouraged to participate in class discussions ask questions
  to support their learning.
