indicative_content:
- Lexical contexts covered may include - words that are often confused; preparing
  food; word building; adjectives; nouns and verbs; humour.
- 'Grammatical features may include - adding emphasis; cleft sentences; nouns: compound
  and possesive forms; ''so'' and ''such'';comparison.'
- Discourse/Functions - Selecting from options; telling humorous anecdotes; summarising
  issues clearly; maintaining an assertive but respectful tone; expressing expectations.
- Exercise Types - Multiple-choice, gap-fill, close tests, word formation, sentence
  transformation, question and answer comprehensions, group definition activities,
  pairwork, information gap, anecdote descriptions, questionnaires, roleplays
learning_outcomes:
- Produce a range of spoken communications exploiting the language systems (lexis,
  grammar) and skills (productive and interactive) covered in the module.
- Interpret a variety of short and extended aural texts within the lexical contexts
  covered in the module.
- Critique a range of text types within the lexical contexts covered in the module
  for general academic purposes.
- Create stylistically appropriate written texts demonstrating a command of the lexical
  and grammatical elements covered in the module.
- Demonstrate appropriate awareness of cultural diversity based on class discussion
  and independent refelection.
learning_and_teaching_methods:
- Adopting a broadly communicative and integrated approach to language teaching, methods
  may include inter-active seminars, short talks and presentations and workshops using
  both traditional and ICT-based materials. Emphasis will be placed on class participation,
  independent learning and skills development. Teaching approaches that recognise
  and foster a variety of learning and teaching styles and/or promote learner motivation
  may be employed.
