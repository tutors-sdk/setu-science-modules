indicative_content:
- 'Thermal Physics: Temperature and temperature scales; Expansion of solids; Heat
  capacity and latent heats; Heat transfer'
- 'Electromagnetism: Electric forces and fields; Electric Potential and electric potential
  energy; Capacitance and dielectrics; Magnetism and electromagnetic induction'
- 'DC circuits: Kirchoff''s Laws; Series and parallel circuits'
- 'AC circuits: AC current and voltage: Impedance and phase angle; Analysis of series
  and parallel RC circuits'
- 'Semiconductor Theory: Band Theory of solids; Intrinsic and extrinsic semiconductors;
  p-n junction diode and thermistor'
- Application of measurement principles to a range of sensors
learning_outcomes:
- Describe and explain the fundamental physics principles underlying the concepts
  outlined in the indicative content.
- Compute routine expressions related to simple AC and DC electrical circuits.
- Apply problem-solving skills to find solutions to a range of practical and theoretical
  problems.
- Describe and discuss the practical application of the physics concepts introduced
  related to a number of physical devices.
- Record and analyse experimental data in an accurate manner.
- Report on and critically assess a range of experiments relating to the course content.
