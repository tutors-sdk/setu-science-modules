assessment_criteria:
- '<40%: Inability to demonstrate a basic understanding of the content of the module.
  Poor writing and presentation skills.'
- '40%-49%: Ability to demonstrate basic professional development skills and an understanding
  of the role of science in society. Basic knowledge of introductory concepts of frontiers
  in physics.'
- '50%-59%: Ability to exhibit broadened understanding of the roles of science in
  society. Good knowledge of introductory concepts of frontiers in physics. Good writing
