indicative_content:
- 'Professional development: reflective practice, presentation skills, working in
  groups.'
- 'Science and society: social responsibility of scientists, ethical issues in science,
  public understanding of science, media issues in science.'
- 'Introduction to elementary particle physics: the discovery of atoms, the nuclear
  atom, the particle zoo and the Standard Model.'
- 'Introduction to climate science: global warming, paleoclimatology and the enhanced
  greenhouse effect.'
- Climate change and the public.
learning_outcomes:
- Describe the role of science in society, in particular in relation to ethical and
  media issues.
- Describe some introductory components of elementary particle physics.
- Describe some introductory components of climate science.
