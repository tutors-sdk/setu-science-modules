aim: This module allows the student to broaden their awareness of the history of science,
  of the role of science in society and of the responsibilities of the scientist.
  In the second part of the module, particular emphasis will be placed on an introduction
  to the physics of elementary particles. The third part of the module focuses on
  the science of climate change and the public perception of the problem. The module
  also continues the development of the professional and independent learning skills
  of the student.
