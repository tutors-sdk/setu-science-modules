indicative_content:
- Maintain a lawn (spring), mowing, rolling, edging, nutrition and repairs
- Grow a range of ornamentals and vegetables using techniques such as pricking out,
  potting up and growing on
- Prepare ground for the planting of ornamentals and vegetables
- Prune and train a range of fruit trees and bushes
- Produce a range of containerised bedding displays
- Plant a range of bedding plant displays
- Plant a range of vegetables and herbs
learning_outcomes:
- Demonstrate a range of spring lawn maintenance tasks.
- Demonstrate the propagation of flowering annuals and vegetables.
- Show how the ground is prepared for planting of bedding plants and vegetables.
- Demonstrate the planting of out bedding plants, vegetables and herbs.
- Construct a range of containerised bedding displays.
- Demonstrate the pruning and training of fruit trees and bushes.
- Complete a record of activities and observations.
- Operate in a team or individually to complete a series of tasks.
learning_and_teaching_methods:
