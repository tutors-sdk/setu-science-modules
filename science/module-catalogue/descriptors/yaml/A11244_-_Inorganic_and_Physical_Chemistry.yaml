indicative_content:
- Bonding in inorganic materials, molecular oribital theory of hetero nuclear molecules,
  crystal field theory of bonding, electroneutrality principle, ionic bonding, back
  bonding, sigma donor interactions
- Magnetic properties of inorganic materials, including diamagnetism, paramagnetism,
  ferromagnetism, spin and orbital contributions to magnetic moment
- Electronic absorption spectra, infra-red (IR) spectroscopy of metal carbonyls
- Isomerisation and the various types of isomers that may occur in inorganic molecules;
  crystal structures of materials, x-ray diffraction and crystallography; polymorphism
  and its importance in the pharmaceutical industry
- Surface characterisation of materials including scanning electron microscopy (SEM),
  scanning tunneling micrcoscopy (STM), atomic force microscopy (AFM) and surface
  probe microscopy
- Kinetics of complex reactions and their significance to the pharmaceutical and polymer
  science
- Properties of surfaces, surfactants and interfacial phenomena (including the kinetics
  and thermodynamics)
- Adsorption Isotherms (Langmuir, Freundlich and BET)
learning_outcomes:
- Apply the various bonding theories for inorganic complexes, and interpret spectroscopic
  and magnetic properties of these complexes.
- Demonstrate safely the synthesis, characterisation and structural analysis of inorganic
  compounds.
- Appraise the surface characterisation analysis of materials.
- Demonstrate the structure of a surfactant, uses of surfactants, surfactant aggregation
  and the driving forces for aggregation.
- Calculate the critical micelle concentration (CMC), surface excess concentration
  and relevant thermodynamic parameters.
- Determine the rate law of complex reactions using steady state approximations, pseudo
  kinetics, relative rates, relaxation techniques and pre-equilibria conditions. Methodologies
  for fast reactions.
- Differentiate between adsorption isotherms (Langmuir, Freundlich and BET), their
  uses and applications.
- Complete, safely, and report on a range of practical laboratory experiments that
  will reinforce the theoretical aspects of this module.
