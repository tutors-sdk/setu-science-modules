assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of inorganic
  and physical chemistry. Inability to carry out numerical calculations and lack of
  competence with regard to associated laboratory skills, practices and instrumentation.'
- '40%-49%: Will be able to show a limited understanding of the fundamentals of inorganic
  and physical chemistry, but may have some difficulty with applying this theory.
  Will display some ability with regard to associated laboratory skills, practices
  and instrumentation.'
- '50%-59%: As well as the above, the student will be to show reasonable understanding
  of the fundamentals of inorganic and physical chemistry. Will display reasonable
  competence with regards to associated laboratory skills, practices and instrumentation
  and be able to correctly interpret characterisation of materials.'
- '60%-69%: In addition, the student will demonstrate a more detailed knowledge of
  inorganic and physical chemistry and show ability to analyse problems in this area.
  Will display very good competence with regards to associated laboratory skills,
  practices and instrumentation.'
- '70%-100%: All of the above to an excellent level. In addition, the learner will
  be able to demonstrate comprehensive knowledge and understanding of inorganic and
  physical chemistry, excellent reasoning skills and well thought out arguments. Will
  display advanced competence and independence with regard to associated laboratory
  skills, practices and instrumentation.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
