aim: This module will give the student an in-depth knowledge of metal to ligand bonding
  in inorganic materials, and demonstrates how the bonding plays an important role
  in the properties of these complexes. The electronic absorption spectra and infra-red
  (IR) spectra of inorganic materials will also be discussed. The determination of
  crystal structure of compounds and its importance in pharmaceutical applications
  will be covered. The importance of polymorphism, particle size and surface characateristics
  of the materials will be studied. The role of kinetics in complex reactions, surface
  and interfacial science, adsorption isotherms will also be reviewed.
