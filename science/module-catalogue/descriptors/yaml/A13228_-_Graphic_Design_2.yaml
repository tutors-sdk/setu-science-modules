indicative_content:
- Concept design:idea generation through the use of creative filters e.g. Expected
  Unexpected Bizarre (E.U.B);Visual Dynamic; Advertising and other media outlets
- 'Colour: colour theory; colour wheel; colour models; light; meaning of colour; colour
  psychology; mood boards'
- Art movements:Impressionism;cubism;modernism etc
- 'Art mediums: watercolour;oil; acrylic'
- 'Composition: Visual harmony and disharmony'
learning_outcomes:
- Complete a concept design for advertising.
- Discuss art movements and use an art medium.
- Apply the techniques used in an art medium.
- Recognise and apply the fundamental concepts of colour.
learning_and_teaching_methods:
- This module will be delivered using one hour of a computer-based lecture, along
  with three hours of computer-based practicals each week.
- The practical block of three hours is required so that students can be re-introduced
  to the theory and then implement it the practical side of it.
