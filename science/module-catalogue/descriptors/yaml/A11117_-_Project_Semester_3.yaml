indicative_content:
- Project management, e.g. Agile, Scrum
- Time Management tools
- Communication and presentation of ideas in correct, clear and modern format
- Agile Software Development Principles & Practices
learning_outcomes:
- Apply knowledge, skills or practices from (at least two) strands in the programme
  into a model that demonstrates an understanding of the core concepts of those strands.
- Demonstrate the above model and present the resulting working artifact.
- Use a modern project management paradigm, e.g. Agile, Scrum to plan and manage a
  small to medium project, e.g. the development of the artefact above.
- Use time-management strategies (including tools) integrated with the chosen project
  management paradigm.
- Describe the application of the chosen project management techniques in the development
  of the artefact.
learning_and_teaching_methods:
- Combination of lectures and computer-based practical labs.
- Cooperative learning/peer tutoring.
- Self-directed learning.
