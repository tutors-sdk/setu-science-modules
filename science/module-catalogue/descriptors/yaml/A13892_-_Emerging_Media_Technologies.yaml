reference: A13892
full_title: Emerging Media Technologies
short_title: Emerging Media Technologies
credits: 5
level: Advanced
author: ROCONNOR
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Media Production
aim: The module explores new trends, tools and technologies in the broad digital media
  domain. Students will build on their existing skills and knowledge from previous
  modules in the Media Development stream to track emergent technology. This module
  can cover any aspect(s) of media development. For example, sound, stereoscopic display,
  haptic feedback, physical simulation, projection mapping, lighting.
