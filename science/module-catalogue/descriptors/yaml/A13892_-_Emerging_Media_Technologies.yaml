  status: E
prerequisites: []
corequisites: []
indicative_content:
- Interaction styles and interaction techniques
- Representing information to users
- Approaches to design, implementation and evaluation of non-mouse interaction
learning_outcomes:
- Generalise the interaction possibilities beyond mouse-and-pointer interfaces. (Understanding).
- Critique emerging media trends based upon a set of discovered criteria (Evaluating).
- Construct a system that demonstrates user action synchronization and data consistency
  using emerging media tools/technologies (Applying).
learning_and_teaching_methods:
- This module will be characterised by student participation in both formal theoretical
  and practical/studio classroom activities in which students learn theoretical concepts
  and apply them immediately using dedicated hardware and software.
- Studio Classes will be delivered in two 2-hour blocks.
- 'Sample Assignment: Critically assess the use of positional audio within a specific
  video game context and how it affects the immersive experience.'
- 'Sample Project: Use previously unseen middleware tools to create and program positional
  audio within a video game context.'
- Use of accessible, professional sound proofed recording studios with professional
  microphones and audio workstations (Vibe FM studios).
- Access to cameras
- Access to Video/Photography Studio
