indicative_content:
- 'Introduction to scientific programming: floating point numbers and error analysis,
  machine precision, general classification of computational problems, procedural
  programming constructs such as sequential, conditional and looping constructs.'
- 'Overview of computational problems: integration and differentiation, interpolation
  and extrapolation, ordinary differential equations, partial differential equations,
  matrix methods, curve fitting, Monte Carlo other simulation methods'
- 'Scientific programming tools: Matlab (or equivalent language such as Octave or
  Scilab), Python (or an equivalent language, such as Julia or Java ), LaTeX, Markdown,
  etc.'
- 'Programming applications: Periodigrams, windowing function, code implementation
  of digital signals, convolution -- FIR filters, signal sequences, time varying FT
  (STFT), and wavelets.'
learning_outcomes:
- Utilise the procedural programming paradigm for problems in electronic engineering,
  such as code implementation of digital signals, periodigrams etc.
- Design algorithms and programs using pseuduocode and flowcharts.
- Demonstrate proficiency with linear algebra within Matlab(or similar language).
- Explore aspects of statistics and probability such pseudorandom number generators,
  simple stochastic models and inclusion of noise.
- Utilise essential methods and techniques (error analysis, problem classification)
  for symbolic/numerical computation in engineering.
learning_and_teaching_methods:
- The module is covered through a series of practical problem solving sessions and
  directed independent learning.
- Due to the very practical nature of the skills to be acquired in this module, these
  practical sessions will be centred around the idea of learning by doing, whereby
  students develop proficiency in the specified skill set through guided activities,
  and whereby lecturers provide short formal presentations of relevant concepts and
  technologies, as well as practical tips, feedback, and advice on best practices.
- Active engagement with frequent practice on examples is strongly encouraged through
  regular course work consisting of a mixture of practical activities graded from
  guided to self-directed tasks.
