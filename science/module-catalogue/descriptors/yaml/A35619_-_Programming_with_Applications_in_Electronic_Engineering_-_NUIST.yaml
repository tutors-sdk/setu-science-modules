aim: The aim of this module is to highlight the computational approach to solving
  electrical engineering problems. The concepts and techniques covered in this module
  will be applicable in projects or problem-solving work that contain a strong computational
  with particular emphasis on numerical methods for computation. The module is designed
  such that a significant fraction of the student's time is spent programming/solving
  specific engineering problems, rather than learning abstract techniques.
