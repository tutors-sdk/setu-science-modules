reference: A13948
full_title: Work Placement (10 credits)
short_title: Work Placement (10 credits)
credits: 10
level: Intermediate
author: RBIRNEY
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Professional Skills
aim: The purpose of the work placement is to require the student to apply the knowledge,
  skills and competencies gained through the academic phase of the course through
  putting them into practice in a relevant workplace environment. This will allow
  the students to consolidate, deepen and contextualise their learning and thereby
  enhance their employability.
programmes:
- timetable: PLAC-0138
  code: WD_BCSEC_SP
  name: Diploma in Computing with Security and Forensics
  stage: 3
  semester: 3
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Work Placement: The student is required to actively engage in and successfully
  complete a three-month placement in a work setting approved by WIT'
- 'Learning Agreement: At the outset of the Placement the Student will complete a
  Learning Agreement'
- 'Applied Learning Portfolio: During the course of the placement students are required
  to maintain an Applied Learning Portfolio'
- 'Alternative Industry-led Project: Where a student cannot secure an appropriate
  Work Placement they are required to complete an Industry-Led Project'
learning_outcomes:
- Apply knowledge, skills and competencies acquired to the analysis and creation of
  solutions to workplace/industry-led project problems.
- Relate theory to practice and contextualise the theoretical knowledge gained in
  the programme to a relevant area of professional practice.
- Communicate effectively in an appropriate and professional manner and format and
  have developed appropriate communication and interpersonal skills.
- Analyse the learning experience resulting from the work placement/industry-led project.
- Determine and communicate personal skills and competencies along with strengths
  and areas for further growth and development.
learning_and_teaching_methods:
- Students will undergo an induction briefing prior to the beginning of the placement
  and have access to an academic supervisor during the placement period.
- The applied learning portfolio is designed to foster self-reflection on the learning
  gained through participation in the work placement.
