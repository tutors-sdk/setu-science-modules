indicative_content:
- Food premises and equipment design
- Clean-room technology; controlled cleaning and structural, procedural and personal
  hygiene
- Quality control of food ingredients
- 'H.A.C.C.P.: methodology, documentation, integration and other quality systems (G.M.P.,
  Q-mark, I.S.O. system, T,Q,M., World class manufacturing)'
- Food legislation and regulation and organisations involved in food safety (FSAI,
  WHO, Codex Alimentarius)
- 'Food safety auditing: theory and practice, the audit process, integrated safety
  auditing, traceability and complaint management'
- Methods for isolation and growth of bacteria and fungi from foods and pharmaceuticals
- 'Selective enrichment and isolation techniques: chromogenic media & immunomagnetic
  beads'
- Facilitated cultural techniques (Petrifilm, Easygel, Kwikcount and Microtrap)
- Pyrogen detection and endotoxic assays
- 'Traditional methods of identification of microorganisms: phenotypic methods including
  microscopy and biochemical tests'
- Rapid and/or computer-assisted kit systems for identification (immunological methods,
  API, Biolog etc.)
- 'Modern molecular methods for identifying microorganisms: 16S PCR and DNA sequencing,
  PFGE, AFLP, RFLP, real-time PCR'
- Sterilisation methods, sterility testing and monitoring and disinfectant testing;
  methods for evaluating disinfectants
- Microbiological tests for hygiene testing of production facilities, including ATP
  and lux-based bioluminescence technology and modern rapid swab techniques
learning_outcomes:
- Evaluate the inter-related processes that contribute to food safety management.
- Assess the role and function of quality through production and processing of food,
  including the origins of HACCP and its basis as a Food Safety Management System.
- Propose suitable techniques for the selective isolation and identification of pathogens
  and indicator organisms from a wide variety of products using current methodologies
  and technologies.
- Evaluate the underlying principles behind molecular biology techniques employed
  in isolation and identification of microbes.
- Appraise sterility testing of products and monitoring of sterile production facilities,
  and recommend appropriate methods for routine hygiene assessment in the food industry.
