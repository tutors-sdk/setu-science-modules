history_comment: ''
school: Science and Computing
department: Science
cluster: Food Science
aim: This module will provide the student with an advanced understanding of the theory,
  practices and implementation issues associated with food industry safety management,
  while incorporating a comprehensive overview of the theoretical background, methodologies
  and practical skills in modern methods used in the analysis of foods for microbial
  contaminants. The learner will be exposed to aspects of working in an environment
  which operates under strict guidelines for production and quality outputs. The aims
  of the module are to produce graduates with an in-depth knowledge of food industry
  safety management, along with modern methods for the microbiological analysis of
  foods and food production premises. The student will acquire the tools and skills
  in modern methods and the technology associated with the analysis of foods and production
  facilities for microbial contaminants. The module will also enable students to critically
  appraise the scientific literature, and identify future trends in the areas of food
  safety and analytical microbiology.
