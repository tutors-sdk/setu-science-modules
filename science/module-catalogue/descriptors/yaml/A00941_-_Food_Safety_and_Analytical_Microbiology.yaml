assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of analytical
  microbiology or the basic concepts of food safety management.'
- '40%-59%: Ability to show limited understanding of the fundamentals of analytical
  microbiology. Will display some ability with associated demonstrations. Ability
  to understand the food safety management philosophies but unable to critically think
  on this subject.'
- '60%-69%: Ability to show reasonable understanding of the complexities of analytical
  microbiology and predict some trends in analytical results. Will display reasonable
  competence with associated laboratory demonstrations. Good critical thinking and
  problem-solving skills in both analytical microbiology and food safety management.
  Good teamwork abilities.'
- '70%-100%: All the above to an excellent level. In addition, will be able to demonstrate
  comprehensive knowledge and understanding of the area, have an ability to critically
  evaluate and relate topics, and formulate food safety management strategies.'
