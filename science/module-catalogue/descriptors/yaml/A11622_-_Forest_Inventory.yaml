corequisites: []
indicative_content:
- Forest inventory procedures relating to social, environmental and economic values
- Stand mapping best practice
- Collection of data for Environmental Risk Assessment
- Geodatabase design for forest inventory and management planning
- Map design and layout including advanced labelling and symbology
- National and stand based forest inventory
- Volume estimation for forest planning purposes
- Population vs sample, normal distributions, random & stratified sampling, measurement
  procedures and conventions, bias and accuracy
- Measures of centre and spread, standard error, confidence intervals, t-tests, estimate
  precision vs desired precision in forest inventory
- Data processing and presentation
learning_outcomes:
- Complete a forest stand inventory, recording forest type, productive area, species,
  species mix, initial spacing etc.
- Create ArcGIS maps based on digital aerial photographs and 6" maps combined with
  field registrations.
- Create and populate a subcompartment attribute table in ArcGIS.
- Complete an inventory that quantifies the social and environmental values of a forest
  and the environmental risks associated with its management.
- Apply the basic theory behind forest sampling and volume estimation for planning
  purposes.
- Plan a forest inventory in terms of stratification, sampling intensity and inventory
  methods given certain constraints.
- Organise and complete stand volume estimation to establish age, top height, mean
  dbh, stocking, basal area, mean tree volume and standing volume.
- Prepare forest inventory reports suitable for the inclusion in a forest management
  plan. The reports comprise descriptive text, data analysis, tables, charts and GIS
  maps in an agreed format.
learning_and_teaching_methods:
- 'Lectures: will be used to introduce the theory for forest mapping, environmental
  impact assessment, sampling and statistical analysis.'
- 'Field trips: will be used to demonstrate field work procedures and for students
  to carry out field registration for a period of time.'
- 'GIS practicals: will be used to generate the geodatabase for the projects and to
  prepare the maps involved.'
- 'Technology: students will use statistical software to generate mean, standard deviation,
  standard error and confidence intervals of stands.'
