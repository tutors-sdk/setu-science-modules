reference: A11622
full_title: Forest Inventory
short_title: Forest Inventory
credits: 10
level: Intermediate
author: MPEDINI
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: In this (10 credit) module students will carry out a wide range of forest inventory
  work in a medium-sized forest property over a number of days. Students will plan
  and carry out field work in teams. Social, environmental and economical values will
  be mapped in a Geographic Information System (GIS), and a suite of maps and an Environmental
  Risk Assessment for the property will be prepared by students. Sampling theory and
  statistical methods will be introduced in class, followed by stand volume estimation
  field work in the forests. At the end of the semester students will have written
  three short forest inventory-related reports to a professional standard, which will
  constitute the foundation of a forest management plan.
