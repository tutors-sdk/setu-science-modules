prerequisites: []
corequisites: []
indicative_content:
- Literature search strategies, including the use of online databases to effectively
  research the scientific literature
- Preparation of a literature review and critical evaluation of the literature related
  to a scientific research topic
- Use of specialised referencing manager packages
- Technical writing skills & designing report templates
- Writing science correctly
- Planning and design of a scientific project in the context of a literature review
- Interpretation and critical evaluation of results in the context of the relevant
  scientific literature
- Quality of written report on project
- Preparation and delivery of a presentation suitable for a technical audience
learning_outcomes:
- Evaluate information contained in the primary literature pertaining to a given research
  topic and determine its relative importance.
- Construct a cohesive and fully referenced literature review report on a given research
  topic that conforms to a high standard of technical writing.
- Appraise the parameters and components of an area of study, presenting these in
  the form of a hypothesis or problem statement and describing a methodology for investigation.
- Develop powers of analysis and synthesis in the exploration and resolution of problems.
- Assess and defend their work, its conclusions and recommendations in written form.
- Design a well-illustrated presentation to summarise the research project suitable
  for dissemination to a technical audience.
