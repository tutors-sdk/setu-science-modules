assessment_criteria:
- '<40%: Insufficient level of research work performed in terms of quality and quantity
  of research output. Inadequate standard and knowledge of research topic evident
  through poor report writing and oral presentation skills.'
- '40%-59%: Limited consideration of most points and concepts addressed. Descriptive
  level of discussion, showing lack of evidence of the underpinning knowledge. Some
  attempt at application of theory to practice.'
- '60%-69%: Addressing and analysing the main points and showing evidence of underpinning
  knowledge. Some evidence of evaluation and synthesis of the relevant issues and
  theory to practice integration.'
- '70%-100%: Good level of critical analysis, originality of thought and a comprehensive
  knowledge base. Good critical evaluation and synthesis of relevant issues, showing
  an ability to integrate theory and practice.'
