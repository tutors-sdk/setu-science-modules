history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: This module will develop the learner s ability to access relevant scientific
  information from the primary literature, collate the information and write an overview
  of a chosen research topic. Projects related to this research topic will be carried
  out under the supervision of individual members of the academic staff, along with
  an internal supervisor at the workplace. Projects will be linked to a relevant industrial
  problem at the student s workplace. The student will present their research findings
  in the form of a research dissertation and also at a presentation in a formal research
  environment.
