- timetable: PLAC-0008
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 2
  semester: 4
  status: E
prerequisites: []
corequisites: []
indicative_content:
- 'Placement requirements: 12 weeks on a host farm organised by Teagasc; the student
  will be punctual, use safe working practices, avail of learning opportunities'
- 'Performance of farm work: work output and quality, dependability, performing tasks
  in accordance with directions, using initiative, adaptability and apply theory to
  practice'
- 'Relating: communicating and working with co-workers, with the host farmer and family
  members, and with people who do business with the farmer'
- 'Record of placement experience (Daily Diary): particulars of features of the host
  farm, inventory of machinery and implements, inventory of livestock movements, enterprise
  details, and end of placement summary'
learning_outcomes:
- Construct a professional CV to secure placement.
- Plan learning objectives for the placement.
- Operate independently and/or as part of a team towards the set objectives of the
  farm enterprise and relate effectively to co-workers and host farmer family members.
- Apply, under supervision, their agricultural knowledge and skills in the day to
  day planning and operations on the farm.
- Practise safely, agriculture related skills and employ both good environmental practices
  and those associated with good animal health and welfare.
- Examine their personal, professional and technical achievements on the placement.
- Communicate their activities and assessment of the farm enterprise in a professional
  manner.
learning_and_teaching_methods:
- Practical learning experience from a host farmer.
- Practical learning experience from a host farmer and keeping a weekly diary.
- Working and relating with other farm workers, as well as the host farm family.
- Practical learning experience of environmental implications of farming and keeping
  a weekly diary.
- Practical learning experience of safety and health on a farm and keeping a weekly
  diary.
- Practical learning experience of animal health and welfare and keeping a weekly
  diary.
