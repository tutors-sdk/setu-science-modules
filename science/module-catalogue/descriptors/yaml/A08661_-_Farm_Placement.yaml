reference: A08661
full_title: Farm Placement
short_title: Farm Placement
credits: 30
level: Introductory
author: VNYHAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: This module is designed to give the student experience of practical farming on
  a high quality farm. The placement is organised by Teagasc, and the student will
  gain a wide experience as possible of a variety of farm enterprises. The student
  will be monitored by the host farmer and by Teagasc staff, and the student will
  keep a daily diary of the tasks he/she carried out on the farm. Students are also
  encouraged to seek placements overseas, e.g. New Zealand, UK.
