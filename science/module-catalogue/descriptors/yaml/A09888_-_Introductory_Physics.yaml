indicative_content:
- 'Introduction to physics: SI units, prefixes, scientific notation; measurement;
  vectors and scalars'
- 'Mechanics: motion in one dimension, Newton''s laws of motion; work, energy and
  power; uniform circular motion; conservation laws - mechanical energy, total energy
  and momentum'
- 'Properties of matter: properties & structure of matter; pressure, elasticity, viscosity
  and surface tension'
- 'Waves and sound: wave motion and vibrations, wave classification and properties;
  sound waves, the characteristics of sound and the Doppler effect'
learning_outcomes:
- Describe and explain the fundamental principles of classical mechanics.
- Describe and explain the fundamental principles of the properties of matter.
- Describe and explain the fundamental principles of vibrations and wave motion.
- Complete experiments, record and analyse experimental data and present results in
  the form of a report.
- Apply problem-solving skills to generate solutions to problems in mechanics, properties
  of matter and wave motion.
learning_and_teaching_methods:
- Lectures. The lectures will be used to present new topics and their related concepts.
  Problem solving techniques will also be used in class to analyse physical situations
  and find numerical solutions.
- Tutorials. On-line tutorials linked to core text.
- Laboratory-based practicals. Integrated practical programme designed to run in parallel
  with lectures and allow the student to develop a range of experimental skills. The
  importance of planning of experiments, data acquisition, and analysis will be emphasised.
- Self-directed study.
