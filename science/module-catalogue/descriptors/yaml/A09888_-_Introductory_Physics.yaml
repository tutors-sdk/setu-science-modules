assessment_criteria:
- '<40%: Inability to demonstrate a basic understanding of the fundamental concepts
  of classical mechanics, properties of matter and wave motion. Unable to carry out
  practical skills in the physics laboratory.'
- '40%-49%: Ability to demonstrate a basic understanding of the fundamental concepts
  of classical mechanics, properties of matter and wave motion. Ability to provide
  partial solutions to numerical problems. Has a basic level of competency and skills
  in the physics laboratory.'
- '50%-59%: Ability to clearly describe and define concepts encountered in classical
  mechanics, properties of matter and wave motion. Ability to analyse physical situations
  and apply suitable problem-solving techniques to find numerical solutions. Good
  practical skills in the physics laboratory.'
- '60%-69%: In addition to the above, demonstrates a very good understanding of classical
  mechanics, properties of matter and wave motion, as well as the ability to apply
  problem-solving techniques to new similar problems. Has a high level of practical
  skills in the physics laboratory. Good clear reporting of practical work.'
- '70%-100%: All the above to an excellent level. Demonstrates an ability to put a
  numerical solution into a context and assess whether such solutions are meaningful.
  Has a very high level of practical skills and efficiency in the physics laboratory.
  Can critically assess experiments undertaken.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
