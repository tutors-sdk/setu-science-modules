indicative_content:
- Principles of magnetism and magnetic circuits.
- Electromechanical energy conversion
- The construction of a synchronous machine.
- 'AC synchronous machines: Operation as a generator.'
- Calculations on the equivalent circuit in generator mode.
- 'AC synchronous machines: Operation as a motor.'
- Calculations on the equivalent circuit while operating as a motor.
- The construction of an induction motor.
- The operation of a three phase induction motor.
- Calculations on the equivalent circuit of an induction motor.
- Torque speed and rating plate calculations.
- The operation of Brushless DC Motors.
- Motor selection and efficiency
learning_outcomes:
- Outline the principles of electrical machine operation and perform the associated
  analysis.
- Describe and analyse the operation of AC synchronous machines.
- Illustrate and explain the operation of DC and stepper motors.
- Describe and analyse the operation of an Inductor motor.
- Describe, analyse and utilise brushless DC motors.
- Build, operate, assess and report on the performance of motors in laboratory setting
  in accordance with the module submission schedule.
