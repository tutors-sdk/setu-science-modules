indicative_content:
- 'Ecology: biodiversity, ecosystems, habitats, niche; species interactions, competition,
  predation, parasitism, mutualism; succession, climax community; energy flow, food
  chains & webs'
- 'Water: hydrological cycle; origins of pollution; properties of pollutants; effects
  of pollution; pollution control, including wastewater and water treatment; EU Water
  Frameworks Directive'
- 'Air: natural and polluted atmospheres; meteorological factors affecting air pollution;
  global air pollution issues, i.e. acid deposition, global warming, ozone depletion,
  air pollution and health effects'
- Nutrient cycles, specifically nitrogen and carbon
- 'Field trips: field trips to river & woodland ecosystems including measurement of
  biotic index of water quality'
- 'Laboratory practicals: physico-chemical analysis of water, i.e. hardness, BOD,
  nitrate and phosphate in water; microbiological analysis of water'
learning_outcomes:
- Describe the various parameters important in ecosystems.
- Explain the main topics associated with water in our environment such as the hydrological
  cycle, pollution & treatment.
- Outline significant air pollution components and explain their significance in terms
  of acidity, global warming and ozone depletion.
- Summarise the importance of nitrogen and carbon cycling.
- Identify the major ecological and physico chemical parameters necessary to access
  environmental quality.
- Classify environments based on laboratory and field investigations.
- Discuss how pollutants are produced and monitored in the environment.
learning_and_teaching_methods:
- Lectures.
- Laboratory investigations plus field trips will reinforce and support theoretical
  elements of the module.
