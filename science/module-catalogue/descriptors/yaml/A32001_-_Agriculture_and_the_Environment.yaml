assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills.'
- '40%-49%: Will be able to show a basic knowledge of the key learning outcomes including
  the impact of farming on the environment and be able to perform basic environmental
  analysis.'
- '50%-59%: As well as the above the student will be able to demonstrate an understanding
  of some of the complexities of the topics and predict the impact of various farm
  practices on the environment. The student will also be able to perform good quality
  environmental analyses.'
- '60%-69%: In addition, the student will demonstrate more detailed knowledge of all
  the topics including the role of sustainable agriculture and demonstrate an ability
  to evaluate detailed knowledge acquired in the module to new material. The student
  will also be able to perform very good quality environmental analysis.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of all learning outcomes, including the role of sustainable agriculture and show
  the ability to evaluate and relate topics that overlap all of the learning outcomes.
  The student will also be able to perform high quality environmental analysis.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory
