indicative_content:
- Assessment of the value (financial and environmental) of white clover in grass swards
- Sustainable agriculture, including an overview of environmentally-sustainable farm
  systems, alternative methods of pest control, and the design of constructed wetland
  systems to control farm pollution
- An Environmental Impact Assessment of a site and the writing of an Environmental
  Impact Statement
- On-site and laboratory analyses of farm pollutants, including nitrates and phosphates
- Evaluation of EU and Irish environmental legislation and schemes, discussions to
  include reasons for implementation as well as effectiveness of legislation
learning_outcomes:
- Debate the value of introducing white clover into a grass sward.
- Explore the general principles of sustainable agriculture and how they can be used
  to reduce the impact of farming on the environment.
- Prepare a basic Environmental Impact Assessment of a site and construct an Environmental
  Impact Statement.
- Analyse water for pollutants including nitrates, ammonia and phosphates and use
  the results to demonstrate the effectiveness of constructed wetland systems.
- Examine in detail Irish and EU legislation and strategies for environmental protection
  at farm level, and consider how these measures could be improved.
learning_and_teaching_methods:
- Lectures.
- Field trip to a constructed wetland system.
- On-site visit to facilitate the preparation of an Environmental Impact Statement.
- Laboratory practicals.
