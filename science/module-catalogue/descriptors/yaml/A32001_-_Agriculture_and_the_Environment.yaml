aim: This module is designed to equip students with a knowledge of the impact of farm
  practices on the environment, including the impacts of slurries, fertilisers and
  pesticides. The student will undertake a basic Environmental Impact Assessment of
  a site and write an Environmental Impact Statement. Students will learn about sustainable
  agriculture and carry out laboratory analysis of pollutants in water and soil. Students
  will discuss the potential advantages and disadvantages of incorporating clover
  into grass swards. New EU and Irish legislation and schemes relating to farm practices
  and their impact on the environment will be discussed. Students will visit an on-farm
  constructed wetland system and analyse water samples in the lab to test the effectiveness
  of this water purification technique.
