reference: A14574
full_title: ICT and Business Writing
short_title: ICT and Business Writing
credits: 5
level: Intermediate
author: ECLAFFEY
history_comment: ''
school: Science and Computing
department: Science
cluster: IT
aim: In this module the student will learn how to write various types of professional
  business and field reports, prepare presentations for small and large audiences
  using various computer programs, and be given detailed assistance on how to optimise
  their presentation before an audience.
programmes:
- timetable: ECTS-0001
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 3
  semester: 5
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Different types of business and field reports
- Structure of business reports
- Structure of field reports
- Grammar and punctuation
- Computer programs, e.g. MS PowerPoint, MS Excel
- Graphics, tables, charts
- Databases
- Referencing
- Plagiarism
- Presentations to audiences
learning_outcomes:
- Compose various types of professional business and field reports.
- Prepare business and field reports using various computer programs.
- Complete professional presentations to small and large audiences, using appropriate
  software.
- Operate in a team to produce a poster presentation.
- Use the Internet and online library resources to produce an academic report on a
  relevant topic in the Irish agricultural and agri-business sector.
learning_and_teaching_methods:
- Lectures.
- Tutorials, including use of ICT laboratory.
- Presentations before various audiences.
