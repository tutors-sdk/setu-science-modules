assessment_criteria:
- '<40%: The student will show inadequate knowledge and understanding of the subject
  matter and be unable to write business and field reports. Failure to prepare and/or
  present an adequate project report.'
- '40%-49%: Will be able to show a basic knowledge of the key learning outcomes including
  how to write business and field reports and how to prepare and present a project
  report.'
- '50%-59%: As well as the above, the student will be able to write professional business
  and field reports and prepare and present a project report.'
- '60%-69%: The student will be able to write a very good business and field reports
  of the project and give a very good presentation of the project report.'
- '70%-100%: The learner will be able to write excellent business and field reports
  and give an excellent presentation of the project report.'
essential_material:
