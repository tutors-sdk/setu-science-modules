  students'' listening, talking, reading and writing skills through their production
  of science news reports." _School Science Review._ 97, 359. (2015): 46-54.'
- 'Truss, L. _Eats, Sho__ots & Leaves: The Zero Tolerance Approach to Punctuation_.
  USA: Profile Books, 2004.'
