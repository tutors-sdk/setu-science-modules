indicative_content:
- The Professional Engineer
- Guest lectures on selected topics common with module themes from the programme
- National, European & International Professional Bodies & Regulatory Agencies
- 'Career Management: Self Assessment and career planning / development'
- 'People Management Skills: Effective leadership incorporating confrontation and
  chnage management'
- Technical Journal Article based on choice of project
learning_outcomes:
- Identify the key characteristics of effective engineering professionals including
  the expected attributes of a chartered engineer.
- Critically assess their own overall skill set and appraise their individual key
  strengths and weaknesses targeted to their specific professional practice.
- Devise and implement a personal development plan comprising clear strategies for
  enhancing their identified existing strengths and addressing identified weaknesses.
- Critically analyse current professional practice in relevant engineering companies.
- Reflect on the implementation of their personal development plan and propose adjustments
  for future implementations.
learning_and_teaching_methods:
- Lectures
- Guest Lectures on selected topics common with module themes from the programme
- Guide to effective technical writing and academic journal submissions
- Communications workshop
- Reflective Logbook of activities
- Presentation skills
