assessment_criteria:
- '<40%: Not able to identify 40% of pollinating insect castes and equipment, unable
  to describe management practices and applications, unable to assemble hive, and
  unable to describe suitable apiary sites.'
- '40%-49%: Can identify at least 40% of pollinating insect castes and equipment,
  can describe management practices and application in industry, able to assemble
  hive, and describe suitable apiary sites.'
- '50%-59%: All of above and can correctly identify at least 60% of pollinating insect
  castes and equipment, can describe suitable apiary sites and forage requirements.'
- '60%-69%: All of the above with at least 70% of pollinating insect castes and equipment
  identified correctly.'
- '70%-100%: All of the above and at least 80% of pollinating insect castes and equipment
  identified correctly.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
