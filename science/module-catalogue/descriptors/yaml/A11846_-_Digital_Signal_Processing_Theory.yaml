aim: Digital Signal Processing (DSP) techniques play a major role in many technological
  areas. DSP is a mathematical subject which is concerned with the representation
  and transformation of discrete-time signals using digital computation. The module
  focuses on the fundamentals of DSP and explores speech processing as a paradigm
  for DSP application techniques.
