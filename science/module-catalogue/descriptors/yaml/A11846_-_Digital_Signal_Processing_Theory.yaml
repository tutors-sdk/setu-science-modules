indicative_content:
- Discrete-time signals and properties
- Discrete-time LTI Systems and properties
- 'Transforms: Z, DtFT, DFT, their relationships and use in the frequency domain analysis
  of LTI systems'
- Goertzel algorithm (DTMF tone detection)
- Window functions, FIR and IIR filter design
- Speech modelling and time domain analysis of speech signals
- 'Frequency domain analysis of speech signals: Short-time Fourier Transform (STFT)'
learning_outcomes:
- Demonstrate knowledge and understanding of discrete-time signals and LTI systems.
- Analyse discrete-time systems to determine system behaviour in the time and frequency
  domain.
- Formulate and manipulate equations describing systems and transforms.
- Design digital filters (FIR and IIR) from given specifications.
- Apply Digital Signal Processing techniques to non-stationary signals.
- Write simulation programs to analyse, interpret and evaluate discrete-time systems
  behaviour.
- Communicate effectively, information of experimental nature with due regard to the
  interpretation of results and the underpinning theory.
