indicative_content:
- Introduction to human genetic disease; sex determination, linkage and mapping, chromosome
  mutations
- Structure & mapping human genome, genetic disorders diagnosis, screening and treatment
- Personalised medicine, theranostics & microRNAs
- 'Cancer as a genetic disease: molecular and immuno-based therapies'
- Modern cytogenetics
- DNA genetic testing
- The role of genetics in animal testing and tailored medicine
- The role of transgenics in disease research/treatment
- Modern molecular and cellular therapies; biomolecules & vaccines
- 'Human genetics and society: ethical, legal and social issues'
learning_outcomes:
- Establish the type of defects that lead to a variety of human genetic diseases.
- Critique the structure of the human genome and distinguish between the methods for
  mapping the HG.
- Evaluate the impact of genomics and proteomics on our understanding and treatment
  of human disease.
- Compare and contrast new biomarkers, biomolecules, vaccines and bio-therapeutics
  and justify their use/application in today's society.
- Select and distinguish between the novel strategies of DNA-based therapies in the
  treatment of disease.
- Formulate, recognise and consider the ethical, legal and social issues associated
  with molecular medicine.
learning_and_teaching_methods:
- Lectures are delivered using a flipped classroom approach using the blended learning
  model.
- Students complete online e-activities prior to and post face-to-face lecture sessions.
- Formative activities include online discussion forums, audio and video files, creation
  of mindmaps and concept maps.
- Moodle is the platform through which such activities are delivered.
