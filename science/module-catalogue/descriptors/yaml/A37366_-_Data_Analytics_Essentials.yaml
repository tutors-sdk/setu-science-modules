indicative_content:
- Introduction to Business Analytics
- The Data Mining process; Data Identification, Data description, Data cleaning, Data
  transformation
- 'Data modelling: Statistical modelling; decision trees; rudimentary rules'
- Deployment, evaluation and maintenance
- 'The application of business analytics: CRM; Sales; Marketing etc'
- Business Analyst job role
learning_outcomes:
- Appraise the use of analytics in the business context to support decision making.
- Prepare results from an introductory analytics project using an appropriate Data
  Mining process.
- Organise a set of data in preparation for business analytics.
- Develop, implement and evaulate the results of data models on a data set.
- Assess the use of a data mining process in the context of business analytics.
- Evaluate and determine appropriate introductory data mining techniques.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures. Each lab incrementally builds on the previous, developing the students
  practical skills in business analytics.
- The continuous assessment will require the student to apply the theory and practical
  knowledge to a new business scenario.
