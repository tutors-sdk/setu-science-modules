indicative_content:
- Thyristors, Triacs, IGBT, Mosfet, Transistor Power Switches.
- DC Motor Control.
- DC-DC converters
- Switching Power Supplies
- AC-DC rectification
- Inverters, industrial and automotive applications.
- Energy recovery in DC and AC motor control circuits.
- Battery Technology
- Battery Chargers
- UPS
- Typical Mini Project; brushless dc motor controller
learning_outcomes:
- Explain the operation, application, control and function of typical power switches.
- Define the topology, application, control, perform calculations and describe the
  function of typical dc motor drives, ac rectifiers, ac motor drives, UPS systems
  and brushless dc motor controllers.
- Define the topology, application, control, perform calculations and describe the
  function of typical dc-dc, switch mode power supplies typical battery technology.
- Build, test, analyse and report on the practical power electronic circuits in accordance
  with the module submission schedule.
learning_and_teaching_methods:
- The course will consist of lectures, laboratories, mini project and formative assessments.
- The emphasis on course delivery will be to engage the student in the learning of
  the material, through the integration of the course materials, with the real case
  studies in laboratories and mini project.
- The formative assignments will be used to provide an opportunity for the student
  to engage with the material, before it is applied, to maximise the learning opportunities
  for the student.
- Self-directed learning, use of moodle, and recommended software.
