indicative_content:
- Three dimensional kinematics - linear and angular
- Three dimensional kinetics - linear and angular
- Power, force-velocity relationship
- Quantitative analysis of human movement
- Systematic qualitative analysis of human movement (including deterministic models
  of performance, prioritisation, cueing etc.)
- Biomechanics of specific skills/sports (e.g. long jump, throwing, kicking etc.)
- Advanced analysis of human movement data (e.g filtering, interpolation, normalisation)
- Practical aspects of biomechanics testing equipment (e.g. motion analysis, EMG,
  force platforms, GPS etc.)
- Muscle mechanics
learning_outcomes:
- Describe the principle biomechanical concepts underpinning movement in sport.
- Perform advanced calculations relating to kinematic and kinetic quantities.
- Compare the practical benefits and limitations of equipment used during biomechanical
  testing.
- Organise the collection of biomechanical data of a sports or exercise movement.
- Complete detailed analyses of human movement.
learning_and_teaching_methods:
- Lectures - incorporating interaction and engagement with prior reading
- Practicals - providing skills for self-directed data collection and project completion
- Tutorials - task-based and problem-based learning
