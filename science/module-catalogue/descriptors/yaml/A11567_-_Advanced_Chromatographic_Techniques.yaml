indicative_content:
- Advanced options & state-of-the-art developments in Liquid Chromatography (LC),
  e.g. stationary phase & column technology, instrumentation, micro- and nano-column
  LC, separation on chips, ultra-high pressure LC, high-performance TLC, 2D-LC, LC-MS
  interfacing and mobile phase considerations
- Advanced options & state-of-the-art developments in Gas Chromatography (GC), e.g.
  instrumentation, sensitivity enhancement, thermally labile samples, analytes in
  complex matrices, detection systems, efficiency increases and automation, 2D-GC
  and GC-MS interfacing
- Issues relating to sample pre-treatment in complex matrices, e.g. solid phase extraction
  (SPE) techniques, solid phase micro-extraction (SPME), supercritical fluids, fibre
  and disk extraction, programmed injection methodologies in GC. Analysis of small
  molecules
- Advanced options & state-of-the-art developments in ion chromatography (IC), e.g.
  instrumentation, anion & cation chromatography separations, speciation of metals
- 'Mass spectroscopy (MS) detection techniques coupled to chromatographic separations:
  LC-MS & GC-MS - in-depth theoretical treatment & applications'
- Reverse-phase bioseparation, e.g. peptide mapping, sample preparation in peptide
  mapping and types of stationary phases applicable for LC separation of large biomolecules
- Chiral analysis of a range of materials, particularly pharmaceuticals, using LC,
  GC and CE and chiroptical analysis
- Laboratory practicals demonstrating ability to operate instrumentation associated
  with the above techniques
learning_outcomes:
- Appraise the principles, practices and instrumentation associated with advanced
  chromatography, as well as interfacing of hyphenated techniques involving mass-spectrometry
  such as LC-MS and GC-MS.
- Select an appropriate separation technique for a given analysis in a range of industrial
  environments.
- Solve sample preparation issues concerned with GC, HPLC, ion chromatography and
  reverse-phase bioseparations.
- Solve method development issues concerned with GC, HPLC, ion chromatography and
  reverse-phase bioseparations.
- Set up, calibrate and qualify associated laboratory instrumentation for pharmaceutical
  and biopharmaceutical sample analyses.
- Appraise separation science literature and identify future trends in this area.
