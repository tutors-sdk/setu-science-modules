reference: A11567
full_title: Advanced Chromatographic Techniques
short_title: Adv. Chromatogr. Techniques
credits: 10
level: Postgraduate
author: KGRENNAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Analytical Science
aim: This programme will provide the student with an advanced understanding of the
  theory, practices and instrumentation associated with advanced in separation science
  as well as interfacing of hyphenated techniques involving mass-spectrometry such
  as LC-MS and GC-MS. The learner will be exposed to state-of-the-art developments
  in associated instrumentation, as well as issues to deal with the separation of
  samples in complex matrices. The necessary background will be given which will allow
  the learner to select an appropriate separation technique for a given analysis.
  The learner will be exposed to the application of advanced separation techniques
  in a wide range of environments focusing mainly, but not exclusively, on applications
  in the pharmaceutical and biopharmaceutical industries.
