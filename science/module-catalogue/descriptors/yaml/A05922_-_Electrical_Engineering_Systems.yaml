indicative_content:
- 'Power in AC systems: Resistive and Reactive, Real and Apparent. Power Factor correction.'
- 'Three phase systems: Star & Delta connections. Balanced & unbalanced loads. Power
  in 3 phase systems. Power factor.'
- 'Transformers: Basic operation, Core losses, Equivalent circuits, phasor diagrams,
  Efficiency, Voltage regulation, Open and short circuit tests'
- 'Machine Theory: Conversion process, magnetic field energy, Rotary motion'
- 'DC machines: General arrangement and operation, EMF calculations, Armature reaction.
  Computation'
- 'DC motors: Armature and Field connections Speed, Torque'
learning_outcomes:
- Explain the differences between real and active power and perform power factor calculations.
- Describe the generation of three phase EMFs and analyse three phase circuits.
- Calculate transformer efficiency and voltage regulation.
- Explain the construction and operation of DC machines.
- Construct, analyse and simulate electrical circuits including transformers and DC
  machines.
learning_and_teaching_methods:
- Lectures
- Tutorials
- Electrical Laboratory sessions
- Computer based simulations to investigate electrical circuit behaviour.
