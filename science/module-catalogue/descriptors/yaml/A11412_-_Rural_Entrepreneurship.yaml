indicative_content:
- 'The entrepreneurial process: profile of an entrepreneur; ontrapreneurship; small
  business ownership'
- Idea generation; creativity and innovation strategies
- 'Establishing the enterprise: legal structures & start-up procedures; gaining a
  competitive advantage; mission statement & SWOT analysis'
- 'Regulatory issues: taxation; accounting; insurance'
- 'Management issues: choosing a location and premises; sources of finance; staffing
  issues'
- 'Managing an enterprise: effective leadership; managerial decision making; motivation
  & learning; managing conflict'
- 'The business plan: writing the plan; funding proposal; detailed projections; presenting
  the plan'
learning_outcomes:
- Evaluate the entrepreneurial process and discuss creativity and innovation strategies
  for small business creation.
- Evaluate and discuss the necessary skills to develop and manage a successful small
  business.
- Appraise and discuss the problems faced by small enterprises from sourcing finance
  to choosing a location for their business.
- Design and write a successful business plan.
- Evaluate motivation techniques and staffing decisions faced by entrepreneurs.
- Critique theories of leadership and decision making in a small business context.
- Evaluate how to establish an enterprise including legal structures, start-up procedures
  and regulatory issues.
- Construct an effective pitch of the business idea.
