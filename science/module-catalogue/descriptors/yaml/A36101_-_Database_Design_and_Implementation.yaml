indicative_content:
- Database Environment
- 'Database Analysis and Design: Relational Modelling, Normalisation, NoSQL databases,
  CAP theorem'
- 'Physical Database Design: Implementation descriptions of physical database'
- Database Implementation
learning_outcomes:
- Appraise the role of a database and its management system.
- Construct Entity Relationship (ER) diagrams from business scenarios and reproduce
  those diagrams into normalised relations ready for database implementation.
- Construct a physical database design.
- Create a relational database using SQL Data Definition Language (DDL).
- Construct queries on a relational database using SQL Data Manipulation Language
  (DML).
- Assess the suitability and use of NoSQL databases.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures using incremental steps to accomplish a skill.
- The continuous assessment will require the student to apply the theory and practical
  knowledge to a new business scenario.
- For online delivery, the lectures and practicals will be a combination of comprehensive
  rich media instructional content (notes), interactive synchronous video (live webinars/classes)
  and asynchronous interactive video playback (on-demand).
