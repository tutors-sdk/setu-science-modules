assessment_criteria:
- '<40%: No understanding of basic cell biology and biochemistry. Unable to carry
  out critical thinking or practical skills.'
- '40%-49%: Demonstrate a limited knowledge of basic cell biology and biochemistry.
  May have some difficulty with critical thinking and problem solving. Adequate practical
  skills.'
- '50%-59%: A good understanding of cell biology and biochemistry with demonstration
  of some critical thinking and problem solving skills. Good practical skills.'
- '60%-69%: In addition to the above, good critical thinking skills and showing a
  high level of competence and efficiency in theoretical and practical components.'
- '70%-100%: A highly developed and extensive understanding of cell biology and biochemistry.
  Excellent technical ability in carrying out and reporting on practical tasks.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
