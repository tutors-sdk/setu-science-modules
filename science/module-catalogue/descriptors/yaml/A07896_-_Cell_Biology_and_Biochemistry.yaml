indicative_content:
- Structure, properties, occurrence and roles of biological macro-molecules
- The ultrastructure of prokaryotic and eukaryotic cells and the functions and interrelation
  of various cell organelles
- The structure and function of cell membranes (transport, cell signalling/communication)
- Enzymatic structure and factors affecting enzyme activity
- An introduction to microbial metabolism
learning_outcomes:
- Distinguish between the four classes of biological macromolecules.
- Illustrate the structural features of prokaryotic and eukaryotic cells and explain
  their functions.
- Outline the importance of enzymes and the various factors affecting enzyme activity.
- Complete and examine qualitative and quantitative biochemical assays.
- Construct and interpret graphs using experimental data.
learning_and_teaching_methods:
- Cell biology and biochemistry is delivered in a multi-modal approach.
- The module consists of lectures, laboratory practicals and online tutorials (on
  or off site).
- The teaching strategy is to adopt a blended learning approach.
- Lecture sessions are delivered using a flipped classroom style.
- Resource material is made available to the student prior to the lecture session.
- The student completes e-activities in the form of quizzes which are designed pre
  and post lecture sessions.
- Audio and video files of module content are provided to cater for the variety of
  learner types (class size < 50).
- Laboratory practicals and tutorial sessions are linked.
- Pre-practical quizzes are used as a formative learning method and these can be completed
  during tutorial sessions on or off-site.
- The entire above are delivered through Moodle using blended and e-learning.
