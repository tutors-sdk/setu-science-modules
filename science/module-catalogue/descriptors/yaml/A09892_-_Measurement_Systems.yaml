assessment_criteria:
- '<40%: Unable to demonstrate a basic understanding of elementary measurement systems,
  sensors and sensor technology. Experimental work is generally poor.'
- '40%-49%: Able to provide partial solutions for complete systems. Display limited
  knowledge of the principles of measurement systems and the science of sensors. Practical
  work reaches an acceptable level.'
- '50%-59%: Able to describe clearly principles of operation of a range of sensors.
  Able to analyse specialised measurement systems. Practical work is performed and
  reported on in a capable manner.'
- '60%-69%: Demonstrates an ability to design a specialised measurement system from
  a number of component parts. Has a high level of experimental skills and has shown
  the ability to produce good, clear reporting of practical work.'
- '70%-100%: All the previous to an excellent level. Demonstrates an understanding
  of the limitations of circuits and measurement systems and subsequent consequences.
  Assess whether solutions are meaningful. Can critically assess any experimental
  work undertaken.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
