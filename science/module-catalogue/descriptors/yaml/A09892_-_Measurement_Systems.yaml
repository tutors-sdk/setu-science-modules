indicative_content:
- 'General principles: general measurement systems; characteristics of measurement
  system elements'
- 'Signals and noise in measurement systems: effects of noise on measurement circuits;
  methods of reducing the effects of noise'
- 'Sensing elements: resistive, capacitive, inductive, electromagnetic, thermoelectric
  and ultrasonic'
- 'Signal conditioning: potential divider, bridge circuits; general amplifier characteristics,
  operational amplifiers, feedback amplifiers'
- 'Signal processing: active filters; low-pass, high-pass, band-pass and band-stop;
  analog to digital inter-conversion'
- Sensor science and the study of a number of specialised sensor systems
learning_outcomes:
- Examine the general principles and characteristics of measurement systems.
- Examine the various types of noise and demonstrate methods of reducing the effects
  of noise in measurement circuits.
- Examine the various signal conditioning elements of a measurement system.
- Examine the principles of various signal processing elements of a measurement system.
- Appraise the critical scientific and technological characteristics and applicability
  of a broad range of sensor systems.
- Develop experimental skills in the design, implementation, testing and reporting
  of various elements of a measurement system.
- Design and test experiments using National Instruments Multisim and LabVIEW.
- Prepare and deliver a presentation to disseminate results of practical work.
learning_and_teaching_methods:
- 'Lectures: Lectures will be used to introduce new topics and their related concepts.'
- 'Practicals: The practical element will allow students to design implement and test
  systems, interpret and report experimental results.'
- Self-directed learning.
