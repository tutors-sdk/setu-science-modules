aim: The emphasis of the module will be towards design, analysis and implementation
  of a number of complete measurement systems. There will be a comprehensive study
  of the general principles of measurement systems, including sensors, signal conditioning,
  signal processing and presentation. A number of specialised systems will be developed
  in the laboratory programme of this module, using a graphical programming language
  (National Instruments LabVIEW).
