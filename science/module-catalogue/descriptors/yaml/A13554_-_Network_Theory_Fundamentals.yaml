reference: A13554
full_title: Network Theory Fundamentals
short_title: Network Theory Fundamentals
credits: 5
level: Intermediate
author: ADALYWALSH
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Mathematics and Physics
aim: This module will introduce students to the principles of graph/network models
  and information theory. The module will focus on the practical application of the
  fundamental concepts to problems in computing, such as, resource allocation, planning,
  optimization problems, and software testing.
