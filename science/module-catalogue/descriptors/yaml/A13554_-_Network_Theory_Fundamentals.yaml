indicative_content:
- 'Graph and Network Models: Network algorithms for applied problems; Minimal spanning
  tree and shortest route problems; project networks; application of network models'
- 'Information Theory: Information measure and entropy; source coding; Shannon theory
  and Huffman codes; noisy channel coding theorem; error correcting codes'
- 'Finite-State Machines: Network and matrix representation; equilibrium and absorbing
  states, applications to software testing; cellular automata models'
learning_outcomes:
- Use mathematical software to solve network based optimisation problems and interpret
  solutions generated.
- Apply appropriate algortihms to solve graph/network theory problems.
- Apply fundamental concepts and techniques of information theory.
- Apply finite-state machine techniques to problems in computing, such as software
  testing.
learning_and_teaching_methods:
- The lectures will be used to present mathematical concepts.
- The tutorials are used to reinforce material covered in lectures by practicing solving
  problems.
- The practicals will help students investigate and study real world problems using
  industry based software.
