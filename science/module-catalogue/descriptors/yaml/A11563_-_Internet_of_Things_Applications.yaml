indicative_content:
- 'IoT Application Fundamentals: Device communication characteristics; Device data
  characteristics; Event-based integration'
- 'IoT Architectures: Device centric; Cloud centric; Gateway centric'
- 'Development Frameworks and Platforms: IoT-specific Microcontroller Platforms; Cloud-based
  application development platforms'
- 'IoT-based Services: Device Solution Development kits; Device access and configuration;
  Cloud based data and operational services integration'
- 'Device and Application interactions (middleware): Device discovery and addressing;
  Listeners and Message brokers'
- 'Sensor data: Real-time sensor data access; Filtering, aggregation, Time-series
  archiving'
learning_outcomes:
- Design, develop and implement software applications that interconnect heterogeneous
  physical world devices and sensors, mobile devices, and cloud-based services.
- Evaluate and use a suitable development platform for IoT applications.
- Design, develop and implement software APIs that promote scalable, modular access
  to physical world sensors, actuators and devices.
- Integrate cloud based data storage solutions with device and sensor data.
- Integrate suitable messaging, gateway, and middleware solutions to develop applications
  that provide direct, real-time access to low level devices and sensors.
- Develop a knowledge discovery based web application that utilises the storage and
  computational power of the cloud.
learning_and_teaching_methods:
- Combination of lectures and computer-based practicals.
- Lectures will cover key topics in IoT application architectures, frameworks, and
  services.
- Practicals will allow students to explore the tools and technologies used to build
  and connect that components of an IoT application.
