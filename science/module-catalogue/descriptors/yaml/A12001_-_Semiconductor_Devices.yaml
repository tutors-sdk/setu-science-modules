indicative_content:
- Review of Semiconductor Theory
- The Bipolar Junction Transistor & Applications
- The Metal-Oxide-Semiconductor Transistor & Applications
- Compound Semiconductor Devices & Applications
- Semiconductor TCAD Tools
learning_outcomes:
- Describe the fundamental concepts of solid state theory as applied in the analysis
  of carrier transport processes within semiconductor materials and transistor devices.
- Explain the advanced physical processes employed in the fabrication of semiconductor
  transistor structures.
- Analyse the basic design, operation and manufacture of bipolar, metal-oxide-semiconductor
  and compound transistor structures.
- Apply the knowledge and comprehension gained in analysing and relating macroscopic
  semiconductor diode performance parameters to semiconductor solid state theory &
  associated fabrication processes.
- Demonstrate the basic use of TCAD software tools and methods as used in the design,
  analysis and development of complex transistor structures.
