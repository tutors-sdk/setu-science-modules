reference: A12001
full_title: Semiconductor Devices
short_title: Semiconductor Devices
credits: 5
level: Advanced
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electronics
aim: The course aims to advance the students knowledge of the fundamentals of solid
  state theory in respect of the analysis and design of complex semiconductor based
  transistor structures. A comprehensive review of the design, operation and manufacture
  of bipolar, metal-oxide-semiconductor and compound transistor structures is undertaken.
  The use of semiconductor TCAD tools for complex transistor structures is also concurrently
  introduced.
