aim: Sustainable production of timber, fibre and fuel from forests is dependent on
  implementing the appropriate harvesting methods and systems on each site. Harvesting
  operations impact forest regeneration, forest health and productivity over time.
  Harvesting must be implemented ensuring safety of staff and the public and protection
  of soil, water, biodiversity and archaeological features, in accordance with regulatory
  guidelines. Forest harvesting in Ireland is forecast to expand from the current
  three million cubic metres per annum to six million cubic metres per annum over
  the next fifteen years, according to the All Ireland Roundwood Production Forecast
  2011 to 2028, published by COFORD. Expanding professional capacity in this area
  will be vital in realising this expansion opportunity. In this module students will
  gain specialist knowledge on the harvesting methods and systems employed in sustainable
  harvesting, and the limitations of these systems due to site conditions. Students
  will gain skills in designing a harvest plan, assessing harvesting productivity
  and production cost, carrying out an Environmental Impact Assessment, diagnosing
  site specific safety issues and constraints on harvesting, and identifying appropriate
  solutions. To enable students to carry out this work, they will be given an in-depth
  knowledge of harvesting-related equipment, safety procedures, machine productivity
  and operation cost and environmental issues.
