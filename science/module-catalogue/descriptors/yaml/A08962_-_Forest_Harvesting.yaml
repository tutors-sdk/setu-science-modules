indicative_content:
- 'Silvicultural systems and regeneration harvesting: clearfell, shelterwood, single
  tree and group selection, continuous cover'
- 'Harvesting methods: cut to length, wholetree, pole length'
- Harvesting systems and equipment for the harvesting, processing and extraction of
  timber products
- Harvester and forwarder productivity and cost in cut to length thinnings and clearfells
- Machine/ground interaction, ground pressure and traction and machine impact on remaining
  standing trees
- Environmental considerations and guidelines
- 'Harvest planning and scheduling: Harvest Plan & Environmental Impact Assessment
  development'
- 'Thinning: thinning types, thinning control, thinning intensity, timing and impact;'
- 'Machine cost calculations: ownership and operating costs, utilisation rate and
  hourly machine cost'
- 'Assessing machine productivity: time and motion studies, assessing production over
  time, determining unit cost of timber production'
- Managing operator and public health and safety on a harvesting site
- Information technology in harvesting and timber haulage, harvest head calibration,
  assortment specifications & the Irish timber market
learning_outcomes:
- Differentiate between different harvesting methods and systems and the key components
  of harvesters and forwarders.
- Apply the appropriate harvesting methods and systems under various harvest site
  conditions taking into consideration the principles of SFM.
- Demonstrate knowledge of the component costs of machine ownership and operation,
  and calculate the hourly machine rate from machine cost and utilisation rate.
- Appraise the key points in harvester head calibration and the information stream
  from pre-sale inventory to timber haulage.
- Recommend the correct working procedures on a site in accordance with the Forest
  Service Environmental Guidelines.
- Construct a harvesting plan for a clearfell/thinning area taking into consideration
  operator safety, operational aspects, and the protection of the environment.
- Prepare a technical report on the productivity and timber production cost of a harvester
  and forwarder operation.
- Compile a risk assessment containing the appropriate precautionary measures in order
  to manage operator and public health and safety on a harvesting site.
learning_and_teaching_methods:
- 'Lectures: will be used to introduce the principles and practices used in forest
  harvesting and the regulatory framework around the management of forest operations
  with regard to sustainable forest management, environmental protection and health
  and safety.'
- 'Field trips: will provide students with opportunities for experiential learning
  of forest harvesting operations management and health and safety; students will
  also gather case study material and data sets for the harvesting plan and productivity
  study project.'
- 'Independent Learning: Reading recommended reference books, supplementary papers
  and handouts, and viewing recommended web-based material to consolidate knowledge
  of the module content.'
