indicative_content:
- Principles of DNA cloning and techniques
- Construction and screening of cDNA and genomic libraries
- Gene and genome sequencing; applications and next-generation sequencing technologies
- Gene expression and regulation and the role of epigenetic modifications; DNA tools
  relevant to epigenomics
- Advanced DNA techniques/tools in the study of gene detection/ expression/ genotyping/
  polymorphisms/DNA profiling, such as DNA microarrays, SNP arrays and real-time PCR
- Emerging DNA technologies such as genome editing and digital PCR
- 'Bioinformatics: basic sequence analysis; DNA and protein databases; Clustal/BLAST-based
  searching and alignments; cladograms and phylogenetic trees; protein sequence/function
  determination'
learning_outcomes:
- Comment on the principles of DNA cloning and evaluate various vector and library
  systems.
- Evaluate the techniques used to sequence individual genes and entire genomes.
- Compare the methods used to study individual genes and entire genomes, such as detection,
  expression and function.
- Distinguish emerging methodologies relevant to molecular biology.
- Manage, interpret and evaluate various bioinformatics analysis tools and various
  DNA technology practical techniques.
learning_and_teaching_methods:
- Lectures using a blended learning approach.
- Lab-based practicals.
- Computer-based bioinformatic classes.
- A learning and teaching strategy appropriate to level 8 will be adopted throughout
  with opportunities for formative assessment to encourage reflective, critical thinking.
