  stage: 1
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Mathematic Fundamentals: review of arithmetic operations; fractions; significant
  figures; decimal places; percentages; ratios; prefixes, scientific notation; vectors
  and scalars'
- 'Introduction to Algebra: simplifying algebraic expressions; factorisation and algebraic
  fractions'
- 'Transposition and solution of equations: rearranging a formula; solving linear
  equations; solving simultaneous equations; solving quadratic equations'
- 'Introduction to trigonometry: degrees; sine rule and cosine rule'
- Introduction to measurement, SI units and the need for standards
- 'Mechanics: motion in one dimension, Newton''s laws of motion; work, energy and
  power; mechanical energy, total energy and momentum; simple machines and levers'
- 'Properties of matter: properties & structure of matter; density and relative density;
  pressure, atmospheric pressure and hydraulic pressure; temperature and temperature
  scales'
- Electric circuits; resistance, current and Ohm's Law; simple DC circuits and electrical
  safety
- Where possible, practical Agricultural applicaions and examples will be used when
  teaching the above content
learning_outcomes:
- Use and manipulate routine algebraic and numerical calculations.
- Construct linear and non-linear equations of varying complexity.
- Use and apply trigonometric functions in the context of applications to physics.
- Describe and explain some fundamental principles of mechanics and properties of
  matter.
- Apply problem-solving skills to analyse simple electric circuit problems.
- Complete experiments, record and analyse experimental data and present results in
  the form of a report.
learning_and_teaching_methods:
