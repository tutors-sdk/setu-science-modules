reference: A36581
full_title: Mathematics and Physics for Agriculture
short_title: Maths Physics
credits: 5
level: Introductory
author: TWOODCOCK
history_comment: ''
school: Science and Computing
department: Land Sciences
cluster: Mathematics and Physics
aim: This module will introduce the student to linear and non-linear algebra. There
  is an emphasis throughout this module on the role of mathematics in the sciences,
  including real world applications. This module also introduces the student to some
  fundamental principles of physics and their application to the physical world/environment.
  The module contains a practical component where the student can develop measurement,
  analysis and report-writing skills.
