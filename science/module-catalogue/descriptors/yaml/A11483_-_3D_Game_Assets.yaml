cluster: Game Development
aim: This module serves as an introduction to 3D modelling for game asset designers
  and comprises an emphasis on the modelling pipeline, from concept to model creation
  to rigging and skinning, and techniques used for the exporting of 3D models to be
  used in a game engine.
