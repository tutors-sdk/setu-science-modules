indicative_content:
- 'Introduction to microbial ecology: examples of microbial ecosystems, microbe/microbe
  interactions, biofilms'
- Microbe/macrobe interactions such as intestinal microflora, mycorrhizae
- Culture-dependent and independent analysis of microbial communities, e.g. plate
  counts, selective enrichment, microscope-based methods, Lux and GFP tagging, FISH,
  DNA-based profiling, including high throughput sequencing methods
- 'Wastewater treatment: traditional and newer remediation methods, nutrient removal
  from wastewater'
- 'Bioremediation in soils and water: xenobiotics, pollutant bioremediation'
- Anaerobic digestion and composting
- 'Field trips: field trips to facilities such as integrated wetland systems and wastewater
  treatment plants'
- 'Laboratory practicals: analysis of microbial diversity in natural ecosystems, using
  both culture-dependent and independent techniques; isolation and characterisation
  of microbes from the environment'
learning_outcomes:
- Apply appropriate culture-dependent and -independent methodologies for analysis
  of microbial ecosystems.
- Appraise the relationships microbes can have with each other and with macro-organisms.
- Analyse the role of micro-organisms in a variety of microbial ecosystems, e.g. nutrient
  cycles, biodegradation of pollutants, animal and human intestines.
- Express how bioremediation can help to provide solutions to current issues of concern
  to society.
- Compare strategies for biological remediation and monitoring of pollution.
- Prepare detailed records of activities of both laboratory and field visits.
learning_and_teaching_methods:
- Lectures on the indicative content will be delivered, including active learning
  activities, peer-to-peer learning, and formative assessment (ungraded quizzes).
- Laboratory investigations plus field trips will reinforce and support theoretical
  elements of the module.
- Independent case study assignment on bioremediation will be carried out.
