reference: A06318
full_title: Microbial Ecology and Bioremediation
short_title: Micro Ecology & Bioremediation
credits: 5
level: Intermediate
author: NKENNEDY
history_comment: ''
school: Science and Computing
department: Science
cluster: Biology
aim: This module will give students a broad introduction to the major elements of
  microbial ecology and bioremediation. The interplay between microbe and macrobe
  will be studied, with an emphasis on the role of this interaction in areas such
  as the intestine and nutrient cycles in the environment. A series of laboratory-based
  experiments plus field trips will be used to reinforce the theory elements of this
  module.
