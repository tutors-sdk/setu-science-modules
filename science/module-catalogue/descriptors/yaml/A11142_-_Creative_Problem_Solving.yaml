learning_outcomes:
- Examine the role of creativity and innovation in high tech industries.
- Apply systematic methods and logical reasoning to problems and decisions.
- Employ creative models and methods to design, implement and evaluate solutions.
- Construct and analyse arguments.
- Complete research activities on their own initiative.
