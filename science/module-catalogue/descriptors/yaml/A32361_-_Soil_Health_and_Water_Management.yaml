assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills.'
- '40%--59%: The learner will be able to demonstrate a good understanding of the different
  aspects to soil health and how these can be assessed and measured. The student will
  be able to conduct and write a case study/resource audit.'
- '60%--69%: In addition to the above, the student will demonstrate more detailed
  knowledge of soil mineral balancing, and module topics including effective and efficient
  water storage and utilisation. The student will also be able to write and present
  a good quality case study on soil and water reources.'
- '70%--100%: The learner will be able to demonstrate comprehensive knowledge and
  understanding of all learning outcomes, including an innate understanding that all
  animal and crop production is founded on the sustainable management of these primary
  resources and produce a comprehensive audit case study on soil and water resources.'
