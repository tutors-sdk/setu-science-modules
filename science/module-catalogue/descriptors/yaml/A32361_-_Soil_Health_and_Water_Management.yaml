indicative_content:
- Soil biological, chemical, and physical field assessment and laboratory analysis
  methods
- Soil nutrient and mineral balancing to optimise animal and plant production in regenerative
  agriculture
- Feeding soil for enhanced soil biological activity for improved nutrient cycling
  and recycling in regenerative agriculture
- Soil fertility maintenance necessary for plant, animal and human health following
  transition to organic low input systems
- Assessment of soil structure and prevention and mitigation of degradation, compaction,
  and erosion
- Optimising the water cycle - effective versus non-effective rainfall and water availability
  and storage
- Harnessing water resources for livestock hydration and maintenance and crop irrigation
  systems
- Developing policy and regulation for soil and water management in the EU Green Deal,
  F2F Strategy, and the Programme for Climate Action
learning_outcomes:
- Describe and explain priority field and laboratory practices for soil assessment,
  analysis methods, and techniques.
- Interpret soil analyses to estimate optimum inorganic and organic fertiliser levels
  required to balance the soil nutrient profile for improved output and production.
- Show how to manipulate soil micro-organism activity to enhance soil biological processes
  for nutrient cycling and recycling.
- Categorize and discriminate between different land management practices to reverse
  soil degradation and improve physical function.
- Arrange and combine evidence for natural water management practices to develop plans
  for climate resilient production.
- Estimate and evaluate the cost-effectiveness and profitability of water irrigation
  systems and storage practices for crop and livestock production.
- Critique, interpret and summarize appropriate and relevant scientific research information
  and associated best practice for climate resilient soil and water management.
learning_and_teaching_methods:
- Online lectures, guest lectures, laboratory practical, podcasts
- Field visit and assessment for class discussion
- Self-directed case-study for a farm natural resource audit
