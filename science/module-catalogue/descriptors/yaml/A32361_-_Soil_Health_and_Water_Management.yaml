aim: The module will review soil biological, chemical, and physical processes and
  provide demonstration and explanation in field assessment techniques and current
  laboratory analysis methods. Soil mineral balancing will be investigated and its
  central role in achieving optimum animal and plant production. Feeding soil to enhance
  and improve soil biological activity and regenerative agriculture practices for
  soil nutrient cycling and recycling will also be studied. Regulations pertaining
  to conversion to organic production and the amendment of organic products to land
  will be reviewed. The role of soil texture and structure on drainage, soil trafficability,
  and water availability will be appraised along with the management of soil physical
  quality. The primary objective of this course is to enable, and empower, participants
  to assess soil profiles, associated properties and understand how to prevent and
  mitigate soil degradation and improve overall soil health, function, and water relations
  for climate resilient food production.
