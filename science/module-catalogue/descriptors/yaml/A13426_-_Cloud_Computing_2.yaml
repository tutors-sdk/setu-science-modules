corequisites: []
indicative_content:
- Software Defined Networking (SDN)
- Openflow
- Network Function Virtualisation (NFV)
- Application Delivery Controllers
- 'Performance Management : Load Balancing; Caching'
- 'Infrastructure Orchestration : Ansible; Chef'
- 'Containerisation: Docker'
- Enabling Technologies for Internet of Things
- 'Big Data Infrastructure : Hadoop clusters'
learning_outcomes:
- Evaluate the main technologies and concepts required to deliver virtualised services
  in Public and Private Cloud environments.
- Set up program services for SDN Controllers.
- Deploy and critically assess appropriate technologies in the provision of scalable,
  efficent and secure application communications.
- Determine and evaluate Cloud based components in the provision of Cloud Application
  Services.
- Design and implement solutions using automated infrastructure tools.
learning_and_teaching_methods:
- The practical lab component will be delivered in one double lab session.
- Combination of lectures and computer-based practical and simulation exercises.
- Self-directed learning.
