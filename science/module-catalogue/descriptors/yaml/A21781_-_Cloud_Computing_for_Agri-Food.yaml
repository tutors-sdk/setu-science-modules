assessment_criteria:
- '<40%: Unable to explain key cloud computing concepts, technologies and services.
  Unable to effectively use a cloud platform. Unable to configure basic infrastructure
  services to meet assignment requirements. Unable to interpret and describe key concepts
  of cloud application infrastructure and automation.'
- '40%-49%: Able to explain key cloud computing concepts, technologies and services
  and carry out basic analysis. Can deploy an application to a popular cloud platform.
  Can configure basic infrastructure services to meet assignment requirements. Able
  to interpret and describe key concepts of cloud application services and automation.'
- '50%-59%: In addition, can explain in technical detail key cloud computing technologies
  and services. Can deploy a moderately sophisticated application to a popular cloud
  platform. Can discuss key concepts of the specific knowledge domains covered above
  and ability to discover and integrate related knowledge into cloud based application
  architectures.'
- '60%-69%: In addition, can deploy a complex application to a popular cloud platform.
  Able to solve problems within the specific knowledge domain by experimenting with
  the appropriate skills and tools.'
- '70%-100%: All of the above to an excellent level. Can go beyond the basic practical
  specification and demonstrate competence with other services. Can demonstrate a
  deep understanding of deployment and management of a multi-tier cloud application.'
