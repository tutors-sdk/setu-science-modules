indicative_content:
- Main concepts of cloud computing
- 'Overview of computer systems infrastructure technologies: number bases; computer
  organisation; operating systems; file management'
- 'Computer networks: protocols & encapsulation; addressing and identification; LANs
  & WANs, TCP/IP, HTTP, DNS'
- Security concepts -- encryption, authentication, public key infrastructure.
- Virtualisation
- Cloud usage scenarios
- Using and integrating cloud services
- 'Public cloud services: storage; compute; networking'
- Configuration of multi-tier application infrastructure services
- Virtual private clouds
- Web Application Architectures -- Performance, Scaling, Load Balancing and Security
- Network and application management and monitoring
learning_outcomes:
- Discuss the evolution of cloud computing.
- Appraise the main computing service and deployment models that are in widespread
  use.
- Install and set up a contemporary operating system (e.g. within a virtualised or
  single board environment), and configure the services necessary to support basic
  applications.
- Analyse the operation and features of computer network protocols and services.
- Demonstrate competency with a limited set of the utilities provided by a contemporary
  operating system using a command-line interface (CLI).
- Deploy an application that integrates a selection of cloud services using a popular
  cloud platform (e.g. IBM Bluemix or Amazon Web Services).
- Explore cloud computing services and technologies from the perspectives of security,
  privacy and cost.
- Compare and contrast the main technologies required to manage and monitor cloud-based
  applications.
- Appraise and apply principles of application performance, scalability, load balancing
  and security.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical lab component will be delivered in block sessions.
- Strong emphasis is given to practical laboratory exercises with extensive use made
  of virtualised and cloud environments.
