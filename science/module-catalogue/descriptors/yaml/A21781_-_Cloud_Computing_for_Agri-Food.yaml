reference: A21781
full_title: Cloud Computing for Agri-Food
short_title: Cloud Computing for Agri-Food
credits: 10
level: Advanced
author: ADUNPHY
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: AgriFoodICT
aim: This module introduces students to the capabilities of cloud computing, especially
  when applied to agricultural applications. The main concepts of cloud computing
  are covered and students carry out a series of practical exercises with cloud computing
  technologies and services. Students are also exposed to those concepts of computer
  organization, security and networking that are required to work in cloud environments.
