indicative_content:
- Harmonic waves; phase and phase velocity
- Complex representation
- Plane and spherical waves
- Maxwell's equations and electromagnetic waves; energy and momentum of electromagnetic
  waves, Poynting vector
- Polarisation of electromagnetic waves
- Superposition principle; complex methods and phasor addition
- Phase and group velocities
- Fourier analysis; periodic and non-periodic waves
- Pulses and wave packets; optical bandwidth
- Mathematical representation of polarised light
- Dichroism, polarisation by scattering and reflection
- Birefringence, double refraction and optical activity
- Fraunhofer and Fresnel diffraction
- The grating equation, free spectral range, dispersion, resolution; blazed gratings;
  interference gratings
- 'Introduction to lasers: elements of laser, gain-medium and resonant cavity; elementary
  description of 3- and 4-level lasers; HeNe and semiconductor lasers; applications
  in science, engineering, medicine'
learning_outcomes:
- Analyse the theory underpinning the mathematical representation of electromagnetic
  waves and physical optics.
- Apply electromagnetic theory to the aspects of polarisation, interference, diffraction,
  scattering, and to waveguide propagation.
- Analyse the theory underpinning the operation of key photonic devices and a range
  of their applications in telecommunications, medical science, metrology.
- Demonstrate practical experience in the investigation and analysis of complex optical
  phenomena.
