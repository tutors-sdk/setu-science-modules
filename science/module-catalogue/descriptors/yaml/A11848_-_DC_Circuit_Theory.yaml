aim: This is the first time the student encounters Circuit Theory. The course introduces
  circuit analysis for resistive networks. It introduces capacitors & inductors and
  transient step function responses for RC & RL circuits. Ferromagnetism is explained
  and B-H curves treated. Teaching is carried out in the classroom and laboratory.
