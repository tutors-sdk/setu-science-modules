indicative_content:
- 'Resistance & simple circuits: resistivity, Ohm''s Law, series & parallel, Kirchhoff''s
  Laws, current & voltage divider laws'
- 'Network Theorems: Thevenin & Norton equivalents, loop analysis, delta-star/star-delta
  conversion, maximum power transfer for resistive loads'
- 'Electrostatics and Capacitance: permittivity, first order (RC) transients - solution
  of first order differential eqn, series & parallel'
- "Introduction to Magnetism and Inductance; permeability, B-H curves, ferromagnetism,\
  \ domains, hysteresis, first order (RL) transients, series & parallel, Amp\xE8re's\
  \ circuital law"
learning_outcomes:
- Analyse and explain the behaviour of simple circuits by employing fundamental circuit
  theory rules.
- Examine and transform sources and circuit configurations, to enhance understanding
  and evaluation of a circuit.
- Derive and apply the Maximum Power Transfer Theorem to any suitable circuit element.
- Predict the step response of RC & RL circuits.
- Interpret B-H curves for magnetic materials.
- Demonstrate a practical ability to develop, troubleshoot, test, analyse and report
  on D.C circuits.
