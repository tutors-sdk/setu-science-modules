reference: A07698
full_title: Environmental Education
short_title: Environmental Education
credits: 5
level: Advanced
author: UMCDERMOTT
history_comment: ''
school: Science and Computing
department: Science
cluster: Horticulture
aim: This module will provide students with the necessary skills to teach people about
  the natural environment using interactive, informal learning activities and materials.
  These people may be groups or individuals, school children, members of the public
  or other interested groups.
programmes:
- timetable: EDUC-0023
  code: WD_SBSHO_B
  name: Bachelor of Science (Honours) in Land Management (in Horticulture)
  stage: 1
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Identifying good guiding techniques, identifying audiences, tailoring delivery and
  content to groups and individuals
- Safety issues, hazard identification of any activity
- Interpretation methods and techniques
- Planning activities to meet targets, evaluating activities
learning_outcomes:
- Propose a range of activities to exploit and explain the natural environment.
- Select a range of materials suitable for use on a site for educational purposes.
- Evaluate an existing interpretative program.
- Propose an educational/interpretative program with associated evaluation methods,
  for a given group.
learning_and_teaching_methods:
- Lectures.
- Site visits.
- Problem-based scenarios.
