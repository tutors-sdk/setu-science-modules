- 'Ham, S.H. _Environmental Interpretation: A Practical Guide for People With Big
  Ideas and Small Budgets_. US: Fulcrum, 1992.'
- 'Serrell, B. _Exhibit Labels: An Interpretive Approach_. 2nd ed. Maryland , US:
  Rowman & Littlefield Publishers, 2015.'
