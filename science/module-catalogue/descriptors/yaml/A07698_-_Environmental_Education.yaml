assessment_criteria:
- '<40%: Cannot suggest appropriate activities to use, with specific groups, unable
  to evaluate activities, cannot develop new material, cannot plan activities.'
- '40%-49%: Can suggest some appropriate activities and can modify existing activities
  has poor evaluation skills but can recognise key issues with activities, has poor
  planning skills, has problems selecting appropriate evaluation method.'
- '50%-59%: Can suggest several activities, can develop new activities, has competent
  evaluation skills, has good planning skills, can suggest several basic evaluation
  methods.'
- '60%-69%: Can suggest a range of activities, can develop new activities, has good
  evaluation skills recognising subtleties of different approaches. Has good planning
  skills and can select appropriate evaluation methods.'
- 70%-100%:Can suggest a wide range of activities, can develop new activities, has
  excellent evaluation skills recognising subtleties of different approaches and has
  developed self critical awareness. Has good planning skills and can develop and
  select appropriate evaluation methods.
essential_material:
- 'Ham, S.H. _Interpretation-Making a Difference on Purpose_. US: Fulcrum, 2013.'
supplementary_material:
