indicative_content:
- 'Penetration Testing: Probing attacks; Remote to local attacks; User to root attacks'
- 'Incident Response: Live response techniques'
- Data Collection
- 'Data Analysis: Content data; session data; statistical data; alert data'
- Report Preparation and Presentation
learning_outcomes:
- Demonstrate attacks remotely on networked computers.
- Develop an appropriate response strategy to incidents on computer networks.
- Use appropriate tools to gather network based evidence.
- Analyse network-based evidence for session, statistical, content and alert data.
- Produce documentation for an investigation into a network based attack.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals. The lectures
  will be used to introduce new topics and their related concepts. The practical element
  allows the student to put into practice the theoretical concepts covered in the
  lectures.
