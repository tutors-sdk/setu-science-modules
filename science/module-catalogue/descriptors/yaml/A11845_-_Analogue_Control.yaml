indicative_content:
- System Modelling of selected Control systems using Classical Methods
- State Space Modelling
- Transient response analysis of Control systems
- Frequency Response Stability analysis
- Analogue Controller Design classical techniques
- Modern Controller design
- Three Term Controller
learning_outcomes:
- Model analogue control systems.
- Analyse analogue control systems in the time and frequency domains.
- Design analogue controllers using classical design techniques.
- Design analogue controllers using modern design techniques.
- Use MATLAB for stability analysis and controller design.
