aim: 'The focus of this module will be on five components: computer architecture,
  memory management, process management, file system management and virtualisation.
  The student will be given hands-on experience in installing and configuring contemporary
  operating systems and application services with an emphasis on the Linux environment,
  including use of the command line interface and writing scripts.'
