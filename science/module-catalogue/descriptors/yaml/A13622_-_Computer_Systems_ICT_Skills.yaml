indicative_content:
- 'Translation and calculation in the following number bases: Binary, octal, decimal,
  hexadecimal. Mod arithmetic'
- 'Boolean Algebra: Basic logic & truth tables'
- Computer System Architecture -- CPU, memory, storage
- Data Representation
- 'Operating system structure: Components, services and utilities'
- 'Process Management: Data structures, concurrency, threads, scheduling, synchronization'
- 'File management: File-system utilities, file system implementation, case studies'
- 'Memory management: Paging, segmentation, virtual memory'
- Scripting
- Virtualisation
learning_outcomes:
- Calculate operatons in binary, octal, decimal and hexadecimal number bases.
- Apply the basics of Boolean Logic.
- Describe how the components of a computer system operate together.
- Demonstrate the relationship between high-level software, low-level programming
  and hardware.
- 'Evaluate the memory, process and file management components of a modern operating
  system with regard to: Operation principles, data structure requirements and algorithms
  used.'
- Explain the concepts and theory of virtualisation and in particular how this relates
  to operating systems management and development.
- Setup and confirgure some contemporary operating systems (within a virtual PC environment),
  and configure the services necessary to support basic applications.
- Demonstrate competency with a limited set of the utilities (e.g. file management)
  provided by a contemporary operating system.
learning_and_teaching_methods:
- This module will be delivered using a combination of lectures and practical laboratory
  work.
- The lectures will be used to introduce new topics and their related concepts.
- The practicals will focus on developing the practical skills of the student using
  simulation exercises.
