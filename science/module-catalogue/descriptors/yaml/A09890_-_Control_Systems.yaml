indicative_content:
- 'System modelling: modelling physical dynamic systems, free body diagrams, analogous
  electrical and mechanical systems; differential equations, modelling in the frequency
  domain, Laplace transforms'
- 'Time response: pole and zero plots, transient response of first-order systems;
  general response of second-order systems to step, ramp, impulse and sinusoidal input;
  under, critically and overdamped systems; performance of a step response of a second
  order under-damped system; approximation of higher-order systems'
- 'Modelling in the time domain: state-space representation, electrical and mechanical
  systems in state space, transfer function to state space'
- 'Reduction of multiple sub-systems: block representation, block diagram reduction
  of multiple subsystems; conversion from block diagrams to signal-flow diagrams;
  representation of state equations as signal-flow graphs'
- 'Frequency response methods: frequency response plots and measurements; performance
  specifications in the frequency domain. Log magnitude and phase diagrams'
- 'Control system design: stability criteria and analysis; PID controllers: design
  techniques, applications'
learning_outcomes:
- Construct the differential equations that describe the dynamic behaviour of physical
  systems, describe quantitatively the transient response of first-order and second
  order systems to unit step, ramp, impulse and sinusoidal inputs.
- Derive transfer functions of dynamical systems using Laplace transformations.
- Construct block diagram, and signal flow graph representations of systems using
  standard techniques.
- Develop models of a range of systems in state space.
- Determine the time response of a linear system and its dependence on the poles and
  zeros of the transfer function and approximate higher-order systems and systems
  using the dominant pole method.
- Construct and interpret Bode frequency response plots and describe how the shape
  of these plots depend on the poles and zeros of the transfer function .
- Design Simulink models of a range of dynamical systems.
- Design MATLAB programs to generate root locus and other graphical aids and apply
  to PID tuning.
learning_and_teaching_methods:
