aim: The module is designed for physics undergraduate students. There will be a comprehensive
  study of the concepts of control system theory as they have been developed in the
  frequency and time domains. The classical methods of control engineering are thoroughly
  covered in this module. The laboratory programme will be based on the use of the
  MATLAB and Simulink in the modelling, design and analysis of control systems.
