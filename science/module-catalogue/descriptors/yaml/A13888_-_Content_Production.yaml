reference: A13888
full_title: Content Production
short_title: Content Production
credits: 5
level: Intermediate
author: ROCONNOR
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Media Production
aim: Participants create high-quality media assets for simulated clients or events.
  This is a highly-practical module which challenges the students? communication,
  team-building and audio/visual development skills.
programmes:
- timetable: COMP-0666
  code: WD_KCOMP_B
  name: Bachelor of Science (Honours) in Applied Computing
  stage: 3
  semester: 5
  status: E
prerequisites: []
corequisites: []
indicative_content:
- Group communication
- Regulatory environments and bodies
- Audiovisual media conception, creation and evaluation
- Arts informed computing
learning_outcomes:
- Assess several issues raised by collaborative software.
- Organise themselves within a team environment.
- Apply a variety of design methods to a given problem.
- Compose, adapt and/or develop assets to a set of specifications.
- Review their performance based on appropriate metrics.
learning_and_teaching_methods:
- This module will be characterised by student participation in both formal theoretical
  and practical/studio classroom activities in which students learn theoretical concepts
  and apply them immediately using dedicated hardware and software.
- Practice based learning (PBL).
- Collaboration and peer-review between students.
- Studio classes will be delivered in two 2-hour blocks.
- 'Sample Project: Create a mixed media documentary on a particular topic: audio,
  video and supplementary website and evaluate performance on completion; Develop
  a mixed media application for WIT open day and evaluate performance on completion.'
- Apple Mac computer lab with relevant hardware & software (kept up to date at least
  annually e.g. AdobeCC, iMovie).
- Accessible, professional sound proofed recording studios with professional microphones
  and audio workstations (Vibe FM studios).
- Access to cameras.
- Video/Photography Studio.
learning_modes:
- full_time: 48
  name: Practical
