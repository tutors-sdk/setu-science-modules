  weighting: 100
assessment_criteria:
- '<40%: Unable to interpret and describe key concepts of the content production domain.'
- '40%-49%: Be able to interpret and describe key concepts of the content production
  domain.'
- '50%-59%: Ability to discuss key concepts of the mixed media content production
  domain and ability to discover and integrate related knowledge from simulated client
  specificiations.'
- '60%-69%: Be able to solve problems within the specific knowledge domain(s) through
  creative use of the appropriate skills and tools.'
- '70%-100%: All the above to an excellent level. Ability to demonstrate mastery of
  specialised skills in writing and communication of ideas.'
