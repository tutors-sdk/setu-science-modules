indicative_content:
- Introduction
- Threats -- threats to data; online threats; device threats
- Security Awareness -- security services; security systems
- Security Technologies -- physical security; digitally secured systems; security
  systems
- Digital Evidence - types of evidence; chain of custody; crime scene searching
- Digital Forensic Investgiations -- evidence cloning; evidence analysis; evidence
  recovery; forensic documentation
learning_outcomes:
- Recognise threats to digital data and resources.
- Use security technologies to create digitally secure systems or security systems.
- Search a crime scene for evidence.
- Recover deleted data in a forensically sound manner.
- Demonstrate findngs of a forensic investigation.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
