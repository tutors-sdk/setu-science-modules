indicative_content:
- Object Oriented Programming
- C++ Classes and Constructors
- Abstract Data Types (ADTs)
- Overloaded Operators
- Try Catch Blocks (Error Processing)
- Inheritance and Polymorphism
learning_outcomes:
- Describe approaches to programming and problem solving.
- Write, debug and test well-styled and appropriately-documented programs.
- Demonstrate the use of OO techniques, using knowledge of the concepts when writing
  code and when using class libraries.
- Develop applications to control sensor inputs and outputs connected to a microcontroller.
- Manipulate microcontroller class libraries to control sensors and display outputs
  on various display devices.
learning_and_teaching_methods:
- This course will be presented by a combination of lectures and computer-based practicals
  whilst capitalising on a web-enhanced learning environment
- The lectures will be used to introduce new topics and their related concepts
- The emphasis on course delivery will be hands-on, problem solving both individually
  and in small class groups using problem based worksheets during the practical sessions
- Self-directed learning will be encouraged throughout the duration of the module
