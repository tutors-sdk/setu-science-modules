indicative_content:
- 'Food Science: a multidisciplinary subject and role of nutrition in supporting human
  health'
- 'Structure of the Irish food industry and its contribution to the economy: employment,
  production, exports, domestic consumption'
- Agencies involved in food and health policy formation, food promotion and regulation
- Current issues presenting threats and opportunities to the food industry
- Basic techniques used in a food science laboratory
learning_outcomes:
- Recognise the scope of Food Science and the linkages with other related disciplines.
- Illustrate the importance of the food industry to the Irish economy and the various
  food regulation and promotion agencies.
- Identify current issues presenting threats and opportunities to the food industry.
- Employ a variety of laboratory techniques relevant to the broad discipline of food
  science.
- Report on a range of laboratory techniques for a variety of food types.
learning_and_teaching_methods:
- Lectures on indicative content will be delivered.
- Guest lectures and videos will be used to support the lectures, and to focus on
  case studies of relevance.
- Class discussions on topical issues.
- Laboratory practicals will introduce the students to basic experimental techniques
  used in food science.
