assessment_criteria:
- '<40%: Does not perform biodiversity survey or practicals assessments to reasonable
  standard. Limited knowledge and understanding of the application of horticulture
  to preserve or develop biodiversity.'
- '40%-49%: Demonstrates a limited knowledge of the subject matter. Is able to complete
  a biodiversity survey at a basic level. Demonstrates limited understanding in practicals.'
- '50%-59%: Demonstrates satisfactory general knowledge of the main issues within
  the subject. Practicals and biodiversity survey; demonstrates a clear understanding
  and grasp of the subject material.'
- '60%-69%: Demonstrates sound knowledge of the subject matter. Shows ability to analyse
  and logically argue in an effective and mature style. Demonstrates initiative and
  the ability to criticise methods used. Practicals and biological survey; demonstrates
  sound understanding of theory and application.'
- '70%-100%: Demonstrates authoritative handling of complex material and a highly
  developed and extensive understanding of the subject. Practicals and biological
  survey demonstrate excellent understanding of theory. Demonstrates reading outside
  of essential course material.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
