reference: A08344
full_title: Biodiversity and Horticulture
short_title: Biodiversity and Horticulture
credits: 5
level: Intermediate
author: DFLANAGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Horticulture
aim: This module introduces the student to the principles of ecology and ethics of
  biodiversity. Students will gain an understanding of the role that horticulture
  can play in the conservation and development of biodiversity.
