indicative_content:
- Ethics of conservation and biodiversity
- Principles of ecology - biodiversity, habitats, niche, species interactions, succession,
  climax community, energy flow
- Range and extent of Irish Flora and key Irish habitats, horticulture and invasive
  species, alien species, biosafety
- Legal framework of protection of habitats and biodiversity
- Environmental impact assessment (EIS), environmental monitoring methods
- Horticultural applications to protect, enhance or re-establish biodiversity and
  reduce negative environmental impacts in a range of sites including commercial horticulture
  and amenity e.g. brown field, roads, orchards, use of reed beds, flood amelioration
  techniques, tree and plant selections for urban areas, land stabilization
- Importance and protection of surface water and ground water e.g. sustainable urban
  drainage, water framework directive
- 'Urban ecology: Back gardens, urban forestry, green roof, green walls, water courses,
  parks'
- Pollinating insects and the role of horticulture in providing protection
learning_outcomes:
- Propose Horticultural interventions that would benefit Biodiversity.
- Relate the relevant national and European regulations and laws to their role in
  protecting biodiversity.
- Debate the importance of conserving biodiversity and the threats facing it.
- Distinguish between and identify native and alien species of flora and fauna.
- Prepare a limited EIS (or a biodiversity survey) for a designated site.
learning_and_teaching_methods:
