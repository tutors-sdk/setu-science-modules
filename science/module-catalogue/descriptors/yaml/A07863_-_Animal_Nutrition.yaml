reference: A07863
full_title: Animal Nutrition
short_title: Animal Nutrition
credits: 5
level: Introductory
author: SWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will give students a broad introduction to both ruminant and monogastric
  nutrition for farm animals. Students will learn about the basic principles and key
  concepts of nutrition, and its importance in diet formulation and prevention of
  metabolic diseases and disorders.
programmes:
- timetable: AGRI-0105
  code: WD_SAGRI_B
