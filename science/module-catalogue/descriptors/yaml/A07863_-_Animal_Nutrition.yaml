  status: M
prerequisites: []
corequisites: []
indicative_content:
- Structure and function of ruminant and monogastric digestive systems
- Metabolism of proteins, carbohydrates, fatty acids and amino acids
- 'Nutrient requirements and intake: macro- and micronutrients'
- Systems of energy and protein evaluation of feeds
- Feeding standards for maintenance, growth, reproduction and lactation
- 'Nutrient sources: grass, conserved forages, root crops, cereals & processed forage'
- Diet and ration formulation
- Metabolic diseases and disorders
learning_outcomes:
- Explain digestion and metabolism in ruminants and monogastrics.
- Identify the nutrient requirements and intake potential of ruminants in terms of
  energy, protein, fibre and minerals.
- Identify a range of feed and forage sources.
- Calculate diet and ration formulations feeding regimes for monogastric & ruminant
  production systems.
- Explain the effect of nutrition on metabolic diseases and disorders for dairy, beef,
  sheep, pigs & poultry.
- Use a range of laboratory techniques to classify and calculate the nutritional value
  of feedstuffs for ruminants.
