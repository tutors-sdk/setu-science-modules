assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter.'
- '40%-49%: Will be able to show a good knowledge of the key learning outcomes including
  a good understanding of factors affecting food traceability and the application
  of various technologies to food traceability.'
- '50%-59%: As well as the above, the student will be able to demonstrate a good understanding
  of the learning outcomes as well as being able to describe and evaluate the effectiveness
  of systems used to ensure food safety, traceability and security.'
- '60%-69%: In addition, the student will demonstrate more detailed knowledge of all
  the topics including legislative systems governing food/feed traceability and demonstrate
  an ability to relate detailed knowledge acquired to new material.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of all learning outcomes, including the ability to fully integrate the various components
  of the course.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
