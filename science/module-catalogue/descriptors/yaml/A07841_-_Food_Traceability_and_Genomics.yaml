reference: A07841
full_title: Food Traceability and Genomics
short_title: Food Traceability and Genomics
credits: 5
level: Advanced
author: SWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Food Science
aim: This module introduces the student to the concerns arising from the increasing
  globalisation of the food supply chain, and addresses the systems used to ensure
  food safety and traceability throughout the supply chain, from producer to consumer.
  In addition, the students will learn to apply their knowledge of genetics and genomics
  to food traceability. The module will highlight the regulations within the EU and
  will focus on current and emerging methods of food traceability, both electronic
  and diagnostic (assays and molecular).
