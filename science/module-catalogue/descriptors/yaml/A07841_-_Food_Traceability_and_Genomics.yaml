indicative_content:
- Emerging food safety, traceability and security issues
- Traceability systems
- DNA-based diagnostic methodologies such as PCR, gel electrophoresis etc.
- Non-molecular based methodologies for food authentication
- Immunoassay technologies to identify adulteration
- Review their own learning progress using continuous assessment methodologies
- Comparative analyses of relevant literature articles
learning_outcomes:
- Evaluate food traceability, safety and security issues and their influence on future
  food production.
- Appraise different molecular technologies and their application in food/feed safety
  and traceability systems.
- Compare and contrast various non-molecular methods of analyses for use in food authentication.
- Evaluate the principles of immunoanalysis and its relevance to food safety and traceability.
- Appraise the legislative systems governing food/feed traceability (RASFF, TRACES
  etc.).
- Assess various laboratory techniques to determine food/feed authentication.
learning_and_teaching_methods:
