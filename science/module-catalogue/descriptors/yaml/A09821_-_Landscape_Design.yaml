assessment_criteria:
- '<40%: Survey and analysis weak or absent and/or design portfolio missing more than
  50 % of drawings. Poor knowledge and understanding of the subject matter.'
- '40%-49%: Identifies key site constraints and opportunities of site, portfolio of
  drawings complete, but design fails to fully exploit site or meet the needs of the
  client. Demonstrates a limited knowledge of the subject matter.'
- '50%-59%: Identifies key site constraints and opportunities as well as subtle details,
  portfolio of drawings complete, design meets needs of clients but fails to fully
  exploit site opportunities. Demonstrates satisfactory general knowledge of the main
  issues within the subject matter.'
- '60%-69%: Identifies key site constraints and opportunities as well as subtle details,
  portfolio of drawings complete, design meets needs of clients and exploits site
  opportunities. Demonstrates sound knowledge of the subject matter.'
- '70%-100%: Identifies key site constraints and opportunities as well as subtle details,
  portfolio of drawings complete, design meets needs of clients, fully exploits site
  opportunities and ameliorates site difficulties. Demonstrates a highly developed
  and extensive understanding of the subject.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
