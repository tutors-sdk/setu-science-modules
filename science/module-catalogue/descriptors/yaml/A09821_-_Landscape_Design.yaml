indicative_content:
- Prepare design plans and specifications for given situations
- Linear surveying, level surveying, transferring information to sketch form
- Principles of design and elements of design
- History of designed landscapes
- Use of drawing equipment and drawing standards
- Draft site survey and site analysis drawings
- Draft masterplan drawings including section/elevation drawings
- Draft planting plans
- Draft axonometric drawing
- Draft construction details
- Costing proposed new designed landscapes
learning_outcomes:
- Practise linear and level surveying safely.
- Distinguish the principles of design.
- Design landscape projects.
- Create designs to the detailed plan and specification stage.
- Relate how the elements of design, history of design, and different styles influence
  the design process.
- Interpret plans and specifications.
