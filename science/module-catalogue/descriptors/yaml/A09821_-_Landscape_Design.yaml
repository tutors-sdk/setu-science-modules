aim: This module is a know-how and skills based module where students are introduced
  to the design process working from analysis, concept, through to design solution.
  It will enable students to design landscapes, carry out the necessary practices
  associated with landscape design, and the correct use of drawing equipment. Design
  theory and practice is taught through lectures, individual tuition, group tutorials,
  field trips and presentations.
