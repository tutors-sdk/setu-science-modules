indicative_content:
- Cables & cable sizing, switchboard & switchgear design
- Electrical Containment Systems
- Fire Alarm Systems
- Lightning protection & UPS systems
- Testing & Certification
learning_outcomes:
- Describe the electrical systems that are found in modern buildings & plant.
- Apply standard calculation techniques necessary for the design of electrical systems
  within a modern building.
- Recognise and understand the comparative cost and operational benefits of different
  types of electrical services and systems within modern buildings.
- Explain the procedures involved in designing the electrical services for a building/
  plant.
- Apply electrical services design techniques.
learning_and_teaching_methods:
- Lectures, presentations, reading and problem solving in class.
- Site visits and (on site) presentation of specialist equipment and topics
- Practical design Exercises
- Case study based on the design and layout of electrical services and systems
