assessment_criteria:
- '<40%: Cannot evaluate security and staff safety issues, unable to write a standard
  operating protocol, can''t make any suggestions on how to improve work practices.'
- '40%-49%: Can identify key issues in relation to security and site issues, can write
  a basic standard operating protocol, can suggest some basic improvements to work
  practice'
- '50%-59%: Can identify key issues and in relation to security and site issues and
  suggest improvements, can write a detailed standard operating protocol, can identify
  the key problems and make appropriate suggestions for improvement to work practices.'
- '60%-69%: Can identify most issues in relation to security and site issues and suggest
  improvements, can write a detailed standard operating protocol, can identify most
  of the problems and make appropriate suggestions for improvement to work practices.'
- '70%-100%: Can identify all issues in relation to security and site issues and suggest
  improvements, can write a detailed standard operating protocol, can identify all
  of the problems and make appropriate and innovative suggestions for improvement
  to work practices'
