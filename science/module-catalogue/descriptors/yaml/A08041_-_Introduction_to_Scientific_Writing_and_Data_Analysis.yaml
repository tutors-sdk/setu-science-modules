indicative_content:
- Critical reading
- Development of academic writing skills and referencing
- Literature searching
- Structuring a literature review
- Basic statistical analysis
- 'Data presentation: graphical and tabular'
learning_outcomes:
- Interpret published academic work to identify themes and trends.
- Analyse published academic work and comment upon its significance.
- Construct a literature review on the current state of knowledge in a given topic
  area which is prepared using appropriate structure, language, grammar, punctuation
  and referencing.
- Analyse data using basic statistical techniques.
- Use appropriate software to present data in graphical and tabular formats.
- Prepare an abstract.
