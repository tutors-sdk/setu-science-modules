assessment_criteria:
- '<40%: Little or no evidence of interpretation of the supplied papers. Poorly structured
  and/or presented literature review. Incorrect or inadequate referencing. Little
  or no ability to analyse and present data. Poorly written abstract.'
- '40%-49%: Demonstrates a basic level of understanding of the supplied papers. Shows
  a limited ability to identify themes/trends and to structure a literature review.
  Makes an attempt to reference but with errors. Some evidence of proofreading. Some
  ability to analyse and present data. Limited ability to produce an abstract.'
- '50%-59%: Demonstrates a good understanding of the supplied papers. Identifies themes
  and trends. Attempts to paraphrase and consider opposing ideas. Referencing largely
  correct. Proofreading generally good. Good attempt at analysing and presenting data.
  Good attempt at producing an abstract.'
- '60%-69%: Demonstrates a good understanding of the supplied papers. Identifies themes
  and trends. Paraphrases and presents opposing ideas competently. Few errors in referencing
  and proofreading. Competent data analysis and presentation. Competently produced
  abstract.'
- '70%-100%: Demonstrates a high level of understanding of the supplied papers. Identifies
  themes and trends. Paraphrases and presents opposing arguments to a high standard
  of competence. Referencing correct throughout. Evidence of excellent proofreading.
  Excellent standard of data analysis and presentation. Excellent abstract.'
essential_material:
