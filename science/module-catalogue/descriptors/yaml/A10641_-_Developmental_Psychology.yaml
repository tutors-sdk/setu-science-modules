indicative_content:
- Introduction to theories of Human Development
- Prenatal Development
- Physical Development in Infancy and Early Childhood
- Cognitive Development in Childhood
- Development of Language, Self and Social Cognition
- Attachment
- Development of Gender
- Disorders of Childhood
- Adolescence
- Adulthood
- Old Age
- Conclusion/Recap
learning_outcomes:
- Identify each stage of development in the context of the lifespan of the individual.
- Summarise conceptual frameworks, methodologies and research within developmental
  psychology.
- Differentiate applications of developmental theories in applied settings.
- Discuss conceptual frameworks of lifespan developmental theory and their application
  in applied settings.
learning_and_teaching_methods:
- A two-hour lecture and a one-hour tutorial per week.
- Tutorial/seminar work encompasses small group meetings that function to revise the
  lecture material. Additional resources/ audio/ video materials are utilised within
  the tutorial hours.
- Students engage in exercises/ quizzes relating to the lecture material of the previous
  week.
- Students are introduced to current research applications of the theoretical concepts/
  students are encouraged to participate in small group exercises relating to identifying
  research ideas for example identifying research questions/variables and engaging
  in searching for psychological research across various media through library searches
  both online and off line.
- Students engage with research databases and attend shared brief in tutorial presentations
  of current research in Developmental Psychology.
- Tutorials introduce students to the academic environment and basic research and
  writing skills relevant to the module aims and learning outcomes.
