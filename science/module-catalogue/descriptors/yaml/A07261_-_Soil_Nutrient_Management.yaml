indicative_content:
- Soil quality and effects on agricultural systems
- The movements of nitrogen, phosphorus and potash in and on the soil and gaseous
  nitrogen emissions
- Soil hydrology, including soil drainage
- Soil biology, organic matter and carbon dioxide emissions
- National research strategy in the area of soil science
- Nutrient modelling
learning_outcomes:
- Assess the factors affecting soil quality.
- Compare the movements of nitrogen, phosphorus and potash in and on the soil (including
  gaseous nitrogen emissions).
- Determine the factors affecting soil performance.
- Assess the impact of soil biology and organic matter on carbon dioxide sequestration
  in grassland.
- Evaluate the national soil science research strategy.
- Recommend improvements to soil management strategies which could improve soil performance.
