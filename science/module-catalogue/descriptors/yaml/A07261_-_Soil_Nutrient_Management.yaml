aim: The module is designed for students who already have a basic knowledge of soils,
  and will examine in detail the factors affecting soil quality. The movements of
  nitrogen, phosphorus and potash in and on the soil will be explored, as well as
  gaseous nitrogen emissions. The importance of soil hydrology will be examined. Soil
  biology and soil organic matter will be discussed, as well as the potential for
  carbon dioxide sequestration in grassland. Visits to Teagasc research centres form
  an integral part of this module.
