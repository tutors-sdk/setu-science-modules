indicative_content:
- Bacterial expression systems for recombinant protein production; vectors and promoters;
  advantages and disadvantages of and new developments in bacterial expression systems
- Expression of recombinant proteins in yeast and filamentous fungi; expression vectors
  and promoters; post-translational modifications
- Insect expression systems; baculovirus expression vectors
- Expression of recombinant proteins in plants and plant cells; plant-expressed vaccines;
  new technologies
- Overview and history of mammalian cell culture; primary cells and continuous cell
  lines; mammalian cell growth and death; transformation and immortalization
- Expression of recombinant proteins for biopharmaceutical production in mammalian
  cells; mammalian cell transfection and expression vectors; cell line engineering;
  selection and screening of cell lines for biopharmaceutical production
- Principles of mammalian cell culture; culture conditions and cell culture media;
  generation and maintenance of cell banks; cell line characterisation and monitoring
  and contamination of cell cultures
- Scale-up of mammalian cell culture for biopharmaceutical production; bioreactors
  and scale-up using suspension cells and adherent cells
- Cell-based therapies; allogeneic and autologous cell-based therapies; stem cell
  research and potential applications
learning_outcomes:
- Compare and contrast different eukaryotic and prokaryotic expression systems for
  recombinant proteins production.
- Appraise recent developments in the use of insect, plant and animal cells for biopharmaceutical
  production and therapeutic applications.
- Distinguish between the different bioreactor configurations used in the biopharmaceutical
  industry in relation to their modes of operation and their spheres of application.
- Interpret the molecular mechanisms involved in mammalian cell division, cell growth
  and cell death.
- Evaluate recent developments in the genetic engineering of cell lines and in process
  optimisation to enhance recombinant protein production.
- Appraise the principles and methods of mammalian cell line characterisation and
  biosafety analysis from a quality control perspective.
- Manage and maintain mammalian cell cultures, demonstrating skills in media preparation,
  sub-culturing and biocontamination control.
- Prepare and complete tests using simple cell-based bioassays and bioanalytical techniques.
learning_and_teaching_methods:
- This module will use a blended learning approach combining face-to-face lectures
  with e-learning available through the platform Moodle.
- Student engagement will be enhanced through use of the interactive e-learning platform,
  in-class discussions through workshops, webinars, research of current relevant literature
  and informative presentations.
- A learning and teaching strategy appropriate to level 8 will be adopted throughout
  with opportunities for formative assessment to encourage reflective, critical thinking.
- Practicals will be delivered to underpin and supplement theoretical material.
