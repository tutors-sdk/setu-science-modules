aim: This module will investigate and compare the use of a variety of host cell systems,
  including microbial, insect, plant and mammalian, for the production of biopharmaceuticals.
  In particular, emphasis will be given to recent developments in the optimisation
  of biopharmaceutical production by host cells. The module will also provide a theoretical
  introduction to and direct practical training in the maintenance and culture of
  mammalian cells. Students will be directly trained in basic animal cell culturing
  methods and bioanalytical techniques particularly relevant to the biopharmaceutical
  industry.
