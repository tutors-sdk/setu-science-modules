assessment_criteria:
- '<40%: No understanding of the basics of cell factories and mammalian cell culture.
  Unable to carry out critical thinking and analysis. Lack of competence in associated
  laboratory skills.'
- '40%-49%: Able to understand basic concepts of cell factories and mammalian cell
  culture. Displays some ability in associated practical skills. Has difficulty with
  critical thinking and problem solving.'
- '50%-59%: A good understanding of cell factories and mammalian cell culture with
  demonstration of some critical thinking and problem solving skills. Displays reasonable
  competence in associated laboratory skills.'
- '60%-69%: A good understanding of cell factories and mammalian cell culture and
  good critical thinking and problem solving skills. Displays very good competence
  in associated laboratory skills.'
- '70%-100%: Excellent in all areas. Demonstrates a highly developed and extensive
  comprehension of the subject manner. Shows ability to evaluate, debate and relate
  topics and shows evidence of extensive independent learning and knowledge of current
  literature and recent developments in the area. Displays excellent competence in
  associated laboratory skills.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
