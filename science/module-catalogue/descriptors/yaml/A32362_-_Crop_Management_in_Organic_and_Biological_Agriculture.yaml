assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills.'
- '40%--59%: The learner will be able to demonstrate a good understanding of sustainable
  crop management techniques and production of healthy nutritious plants. The student
  will be able to write and present a topical case study.'
- '60%--69%: In addition to the above, the student will demonstrate more detailed
  knowledge of all the module topics covered, including advances crop production systems
  and plant nutrition. The student will also be able to write and present a good quality
  case study.'
- '70%--100%: The student will be able to demonstrate comprehensive knowledge and
  understanding of all the learning outcomes, including the vital role of plant nutrition
  in sustainable crop production and profitability. The student will also be able
  to write and present a high quality case study.'
