indicative_content:
- Crop and forage establishment and management practices to maintain soil health e.g.
  conservation agriculture
- Managing the transition from conventional practice to regenerative agriculture and
  organic and biological systems of production
- Beneficial crop and plant interactions -- crop associations, rotations, combi-cropping,
  inter-cropping and relay cropping
- Integrating diverse cover crops and maintaining crop residue covers to improve nutrient
  cycling and recycling in soils
- Plant nutrition -- macro and micro nutrient interactions necessary for optimum plant
  health status
- Integrated pest management strategies to maintain plant health and resilience to
  pests and diseases
- Sustainable use of bio-pesticides, biotechnology, novel crops, and plant protection
  products for sustainable crop production
- Policy and regulation related to organic crop production in the F2F Strategy, the
  CAP, and the Programme for Climate Action
learning_outcomes:
- Demonstrate and explain a detailed knowledge of key field management practices in
  sustainable cropping practices.
- Describe and prepare beneficial crop and plant associations, interactions, and rotations
  for enhanced output and production.
- Combine different cover crop species and employ plant root interactions to enhance
  soil biological, chemical and physical processes.
- Assess and evaluate the role of macro and micro nutrients from inorganic and organic
  sources for healthy crop development.
- Analyse and select practices and techniques to improve plant health status and develop
  biological pest and disease management.
- Critically appraise and evaluate the scientific evidence for the application of
  gene-edited, modified and novel crop technologies at farm level.
- Assemble, assess and interpret crop research and field trial study findings and
  analyse and review their application and appropriateness for in-field practice.
learning_and_teaching_methods:
- Online lectures, guest lectures, laboratory practical, podcasts
- Field visit and assessment for class discussion
- Self-directed case-study for crop or forage production
