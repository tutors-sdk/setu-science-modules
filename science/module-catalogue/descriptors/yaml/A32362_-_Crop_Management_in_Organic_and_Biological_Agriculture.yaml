reference: A32362
full_title: Crop Management in Organic and Biological Agriculture
short_title: Organic Crop Management
credits: 10
level: Postgraduate
author: JGERAGHTY
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: The module content will review crop production techniques that maintain and enhance
  soil organic matter and lead to carbon sequestration including crop associations
  and rotations. Conversion to organic crop production will be described and discussed.
  Plant nutrition requirements will be studied including the role of macronutrients
  and micronutrients to improve plant health and resilience to different diseases
  and pests. IPM strategies to enhance sustainable crop production and profitability
  will be presented and evaluated. The role of new and emerging gene editing technologies
  will be reviewed and their relevance to organic and biological agriculture appraised.
  The overarching objective of this course is for graduates to understand the inter-relationship
  between achieving balanced plant development nutrition for climate resilient and
  profitable crop production.
