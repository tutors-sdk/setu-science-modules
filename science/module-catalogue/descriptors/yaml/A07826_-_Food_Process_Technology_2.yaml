indicative_content:
- Materials balancing in standardisation of food components
- Heat transfer through materials
- Conduction, convection in heat exchangers; evaporation and drying
- 'Separation: centrifugal and filtration'
- Viscosity in fluids; fluid flow; emulsification
- Plant design piping and instrumentation diagrams
- Evaporation & drying plant operation (evaporator, spraydryer, fluid bed and freeze-drying)
- Operation of heat exchangers (plate, scraped surface), homogenisation and microfluidisation
- Membrane separation processes (ultrafiltration, reverse osmosis and diafiltration)
- Use of unit processes in a case study outlining enrichment of a bioactive dairy
  product
- Processes relevant to different food industries (meat, cereals)
learning_outcomes:
- Validate the utilisation of specialist equipment in a modern food processing facility.
- Evaluate solutions to particular food processing strategies in product innovation.
- Assess unit operations quantitatively in food processing.
- Determine optimum parameters in the food processing industry.
learning_and_teaching_methods:
- Lectures will cover the theory of the module, with tutorial-type classes to examine
  quantitative aspects.
- Lectures and practicals will be undertaken in conjunction with Teagasc Food Research
  Centres at Moorepark and Ashtown.
