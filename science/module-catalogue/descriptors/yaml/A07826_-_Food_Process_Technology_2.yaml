aim: This module extends and deepens the students' knowledge of food processing technologies
  already taken at ordinary degree level. It emphasises the quantitative approach
  to various operating principles underlying food processing operations. Students
  obtain practical operating experience in a leading-edge biofunctional food processing
  environment.
