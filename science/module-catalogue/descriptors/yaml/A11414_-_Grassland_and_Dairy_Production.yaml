prerequisites: []
corequisites: []
indicative_content:
- Dairy industry and milk production systems
- Milk composition and quality
- Feeding and management
- Replacement rearing
- Breeding management
- Housing and welfare
- Grass growth
- Grass management
learning_outcomes:
- Describe the structure of the dairy industry, milk marketing and milk production
  systems.
- Discuss physiology of milk production, milk composition factors, milk quality best
  and quality standards.
- Describe the feeding and management of a dairy herd.
- Describe the feeding and management of replacement heifers and the principles of
  efficient breeding.
- Describe all non-metabolic dairy cow diseases and disorders.
- Discuss factors influencing grass growth, identify plant parts, grasses and weeds.
- Describe grass management techniques, reseeding and grass conservation.
