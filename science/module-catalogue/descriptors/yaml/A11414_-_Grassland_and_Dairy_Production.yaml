assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter.'
- '40%-49%: Will be able to show a basic knowledge of the key learning outcomes, including
  animal structures, functions and living processes as well as be able to perform
  simple laboratory experiments with animals.'
- '50%-59%: As well as the above, the student will be able to demonstrate an understanding
  of some of the complexities of the topics, and predict nutrition requirements of
  the animal and potential nutritional disorders. The student will also be able to
  perform good quality experiments with animal tissues.'
- '60%-69%: In addition, the student will demonstrate more detailed knowledge of the
  all topics, including and demonstrate an ability to evaluate detailed knowledge
  acquired in the module to new material. The student will also be able to perform
  very good quality experiments with animal tissues and microbiology related to animals.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of all learning outcomes, predict nutrition requirements of the animal and potential
  nutritional disorders and show the ability to evaluate and relate topics that overlap
  all of the learning outcomes. The student will also be able to perform high quality
  experiments in microbiology and with animal tissues.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
