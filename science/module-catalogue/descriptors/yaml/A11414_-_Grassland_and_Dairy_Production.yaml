reference: A11414
full_title: Grassland and Dairy Production
short_title: Grassland and Dairy Production
credits: 5
level: Introductory
author: JRYAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will enable the student to gain a comprehensive understanding of
  dairy production and grassland management. It will provide students with the skills
  and knowledge to manage a dairy herd, rear replacement heifers and produce quality
  milk in line with animal welfare and dairy hygiene regulations. It will allow students
  to successfully grow and manage grass as a crop.
