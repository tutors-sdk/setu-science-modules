  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Introduction to computer security: security threats; attack methods; common vulnerabilities;
  security services'
- 'Security management: security assessment; security design; policy'
- 'Cryptography: symmetric encryption; modern encryption; block vs stream ciphers;
  public-key cryptography'
- Message authentication and integrity; digital signatures; digital certificates
- Digital certificates and TLS (transport layer security)
- Web application security; OWASP Top Ten
- 'Secure programming: software vulnerabilities; coding standards'
learning_outcomes:
- Categorise the various security threats and attack methods to which an organisation
  may be susceptible.
- Demonstrate practical knowledge of the security technologies that must be implemented
  to protect an organisation.
- Appraise the role of cryptography in computer security, including its benefits and
  limitations.
- Demonstrate the use of encryption software for data confidentiality and authentication
  purposes.
- Justify the importance of security policies and procedures within an organisation.
- Examine the specific security concerns pertinent when developing web applications.
- Recommend how to build security measures into the software development process.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practical classes.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
- The practical element will be largely based on laboratory exercises involving the
  use of cryptographic software to encrypt data and configure secure communications
  (e.g. using TLS) as well as web application security tools.
