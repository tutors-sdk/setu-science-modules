author: JMCGIBNEY
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Forensics and Security
aim: This module provides an introduction to IT security. Topics covered include various
  security threats and vulnerabilities and the services available to address these
  threats. The importance of security policies and procedures within an organisation
  is explained. Cryptographic techniques that underpin many security mechanisms are
  covered. Finally, best practice in secure software development, with an emphasis
  on web applications, is also explored.
