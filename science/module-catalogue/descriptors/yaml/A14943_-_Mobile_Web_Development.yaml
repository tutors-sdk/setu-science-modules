indicative_content:
- 'Internet and Mobile Web: HTTP; TLS; Client-server architecture; Device Capabilities'
- 'Web User Interface/Experience: HTML5; CSS3; Responsiveness; Push notification;
  Connectivity independence'
- 'Development: ES6+'
- 'Cloud Infrastructure: Node.js based infrastructure; Cloud Deployment'
- 'Mobile Web Frameworks and architecture: React; Ionic; Service workers; App shell
  architecture'
learning_outcomes:
- Design and develop a mobile web app that conforms to mobile app design guidelines.
- Maximise an app's performance and engagement qualities using progressive web app
  techniques.
- Integrate suitable build automation tools into the mobile app developments process.
- Evaluate modern mobile web frameworks, and select best-of-breed components.
- Assess, select and deploy caching strategies appropriate to the target application
  infrastructure.
- Assemble a cloud based infrastructure and push simple services to selected cloud
  services.
learning_and_teaching_methods:
- Combination of lectures and lab-based practicals.
- The lectures will cover the theory and supporting technologies behind modern mobile
  web application development.
- The lab-based practicals, building on the theoretical knowledge from lectures, provide
  exposure and to the tools and practical skills required to support mobile web application
  development.
- The practical content will use industry standard technologies, tools and techniques.
- Student will be encouraged to enhance their lab work and assessment submissions
  using self-directed research and learning into the state-of-the-art mobile web application
  development.
