aim: The aim of this module is to provide the quality professional with an opportunity
  to undertake a work-based project that will enable them to draw on the elements
  of learning from the programme and demonstrate their insight and understanding of
  their working environment. The industry-led project will be carried out at the learner's
  workplace; the title, scope and nature of which will be determined and agreed in
  consultation with front-line management. Projects might resolve a manufacturing,
  quality, compliance or testing issue or involve the development or improvement a
  new process, product or system.
