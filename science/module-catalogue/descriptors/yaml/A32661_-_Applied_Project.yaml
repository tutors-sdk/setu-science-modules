indicative_content:
- 'Project Proposal: type of industry-based project ; project objectives'
- 'Project Scope: clarify concepts/variables, resources at work'
- 'Methodology: conceptual framework; data collection, documentation and interpretation'
- 'Discussion: key findings; contribution to work environment, conclusions'
- 'Presentation of Project: standard dissertation/report format; oral/poster presentation'
learning_outcomes:
- Research independently and/or through collaboration to execute an industry-led project.
- Plan, manage and deliver a project according to agreed deadlines as scheduled with
  academic supervisor.
- Establish and manage documents using good documentation practice.
- Interpret data and findings in relation to defined project objectives.
- Communicate the outcome in both written and oral forms displaying competent scholarly
  writing and referencing according to standard conventions.
