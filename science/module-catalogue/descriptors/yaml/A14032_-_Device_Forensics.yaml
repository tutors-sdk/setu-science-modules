indicative_content:
- Mobile Device Forensics
- Acqusition Issues
- Android Forensics
- iOS Forensics
- 'Connected Devices: Wearable Devices; Internet of Things; Medical Devices; Automotive
  Industry'
learning_outcomes:
- Collect digital evidence from a mobile device.
- Analyse digital evidence from a mobile device.
- Reconstruct device usage patterns.
- Appraise potential issues relating to forensic analysis.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals. The lectures
  will be used to introduce new topics and their related concepts. The practical element
  allows the student to put into practice the theoretical concepts covered in the
  lectures.
