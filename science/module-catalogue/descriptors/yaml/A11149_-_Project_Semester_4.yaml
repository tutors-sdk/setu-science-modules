indicative_content:
- Legal issues with data and software artifacts
- Professional standards in ethics
learning_outcomes:
- Apply knowledge, skills or practices from across the programme, (specifically from
  at least two modules from the programme, at least one module being from the current
  semester) into a model that demonstrates an understanding of the core concepts of
  those modules.
- Demonstrate the above model and present the resulting working artifact.
- Employ a robust and professional framework so that the artefact as described above
  conforms to all legal standards with regard to data protection and all industry
  standards pertaining to copyright, privacy, Intellectual Property(IP), etc.
- Identify personal ethical responsibilities and obligations as technologists and
  the obligations and responsibilities of the community of technologists.
- Apply appropriate developmental and related standards which are designed to address
  ethical considerations (such as privacy and human-centred development) to the development
  and deployment of digital technologies.
