indicative_content:
- 'Public relations overview: theoretical principles & practices'
- Framing the message; defining stakeholders; choosing a medium
- Media relations; writing news releases; writing feature releases
- Corporate image & reputation management; communication audits & brochures
- Internal communication; employee relations; newsletters
- Crisis management; pre-crisis planning; effective crisis communications
- Issues management; environmental scanning
- Community relations & sponsorship
learning_outcomes:
- Evaluate the most appropriate communication strategies for a horticultural enterprise's
  stakeholders.
- Construct and write effective news and feature releases.
- Evaluate comprehensively the structure and guidelines for writing and designing
  newsletters and brochures.
- Evaluate best practice PR campaign planning.
- Determine the theoretical principles of effective PR management.
- Evaluate a wide range of PR management techniques.
