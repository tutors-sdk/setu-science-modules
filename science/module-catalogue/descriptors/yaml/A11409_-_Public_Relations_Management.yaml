history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: The aim of this module is to develop the student's ability in the theoretical
  and practical application of effective public relations and apply its impact to
  the internal and external environment of a horticultural enterprise.
programmes:
- timetable: MGTH-0026
  code: WD_SBSHO_B
