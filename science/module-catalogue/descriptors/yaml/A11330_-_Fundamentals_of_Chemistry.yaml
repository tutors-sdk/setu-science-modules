aim: This is a fundamental chemistry course for non-chemistry specialists, and deals
  with basic concepts and techniques of chemistry relevant to pharmaceutical science.
  Topics include chemical and physical properties of matter, chemical bonding and
  molecular structure, industrial processes and their stoichiometry, volumetric analysis,
  pH and rates of reactions and chemical equilibrium. Laboratory exercises illustrate
  and emphasise important concepts encountered in the theory, and are of particular
  relevance to the pharmaceutical and health industries.
