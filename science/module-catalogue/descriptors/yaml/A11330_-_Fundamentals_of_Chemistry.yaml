indicative_content:
- Atomic structure, atomic bonding and intermolecular forces and their effect s on
  properties (chemical and physical) of chemical reagents.
- Types of chemical reactions including acid/ base and redox reactions and their stoichiometry.
- Chemical equilibrium.
- Reactions kinetics and factors that affect reaction rates.
learning_outcomes:
- Distinguish between ionic/covalent bonding, outline inter-molecular bonding and
  relate it to physical and chemical properties of the system.
- Distinguish between acid/base and redox reactions.
- Explain the difference between acidity/alkalinity, calculate theoretical pH and
  calibrate a pH meter.
- Describe chemical equilibrium including equlibrium constant and Le Chatelier's principle.
- Describe the rate law of a simple reaction and discuss the factors that influence
  reaction rates.
- Review typical chemical processes and their relevant stoichiometric calculations.
- Communicate by written and verbal means the results of theory and practical-based
  exercises.
- Demonstrate a keen awareness of the safe handling and disposal of chemicals and
  good laboratory practice (GLP).
