aim: The aim of this module is to provide the student with a professional level of
  understanding and the ability to apply relative design and calculation methods to
  the areas of electrical power generation, transmission, and distribution equipment.
  In addition, the student will gain proficiency in the safety and maintenance requirements
  for electrical medium and high voltage electrical systems taught.
