indicative_content:
- Power generation methods, equipment control, protection and efficiency
- Power transmission / distribution topologies, equipment design, utilisation and
  efficiency calculations
- Networked power system control, status and metering
- Protective relays, strategies and associated transducers
- Preventative Maintenance and electrical safety
- Load, BIL, Power flow, Fault and stability calculations
- Sources and suppression of harmonic content.
- 'Typical projects: adaptive power factor correction, dynamic generator excitation,
  automated load-sharing systems, solid-state AC generation, black start strategic
  planning'
learning_outcomes:
- Evaluate and understand the design and operation of electrical transmission / distribution
  peripherals.
- Determine transformer configuration for optimal energy conversion and management.
- Evaluate and compare transmission and distribution topologies.
- Format and compile preventative maintenance procedures and the safety requirements
  for typical medium voltage and high voltage equipment.
- Analyse the results of typical distribution and transmission calculations, circuit
  design and simulation e.g. Load, BIL, Power flow, Fault and stability calculations.
- Calculate generator rotor losses due to negative sequence generation.
- Demonstrate the professional, ethical and effective communication skills of a professional
  engineer.
learning_and_teaching_methods:
- The course will consist of lectures, laboratories, mini project and formative assessments
- The emphasis on course delivery will be to engage the student in the learning of
  the material, through the integration of the course materials, with the real case
  studies in laboratories and mini project
- The formative assignments will be used to provide an opportunity for the student
  to engage with the material, before it is applied, to maximise the learning opportunities
  for the student.
- Self-directed learning, moodle, and recommended software.
