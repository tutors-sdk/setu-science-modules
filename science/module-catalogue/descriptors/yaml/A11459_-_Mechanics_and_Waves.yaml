indicative_content:
- 'Vectors and scalars: dot and cross products'
- Kinematics
- Newton's laws of motion
- Motion under a general potential
- Work and energy
- 'Uniform circular motion: angular momentum'
- 'Simple harmonic motion including damping: simple treatment of resonance'
- 'Collisions: conservation laws; mechanical energy, total energy and momentum'
- Mathematical description of a wave
- Energy, power and intensity in wave motion
- Reflection, refraction, diffraction, interference, polarisation and Doppler effect
- 'Light waves: geometrical optics; lenses and mirrors'
- 'Sound waves: acoustics'
- 'Practical programme: determination of g; investigation of Newton''s second law;
  friction; measurement of wavelength of light and sound; determination of refractive
  index; focal lengths of lenses and mirrors'
learning_outcomes:
- Describe the fundamentals of mechanics by being able to solve relevant problems.
- Describe the fundamentals of wave motion by being able to solve relevant problems.
- Record and analyse experimental data and present results in the form of a report.
- Communicate results in a presentation to peers.
