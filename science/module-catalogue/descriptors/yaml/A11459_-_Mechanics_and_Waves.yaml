school: Science and Computing
department: Science
cluster: Mathematics and Physics
aim: This module is a calculus-based module. It introduces the differential and integral
  calculus required for the solution of dynamics problems. Vector calculus and linear
  algebra are also introduced as required. The physics content is dynamics and waves.
