assessment_criteria:
- '<40%: Unable to describe concepts of file systems. Unable to use and explain system
  forensics tools and related OS utilities. Unable to acquire or interpret network
  data.'
- '40%-49%: Limited knowledge and interpretation of filesystem, network and web related
  data.'
- '50%-59%: Ability to discuss key concepts of the specific knowledge domain. Can
  use tools to moderate level, gather some data and produce some findings.'
- '60%-69%: In addition, can interpret evidence extracted during a forensic investigation
  and corroborate it with other sources of evidence.'
- '70%-100%: All above to an excellent level. Be able to discuss their effect on forensic
