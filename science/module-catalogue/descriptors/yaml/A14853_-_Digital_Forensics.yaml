  stage: 3
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Common Tasks: Evidence identification, collection, analysis and presentation'
- 'Hard Disk Acquisition: Host Protected Areas (HPAs); write blockers; cryptographic
  hashes'
- 'FAT File System Analysis: File system, content, filename, metadata'
- 'Network Based Evidence: Live response, network data, collection and analysis of
  data'
- 'Web Forensics: HTTP headers; cookies; browser/server log analysis; capturing web
  pages; server-side data; web activity reconstruction; email headers; tracing email
  online'
learning_outcomes:
- Demonstrate an awareness for issues surrounding the creation of forensic duplicates.
- Examine FAT filesystems using a forensic toolkit.
- Demonstrate how to retrieve deleted data.
- Examine different types of network data that can be collected in online and off-line
  environments.
- Use appropriate tools to identify, analyse and explain various network communications.
- Reconstruct web based activity.
- Trace e-mail.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
- Practical work will include the student working with standard forensic tools.
