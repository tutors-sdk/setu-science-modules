reference: A14853
full_title: Digital Forensics
short_title: Digital Forensics
credits: 5
level: Introductory
author: JSHEPPARD
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Forensics and Security
aim: The aims of this module are to provide students with an understanding of digital
  forensics. Students will become familiar with the scientific forensic process and
  will apply these to the FAT file system and to online environments. Students will
  examine how a computer file system organizes and stores data. The student will use
  tools to extract and forensically analyse these kinds of data. Students will also
  be equipped with the skills to respond to computer attacks and to uncover information
  that is hidden in electronic mail messages, web pages and web servers and network
  communications.
programmes:
- timetable: COMP-0534
  code: WD_BCSEC_SP
