indicative_content:
- The Creative Media Industry. History and development of computing, cultural, telecommunications
  and creative industry sectors
- 'The Creative Media Pipeline: Workflows and practice across convergent creative
  media sectors. Media, Application and Web Development'
- 'Creative Media Authoring Applications and Services: Graphics/Audio/Video/Animation'
- Digital Media Asset Management
learning_outcomes:
- Define the cross-disciplinary history, concepts and practices of the creative media
  and computer science sectors.
- Compare and contrast a range of current and emerging industry relevant creative
  media authoring tools and services.
- Operate effectively as an individual, using both conventional and cloud based ubiquitous
  services to produce accessible creative media projects.
- Use the production tracking, review and asset management tools for streamlining
  collaborative and business processes within a production pipeline.
learning_and_teaching_methods:
- 'Lectures: Talks or presentations delivered by a member of academic staff providing
  a guide to the topic and indicate important points and themes..'
- 'Practicals: Students will be expected to participate in the practical labs, experimenting
  with required software and completing class worksheets and exercises.'
- 'Independent learning : Students must be proactive, manage their own time and develop
  their own independent learning skills'
