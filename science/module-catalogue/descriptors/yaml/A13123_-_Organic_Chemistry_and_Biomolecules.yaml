indicative_content:
- Stereochemistry, stereoisomerism and the nomenclature of stereoisomers
- 'Structure, properties and stereochemistry of biomolecules: carbohydrates, lipids,
  proteins'
- An introduction to metabolism of important biomolecules within the body
- Important chemical and biochemical reactions, including substitution, elimination,
  oxidation and reduction
- Techniques for the purification of organic compounds
- Determination of product purity and identification using melting points, chromatography
  and spectroscopy
- Basic synthetic techniques and functional group tests
- Analysis and characterisation of biomolecules
learning_outcomes:
- Identify the stereochemical characteristics of organic molecules.
- Describe the chemical reactions and physical properties of a range of organic compounds,
  classified according to their reaction type.
- Sketch the structures of important biomolecules and recognize key functional groups
  within these molecules.
- Compare and contrast fundamental properties of a range of biomolecules.
- Apply the correct procedures for synthesis, purification and characterization of
  organic molecules.
- Demonstrate adherence to safe laboratory procedures, including the correct disposal
  of laboratory waste.
