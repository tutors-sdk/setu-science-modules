aim: This module covers the main categories of organic compounds and important classes
  of biological molecules. Characterisation of synthetic organic molecules and analysis
  of biomolecules, including structure, nomenclature and stereochemistry, is examined.
  The laboratory element will include the techniques of synthesis, purification and
  characterisation.
