indicative_content:
- Introduction, the tropics, plantations; factors affecting plantation development
- Development, organisation and structure of tropical and subtropical plantations
- Forest genetics and tree breeding
- The silviculture and management of veteran trees
- Planting, species selection, cultivation, maintenance, nutrition, thinning, pruning
  and rotations of tropical plantations
- Introduction to some of the ideas current in the establishment and management of
  urban woodland and to reassure foresters that they have the knowledge and understanding
  to work on potentially difficult sites
- Biodiversity and sustainability of plantations
- Advanced forest nursery practices and the target seedling concept
learning_outcomes:
- Assess the potential benefits of tree breeding and improvement programmes and evaluate
  the suitability of different approaches to tree breeding for capital intensive and
  low capital forestry ventures.
- Assess the constraints of the main silvicultural practices used in the management
  of forests in the tropics.
- Critique some of the ideas current in the establishment and management of urban
  woodland.
- Choose the appropriate management strategy for veteran trees.
- Evaluate the target seedling concept and advanced nursery practices.
- Critique and make informed opinions on articles and papers pertinent to the advanced
  silviculture.
- Produce a researched presentation on a topic associated with Advanced Silviculture.
