reference: A34961
full_title: Advanced Silviculture
short_title: Advanced Silviculture
credits: 5
level: Advanced
author: NMCCARTHY
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: This module intends to further explore some of the topics of silviculture that
  are not generally covered in great detail in the sciences. It aims to elaborate
  on the new areas of genetics and tree breeding, enabling students to see the potential
  benefits of tree improvement programmes, and to evaluate the suitability of different
  approaches to tree breeding for capital intensive and low capital forestry ventures.
  The module will also introduce the students to tropical and subtropical systems,
  as well as teaching them about the target seedling concept and advanced nursery
  practice regimes. The problem case studies of elements of biodiversity and their
  effect on plantations and their management and development will also be outlined
  and discussed.
