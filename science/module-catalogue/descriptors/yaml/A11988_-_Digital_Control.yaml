school: Science and Computing
department: Engineering Technology
cluster: Automotive, Automation and IoT
aim: This course aims to introduce modern techniques used in the analysis and design
  of digital control systems. These techniques will be demonstrated using examples
  of practical control systems and will be implemented by the student using MATLAB
  and SIMULINK. The course should give the student the ability to bring modern control
  techniques to an industrial setting or perform research in state-of-the-art control
  methods.
