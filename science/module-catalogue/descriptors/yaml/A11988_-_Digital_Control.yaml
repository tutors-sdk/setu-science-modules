indicative_content:
- Sampling
- Modelling of Sampled Data Systems
- Discrete System Stability Analysis
- Digital Controller Design using Transform techniques
- Direct Digital Controller Design
- Controller Design using State Space Methods
- 'Three Term Control: analysis and tuning'
- Discrete Controller Implementation
learning_outcomes:
- Model discrete control systems.
- Perform stability analysis on discrete systems.
- Design digital controllers using transform techniques, direct and state space methods.
- Evaluate controller designs
- Implement Digital Controller algorithms.
- Use MATLAB and SIMULINK as part of system analysis and controller design.
