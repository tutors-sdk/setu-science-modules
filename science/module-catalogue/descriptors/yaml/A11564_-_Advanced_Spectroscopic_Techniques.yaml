aim: This module will provide the student with an advanced understanding of the theory,
  practices and instrumentation associated with advanced spectroscopic techniques.
  The techniques covered include molecular (UV-Vis, IR, Raman, NMR, MS) and atomic
  (AAS, AES, AFS) spectroscopies, focusing on state-of-the-art developments in their
  practices and instrumentation, as well as issues to deal with the spectroscopic
  identification of samples in complex matrices. The learner will be exposed to the
  application of advanced separation techniques in a wide range of environments focusing
  mainly, but not exclusively, on applications in the pharmaceutical and biopharmaceutical
  industries.
