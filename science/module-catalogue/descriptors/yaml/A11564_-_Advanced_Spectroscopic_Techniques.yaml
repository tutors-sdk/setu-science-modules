indicative_content:
- Advanced options and state-of-the-art developments in infra-red (IR) & UV-Vis instrumentation,
  e.g. diode array
- Evaluation of IR sampling techniques, e.g. multi- & single-attenuated total reflectance
  (ATR), diffuse reflectance, transmission systems (liquid & solid)
- The use of vibrational (IR & Raman) spectroscopy for the analysis of polymorphs,
  hydrates and solvates (cf. their quantification and identification) and for in situ
  characterisation, including Process Analytical Technology (PAT)
- Mass-Spectrometry interpretation (GC & LC), fragmentation patterns, mass analysers,
  Maldi methodologies
- Advanced options & state-of-the-art developments in atomic absorption (AAS), atomic
  emission (AES) and atomic fluorescence (AFS) spectroscopies, including quantitative
  analysis for metals in complex matrices & interference correction methods
- Inductively coupled plasma (ICP) techniques, e.g. ICP-MS and ICP-AES
- Review of advanced interpretation of NMR methods for structural elucidation, e.g.
  proton, carbon & 2-D techniques
- Advanced options and state-of-the-art developments in Nuclear Magnetic Resonance
  (NMR) spectroscopy, e.g. on-line separations, quantitation, solid-state NMR
- Principles and practices of polarimetry, fluorescence & phosphorescence techniques
- Selected applications of all of the above in the pharmaceutical and biopharmaceutical
  industries, incorporated into each area above
- Laboratory practicals demonstrating ability to operate the above techniques
learning_outcomes:
- Appraise the principles, practices and instrumentation associated with advanced
  spectroscopic techniques.
- Solve sample preparation issues relating to the use of advanced spectroscopic techniques.
- Solve method development issues concerned with mass spectrometry and related hyphenated
  techniques.
- Set up and calibrate associated laboratory instrumentation for pharmaceutical and
  biopharmaceutical sample analyses.
- Select appropriate advanced data analysing, synthesising and summarising skills
  in spectroscopic techniques.
