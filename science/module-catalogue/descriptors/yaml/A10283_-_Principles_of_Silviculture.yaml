history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: This module will provide an understanding of the silvicultural theory and practices
  involved in controlling forest establishment, composition and growth. This will
  include formulation of silvicultural systems for sites, and the development of an
  understanding of silvicultural practices, including natural and artificial regeneration,
  weed control regimes, nutrition and fertiliser, spacing, and intermediate stand
  treatments, such as thinning and pruning.
