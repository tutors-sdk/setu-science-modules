indicative_content:
- Site preparation
- Choice of species
- Establishment and restocking
- Weed control
- Nutrition
- 'Plantation management practices: spacing, thinning, pruning'
- 'Rotation: clearfelling'
learning_outcomes:
- Use silvicultural terminology.
- Examine principles of natural and artificial regeneration, spacing and intermediate
  stand treatments such as thinning and pruning.
- Recommend methods of resolving problems associated with forest vegetation management.
- Apply forest fertilisation principles to meet the nutrient requirements of trees
  and evaluate the potential environmental implications.
- Apply silvicultural concepts such as species selection to simple case studies.
- Collect ,collate and analyse results from silvicultural research trials.
