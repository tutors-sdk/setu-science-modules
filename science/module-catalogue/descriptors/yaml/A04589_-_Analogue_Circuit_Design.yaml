aim: This module covers analogue circuit design techniques and sensor and transducer
  signal conditioning circuits. 1. Introduction to modern analogue sensors, transducers
  and their characteristics 2. Analogue circuit design techniques with emphasis on
  transducer signal conditioning, bridge circuits, etc. 3. Analogue-to-Digital and
  Digital-to-Analogue converter fundamentals and architectures 4. Basic introduction
  to mixed signal system-on-chip and IoT signal processing hardware platforms.
