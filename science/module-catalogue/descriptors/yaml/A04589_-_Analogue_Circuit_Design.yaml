assessment_criteria:
- 'Fail (<40%): Unable to interpret and specify key concepts of sensor technology,
  signal conditioning, or programmable sensor hardware.'
- 'Pass (40% - 49%): Able to interpret and specify the key concepts of sensor technology,
  signal conditioning, or programmable sensor hardware.'
- 'Second Class Honours - Grade 2 (50% - 59%): Ability to specify key concepts of
  sensor technology, signal conditioning circuitry and programmable sensor hardware
  by demonstrating an ability to locate and utilise this knowledge within a broader
  mixed signal design environment.'
- 'Second Class Honours - Grade 1 (60% - 69%): Be able to solve sensor design problems,
  analyse sensor technology, signal conditioning circuitry, or programmable hardware
  and demonstrate an ability to deploy this knowledge within a broader mixed signal
  design environment.'
- 'First Class Honours (70% - 100%): All the above to an excellent level. Be able
  to analyse and design solutions to a high standard for a range of both complex and
  unforeseen problems through the use of appropriate skills and tools. An ability
  to synthesise solutions to problems should be evident here.'
