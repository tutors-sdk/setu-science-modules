indicative_content:
- Introduction to analogue sensors and transducers (temperature, humidity, strain,
  pressure, magnetic, output transducers, relays, etc
- Bridge sensor configurations (single, dual, quad, linear pot, active, centre tapped)
- Analogue circuit design and signal conditioning for sensor applications (bridge
  excitation, ratiometric operation, operational amplifier types and specifications,
  instrumentation amplifiers, isolation amplifiers, cmv, cmr)
- Introduction to A/D and D/A converters (fundamentals, types, architectures, operation,
  characteristics, errors, signal sampling)
- Introduction to mixed signal system-on-chip and IoT hardware (e.g. PSoC-4 BLE, Arduino,
  Raspberry Pi, mBed, Waspmote, etc)
- Circuit design and simulation skills using analogue and mixed mode (AMS) simulation
  CAD tools
- Design, build and test of a sensor system through the mini-project assessment element
  of the module
learning_outcomes:
- Compare and contrast the various types of sensors and bridge sensor configurations
  and analyse their performance characteristics.
- Solve a variety of sensor design problems by applying appropriate analogue signal
  conditioning solutions.
- Compare and contrast the operation and characteristics of different data converter
  architectures and evaluate key performance parameters.
- Appraise mixed-signal System-on-Chip devices (e.g. PSoC) and IoT sensor technology
  hardware.
- Design and analyse various analogue and mixed signal circuits using Spice simulation
  software.
- Design, simulate, build, & test a basic sensor system using a mixed signal hardware
  platform.
learning_and_teaching_methods:
- Lectures
- Discussion and worked examples
- CAD laboratory design and simulation sessions
- Practical laboratory-based mini-project. Hardware design, build and test of a basic
  sensor system using a mixed signal hardware platform.
- Q & A Sessions (class or web)
