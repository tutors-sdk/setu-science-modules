corequisites: []
indicative_content:
- 'Introduction: data analysis & organisation; the booting process'
- 'Hard Disk Acquisition: Host Protected Areas (HPAs); write blockers; cryptographic
  hashes'
- 'Volume Analysis: partitioning schemes'
- 'File System Analysis: file system category; content category; metadata category;
  filename category; application category'
- File Systems
learning_outcomes:
- Describe the concepts of partitions.
- Demonstrate an awareness of issues surrounding the creation of forensic duplicates.
- Analyse file systems of various kinds of operating systems.
- Use a forensic toolkit.
- Demonstrate how to retrieve deleted data.
- Examine the conceptual types of data associated within a file system and how these
  conceptual types of data are implemented in common file systems.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals. The lectures
  will be used to introduce new topics and their related concepts. The practical element
  allows the student to put into practice the theoretical concepts covered in the
  lectures. Practical work will include the student working with an industry standard
  forensic toolkit.
