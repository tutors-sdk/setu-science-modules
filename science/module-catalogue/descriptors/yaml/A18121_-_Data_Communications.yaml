indicative_content:
- 1 OSI and Internet Models for communication
- 2 Physical Layer (Modulation, clock recovery, framing, sunchronisation and flags)
- 3 Data Link Layer (Including flow and error control)
- 4 Network Layer (network algorithms)
- 5 Internet Protocol (datagram structures, constructng a header field for IPv4 and
  IPv6)
- 6 Transport Layer (role, implementations in TCP and UDP)
learning_outcomes:
- Critically analyse (de)modulation, clock and data recovery block diagrams.
- Describe the implementation of flow and error control in general and develop & test
  a Cyclic Redundancy Check error detection system.
- Examine a data frame or packet and prepare evidence-based conclusions to evaluate
  the nature of the underlying datagram or switched communication protocol..
- Assess the requirements of a Transport Layer protocol, when the underlying network
  protocol is unpredicable in terms of losses and delays.
- Demonstrate a practical ability to develop, troubleshoot, test, analyse and report
  on the Data Communications topics covered here.
- Select a means of securing communications and apply advanced skills to develop a
  bespoke system.
