aim: This module complements the Telecommunications taught in the course by introducing
  the structures that lie behind the transmission and reception of a communications
  signal. The course examines how, after the recovery of the transmitted bit/symbol,
  how the original transmitted information may be interpreted in a structured system
  in order to effectively communicate, how to manage errors and also how to secure
  the communication.
