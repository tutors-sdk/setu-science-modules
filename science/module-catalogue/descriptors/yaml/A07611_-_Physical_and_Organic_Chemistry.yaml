aim: This module provides an introduction to the general principles of physical and
  organic chemistry and their applications. Topics include thermochemistry, chemical
  equilibrium, acid/base reactions, pH scale, kinetics and catalysis. In addition,
  an appreciation for the scope of organic chemistry, including hydrocarbons, homologous
  series, isomerism, functional groups and fundamental organic reactions will be obtained.
