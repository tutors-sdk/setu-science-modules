indicative_content:
- 'Thermochemistry: heats of formation, combustion, neutralisation and solution; energy
  changes during chemical reactions'
- Equilibrium in physical processes
- Chemical equilibrium, equilibrium constants & Le Chatelier's Principle
- Ionic equilibria in aqueous solution and the ionic product of water; pH scale and
  the buffer equation
- Arrhenius equation and the Arrhenius concept of acids and bases
- Representation of structural formulae and nomenclature of organic molecules
- 'Hydrocarbons, homologous series: bonding in alkanes, cycloalkanes, alkenes, alkynes
  and aromatics; isomerism'
- Functional groups
- 'Nucleophiles and electrophiles; reactions of alkyl halides: Sn1, Sn2, E1, E2 and
  electrophilic addition reactions'
learning_outcomes:
- Calculate heats of formation, combustion, neutralisation, solution and energy changes
  during a chemical reaction.
- 'Outline the principles of chemical equilibrium and solve related problems: pH,
  Ka, Kb.'
- Apply the Henderson-Hasselbalch equation in order to determine pH.
- Name and draw organic molecules.
- Identify nucleophiles, electrophiles and functional groups.
- 'Describe reaction mechanisms: Sn1, Sn2, E1, E2 and electrophilic addition reactions.'
- Complete functional group testing, basic organic synthesis, recrystallisation, conductivity/pH/colorimetry
  experiments.
- Demonstrate a range of laboratory skills and safe work practices in the physical
  and organic chemistry laboratory environments.
