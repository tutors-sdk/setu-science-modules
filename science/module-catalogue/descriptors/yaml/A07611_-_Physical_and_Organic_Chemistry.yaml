assessment_criteria:
- '<40%: No understanding of the basic principles of physical and organic chemistry.
  Inability to carry out practical skills in the associated laboratories.'
- '40%-49%: Has a superficial knowledge of physical and organic chemistry. Has a basic
  level of competency & skills in the associated laboratories.'
- '50%-59%: Shows a reasonable level of understanding of the various principles involved
  in physical and organic chemistry. Displays good practical skills in the associated
  laboratories.'
- '60%-69%: Shows a good knowledge of the areas of physical and organic chemistry,
  as well as an ability to reason and analyse problems related to the area. Has a
  high level of skills in the associated laboratories.'
- '70%-100%: Excellent knowledge of the areas of physical and organic chemistry. Excellent
  reasoning skills and focused well thought out arguments. Engages in debate in class
  and has a high level of efficiency in the associated laboratories.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
