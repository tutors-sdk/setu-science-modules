aim: 'Aim: The modules aims to: give the student an understanding of the main points
  of clear standard input on familiar matters regularly encountered in work, school,
  leisure etc.; enable the student to deal with most situations likely to arise whilst
  travelling in an area where the language is spoken; enable the student to produce
  simple connected text on topics which are familiar or of personal interest; give
  the student the skills to describe experiences, dreams, hopes and ambitions and
  briefly give reasons and explanations for opinions and plans on both concrete and
  abstract subjects; facilitate the student to perform and react to a wide range of
  language functions using their most common exponents in a neutral register; train
  the student to recognise the salient politeness conventions and act appropriately.
  He / She will be aware of and look out for signs of the most significant differences
  between the customs, usages, attitudes, values and beliefs prevalent in the community
  concerned and those of his / her own; enable the student to show evidence of critical
  awareness of his/her own and the other culture.'
