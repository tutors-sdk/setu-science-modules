indicative_content:
- A compendium of language exercises and tasks from the prescribed textbook Savoir-faire
  le franais luniversit. G. Anjelvin.
- 'Contexts / themes that may be used to achieve the learning outcomes for this level
  may include the following:'
- a. Reading
- b. The Arts
- c. Fashion
- New technologies and innovations (internet, texting etc. ,)
- Jobs and careers
- Charity work
- Comprehension using literary extracts
- DVD segments on various topics from the programme Regards
- 'Linguistic structures that will be covered at this level will include the following:'
- a. Passive
- b. Adjectives and indefinite pronouns
- c. Demonstrative pronouns
- d. Constructions with two pronouns
- e. Introduction to the subjunctive Constructions allowing expression of cause and
  effect
learning_outcomes:
- Oral Production
- The learner is expected to be able to:.
- sustain a monologue (putting a case) and develop an argument well enough to be followed
  without difficulty most of the time;.
- compare and contrast alternatives by discussing or explaining what to do, where
  to go, who or which to choose, or how to do something giving detailed instructions.
- exchange, check and confirm accumulated factual information on familiar routine
  and non-routine matters within his / her field with some confidence;.
- exploit a basic repertoire of language and strategies to help keep a conversation
  or discussion going; summarise the point reached in a discussion and so help focus
  the talk.
- Written Production
- The learner is expected to be able to:.
- write simple essays on topics of interest;.
- summarise shorter descriptive and argumentative articles and write his / her opinion
  about a short story, article, talk, discussion, interview or documentary;.
- Aural Reception (listening)
- The learner is expected to be able to:.
- generally follow the main points of extended discussion around him / her provided
  speech is clearly articulated in standard dialect;.
- generally follow the main points in TV discussions on familiar topics e.g. shorter
  news items, though not in great detail.
- Visual Reception (reading)
- The learner is expected to be able to:.
- scan longer texts in order to locate desired information and gather information
  from different parts of a text or from different texts in order to fulfil a specific
  task.
learning_and_teaching_methods:
- Interactive seminars will be the main teaching approach. A variety of media will
  be used in the teaching process (traditional print materials, audio and video material,
  CALL programmes and online language learning resources). The course will be characterised
  by a high level of student participation in both classroom activities and self-directed
  learning activities outside the classroom.
