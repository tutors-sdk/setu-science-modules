indicative_content:
- 'Ecology: biodiversity, ecosystems, habitats, niche; species interactions competition,
  predation, parasitism, mutualism; succession, climax community; energy flow, food
  chains & webs'
- 'Pollution: origins of pollution; pollutant monitoring; effects of pollution'
- 'Water: hydrological cycle; pollution control, including wastewater and water treatment;
  EU Water Frameworks Directive'
- 'Air: global air pollution issues, i.e. acid deposition, global warming, ozone depletion,
  international protocols'
- 'Energy: clean energy technologies, energy efficiency/policy/poverty/security, electricity,
  natural gas, nuclear, oil, renewables/alternative energy, transport.'
- Field trip to river ecosystems, including measurement of biotic index of water quality
- 'Laboratory practicals: physico-chemical analysis of water, i.e. hardness, BOD,
  nitrate and phosphate in water; microbiological analysis of water'
learning_outcomes:
- Discuss how energy generation impacts the environment.
- Apply ecological concepts (such as biodiversity indices, symbiosis) to the monitoring
  of ecosystems.
- Describe the Greenhouse Effect and outline the scientific evidence behind anthropogenic
  climate change.
- Discuss how pollutants are produced and monitored in the environment.
- Explain the main topics associated with water in our environment, such as the hydrological
  cycle, pollution, treatment.
- Identify significant air pollution components and explain their significance in
  terms of acidity and ozone depletion.
- Identify the major ecological and physico chemical parameters necessary to access
  environmental quality.
- Classify environments based on laboratory and field investigations.
learning_and_teaching_methods:
- Lectures on the indicative content will be delivered, incorporating active learning
  activities.
- In-class and independent study assignments will be used to continually assess students'
  learning.
- Laboratory investigations plus field trips will reinforce and support theoretical
  elements of the module.
