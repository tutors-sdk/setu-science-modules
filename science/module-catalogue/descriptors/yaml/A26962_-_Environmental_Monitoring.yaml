assessment_criteria:
- '<40%: No understanding of the basic principles of environmental science.'
- '40%-49%: Is able to understand the principles of environmental science. May have
  some difficulty with applying this theory.'
- '50%-59%: All the above in addition to evaluation of practical data to assess environmental
  quality.'
- '60%-69%: In addition to the above plus show a high level of competence and efficiency
  in the subject area.'
- '70%-100%: All previous to excellent level. Be able to describe and discuss environmental
  science.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
