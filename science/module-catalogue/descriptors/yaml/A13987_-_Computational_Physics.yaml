aim: The aim of this module is to highlight the computational approach to solving
  physics problems. The concepts and techniques covered in this module will be applicable
  in projects or problem-solving work that contain a strong computational or data
  analysis element. The module is designed such that a significant fraction of the
  student's time is spent programming/solving specific physical problems, rather than
  learning abstract techniques.
