assessment_criteria:
- '<40%: Demonstrate little or no evidence of understanding of the concepts outlined
  in the syllabus content and the skills required for attaining the module learning
  outcomes. Show very little or no ability to apply knowledge to solve problems. Organisation
  and presentational skills are minimally effective or ineffective.'
- '40%-49%: Demonstrate partial but limited command of knowledge and skills required
  for attaining some of the module learning outcomes. Able to implement a rudimentary
  solution to the given computational problems.'
- '50%-59%: Demonstrate general but incomplete command of knowledge and skills required
  for attaining most of the module learning outcomes. Shows evidence of some analytical
  and critical abilities, and ability to apply knowledge to most familiar computational
  problems.'
- '60%-69%: Demonstrate substantial command of a broad range of knowledge and skills
  required for attaining at least most of the module learning outcomes. Show evidence
  of analytical and critical abilities, and ability to apply knowledge to familiar
  and some unfamiliar computational problems. Correct use of data/results to draw
  appropriate conclusions.'
- '70%-100%: Demonstrate command at an advanced level of the knowledge and skills
  required for attaining all the course learning outcomes. Show strong analytical
  and critical abilities, with evidence of original thought, and ability to apply
  knowledge to a wide range of complex, familiar and unfamiliar computational problems.
  Critical use of data and results to draw appropriate and insightful conclusions.'
