  status: M
prerequisites: []
corequisites: []
indicative_content:
- Emulsion formulation and manufacture; the use of surfactants, individual and combinations
  thereof and preservative systems in stabilising an emulsion
- 'Gels: excipients used in gel preparations; bioadhesion & formulation of bioadhesives'
- Formulation of sustained release dosage forms; encapsulation and tabletting of slow
  release granules, matrix tablets
- Production of veterinary products; EC guidelines, MRL's in foods; setting of withholding
  periods
- Production of nasal sprays & aerosols; testing and quality control requirements
- Specifications for the control of dosage forms studied at release and during shelf
  life
learning_outcomes:
- Propose formulations for the development of emulsion preparations.
- Formulate gel preparations choosing appropriate excipients to achieve a suitable
  product.
- Interpret the critical points to be considered in the production and testing of
  veterinary pharmaceuticals.
- Plan the steps to be undertaken in formulating a sustained release product.
- Classify the component parts and importance of same for Nasal/MDI preparations.
- Formulate and prepare a solid oral dosage pharmaceutical preparation and carry out
  physical tests thereon. Prepare a suspension preparation.
- Compile appropriate specifications for the control of the quality of a pharmaceutical
  product both at release and during shelf life.
