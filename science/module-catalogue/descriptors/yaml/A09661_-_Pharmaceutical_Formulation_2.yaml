reference: A09661
full_title: Pharmaceutical Formulation 2
short_title: Pharmaceutical Formulation 2
credits: 10
level: Intermediate
author: ADONEGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Pharmaceutical Science
aim: This module will give students a good understanding of the development on a range
  of solid, liquid and topical preparations for human and veterinary use. An introduction
  to the formulation and testing of sustained release products will also be covered.
  The importance of the device and the formulation in nasal inhalation products will
  be addressed in this module.
