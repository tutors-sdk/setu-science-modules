assessment_criteria:
- '<40%: Inadequate understanding of the fundamentals of research methods and insufficient
  competence in their use. Insufficient level of knowledge of chosen research topic.'
- '40%-49%: Ability to show a basic knowledge of research methods and basic competency
  in their use. Basic level of knowledge of chosen research topic.'
- '50%-59%: As well as the above, the student will be able to demonstrate an understanding
  of some of the complexities of research methods and a good competency in their use.
  Display an adequate level of knowledge of chosen research topic supplemented by
  an ability to present this knowledge in a clear and concise manner.'
- '60%-69%: In addition to the above, the student will demonstrate a more detailed
  knowledge of research methods and a high level of competence in their use. Display
  a high level of knowledge of chosen research topic, supplemented by an ability to
  present this knowledge to a high technical standard.'
- '70%-100%: All of the above to an excellent level. In addition, the student will
  demonstrate a thorough level of knowledge of chosen research topic, supplemented
  by an ability to critically evaluate and discuss the topic in relation to a wider
  scientific context. The above advanced knowledge of the topic will be supported
  by superior reporting and presentation skills.'
