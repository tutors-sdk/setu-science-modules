indicative_content:
- The scientific method, how to read and understand a scientific research article
- Search strategies and tools for searching the scientific literature, using online
  databases, books and Internet resources
- Referencing the literature using the Harvard and Vancouver systems & dedicated reference
  manager software.
- Identifying, evaluating and avoiding plagiarism in scientific writing
- Formatting and design of a literature review document using the built-in tools of
  MS Word
- Formatting tables, graphs, schemes and images appropriately for a research document
- Scientific writing skills
- Oral presentation of literature review
learning_outcomes:
- Use library resources to search the scientific literature and databases relevant
  to a chosen research topic.
- Compile a review of the scientific literature on a specialised research topic in
  the format of a research report.
- Apply the built-in tools of MS Word to compile, report and present a literature
  review on a specialised research topic.
- Utilise reference manager software to support a literature review.
- Communicate the research findings in an oral format.
learning_and_teaching_methods:
- IT tutorials.
- Library training.
- Consultations with project supervisor.
- Self-directed study.
