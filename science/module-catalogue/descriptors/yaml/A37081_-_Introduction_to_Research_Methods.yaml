aim: This module will introduce the student to techniques that are necessary in a
  research environment, such as accessing, referencing and utilising public literature
  and library resources. In addition, the student will be exposed to the necessary
  skills needed to compile a report to a scientific standard in order to prepare a
  literature review on a research topic.
