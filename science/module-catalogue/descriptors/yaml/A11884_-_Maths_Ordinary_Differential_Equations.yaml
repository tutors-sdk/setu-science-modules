indicative_content:
- 'Engineering Functions: Error function, Gamma function, Dirac delta function. Functions
  of a complex variable. Functions of two real variables; surface and contour plots.
  Partial Derivatives; Differentials. Fourier sums.'
- 'Linear Ordinary Differential Equations (analytical methods): Existence, uniqueness
  and independence of solutions; Wronskian. First Order (integrating factor method,
  undetermined coefficient method). Second order (undetermined coefficients; variation
  of parameters). Solution of a system of linear first order equations using matrix
  exponential. Laplace transform methods.'
- Nonlinear Ordinary Differential Equations (analytical and numerical methods). Separation
  of variables method; exact differential method; Euler and Runge-Kutta methods. Equilibrium
  solutions and stability.
- Qualitative methods for the analysis of the solutions of a pair of coupled ODEs
learning_outcomes:
- Classify ordinary differential equations and hence determine whether a unique solution
  exists.
- Review the general properties of an unseen Special Function using an Engineering
  handbook or a help file.
- Recognise standard functions of two variables, find partial derivatives and differentials
  for such functions.
- Use standard methods (analytical and numerical) to solve linear and basic nonlinear
  ordinary differential equations of first and second order and a system of first
  order linear equations.
- Describe functions of a complex variable in terms of their real valued real and
  imaginary parts.
- Use mathematical software to study ordinary differential equations.
learning_and_teaching_methods:
- Delivery of the subject will be through a mixture of lectures and directed problem-solving
  sessions.
- The lectures will develop theory and present the associated mathematical methods.
- The directed work sessions will underpin and rehearse the skills demonstrated. Students
  will be required to construct valid and precise mathematical arguments and will
  be expected to start to treat mathematics as a modelling language rather than as
  a stand alone subject.
- The laboratory sessions consist of a number of computer based practicals to reinforce
  the concepts covered during the lectures using mathematical software such as OCTAVE/MATLAB
  or Python (or similar language).
