indicative_content:
- A compendium of language exercises and tasks from the prescribed textbook Savoir-faire
  Le francais a' l'universite'.
- News items
- Aspects of French society
- New technologies and innovations (internet, texting etc.)
- Jobs, interviews and careers
- Comprehension using literary extracts
- DVD segments on various topics from the programme Regards
- a. Passive
- b. Adjectives, place of adjectives and indefinite pronouns
- c. Demonstrative pronouns
- d. Constructions with two pronouns
- e.Comparatives and superlatives
- f. Negation
- g. Reflexive verbs (past)
- h. Logical connectors
learning_outcomes:
- 'Speaking: Develop an argument, engage in discussion and explain choices on non-routine
  topics in conversations and presentations.'
- 'Writing: Write texts and summarise shorter descriptive and/or argumentative articles
  and express his/her personal opinion.'
- 'Listening: Follow the main points in authentic media clips.'
- 'Reading: Extract specific information from longer texts with more complex structures
  and lexis in order to successfully complete a variety of tasks.'
- 'Intercultural competence: Identify how cultural practices and values evolve under
  the influence of different factors (e.g. history, the environment, institutional
  networks).'
learning_and_teaching_methods:
- Interactive seminars, variety of media (traditional print, audio and video materials,
  online language learning resources and may also include:Tandem Learning, Content
  & Language Integrated Learning, Self-directed learning, Blended learning, European
  Language Portfolio, Transferable skills, Online learning resources...
