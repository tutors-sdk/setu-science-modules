reference: A11419
full_title: Dairy Production
short_title: Dairy Production
credits: 5
level: Introductory
author: JRYAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will enable the student to manage a modern dairy enterprise, including
  the factors that influence milk quality and yield. The student will learn how to
  implement dairy herd feeding and management programmes, as well as disease control
  strategies. The student will also learn how to evaluate milking equipment.
