indicative_content:
- Milk quality and yield
- Milking equipment and cleaning routines
- Dairy facilities
- Feeding and management
- Diseases
- Rearing replacements
- Economics of dairy production
learning_outcomes:
- State factors which influence milk quality and yield.
- Review milking equipment and cleaning routines.
- Compare dairy facilities.
- Construct feeding and management programmes.
- Plan disease control strategies.
- Determine appropriate rearing methods for replacement heifers.
- Examine the economics of milk production.
