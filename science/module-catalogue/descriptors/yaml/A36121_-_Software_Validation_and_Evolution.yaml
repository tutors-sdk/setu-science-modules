indicative_content:
- Validation planning
- Testing fundamentals, including test plan creation and test cases
- Black-box and white-box testing techniques, reviews, and static analysis techniques
- Automated testing
- Security testing (identify security needs and risks, including security requirement
  to the test plan, test for security including strong encrypted password)
- JavaScript programming (variables, functions, conditional statements, and loops
- Unit, integration, validation, performance, regression, and system testing
- Object-oriented testing
- Inspections
- Software mainteneance, reuse and versioning
learning_outcomes:
- Compare and explain testing approaches based on their types, methods and levels.
- Compare and explain the validation and verification processes.
- Produce a test plan for a small- or medium-size project.
- Design and perform manual and automated tests using relevant tools.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and computer-based practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practicals will be used so that students put their knowledge into parctice to
  either design or implement test plans and test cases.
- For online delivery the lectures and practicals will be a combination of comprehensive
  rich media instructional content (notes), interactive synchronous video (live webinars/classes)
  and asynchronous interactive video playback (on-demand).
