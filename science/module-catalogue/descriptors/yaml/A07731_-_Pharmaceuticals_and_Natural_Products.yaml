indicative_content:
- 'The use of carbanions in the synthesis of a range of pharmaceuticals and natural
  products; synthetic pathways of these reactions along with mechanisms are studied
  in detail. Strategies involving the following reactions are included: $\alpha$-halogenation,
  enolate alkylation, aldol, Claisen, Michael and Wittig reactions. Combinations of
  such reactions to generate cyclic products are discussed along with strategies for
  selectivity'
- Structure of a range of pharmaceutical and natural products, including terpenes,
  steroids, sulphonamides and beta-lactam antibiotics
- Chemical aspects and the synthesis of peptides, the structure of proteins, nucleotides
  and DNA
learning_outcomes:
- Differentiate and illustrate the structure of a range of pharmaceuticals and natural
  products.
- Examine synthetic routes to suggested products.
- Relate the mechanisms involved in representative reactions to synthesise such targets.
- Use laboratory techniques to perform a multi-step organic synthesis.
