assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of pharmaceuticals
  and natural products. Lack of competence with regard to associated laboratory skills
  and practices.'
- '40%-49%: Will be able to show a limited understanding of the fundamentals of pharmaceuticals
  and natural products. May have some difficulty with applying this theory. Will display
  some ability with regard to associated laboratory skills and practices.'
- '50%-59%: As well as the above, the student will be to show an understanding of
  the complexities of pharmaceuticals and natural products. Will display reasonable
  competence with regard to associated laboratory skills and practices.'
- '60%-69%: In addition, the student will demonstrate a more detailed knowledge of
  pharmaceuticals and natural products and display a very good level of competence
  and efficiency with regard to associated laboratory skills and practices.'
- '70%-100%: All of the above to an excellent level. In addition, the learner will
  be able to demonstrate comprehensive knowledge and understanding of pharmaceuticals
  and natural products, as well as being able to predict general trends, evaluate
  and relate topics. Will display advanced competence and independence with regard
  to associated laboratory skills and practices.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
