reference: A08681
full_title: Applied Farm Management
short_title: Applied Farm Management
credits: 5
level: Advanced
author: SWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module is designed to develop the students' understanding of important concepts
  and applications of soil science, grassland management, animal breeding and reproduction,
  nutritional strategies and economic parameters. This will be achieved through the
  holistic evaluation of a farm enterprise and its potential future developments.
  To enhance the students' learning, they will be exposed to all current research
  developments.
programmes:
- timetable: AGRI-0108
  code: WD_SAGRI_B
  name: Bachelor of Science (Honours) in Agricultural Science
  stage: 4
  semester: 7
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Soil quality and fertility and their effects on feed, forage and cereal production
- Grass budgeting, grassland management and associated software applications
- Animal breeding and reproductive management strategies
- Nutritional management strategies and associated software applications
- Agri-business planning incorporating e-profit monitors, cost control planners, financial
  planning
learning_outcomes:
- Critique current and existing research in soil science.
- Evaluate current and evolving grassland management strategies and technologies.
- Assess animal breeding programs and efficiencies in different production systems.
- Design optimum fertility management protocols.
- Appraise and assess current animal feed formulation software.
- Develop a sustainable farm plan based on using data from a monitor farm.
- Evaluate their own learning progress.
- Produce an effective presentation.
learning_and_teaching_methods:
- Lectures.
- Guest industry speakers.
- Farm visits.
