reference: A09660
full_title: Introduction to Pharmaceutical Science
short_title: Introduction to Pharma Science
credits: 10
level: Introductory
author: ADONEGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Pharmaceutical Science
aim: This module covers several aspects of pharmaceutical science, including classification
  of pharmaceutical products, types of formulations, the manufacturing process and
  the role of the operator in this core value-added activity within a pharmaceutical
  organisation.
programmes:
- timetable: PHAR-0002
  code: WD_SGMPT_C
  name: Higher Certificate in Science in Good Manufacturing Practice and Technology
  stage: 2
  semester: 3
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Terminology, general requirements of pharmaceuticals and pharmaceutical manufacturing
  processes
- Classification of pharmaceuticals, topical, oral dose, parenterals, aerosol, OTC,
  prescription, sustained release products, biopharmaceuticals etc.
- Stages in pharmaceutical development
- Requirements of a quality product
- 'The manufacturing processes involved in the production of pharmaceuticals: blending,
  granulation, drying, micronising, encapsulation, tableting, coating'
- Introduction to pre-formulation studies
- ICH guidelines
- Introduction to the role of excipients
- Requirements for stability testing on a pharmaceutical product
learning_outcomes:
- Describe the requirements of pharmaceutical development and differentiate between
  different classes of pharmaceuticals.
- Outline the pathway to be followed in the development of a pharmaceutical product.
- Review ICH guidelines and apply their knowledge in drawing up a stability protocol
  for a pharmaceutical finished dosage form.
- Explain the primary processes used in the manufacture of finished dosage forms.
- Discuss a protocol that could be followed for a preformulation study on an API in
  advance of pharmaceutical formulation.
