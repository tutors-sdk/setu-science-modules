indicative_content:
- Model definition for dynamic control systems
- Model in the Loop
- Software in the Loop
- Hardware in the Loop
- Rapid Control Prototyping
- Apply model-based construction and analysis of embedded software systems
learning_outcomes:
- Construct mathematical models for plant and controller systems.
- Design and apply Model in the Loop(MIL), Software in the Loop(SIL) and Hardware
  in the Loop(HIL) simulations.
- Apply and simulate suitable feedback-based control algorithms using current tools
  and techniques.
- Produce code to target a specific microcontroller platform.
- Apply the model-based development paradigm for continuous model refinement and re-verification.
- Analyse embedded model designs and simulation results.
learning_and_teaching_methods:
- Combination of lectures and laboratory-based practical exercises.
- 'Lectures will cover theoretical basis of key topics in model based design: Model
  definition; feedback systems; ECU targeting and code generation.'
- Laboratory-based practicals will combine topics covered in lectures to build, simulate
  and deploy embedded software solutions using the model-based development approach.
