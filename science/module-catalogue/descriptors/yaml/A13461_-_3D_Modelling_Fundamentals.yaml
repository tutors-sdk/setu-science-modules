indicative_content:
- Introduction to the 3D production pipeline, from concept to mesh creation
- Components of an industry-standard 3D modelling platform
- Polygon, subdivision, and NURB modelling
- Basic camera and viewing techniques
- Introductory shading and rendering
learning_outcomes:
- Describe the fundamentals of the 3D modelling workflow, from concept to a shaded
  mesh.
- Identify and effectively navigate the main components and features of an industry
  standard 3D modelling production platform.
- Compare various modelling approaches, i.e. polygon, sub-division and NURB-based
  modelling.
- Demonstrate the use of appropriate tools for the creation and manipulation of 3D
  objects and object components.
learning_and_teaching_methods:
- Interactive and open-forum lectures.
- Class discussions and presentations.
- Problem-based learning activities.
- Self-directed learning.
