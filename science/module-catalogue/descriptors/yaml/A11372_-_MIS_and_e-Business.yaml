indicative_content:
- Understand the flow of information within organisations
- Understanding of the foundation principles of management information systems
- Introduction to information systems and how they add value to businesses for competitive
  advantage
- Enterprise systems - Enterprise Resource Planning (ERP); Customer Relationship Management
  (CRM); Supply Chain Management (SCM)
- Information system development
- Information security
learning_outcomes:
- Assess the importance of information quality within organisations.
- Interpret the foundation principles of management information systems.
- Assess how information systems can provide competitive advantage.
- Critique the role of enterprise systems within an organisation.
- Comment on the security, privacy and ethical issues surrounding information systems.
- Produce well designed websites.
- Evaluate the use of social media technologies in a business context.
learning_and_teaching_methods:
- Lectures will be the main delivery mode, supplemented by participative case studies
  and independent reading on the issues covered in the lecture material. Overall the
  course will be characterised by student participation in both classroom activities
  and self-directed learning outside the classroom.
- Practicals will enable students to design and develop websites and demonstrate the
  use of social media.
