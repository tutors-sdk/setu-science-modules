aim: This module will address the concepts and issues of the design and use of information
  systems. It will address the use of electronic business and information systems
  to support the operations and management of a modern enterprise. Students will emerge
  from this module with an understanding of how systems can be utilised to automate
  a company's internal and external information flow.
