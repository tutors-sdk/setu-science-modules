indicative_content:
- Lexical Contexts covered may include - phrases with get; sounds and the human voice;
  describing books; money; history and warfare; compound adjectives.
- 'Grammatical Features covered may include - the verb to get; speculation and deduction;
  adding emphasis: inversion; unreal use of past tenses; discourse markers (2): adverbs
  and adverbial expressions; verb + object + infinitive or gerund.'
- Discourse/Functions - writing an article for an online publication; expressing annoyance;
  describing books; emphasising; expressing regret; expressing preference; writing
  a review; polite requests.
- Exercise Types - multiple-choice, gap-fill, close tests, word formation, sentence
  transformation, question and answer comprehensions, group definition activities,
  pairwork, information gap, anecdote descriptions, questionnaires, roleplays
learning_outcomes:
- Demonstrate a range of spoken skills exploiting the language systems (lexis, grammar)
  and skills (productive and interactive) covered in the module.
- Determine the meaning of a variety of short and extended aural texts within the
  lexical contexts covered in the module.
- Evaluate a variety of text types within the lexical contexts covered in the module,
  and employ those reading skills practised within the module.
- Generate stylistically appropriate written texts demonstrating a command of the
  lexical and grammatical elements covered in the module.
- Demonstrate appropriate awareness of cultural diversity based on class discussion
  and independent reflection.
learning_and_teaching_methods:
- Adopting a broadly communicative and integrated approach to language teaching, methods
  may include inter-active seminars, short talks and presentations and workshops using
  both traditional and ICT-based materials. Emphasis will be placed on class participation,
  independent learning and skills development. Teaching approaches that recognise
  and foster a variety of learning and teaching styles and/or promote learner motivation
  may be employed.
