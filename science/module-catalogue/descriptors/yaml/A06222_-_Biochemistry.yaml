aim: This module builds on students' knowledge of basic biochemical concepts obtained
  in previous modules (Cell Biology and Biochemistry; Organic Chemistry and Biomolecules),
  focusing particularly on proteins, enzymes and metabolic reactions. The module covers
  protein synthesis in cells by the process of translation, enzyme properties and
  enzyme kinetics, as well as energy metabolism, and an overview of pH and buffers.
  The theory is reinforced with practical content, including preparation of solutions,
  biochemical analyses and quantification or purification of proteins and enzymes.
