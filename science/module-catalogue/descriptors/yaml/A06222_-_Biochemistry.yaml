assessment_criteria:
- '<40%: No understanding of the basics of biochemistry. Unable to carry out critical
  thinking or practical skills.'
- '40%-49%: Is able to understand basic biochemistry. May have some difficulty with
  critical thinking and problem solving.'
- '50%-59%: All of the above including a good understanding of theoretical biochemistry
  and demonstration of good practical skills.'
- '60%-69%: Show a high level of competence and efficiency in theoretical and practical
  biochemistry.'
- '70%-100%: All of the above to an excellent level. Has the ability to describe and
  discuss theoretical and practical biochemistry.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
