indicative_content:
- 'Acids, bases, pH and buffers: calculations and practical methods involved in the
  preparation of buffers'
- 'General properties and classification of enzymes: introduction to enzyme kinetics
  and enzyme inhibition; assessment of enzyme activity and purity'
- 'Translation: the genetic code and its role in protein synthesis'
- The mechanism, role and control of the major metabolic pathways of the cell
- 'Practical element reflecting the indicative content of the module including: preparation
  of buffers and other solutions; quantitative biochemical assays; enzyme assays and
  examining enzyme kinetics and activity'
learning_outcomes:
- Explain key concepts of pH and buffers.
- Relate enzyme structure and classification to catalytic activity.
- Describe the basics of enzyme kinetics and identify the effects of different classes
  of reversible inhibitors on enzyme kinetics.
- Recognise the principles and mechanisms involved in the translation of proteins.
- Describe the principle pathways of energy metabolism and outline how these pathways
  may be regulated.
- Complete experiments in biochemical and enzyme assays and interpret the data obtained.
learning_and_teaching_methods:
- Lectures.
- Library work (self-directed study).
- Practical laboratory work.
- Student engagement will be enhanced through a blended teaching approach, combining
  on-line learning through interactive use of the Moodle virtual e-learning environment
  with lectures and videos/animations.
- Feedback will be provided on an on-going basis to encourage reflective, critical
  and independent learning.
