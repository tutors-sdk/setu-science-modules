indicative_content:
- Small Signal Amplifiers, Review, Capacitor coupled stages, Direct coupled stages
- Negative Feed Back, Concepts, Voltage feedback, Current feedback, Stability, Bode
  Plot
- Linear Circuits, Op-Amp Three Stage Architecture, Deviations from ideal performance,
  Error analysis, Frequency Response, Compensated / Uncompensated
- Linear Circuits Design, High Gain amplifiers, Instrumentation amplifiers, Integrators,
  Differentiators, Specialist Op-Amp IC's, Practical circuits
learning_outcomes:
- Describe the fundamentals of analogue circuit design.
- Explain the role of negative feedback in amplifier circuits.
- Outline the sources of errors in amplifiers constructed from op-amps.
- Develop linear op-amp circuit designs.
- Analyse the frequency response and error response of different circuit designs.
- Build, test, design specific elements of and verify the correct operation of circuits
  related to the theory based lectures.
learning_and_teaching_methods:
- The course delivery will be by direct contact lecturing and supervised laboratory
  practical work. The supervised lab element will coordinate to the taught element
  and will be assessed through performance in the lab and the quality and punctuality
  of the students' lab reports.
- Problem sheets will be given to the student to assist in self-paced study.
- Tutorials will allow the student to build up their skills of analysing and solving
  problems
- In class assessment (Mid-term & End-term) allowed students to form the solid memory
  of their theory study, monitor their learning status and gain the experience with
  time limited examination
