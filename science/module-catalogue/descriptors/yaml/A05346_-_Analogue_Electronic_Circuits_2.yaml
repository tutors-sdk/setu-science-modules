reference: A05346
full_title: Analogue Electronic Circuits 2
short_title: Analogue Electronic Circuits 2
credits: 5
level: Intermediate
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electronics
aim: The module provides the student with an essential grounding in the areas of Analogue
  circuit design. The module covers the fundamentals of circuit design and builds
  on the students' previous knowledge of ideal circuits. The minimisation and control
  of device induced errors is to the forefront in the teaching of this course.
