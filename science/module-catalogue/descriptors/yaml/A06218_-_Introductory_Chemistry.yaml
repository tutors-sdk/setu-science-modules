assessment_criteria:
- '<40%: No understanding of the basic principles of analytical and inorganic chemistry.
  Inadequate practical skills in the associated laboratories.'
- '40%-49%: Has a superficial knowledge of analytical and inorganic chemistry. Has
  a basic level of competency & skills in the associated laboratories.'
- '50%-59%: Shows a reasonable level of understanding of the various principles involved
  in analytical and inorganic chemistry. Displays good practical skills in the associated
  laboratories.'
- '60%-69%: Shows a good knowledge of the areas of analytical and inorganic chemistry,
  as well as an ability to reason and analyse problems related to the area. Has a
  high level of skills in the associated laboratories.'
- '70%-100%: All the above to an excellent level, in addition to excellent reasoning
  skills and focused well thought out arguments. Engages in debate in class and has
  a high level of efficiency in the associated laboratories.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
