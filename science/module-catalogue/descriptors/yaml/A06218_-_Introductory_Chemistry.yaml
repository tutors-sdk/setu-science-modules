indicative_content:
- Matter and atomic structure
- Chemical reactions; the mole concept and stoichiometry; stoichiometric calculations
- Acid/base reactions; volumetric analysis; indicators; buffers, pH
- Oxidation/reduction reactions; balancing redox equations
- Electronic structure of the atom; ionic and covalent bonding; intermolecular forces
- Introduction to hybridisation and the shape of simple molecules
- Periodic table, periodic trends and chemistry of the elements
- Reaction kinetics
learning_outcomes:
- Describe atomic structure, the factors that influence reaction rates, ionic/covalent/intermolecular
  bonding and acidity/basicity.
- Calculate molar quantities, concentrations, reaction yields and theoretical pH.
- Interpret chemical equations and trends/ properties associated with the periodic
  table.
- Complete a titration and solve associated titrimetric calculations.
- Communicate by written and verbal means the results of practical based exercises.
- Demonstrate safe handling/disposal of chemicals and good laboratory practice (GLP).
