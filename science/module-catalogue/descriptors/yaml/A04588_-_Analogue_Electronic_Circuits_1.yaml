reference: A04588
full_title: Analogue Electronic Circuits 1
short_title: Analogue Electronic Circuits 1
credits: 5
level: Introductory
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electronics
aim: This module follows on from Analogue Electronic Devices and builds on concepts
  introduced there. Equivalent circuit representations are used to help understanding
  of device/circuit operation under d.c. and a.c. conditions. SCR based power control
  circuits are developed. Operational amplifiers are introduced for linear circuit
  applications and sine wave oscillation theory is developed.
