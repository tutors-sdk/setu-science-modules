indicative_content:
- Traditional microbiological methods for the analysis of food ingredients, processes
  and products
- Rapid microbiological and immunological methods for the identification of food borne
  pathogens/indicator organisms; this will include giving examples and explaining
  the principles behind chromogenic media
- The principles and applications of ELISA-based assays for relevant testing
- The use of enzymes in food production/analysis
- Rapid hygiene testing methods relevant to the food industry
- Methods for food allergen analysis in food
- The concept of genetically modified foods; their applications, potential and their
  detection
- PCR as a DNA-based testing method relevant to the food industry
learning_outcomes:
- Compare and contrast traditional microbiological methods of food analysis with modern
  rapid kits, techniques and media.
- Identify and apply the appropriate modern bioanalytical technique/kit for the chosen
  substance/parameter.
- Describe the various bioanalytical methods available for relevant testing such as
  hygiene, allergen and pathogen detection from foods/food associated surfaces.
- Describe the principles of ELISA and select the appropriate format for the relevant
  sample.
- Describe the concept of GM foods and the associated issues.
- Identify the basis of a DNA-based testing method relevant to the food industry.
- Demonstrate proficiency in practical work focused on indicative content.
