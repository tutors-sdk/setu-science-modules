assessment_criteria:
- '<40%: Very little understanding of techniques covered.'
- '40%-49%: Has a basic understanding of techniques covered.'
- '50%-59%: Good knowledge of methods and has the ability to perform such methods
  in a laboratory setting.'
- '60%-69%: Good knowledge of methods and has the ability to perform such methods
  in a laboratory setting, also understands the principles behind such bioanalytical
  methods with the potential to troubleshoot.'
- '70%-100%: Displays an in-depth knowledge of all relevant current bioanalytical
  techniques and displays excellent ability in identifying the most appropriate technique,
  also performing lab experiments designed with such bioanalytical tools.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
