indicative_content:
- Review of programming methods; A selection of topics using any of the following
  typical methods to determine Machine Learning, Artificial Intelligence and power
  systems problems
- The development of algorithms for particular problems in Machine Learning, Artificial
  Intelligence and power systems are changing rapidly. It is envisaged that the content
  will be dynamic based ont he interest of the students.
learning_outcomes:
- Analyse problems to develop structured algorithms for various Machine Learning,
  Artificial Intelligence and power systems intelligent applications.
- Perform the required mathematics for various Machine Learning, Artificial Intelligence
  and power systems intelligent applications.
- Program and integrate a combination of data flow, functional and numerical computing
  environment languages with some typical devices used in electrical engineering to
  maximize the development speed and performance for various Machine Learning.
learning_and_teaching_methods:
- Lecturer led combined practicals / lectures
- Students continuous engagement with the course material is encouraged by providing
  the course materials, examples and software to the student in advance.
- Student's timely engagement with the course material is encouraged by providing
  clear criteria for proportionate and timely assignments and assessments.
- Peer to peer learning using group assignments and assessments
- Timely self-directed learning, in addition to lectures/practicals, that is required
  by the student to develop programming ability
