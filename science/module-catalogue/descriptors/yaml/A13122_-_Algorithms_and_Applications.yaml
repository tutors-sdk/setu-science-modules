aim: The aim of this module is to develop the ability of the student to understand,
  apply the mathematics required, develop the algorithms, program and evaluate topics
  in machine learning, artificial intelligence, and power systems. Topics are selected
  based on current research and publications and are selected to be as engaging as
  possible for the student.
