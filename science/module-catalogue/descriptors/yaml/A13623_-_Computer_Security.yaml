indicative_content:
- 'Introduction to computer security: security threats; attack methods; common vulnerabilities;
  security services'
- 'Cryptography: symmetric encryption; modern encryption; block vs stream ciphers;
  public key cryptography'
- 'Message authentication and integrity: hash functions; collisions; MACs; digital
  signatures; digital certificates'
- 'Network security: TLS/SSL; wireless security, SSH, firewalls'
- 'Secure Web Application development: SQL Injection; Cross Site Scripting, CSRF'
- Security policy and procedures
- Steganography, Digital watermarking and Digital rights management
learning_outcomes:
- Assess the various security threats and attack methods to which an organisation
  may be susceptible.
- Appraise the role of cryptography in computer security, including its benefits and
  limitations.
- Test and use cryptographic software and set up network and system security.
- Evaluate the specific security concerns pertinent when developing web applications.
- Appraise the role of steganography, digital watermarking and digital rights management
  within multimedia environments.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
