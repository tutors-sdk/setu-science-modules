indicative_content:
- Supply chains and networks
- Supply chain strategy
- Supply chain integration
- Supply chain processes
- Information sharing in supply chains
- Supply chain information system architectures
- Supply chain planning and control systems
- Supply chain execution systems
- Supply chain analytics and business intelligence
learning_outcomes:
- Evaluate the role of supply chains in meeting market demands.
- Determine how the concepts of strategy, integration, and processes relate to the
  supply chain concept.
- Justify the importance of information sharing to support supply chain integration
  at operational, tactical, and strategic levels.
- Evaluate how information systems can assist in supply chain planning and execution.
- Propose an analytics and business intelligence approach to support supply chain
  operations and management.
- Design an information systems architecture to support a supply chain.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and computer based practicals.
- The lectures will be used to introduce new topics and their related concepts. Lectures
  will be supplemented by participative case studies and independent reading on the
  issues covered in the lecture material.
- The practical element is intended to provide the student with the skills needed
  to use and understand technologies available to assist in supply chain planning,
  control, and execution, and in supply chain analytics.
