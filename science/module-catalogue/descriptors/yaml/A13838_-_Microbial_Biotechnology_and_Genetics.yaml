indicative_content:
- Macromolecules and genetic information
- DNA structure & replication
- RNA & protein synthesis
- Regulation of enzyme activity & transcription (positive and negative control)
- 'Bacterial genetics: mutation & recombination'
- In vivo & in vitro techniques of bacterial genetics
- Introduction to bioprocess design and control
- Bioreactors
- Genetic engineering and biotechnology
learning_outcomes:
- Recall and explain biological information flow.
- Describe the central dogma of genetics from DNA replication to protein synthesis.
- Explain how cells control the expression of their genetic information.
- Compare and contrast regulatory mechanisms in prokaryotes and eukaryotes.
- Discuss mutation and genetic recombination.
- Construct a flow diagram of a typical biotechnological process & describe bioreactor
  design suited to different applications.
- Employ basic techniques of in-vitro DNA manipulations.
learning_and_teaching_methods:
- A multiple modalities approach to teaching basic molecular concepts is used.
- The creation of multimodal texts/content provide opportunity for the students to
  use linguistic, visual and audio modes in order to experience, conceptualize, analyze
  and apply meaning.
- E-activites, online tutorials, digital storyboards, videos, e-forums, mindmaps and
  concept maps are some blended learning activities in the design of this module
- Face to face lectures provide opportunity for the students to conduct some of the
  learning activities such as concept maps & mindmaps
- Virtual lectures are created as 10-15 mins short digital storyboards. Students engage
  with this material prior to face to face sessions.
- Students participate in online MCQ quizzes after reviewing each virtual storyboard.
- Student reflection is conducted using group forum discussions.
