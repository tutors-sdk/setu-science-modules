assessment_criteria:
- '<40%: No understanding of microbial biotechnology and molecular genetics. Unable
  to carry out critical thinking or practical skills.'
- '40%-49%: Able to understand basic concepts. May have some difficulty with critical
  thinking and problem solving. Adequate practical skills.'
- '50%-59%: A good understanding of the material presented with demonstration of some
  critical thinking and problem solving skills. Good practical skills.'
- '60%-69%: In addition, good critical thinking skills and showing a high level of
  competence and efficiency in theoretical and practical microbial biotechnology.'
- '70%-100%: All of the above to an excellent level.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
