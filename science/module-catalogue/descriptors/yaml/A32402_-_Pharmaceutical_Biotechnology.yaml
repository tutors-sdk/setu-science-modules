indicative_content:
- Detailed treatment of design issues around bioreactors; sterilisation, including
  calculation of D & Z values; sterile delivery and sampling; clean room technology
- Formulation of biotechnology products, including biopharmaceutical considerations
  of sterility and stability
- Downstream processing for product isolation and purification
- Biological approaches to drug design and delivery; cultivation systems; biological
  pharmaceutical products such as insulin and interferon; protein purification
- Production of biopharmaceuticals such as antibiotics and antibody-based drugs; recombinant
  DNA technology; expression systems; immunotherapeutic agents and immunotechnology
- Ethical considerations in animal testing and marketing
- Enzymes, background, classification, kinetics of enzymatic reactions, mechanism
  of action
- Introduction to stereoselective synthesis of pharmaceuticals, resolution, asymmetric
  synthesis from prochiral starting materials
- Biocatalysis for the synthesis of organic biomolecules; use of microbial and enzymatic
  catalysts and their advantages in terms of chemoselectivity, regioselectivity and
  stereoselectivity
- Important enzymes for such biotransformations, including hydrolases and oxidoreductases;
  enzymes in organic solvents; immobilised cells and enzymes
- Screening techniques for the identification of enzymes and microbial isolates with
  biocatalytic potential
- Analytical methods for the estimation of enantiomeric excess, including optical
  methods, chiral chromatography and polarimetry
- Practical work related to the above topics, screening microbes for potential biopharmaceutical
  compounds, protein purification methods, fermentations and enzymes in organic solvents
  for synthesis of biomolecules, gas chromatography (GC) and polarimetry for product
  analysis.; analytical methods for biopharmaceuticals
learning_outcomes:
- Determine the role of biotechnology in the production of biopharmaceutical products.
- Examine the main features of biotechnology, including processing and the critical
  control parameters in production.
- Analyse the main groups of biologically-active products with pharmaceutical applications,
  including antibiotics, antibody-based drugs and therapeutic proteins.
- Explore the role of the biocatalysts in the synthesis of organic drugs with the
  application of specific enzymes and their reactions.
- Determine the advantages of using biotransformations in the production of such compounds
  and detail how in particular stereoselectivity may be measured analytically.
- Demonstrate proficiency in laboratory techniques related to the above outcomes.
