assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of pharmaceutical
  biotechnology. Lack of competence with associated laboratory skills and practices.'
- '40%-49%: Ability to show a limited understanding of the fundamentals of pharmaceutical
  biotechnology. Will display some ability with associated laboratory skills and practices.'
- '50%-59%: As well as the above, ability to show an understanding of some of the
  complexities of pharmaceutical biotechnology. Will display reasonable competence
  with associated laboratory skills and practices.'
- '60%-69%: In addition, the student will demonstrate a more detailed knowledge of
  pharmaceutical biotechnology and display very good competence with associated laboratory
  skills and practices.'
- '70%-100%: All of the above to an excellent level. In addition, ability to demonstrate
  a comprehensive knowledge and understanding of pharmaceutical biotechnology and
  show ability to evaluate and relate topics. Will also demonstrate excellent competence
  and independence with associated laboratory skills and practices.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
