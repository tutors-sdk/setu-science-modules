aim: This module will describe the application of biotechnology to the production
  of pharmaceutical products. Topics covered will include antibiotics, antibody-based
  drugs and proteins. The use and advantages of biotransformations and biocatalysis
  for the production of bio-organic products will be presented. Selectivity of such
  reactions and its importance is highlighted.
