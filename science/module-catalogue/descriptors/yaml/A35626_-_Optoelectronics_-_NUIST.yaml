indicative_content:
- Sources (mechanisms, various spectral sources and modes, conversion efficiency)
- 'Receivers (mechanisms, receiver architecture: point or array, optical and electronic
  signal conditioning)'
- 'Optics: Nature of light (Hygiene, Planick, Maxwell and Elnstein)'
- 'Optics: Components (Lens, Mirrors, Coatings, Polarisers, and Gratings)'
learning_outcomes:
- Analyse the various mechanisms used to describe light sources and evaluate the efficiency
  and the emission characteristics.
- Examine a receiver architecture and compare point and array detectors in terms of
  suitability or individual Applications.
- Evaluatethe theory of Maxwell and Einstein and derive the most pertinent expressions
  describing the nature of light.
- Use optical components to construct optical systems for medical diagnostics and
  communications.
- Calibrate optical receivers and sources and employ these devices in measurement
  application.
- Evaluate state of the art developments in plasmonics and photonic crystals and their
  applications.
