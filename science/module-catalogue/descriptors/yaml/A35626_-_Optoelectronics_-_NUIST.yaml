assessment_criteria:
- '70% In addition to the criteria set out below: The student will have shown exceptional
  ability in the interpretation and evaluation of optoelectronic devices and their
  applications. They will have demonstrated an ability to develop and understand other
  future developments within the field.'
- '>60% <70% In addition to the criteria set out below: The student will have shown
  a firm understanding of the theory and application of optoelectronic devices and
  systems. They will demonstrate the use of theory to evaluate current systems and
  design functional optoelectronic systems'
- '>40% <60% The student will have shown a basic understanding of the applications
  of optoelectronic devices and systems and an ability to construct functional optoelectronic
  systems for applications in diagnostics and communications.'
- <40% The student has failed to demonstrate a basic understanding of the applications
  of optoelectronic devices and systems and their ability to construct functional
  optoelectronic systems for applications in diagnostics and communications.
