aim: This module provides the student with an overview of the current state of the
  field in optoelectronics. The module places a special emphasis on the fundamental
  principles which underlie the operation of optoelectronic devices and systems. The
  module associates this theory with commonly used photonic devices and their application
  in the areas of communications, sensing and medical diagnostics. The module aims
  to provide the student with sufficient knowledge of optics and solid state physics
  to evaluate optoelectronic devices and systems and to understand future developments
  in the field.
