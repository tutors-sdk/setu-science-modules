cluster: Professional Skills
aim: The aim of this module is for students to synthesise, deepen and develop their
  knowledge of their specialist area by developing, implement, testing and reflecting
  upon a development project based on a current industry issues, trends and developments
  related to the programme specialisation.
programmes:
- timetable: PROJ-0149
  code: WD_BCSEC_SP
  name: Diploma in Computing with Security and Forensics
  stage: 3
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Design, implement, and test a solution to a development proposal in Security and
  Forensics
- Create appropriate technical documentation of work carried out including a critical
  reflection on choices made and results achieved
- A typical project would require the student to, for example, carry out an in-depth
  comparison of the application of two or more tool suites to a particular situation.
  This would include configuration and customisation of the tool. Depending on the
  particular project and application, there could be scope to deploy security/forensics
  logic by developing custom rules or using an API
learning_outcomes:
- Research and analyse current industry issues, trends and developments related to
  security and forensics.
- Develop, negotiate, communicate and agree an appropriate project proposal.
- Design, implement a project plan to develop a solution.
- Test the solution developed and critically reflect on the implementation undertaken
  and its outcomes.
- Appraise the conduct of the project and its outcomes.
learning_and_teaching_methods:
- Students will be assigned an academic supervisor for their project with whom they
  will have regular project meetings, typically for 30 minutes per week.
- The project will be largely self-directed; the student will be encouraged to research
  the topic to develop solutions for problems they encounter.
