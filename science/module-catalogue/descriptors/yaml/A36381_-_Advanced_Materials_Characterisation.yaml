aim: This module provides an overview of the current technologies used for the characterisation
  of materials. The principles and instrumentation used in surface analysis, polymorphism,
  trace analysis and polymer characterisations will be studied. A wide range of surface
  analysis techniques such as microscopy and micrometric techniques will be covered,
  specifically their use, sample requirements, principals and limitations. Examples
  of industrial applications of these techniques will be given, from raw materials
  and product characterisation to trace analysis and impurity determinations.
