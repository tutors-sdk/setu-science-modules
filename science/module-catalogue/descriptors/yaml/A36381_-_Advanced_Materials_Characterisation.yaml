indicative_content:
- The properties of surfaces - solids & liquids. Micromeritics to include particle
  size, specific surface area, porosity, density, surface tension and contact angle
  measurements.
- Microscopy and imaging in pharmaceutical analysis for determination of morphology
  and particle size; Optical Microscopy (OM), Scanning Tunnelling Microscopy (STM),
  Scanning Electron Microscopy (SEM) and Atomic Force Microscopy (AFM)
- Microscopic techniques for contaminant identification, including SEM combined with
  Energy Dispersive X-ray (EDX) detection
- Particle size analysis techniques based on light scattering
- Thermal analysis and calorimetric techniques, e.g. Differential Scanning Calorimetry
  (DSC), Thermogravimetric Analysis (TGA) & Dynamic Mechanical Thermal Analysis (DMTA)
- Dynamic Vapour Sorption (DVS) characterisation of pharmaceuticals and moisture determination
  techniques
- Crystal structure & polymorphism determination techniques, e.g. X-Ray Diffraction
  (XRD) & thermal microscopy
- Rheology determination techniques
learning_outcomes:
- Establish the principles of operation behind a range of optical, scanning probe
  and scanning electron microscopic techniques.
- Establish the principles of operation and applications of a variety of micrometric
  and thermal analytical techniques for materials characterisation.
- Establish the principles of a variety of moisture, polymorphism, and particle size
  and rheology determinations in materials.
- Evaluate the potential of all the above in the characterisation of materials in
  the pharmaceutical industrial environment.
- Plan experiments and calibrate associated laboratory instrumentation for pharmaceutical
  and biopharmaceutical sample analyses.
