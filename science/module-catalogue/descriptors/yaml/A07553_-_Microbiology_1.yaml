indicative_content:
- 'Structure and reproduction of major groups of microbes: bacteria, fungi, viruses,
  algae and protozoa'
- Identification of common bacteria
- Identification of common fungi
- Cultivation of microbes
- Microbial growth and its measurement
- 'Control of growth: disinfection, sterilisation'
- Micro-organisms and diseases of plants and animals
- 'Control of disease: prevent transmission, vaccination, use of anti-microbial drugs'
learning_outcomes:
- Use standard laboratory techniques to isolate, purify, culture and identify bacteria
  as well as to quantify microbial numbers in cultures.
- Describe the structure of major micro-organisms.
- Recognise common bacteria and fungi as well as the microbiological media which can
  be used in their identification.
- Identify appropriate sterilisation methods for media and materials.
- Describe how the environment affects the growth of micro-organisms.
- Estimate microbial numbers in cultures.
- Outline the mechanisms by which disease is caused.
- Record the results of laboratory work using worksheets.
