reference: A13387
full_title: IT Architecture
short_title: IT Architecture
credits: 10
level: Postgraduate
author: SDROHAN
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Software and Web Development
aim: This module will provide a well-balanced understanding of how the different IT
  Architecture Types, Frameworks and viewpoints are essential in the successful design,
  deployment and management of modern Enterprise Software Systems.
programmes: []
prerequisites: []
corequisites: []
indicative_content:
- Introduction to IT Architecture
- 'The varying roles of the Architect: Business Perspective, IT Perspective, Leadership,
  Project Sponsor - Control Scope'
- 'Types of IT Architecture: Enterprise Architecture, Business Architecture, Application
  Architecture, Information/Data Architecture, Security Architecture'
- 'Architecture Frameworks: RUP (Rational Unified Process), TOGAF (The Open Group
  Architecture Framework)'
- Zachman, IEEE 1471 (ANSI/IEEE 1471-2000, Recommended Practice for Architecture Description
  of Software-Intensive Systems), RM-ODP (Reference Model of Open Distributed Processing)
- 'Architecture Viewpoints: The need for many different system viewpoints: Functional,
  Information, Concurrency, Development, Deployment, Operational, Security'
- 'Architecture Perspectives: Security, Performance and Scalability, Availability/Disaster
  Recovery, Hosting/Infrastructure (Clustering/Replication)'
- 'Defining the Architecture: Modelling Languages (ADL/UML etc), Architecture Definition
  Documentation, Architecture Validation (scenarios, presentations, prototypes, etc)'
- 'Architecture Controls: IT Governance, Architecture Libraries (Inventory/Lifecycles),
  Technology Selection, Systems/Application Roadmaps, Data Protection and Privacy
  Legislation'
- 'Cloud Computing: Data Center Architectures, SOA and Cloud Computing'
- 'Security: Security Foundations, Security Services & Patterns, Infrastructure Security,
  Application Security'
learning_outcomes:
- Evaluate the role IT Architecture has in Enterprise Software Systems.
- Assemble an IT architecture using various documentation approaches and architectural
  description languages.
- Compare and contrast different Architecture Frameworks.
- Critique the importance of IT Architecture in an Enterprise Software System.
- Determine and assess future trends in IT Architecture research and practice.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and computer-based practicals
  whilst capitalising on a web-enhanced learning environment.
- The lectures will be used to introduce new topics and their related concepts.
- A cooperative learning/peer tutoring (i.e. problem solving / class discussion) approach
  will be adopted during the sessions.
- Self-directed learning will be encouraged throughout the duration of the module.
