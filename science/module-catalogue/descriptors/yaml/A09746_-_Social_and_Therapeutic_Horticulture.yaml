reference: A09746
full_title: Social and Therapeutic Horticulture
short_title: Social and Therapeutic Hort
credits: 5
level: Intermediate
author: LCASSIN
history_comment: ''
school: Science and Computing
department: Science
cluster: Horticulture
aim: This module will provide students with an opportunity to review current practices
  in horticultural therapy and to gain an understanding of the benefits and uses of
  horticulture for the needs of different groups.
