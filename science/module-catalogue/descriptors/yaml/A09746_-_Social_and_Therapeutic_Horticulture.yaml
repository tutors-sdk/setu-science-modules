indicative_content:
- Origins of horticultural therapy, history of use
- Examine range of applications, needs of different groups, prison gardens, care farms,
  visually impaired, learning difficulties, physical disabilities, and school gardens
- Examine the range of adaptive equipment available for different needs, therapeutic
  qualities of plants, plant selection for different needs, and design considerations
- Methods used in assessment to modify horticultural activities and assess abilities
  at horticultural tasks, resources available, and case studies
learning_outcomes:
- Explore the origins of horticulture therapy.
- Analyse the impact of horticultural therapy on a range of different user groups.
- Recommend a range of tools and suitable plants for a variety of therapeutic situations.
- Develop appropriate session plans for a group in a horticulture setting.
learning_and_teaching_methods:
- Using live plant materials for specialist purposes.
- Lectures
- Practical demonstrations
- Guest speaker/Site visit
