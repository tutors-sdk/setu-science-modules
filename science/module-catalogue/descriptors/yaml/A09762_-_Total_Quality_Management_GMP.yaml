indicative_content:
- The principles of Total Quality Management; the role of the customer, both internal
  and external; changing customer needs
- Definition of quality in TQM terms; the philosophies of Deming, Crosby and Juran
- Reduction in rework and scrap levels, elimination of defects in materials and products;
  development of suggestions for improvement
- Concepts of Lean Manufacturing; reduction in manufacturing and distribution lead
  times; preventative maintenance
- Reviewing the fundamental stages of the manufacturing processes via flow diagrams,
  identification of potential causes of product defects
- Systematic approach to problem solving and failure analysis; documenting corrective
  action, proposing improvements and monitoring effectiveness
- Teamwork, types of teams; cross-functional, project, self-managing; managing the
  change from traditional to TQM cultures
- 'The Seven Quality tools: Pareto, ishikawa, histograms, statistical process control,
  process capability, checksheets, trending of data; problem-solving techniques'
learning_outcomes:
- Explain the concepts of Total Quality Management and Continuous Improvement.
- Discuss the principles of variation in streamlining manufacturing process.
- Review a production process and identify critical production bottlenecks.
- Apply the appropriate techniques to problem solving in the manufacturing environment.
