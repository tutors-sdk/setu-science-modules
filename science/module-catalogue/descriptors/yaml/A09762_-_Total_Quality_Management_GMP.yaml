reference: A09762
full_title: Total Quality Management (GMP)
short_title: Total Quality Management (GMP)
credits: 5
level: Introductory
author: BWHELAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Quality, Regulatory and Compliance
aim: 'This module covers aspects of quality management including teamwork, continuous
  improvement, the philosophy of total quality management (TQM), the quality gurus:
  Deming, Crosby, Juran, training and problem-solving. The student will be able to
  identify a production-related technical problem, assist in its investigation and
  analysis, propose solutions to the problem, and monitor its effectiveness.'
