reference: A34041
full_title: Business Systems and Software Engineering
short_title: Bus Sys and S/W Eng
credits: 5
level: Advanced
author: RSHANAHAN
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Information Systems and Modelling
aim: The objective of this module is to provide students with the understanding of
  techniques and methods used to model business systems to enable the development
  of reliable quality software. Students will analyse and design a system using various
  business and software analysis tools in order to gain an insight into how they can
  be utilised in the business modelling and software engineering process.
programmes:
- timetable: COMP-0983
  code: WD_KBUSY_G
  name: Higher Diploma in Science in Business Systems Analysis
  stage: 2
  semester: 3
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Evolution of the Business to Software Analysis Process
- Software Processes and Methodologies
- Requirements Engineering
- Business Process Modelling
- Object Oriented Modelling
learning_outcomes:
- Analyse the function of the BSA in software engineering.
- Identify the business and software requirements.
- Model business systems using BMP tools.
- Evolve the business models into software models using UML.
- Consider the importance of software testing and software quality in the development
  of software systems.
learning_and_teaching_methods:
- This module will be presented using a combination of lectures and practical classes
- The lectures will be used to introduce new topics and their related concepts.
- In practical classes, students will apply these concepts and engage with DevOps
  tools in order to gain experience in the software engineering process.
- For online delivery, the lectures and practical's will be a combination of comprehensive
  rich media instructional content (notes), interactive synchronous video (live webinars/classes)
  and asynchronous interactive video playback (on-demand).
