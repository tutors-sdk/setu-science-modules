assessment_criteria:
- '<40%: The learner will demonstrate little or no understanding of the fundamentals
  of the learning outcomes. Will display a lack of competence with regards to associated
  laboratory skills, use of instrumentation and data analysis.'
- '40%-49%: The learner will demonstrate limited understanding of the fundamentals
  of the learning outcomes. Will display some ability with regards to associated laboratory
  skills, use of instrumentation and data analysis.'
- '50%-59%: As well as the above, the learner will demonstrate reasonable understanding
  of the fundamentals of the learning outcomes. Will display reasonable competence
  with regards to associated laboratory skills, use of instrumentation and data analysis,
  combined with good laboratory practice.'
- '60%-69%: In addition, the learner will demonstrate more detailed knowledge of the
  learning outcomes. Will display good competence with regards to associated laboratory
  skills, use of instrumentation and data analysis, combined with a very good level
  of good laboratory practice.'
- '70%-100%: All of the above to excellent levels. In addition, the learner will demonstrate
  comprehensive knowledge and understanding of all learning outcomes. Will display
  advanced competence and independence with regards to associated laboratory skills,
  use of instrumentation and data analysis, combined with an excellent level of good
  laboratory practice.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
