aim: This module introduces the learner to a variety of spectroscopic techniques encountered
  routinely in the analytical laboratory. The principles of operation of Ultraviolet-Visible
  (UV-Vis), Infra-red (IR) and Atomic Absorption Spectroscopy (AAS) will be described,
  along with their associated optical components and instrumentation. This module
  will also cover physical optics associated with spectroscopy, including the origin
  of spectra. Laboratory practicals will enable the student to gain hands-on experience
  of using these techniques to perform qualitative and quantitative analyses on a
  range of samples.
