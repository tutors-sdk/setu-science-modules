indicative_content:
- Review of nature of electromagnetic waves and properties of the electromagnetic
  spectrum
- Principles of diffraction, superposition, interference and coherence of electromagnetic
  waves, overview of Michelson interferometer
- Atomic spectra, energy levels, electron orbits, wave-particle duality, matter waves,
  energy quantisation
- 'Principle of operation of a number of photodetectors: photodiode, photomultiplier
  tube'
- Introduction to the principles, instrumentation and experimental practices of UV-Vis
  spectroscopy, including quantitative analysis using the Beer-Lambert Law
- Introduction to the principles, instrumentation and experimental practices of Infrared
  (IR) spectroscopy, including qualitative analysis in organic molecules
- Introduction to the principles, instrumentation and experimental practices of Atomic
  Absorption Spectroscopy (AAS), including quantitative analysis of metals
- Associated laboratory-based experiments to supplement and augment the above content,
  reinforcing good laboratory practices
learning_outcomes:
- Discuss the nature of the interaction between electromagnetic radiation and matter.
- Describe the phenomena associated with physical optics and the principle of operation
  of photodetectors.
- Explain the origin of energy quantisation in atomic systems.
- 'Describe the principles of operation and associated instrumentation of the following
  spectroscopic techniques: UV-Vis, IR and AAS.'
- Apply the laws of spectroscopy to perform a quantitative analysis on a range of
  samples using UV-Vis and AAS.
- Apply IR spectroscopy for the qualitative analysis of a range of samples, including
  interpreting spectra.
- Demonstrate good laboratory practices with spectroscopic instrumentation and data
  analysis.
