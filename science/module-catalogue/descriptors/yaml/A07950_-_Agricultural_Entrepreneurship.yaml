reference: A07950
full_title: Agricultural Entrepreneurship
short_title: Agricultural Entrepreneurship
credits: 5
level: Intermediate
author: RODOWD
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: The aim of this module is to introduce the student to the principles and techniques
  of developing off-farm enterprises, from concept stage to small business creation.
programmes:
- timetable: AGRI-0014
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 3
  semester: 5
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'The entrepreneurial process: profile of an entrepreneur; intrapreneurship; small
  business ownership'
- Idea generation; creativity and innovation strategies
- 'Establishing the enterprise: legal structures & start-up procedures; gaining a
  competitive advantage; mission statement & SWOT analysis'
- 'Management issues: choosing a location and premises; sources of finance; staffing
  issues'
- 'Managing an enterprise: effective leadership; managerial decision making'
- 'The business plan: writing the plan; funding proposal; detailed projections'
- 'Pitching the business idea: presenting the business idea for funding purposes'
learning_outcomes:
- Analyse the entrepreneurial process and apply creative and innovation strategies
  to explore entrepreneurial opportunities.
- Analyse and discuss the necessary skills to develop and manage a successful small
  business.
- Analyse and discuss the problems faced by small enterprises from sourcing finance
  to choosing a location for their business.
- Design and write a successful business plan.
- Communicate the business idea effectively and pitch the idea for funding purposes.
- Differentiate and apply theories of leadership and decision making in a small business
  context.
- Illustrate comprehensively how to establish an enterprise including legal structures,
  start-up procedures and regulatory issues.
