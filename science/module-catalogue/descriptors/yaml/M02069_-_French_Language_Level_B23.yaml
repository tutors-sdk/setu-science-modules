learning_outcomes:
- Oral Production
- With attention to pronunciation and intonation, the learner is expected to be able
  to:.
- engage in spontaneous discussion on a wide range of topics;.
- account for and sustain views clearly by providing relevant explanations and arguments
  and answer questions with a degree of fluency and spontaneity.
- use the language accurately and effectively on a wide range of general, academic,
  vocational or leisure topics, marking clearly the relationship between ideas;.
- give a clear systematically developed presentation and be prepared to depart spontaneously
  from a prepared text to follow up interesting points raised by members of the audience,
  often showing remarkable fluency and ease of expression;.
- recognise and use non-verbal conventions appropriate to a wide range of situations.
- Written Production
- The learner is expected to be able to:.
- write clear detailed texts on a variety of subjects synthesising and evaluating
  information and arguments from a number of sources;.
- write clear detailed descriptions on a variety of subjects related to his / her
  field of interest; write a review of a book, film or play.
- write clear detailed texts on a variety of subjects related to his / her field of
  interest, synthesising and evaluating information and arguments from a number of
  sources;.
- write an essay or report which develops an argument systematically with appropriate
  highlighting of significant points and relevant supporting detail and evaluate different
  ideas or solutions to a problem;.
- write clear detailed descriptions of real or imaginary events and experiences.
- Aural Reception (Listening)
- The learner is expected to be able to:.
- understand standard spoken language, live or broadcast, on both familiar and unfamiliar
  topics normally encountered in personal or social life. Only extreme background
  noise, inadequate discourse structure and / or idiomatic usage influences the ability
  to understand;.
- with some effort catch much of what is said around him / her, but may find it difficult
  to participate in discussion with several native speakers who do not modify their
  language in any way;.
- understand most radio documentaries and most other recorded or broadcast audio material
  delivered in standard dialect and can identify the speakers mood, tone etc.
- comprehend an animated conversation between native speakers;.
- understand recordings in standard dialect likely to be encountered in social professional
  or academic life and identify speaker viewpoints and attitudes as well as information
  content.
- Visual Reception (Reading)
- The learner is expected to be able to:.
- read with a degree of independence, adapting the style and speed of reading to different
  texts and purposes; have a broad active reading vocabulary but may experience difficulty
  with low frequency idioms;.
- understand articles and reports concerned with contemporary problems in which the
  writers adopt particular stances or viewpoints.
- obtain information, ideas and opinions from highly specialised sources.
- Audio- visual Reception
- The learner is expected to be able to:.
- understand some TV news programmes, documentaries, live interviews, talk shows and
  selected films in standard dialect.
learning_and_teaching_methods:
- Interactive seminars will be the main teaching approach. A variety of media will
  be used in the teaching process (traditional print materials, audio and video material,
  CALL programmes and online language learning resources). The course will be characterised
  by a high level of student participation in both classroom activities and self-directed
  learning activities outside the classroom.
