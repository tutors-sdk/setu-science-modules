aim: 'Aim: The module aims to: give the student an understanding of the main ideas
  of complex text on both concrete and abstract topics, including technical discussions
  in his / her field of specialisation; allow the student to interact with a degree
  of fluency and spontaneity that makes regular interaction with native speakers quite
  possible without strain for either party; enable the student to produce clear detailed
  text on a wide range of subjects and explain a viewpoint on a topical issue giving
  the advantages and disadvantages of various options; facilitate the student in displaying
  a good range of vocabulary for matters connected to his/her field of specialisation
  and most general topics, the skills to vary formulation to avoid repetition, and
  the compensation strategies necessary to avoid lexical gaps; facilitate the student
  in seeing how his/her judgments are influenced by his/her own culture; enable the
  student to display confidence in forming and testing hypotheses about language and
  be able to monitor individual level of progress and language acquisition.'
