assessment_criteria:
- '<40%: No understanding of applied immunology. Unable to carry out critical thinking
  or practical skills.'
- '40%-49%: Demonstrate a limited knowledge of applied immunology. May have some difficulty
  with critical thinking and problem solving. Adequate practical skills.'
- '50%-59%: A good understanding of applied immunology with demonstration of some
  critical thinking and problem solving skills. Good practical skills.'
- '60%-69%: In addition to the above, good critical thinking skills and showing a
  high level of competence and efficiency in theoretical and practical components.'
- '70%-100%: A highly developed and extensive understanding of applied immunology.
  Excellent technical and data analysis ability in carrying out and reporting on practical
  tasks.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
