aim: The aims of this module are to provide students with detailed information on
  the biology of the immune system in health and disease, and to provide insight into
  the applications of immunoanalytical techniques in industrial, clinical and research
  environments. The module aims to equip students with the skills necessary to understand
  the importance of immunology, underpinning disease prevention, diagnostics and therapeutics.
  From a practical perspective, this module will familiarise students with several
  different immunoanalytical techniques used routinely to measure and characterise
  immune responses.
