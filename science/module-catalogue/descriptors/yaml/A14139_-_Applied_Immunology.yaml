indicative_content:
- Overview of the immune system; cells and organs of the immune system; innate and
  adaptive immunity
- 'Innate immunity: receptors and activation; complement; inflammation'
- 'Adaptive immunity: T cells; B cells; MHC and antigen presentation; immunological
  memory; tolerance; interactions between innate and adaptive immunity'
- 'Antibodies: structure; subclasses; specificity and diversity; effector functions'
- 'Antigens: hapten; immunogenicity and epitopes'
- 'Therapeutic antibody engineering and manufacture: polyclonal; monoclonal; antibody
  fragments; chimeric; humanised and fully human antibodies'
- 'Immunoanalysis: agglutination; precipitation; enzyme immunoassays; flow cytometry;
  new developments; research and clinical applications'
- 'Tumour immunology: tumours and metastasis; tumour antigens; immune responses and
  immune evasion; immunotherapies'
- 'Vaccine technology: traditional and new vaccine technologies'
learning_outcomes:
- Communicate the fundamental mechanisms underlying infection, immunity and inflammation.
- Compare and contrast the cells and protective mechanisms of the innate and adaptive
  immune systems.
- Illustrate the general structural features of antibodies and relate these to their
  functions in adaptive immunity and in immunotherapies.
- Explore a range of immunological techniques and interpret the data obtained.
- Explore a range of traditional and newer generation immunoassays for detection of
  cellular and humoral immune responses.
- Appraise new and emerging cancer immunotherapies in relation to their enhancing
  effects on the immune system and their interactions with the tumour microenvironment.
learning_and_teaching_methods:
- Lectures.
- Laboratory-based practicals.
- Self-directed study.
- This module will use a blended teaching approach combining face-to-face lectures
  with in-class discussions and e-activities and videos delivered through the Moodle
  virtual learning environment.
- Formative feedback will be provided throughout to develop critical, independent
  learning.
