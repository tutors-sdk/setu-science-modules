reference: A35613
full_title: Advanced DSP - NUIST
short_title: Advanced DSP (NUIST)
credits: 5
level: Postgraduate
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Science and Mathematics
aim: The aim of this course is to build a deep understanding of DSP through the medium
  of MATLAB, no prior experience of DSP is assumed. The course addresses advanced
  topics relating to the modelling of digital systems, filter design, adaptive filter
  design and Wavelet Transforms. The course is focused on providing the student with
  necessary programming skills required to model different systems and observe their
  frequency response. The student is encouraged to use other DSP friendly programming
  languages such as Python to further develop their skills and understanding of this
  subject.
