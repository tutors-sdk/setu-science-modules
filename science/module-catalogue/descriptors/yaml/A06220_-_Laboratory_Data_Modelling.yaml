indicative_content:
- Use of MS Excel's Data Analysis ToolPak to perform linear regression analysis on
  laboratory data
- Use of MS Excel's Solver program to perform non-linear regression analysis on laboratory
  data
- Techniques to evaluate the quality of fit of linear & non-linear trendlines to data
- Analysis of the Normal, Binomial and Poisson distributions with respect to analysing
  laboratory data
- Inferential statistical testing, including F-tests and t-tests for the validation
  of laboratory results
- Design of experiments and ANOVA models including one-way ANOVA and two-way ANOVA
learning_outcomes:
- Apply linear & non-linear regression analysis to experimental data sets.
- Examine the fit of linear & non-linear regression models to experimental data.
- Develop a critical attitude to experimental data analysis and modelling laboratory
  data.
- Apply and interpret a range of statistical tests to laboratory data.
- Apply and interpret appropriate ANOVA models to laboratory data.
- Employ a variety of techniques on statistical software packages to analyse laboratory
  data.
