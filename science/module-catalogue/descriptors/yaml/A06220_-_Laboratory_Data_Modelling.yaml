school: Science and Computing
department: Science
cluster: IT
aim: In this module the student will develop skills to fit linear and non-linear theoretical
  models to experimental data. This will enable the student to quantitatively analyse
  a spreadsheet containing a set of data, fit appropriate models to these and evaluate
  the fit of such models. This module will also build on the fundamentals of descriptive
  and inferential statistics to analyse laboratory data. These techniques will be
  used to analyse laboratory data using relevant statistical software.
