assessment_criteria:
- '<40%: No demonstration of an understanding of the fundamentals of the learning
  outcomes, selection of the correct mathematical models to fit to laboratory data
  and understanding of statistical techniques.'
- '40%-49%: Will be able to show a basic knowledge of the key learning outcomes including
  demonstration of rudimentary modelling skills with respect to fitting appropriate
  mathematical models and applying statistical tests to data.'
- '50%-59%: As well as achieving the pass standard, the student will be able to demonstrate
  an understanding of some of the complexities of the topics and demonstrate fundamental
  modelling skills with respect to fitting mathematical models and applying statistical
  tests to laboratory data.'
- '60%-69%: In addition, the student will demonstrate more detailed knowledge of the
  all topics and demonstrate advanced modelling skills with respect to fitting appropriate
  mathematical models and applying statistical tests to laboratory data.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of all learning outcomes, demonstrate superior modelling skills with respect to
  fitting mathematical models and applying statistical tests to laboratory data.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
