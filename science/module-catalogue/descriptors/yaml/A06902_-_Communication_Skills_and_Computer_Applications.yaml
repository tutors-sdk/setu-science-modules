reference: A06902
full_title: Communication Skills and Computer Applications
short_title: Comm Skills & Comp Application
credits: 5
level: Introductory
author: MCAHILL
history_comment: ''
school: Science and Computing
department: Science
cluster: IT
aim: This module will teach the student how to communicate effectively using written
  and oral media. Students will be shown how to find and reference reliable information
  from a variety of sources. The student will gain a competency in the Microsoft Windows
  operating environment, as well as a proficiency in file and data management. An
  introduction to the basic principles of word processing, spreadsheets and presentations
  will be given. Report writing and presentation skills will be acquired, such that
  the student can competently present material in a format acceptable for reports
  and presentations.
