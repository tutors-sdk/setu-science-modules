indicative_content:
- 'Research and referencing: introduction to the sourcing of information, plagiarism
  and correct referencing'
- 'Writing skills: planning, structuring and executing a piece of written communication,
  proof-reading skills, editing skills'
- 'Communication in teams: stages in team-building, composition of successful teams'
- 'Structure of formal meetings: role of secretary, role of chairperson, function
  of agenda, minutes, standing orders, motions'
- 'Oral presentations: identifying the audience, defining objectives, structuring
  a presentation'
- 'MS Windows environment: effective and efficient file management, privacy and security'
- 'Word processing: creating, editing, formatting, saving and printing documents;
  creating and editing tables, table of contents and manipulation of images in documents'
- 'Spreadsheets: creating, editing, formatting, saving and printing workbooks and
  worksheets; sorting data, using formulas, charts, filters and links'
- 'Presentations: creating, editing, formatting, saving and printing presentations;
  use of images, animations and transitions in presentations'
learning_outcomes:
- Identify information from reliable sources and use an appropriate referencing system
  to generate a bibliography.
- Reproduce letters, reports, minutes and memoranda using word processing software.
- Report information orally using presentation software.
- Explain data using spreadsheet software.
