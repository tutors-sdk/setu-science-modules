indicative_content:
- 'Fundamentals: Architecture patterns; HTTP (Hypertext Transfer Protocol) protocol;
  advanced Javascript'
- 'API Design patterns and principles: REST; CQRS (Command Query Responsibility Separation);
  versioning; vecurity; hypermedia; realtime'
- 'SPA design patterns and principles: MV* (Model View *); Flux; caching; data synchronisation'
- 'Application Frameworks: Web API; Single Page App; Isomorphic app'
- 'Developer tool suite: API modelling; DSL(Domain Specific Language); scaffolding;
  workflow automation'
- 'Deployment environments: API gatways; containers'
learning_outcomes:
- Apply best practice principles and patterns to the design and documentation of a
  web API.
- Apply best practice principles and patterns to the design of a medium-sized Single
  Page Web App.
- Design an end-to-end web app that supports session management and persistence for
  a constrained functional requirement set.
- Utilise and configure related workflow automation tools.
- Manage a cloud deployed web API using a Gateway intermediary service.
learning_and_teaching_methods:
- Combination of lectures and computer-based practicals.
- The lectures will cover the theory and supporting technologies behind web app development.
- The lab-based practicals, building on the theoretical knowledge from lectures, provide
  exposure to the frameworks, tools and practical skills required to develop and build
  web apps.
- The practical content will use industry standard technologies, tools and techniques.
- Student will be encouraged to enhance their lab work and assessment submissions
  using self-directed research and learning into the state-of-the-art for web app
  development.
