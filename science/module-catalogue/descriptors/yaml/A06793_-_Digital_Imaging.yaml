prerequisites: []
corequisites: []
indicative_content:
- 'Image Capture: the digital camera, image capture techniques, basics of lighting,
  photography workflow'
- 'Graphics: graphic types, file types, file size, resolution, storage & compression
  techniques'
- 'Colour: the human eye, biology of seeing, colour models'
- Edit and manipulation of digital images using digital imaging software
- Creation and composition of digital images for multimedia and web solutions
learning_outcomes:
- Describe the theoretical assumptions surrounding digital imaging.
- Describe and document the skills applied in designing an image rich project.
- Demonstrate and illustrate the photography process from compositing to capturing
  digital images.
- Demonstrate a comprehensive and practical skill set using industry standard image
  editing software.
learning_and_teaching_methods:
- This is a lab based module.
- Class delivery must include one two-hour block.
- Lectures will be delivered in the lab room to introduce new topics and their related
  concepts where students apply these concepts in a practical manner and engage with
  the appropriate tools and software for this module.
