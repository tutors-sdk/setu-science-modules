indicative_content:
- 'Programming Environment Setup: to set up the environment in Linux, OS X and Windows
  Variables and Simple Data Types: variables, character strings, figures, annotations'
- 'Introduction to Lists: lists, modifications, additions, deletion of elements, organization
  of lists'
- 'Operating Lists: traversing lists, creating lists of figures, slicing lists and
  copying lists, tuples'
- 'IF Statements: conditional statements that uses IF statements to process lists'
- 'Dictionaries: creating dictionaries, as well as modifying, deleting, traversing
  and nesting dictionaries'
- 'Loops: while loops, and using loops to process lists and dictionaries Functions:
  definitions, parameters, returned values, modules'
- 'Classes: creating classes, inheriting classes, importing classes, Python Standard
  library Files and Exceptions: file reading and writing, exception handling, data
  storage'
- 'Test Functions: test functions, test classes'
- 'Project 1 Creating Games: project planning, package installation, creation of instances
  and methods'
- 'Project 2 Data Visualization: package installation, data download, drawing of various
  diagrams, etc.'
- 'Project 3 Small Web Applications: Web framework usage, functionality addition and
  project deployment.'
learning_outcomes:
- 1. Master the basic knowledge of script language programming, master the basic method
  of programming, master the basic theory, method and application of programming,
  master the relevant basic provisions of national standards for advanced programming.
- Be able to use Python to solve practical application problems. Cultivate students'
  computational thinking ability, innovation ability and ability to find, analyze
  and solve problems.
- Be able to use Python correctly and skillfully for program design; Be able to read
  and write programs with more complexity;.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and computer-based practicals
  whilst capitalising on a web-enhanced learning environment.
- The lectures will be used to introduce new topics and their related concepts.
- A cooperative learning/peer tutoring (i.e. pair-programming, problem-based learning
  for one assignment) approach will be adopted during the practical sessions.
- Self-directed learning will be encouraged throughout the duration of the module.
