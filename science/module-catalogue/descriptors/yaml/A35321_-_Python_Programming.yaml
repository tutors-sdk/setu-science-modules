school: Science and Computing
department: Computing and Mathematics
cluster: Software and Web Development
aim: This course focuses on the basic knowledge of Python and small project examples,
  which aims to help students who needs to learn data science and big data technology
  quickly master basic Python programming knowledge, be able to write properly running
  programs and develop projects of interest. After learning this course, students
  should be able to master basic Python programming concepts, develop good programming
  habits, and continue to learn advanced Python technologies.
