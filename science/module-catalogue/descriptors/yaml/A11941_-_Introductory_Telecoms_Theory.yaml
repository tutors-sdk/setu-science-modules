cluster: Data Communications
aim: This is the first telecommunications module presented in this course. Further
  telecommunications modules will be covered in years 3 and 4. In this module, the
  basic theory of analogue and digital telecommunications is introduced, from both
  a baseband and broadband perspective. Since it is the first of the telecommunications
  to be delivered, there is a greater emphasis on analogue telecommunications to establish
  fundamental principles and towards framing the discipline from the historical perspective.
  A description and analysis of different analogue and digital modulation methods
  are covered, modeled using both numerical techniques and software packages (e.g.
  Scilab) and circuit level simulators (e.g. LTSpice), and then applied to a number
  of historical and modern telecommunications systems. Modern transceiver architectures
  are explored. A practical program runs in parallel with lectures and tutorials to
  enhance and reinforce the student's understanding of the theory, using experience
  and technical information gleaned from the numerical modeling and circuit level
  simulations. The student is expected to have a robust grounding in mathematics,
  A.C & D.C. circuit theory, and analogue and digital electronics.
