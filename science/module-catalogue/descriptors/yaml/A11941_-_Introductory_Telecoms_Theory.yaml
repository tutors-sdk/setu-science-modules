indicative_content:
- 'Communication Systems Fundamentals: Modes (Simplex/Duplex) of Communication. Introduction/motivation
  to/for modulation. Communications channels. Signal analysis & spectral occupancy.
  SNR. dB vs dBm. Upconversion/downconversion.'
- 'Analogue Modulation: AM, FM, NBFM, PM, DSB-SC, SSB-SC (Filter, phase, Weaver).'
- 'Basic Digital Modulation: Noise immunity. Orthogonality. ASK, FSK, BPSK, DBPSK,
  QPSK, 8PSK, QAM. Spectral occupancy/efficiency. Constellation representation towards
  intuitive error performance towards scheme/architecture like-with-like comparison.'
- 'Communication Transceiver Architectures: Diode detector. Balanced Modulator. Varactor
  based oscillator. PLL recovery / demodulation. AGC. Selectivity & Sensitivity. Superhet
  principle / architecture. Non-coherent BPSK receiver. I&Q phase control architecture.'
- 'Digital Telephony: RS-232. Single-ended versus balanced / differential based signalling.
  Sampling Theorem. TDM. PCM, DPCM/Delta Modulation. Rudimentary PABX exchange architectures.
  E1/T1 Interfaces.'
learning_outcomes:
- Illustrate a good understanding of the basic theory of physical layer telecommunications.
- Express basic physical layer telecommunications signals/architectures/operations
  using basic numerical modelling techniques.
- Describe basic analogue mod/demod architectures using SPICE netlists, utilising
  commercial communications component nelist definitions from industry providers &
  use the results of the SPICE simulations to design a circuit hardware architectures.
- Demonstrate a robust background knowledge of different types of analogue and digital
  communications transceivers.
- Compare and contrast analogue and digital modulation schemes and identify a particular
  modulation scheme or approach with a desired deployment scenario.
- Construct numeric & circuit level simulations of telecommunications systems, such
  that a partnering physical layer apparatus can be constructed in a laboratory setting.
- Write meaningful practical reports, commensurate with a prescribed format, that
  includes adequate presentation of numerical / circuit simulation & experimental
  results, relevant calculations & meta information & draw relevant conclusions.
