indicative_content:
- Basic concepts of cloud computing
- Cloud technologies
- Cloud usage scenarios
- Using and integrating cloud services
- 'Other issues: privacy, security, economics and cost-benefit analysis'
learning_outcomes:
- Communicate the evolution of cloud computing.
- Appraise the main cloud computing service models and deployment models that are
  in widespread use.
- Illustrate the operation of a selection of leading cloud technologies.
- Deploy an application that integrates a selection of cloud services using a popular
  cloud platform (e.g. IBM Bluemix).
- Explore cloud computing services and technologies from the perspectives of security,
  privacy and cost.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element will involve laboratory exercises using a popular application
  deployment platform (e.g. IBM Bluemix).
