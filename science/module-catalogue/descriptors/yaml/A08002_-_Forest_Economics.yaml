indicative_content:
- Principles of economics, of forestry macroeconomics and its contribution to the
  national economy, and of budgeting
- Time scale, compounding and discounting, annuities; interest rate, discount rate
  and inflation rate
- 'Forest costs and revenues: timber sales, price-size relationships, grant aid, land
  rental and sales, hunting and sports activities, sites, masts, wind farms; scheduling
  costs and revenues on a spreadsheet; presenting values of costs and revenues; calculating
  present values in Excel'
- Net discounted revenue; net present value; calculating NPV & NDR in Excel; soil
  expectation values; internal rate of return; Calculating IRR in Excel; forestland
  purchase price and evaluation; open space value in forestry valuation; forest investment
  analysis project
- Operations costs and benefits, ground preparation; applying fertiliser & herbicide;
  pruning and thinning; sensitivity analysis
- Rotations, estimating financial rotation, effect of windthrow on financial rotation,
  estimating financial consequences of fire or forest reconstitution
learning_outcomes:
- Appraise forest economics and forestry's contribution to the national economy.
- Complete analysis of present value, net present revenue, internal rate of return
  and soil expectation value of a forest.
- Use financial appraisal techniques to aid forest management decision making.
- Analyse the likely risks, returns and taxation implications when investing in Irish
  forestry.
- Complete a forest valuation and a forest budget.
- Use computer software programme to calculate the financial implications of forest
  management decisions.
learning_and_teaching_methods:
- 'Lectures: will be used to teach the economic theory and forest sector conditions
  that underpin financial analysis of forestry as an investment.'
- 'Computer practicals: will allow students to develop financial appraisal tools using
  spreadsheets; spreadsheet based examples will facilitate demonstrating the effect
  of key parameters, such as discount rate, time, forest productivity etc. on the
  decision support tool.'
