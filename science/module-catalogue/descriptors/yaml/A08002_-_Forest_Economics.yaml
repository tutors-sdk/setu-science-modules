history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: This module will explore the role of economics in shaping forest management.
  The module will focus on developing financial appraisal techniques to aid sound
  management decision making. The student will gain the professional competence in
  analysing forestry as an investment, comparing rotations, species, treatments, and
  subjecting results to sensitivity analysis.
