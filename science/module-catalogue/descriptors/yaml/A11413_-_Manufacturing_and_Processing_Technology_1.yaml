reference: A11413
full_title: Manufacturing and Processing Technology 1
short_title: Manufac & Process Technology 1
credits: 10
level: Introductory
author: EOWENS
history_comment: ''
school: Science and Computing
department: Science
cluster: Pharmaceutical Science
aim: This module provides an introduction to the processes, equipment and unit operations
  within the pharmaceutical industry. It also discusses waste treatment (including
  water and solvent recovery), as well as the role of packaging within the pharmaceutical
  industry.
