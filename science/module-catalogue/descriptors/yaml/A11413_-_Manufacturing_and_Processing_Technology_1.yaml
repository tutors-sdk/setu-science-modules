  stage: 2
  semester: 3
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Pharmaceutical plants: dedicated vs MPP, batch vs continuous processing'
- Synthetic routes, individual chemical process operations, including scale up from
  laboratory to production
- Route from R&D to approval for new drugs
- 'Reactors: basic design, control and operation, material of construction, agitation,
  heating and cooling reactor units'
- 'Recovery and purification of bulk pharmaceutical products: distillation, crystallisation,
  filtration, centrifugation, drying'
- Types & uses of different water grades and purification processes
- Role of packaging in the pharmaceutical industry
learning_outcomes:
- Distinguish between batch and continuous processing, including advantages and disadvantages
  of each.
- Discuss the manufacturing trends occurring across the pharmaceutical industry, including
  MMP vs dedicated plants.
- Identify and describe the basic unit operations and equipment used in the synthesis
  and purification of bulk pharmaceuticals.
- Describe the route from R&D to approval for a new API.
- Describe basic issues associated with scale-up, process safety, environmental and
  cost considerations.
- List the grades of water used in a pharmaceutical plant, identify where each grade
  of water can be used, and describe purification processes for each grade.
- Describe chemical and physical treatment of waste and waste water.
- Discuss the role of packaging in the pharmaceutical industry. Identify the necessary
  criteria when designing packaging for pharmaceutical products and list the information
  required on packaging for OTC drugs.
