aim: 'This module is designed to take the student through the mathematical modelling
  process from specification to modelling and simulation. The focus is on stochastic
  modelling. Both discrete and continuous systems are treated including: queuing theory,
  additive white Gaussian noise (AWGN) in digital communications, discrete symbol
  alphabets. Analytic results for average behaviour are developed and these are investigated
  through numerical simulations in the mini-project. Associated mathematical ideas
  such as orthogonality are explored analytically through polynomials where recurrence
  relations, and weighting factors are involved.'
