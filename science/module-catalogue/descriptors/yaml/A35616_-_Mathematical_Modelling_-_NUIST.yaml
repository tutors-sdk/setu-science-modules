indicative_content:
- 'Introduction to the modelling process: formulation, implementation, simulation,
  interpretation and evaluation of results.'
- 'Stochastic processes and random variables: characterisation - probability density
  functions, autocorrelation, power spectral density and thermal noise: queuing theory'
- 'Queuing systems: birth - death processes, M/M/1 queue, differential difference
  equations, pure birth - Poisson distribution'
- 'Digital comms: DS-CDMA - effect of multiple users on BER performance, code length,
  COFDM: simulation in flat and fading channels'
learning_outcomes:
- Follow and reproduce simulations for selected problems in electronic engineering.
- Implement numerical techniques to standard problems and interpret the results.
- Apply theory to a problem, selecting and implementing an approach, interpreting
  and adapting to results.
- Demonstrate modelling & simulation for assignments & mini project.
learning_and_teaching_methods:
- Formal lectures will provide the theoretical base for the subject as well as providing
  and overview of issues that arise in application of theory. Case studies, with subsequent
  discussion and explanation, together with feedback from suggested reading will support
  and direct the students in their own personal study. Computer laboratory sessions
  will be used to demonstrate implementations of methods and provide framework for
  feedback and assistance on project work.
- The laboratory sessions consist of a number of computer based practicals to demonstrate
  the theory.
- The ability to apply the theory covered in this module to progress from a physical
  problem, to selecting and implementing an appropriate solution strategy, and ultimately
  interpreting the results is a fundamental learning objective of this module. The
  ability is assessed primarily through the practical work.
