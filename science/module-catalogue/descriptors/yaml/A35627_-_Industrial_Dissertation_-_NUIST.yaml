aim: The Industrial Project is a very significant component of the programme, providing
  students with the opportunity to apply engineering and related principles and theory
  in an innovative manner, or to develop innovative solutions to challenging engineering
  and scientific problems. Ultimately, the project component enables participants
  to `individualise' the award. Students are required to submit a written project
  proposal and to give an oral presentation of the proposal. The proposal is required
  to incorporate the context of the project in research and industrial arenas. A substantial
  research element is required, and the formulation of specific and measurable objectives
  are an inherent part of the process, together with an appropriate schedule of activities
  in order to ensure the achievement of deliverables. Students are required to develop
  a `solution' for their project, or substantially progress the innovative application
  of the relevant technology / technologies. A strong element of application, integration,
  implementation, and analyses of the relevant underlying engineering and scientific
  principles is an essential part of this module. Students are required to write a
  dissertation, and to make final oral and poster presentations of their work. Full
  details are provided in the document `Project and Dissertation Guidelines' which
  is reviewed and updated annually.
