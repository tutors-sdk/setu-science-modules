indicative_content:
- Formulation of project proposal, together with scheduling activities
- Review of literature, and 'state-of-the-art'
- Presentations, team-based discussions and other communications.
- Project management activities.
- Report writing.
- Evaluation, analyses and discussion of results.
- Ethical issues in projects.
learning_outcomes:
- Identify, formulate, analyse and solve engineering problems in the context of an
  industrially-relevant project.
- Formulate a coherent project proposal, including appropriately identified objectives,
  methodology, milestones and deliverables.
- Design a system, component, process or material(s) to fulfil specified industrial
  requirements.
- Derive and apply solutions from a knowledge of sciences, engineering sciences, technology
  and mathematics.
- Design and conduct experiments, and to analyse and interpret data in accordance
  with good scientific and engineering practice.
- Evaluate where the project work fits into ongoing related work by other academics
  and practitioners.
- Identify and evaluate the impact of ethical issues where appropriate, and to embrace
  the responsibilities of the engineering profession towards people and the environment.
- Work effectively as an individual, in teams and in multidisciplinary settings together
  with the capacity to continue to improve their own knowledge and expertise.
- Select and utilise appropriate tools to effectively communicate their work in an
  academic, industrial and commercial setting, and to society in general.
learning_and_teaching_methods:
- Presentations.
- Project-based activities, specific to the nature of the project.
- Student project log, with supervisor feedback.
- Project participation.
- Report writing.
- Presentation of findings.
- Final report of findings.
