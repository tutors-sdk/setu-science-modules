history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: The very nature of forestry dictates that forest information systems are mainly
  concerned with the storage, maintenance, analysis and presentation of area-related
  data. Geographic Information Systems (GIS) along with database software form the
  corner stones of a forest information system. In this module students will build
  on their skills in cartography developed in the 2nd year module Applied GIS. The
  module uses the commercial software package ArcGIS for Desktop. Students will plan
  their GIS projects, perform basic spatial analysis on vector/raster data sets, and
  work with spatial estimation and modelling. Additionally a 3D visualization will
  be carried out for a specific forestry topic.
