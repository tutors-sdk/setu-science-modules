indicative_content:
- Raster and vector data models
- Geodesy, datums, projected and geographic coordinate systems
- Attribute tables
- Geodatabase design
- Querying data
- Fundamental spatial analysis
- Basic raster analysis
- Terrain analysis
- 'Spatial estimation: Interpolation, prediction and core area delineation'
- Spatial models and modelling
- Data quality
learning_outcomes:
- Discriminate between the main characteristics and suitability of vector and raster
  data models.
- Solve map projection issues for vector and raster data in advance of starting a
  GIS project.
- Formulate the requirements to spatial data sets and design a geodatabase in order
  to solve specific GIS problems.
- Modify database content in ArcGIS attribute tables by building query expressions.
- Solve basic spatial problems using analysis such as selection, buffering, dissolve,
  overlay and classification on both vector and raster datasets.
- Develop spatial models in the ArcGIS Modelbuilder incorporating terrain analysis
  and spatial estimation.
learning_and_teaching_methods:
- Lectures will be used to present the concepts of spatial data and spatial analysis.
- In practicals students will solve realistic spatial problems using ArcGIS for Desktop,
  both guided and independently.
