assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or basic computation tasks.'
- '40%-49%: Demonstrate a limited knowledge of the subject matter. May have some problems
  with critical thinking and problem-solving. Adequate computation ability.'
- '50%-59%: Demonstrate satisfactory general knowledge of the main issues within the
  subject. Good problem-solving ability and computation skills.'
- '60%-69%: Demonstrate skilled and sound knowledge of the subject matter. Show ability
  to analyse and logically discuss financial topics effectively. Good critical thinking
  and a high level of competence in calculation tasks.'
- '70%-100%: Demonstrate comprehensive knowledge and understanding of all learning
  outcomes and ability to evaluate and relate topics that overlap in key subject matter
  areas. Adept at calculation tasks.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
