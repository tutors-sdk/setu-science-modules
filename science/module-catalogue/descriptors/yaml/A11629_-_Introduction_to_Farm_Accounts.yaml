reference: A11629
full_title: Introduction to Farm Accounts
short_title: Introduction to Farm Accounts
credits: 5
level: Introductory
author: JGERAGHTY
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: This module will enable the student to understand accounting terminology, use
  accounting methods and record financial and physical data for a farm business. The
  module will also explore sources of credit, and enable students to appraise investment
  decisions.
programmes:
- timetable: AGRI-0002
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 1
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Basics of farm accounting
- Collating information used for end of year farm accounts
- Recording farm receipts and farm payments
- Compiling end of year farm accounts
- Agricultural credit and farm investment
learning_outcomes:
- Record and maintain financial records for the farm business.
- Record farm assets and livestock details.
- Review the profit and loss account and the farm balance sheet.
- Outline sources and types of farm credit.
- Discuss factors involved in making farm investment decisions.
- Use financial software to manage records and cash flow for a sample farm.
- Use financial software to prepare a profit and loss account and balance sheet.
learning_and_teaching_methods:
- Lectures.
- Practical instruction.
- Use of accounting software.
