indicative_content:
- 'Machine shop equipment and practice: hand tools, power tools, wiring 3 pin and
  7 pin plugs, crimp connections, junction boxes, and fault finding, Requirements
  for farm workshop and layout'
- 'Tractor: tractor controls, hitching attachments to three point linkage'
- 'Turf care and grass cutting equipment: principal machines involved in turf care,
  types of mowers, maintenance and safe use of grass cutting equipment, Aeration equipment
  for turfgrass'
- 'Irrigation: sources of water, pumps and pipe work, indoor irrigation, outdoor irrigation,
  calculating irrigation application rates'
- 'Horticulture machinery: operation of horticulture machines, strimmers, hedge cutters,
  and pedestrian cultivators'
- Safe working methods and practices in accordance with associated legislation
- Basic first aid
- Risk assessment and Health and Safety statement for a workplace situation
learning_outcomes:
- Use measuring and workshop hand and power tools safely and effectively.
- Operate a range of horticultural equipment.
- Describe the machines involved in horticulture, e.g. grass cutting and turf care.
- Describe operation and maintenance of horticultural machines.
- Describe principles of irrigation.
- Describe safe working methods and practices in accordance with associated legislation.
- Complete a risk assessment and Health and Safety statement for a workplace situation.
learning_and_teaching_methods:
- 'Classroom instruction with supporting: videos, models, cutaways and samples.'
- Practical demonstrations with follow up practice.
