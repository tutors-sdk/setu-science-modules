indicative_content:
- 'Pharmaceutical operations: facility design, layout, process flow, process control,
  PAT, process safety; green chemistry'
- 'Pharmaceutical unit operations and equipment: reactors, reactor kinetics, crystallisation,
  filtration, drying, powder properties'
- 'Biopharmaceutical unit operations and equipment: fermentation, bioreactor design,
  scale-up, harvesting, filtration, purification'
- 'Biopharmaceutical unit operations and equipment: filling, lyophilisation, packaging'
- 'Pharmaceutical/biopharmaceutical facilities, documentation: BMRs, BPRs, Out of
  Specification results, labelling'
- Aspects in scale-up and pilot plant production
learning_outcomes:
- Demonstrate the importance of design, layout and process control to pharmaceutical
  operations.
- Illustrate and explain the operation and function of pharmaceutical and biopharmaceutical
  processing equipment.
- Compare individual processes and their underlying theory and describe associated
  documentation.
- Discuss the formulation and freeze-drying activities for a Biopharmaceutical process.
- Discuss and categorise milestones and hazards in pharmaceutical scale-up.
- Demonstrate knowledge of calculations involved in reactor kinetics.
