reference: A26741
full_title: Pharmaceutical and Biopharmaceutical Processing
short_title: Pharm & Biopharm Proc
credits: 5
level: Introductory
author: AHAYDEN
history_comment: ''
school: Science and Computing
department: Science
cluster: Pharmaceutical Science
aim: This module describes the overall operation, unit processes, and key parameters
  involved in the scale-up and production of pharmaceutical drug substances and biopharmaceutical
  products. The module includes an in-depth review of API reactors, drug crystallisation,
  filtration processes, drying issues and drug powder properties. The second half
  of the theory element of the module will focus on the production of biopharmaceutical
  products on an industrial scale. This will encompass the upstream and downstream
  activities involved in the processing of biopharmaceutical products and in particular
  lyophilisation and fill finish. One important aspect of the module is an examination
  of the importance of process control and the reduction of hazards and deviations
  in the industry. The course is designed to be suitable for both pharmaceutical and
  biopharmaceutical students.
