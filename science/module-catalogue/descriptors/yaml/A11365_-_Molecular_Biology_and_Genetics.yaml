indicative_content:
- DNA structure
- 'The molecular biology of transcription and its regulation: RNA polymerases, promoter
  sequences, regulatory elements, transcription factors'
- 'RNA processing and its control: capping, polyadenylation, intron splicing, sequence
  editing; miRNA'
- 'The molecular biology of translation and its regulation: protein synthesis by the
  ribosome'
- 'Gene and genome structure analysis: preparation of cloned DNA, restriction mapping,
  Southern blotting, location of transcriptional start point, chromosomal location
  and DNA sequencing'
- 'Gene cloning: PCR, vectors and their uses, enzymes used for manipulating DNA, construction
  and uses of recombinant DNA, transformation and screening'
- New developments in molecular biology will be introduced as appropriate
- Introduction to bioinformatics
learning_outcomes:
- 'Appraise the stages of gene expression: DNA transcription, RNA processing, mRNA
  translation and post-translational modifications of proteins.'
- Interpret the regulation of the processes of gene expression by a variety of mechanisms.
- Relate the overall structure and organisation of typical prokaryotic and eukaryotic
  genomes to gene expression and regulation.
- Analyse the practical approaches used in gene and genome analysis.
- Use laboratory techniques to design simple strategies for gene cloning, manipulation
  of DNA and characterisation of genes.
- Communicate results of laboratory work using a combination of formal written laboratory
  reports and worksheets.
