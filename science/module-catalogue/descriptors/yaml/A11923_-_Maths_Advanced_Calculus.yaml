indicative_content:
- 'Multivariable differential calculus; chain rules; directional derivatives; gradient
  function; differential operators: div, curl and their composition; Taylor expansion;
  critical points; classification using function value, first and second derivative
  tests; tangent plane; optimisation'
- Multivariable integral calculus; line Integrals; iterated integrals; surface integrals;
  Greens theorem; Stokes theorem, divergence theorem
- Fourier Series; comparison of Taylor and Fourier approximation of functions. Use
  of a table of Fourier series; derivation from first principles. properties of Fourier
  series approximation
- Laws of probability; conditional probability; discrete and continuous probability
  distributions
learning_outcomes:
- Analyse and manipulate expressions involving differential operators.
- Compute iterated integrals, line integrals and surface integrals.
- Use the integral theorems (Divergence, Stokes and Greens).
- Describe the criterion on which the approximation of real periodic functions using
  trigonometric series is based and to derive an approximation from first principles
  and to discuss its properties.
- Analyse change in a mathematical model when a deterministic variable is replaced
  by a random variable and to calculate moments for a simple distribution.
- Use standard mathematical software/algorithms to demonstrate the application of
  mathematical concepts to engineering problems.
learning_and_teaching_methods:
- Delivery of the subject will be through a mixture of lectures and directed problem-solving
  sessions.
- The lectures will develop theory, lead students through worked examples and introduce
  the context for the subject material.
- The tutorial classes will underpin and rehearse the skills demonstrated in the lectures.
  Students will be required to construct valid and precise mathematical arguments.
- The laboratory sessions consist of a number of computer based practicals to reinforce
  the concepts covered during the lectures using mathematical software such as OCTAVE/MATLAB/Python.
