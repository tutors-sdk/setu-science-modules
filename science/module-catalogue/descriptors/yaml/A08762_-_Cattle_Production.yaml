reference: A08762
full_title: Cattle Production
short_title: Cattle Production
credits: 5
level: Introductory
author: JDAY
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will enable the student to gain an in-depth knowledge and the skills
  required to manage cattle production systems. It will enable the student to appraise
  the physical and financial aspects of the cattle industry. It will also allow the
  student to produce cattle in line with animal welfare and environmental requirements.
