- timetable: AGRI-0010
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 2
  semester: 3
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Factors affecting efficiency
- Feeding and management
- Suckler calf production
- Systems of cattle production
- Diseases
- Cattle facilities
- Cattle production tasks
- Economics of cattle production
learning_outcomes:
- Examine the future profitability of cattle production systems.
- State factors affecting efficiency of cattle production.
- Compare systems of cattle production.
- Plan feeding and management programmes for a range of cattle systems.
- Examine cattle facilities.
- Complete safely tasks associated with cattle production with due regard to good
  environmental practice and the animal's health and welfare.
- Describe good environmental practices in cattle production.
- Describe appropriate actions to promote and maintain good animal health and welfare.
learning_and_teaching_methods:
- Lectures.
- Practical instruction.
- Field trips.
- DVDs and online resources such as Animal Health Ireland, ICBF.com and .Agfood.ie.
