school: Science and Computing
department: Science
cluster: Pharmaceutical Science
aim: This module describes the overall operation, unit processes, equipment and documentation
  utilised in the modern pharmaceutical and biopharmaceutical industries. The module
  will also focus on key elements in pharmaceutical scale-up as part of a drug development
  programme. The student will be provided with an understanding of Quality by Design
  principles, and the various tools used to identify and reduce product variability.
  The course is designed to be suitable for both pharmaceutical and biopharmaceutical
  students.
