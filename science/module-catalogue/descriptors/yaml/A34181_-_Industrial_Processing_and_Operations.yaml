indicative_content:
- 'Pharmaceutical operations: facility design, layout, process flow, process control,
  process safety; green chemistry'
- 'Pharmaceutical unit operations and equipment: reactors, reactor kinetics, calorimetry,
  crystallisation, filtration, drying, powder properties'
- 'Pharmaceutical unit operations and equipment: separation equipment, distillation,
  solvent recovery'
- 'Biopharmaceutical unit operations and equipment: fermentation, bioreactor design,
  scale-up, harvesting, filtration, purification'
- 'Biopharmaceutical unit operations and equipment: filling, lyophilisation, packaging'
- 'Pharmaceutical/biopharmaceutical processing documentation: BMRs, BPRs, Out of Specification
  results, labelling'
- Aspects in scale-up and pilot plant production
- 'Quality by Design: critical quality attributes, risk assessment, experimental design,
  Process Analytical Technology (PAT)'
learning_outcomes:
- Demonstrate the importance of design, layout and process control to pharmaceutical
  operations.
- Illustrate and explain the operation and function of pharmaceutical and biopharmaceutical
  processing equipment.
- Compare individual processes and their underlying theory and describe associated
  documentation.
- Explore and categorise milestones and hazards in pharmaceutical scale-up.
- Interpret and classify risk and learn how to reduce risk through process understanding
  and experimental design.
