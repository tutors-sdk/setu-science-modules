indicative_content:
- Statement of Financial Position (Balance Sheet)
- Income Statement (Profit or Loss)
- Analysis of Statement of Cash Flows
- 'Adjustments to the accounts: Accruals and prepayments, bad debts, fixed assets
  and depreciation'
- Financial ratio analysis (profitability, efficiency, and liquidity)
- 'Ethical considerations in context: Financial, products, customers and suppliers,
  staff, and environmental considerations'
learning_outcomes:
- Prepare final accounts for a business from a trial balance.
- Interpret a set of financial statements (final accounts) using financial ratio analysis.
- Discuss ethical considerations linked to financial reporting, planning, and control.
learning_and_teaching_methods:
- Lectures
- Class and group discussions.
- Self study of assigned readings, exercises, and texts.
- Pre-class preparation of readings and exercises for class discussion.
