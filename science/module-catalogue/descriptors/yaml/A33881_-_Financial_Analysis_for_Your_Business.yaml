reference: A33881
full_title: Financial Analysis for Your Business
short_title: Financial Analysis for Bus.
credits: 5
level: Intermediate
author: MWAGENAAR
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: This module aims to provide students with a basic knowledge of accounting in
  the context of establishing the viability of a business (preparing financial statements)
  and using financial information for planning and control (through financial ratio
  analysis). Ethical considerations for these areas will also be introduced.
