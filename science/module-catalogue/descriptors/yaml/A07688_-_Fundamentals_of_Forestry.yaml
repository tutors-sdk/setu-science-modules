cluster: Forestry
aim: This module introduces the student to the world forestry resource and gives a
  brief overview of the history of forestry in Ireland. It provides students with
  an understanding of forest operations from year four (after establishment) through
  to harvesting, and onto the sawmill and timber end-uses. Along the way the student
  will be introduced to and learn some basic forestry skills such as pruning, brushing,
  thinning control and volume estimation.
