indicative_content:
- Biomes & forest biomes
- The world forest resource
- Irish forest history, natural history, native species, past management
- 'Forest operations: formative shaping & tending of broadleaves'
- 'Forest operations: brashing, inspection paths and high pruning'
- 'Forest operations: spacing and thinning, harvesting'
- 'Forest products: log assortments, end-uses and the timber industry in Ireland'
- Sustainable forest management and alternative silvicultural systems
- Alternative products from the forest
- Basic thinning volume estimation
learning_outcomes:
- Explain forestry terminology, aspects of the world forest resource, and Irish forest
  history.
- Discuss forest operations (brashing, thinning, pruning, harvesting) from year four
  to the end of the rotation.
- Demonstrate and carry out key skills such as brashing, pruning, marking and volume
  estimation for thinning operations.
- Operate and use basic tree measurement equipment used in forestry.
- Distinguish the main forest products, and understand the alternative silvicultural
  systems that are available to forest managers.
