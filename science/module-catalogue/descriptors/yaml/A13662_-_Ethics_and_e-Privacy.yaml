reference: A13662
full_title: Ethics and e-Privacy
short_title: Ethics and e-Privacy
credits: 10
level: Postgraduate
author: PCAREW
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Professional Skills
aim: This module aims to provide students with a solid grounding in applied ethics
  and critical thinking skills for dealing with the plethora of intractable ethical
  issues that surround and pervade modern information systems and the information
  society.
programmes:
- timetable: ETHS-0001
  code: WD_KISYP_R
  name: Master of Science in Computing (Information Systems Processes)
  stage: 1
  semester: 0
  status: E
prerequisites: []
corequisites: []
indicative_content:
- 'Introduction to Ethics: Theoretical Ethics; Professional Ethics; Cyber-ethics'
- 'Privacy: The Concept of Privacy; e-Privacy'
- Computers in the Workplace
- Computer Crime, Cybercrime and Cybersecurity
- Censorship and Freedom of Speech
- Intellectual Property
- Computer Safety and Dependence
- Ethical Information Systems Development
learning_outcomes:
- Critique ethical issues that pervade computing technologies, information systems
  and the information society.
- Contrast ethical theory and guidelines, and how they could be applied to help solve
  ethical dilemmas.
- Evaluate, research and debate a range of contemporary ethical issues.
- Decide on ethical action in professional praxis when faced with ethical dilemmas.
learning_and_teaching_methods:
- Interactive lectures for delivery of theoretical content.
- 'Peer learning: Weekly online debate sessions on different ethical topics (case
  studies).'
- 'Independent learning: Research for the weekly debate sessions and assigned research
  paper/presentation.'
