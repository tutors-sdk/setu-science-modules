indicative_content:
- 'Atomic physics: blackbody radiation, the photoelectric effect, atomic spectra,
  models of the atom'
- 'New quantum theory: the Compton effect, the de Broglie hypothesis, the Schrodinger
  equation, the Heisenberg uncertainty principle'
- 'Introduction to solid state physics: band theory, intrinsic and extrinsic semiconductors,
  p-n junction diode and rectification'
- 'Relativity: space, time, matter and the general theory of relativity'
- 'Cosmology: the expanding universe, the big bang model, today''s lambda-CDM model
  of the universe'
learning_outcomes:
- Articulate the fundamental principles of the concept of the quantum.
- Describe the fundamental principles of quantum theory.
- Articulate the fundamental principles of solid state physics.
- Express the fundamental principles of the big bang model of the universe.
- Apply problem-solving skills to find solutions to simple problems in quantum physics,
  solid state physics and cosmology.
learning_and_teaching_methods:
- 'Lectures: The lectures will be used to present new topics and their related concepts.
  Problem-solving techniques will also be used in class to analyse physical problems'
- 'Tutorials: Tutorials will be used to give explanations of fundamental concepts
  in quantum physics and cosmology'
- Self-directed study
