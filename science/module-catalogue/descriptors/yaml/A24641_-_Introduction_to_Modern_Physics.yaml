aim: This module introduces the student to fundamental concepts in quantum theory,
  relativity and cosmology. The first part of the module describes the emergence of
  the quantum in the description of phenomena such as blackbody radiation, the photoelectric
  effect, and atomic spectroscopy. The development of quantum theory is then described,
  from the hypothesis of wave-particle duality to the development of the Schrodinger
  equation. The role of quantum theory in solid-state physics is also described. The
  second part of the module concerns basic concepts in modern cosmology. The material
  covers the discovery of the expanding universe, the development of the big bang
  model and recent puzzles concerning the model. There will be a strong emphasis placed
  on problem-solving, logical thinking, and analysis throughout the module.
