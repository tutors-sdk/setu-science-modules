reference: A09767
full_title: GMP 3 (Regulatory Affairs)
short_title: GMP 3 (Regulatory Affairs)
credits: 5
level: Intermediate
author: BWHELAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Quality, Regulatory and Compliance
aim: This module will give students an appreciation of the role of the regulatory
  affairs professional in the pharmaceutical industry, by providing an understanding
  of the requirements for obtaining and maintaining Marketing Authorisations (MAs)
  and routes for approval of medicinal products.
programmes:
- timetable: MANF-0010
  code: WD_SGMPT_D
  name: Bachelor of Science in Good Manufacturing Practice and Technology
  stage: 1
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Review of Competent Authorities and pharmaceutical legislation for human medicinal
  products in EU and US
- Generic and ethical medicinal products, orphan drugs, abridged procedures
- Packaging and labelling requirements, including Braille
- Good Distribution Practice, Good Manufacturing Practice, Good Clinical Practice
- Preparation of a marketing authorisation submissions, variations and renewals
- FDA and EU policy and procedures; Harmonisation; Japan (WHO)
- The Pharmaceutical Inspection Convention (PIC); European Medicines Agency (EMA)
- National procedures, mutual recognition procedures, centralised, de-centralised
  procedures
- Post-marketing surveillance, pharmacovigilance, periodic safety update reports
learning_outcomes:
- Interpret the guidance documents and the legislation governing the manufacture of
  medicinal products in the EU/US.
- Complete compliance and systems audits in a regulated environment.
- Express how a marketing authorisation application is prepared, submitted and assessed.
- Examine the procedures for post-marketing compliance.
