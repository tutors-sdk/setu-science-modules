reference: A13165
full_title: Agricultural ICT
short_title: Agricultural ICT
credits: 5
level: Advanced
author: ADUNPHY
history_comment: ''
school: Science and Computing
department: Science
cluster: IT
aim: The aim of this module is to provide students with the knowledge and understanding
  of a number of information and communication technologies that are quickly becoming
  crucial to the development of the agricultural sector. These are technologies that
  enable the gathering, storage and presentation of key farm data, such as sensor
  technologies, databases, web development and information systems.
programmes:
- timetable: COMP-0536
  code: WD_SAGRI_B
  name: Bachelor of Science (Honours) in Agricultural Science
  stage: 4
  semester: 7
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Data: obtaining, analysing and displaying data; Data Protection Act; agricultural
  information systems, data governance'
- 'Databases: agri-data management; database theory & principles; database design;
  database creation and manipulation'
- 'Web development: develop an interactive website for the agricultural area & critique
  other agri-oriented websites'
- 'Precision agriculture: sensors, potential applications of precision agriculture,
  its benefits & drawbacks'
- 'Technology: basic components of a computer system and their function'
learning_outcomes:
- Appraise the importance of agricultural data and its governance by obtaining, analysing
  and displaying same.
- Develop a database application for an agri-environment.
- Develop a website for an agri-environment.
- Determine the key concepts of precision agriculture and evaluate associated products.
  `.
- Appraise different technical components.
