indicative_content:
- Visual & Interaction Design
- Information Architecture
- Usability & Accessibility
- Human Computer Interaction (HCI) & User Centred Design (UCD)
- Ergonomics
- Evaluation & Testing
learning_outcomes:
- Appraise the theoretical relevance, and the application, of human physical, cognitive,
  social and affective knowledge, to the design of interactive systems.
- Critique and evaluate the user requirements for an interactive system or product.
- Design, implement and evaluate interactive computing systems.
- Interpret outcomes of study and research in writing and orally.
learning_and_teaching_methods:
- Lectures -- will be used to introduce and discuss UX concepts.
- Practicals/Workshops -- will be used to develop and apply the concepts introduced
  and discussed during lectures.
- Student Independent Learning -- Students will research and apply the various concepts
  introduced and discussed during lectures.
- Students will use Microsoft Office and Adobe Creative Cloud.
