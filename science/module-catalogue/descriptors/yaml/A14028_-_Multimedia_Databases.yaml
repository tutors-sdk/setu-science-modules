indicative_content:
- 'Advanced Database Concepts: Distributed, Object-Oriented'
- Multimedia Data & Metadata
- 'Modeling Multimedia (MM) Databases: Architectures, Information Models'
- 'Managing MM Databases: Query Processing, Storage Management'
- 'Mining MM Databases: Technologies & Techniques, Mining MM Data'
- Management of Text, Image, and Video Databases
learning_outcomes:
- Appraise the concepts, standards, and systems relating to distributed and object-oriented
  databases.
- Evaluate the semantic nature of multimedia data, classify, generate and extract
  metadata for multimedia data types.
- Determine the requirements and structures for the design, implementation and management
  of a multimedia database application.
- Critique technologies and techniques appropriate to mining a multimedia database.
- Evaluate statistical methods for text analysis, appropriate technologies for image
  processing and moving images.
- Design and implement a MM database for a business scenario.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures which in turn will form the continuous assessment.
