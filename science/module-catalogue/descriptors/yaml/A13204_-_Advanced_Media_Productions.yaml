reference: A13204
full_title: Advanced Media Productions
short_title: Advanced Media Productions
credits: 5
level: Advanced
author: PKIRWAN
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Media Production
aim: This module provides the student with the opportunity to apply his/her knowledge
  of the pre-production and production process whilst learning and utilizing the necessary
  skillset to work in a post production environment. The student will be required
  to use an industry standard asset management tool for his/her work during the duration
  of the module.
