  stage: 2
  semester: 4
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Introduction to the routes for authorising and marketing medicinal products; variations,
  International Conference on Harmonisation (ICH)
- Role of Quality Control (QC) unit; Good Laboratory Practice (GLP), USP, BP, EP and
  JP monographs; the need for robust investigations into out-of-specification results
- Laboratory Information Management Systems (LIMS); reporting technical problems,
  documenting rejected products
- 'Sampling: OC curves, sampling plans, sampling tables; review of pharmacopeial test
  methods; raw material, component and final product inspection'
- Product recalls, the role of the Quality, Technical Services and Customer Service
  departments
- The Product Life Cycle; ICH Q8 Pharmaceutical Development, Q9 Quality Risk Management,
  Q10 Pharmaceutical Quality System
learning_outcomes:
- Identify the agencies which regulate pharmaceutical and healthcare manufacturing.
- Interpret a QC test procedure for a component and non-conformance reports.
- Demonstrate the use of sampling plans and control charts.
- Plan for a product recall.
- Apply the approach of the pharmaceutical sector to develop and manufacture medicinal
  products.
