reference: A09766
full_title: GMP 2
short_title: GMP 2
credits: 10
level: Introductory
author: BWHELAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Quality, Regulatory and Compliance
aim: The aim of this module is to develop students competency in identifying, interpreting
  and applying Quality Control guidelines according to the healthcare/ pharmaceutical
  regulations. The student will be able to discriminate between defective and conforming
  ingredients, components and products.
programmes:
- timetable: GMPR-0002
  code: WD_SGMPT_C
