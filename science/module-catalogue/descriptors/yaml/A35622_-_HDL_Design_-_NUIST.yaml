indicative_content:
- Programmable Logic Architecture
- VHDL/Verilog Language Concepts
- Signals, Data Types, Operate
- Behavioural and register transfer level modelling
- Structural modelling
- 'Concurrent execution: Procedures and Functions, sequential statements'
- Design verification (pre and post synthesis)
- VHDL/Verilog Synthesis and implementation
- Design, Capture, synthesis verification and implementation of special purpose digital
  system
learning_outcomes:
- Comprehend behavioural, register transfer level and structural HDL based modelling,
  design capture and simulation and apply to the development of digital systems.
- Synthesise behavioural, register transfer level and structural HDL modules.
- Write efficient testbench code to analyse the integrity of the design at all stages.
- Apply VHDL/Verilog language principles to the design of complex digital systems.
learning_and_teaching_methods:
- Lectures
- Assignments Design, capture and design verification problems will be assigned throughout
  the module to reinforce the concepts demonstrated in class.
- Mini Project
