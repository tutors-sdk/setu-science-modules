indicative_content:
- 'translation: thme and version'
- comprehension texts (literary and argumentative)
- DVD segments on various topics from the programme Regards
- 'Contexts / themes that may be used to achieve the learning outcomes for this level
  may include the following:'
- a. Youth issues
- b. Contemporary Ireland
- c. Personal interests and development
- d. Careers, ambitions and the work place
- e. Money and financial affairs
- f. International issues
- 'Linguistic structures to be covered at this level will include the following:'
- a. Possessive pronouns
- b. The subjunctive in expression of possibility, impossibility, doubt
- c. The present participle
- d. Pluperfect
- e. Double negation
- f. Perfect
learning_outcomes:
- Oral Production
- With attention to pronunciation and intonation, the learner is expected to be able
  to:.
- give clear systematically developed descriptions and presentations with appropriate
  highlighting of significant points and relevant supporting detail;.
- develop an argument systematically with appropriate highlighting of significant
  points and relevant supporting detail;.
- display a good lexical competence including commonly used vocabulary and phrases
  in the appropriate register.
- Written Production
- The learner is expected to be able to:.
- take messages communicating enquiries and explaining problems;.
- write conveying degrees of emotion and highlighting the personal significance of
  events and experiences;.
- use the language creatively and display variety in written communication.
- Aural Reception (Listening)
- The learner is expected to be able to:.
- understand the main ideas of propositionally and linguistically complex speech on
  abstract topics delivered in a standard dialect;.
- understand announcements and messages on concrete and abstract topics spoken in
  standard dialect at normal speed.
- Visual Reception (Reading)
- The learner is expected to be able to:.
- have a broad active reading vocabulary but may experience some difficulty with culturally
  specific phraseology;.
- be able to quickly scan through long and complex texts, locating relevant details;.
- be able to quickly identify the content and relevance of news items, articles and
  reports on a wide range of professional topics, deciding whether closer study is
  worthwhile.
- Audio-visual Reception
- The learner is expected to be able to:.
- understand the general topic of media broadcasts and films with the support of contextual
  information and / or visual clues.
learning_and_teaching_methods:
- Interactive seminars will be the main teaching approach. A variety of media will
  be used in the teaching process (traditional print materials, audio and video material,
  CALL programmes and online language learning resources). The course will be characterised
  by a high level of student participation in both classroom activities and self-directed
  learning activities outside the classroom.
