aim: 'Aim: The module aims to: give the student understand the main ideas of complex
  text on both concrete and abstract topics, including technical discussions in his
  / her field of specialisation; enable the student to interact with a degree of fluency
  and spontaneity that makes regular interaction with native speakers quite possible
  without strain for either party; enable the student to produce clear detailed text
  on a wide range of subjects and explain a viewpoint on a topical issue giving the
  advantages and disadvantages of various options; encourage the student to explore
  other possible ways of thinking and doing things.'
