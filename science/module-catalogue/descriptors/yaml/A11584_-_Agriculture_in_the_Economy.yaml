aim: This module will enable the student to describe the structure of Irish agriculture
  and outline national and EU supports the agriculture sector. The student will gain
  an insight into the state agencies involved in policy creation and food promotion.
  The module will review the main farm enterprises as well as alternative enterprises,
  and describe the range of schemes and services available to Irish farmers.
