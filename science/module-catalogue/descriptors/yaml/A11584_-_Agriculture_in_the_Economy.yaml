indicative_content:
- Structural trends in Irish agriculture
- Agencies involved in policy creation and food promotion
- EU Common Agricultural Policy
- Schemes and services available to Irish farmers
- Profile of main agricultural enterprises in Ireland
- Alternative enterprise production in Ireland
- Supply & demand for agricultural produce
learning_outcomes:
- Review the importance of agriculture to the Irish economy.
- Explain how agricultural policy is designed and developed.
- Outline the structure and operation of the CAP - Pillar 1 and Pillar 2.
- Describe each agricultural sector and target markets at home and abroad.
- Discuss factors which influence supply and demand of agricultural produce.
