assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  demonstrate critical thinking about key module areas.'
- '40%-49%: Demonstrate satisfactory general knowledge of the key learning outcomes.
  Able to source relevant data and information and present it in both assignment and
  exam.'
- '50%-59%: Demonstrate good knowledge of the main subject matter areas including
  good understanding about the contribution of agriculture to the Irish economy.'
- '60%-69%: Demonstrate more detailed knowledge of all module topics including EU
  agricultural policy and its influence on domestic production.'
- '70%-100%: Demonstrate comprehensive knowledge and understanding of all learning
  outcomes including the ability to evaluate and relate topics that overlap all learning
  outcomes.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
