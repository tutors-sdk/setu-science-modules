reference: A06761
full_title: Measurement Science
short_title: Measurement Science
credits: 10
level: Introductory
author: GGALLAGHER
history_comment: ''
school: Science and Computing
department: Science
cluster: Mathematics and Physics
aim: This is an introductory module in measurement science. Much of the content is
  basic physics, providing the student with a background to understand the more applied
  measurement concepts considered towards the end of the module. No previous knowledge
  of physics or measurement science is assumed.
programmes:
- timetable: PHYS-0018
  code: WD_SGMPT_C
  name: Higher Certificate in Science in Good Manufacturing Practice and Technology
  stage: 1
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Introduction: SI system of units; scientific notation; simple calculations using
  physical quantities'
- 'Basics mechanics: vectors and scalars; Newtons laws of motion and gravitation'
- 'Heat and temperature: specific heat capacity and latent heat'
- 'Waves motion and light: electromagnetic waves and electromagnetic spectrum'
- 'Introduction to electricity: simple circuits; resistors in series and parallel;
  electrical safety'
- 'Analogue and digital signals: temperature sensors'
- 'Measurement science: systematic and random errors; strain gauge and other transducers;
  calibration, standards, traceability ladder'
learning_outcomes:
- Use the SI system of units and perform standard types of formula-based calculations
  in basic physics.
- Define basic terms in physics and describe applications of the basic physics presented.
- Explain the principles behind a wide range of temperature sensors.
- Calculate important quantities associated with simple electrical circuits.
- Use laboratory equipment in a safe and accurate manner.
- Describe the basic components of a measurement system and outline important measurement
  principles.
- Report on and critically assess experiments carried out to demonstrate principles
  of physics in a laboratory context.
