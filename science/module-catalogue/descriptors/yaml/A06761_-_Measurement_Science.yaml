assessment_criteria:
- '<40%: The student has failed to demonstrate a reasonable grasp of the material
  and is unable to carry out routine calculations reliably. Experimental work is generally
  poor.'
- '40%-49%: Able to demonstrate a basic understanding of the fundamental concepts
  outlined in the indicative content. Able to provide partial solutions to numerical
  problems. Practical work is usually of an acceptable quality.'
- '50%-59%: Able to clearly describe and define concepts encountered in the indicative
  content. Able to analyse physical situations and apply suitable problem-solving
  techniques to find numerical solutions. Carries out practical work capably and writes
  up same to an acceptable standard.'
- '60%-69%: In addition to the above, able to apply problem-solving techniques to
  new similar problems. Demonstrates a good understanding of the majority of the course
  content. Practical tasks are performed and written-up well.'
- '70%-100%: All the previous to an excellent level. Demonstrates an ability to put
  a numerical solution into a context and assess whether such solutions are meaningful.
  Experimental work is carried out to an high standard. Reports are clear and insightful
  with the student demonstrating an ability to reflect on the strengths and weaknesses
  of the experimental techniques used.'
