aim: The study of this module enables students to systematically master the basic
  concepts, basic theories and basic operation skills such as the limit of functions,
  the differential calculus of unary functions and its application, and the integral
  calculus of unary functions. Cultivate students' abstract thinking and abstract
  thinking ability, logical reasoning ability, and certain mathematical modeling ability,
  correctly understand some important mathematical thinking methods.
