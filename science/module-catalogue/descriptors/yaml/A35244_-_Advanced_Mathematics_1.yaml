indicative_content:
- 'Functions: polynomials; rational functions; transcendental functions; limits and
  continuity'
- Differential calculus:the concept of derivative, the rule of derivative of unary
  function, higher order derivative, implicit function and derivative of parametric
  function; differentiation of unary functions and its applications; curve--sketching
  using critical points and simple problems of optimization; Newton's method; Taylor
  expansions
- 'Integral calculus: concepts, properties and integral methods of indefinite and
  definite integrals; the fundamental theorem of calculus; applications of definite
  integrals'
- 'Vector algebra: vectors and their linear operations; vector scalar product, vector
  product and mixed product'
learning_outcomes:
- Explain the most important properties of the elementary functions (including piecewise
  function ) and illustrate these properties using appropriate examples.
- Compute routine calculations with numbers and master a new mathematical idea and
  method to solve the problem- -limit method, understand the founding process of calculus.
- Calculate the derivative and the integral of unary functions.
- Use appropriate derivative and integral methods to solve elementary optimization
  problems.
- Master the new idea of using algebraic methods to solve geometric problems.
- Apply concepts indicated in the syllabus content to appropriate problems and interpret
  the solutions obtained.
learning_and_teaching_methods:
- Delivery of the module will be through lectures, tutorials, discussion, and practice.
- The lectures will enable students to obtain the basic concepts, basic theories and
  basic operation skills of unary functions, and acquire the limit and continuity
  of unary functions, calculus of unary functions and its applications, vector algebra
  and other aspects, and will develop theory, lead students through worked examples
  and introduce the context for the module material.
- The tutorial classes will underpin and rehearse the skills covered in lectures.
  Students will be encouraged, through the problem sheets, to construct valid and
  precise mathematical arguments and will be expected to produce solutions using appropriate
  mathematical notation.
- The discussion and practical sessions will be used to discuss applications of the
  theory and to utilize and implement mathematical software.
- The practical programme is designed to re-enforce the strong interconnections between
  the mathematical concepts covered in this module and Computer Science concepts using
  Computer Algebra Systems (CAS) and guided development of students' own code. A typical
  activity consists of investigating a number of basic quadrature techniques and their
  application to problems in computer science.
