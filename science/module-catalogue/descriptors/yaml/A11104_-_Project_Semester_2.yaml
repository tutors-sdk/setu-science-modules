indicative_content:
- Development of a digital portfolio using a distributed version control system
- Communication of ideas in correct, clear and modern format
learning_outcomes:
- Apply knowledge, skills or practices from (at least two) strands in the programme
  into a model that demonstrates an understanding of the core concepts of those strands.
- Demonstrate the above model and present the resulting working artifact.
- Use a modern, professional distributed version control system to display (and continually
  update) his/her digital portfolio including all artifacts produced as part of this
  semester.
- Report and present outcomes of their project in a clear and accessible way.
learning_and_teaching_methods:
