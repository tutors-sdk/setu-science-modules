indicative_content:
- Current bacterial foodborne pathogens such as Escherichia coli O157:H7 and other
  emerging verotoxigenic E. coli, Salmonella spp., Campylobacter spp., Listeria spp.,
  Cronobacter sakazakii
- Non-bacterial food pathogens, e.g. norovirus, rotavirus and cryptosporidium
- Multi drug resistant (MDR) bacteria, including the emergence of fluoroquinolone
  resistance in important food-borne pathogens such as Campylobacter spp. and Salmonella
  spp.
- Control of zoonotic pathogens and relevant control programmes, e.g. Salmonella control
  in pigs
- 'Traditional and molecular approaches to food safety monitoring: this will include
  bacteriology, molecular detection and molecular surveillance tools'
learning_outcomes:
- Explore the various current and emerging pathogens.
- Distinguish between food-borne pathogens i.e. bacterial and non-bacterial (viral
  and parasitic).
- Investigate microbial drug resistance (MDR) and highlight the concerns of MDR in
  relation to public health.
- Distinguish between a variety of modern molecular tools used for pathogen surveillance.
- Debate the need for molecular surveillance tools in relation to food-borne pathogens.
- Examine national food-borne pathogen control programmes, e.g. Salmonella Control
  Programme.
learning_and_teaching_methods:
- Lectures -- blended learning.
- Formative learning using case studies, e.g. FSAI alert reports.
- Flipped classroom using e-activities.
- In-class presentations.
- Self-study of assigned reading.
