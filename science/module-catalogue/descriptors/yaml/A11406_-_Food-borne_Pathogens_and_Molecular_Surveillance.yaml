assessment_criteria:
- '<40%: No understanding of the basics of food-borne pathogens.'
- '40%-49%: A basic understanding of food-borne pathogens and their relevance.'
- '50%-59%: Understands the importance of zoonoses and the necessity for international
  surveillance and control.'
- '60%-69%: Can critically evaluate modern diagnostic tools for tracing food pathogens.'
- '70%-100%: Can perform all the previous assessment criteria. Can apply that knowledge
  in a global context, and evaluate the relevance from a public health perspective.'
