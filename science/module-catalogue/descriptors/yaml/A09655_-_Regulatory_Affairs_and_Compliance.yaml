indicative_content:
- Introduction to regulatory agencies, national, EU and emerging markets, role of
  EDQM, CHMP
- 'Overview of the development of the regulations: EU directives and regulations including
  2001/83/EEC, 726/2004, 2004/27/EC, 2004/24/EC, Falsified Medicines directive, clinical
  trial directive'
- 'Role of the regulatory affairs professional in compliance and inspections in the
  pharmaceutical industry: compliance files/technical agreements'
- 'Application procedures for marketing authorisations: national, centralised, de-centralised,
  mutual recognition'
- 'Legal basis for applications and required documentation: common technical documents
  and its worldwide application, additional requirements for emerging markets'
- Maintenance of marketing authorisations, renewals, variations
- 'Packaging and labelling requirements: braille QRD format blue box requirements,
  child resistant/adult-friendly requirements for certain medicines'
- 'Pharmacovigilance: role of QPPV, PSMF, PSUR RMP'
learning_outcomes:
- Determine the agencies operating within the global pharmaceutical sector and their
  role in the regulation of all aspects of the regulation for the pharmaceutical industry.
- Appraise the importance of the role of the regulatory affairs professional and their
  link to operations functions within the industry from development phase, to ensure
  compliance at all stages.
- Compare and contrast the possible routes to be followed to obtain a marketing authorisation
  in various sectors of the industry, and apply a suitable strategy to ensure a successful
  outcome.
- Evaluate the relevant information necessary to be submitted to obtain and maintain
  authorisations in major markets and appropriate formatting of same.
- Compile and apply the post-marketing obligations of the pharmaceutical manufacturer
  and MA holder in the on-going safety monitoring of pharmaceutical products.
learning_and_teaching_methods:
