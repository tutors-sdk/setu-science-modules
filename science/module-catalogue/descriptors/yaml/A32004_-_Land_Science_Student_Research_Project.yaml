aim: This module consists of a research and development project, which aims to give
  students the facility to plan and carry out a programme of work based significantly
  on their own initiative. The student project will be carried out in semester 2,
  following on from a literature review on their chosen topic in the 1st semester.
  The projects will be carried out under the supervision of individual members of
  the academic staff within WIT/Kildalton, or with outside co-operators. As part of
  the module students will be introduced to techniques that are necessary in a research
  environment, such as choosing the correct experimental design and data management
  and analysis techniques for their chosen specialised research topic. This will culminate
  in the production of a written 'mini-thesis' on this research topic.
