reference: A08761
full_title: Sheep Production
short_title: Sheep Production
credits: 5
level: Introductory
author: JDAY
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will enable the student to acquire a detailed knowledge of production
  and management practices, and the everyday skills needed to manage a sheep flock.
  It will also enable the student to evaluate the economic returns from a sheep enterprise.
programmes:
- timetable: AGRI-0009
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 2
  semester: 3
  status: E
prerequisites: []
corequisites: []
indicative_content:
- Feeds and feeding
- Breeding
- Systems of lamb production
- Diseases
- Sheep facilities
- Sheep production tasks
- Economics of sheep production
learning_outcomes:
- Identify feeds and feeding systems for sheep.
- Compare systems of sheep production.
- Employ disease control strategies.
- Examine sheep facilities.
- Complete safely tasks associated with sheep production with due regard to good environmental
  practice and the animal's health and welfare.
- Calculate the cost of sheep production.
- Describe good environmental practices in sheep production.
- Describe appropriate actions to promote and maintain the good health and welfare
  of sheep.
