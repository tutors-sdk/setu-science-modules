indicative_content:
- An introduction to the geology of the earth, including geological time, process
  of rock formation, rock types, weathering and distribution, recent earth events
  shaping the Irish landscape of today
- Ecology and countryside management, biodiversity, ecosystems, habitats and biological
  niches; species interaction, competition, predation, parasitism, mutualism; succession,
  climax community; EU habitat directives; native flora and fauna; historical and
  archaeological features
- Climatology and meteorology, terms and maps; evaporation and transpiration; data
  recording; global climate change; events of historical significance; influence of
  weather and climate on forest growth and development
- Each student will undertake a field- or laboratory-based project on each of the
  above topics
- Field trips to river and woodland ecosystems, studying flora, fauna and geology
  of places such as Wicklow, Comeraghs or Killarney National Park; visit to a meteorological
  station
learning_outcomes:
- 'Examine the geology of the earth: rock types, distribution, and relationship to
  soil formation.'
- Examine the biodiversity to be found on the earth, and discuss species interaction,
  native and artificial habitats, and the influence of EU policy on these.
- Identify the effects of climate and climate change in Ireland on forests and trees.
- Use climatology and meteorology terms and construct graphs from meteorological data
  and statistics, and draw conclusions from them.
- Discuss the role of earth science and its interaction with the management of forests
  in the landscape.
