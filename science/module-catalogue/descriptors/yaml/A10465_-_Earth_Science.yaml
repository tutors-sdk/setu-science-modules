aim: This module is designed to give first year students of land-based courses an
  introduction to the earth, its origin and basic makeup, the interactions which occur
  between the earth and its inhabitants, its atmosphere, and artificial features of
  human origin. Topics covered in this course will include geology, ecology, countryside
  management, climatology and meteorology.
