indicative_content:
- 'Introduction to differentiation: finding the limits and slopes of polynomial, rational,
  exponential, logarithmic and trigonometric functions through the use of first principles'
- 'Differentiation: using appropriate methods of differentiation to find the first
  derivative and second derivative of a range of functions'
- 'Applications of differentiation: rates of change; critical points and optimisation'
- 'Introduction to integration: anti-derivatives; area under a curve; area between
  two curves; trapezoidal rule; methods of integration'
- 'Applications of integration: calculate the total and average values of various
  functions over a specific range of values and introduce differential equations'
learning_outcomes:
- Use appropriate differentiation methods to differentiate linear, polynomial, rational,
  exponential and trigonometric functions.
- Use differentiation to solve elementary optimisation problems.
- Use appropriate integration methods to integrate linear, polynomial, rational, exponential
  and trigonometric functions.
- Calculate irregular areas using integration techniques.
- Calculate irregular areas using numerical methods.
- Apply differentiation and integration to solve mathematical problems.
- Interpret results obtained from problems of an applied nature in the science environment.
learning_and_teaching_methods:
- Lectures.
- Online exercises.
- Use of technology to enhance the learning experience.
- Self-directed learning is emphasised. Students are supported with notes, online
  material and feedback.
