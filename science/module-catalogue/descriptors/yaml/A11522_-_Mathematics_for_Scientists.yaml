assessment_criteria:
- '<40%: Inability to identify and describe key concepts of calculus.'
- '40%-49%: Ability to identify and describe key concepts of calculus.'
- '50%-59%: Ability to discuss key concepts of calculus clearly and interpret their
  relative importance.'
- '60%-69%: Ability to apply solutions to problems in a range of relevant contexts
  by using differentiation and integration. Ability to employ a comprehensive range
  of specialised calculus skills.'
- '70%-100%: All the above to an excellent level, with the ability to analyse and
  design solutions to a high standard for a range of complex or unseen problems using
  calculus.'
