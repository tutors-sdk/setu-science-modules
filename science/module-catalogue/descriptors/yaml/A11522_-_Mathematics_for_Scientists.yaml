aim: This module will explore the basics of differentiation, concentrating on rates
  of change and optimisation. It will also introduce the student to the idea of areas
  of irregular shapes and how integration can be used to calculate these. There is
  an emphasis throughout this module on the role of calculus in the sciences, including
  real world applications.
