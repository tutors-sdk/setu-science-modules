reference: A36344
full_title: Food Analysis and Animal Feed Biotechnology
short_title: Food Analysis Animal Feed Bio
credits: 5
level: Intermediate
author: JFRISBY
history_comment: ''
school: Science and Computing
department: Science
cluster: Food Science
aim: This module introduces the student to basic food analysis. Novel food packaging
  and the biological aspects of animal feed are introduced.
