indicative_content:
- Laboratory safety and safe disposal of chemicals
- Food analysis tests, including some microbiological analysis
- An introduction to probiotics, prebiotics and zenobiotics in a range of animal feeds
  ( including animal clinical trials)
- Innovative application of microorganisms as novel food packaging systems
- The marine environment and the agri/food industry
- GMO`s in the agri/food sector
learning_outcomes:
- Use safe laboratory procedures including the correct disposal of laboratory waste.
- Complete proximate and microbiological analysis on a range of food products and
  animal feeds.
- Communicate results from report laboratory experiments in an appropriate format
  and evaluate the data.
- Analyse various Food Analysis experiments and their uses in the food industry.
- Differentiate the various types of animal feeds and their microbial/non-microbial
  composition.
- Analyse regulations, food safety concerns of GMO`s and the basics of animal clinical
  trials.
learning_and_teaching_methods:
