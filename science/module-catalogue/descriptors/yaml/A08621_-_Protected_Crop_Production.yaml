corequisites: []
indicative_content:
- Structure, design and site selection of protective structures
- Environmental management and control within protective structures
- Water and nutrient management of protected crops
- Crop production techniques for heated and cold greenhouse crops
- Production and management of a selection of heated and cold greenhouse crops
- Plant protection of protected crops
- Glass House technology and sensor technology, precision technology.
learning_outcomes:
- Determine appropriate protective structures for specific site requirements.
- Propose appropriate environmental control, irrigation and feeding systems.
- Develop production and management schedules for protected crops.
- Integrate good environmental practices into recommendations for heated and cold
  crops.
- Demonstrate safely a range of skills involved in protected crop production.
- Investigate contemporary developments in glass house and sensor technology.
