assessment_criteria:
- '<40%: Very limited knowledge of protected plant production methods and cannot demonstrate
  understanding of production methods or protected structures. Unable to complete
  practical skills or exercises.'
- '40%-49%: Demonstrates a limited knowledge of protected plant production systems
  and processes. Limited technical ability but demonstrates ability to learn and understand
  new skills.'
- '50%-59%: Demonstrates satisfactory general knowledge of the main areas of protected
  plant production. Competently carries out practical tasks and skills. Reports and
  projects adequately structured and referenced.'
- '60%-69%: Demonstrates sound knowledge of protected production principles and systems.
  Demonstrates ability to logically interpret and analyse technical information. Projects,
  reports and exams coherent and soundly structured.'
- '70%-100%: Demonstrates authoritative handling of complex material and a highly
  developed and extensive understanding of the subject. Demonstrates imaginative approach,
  excellent technical ability, awareness, and aptitude in carrying out and reporting
  on practical/professional tasks.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
