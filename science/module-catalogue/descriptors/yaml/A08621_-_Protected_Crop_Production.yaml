reference: A08621
full_title: Protected Crop Production
short_title: Protected Crop Production
credits: 5
level: Intermediate
author: GMCMAHON
history_comment: ''
school: Science and Computing
department: Science
cluster: Horticulture
aim: The student will be introduced to a range of protected structures and their environmental
  control. The module will enable the student to draw up management and production
  schedules for a range of crops in greenhouses using best industry practice.
