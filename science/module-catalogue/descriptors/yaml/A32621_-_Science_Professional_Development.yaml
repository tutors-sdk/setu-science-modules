indicative_content:
- 'Student will fully participate in a minimum of 15 weeks professional development:
  whereby the student will plan learning objectives with the module supervisor, demonstrate
  continuous progress towards these objectives, avail of learning opportunities and
  communicate outcomes in a timely manner.'
- 'The student, with support from the module supervisor, will participate in the WIT
  Science Industry committee and in a range of: industry/professional bodies'' conferences;
  seminars; professional development activities; and/or certified training.'
- The student will identify, assess and analyse, with prior agreement with the module
  supervisor, a piece of knowledge, technology or skill and its application relevant
  to the students main study area. The student will carry out a project and communicate
  the results.
- The student will be provided with opportunities to relate, communicate and work
  with others and/or work independently to meet the agreed learning objectives.
learning_outcomes:
- Plan learning objectives for the Science Professional Development semester.
- Apply competently their science knowledge and skills in a range of settings, operating
  independently and/or as part of a team towards the set learning objectives.
- Demonstrate the student has started their personal & professional development in
  acquiring transferable competences that characterise operating as a professional,
  including self-evaluation, personal responsibility and effectiveness, communication
  and operating in a multidisciplinary environment.
- Demonstrate the ability to reflect critically on their personal, professional and
  technical achievements in this module.
- Identify, assess and analyse a particular piece of knowledge, technology or skill
  and its application relevant to the student's main study area.
learning_and_teaching_methods:
- A Department of Science workshop on planning and preparing for the Science Professional
  Development module.
- Scheduled communication between student and supervisor before, during and after
  the Science Professional Development module, to ensure successful outcomes.
- Student engagement with the WIT Science Industry Board and industry groups relevant
  to the student's main study area, facilitated by the module supervisor.
- Industry-supervised or self-directed project / training, focused on a specific piece
  of knowledge, skill or technology and its application to the student's main programme
  specialisation.
- 'A portfolio that may include some or all the following: a daily work diary, a reflective
  journal and/or presentation detailing the student''s gain of experience and the
  development and evaluation of personal and professional understanding, learning
  and growth.'
