aim: The Science Professional Development module is an elective module designed as
  an alternative to the Work Placement module in Science programmes, taken by the
  student with prior agreement with the module supervisor. This module facilitates
  the student to reflect on their own professional aims and motivation for learning,
  to identify gaps in their professional knowledge and take the initiative and responsibility
  for meeting their own learning needs. This mode of learning recognises the student
  s agency in taking responsibility for their learning with the support of the module
  supervisor. This module will offer the student a broad range of professional experience.
  In addition to gaining specialised knowledge and skills, participating students
  will demonstrate the acquisition of many transferable skills. These will include
  individual initiative and personal responsibility, learning flexibly, operating
  and communicating effectively in a multi-disciplinary environment and specialised
  knowledge transfer.
