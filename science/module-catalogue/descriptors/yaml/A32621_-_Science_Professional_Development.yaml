assessment_criteria:
- 'Fail: Student fails to undertake or complete Science Professional Development to
  a satisfactory level and/or fails to submit the assessments and documents related
  to the learning outcomes.'
- 'Pass: Minimum period of at least 15 weeks Science Professional Development completed
  to a satisfactory standard with Supervisors Report, assessments and documents related
  to the learning outcomes, all submitted to an acceptable standard and submitted
  within deadlines.'
