indicative_content:
- Sensors (pressure, flow rate, level, humidity, ph, temperature, speed, position
  etc).
- Operational amplifier characteristics (voltage range, current drive, bandwidth,
  input and output impedance) and negative feedback
- Practical linear and non linear operational amplifier circuits (amplifier's, summers,
  instrumentation amplifiers, integrators, differentiators, comparators, Schmitt triggers)
- 555 timer and applications
- Flip flops, counters, registers and logic families
- Opto-Electronics
- Interface circuits and ADC conversion
learning_outcomes:
- Describe typical sensor operation, calibration and usage (pressure, flow rate, level,
  temperature, speed, position etc).
- Define the operation of fundamental linear and non linear operational amplifier
  circuits.
- Construct and test fundamental linear and non linear operational amplifier circuits.
- Explain typical instrumentation techniques and ADC conversion.
- Describe and use common 555 timer based circuits.
- Explain the operation of flip flops, counters and registers.
learning_and_teaching_methods:
- Two hour practical laboratory sessions to build, test and document circuits
- Lab project based on circuits covered in lectures and labs but used to implement
  an electronics based solution to an instrumentation and measurement problem
- Lectures and integrated tutorials using typical classroom resources and Moodle and
  other on-line resources.
