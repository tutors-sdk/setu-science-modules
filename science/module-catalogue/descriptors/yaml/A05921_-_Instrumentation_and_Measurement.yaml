aim: The module is designed to give a student the ability to understand, build and
  perform basic calculations on practical analog and digital electronic circuits commonly
  used in electrical engineering. Sensors commonly used in electrical engineering
  applications are covered. Linear operational amplifiers circuits such as basic amplifiers,
  instrumentation, signal conditioning circuits and interface circuits and essential
  non linear circuits like comparators and Schmitt triggers are included. It also
  covers ADC conversion and common 555 timer applications. The digital element concentrates
  on counters and registers. The essential differences between different logic families
  will be included. The module has a definite emphasis on industrial standards and
  typical industrial equipment.
