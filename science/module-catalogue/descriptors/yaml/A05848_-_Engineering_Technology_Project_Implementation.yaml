indicative_content:
- Formulate a solution to the project specification
- Planning actions, scheduling, organising and managing time, meeting deadlines
- Applying new and existing knowledge to unfamiliar problems
- Validating and verifying designs and solutions
- Developing communication skills (writing, presentation and demonstration skills)
learning_outcomes:
- Confirm an ability to set and meet achievable milestones.
- Transform the background and contextual knowledge of the previous semester into
  real progress in terms of knowledge and ability in the project area.
- Defend a chosen course of action, based on rational reasoning, resources and abilities.
- Present a project context , status quo and projected outcomes to peers and staff
  in an open forum / seminar.
- Accurately represent their work in a project report, acknowledging the presence
  and level of input of others.
