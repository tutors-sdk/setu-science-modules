aim: This module aims to introduce the student to the principles of marketing applied
  to the Irish food and agribusiness industry, in support of understanding the dimensions
  of both the food sector and the consumer. A review of the marketing environment,
  the factors influencing the consumer buying process, the new product development
  process and associated marketing mix elements will be conducted. The application
  and enforcement of food standards including food traceability and non-conformance
  is also covered.
