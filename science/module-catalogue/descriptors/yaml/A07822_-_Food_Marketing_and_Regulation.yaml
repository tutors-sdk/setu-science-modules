indicative_content:
- 'The marketing environment: micro and macro forces impacting on stakeholders in
  the food sector; SWOT of food businesses'
- 'Consumer and organisational buying behaviour: factors impacting on consumer, household
  and organisational buying behaviour in the Irish food industry; the steps in the
  buying process; the concept of derived demand'
- 'Marketing research: researching the evolving needs and wants of the Irish consumer
  and customer; secondary and primary research methods'
- 'Product labelling: the product life-cycle; new product development across the food
  sector'
- Price-cost based; value-based and competition-based pricing strategies in the dairy
  and meats sectors
- 'Place: channels of distribution; centralised distribution in the Irish retail sector'
- 'Promotion: communication campaigns of commercial and non-commercial stakeholders
  involved in the food sector'
- National laws and regulation, international laws, EU laws and regulation
- Traceability of food and non-conformance of food products
learning_outcomes:
- Explain the fundamentals of marketing in the environment in which it operates.
- Discuss case studies.
- Report and present a food marketing study including full traceability of a food
  product.
- Identify integrated marketing mix strategies for new food product offerings.
- Discuss national, EU and international regulations and their application and enforcement.
learning_and_teaching_methods:
- Lectures.
- Class and group discussions.
- Case studies.
- Self-study of assigned readings and texts.
- Pre-class preparation of readings and case-studies for in-class discussion.
