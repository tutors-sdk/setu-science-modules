indicative_content:
- 'Story Telling: Writing; The Process of Scipt-writing; Elements of story telling;
  Narrative construction; Dialogue'
- Character Design and Development
- The Language of Film, Cinematography
- 'Storyboarding: Fundamentals; Technical Structure; Components and Functions; Case
  Studies; Script to Storyboard Realisation'
- 'Call Sheets: Purpose and Overview'
- 'Animatic: Timing, Creation of a basic digital Animatic from existing assets'
- 'Production: Scene Selection and Setup'
- Digitisation Process
learning_outcomes:
- Identify and recognise the conceptual themes relating to Story telling, Script-writing,
  Story-boarding and Character Development.
- Identify and recognise the key elements of Cinematography for story telling.
- Interpret and identify the Production Pipeline phases.
- Complete an animatic using industry standard software.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
