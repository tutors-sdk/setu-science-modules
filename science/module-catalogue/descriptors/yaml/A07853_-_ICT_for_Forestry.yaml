assessment_criteria:
- '<40%: Poor presentation and/or poorly communicated and formatted assignments.'
- '40%-49%: Presentation adequate, communication and technology use adequate.'
- '50%-59%: Presentation of material is competent with clear ideas and logical structure,
  few if any grammatical and spelling errors. Competent display of IT skills.'
- '60%-69%: Presentation of material is logical and persuasive, indicates strong communication
  and technical skills.'
- '70%-100%: Excellent communication of material supported by the use of correct conventions
  and excellent use of technology.'
