aim: This module aims to provide the student with skills to expand their written and
  oral communications skills in an academic and professional manner, for both the
  online and offline environment. Students will appraise the value of the use of modern
  technology for research and current awareness. Students will have practical exposure
  to advanced concepts in search techniques, word processing, spreadsheets and presentations.
