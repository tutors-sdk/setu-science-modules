indicative_content:
- 'Advanced writing and word processing: academic writing and associated word processing
  features for a variety of document types'
- 'Advanced spreadsheets: edit, format and visually represent data sets with the assistance
  of appropriate formulae and charts'
- Research and evaluate information while considering plagiarism, copyright laws and
  an academic referencing style
- Present a clearly defined and structured oral presentation using presentation software
learning_outcomes:
- Demonstrate an ability to create attractively displayed documents using word processing
  and exploit the various advanced editing and formatting features of a modern package.
- Use appropriate software to edit, format and visually represent data sets formulae
  and charts.
- Use appropriate search techniques to find reliable and reference suitable sources
  of information.
- Communicate effectively with the assistance of appropriate presentation software.
learning_and_teaching_methods:
- 'Computer-based practicals: to provide the student with the skills and confidence
  to be able to perform applications tasks in a computing environment.'
