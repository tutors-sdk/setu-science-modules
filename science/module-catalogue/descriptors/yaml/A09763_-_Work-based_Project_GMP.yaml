history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: The aim of the work-based project (WBP) is for the student to complete a project,
  based on-site, that is undertaken with an external organisation where the student
  is employed.
programmes:
- timetable: PROJ-0031
  code: WD_SGMPT_C
  name: Higher Certificate in Science in Good Manufacturing Practice and Technology
  stage: 2
  semester: 4
  status: M
prerequisites: []
corequisites: []
indicative_content:
- The student completes a project report that reflects the business needs of the organisation
- The scope of the project must reflect the manufacturing or compliance context of
  the programme
- The host company and the course board will co-operate in allowing the student to
  complete a work-based project
learning_outcomes:
- Define and describe Good Manufacturing Practice and Technologies as implemented
  by the host enterprise.
- Employ the skills learned and acquired to fulfil defined roles and responsibilities.
- Review pharmaceutical operations.
- Plan a project to enhance employability within the host organisation.
- Complete a Final Learning Report and MS PowerPoint presentation.
