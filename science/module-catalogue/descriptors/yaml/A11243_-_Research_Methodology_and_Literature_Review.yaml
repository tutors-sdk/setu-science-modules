aim: This module will develop techniques that are necessary in a research environment,
  such as accessing, referencing and utilising public literature resources to prepare
  a literature review of a specialised research topic. In addition, the module will
  develop the skills required to design a project management plan to implement a practical
  project related to this research topic.
