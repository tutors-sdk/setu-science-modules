indicative_content:
- Search strategies and tools for searching the scientific literature, using online
  databases, books, journals and Internet resources
- Referencing the literature using the Harvard and Vancouver systems & dedicated reference
  manager software
- Critical analysis and evaluation of the literature related to a specialised research
  topic
- Formatting and design of a literature review document using the built-in tools of
  MS Word
- Formatting tables, graphs, schemes and images to a high standard for a research
  document
- Advanced scientific writing skills
- Oral presentation of literature review
- Design and present a project management plan and Chemical Safety Forms to implement
  a practical project on a specialised research topic
learning_outcomes:
- Plan a literature search to search the scientific literature and databases relevant
  to a specialised research topic.
- Compile a review of the scientific literature information on a specialised research
  topic using the built-in tools of MS Word.
- Evaluate scientific literature relevant to a specialised research topic.
- Manage referencing resources to support a literature review.
- Produce an oral presentation of the research findings.
- Design a project management plan for a practical project related to a specialised
  research topic.
learning_and_teaching_methods:
