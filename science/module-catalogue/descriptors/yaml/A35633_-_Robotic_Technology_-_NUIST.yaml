aim: This module focus on introducing the major technology including Robot Operation
  System(ROS) programming, Visual Inertial Odometry (VIO) principle, sensor fusion
  based system stats estimation approach ,model-based drone control technology and
  trajectory planning method which are applied on multirotor helicopter systems.
