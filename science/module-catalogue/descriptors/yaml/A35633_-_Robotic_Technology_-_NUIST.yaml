indicative_content:
- 'C/C++: opencv, egin, object programming, matrix operation'
- 'Linux/Ubuntu: git, cmake, toolchain'
- 'Rigid-body Kinematics: Rotations, reflections, and translations, coordinates transformation'
- 'Control Theory: system state space, discrete system, optimum control.'
- 'VIO: geometry, computer vision, nonlinear optimization, camera model and linear
  algebra'
- 'ROS: launch file, gazebo simulation, mavros, offboard control, ros bag'
learning_outcomes:
- Set up Linux-based development environment and cmake-based cross compiler environment.
- Use ROS to develop mobile robot especially drone control and navigation algorithm.
- Understand structure of visual inertial odometry algorithm including feature point
  matching approach of front-end and nonlinear optimization of back-end.
- Use drone kinematics and model-based control theory such as LQR, driftless flatness
  to design cascade controller of multirotor type drone, .
- Apply gazebo simulation to design and turning designed control and navigation algorithm
  of drone or other mobile robots.
learning_and_teaching_methods:
- Delivery of the module will be through a mixture of lectures, tutorial classes and
  computer laboratory sessions.
- The lectures will develop theory, lead students through worked examples and introduce
  the context for the module material.
- The tutorial classes will underpin and rehearse the skills demonstrated in the lectures
  and described module material.
- The practical sessions will utilise ROS and PX4 open source that supports drone
  control system simulation and design. Students will use this environment to achieve
  controller and state estimation algorithm covered in lectures.
- Active engagement with frequent practice on examples is strongly encouraged through
  regular course work and class tests.
