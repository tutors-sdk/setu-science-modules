reference: A07382
full_title: Communication Skills for Agriculturalists
short_title: Comm. Skills Ag.
credits: 5
level: Introductory
author: MCAHILL
history_comment: ''
school: Science and Computing
department: Science
cluster: IT
aim: This module will teach the student how to communicate effectively both in a written
  and oral context. Library skills and the sourcing of information will be taught.
  The referencing of sources, footnotes, bibliography, styles and plagiarism will
  be also be covered. Students will be taught presentation skills and will make a
  presentation on a topic of their choice.
