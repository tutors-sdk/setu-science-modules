assessment_criteria:
- '<40%: No presentation and/or no portfolio. Students must do both the presentation
  and the portfolio to pass.'
- '40%-49%: Presentation adequate, portfolio with 50% of material to an acceptable
  standard. Student can proofread a passage and write a business letter.'
- '50%-59%: Presentation good with clear ideas and logical structure. Portfolio complete
  with proofreading, letters, minutes, short report all good.'
- '60%-69%: Presentation logical and persuasive. Portfolio complete with proofing,
  reports, minutes and letter.'
- '70%-100%: Presentation with clear ideas and logical structure. Portfolio complete
  with proofreading, letters, minutes good, reports with appropriate references.'
