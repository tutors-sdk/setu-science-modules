  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Planning and structuring a piece of written communication: parts of speech, rules
  of grammar, rules of punctuation'
- Proof-reading skills, editing skills, reading and interpreting articles
- 'Writing a report: structure, development, delivery'
- 'Communication in teams: stages in team-building (forming, storming, norming, performing);
  composition of successful teams; SMART thinking; group cohesiveness/group thinking'
- 'Leadership: structure of formal meeting; role of secretary; role of chairperson,
  function of agenda, minutes, standing orders, motions'
- 'Making a presentation: identifying the audience, defining objectives, research,
  rehearsal; structuring a presentation'
- Finding and locating information, evaluating the quality, referencing sources, footnotes,
  bibliography, referencing styles, plagiarism
learning_outcomes:
- Identify information from reliable sources and reference material correctly.
- Reproduce letters, reports, minutes and memoranda.
- Report information orally and communicate information using audio-visual aids.
- Demonstrate the structures of a formal meeting, e.g. role of secretary, role of
  chairperson, function of agenda, minutes, standing orders, motions.
learning_and_teaching_methods:
