indicative_content:
- Sustainability, UN Sustainable Development Goals, climate legislation and targets,
  circular economy, social and economic impact of climate change.
- Sustainable drug discovery, development and processing. Green Chemistry and Engineering
  Principles, Metrics for measurement of process change impact, life cycle assessment.
- Process feedstock, solvent and reagent selection tools, biomass based alternatives
  to petroleum-based chemicals, alternative solvents such as DES and IL, solvent free
  processes, reuse and recycling of materials.
- Toxicological assessment of materials and products, LD 50, OEB and OEL.
- Sustainable API synthesis methodology examples such as catalysis-organo- and biocatalysis,
  flow chemistry, photochemistry, ultrasound and microwaves.
- Sustainable Analytical methodology, sampling protocols, chromatography, method development,
  PAT.
- Sustainable formulation methodologies including processing methods, green drug delivery
  platforms, packaging and stability.
- Lean tools applied to sustainability, green lean six sigma for sustainable development.
- Integration of renewable electrical and heat systems into pharmaceutical and fine
  chemical plants.
- Feasibility assessment, financial appraisal
learning_outcomes:
- Evaluate the legislative, environmental, social and economic aspects associated
  with climate change and sustainability.
- Appraise green and sustainable principles and tools for the synthesis, analysis
  and formulation, of pharmaceuticals and fine chemicals, including quality management
  principles.
- Assess the challenges and opportunities for sustainable packaging for Pharmaceutical/Biopharmaceutical/Medtech
  products.
- Critically interpret the application of Green and Sustainable principles through
  key case studies and examples.
- Critique the impact of green and sustainable process changes applied to a pharmaceutical
  or fine chemical process.
- Assess candidate sites for renewable energy deployments using the latest energy
  technologies.
- Develop a strategy to employ green and sustainable principles within an organisation
  incorporating current state of the art with relevant literature examples.
