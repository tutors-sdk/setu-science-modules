aim: This module will provide students with a detailed understanding of the legislative,
  environmental, social and economic effects of climate change and the response required
  by the pharmaceutical industry. Students will gain clear insight into green and
  sustainable principles, tools and methodologies for the synthesis, analysis, formulation
  and packaging of pharmaceuticals, including the application of quality management
  principles and renewable energy technologies. Students will critically assess case
  study examples and process changes and will develop key skills to deploy current
  state of the art in this area within an organisation.
