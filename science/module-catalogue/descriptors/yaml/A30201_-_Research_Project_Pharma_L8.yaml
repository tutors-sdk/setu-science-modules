assessment_criteria:
- '<40%: Insufficient level of research work performed in terms of quality and quantity
  of research output. Inadequate standard and knowledge of research topic evident
  through poor report writing and oral presentation skills.'
- '40%-49%: Adequate level of research work performed in terms of quality and quantity
  of research output. Adequate standard and knowledge of research topic evident through
  fair report writing and oral presentation skills.'
- '50%-59%: As well as the above, the student will display a good level of research
  work performed, in terms of quality and quantity of research output. Good standard
  and knowledge of research topic evident through good report writing and oral presentation
  skills, supplemented by an ability to present this knowledge in a clear and concise
  manner.'
- '60%-69%: In addition to the above, the student will demonstrate a very high level
  of research work performed in terms of quality and quantity of research output.
  High standard and knowledge of research topic evident through very good report writing
  and oral presentation skills, supplemented by an ability to present this knowledge
  to a high technical standard.'
- '70%-100%: All previous to an excellent level. In addition, the student will demonstrate
  an extensive level of research work performed, in terms of quality and quantity
  of research output. Excellent standard and knowledge of research topic evident through
  superior report writing and oral presentation skills, supplemented by an ability
  to present this knowledge to a very high technical standard.'
