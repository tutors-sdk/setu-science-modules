indicative_content:
- Planning and design of scientific project in the context of a literature review.
- Implementation of project work
- Preparation of written report on project.
- Interpretation and critical evaluation of results in the context of the relevant
  scientific literature
- Presentation of report at oral seminar/poster session
learning_outcomes:
- Design and plan a program of work after a critical evaluation of literature related
  to a scientific problem.
- Organise and safely implement a detailed research project.
- Manage work independently and demonstrate initiative towards set objectives, trouble-shooting
  related problems.
- Prepare and structure a comprehensive and referenced scientific report.
- Produce an oral presentation/poster to disseminate the results of a complex scientific
  review.
learning_and_teaching_methods:
- Project practical work.
- Preparation of scientific report, thesis.
- Oral presentation at research seminar or poster session.
