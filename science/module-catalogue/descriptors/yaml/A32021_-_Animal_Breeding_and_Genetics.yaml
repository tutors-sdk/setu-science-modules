reference: A32021
full_title: Animal Breeding and Genetics
short_title: Animal Breeding and Genetics
credits: 5
level: Intermediate
author: KMURPHY
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module introduces the student to the fundamental concepts of molecular biology,
  genetics and genomics, and their applications to animal breeding. The module contains
  a practical component where the student can develop molecular laboratory skills,
  logical thinking, analysis and report-writing skills.
programmes:
- timetable: AGRI-0106
  code: WD_SAGRI_B
  name: Bachelor of Science (Honours) in Agricultural Science
  stage: 3
  semester: 5
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Overview of genetics and genomics
- 'Molecular genetics: structure and properties of nucleic acids, DNA replication
  and repair, transcription and translation, DNA extraction, PCR'
- Domestication; qualitative and quantitative traits
- Crossbreeding, inbreeding
- Animal breeding and breeding policy
- National breed improvement strategies
- Genomic selection
learning_outcomes:
- Appraise the fundamental concepts of molecular biology, genetics and genomics and
  their applications to animal breeding.
- Demonstrate how molecular biology has improved the understanding of some areas of
  animal breeding.
- Appraise the fundamental concepts and principles of animal breeding and demonstrate
  how these are applied to breed improvement strategies.
- Communicate the importance of implementing breed improvement strategies.
- Apply knowledge and skill to analyse livestock production systems and evaluate economic
  returns from such systems.
- Use laboratory techniques and computer applications to demonstrate an understanding
  of molecular and quantitative genetics.
learning_and_teaching_methods:
