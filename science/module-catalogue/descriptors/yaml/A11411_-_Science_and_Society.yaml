indicative_content:
- 'Introduction to the philosophy of science: what is science?'
- 'Emergence and professionalism of modern science: rise of science and reasons for
  the rise of science'
- 'Boundaries of science: what is science and what is not?'
- 'Construction of scientific knowledge: essentialist and constructivist approaches'
- Introduction to ethics in science
- Review of issues in science and society, e.g. genetically modified (GM) foods, stem
  cell research, environment versus industry, climate change and the energy crisis
  etc.
learning_outcomes:
- Describe important episodes in the history of science.
- Describe how scientific knowledge is acquired and validated.
- Discuss different modern philosophical approaches to science (Popper, Khun).
- Discuss different ethical philosophies (Utilitarianism, Deontology, Consequentialism).
- Apply different ethical approaches to scientific and social debates, for example
  GM foods, stem cell research, environmental versus industry, climate change, energy
  crisis.
- Identify scientific arguments as they appear in scientific and popular texts.
