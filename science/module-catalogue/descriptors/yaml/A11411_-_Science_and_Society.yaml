aim: Science is important to all areas of human life. Understanding science, therefore,
  is essential to our ability to make informed decisions. This module aims to help
  students to develop and improve their scientific thinking and skills. Topics such
  as the development of science in the course of history, the structure of scientific
  theories and and the interrelationship between science and social, cultural, political
  and economic structures will be discussed.
