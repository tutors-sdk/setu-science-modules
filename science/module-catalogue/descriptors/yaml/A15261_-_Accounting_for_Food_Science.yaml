reference: A15261
full_title: Accounting for Food Science
short_title: Accounting for Food Science
credits: 5
level: Introductory
author: KGRENNAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: The aim of this module is to understand, prepare and interpret internal management
  accounting information and recommend business decisions based on their interpretation
  with specific reference to the food sector. Students will also learn the criteria
  used to make operational decisions.
programmes:
- timetable: ACCS-0006
  code: WD_SFDSC_D
  name: Bachelor of Science in Food Science with Business
  stage: 2
  semester: 3
  status: M
prerequisites: []
corequisites: []
indicative_content:
- General principles of management accounting
- Cost-volume-profit and break-even analysis
- Decision making (short-term)
- Pricing
- Budgeting and variance interpretation
- Management accounting issues and developments as applied to the food sector
learning_outcomes:
- Explain the basic cost terms, concepts and elements used to determine product and
  service costs.
- Distinguish between fixed and variable and calculate break-even points.
- Use costing information to recommend short-term courses of action and have an appreciation
  of non-financial factors used in decision making.
- Recognise and prepare aspects of the business budget process and be capable of interpreting
  major budget variances.
- Identify pricing techniques and the various options for pricing.
- Review current trends and issues in management accounting as applied to the food
  industry.
learning_and_teaching_methods:
