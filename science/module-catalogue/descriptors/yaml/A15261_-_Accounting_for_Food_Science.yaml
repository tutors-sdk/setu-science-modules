assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills'
- '40%-49%: Demonstrates a limited knowledge of the subject matter. May have some
  problems with critical thinking and problem solving. Adequate practical accounting
  skills.'
- '50%-59%: Demonstrates satisfactory general knowledge of the main issues within
  the subject. Good practical accounting skills.'
- '60%-69%: Demonstrates skilled and sound knowledge of the subject matter. Shows
  ability to analyse and logically organise accounts in an effective way. Good critical
  thinking and a high level of competence and efficiency in theoretical and practical
  areas of this subject.'
- '70%-100%: All of the above to an excellent level. Demonstrates authoritative handling
  of complex material and a highly developed and extensive understanding of the subject.'
