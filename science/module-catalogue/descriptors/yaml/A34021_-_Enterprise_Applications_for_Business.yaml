reference: A34021
full_title: Enterprise Applications for Business
short_title: Ent App for Bus
credits: 5
level: Advanced
author: BMCKEOWN
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Information Systems and Modelling
aim: This module will address Enterprise Applications that a business would use for
  interacting with multiple parts of an enterprise. Students will learn about different
  types of Enterprise Application systems and how they are designed to solve the problems
  encountered by different size enterprises. Emphasis is placed on how these applications
  provide productivity and efficiency to an enterprise's internal and supply chain
  processes.
programmes:
- timetable: ENTR-0043
  code: WD_KBUSY_G
  name: Higher Diploma in Science in Business Systems Analysis
  stage: 1
  semester: 2
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Introduction to common types of Enterprise Applications
- Strategies for selecting Enterprise Applications for different types of organisations
- Integration and middleware solutions
- Enterprise Resource Planning (ERP) systems -- functions, capabilities to support
  internal processes and flexibility for supply chain requirements
- Customer Relationship Management (CRM) systems for understanding and engaging with
  customers
- Supply chain business processes, activities, planning
- Supply Chain Management (SCM) solutions and technologies
learning_outcomes:
- Appraise different types of Enterprise Applications.
- Justify Enterprise Applications and integration tools for different size organisations.
- Assess Enterprise Systems within an organisation, focusing on ERP, CRM and SCM.
- Evaluate supply chain business processes, activities and planning.
- Assess solutions and technologies for improving supply chain performance.
- Demonstrate proficiency in the use of an Enterprise Application.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and computer-based practical's.
  *
- The lectures will be used to introduce new topics and their related concepts.
- Lectures will be supplemented by participative case studies and independent reading
  on the issues covered in the lecture material.
- The practical element is intended to provide the student with the skills needed
  to use and understand an Enterprise Application system.
- For online delivery, the lectures and practicals will be a combination of comprehensive
  rich media instructional content (notes), interactive synchronous video (live webinars/classes)
  and asynchronous interactive video playback (on-demand).
