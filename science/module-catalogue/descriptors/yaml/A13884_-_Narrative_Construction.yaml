indicative_content:
- Fundamental principles of drama, e.g. three act structure, narrative arcs, character
  development
- 'Communication skills: script treatment (i.e. introduction to idea for film script
  in written form)'
- 'Presentation skills: story pitch (and presentation of how the narrative adheres
  to and/or subverts Aristotlean principles of drama)'
- Scriptwriting
- Simple storyboarding
learning_outcomes:
- Plan a treatment for a three-act short film.
- Describe effective characters through action and dialogue.
- Complete a professional presentation that outlines the concept behind, and structure
  of, the student's narrative film script project.
- Write a short film script that contains a clear narrative, a solid three act structure
  and evidence (and/or subversion) of Aristotlean dramatic principles.
- Sketch a storyboard to illustrate how the script might be produced.
learning_and_teaching_methods:
- The module will be taught through lectures that will outline principles of narrative
  structure. Tutorials will consist of analysis of narrative structures and principles
  in film and television. There will also be regular writing tasks in tutorials. Student
  participation will be required in all classes.
- Requested accessible space with audio/visual equipment for playback.
