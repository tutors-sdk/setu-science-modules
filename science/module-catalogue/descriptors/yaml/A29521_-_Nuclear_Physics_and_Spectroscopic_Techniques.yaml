assessment_criteria:
- '<40%: Unable to demonstrate a basic understanding of course content.'
- '40%-49%: Able to (i) describe some basic nuclear properties and structure, (ii)
  give basic description of simple models of the nucleus and (iii) give a basic description
  of the standard model of particle physics.'
- '50%-59%: Able to (i) adequately describe basic nuclear properties and structure,
  and perform nuclear calculations and (ii) give adequate descriptions of simple models
  of the nucleus and of the standard model of particle physics.'
- '60%-69%: Able to apply given problem-solving techniques to new similar problems.'
- '70%-100%: All the previous to an excellent level.'
