indicative_content:
- 'The Nucleus: review of the nucleus and radiation; nuclear instability and energy
  levels'
- 'Nuclear collisions and reactions: nuclear fission and the thermal fission reactor'
- Nuclear models including Liquid Drop Model and SEMF, Shell Model
- 'Interaction of radiation with matter: radiation detection techniques including
  high-resolution gamma ray spectroscopy'
- Generation and Nature of X-rays; X-ray Photoelectron Spectroscopy (XPS) and Auger
  Electron Spectroscopy (AES)
- Scanning Electron Microscopy (SEM); EDX and WDX spectroscopy
- Ion beam techniques and Secondary Ion Mass spectroscopy (SIMS)
learning_outcomes:
- Appraise the basic properties of the nucleus, the factors affecting the stability
  of the nucleus and perform routine calculations using decay laws.
- Appraise the concept of a nuclear cross section via nuclear collision reactions
  and perform calculations.
- Construct a model of the nucleus using the Liquid Drop Model and the Shell Model
  and apply the SEMF to determine nuclear binding energy.
- Appraise the principles of radiation detection and measurement.
- Appraise the principles of a number of advanced spectroscopic techniques.
- Test the knowledge gained in class using experiments involving gamma-ray spectroscopy,
  SEM and mass spectroscopy.
