indicative_content:
- 'Biopharmaceutical products: biologics; immunotherapies; vaccines; stem-cell therapeutics;
  gene therapies; biosimilars; biosuperiors'
- 'Core concepts in molecular biology and recombinant protein production: gene requirements;
  transfection and cloning; prokaryotic and eukaryotic cell culture systems'
- Optimisation of biopharmaceutical product and bioprocessing; upstream and downstream
  bioprocessing; screening and selection of cells; cell line engineering; metabolic
  engineering; post-translational modifications
- Case studies of recent biopharmaceutical products & emerging technologies/topics
  in biopharmaceutical production (transgenics, cell line engineering, designer peptides
  etc.)
- Ethics and public concern over biopharmaceutical production from genetically modified
  organisms
- Introduction to mammalian cell culture; history, perspectives and biology of cultured
  cells
- Sources of mammalian cells & types available; selection of appropriate media, supplements
  and growth conditions for different cell lines; bioreactors
- Importance of sterility, good culture practice (aseptic techniques), clean room
  and environmental control; sources of biocontamination and detection and elimination;
  disposal of cells and health & safety in cell culture lab
- Generation and maintenance of cell banks; maintenance and sub-culturing of cell
  lines; cell counting and viability checks
- 'Proteomics in biopharmaceutical analysis and quality control: protein/peptide and
  post-translational modification analysis using spectroscopic, chromatographic, electrophoretic
  and other analytical techniques e.g. capillary electrophoresis, SDS-PAGE, Western
  blot, advanced mass spectroscopy, ion chromatography and nuclear magnetic resonance
  spectroscopy'
- 'Bioassays and immunoassays in biopharmaceutical analysis and quality control: cell-based
  assays, immunoassays, flow cytometry, cytometric bead arrays, binding assays and
  surface plasmon resonance'
- 'Genomics in biopharmaceutical analysis and quality control: DNA sequencing, micro-array
  analysis and real-time PCR'
learning_outcomes:
- Evaluate the principles of biopharmaceutical analysis and cell culture.
- Evaluate the different techniques (traditional and modern) used in biopharmaceutical
  analysis and cell culture.
- Design suitable practical techniques for biopharmaceutical analysis from troubleshooting
  to successful experimental outcomes.
- Determine the appropriate medium and growing conditions for different mammalian
  cells and manage routine maintenance and troubleshooting of the cells.
- Appraise approaches for method developments and future trends in the area of biopharmaceutical
  analysis and cell culture through scientific literature.
- Comment on current and emerging biopharmaceutical products, trials and topics such
  as ethics and public concern.
