assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of biopharmaceutical
  analysis and cell culture.'
- '40%-59%: Ability to show limited understanding of the fundamentals of biopharmaceutical
  analysis and cell culture. May have some difficulty with applying the theory. Will
  display some ability with associated demonstrations as well as basic critical thinking
  and problem-solving skills.'
- '60%-69%: As well as the above, ability to show reasonable understanding of the
  complexities of biopharmaceutical analysis and cell culture, and predict some trends
  in analytical results. Will display reasonable competence with associated laboratory
  demonstrations as well as good critical thinking and problem-solving skills.'
- '70%-100%: All the above to an excellent level. In addition, will be able to demonstrate
  comprehensive knowledge and understanding of biopharmaceutical analysis and cell
  culture-related issues. Should also have the ability to critically evaluate and
  relate topics in cell culture with biopharmaceutical production and analysis.'
