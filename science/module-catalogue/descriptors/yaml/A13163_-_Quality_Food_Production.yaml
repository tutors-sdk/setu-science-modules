reference: A13163
full_title: Quality Food Production
short_title: Quality Food Production
credits: 5
level: Intermediate
author: ICASEY
history_comment: ''
school: Science and Computing
department: Science
cluster: Food Science
aim: This module will enable the student to have a comprehensive understanding of
  the issues related to farm food safety, and quality issues relevant to the modern
  food chain.
programmes:
- timetable: FDSC-0006
  code: WD_SAGUL_D
  name: Bachelor of Science in Agriculture
  stage: 3
  semester: 6
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Introduction to the food chain
- Quality assurance principles and hazard analysis principles
- Animal feed safety, quality and traceability
- Animal medicines
- Pathogens and biosecurity
- Animal welfare
- Hygiene
- Crops and horticultural produce
- Food quality
learning_outcomes:
- Analyse the modern food chain.
- Analyse the issues related to farm food safety and quality.
- Complete a hazard analysis approach to farm food production.
- Determine the important hazards and compliance requirements for feeds and medicines.
- Explore the issues relating to pathogens and biosecurity risks.
- Prepare a report addressing the key animal welfare issues and all requirements of
  the Bord Bia Scheme.
- Debate the quality and food safety issues relating to field crops and horticultural
  produce.
