reference: A14882
full_title: Project 2 IT (Prototyping)
short_title: Project 2 IT (Prototyping)
credits: 5
level: Advanced
author: TMCDONALD
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Professional Skills
aim: This module gives the student experience in developing a computing-related project
  based on the work the student has done in Project 1, semester 7. The student will
  present their work at the end of the module by submitting a final report, in addition
  to a poster, a short video, and a presentation/demonstration.
