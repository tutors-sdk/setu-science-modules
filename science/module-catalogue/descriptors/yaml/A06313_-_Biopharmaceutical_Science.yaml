aim: This module will provide an introduction to recombinant DNA technology and its
  relevance in the production of biopharmaceuticals. This will include the analysis
  of DNA structure and function, as well as the processes of cloning, screening and
  gene expression studies. The fundamental principles governing mechanisms of drug
  action and pharmacokinetics will also be provided.
