indicative_content:
- 'Molecular genetics & biotechnology: DNA structure and function; DNA replication,
  transcription and translation; gene transfer and plasmids; restriction enzymes,
  vectors, cloning and screening; PCR; biopharmaceutical production by fermentation,
  harvesting and purification; monoclonal antibody production; gene therapy'
- 'Microbiology: microbial nutrition and metabolism; microbial culturing and aseptic
  techniques; microbial growth; isolation of a pure culture; physical and chemical
  methods for controlling growth; action of antibiotics; antimicrobial drugs'
- 'Immunology: the immune system; antibodies and interferon; immune tolerance and
  autoimmune disease'
- 'The biopharmaceutical industry: growth and development of the industry; biopharmaceutical
  products; current/future trends; drug development and regulation'
- 'Human physiology & pharmacology: introduce the basic concept of drug interaction
  and the major systems of the human body; absorption, distribution, metabolism/biotransformation
  and elimination of drugs; bioavailability of drugs'
learning_outcomes:
- Describe the basic technologies used to produce recombinant DNA.
- Review the role of recombinant DNA technologies in the production of biopharmaceuticals.
- Demonstrate how molecular biology has improved our understanding of many areas of
  biology and medicine.
- Identify the potential of micro-organisms for antibiotic and pharmaceutical production.
- Explain the rapid growth in the biopharmaceutical industry and discuss its control
  and future potential.
- Discuss the fundamental principles of mechanisms of drug action and pharmacokinetics.
- Use laboratory techniques to design simple strategies for the manipulation of DNA,
  examine common bacteria, assess antibiotic efficacy, utilise ELISA techniques and
  to identify micro-organisms as well as assess hygiene levels using rapid identification
  / detection methods.
- Record results of laboratory work using a combination of formal written laboratory
  reports and worksheets.
