indicative_content:
- History of Irish agricultural trade and agriculture's current contribution to the
  national economy
- 'Principles of agricultural policy: Principles of microeconomics; Rationale for
  support for agriculture; Alternative support measures; Agriculture as provider of
  public goods; Economic, social and environmental implications'
- 'European Union and the Common Agricultural Policy: Enlargement; Objectives and
  Reform of the CAP; EU Budget and Ireland''s contribution; non-market CAP policies
  and policies impacting on agriculture'
- 'Comparative agricultural support systems: EU (CAP) v USA v Asia/Pacific v South
  America'
- Principles of macroeconomics and international economic developments
- 'International trade in agricultural products: Current and emerging trade patterns;
  WTO rules and commitments; Trade conflicts'
- 'Long term trends analysis: Population; incomes; lifestyle/market preferences; environmental
  protection; energy conservation; global warming'
- 'Agricultural data sourcing and analysis: Compendium of Agricultural Statistics
  (Department of Agriculture, Food and the Marine); National Farm Survey - current
  and recent trends (Teagasc); Annual Review and Outlook in Agriculture, Food and
  the Marine (DAFM); Aggregate output, input and incomes - current and recent years
  (CSO); International data (OECD)'
learning_outcomes:
- Evaluate the contribution of agriculture to national economic, social and environmental
  objectives.
- Appraise current developments in the national and international economic environment.
- Assess key features of agriculture support policy regimes.
- Assess the implications for agriculture of likely trends emanating from the sector
  itself or from outside the sector.
- Collect and analyse data relevant to general performance and the agricultural sector
  in particular.
learning_and_teaching_methods:
