assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter.'
- '40%-49%: Demonstrate a good knowledge of the key learning outcomes including the
  contribution that agriculture makes to the Irish economy. The student will be able
  to source relevant data and present it in both assignment and exam.'
- '50%-59%: Demonstrate a good understanding of agriculture in the wider EU and world
  context. The student will be able to source relevant data and present it in a clear
  manner in both assignment and exam.'
- '60%-69%: Demonstrate a detailed knowledge of all the topics including the impact
  of European and world trade on Irish agriculture. The student will be able to source
  key data and present it in a clear manner in both assignment and exam.'
- '70%-100%: Demonstrate comprehensive knowledge and understanding of all learning
  outcomes, including the current and future trends in Irish, EU and competitor trading
  blocks. The student will be able to source key data and present it in a convincing
  manner in both assignment and exam.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
