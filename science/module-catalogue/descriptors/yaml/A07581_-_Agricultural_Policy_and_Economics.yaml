aim: The purpose of this module is to study and evaluate the wider economic and policy
  environment which influences the agricultural industry. A wide range of topics are
  studied which directly or indirectly have a bearing on policy development, the economic
  prospects of the sector, and influence the contribution of agriculture to wider
  social and environmental objectives.
