indicative_content:
- Introduction and Overview
- Structure and organisation of the computing industry
- Marketing of high-technology products
- Market dynamics of the Computer Industry
- Intellectual Property Rights
learning_outcomes:
- Describe the organisational structure of key computer industry sectors.
- Examine the macro and micro-environmental factors that impact the computer industry.
- Examine the marketing strategies adopted by a company in the computer industry.
- Distinguish between the various forms of intellectual property rights.
- Express ideas and information clearly in visual, oral and written forms through
  in-class activities.
learning_and_teaching_methods:
- Interactive and open-forum lectures will be used to introduce new concepts and to
  consider the concepts' implications for module deliverables.
- Self-directed learning activities will require students to will reflect upon the
  module materials, diagnose their learning needs and conduct research to satisfy
  these needs.
