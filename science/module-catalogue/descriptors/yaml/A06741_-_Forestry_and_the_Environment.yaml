indicative_content:
- Forest interactions with climate, soil, water and biodiversity
- Forestry as a land use and its impact on landscape and archaeological heritage
- Forest management for recreation and urban forestry; forest ecosystem services
- Forestry and sustainable rural development, farm forestry
- Irish forests and its stakeholders
learning_outcomes:
- Employ forest landscape design techniques which conform to statutory environmental
  safeguards regarding forest recreation, archaeological heritage, water and ecology.
- Describe the complex relationship between forests and their external/internal environments.
- Determine the ecosystem services provided by forests.
- Recognise and identify archaeological sites and monuments and the impact such sites
  have on Forest management.
learning_and_teaching_methods:
- 'Lectures: will be used to describe the knowledge areas covered by the module.'
- 'Field practical: will provide students with the opportunity to gather data for
  project work.'
- 'Continuous assessment: individual or group assignments in landscape design planning,
  recreation management, forestry & archaeological heritage, and forest ecology/ecosystem
  services.'
