aim: This module recognises forests as more than simply timber production systems.
  Land use in Ireland past and present and the impacts of forestry on the landscape,
  and on water, soil, biodiversity and archaeological heritage are discussed. Climate
  change, forest habitats, biodiversity and the recreation and amenity potential of
  forests are also covered. An important component of the module is carrying out assignments
  on forest recreation, archaeological heritage, forest landscape design planning
  and forest ecosystem services.
