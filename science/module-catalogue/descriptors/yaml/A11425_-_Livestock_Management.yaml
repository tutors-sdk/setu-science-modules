aim: This course is designed for students who already have a basic knowledge of animal
  production. The course will examine the fundamentals of grass production and sustainable
  animal nutrition. It will explore animal health and behaviour. Modern wintering
  systems will be compared. Animal breeding and genetic programmes will be evaluated.
