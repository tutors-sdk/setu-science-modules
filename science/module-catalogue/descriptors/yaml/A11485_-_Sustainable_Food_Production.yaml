assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills.'
- '40%-49%: Demonstrates a limited knowledge of the subject matter. May have some
  problems with critical thinking and problem solving. Adequate practical skills.'
- '50%-59%: Demonstrates satisfactory general knowledge of the main issues within
  the subject. Good practical tasks.'
- '60%-69%: Demonstrates skilled and sound knowledge of the subject matter. Shows
  ability to analyse and logically discuss in an effective way. Good critical thinking
  and a high level of competence and efficiency in theoretical and practical areas
  of this subject.'
- '70%-100%: All of the above to an excellent level. Demonstrates authoritative handling
  of complex material and a highly developed and extensive understanding of the subject.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
