indicative_content:
- 'Salad crops, scallions, lettuce and celery: Soil, site and rotation. Cultivars.
  Sowing/planting and irrigation. Cultivation and nutrition. Weed, pest and disease
  control including SUD/IPM. Harvesting and grading'
- 'Rhubarbs, asparagus, courgettes and sweetcorn: Site selection and soils. Cultivars.
  Cultivation and nutrition. Weed, pest and disease control including SUD/IPM. Harvesting
  and grading'
- 'Leeks, peas and beans: Site selection and soils. Cultivars. Cultivation and nutrition.
  Weed, pest and disease control including SUD/IPM. Harvesting and grading'
- 'Beetroot, radish and spinach: Site selection and soils. Cultivars. Cultivation
  and nutrition. Weed, pest and disease control including SUD/IPM. Harvesting and
  grading'
- 'Herbs (culinary and medicinal): Market size and outlet. Range of herb crops. Site
  selection and soils. Cultivation and nutrition. Weed, pest and disease control including
  SUD/IPM. Harvesting and grading'
- 'Blueberries, blackberries and currants: Propagation methods. Choice of varieties.
  Nutrition Soil preparation and planting. Pest disease and weed control including
  SUD/IPM. Picking, training and pruning'
- Nitrates Directive, FSAI regulations, Bord Bia QA scheme, Origin Green, Pesticide
  Control/Registration
- 'Organic Conversion: Time periods, and preparation of application form'
- Pest and disease management in an organic system 'v' conventional systems
- Soil fertility and management in an organic system 'v' conventional systems
- Regulation of organic production, grading and marketing of produce
learning_outcomes:
- Analyse the propagation and production of a range of food crops (including vegetables,
  fruit and herbs) under sustainable systems.
- Produce a conversion plan for an organic production system.
- Complete routine tasks associated with specialty crops.
- Relate the requirements of the quality assurance schemes, EU directives, and other
  regulations to management strategies in food production systems.
