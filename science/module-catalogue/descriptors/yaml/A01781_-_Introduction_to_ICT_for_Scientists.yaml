indicative_content:
- Introduction to basic PC hardware components; introduction to Moodle; e-mail for
  attaching/extracting files and e-mail etiquette; managing your online identity
- Familiarity with the MS Windows environment, particularly the use of Windows Explorer
  for the management of data files and folders
- Introduction to the use of MS Word for word processing & familiarity will basic
  formatting techniques
- Use of MS Word to format a document to a scientific report standard; generation
  of tables of scientific data
- Use of MS Equation Editor to construct mathematical equations
- Introduction to the use of MS PowerPoint to give presentations on a scientific topic
- Use of MS Excel to perform basic scientific calculations; use of Chart Wizard to
  graph simple functions
- Formatting of graphs & tables in MS Excel for incorporation into reports
learning_outcomes:
- Identify PC components and gain a competency in basic computer housekeeping skills.
- Apply MS Word and PowerPoint to compile and present scientific data in a clear and
  comprehensible manner, to a standard acceptable for scientific reports and presentations.
- Apply Ms Excel to manipulate and graphically display trends in laboratory data.
- Use Ms Excel to interpret data from scientific experiments.
