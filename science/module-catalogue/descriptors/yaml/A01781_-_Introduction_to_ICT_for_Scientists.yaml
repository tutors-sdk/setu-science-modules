reference: A01781
full_title: Introduction to ICT for Scientists
short_title: Intro to ICT for Scientists
credits: 5
level: Introductory
author: JFRISBY
history_comment: ''
school: Science and Computing
department: Science
cluster: IT
aim: This module will provide the student with a general introduction to the fundamentals
  of PC-based computing from a scientific perspective. The student will gain a competency
  in the Microsoft Windows operating environment, as well as a proficiency in file
  and data management. An introduction to the basic principles of word processing,
  spreadsheets and presentations will be given. This will involve the manipulation
  of specific examples of a scientific nature, including laboratory results and data.
  Report writing and presentation skills will be acquired, such that the student can
  competently compile scientific data into a format acceptable for reports and presentations.
