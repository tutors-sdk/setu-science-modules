assessment_criteria:
- '<40%: Little or no understanding of the basic file management or applications of
  ICT to scientific analysis. Little or no demonstration of word processing, spreadsheet
  & presentation skills.'
- '40%-49%: Adequate file management skills & fair understanding of the basic applications
  of ICT to scientific analysis. Demonstration of rudimentary word processing, spreadsheet
  & presentation skills.'
- '50%-59%: As well as the above, will demonstrate good file management skills & a
  good understanding of some of the applications of ICT to scientific analysis. Will
  possess good word processing, spreadsheet & presentation skills.'
- '60%-69%: In addition, will demonstrate very good file management skills & understanding
  of the applications of ICT to scientific analysis. Will possess very good word processing,
  spreadsheet & presentation skills.'
- '70%-100%: All the above to an excellent level, in addition to a superior standard
  of word processing, spreadsheet & presentation skills.'
