indicative_content:
- Software control
- Micro-controller programming and interfacing methods
- Data and power mixing and filtering techniques
- Printed circuit board design and build
- Data transmission theory specific to calculation & analysis
- Simulation techniques and resources
learning_outcomes:
- Achieve a level of expertise in RS422/485 nodal communications and implementation.
- Implement a specific PCB design application for node fabrication and build.
- Evaluate various filtering methods for data removal and superposition on a 50/60
  Hz system.
- Develop methods to dynamically adjust bandwidth to accommodate variances in data
  demand, (emulating Smart Grid).
- Analyse the resultant data and compare transmission rates, BER, and attenuation
  with theoretical derivation.
- Present project outcomes to a peer group within engineering.
- Demonstrate the professional, ethical, and effective communications of a professional
  engineer.
learning_and_teaching_methods:
- RS422/485 methods, (design theory and practical)
- Printed Circuit Borad design, fabrication and population, (self-directed learning
  and staged assessment)
- Signal mixing and filtering, (theory and practical)
- Data transmission and retrieval QoS (theory and practical)
- Self-directed learning, tutorials, moodle and recommended software
