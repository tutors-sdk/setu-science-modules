reference: A13121
full_title: Smart Grid Communications Technology
short_title: Smart Grid Comms Technology
credits: 5
level: Intermediate
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Data Communications
aim: The aim of this module is to direct the student towards a professional level
  of project research and implementation and the ability to achieve a level of expertise
  in telecommunications superimposed on power transmission lines. This module provides
  an insight into Smart Grid systems where the student as member of a team, will develop
  and build a transducer node that will communicate over a local ELV 50Hz closed grid.
