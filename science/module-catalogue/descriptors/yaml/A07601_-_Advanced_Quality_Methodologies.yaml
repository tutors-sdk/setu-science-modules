aim: This module covers aspects of quality management, including advanced quality
  systems such as Lean Manufacturing, Six Sigma and Risk Management, instrument validation
  and calibration management systems. It also looks at leadership, Innovation Management
  and Process Planning. It prepares the student for work in the pharmaceutical, healthcare
  or food industries, which operate under strict quality management regulations.
