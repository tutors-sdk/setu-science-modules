indicative_content:
- Leadership, Change, Innovation, Strategic Management, Competitive advantage, Planning
  incl. Process Analysis, Affinity Diagrams
- 'TQM Gurus: Deming, Crosby and Juran'
- Benchmarking, Quality Function Deployment
- Instrument validation, calibration management systems and traceability
- 'TQM: Lean Manufacturing, Lean thinking, tools such as Kaizen, TRIZ etc, Six Sigma'
- 'Risk Management: Risk based thinking, Business Process reengineering'
- Mini project involving a critical review of peer reviewed journal articles on a
  related topic
learning_outcomes:
- Select appropriate leadership, planning and innovation management skills in an industrial
  environment.
- Assess advanced quality management systems and their suitability in industry.
- Critique current research in quality management.
- Plan an instrument validation and calibration management system.
learning_and_teaching_methods:
- Lectures.
- Independent research into related topics.
- Set examples.
- Mini project.
- Discussion.
