assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of food
  microbiology. Lack of competence with associated laboratory skills & practices &
  an inability to carry out critical thinking.'
- '40%-49%: Will show a limited understanding of food microbiology. May have some
  difficulty with applying critical thinking and problem-solving. Will display basic
  ability with associated laboratory skills & practices.'
- '50%-59%: As well as the above, the student will show a good understanding of the
  food microbiology covered with demonstration of some critical thinking & problem-solving
  skills. Will display good competence with associated laboratory skills & practices.'
- '60%-69%: In addition to the above, will demonstrate more detailed knowledge of
  food microbiology, very good critical thinking skills & a high level of competence
  & efficiency in associated laboratory practicals.'
- '70%-100%: All of the above to an excellent level.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
