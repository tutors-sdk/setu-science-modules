indicative_content:
- Relationships between micro-organisms and food
- Food poisoning and food-borne disease
- Food fermentations, probiotics, prebiotics
- Food spoilage
- Factors affecting growth of micro-organisms in food
- Methods of food preservation
- Food safety issues
- Microbiological testing of foods for general quality, indicator organisms and specific
  pathogens
- Review of major groups of micro-organisms important in food, e.g. Salmonella, E.
  coli O157 and other verotoxigenic E. coli, Campylobacter, S. aureus, Bacillus spp.,
  Clostridium perfringens, Listeria spp., lactic acid bacteria, probiotics, enteric
  viruses
- Microbiological quality assurance methods; HACCP
learning_outcomes:
- Describe the major groups of microbes as they relate to food.
- Use standard laboratory techniques to examine food microbiologically for indicator
  organisms, specific pathogens and major groups of food related microbes.
- Discuss food poisoning and its prevention.
- Identify methods used for food preservation.
- Use standard laboratory techniques to demonstrate food preservation methods.
- Recognise different types of food fermentations and outline the role of starter
  cultures.
- Discuss the potential of functional foods containing probiotics or prebiotics.
- Record results of laboratory work using worksheets.
