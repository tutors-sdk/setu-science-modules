indicative_content:
- 'Animal physiology: structure and function of animal cell and main body organs,
  e.g. heart, lungs, kidneys, liver, immune system'
- 'Living processes in animals: monogastric and ruminant digestive; reproduction;
  cellular respiration and enzyme activity'
- 'Meat quality: meat cuts and changes in meat post-slaughter'
- 'Animal nutrition: common foods and classification; food analysis tables; energy
  and protein requirements; diseases and disorders associated with animal nutrition'
- 'Microbiology: characteristics of microorganisms; role of microorganisms in causing
  disease and in food production'
learning_outcomes:
- Explain the structure and function of the animal cell, cell organelles, the heart,
  lungs, liver, kidney and relate to animal health.
- Describe the structure and function of the male and female reproductive tracts,
  and discuss animal reproduction.
- Outline the structure and function of the monogastric and ruminant digestive tract,
  and relate to the management of animal nutrition.
- Discuss the basic properties, function of feeds and feed requirements in animals,
  including diseases and disorders associated with animal diet.
- Describe the slaughtering process and outline the factors that influence the quality
  of meat post-slaughter.
- Discuss how enzymes function and explain cellular respiration.
- Describe microorganisms and discuss microbiology as it relates to agriculture and
  food production.
- Operate safely in a laboratory and perform basic laboratory experiments with animal
  tissues and maintain appropriate records of lab activities.
learning_and_teaching_methods:
- Lectures.
- Laboratory dissections of animal organs.
- Laboratory demonstrations of different feed types.
- Video/CD presentations.
