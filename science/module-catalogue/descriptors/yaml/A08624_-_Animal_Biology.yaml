aim: This module is designed to equip students with a introductory understanding of
  animal physiology, including the structure and function of the animal cell, various
  animal organs and systems. Students will learn about the primary meat cuts and how
  to guarantee high quality meat post-slaughter. The student will also gain an insight
  into the basic properties of feed nutrients and associated nutritional-related disorders,
  and will examine the foremost animal feeds used in the main agricultural enterprises
  in Ireland. The module also explores the basics of microbiology. The student will
  learn to operate safely in a laboratory, performing dissection-based explorations
  of animal anatomy.
