school: Science and Computing
department: Computing and Mathematics
cluster: Media Production
aim: This module builds on strengths already gained in programming, digital media,
  and user experience. Students will build platform appropriate/independent UIs to
  develop software which uses or interacts with digital media by using relevant tools,
  software libraries, software frameworks, and environments.
programmes:
