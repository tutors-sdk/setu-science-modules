indicative_content:
- Fundamental Semiconductor Theory
- The Schottky Diode
- The Junction Diode
- Optoelectronic Devices
- Semiconductor TCAD Tools
learning_outcomes:
- Illustrate the fundamental concepts of solid state theory as applied in the analysis
  of carrier transport in semiconductor materials.
- Explain the fundamental physical processes employed in the fabrication of semiconductor
  diode structures.
- Demonstrate sound knowledge of the fundamentals of design, operation and fabrication
  of schottky, junction and optoelectronic diode devices.
- Apply the knowledge and comprehension gained in evaluating and relating macroscopic
  semiconductor diode performance parameters to semiconductor solid state theory and
  associated fabrication processes.
- Utilise the tools and methods employed in carrier transport analysis and process
  simulation for semiconductor diode structures.
