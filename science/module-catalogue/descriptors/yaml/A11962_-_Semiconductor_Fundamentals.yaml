aim: The course aims to introduce the student to the fundamentals of solid state theory
  in support of the analysis and design of semiconductor materials and devices. A
  comprehensive review of the design, operation and fabrication of schottky, junction
  and optoelectronic diodes is undertaken. Semiconductor device design and process
  simulation tools are also concurrently introduced.
