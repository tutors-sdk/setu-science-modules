indicative_content:
- People management as an exchange relationship, and conflict and cooperation in the
  exchange relationship
- 'People as a resource: Theoretical models of matching people management approaches
  to organisational strategy'
- 'Resourcing the organisation: Focus on the importance of `fit'' in matching the
  person and the organisation'
- 'Managing Performance: Focus on maximising employee discretionary effort /performance
  to encourage employees to work beyond contract'
- 'Organisational Justice: Focus on the regulation and resolution of workplace issues
  to achieve fairness and consistency in the employment relationship'
learning_outcomes:
- Appraise the theoretical models that explain different management approaches in
  managing the employment relationship.
- Examine resourcing methods and regulatory obligations that enable organisations
  to fit the person and the organisation.
- Analyse different forms of employee involvement practices designed to encourage
  employees to work beyond contract.
- Examine organisational processes and regulatory obligations for resolving workplace
  employee relations issues.
