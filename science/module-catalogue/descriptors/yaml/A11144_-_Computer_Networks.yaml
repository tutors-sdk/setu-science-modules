indicative_content:
- Introduction to Computer Networks and Protocols
- OSI and TCP/IP models
- Ethernet and VLANs
- IPv4 Addressing and subnetting
- IPv6
- Routing
- Transport Layer Protocols and Functionality
- Application Layer Protocols and Functionality e.g. HTTP, FTP, DNS, SMTP
- Wireless LANs
- Network Management
learning_outcomes:
- Use network protocol models and tools to explain communications in data networks.
- Describe in detail the major components, operation and functionality of a computer
  network and commonly used protocols and services.
- Construct an IPv4/IPv6 addressing design solution.
- Build a simple network using routers and switches.
- Use Cisco command line interface to perform basic router and switch configuration.
- Implement a basic wireless network.
- Describe basic computer network management concepts.
learning_and_teaching_methods:
- The practical lab component will be delivered in one double lab session.
- There is a strong emphasis on practical, lab-based exercises.
