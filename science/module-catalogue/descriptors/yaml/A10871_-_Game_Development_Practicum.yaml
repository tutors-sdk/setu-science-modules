prerequisites: []
corequisites: []
indicative_content:
- Manage a small to medium sized game project
- Design a small to medium sized game or game artifact
- Develop a small to medium sized game or game artifact
- Communication and presentation of ideas in correct, clear and modern format
learning_outcomes:
- Combine knowledge, skills or practices from (at least) two game development modules
  to develop a multi-featured game.
- Construct and present a working game or game artefact.
- Construct a game design document and present this work in a clear and accessible
  way.
- Research and implement an agile software development methodology and present this
  work in a clear and accessible way.
learning_and_teaching_methods:
- Lectures and practicals will be used to introduce new concepts and to consider the
  concepts' implications for module deliverables.
- Self-directed learning activities will require students to reflect upon the module
  materials, diagnose their learning needs and conduct research to satisfy these needs.
- Peer learning -- students will be encouraged to work in small collaborative groups
  to jointly consider and analyse in-class materials and to devise solutions to problems
  posed by the lecturer.
