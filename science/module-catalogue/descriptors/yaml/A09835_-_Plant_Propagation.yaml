indicative_content:
- 'Principles of propagation from seed: Preparing seed for sowing, sowing media, sowing
  seed, and raising plants'
- Types of cuttings, systems, requirements for rooting, and cutting skills
- 'Principles of grafting and budding: Techniques, equipment required, and grafting
  skills'
- 'Principles of division and layering: Division operations, and layering operations'
- Tissue culture principles and techniques
learning_outcomes:
- Use a range of propagation techniques such as growing plants from seed, cuttings,
  grafting or budding, division and layering.
- Describe the production of plants from seed, cuttings, grafting or budding, division
  and layering.
- Describe the procedure of plant production by tissue culture.
- Operate safely in a nursery work environment.
