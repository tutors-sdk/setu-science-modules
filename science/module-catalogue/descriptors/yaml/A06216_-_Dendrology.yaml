  status: M
prerequisites: []
corequisites: []
indicative_content:
- Introduction to dendrology
- Rules and use of scientific classification and nomenclature
- Building and use of dichotomous plant keys
- Conifers and broadleaves (three field trips)
learning_outcomes:
- Identify the major tree species of Ireland from living specimens as well as from
  samples of flowers, twigs, leaves, fruits, and written descriptions.
- Use rules of scientific nomenclature to correctly present the common and binomial
  names.
- Employ dichotomous plant keys to identify unknown species.
- State major and minor uses of each species.
- Describe physical, biological, ecological and silvicultural features associated
  with the major tree/forest types in Ireland.
learning_and_teaching_methods:
- Lectures.
- Demonstrations.
- Assigned reading.
- Hands-on classes.
- Field study.
- Preparation of a 20 species herbarium.
