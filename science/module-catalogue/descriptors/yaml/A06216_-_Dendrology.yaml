reference: A06216
full_title: Dendrology
short_title: Dendrology
credits: 5
level: Introductory
author: MSOTTOCORNOLA
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: This module includes the identification, classification, nomenclature, ecology
  and geographic range of the major tree species of Ireland, and the more common understory
  vegetation associated with forestry. Students will learn to use dichotomous keys
  in the field identification of trees. This module will also provide a comprehensive
  knowledge of the silviculture and uses of the main Irish forest tree species.
