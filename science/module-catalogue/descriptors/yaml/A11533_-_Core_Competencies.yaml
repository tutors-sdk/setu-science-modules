reference: A11533
full_title: Core Competencies
short_title: Core Competencies
credits: 5
level: Introductory
author: BWHELAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Quality, Regulatory and Compliance
aim: This module will enable the student to develop learning and information handling
  strategies, scientific report writing and critical thinking skills essential to
  study at third level, and to increase their awareness of the pharmaceutical business
  enterprise.
programmes:
- timetable: PHAR-0015
  code: WD_SGMPT_C
  name: Higher Certificate in Science in Good Manufacturing Practice and Technology
  stage: 1
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Guide to learning styles, critical thinking strategies
- Scientific writing, report writing, referencing conventions; introduction to research
  methodology
- Presentation skills
- Managing meetings at work, effective decision making, project management
- Motivation, time and information managing skills
- 'Introduction to reflective practice: developing reflective skills; understanding
  the need for reflective practice'
- 'Leadership skills: persuading, strategic thinking, intuitive decision making, networking'
learning_outcomes:
- Identify learning strategies and intelligences.
- Complete scientific reports using appropriate writing skills and library searching
  techniques.
- Recognise and employ techniques of critical thinking, construction of argument and
  decision-making.
- Express themselves both orally and in writing using technology as an aid.
- Demonstrate skills, attitudes and behaviours appropriate to managing or working
  in a successful business enterprise.
learning_and_teaching_methods:
- Lectures.
- Group discussion.
- Case studies.
- Role play.
- Guest speaker.
