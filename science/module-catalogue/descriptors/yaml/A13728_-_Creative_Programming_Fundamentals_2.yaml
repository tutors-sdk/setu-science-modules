indicative_content:
- 'Employing and extending objects: Creating and using an array object; Catching exceptions'
- 'Working with numbers and strings: Using built in objects and internal methods'
- Working with the Window object in Creative Programs
- Working with core libraries
- 'Extend: Working with cameras in creative programs and using other libraries: Using
  video and video playback;adding camera images and analysis; manipulating the DOM;
  integrating existing scripting libraries'
learning_outcomes:
- Apply problem-solving strategies to various computing problems of increasing complexity.
- Construct, write and test applications using more advanced programming constructs
  and data structures.
- Construct visually creative applications consistent with UI best practice.
- Demonstrate competence in the use of core libraries.
- Demonstrate competence in the use of extended libraries.
learning_and_teaching_methods:
- Lectures to introduce the theory and concepts of Creative Programming.
- Practical labs so that the students can put the theory into practice.
- Self-directed learning.
