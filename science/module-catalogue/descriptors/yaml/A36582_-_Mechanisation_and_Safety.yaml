reference: A36582
full_title: Mechanisation and Safety
short_title: Mechanisation and Safety
credits: 5
level: Introductory
author: TWOODCOCK
history_comment: ''
school: Engineering
department: Science
cluster: Engineering
aim: The module will enable the student to acquire knowledge and awareness to work
  safely. It will enable students to understand the principles of risk assessment
  in the workplace. The student will acquire the principles, knowledge and skills
  needed for pesticide and fertiliser application. The module will enable students
  to understand the basic principles of engines, hydraulics and electrics and carry
  out basic maintenance on tractors. The student will understand the safe operation
  of tractors and machinery.
