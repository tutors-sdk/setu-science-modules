indicative_content:
- Introduction to Data Mining; Classification, Prediction, Clustering
- Introduction to Data Mining Process
- 'Pre-processing: data gathering, wrangling, and transformation'
- Model building, optimization and evaluation
- Result analysis, validation, deployment
- Use of data mining tools
learning_outcomes:
- Categorise between typical fundamental Data Mining problems.
- Appraise the concepts and fundamentals of Classification, Prediction and Clustering
  and their solution techniques.
- Assess the Data Mining Process and all of its steps.
- Justify the use of appropriate tools and techniques for each stage of the Data Mining
  Process.
- Evaluate, interpret and utilize results obtained at each step of the Data Mining
  Process.
- Prepare an appropriate visual representation of the date mining findings.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures.
- The student will apply typical methods of Data Mining to data sets provided.
