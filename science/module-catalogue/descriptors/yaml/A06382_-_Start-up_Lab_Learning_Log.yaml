aim: The Start-up Lab learning log is an important tool in the development of reflective
  learning skills. The log should provide a reflection on key learning opportunities
  the student was exposed to during the semester. These can include academic, work
  based or personal development learning opportunities. Students should integrate
  their learning on a practical and academic level i.e. bring theoretical learning
  and knowledge, past and present, to bear on practical 'learning experiences' through
  reflection and vice versa.
