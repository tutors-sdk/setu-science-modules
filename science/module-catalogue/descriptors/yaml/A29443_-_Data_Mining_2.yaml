indicative_content:
- Introduction to the Data Mining Process
- 'Pre-processing: data gathering, wrangling, and transformation'
- Model building, optimization and evaluation
- Result analysis, validation, deployment
- Use of data mining tools
learning_outcomes:
- Summarise the Data Mining process and have a clear understanding of its stages.
- Evaluate the fundamental concepts behind each stage of the Data Mining process.
- Justify the use of appropriate tools and techniques for each stage of the Data Mining
  process.
- Evaluate, interpret and utilize results obtained at each step of the Data Mining
  process.
- Create a solution for a set of Data Mining problems.
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student. The student will
  be encouraged to participate in class discussions and ask questions to support their
  learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures.
- Students will apply appropriate tools and methods to Data Mining excercises provided
  in the practical classes.
- Students will implement appropriate tools and methods to a Data Mining continuous
  assessment.
- Students will interpret and present the findings produced in the practical classes
  and continuous assessment.
