reference: A07692
full_title: Commercial Forestry Practices
short_title: Commercial Forestry Practices
credits: 5
level: Intermediate
author: ABOOTH
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: This module is designed for students to develop professional competence in the
  range of management services that foresters offer clients in Irish forestry. The
  module will be taught through a series of field-based projects in afforestation,
  young plantation management, forest valuation, harvest planning and forest roads.
programmes:
- timetable: FORS-0014
  code: WD_SFORS_D
  name: Bachelor of Science in Forestry
  stage: 3
  semester: 6
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Afforestation development plan
- Management plan for young forest plantation
- Woodland improvement plan
- FEPS development/application plan
- Assessment of forest for FSC certification of sustainable forest management
- Felling licence application
- Forest road development
- Harvest planning
- Forest valuation
learning_outcomes:
- Complete forest grant applications to forest service standards.
- Appraise the requirements for afforestation site operations and quantify potential
  costs.
- Maximise the commercial potential from grant aided forest projects and provide forest
  valuation based on net present value.
- Classify and quantify environmental/biodiversity aspects in commercial forest projects
  and implement mitigation/statutory requirements within commercial forest projects.
learning_and_teaching_methods:
- 'Practicals: students will visit forest sites, carry out measurements and appropriate
  information gathering, record results on maps and field-sheets, draw conclusions
  and make recommendations.'
- 'Tutorials: will be used to give support and feedback to students on their project
  portfolio.'
