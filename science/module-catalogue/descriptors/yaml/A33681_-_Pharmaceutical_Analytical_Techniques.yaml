indicative_content:
- Overview of the type and importance of In-Process sampling and testing for Quality
  products
- Application of analytical techniques in the analysis of In-Process samples.
- Use of modern Process Analytical Technologies for Pharmaceutical and Biopharmaceutical
  Processes.
- Regulations, Risk Management and Case Studies of on-line PAT applications.
- Operation of PAT laboratory instrumentation for sample analysis.
- Use of UV, MIR, NIR, RAMAN, and ATR, spectroscopic techniques.
- Particle sizing, rheology and use of sensors for process monitoring and online analysis.
- Introduction to Data acquisition and Chemometrics for PAT
learning_outcomes:
- Appraise and comment on the critical nature of IPC sampling and testing and real
  time analysis as well as the regulations around PAT.
- Operate and use some practical PAT techniques to evaluate product quality.
- Evaluate and discuss different case studies in the application of PAT.
- Appraise and contrast the different PAT techniques employed in the Pharmaceutical
  and Biopharmaceutical Industry.
- Interpret and analyse analytical spectra and data.
