assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of IPC
  sampling and Process Analytical Technology. Lack of competence with regard to associated
  laboratory skills, practices and instrumentation.'
- '40%-49%: Will be able to show a limited understanding of the fundamentals of Process
  Analytical Technology, but may have some difficulty with applying this theory. Will
  display some ability with regard to associated laboratory skills, practices and
  instrumentation.'
- '50%-59%: As well as the above, the student will be to show a reasonable understanding
  of the complexities of PAT and real time analysis. Will display reasonable competence
  with regard to associated laboratory skills, practices and instrumentation.'
- '60%-69%: In addition, the student will demonstrate a more detailed knowledge of
  the PAT, and the associated equipment and regulatory guidelines. Will display very
  good competence with regard to associated laboratory skills, practices and instrumentation.'
- '70%-100%: All of the above to an excellent level. In addition, the learner will
  be able to demonstrate comprehensive knowledge and understanding of IPC sampling
  and testing, PAT and regulatory guidelines as well as the PAT instrumentation that
  is used. Will be able to critically evaluate case studies in the area. Will display
  advanced competence and independence with regard to associated laboratory skills,
  practices and instrumentation.'
- 'Note: In addition to the normal regulations, a minimum of 35% must be achieved
  in both the final exam and continuous assessment components of the module. In cases
  where continuous assessment has a practical component attendance of at least 75%
  in the practicals is mandatory.'
