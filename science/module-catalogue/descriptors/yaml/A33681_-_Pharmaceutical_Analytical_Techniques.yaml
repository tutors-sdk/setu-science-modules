aim: This module will encompass the area In-process sampling and testing and the use
  of various analytical instrumentation for off-line and on-line testing. The learner
  will get an insight into critical processing parameters and the modern PAT techniques
  utilised to control Critical Quality Attributes in Pharmaceutical and Biopharmaceutical
  processing. The regulation around PAT and various PAT case studies will be evaluated
  and reviewed.
