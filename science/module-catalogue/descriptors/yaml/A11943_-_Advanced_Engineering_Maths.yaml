indicative_content:
- 'Series solution to ordinary differential equations; special functions: Legendre,
  Hermite, Bessel etc.; Sturm-Liouville problems: eigenvalue problems and expansions
  in orthogonal functions (generalised Fourier analysis)'
- 'Fourier Analysis: Fourier transform, DFT, FFT algorithm, convolution and correlation'
- Discrete functions, linear and nonlinear difference equations, stability of solutions,
  mapping from continuous to discrete systems,solution of linear equations using z-transforms
- 'Partial Differential Equations: classification; wave, diffusion, Poissons and Maxwell''s
  equations; canonical forms; separation of variables over rectangular, cylindrical
  and spherical domains; transform methods'
learning_outcomes:
- Derive, interpret and apply properties of special functions.
- Construct and interpret solutions of partial differential equations that arise in
  engineering problems (see content).
- Demonstrate knowledge of physical contexts in which various partial differential
  equations arise and the types of boundary conditions needed for well-posedness.
- Apply the theory covered in this module in terms of progressing from a physical
  problem, to selecting and implementing an appropriate solution strategy, and ultimately
  interpreting and representing the results.
learning_and_teaching_methods:
- Formal lectures will provide the theoretical base for the subject as well as covering
  its practical application.
- Tutorial examples, with subsequent discussion and explanation, together with feedback
  from the in-class tests and suggested reading will support and direct the students
  in their own personal study. Computer laboratory sessions will be used to demonstrate
  implementations of methods and provide framework for feedback and assistance on
  project work.
- Tutorials will focus on solving problems by hand calculation and using Mathlab.
