indicative_content:
- 'Basic statistics: data collection methods; presentation of data; measures of center
  and spread'
- 'Regression: least squares line; Pearson''s correlation coefficient; the coefficient
  of determination; rank correlation'
- 'Inferential statistics: sampling distributions; hypothesis testing; confidence
  intervals; ANOVA; Chi-squared tests'
learning_outcomes:
- Choose appropriate data collection methods and apply relevant graphical and analytical
  techniques for the investigation of data.
- Formulate regression and correlation techniques in appropriate sets of data.
- Set up a broad range of analytical statistical techniques and interpret the results
  correctly.
- Select appropriate statistical software tools to analyse and interpret data.
