assessment_criteria:
- '<40%: Very limited knowledge and understanding of statistics.'
- '40%-49%: Demonstrate a limited knowledge of statistics.'
- '50%-59%: Demonstrate satisfactory general knowledge of statistics.'
- '60%-69%: Demonstrate sound knowledge of statistics. Show ability to analyse and
  logically argue in an effective and mature style.'
- '70%-100%: Demonstrate authoritative handling of complex material and a highly developed
  and extensive understanding of statistics.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
