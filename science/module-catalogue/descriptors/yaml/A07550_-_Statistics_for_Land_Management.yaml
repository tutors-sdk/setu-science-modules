reference: A07550
full_title: Statistics for Land Management
short_title: Statistics for Land Management
credits: 5
level: Advanced
author: AHENNESSY
history_comment: ''
school: Science and Computing
department: Science
cluster: Mathematics and Physics
aim: The module is designed to introduce key concepts in statistics for research in
  agriculture, forestry and horticulture. Students will learn how statistical tools
  can be applied by modelling relevant data on statistical software, as well as analysing
  and interpreting the results.
