reference: A13362
full_title: Robotics and Vision
short_title: Robotics and Vision
credits: 5
level: Advanced
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Automotive, Automation and IoT
aim: This module introduces the learner to the field of robotics. The mechanical construction
  and control of a range of robot types is explored, together with the suitability
  of the systems to industrial application. The learner will utilise industrial robots
  to explore the various module topics along with various off-line programming packages
  to develop programming competencies. Topics in vision processing and analysis are
  evaluated and implemented using vision processing software.
