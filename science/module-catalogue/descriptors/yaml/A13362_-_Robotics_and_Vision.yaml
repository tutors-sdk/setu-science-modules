indicative_content:
- 'Physical Systems on Robotics: Manipulator configurations and work envelopes; degrees
  of freedom.'
- Robot programming - offline; on-line; co-ordinate systems - World, Base, Joint,
  Tool
- 'Control Systems: Control Strategies; Co-ordinate systems; Robot performance.'
- 'Vision systems: Image capture and processing using commercial software and hardware.'
- 'Vision processing: thresholding, image enhancement, smoothing, siltering, edge
  detection. Colour and grayscale techniques.'
- 'Safety: Operator safety, teach mode, speed control, safe zones'
learning_outcomes:
- Differentiate between a range of robot manipulator configurations and control strategies
  and discuss the performance of each.
- Evaluate the suitability of robots for particular applications.
- Produce, download and test software programs to control industrial robots.
- Utilise 'offline' programming software to develop and debug programmes and control
  strategies for industrial robots.
- Demonstrate an ability to work safely on engineering equipment without ever threatening
  to endanger themselves or others.
- Develop and implement standard vision processing techniques in software.
- Design and implement a practical vision system for an engineering application.
