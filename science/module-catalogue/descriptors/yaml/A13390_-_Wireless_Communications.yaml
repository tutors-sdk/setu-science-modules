indicative_content:
- Wireless Technologies and Equipment
- IEEE 802.11 Standards
- Wireless Channel Models, Noise and Interference
- Wireless Topologies
- Site Survey and Installation
- Wireless Security
- Mobile and Cellular Communications
- Emerging Wireless Technologies
learning_outcomes:
- Compare and contrast common wireless technologies and associated standards.
- Configure and install wireless access points, bridges, and WLAN controllers.
- Analyse WLAN RF principles, wireless communication channels and associated system
  models.
- Classify wireless security threats and vulnerabilities and demonstrate the ability
  to implement appropriate security measures.
- Troubleshoot wireless installations and configurations.
- Demonstrate their ability to enhance their knowledge of emerging wireless, mobile
  and cellular communications technology.
learning_and_teaching_methods:
- This module will be delivered using a combination of lectures and practicals.
- Lectures will be used to introduce module theory to the student.
- Practical laboratories will focus on the students implementation skills based on
  the theory presented in lectures.
- The practical hours will be timetabled together as a double class.
