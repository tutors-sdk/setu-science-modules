indicative_content:
- 'Self-awareness: reflection workshops and exercises to identify personal skills,
  abilities, interests and motivations and relate these to career opportunities'
- 'Social Media and Online Reputation: how to use and leverage social networks to
  maximise your chances of getting a job; what social networks should you use - and
  not use - when positioning yourself for employment'
- 'Investigating the job market in a discipline / industry: uncovering the Hidden
  Job Market through Networking; Tactics and strategies for finding out what is happening
  in the hidden job market, and how to position yourself to get a job'
- 'CVs and Application Forms: Selling yourself on paper; Why are over 75% of CVs received
  by employers discarded within the first two minutes of reading?; What do students
  need to do to make sure their CV is well received?; What employers want to see and
  how to achieve it'
- 'Interviews: Selling yourself in person; What do employers want to see at interview;
  Top 10 interview errors and how to avoid them; How to anticipate interview questions
  and how to structure your answers; Recorded mock interviews; Interview practice
  within the group -- including practice answering the ``Tell me about yourself''''
  question'
- Preparing and delivering an interview presentation
- 'Career Planning: developing an appropriate personal career development plan'
learning_outcomes:
- Analyse the jobs market and recruitment process including the role of networking
  and social media.
- Use self-reflective assessment techniques to analyse and build awareness of personal
  strengths, aptitudes and relevant opportunities in the jobs market.
- Construct an appropriate personal career development plan.
- Complete a high-quality CV, application form and cover letter documents that will
  provide the basis for effective graduate job applications.
- Apply communication theory by planning for and performing presentation and interview
  skills for different employment interview scenarios.
learning_and_teaching_methods:
- The module will be delivered by a combination of lectures, group discussions, workshops,
  individual and group presentations, simulation interviews and meetings, and peer
  group feedback.
