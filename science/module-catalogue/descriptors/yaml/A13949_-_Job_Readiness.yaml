aim: The purpose of this module is to facilitate students in developing their employability,
  and making the transition to the workplace, within a framework of personal and career
  development planning. The module will cover career development, CV and applications
  preparation, preparing for interviews, networking and collaboration, social media
  and online reputation, mock interviews and role-plays. In certain instances, mock
  interviews will be recorded and presented to participants to assist in the development
  of presentation and job interview skills. Dedicated resources will be developed
  to support participants including standard templates to record student profiles,
  online resources to support student queries and resources highlighting good practice
  in job interview skills.
