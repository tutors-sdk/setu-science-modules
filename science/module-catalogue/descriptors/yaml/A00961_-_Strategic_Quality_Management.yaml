indicative_content:
- Overview of lean practices before and after examples of 5s, Kaizen, Kanban and pull
  systems
- Reducing cycle times (cycle time versus takt time), identifying bottleneck, process
  mapping
- Continuous improvement, process variability (statistical approach) and A3 approach
  to problem solving
- Increasing and utilising capacity and visual management
- Raw material testing, ID testing and streamlining; running samples, cycle time,
  release of samples, QP, solution, sample and product preparation, stability, out
  of specification investigation
- Specifications, control of documentation, reference and retention samples, sampling
  and testing, review of guideline Vs SOP's
- DMAIC (Define, Measure, Analyse, Improve, Control), DFSS, (Design for Six Sigma),
  TRIZ (theory of Inventive problem-solving)
- Combining lean principles and six sigma practices, review of tools and methodology
- 'System Thinking: Human Relations at work, participative management, teamwork, risk
  management systems, quality function deployment'
- Measurement of uncertainty, statistical variation, detection and quantification
- Analytical method development, validation of analytical equipment and transfer to
  QC; life cycle approach, DQ, IQ, OQ and PQ
- Calibration of analytical equipment, optimisation, validation and production, role
  of standards, calibration management systems and documentation
- Validation documentation, cleaning validation, GAMP, automated and computer system
  validation, SUPAC, ICH and Pharmacopeia guidelines
- Project management, planning (include cross-function teams, scope communication
  to non-scientists, implementation and follow-up)
- Managing change in organisation, leadership & motivation and competitive advantage
learning_outcomes:
- Evaluate how lean, six sigma and risk management principles can be used to guide
  lean implementation.
- Distinguish the key factors for effective motivation of staff applying lean tools
  and techniques.
- Justify critical thinking, problem-solving and decision making, project management
  and the management of change in an industrial environment.
- Evaluate the effect that routine laboratory operations have on the quality of the
  final product.
- Appraise the principles and practices of analytical method and equipment validation
  and summarise a systematic approach to validation experimentation.
- Assess the importance and practices of validation activities, documentation and
  analytical method transfer, including automated and computer systems.
