cluster: Quality, Regulatory and Compliance
aim: This module will provide students with advanced understanding of the theory,
  practices and implementation issues associated with advanced quality methodologies
  such as Leadership, Six Sigma and Lean Manufacturing and will also develop competence
  in a range of technical and management quality tools and how these apply in an industrial
  environment. Competitive advantage, project management and managing change are key
  components of applying quality management principles in a industrial setting and
  will be covered in detail. Validation and calibration of equipment and methods with
  emphasis on validation documentation will be provided.
