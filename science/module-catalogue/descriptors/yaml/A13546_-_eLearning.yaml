prerequisites:
- Instructional Design
corequisites: []
indicative_content:
- Design and Authoring of eLearning
- Needs and Task Analysis
- Organising Instruction
- Learning Environments
- Using Standards and Guidelines
- Creating, Testing and Validation of Accessible Web Sites
learning_outcomes:
- Evaluate and critique the suitability of eLearning Authoring Tools.
- Design organised instruction and develop learning environments using Instructional
  Design Guidelines.
- Prepare needs and task analysis.
- Substantiate the creation, testing and validation of accessible user interfaces
  using guidelines and standards.
- Develop a computer based, accessible learning environment.
learning_and_teaching_methods:
- This module will be delivered using 2 hours of computer-based Lectures, along with
  2 hour of computer-based Practicals each week.
- The Lectures will introduce new concepts and theory relating to eLearning. The practicals
  will allow the students to design and develop eLearning content using industry standard
  eLearning software.
