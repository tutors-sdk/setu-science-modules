aim: The aim of this module is to provide the student with a professional level of
  understanding, and the ability to apply associative design and calculation methods
  to the areas of MV and HV power transformers and line reactors on transmission and
  distribution power networks. In addition, the student will gain proficiency in the
  areas of safety procedures, and maintenance requirements of transformers and reactors.
