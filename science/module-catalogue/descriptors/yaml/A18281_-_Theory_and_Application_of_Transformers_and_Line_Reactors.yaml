indicative_content:
- Classification of transformers and line reactors
- Phase shift transformer theory & applications of tertiary windings
- Shunt/series, capacitive, and inductive reactor rating & design.
- Onload & offload transformer/reactor tap-changing methods and applications
- Core assembly, winding practices, insulation types, and cooling methods.
- Current inrush, over-voltage, and short-circuit protection.
- CELNEC, IEEE/ANSI, and IEC Standardisation of transformers and reactors.
- Transformer/reactor loss capitalisation, and optimum design criteria
learning_outcomes:
- Evaluate and understand the design and operation of power transformers and reactors
  on HV and MV sectors of a national electrical grid.
- Configure the tertiary winding of a transformer for phase shift, and load balancing
  applications.
- Determine appropriate tap changer designs for both on-load and off-load configurations.
- Demonstrate proficiency in the methods of core assembly, winding practice, insulation
  type, and cooling methods of inductor hardware.
- Apply theoretical background to the detection and suppression of current inrush
  and other parameters that exceed inductor rating.
- Generate costing for optimum design criteria and capitalisation of inductor loss.
- Provide confirmation of compliance with CELNEC, IEEE/ANSI, and IEC Standardisation
  in terms of operation and safety.
learning_and_teaching_methods:
- The module delivery method will consist of lectures, laboratories, mini-project,
  and formative assessments.
- The emphasis on module delivery is to engage the student in the learning of the
  module content through the integration of course materials with case studies in
  laboratories and the application within a mini-project.
- The formative assignments will provide an opportunity for the student to engage
  with the material as it is being applied to maximise the learning opportunities
  of the student.
- Self-directed learning, moodle, and recommended software applications optimise the
  delivery of module material in specific areas where additional processes are required.
