reference: A35725
full_title: Internet of Things Security
short_title: IoT Security
credits: 5
level: Introductory
author: ADAVY
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Forensics and Security
aim: This course outlines prevailing state-of-the-art practices for IoT security and
  explains how the IoT security landscape is evolving, to aid IoT stakeholders in
  making strategic decisions for IoT products, and to help IT professionals strengthen
  their knowledge about the Internet of Things (IoT) and the security platforms related
  to it.
programmes:
- timetable: ''
  code: WD_KINTT_BI
  name: BSc (Hons) in the Internet of Things (International)
  stage: 3
  semester: 6
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Basic concepts of information security
- IoT System Risks and Challenges
- Challenges for IoT Security
- Basics of Cryptography
- IoT Security Foundation
- Network layer security, IPsec, TLS, 802.11i, Cloud Security, Security in 4G and
  5G
- Object sensing layer Security, RFID Security, WSN Security
- IoT Security and Standards
learning_outcomes:
- Understand the security threat landscape and how to take preventative measures.
- Understand security issues revolving around IoT.
- Gain knowledge on the security considerations regarding verticals of connected devices.
- Learn from real-life examples and case studies in IoT Security.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
