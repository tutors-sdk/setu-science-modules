assessment_criteria:
- '<40%: Unable to describe key IoT security technologies. Unable to distinguish between
  different types of IoT device and application vulnerabilities or present instances
  of them in a clear manner. Unable to effectively use relevant tools.'
- '40%-49%: Can describe in detail key IoT security threats and technologies. Can
  carry out basic configuration of technologies to implement security policies. Able
  to present instances of vulnerabilities and carry out threat modelling on a basic
  IoT system.'
- '50%-59%: In addition to the above, can reason about the various approaches to IoT
  security and their benefits and limitations. Able to explain in context and present
  instances of IoT application vulnerabilities. Able to model threats in an IoT system
  with multiple usage scenarios and actors.'
- 60%-69%:In addition, can explain basis of a variety of cryptographic schemes. Can
  competently make use of security tools and technologies and carry out effective
  penetration tests. Able to present and explain how to address IoT application vulnerabilities.
- '70%-100%: All of the above to an excellent level. Can demonstrate an understanding
  of some the trade-offs involved in providing security. Able to demonstrate in detail
  how to address IoT application vulnerabilities.'
essential_material:
