assessment_criteria:
- '<40%: Inability to identify and describe key concepts of algebra and trigonometry.'
- '40%-49%: Ability to identify and describe key concepts of algebra and trigonometry.'
- '50%-59%: Ability to discuss key concepts of algebra and trigonometry clearly and
  interpret their relative importance.'
- '60%-69%: Ability to apply solutions to problems based on algebra and trigonometry
  in a range of relevant contexts. An ability to employ a comprehensive range of specialised
  skills.'
- '70%-100%: All the above to an excellent level, with the ability to analyse and
  design solutions to algebraic and trigonometric problems to a high standard, for
  a range of complex or unseen problems.'
