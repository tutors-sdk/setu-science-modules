indicative_content:
- 'Arithmetic: review of arithmetic operations; fractions; significant figures; decimal
  places; percentages and ratios'
- 'Introduction to algebra: simplifying algebraic expressions; factorisation and algebraic
  fractions'
- 'Transposition and solution of equations: rearranging a formula; solving linear
  equations; solving simultaneous equations; solving quadratic equations'
- 'Introduction to functions: straight line function; polynomial function; rational
  function; exponential function; logarithmic function'
- 'Angles: measuring angles; length of an arc and area of a sector'
- 'Introduction to trigonometry: trigonometric ratios; finding the angle given one
  of the ratios; extended definition of trigonometric ratios; trigonometric functions
  and their graphs'
- 'Trigonometric identities and equations: solution of triangles using Pythagoras''
  theorem, sine and cosine rule; area of a triangle'
- 'Application of trigonometry to waves: general equation of a sine wave; construction
  of a sine wave from a circle'
learning_outcomes:
- Use and manipulate routine algebraic and trigonometric calculations.
- Construct linear, non-linear and trigonometric equations of varying complexity.
- Sketch linear, polynomial, rational, growth and trigonometric functions.
- Interpret linear, polynomial, rational, growth and trigonometric functions in a
  meaningful way.
- Construct mathematical expressions for problems of an applied nature in the science
  environment.
- Explain results obtained from problems of an applied nature in the science environment.
learning_and_teaching_methods:
- Lectures.
- Online exercises.
- Technology to enhance the learning experience.
- Self-directed learning is emphasised.
- Students are supported with notes, online material and feedback.
