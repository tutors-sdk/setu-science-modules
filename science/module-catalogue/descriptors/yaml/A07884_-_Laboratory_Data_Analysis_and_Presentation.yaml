aim: In this module students will develop skills in the use of spreadsheets to visualise,
  plot, analyse and interpret laboratory data effectively. A focus will be on the
  use of linear regression analysis to analyse laboratory data from a range of experiments
  in their discipline. An introduction into the use of chemical drawing software will
  also be provided, to enable students to model chemical and biomolecular structures
  and reactions. The student will also learn how to construct scientific reports and
  presentations, and how to format and incorporate laboratory data appropriately into
  these.
