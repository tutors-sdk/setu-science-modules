indicative_content:
- Using the ChemDraw software package to construct chemical structures, reactions
  & experimental diagrams
- Selecting the most effective chart type to plot laboratory data
- Plotting and using standard curves & standard addition plots
- Modelling data from a range of physical and analytical science experiments using
  linear regression analysis
- Evaluating correlation in laboratory data plots, including the use of residuals
- Fitting error bars to data and evaluating experimental precision
- Modelling absorbance spectra & applying derivatives to these
- Formatting data & graphs effectively for scientific reports & presentations
learning_outcomes:
- Construct simple 2-D chemical structures and reactions using drawing software.
- Apply the most effective chart type to plot laboratory data.
- Display error bars on laboratory data points and use these to evaluate experimental
  precision in the data.
- Apply linear regression to the analysis of laboratory data using spreadsheets.
- Construct residual plots of laboratory data to evaluate correlation between data
  variables.
- Construct standard addition plots and derivative curves using spreadsheets.
- Communicate laboratory data effectively in scientific reports and presentations.
learning_and_teaching_methods:
- In-class demonstrations.
- IT practicals.
- Self-directed study.
- Additional tutorial videos based on key skills learned during practicals available
  via e-learning.
