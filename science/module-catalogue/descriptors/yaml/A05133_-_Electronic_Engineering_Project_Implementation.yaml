reference: A05133
full_title: Electronic Engineering Project Implementation
short_title: Elec Eng Proj Implementation
credits: 10
level: Advanced
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electronics
aim: This module follows on from Project Specification described in the previous semester
  outline. The student has thus already identified the particular challenges to be
  overcome and milestones to be achieved in this semester. Because the background
  work has already been covered through the literature research and the early project
  efforts, this semester should produce significant advances in terms of attaining
  the final goal. The work is then faithfully represented in a thesis, which shall
  include an accurate and concise description of the context, the challenge, the solution
  and the result of the particular problem posed. All work shall be the student's
  unless specifically stated otherwise through citation.
programmes:
- timetable: PROJ-0095
