indicative_content:
- Camera Controls and operations
- Composition principles
- Practical image making
- Practical editing techniques
- Lighting Techniques -- studio and available light
- Presentation of images
learning_outcomes:
- Manage the technical aspects of image capture.
- Integrate key visual principals underlying digital image capture and editing.
- Compose images through editing.
- Assess correct camera controls and settings for a subject.
- Develop and realise photographic projects.
learning_and_teaching_methods:
- Combination of lectures and studio-based practicals.
- The lectures will cover the theory and underlying technologies of image capture
  using a DSLR camera.
- The practical work will provide the student with the skills to dynamically consider
  lighting options and composition choices when making images.
- Students will be encouraged to use self-directed research and learning to study
  images from world-class photographers and investigate camera technology.
