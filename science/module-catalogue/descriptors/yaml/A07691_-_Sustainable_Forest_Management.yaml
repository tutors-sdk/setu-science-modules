reference: A07691
full_title: Sustainable Forest Management
short_title: Sustainable Forest Management
credits: 5
level: Intermediate
author: ABOOTH
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: This module aims at providing students with the foundations for the professional
  practice of sustainable forest management at a forest operational level in Ireland.
  This module will facilitate students in gaining knowledge of the International and
  national framework and implementation mechanisms for practicing sustainable forest
  management (SFM). Students will develop key professional skills for use in the application
  of SFM practices.
