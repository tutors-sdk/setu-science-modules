indicative_content:
- International and Irish forest policy, strategies and standards
- Forest management objectives; identification of needs; historical developments;
  application of silvicultural systems; forest organisation
- Rotations; sustained yield; normal forest; felling decision; thinning systems
- Sustainable development; environmental, social and economic objectives; sustainable
  forest management principles and criteria; key indicators of SFM in Ireland
- Quality management in forestry; forest certification procedure, chain of custody,
  labelling
- Forest legislation in Ireland
learning_outcomes:
- Relate international and Irish forest policy framework and legal requirements to
  managing a sustainable forest resource.
- Examine the principles of sustainable forest management and their application in
  Irish forestry, control the manipulation of the forest through thinning spacing
  and stocking and be able to formulate clear and concise management objectives.
- Apply knowledge of the certification systems applied to the forest sector and demonstrate
  the ability to carry out a basis certification assessment.
- Employ the principal requirements for implementing a silvicultural system from even-aged
  clearcut plantation forestry to single tree selection systems and be able to develop
  a management plan for the application of an alternative silvicultural system.
learning_and_teaching_methods:
- 'Lectures: will be used to used to develop understanding of the key concepts of
  sustainable forest management, the international and Irish regulatory framework
  for forest practice and the development of multiple purpose forestry to meet economic,
  environmental and societal needs on a sustainable basis.'
- 'Fieldwork: will be used to develop professional competence in on-site forest certification
  procedures, implementing alternative silvicultural systems and assessing the practice
  of sustainable forest management at operation level.'
