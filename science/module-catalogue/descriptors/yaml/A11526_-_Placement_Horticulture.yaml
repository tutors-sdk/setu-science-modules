reference: A11526
full_title: Placement (Horticulture)
short_title: Placement (Horticulture)
credits: 30
level: Intermediate
author: CPWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Placement and Projects
aim: The module introduces the student to work in their chosen specialism with a 15
  week placement in the horticulture industry. The student is supervised by the host
  on a day-to-day basis, and the placement is monitored by Teagasc staff. The student
  will keep a written diary and visual portfolio (digital photographs) of the tasks
  he/she carried out at the workplace. Students are also encouraged to seek placements
  overseas.
