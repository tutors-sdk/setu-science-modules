indicative_content:
- 'Placement period of 15 weeks when student will: use safe practices, avail of learning
  opportunities and turn up on time'
- 'Performance of work: work output and quality, dependability, performing tasks in
  accordance with directions, initiative, adaptability and applying theory to practice'
- 'Develop and maintain excellent working relationships: communicating and working
  with co-workers, and communicating and working with host'
- 'Record of placement experience: particulars and features of business, enterprise
  details, weekly diary, photographical evidence, and end of placement summary'
- 'Placement review: knowledge and skills gained, planning ability, and reflective
  personal conclusion on placement experience'
learning_outcomes:
- Construct a professional CV, and prepare for interview to secure a placement.
- Plan learning objectives for the placement.
- Operate independently and/or as part of a team towards the set objectives of the
  horticultural enterprise.
- Apply competently their horticultural knowledge and skills in a range of settings.
- Practise safely, horticulture related skills and employ good environmental practices.
- Examine their personal, professional and technical achievements on the placement.
- Communicate their activities and assessment of the horticultural enterprise in a
  professional manner.
- Complete a portfolio of images documenting work practices and experiences using
  digital photography.
learning_and_teaching_methods:
- Practical demonstrations.
- Supervised practice.
