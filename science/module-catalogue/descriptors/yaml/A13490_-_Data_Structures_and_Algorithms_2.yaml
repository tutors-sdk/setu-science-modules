indicative_content:
- 'Implementing Advanced Data Structures: Trees; Graphs; Rings; Other'
- 'Implementing Algorithms for Advanced Data Structures: Traversals; Shortest Path;
  Union Find; Other'
- 'Algorithmic Strategies: Brute Force; Greedy; Divide and Conquer; Heuristic; Other'
- 'Algorithmic Analysis: Static Analysis; Dynamic Analysis; Profiling Tools'
- Test-Driven Development for Advanced Data Structures and Algorithms
learning_outcomes:
- Construct, from first principles, advanced general purpose and custom data structures.
- Construct suitable and efficient algorithms for utilising advanced data structures.
- Determine and implement suitable algorithmic strategies for utilising advanced data
  structures and large data sets.
- Employ static and dynamic algorithmic analysis.
- Construct robust advanced data structures and efficient algorithms in a systematic,
  test-driven fashion.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals whilst
  capitalising on a web-enhanced learning environment.
- Students will work on building a portfolio of practical project work.
- Cooperative and peer learning (e.g. pair-programming, teamwork).
- Self-directed learning.
