indicative_content:
- Cloud Computing Architectures and Services
- 'Public Cloud Services: Storage; Compute; Networking'
- Configuration of Multi-tier Application Infrastructure Services
- Cloud APIs -- Python or similar
- Virtual Private Clouds
- Web Application Architecture -- Performance, Scaling, Load Balancing and Security
- Automation and scripting -- using for example bash (advanced), Python, PowerShell,
  Chef, Ansible
- Developer Operations (DevOps) tools and configuration
- Network and Application Management and Monitoring
learning_outcomes:
- Build, configure and manage essential network infrastructure and application services.
- Deploy a network monitoring solution.
- Develop scripts to assist in the management and automation of modern network services.
- Analyse application performance, scalability, load balancing and security.
- Compare and contrast the main technologies required to develop and manage Cloud
  based Application Infrastructure.
learning_and_teaching_methods:
- The practical lab component will be delivery in a double lab session.
- Strong emphasis on practical laboratory exercises with extensive use made of virtualised
  environments.
- Self-directed learning.
