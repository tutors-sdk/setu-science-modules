indicative_content:
- 'Matrices: Matrix operations; Solving linear equations using the inverse method'
- 'Linear Functions: Slopes; Intercepts; Plotting lines'
- 'Exponential & Logarithmic Functions: Properties; Rules of indices & logs; Graphs'
- 'Sequences & Series: Arithmetic; Geometric; Limits'
- 'Logic: Logical operators & truth tables'
learning_outcomes:
- Manipulate 2D matrix operations.
- Solve equations using matrices and the inverse method.
- Utilise the rules of indices and logs to simplify expressions and to solve equations.
- Construct appropriate sequences, series and limits calculations.
- Construct truth tables by using logical operators.
- Use industry based software to perform mathematical calculations.
- Construct linear and non linear graphs using suitable software.
learning_and_teaching_methods:
- The lectures will be used to present the mathematical material.
- In tutorials students will solve problems which will be based on material covered
  in the lectures.
- In practicals students will perform calculations by using built in functions along
  with creating their own formulae.
- Students will also use graphing tools to explore the properties of functions.
