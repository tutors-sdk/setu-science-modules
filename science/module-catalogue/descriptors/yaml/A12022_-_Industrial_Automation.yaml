indicative_content:
- Review of the control of actuators and sensors using PLCs and Labview.
- Scada Theory Overview
- Introduction seminar on Scada topologies, PLC, electrical distribution, robotic
  and factory automation examples.
- Develop Scada topologies, PLC, electrical distribution, robotic and factory automation
  examples.
- Distributed Control systems Theory Overview
- Introduction seminar on Distributed Control Systems topologies, electrical distribution,
  robotic, vision and factory automation examples.
- Develop Distributed Control Systems topologies, electrical distribution, robotic
  and factory automation examples.
learning_outcomes:
- Apply, interface and develop computer network topologies, bus types and communication
  protocols.
- Integrate with Scada topologies, PLC, electrical distribution, robotic and factory
  automation examples.
- Integrate with Distributed Control Systems topologies, electrical distribution,
  robotic and factory automation examples.
- Demonstrate the ability to produce a practical automation system.
- Demonstrate the professional, ethical and effective communication skills of a professional
  engineer.
learning_and_teaching_methods:
- The course will consist of lectures/seminars in the laboratories together with extensive
  laboratories, mini project and formative assessments.
- The emphasis on course delivery will to engage the student in the learning of the
  material, through the integration of the course materials, with the real case studies
  in laboratories and mini project.
- The formative assignments will be used to provide an opportunity for the student
  to engage with the material, before it is applied, to maximise the learning opportunities
  for the student.
- Self-directed learning, moodle, and recommended software.
