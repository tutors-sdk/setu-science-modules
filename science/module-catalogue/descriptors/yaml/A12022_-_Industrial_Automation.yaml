aim: The aim of this module is to introduce the student to network topologies, bus
  types and communication protocols. Scada topologies, PLC, electrical distribution,
  robotic and factory automation examples are developed by the student in addition
  to developing examples of Distributed Control Systems topologies, robotic and factory
  automation.
