reference: A09764
full_title: Process Validation
short_title: Process Validation
credits: 5
level: Intermediate
author: BWHELAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Quality, Regulatory and Compliance
aim: This module describes the importance and practices of validation and technology
  transfer. Both areas are linked in terms of design and commissioning of a process,
  piece of equipment or activity within the pharmaceutical industry. Other topics
  covered include Computer Systems Validation, Process Analytical Technology (PAT)
  and Quality by Design (QbD).
programmes:
- timetable: PROC-0005
  code: WD_SGMPT_D
  name: Bachelor of Science in Good Manufacturing Practice and Technology
  stage: 1
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Process validation: general concepts and documentation required; DQ, IQ, OQ, PQ;
  validation strategy'
- Principles of Quality by Design (QbD), life cycle approach to process validation,
  worst case testing
- Clean Room qualification, manufacture of sterile medicinal products
- Process Analytical Development (PAT) development, change management systems, risk
  management methods and tools
- Validation of process water, purified water systems, water for Injection
- Commissioning, Factory Qualification, Factory Acceptance Testing (FAT), Site Acceptance
  Testing (SAT)
- Description of solid dosage forms, transdermal delivery systems, freeze-dried products,
  inhalation products; medical device development
- Computer systems validation, GAMP guide, Quality Systems and Compliance, 21 CFR
  Part 11
learning_outcomes:
- Interpret validation guidance documents used within the pharmaceutical/medical device
  sectors.
- Develop validation protocols identifying critical parameters and acceptance criteria.
- Complete FATs and SATs and enhance process understanding.
- Appraise the application of risk management to a range of facilities, processes
  and products.
- Plan for quality system application throughout product life cycle.
