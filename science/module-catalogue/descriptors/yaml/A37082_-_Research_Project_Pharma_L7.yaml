indicative_content:
- Projects will be based on areas such as developing and validating analytical procedures,
  environmental analysis, synthesis and separation of chemical compounds along with
  spectroscopic analysis, use of surfactants and catalysis
learning_outcomes:
- Plan, organise and carry out a basic research and development project.
- Apply previously gained theoretical and practical skills in a self-directed manner.
- Produce a detailed report and summary of the project.
- Use visual aids to support an oral presentation of project.
- Apply training on green and sustainable practices in a laboratory-based project.
