indicative_content:
- 'Turfgrass science: Soils for sportsturf, drainage and irrigation for sportsturf,
  grass morphology and physiology, turfgrass pathology and entomology, sportsturf
  weeds and control'
- 'Turfgrass maintenance: Turfgrass mowing, management of organic matter, nutrition
  of turfgrass, aeration and compaction relief of turfgrass, renovation and repair
  of turfgrass, topdressing and materials, growth regulation, and other maintenance
  techniques'
- 'Construction and maintenance of a range of sportsturf facilities: Sports pitches,
  bowling greens, cricket grounds, lawn tennis courts, equestrian sports and artificial
  surfaces'
learning_outcomes:
- Determine and specify appropriate soil types and root zones for specific sportsturf
  construction.
- Interpret the principles of drainage and irrigation and describe appropriate methods
  for sportsturf.
- Distinguish the main turf grass species and a range of pests, diseases and weeds
  associated with turfgrass.
- Explore the factors influencing pests of turfgrass and propose appropriate IPM control
  methods in response to turfgrass pests, diseases and weeds.
- Explore maintenance techniques and equipment required for turfgrass maintenance.
- Demonstrate a range of turfgrass maintenance techniques.
- Produce a plan of appropriate maintenance techniques for a range of sportsturf constructions.
