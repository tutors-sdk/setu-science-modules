indicative_content:
- Overview of Marketing Principles and Practices
- Target Marketing, Segmentation and Positioning
- The Four Ps of Marketing, Product, Price, Place and Promotion
- Consumer Buyer Behaviour
- Drivers of Change within Horticulture & Supply Chain Management
- The Selling Process
- Negotiation and Closing the Sale
- Overview of Customer Service and Key Customer Service Behaviours
- Handling Complaints and Difficult Customers
- Designing a Service Blueprint
learning_outcomes:
- Compare the key marketing concepts and practices in business today.
- Analyse and determine appropriate marketing techniques for successful marketing
  campaigns.
- Examine effective selling techniques.
- Analyse and determine the principles and practices of good customer service management
  for small businesses.
- Design a service blueprint for a business and evaluate how it may be measured by
  staff and customers of the business.
