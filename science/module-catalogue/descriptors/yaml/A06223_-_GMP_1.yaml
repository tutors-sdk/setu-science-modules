author: BWHELAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Quality, Regulatory and Compliance
aim: This module covers all aspects of current Good Manufacturing Practice (cGMP),
  the aim of which is to ensure that pharmaceutical products are safe, effective,
  pure and free of contamination. The student will also learn how to interpret guidelines
  for quality systems and they will be able to assist with inspections of the manufacturing
  environment.
