  stage: 1
  semester: 1
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Definition of a medicinal product; role of the Competent Authorities in Europe and
  USA; associated pharmaceutical legislation; regulatory inspections
- 'Quality assurance principles: establish quality characteristics; auditing procedures
  to manage Quality Systems'
- Validation life-cycle; Design Qualification, Installation Qualification, Operational
  Qualification, Performance Qualification; Change Control to maintain the validated
  system
- Management of customer complaints, as a means to improve process control; performance
  metrics; CAPA reports
- Control of documentation; Standard Operating Procedures (SOPs); Batch records; software
  packages for electronic documentation
learning_outcomes:
- Identify the function of Good Manufacturing Practice in the production of medicinal
  products.
- Complete quality audits.
- Construct a validation protocol with acceptance criteria to prepare a validation
  report.
- Apply corrective and preventative actions in a manufacturing environment.
- Record a sample Standard Operating Procedure and equivalent documentation.
