aim: This module will develop the learner's ability to access relevant scientific
  information from primary literature, collate the information, and write an overview
  of a chosen research topic. Participants will learn modern techniques of data analysis
  in the context of analytical method development and how to apply statistical analysis
  processes to data sets and interpret the results in order to quantify data quality
  and compare data sets. Projects undertaken will be linked to a relevant sectoral
  issue, be it agricultural production, crop and livestock management practices, new
  technologies, food processing, marketing produce or direct consumer retail. Projects
  related to this research topic will be carried out under the supervision of individual
  members of the academic staff and, where relevant, a co-supervisor from organic
  or biological agriculture.
