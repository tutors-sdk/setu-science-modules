assessment_criteria:
- '<40%: Insufficient level of research work performed in terms of quality and quantity
  of research output and competence with regard to data analysis skills. Inadequate
  knowledge on research topic evident through poor report writing and oral presentation
  skills.'
- '40%--59%: The learner will be able to demonstrate a good understanding of the different
  aspects to soil health and how these can be assessed and measured. The student will
  be able to conduct and write a case study/resource audit.'
- '60%--69%: Addressing and analysing the main points and showing evidence of underpinning
  knowledge. Evidence of evaluation, data analysis skills, and synthesis of the relevant
  issues and theory to practice integration.'
- '70%--100%: Good level of critical data and information analysis, originality of
  thought and a comprehensive knowledge base. Good critical evaluation and synthesis
  of relevant issues, showing an ability to integrate theory and practice.'
