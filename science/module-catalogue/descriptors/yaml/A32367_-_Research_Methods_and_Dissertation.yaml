indicative_content:
- Literature search strategies and the use of online databases to research the scientific
  literature
- Preparation and critical evaluation of literature for a review related to a scientific
  research topic
- Technical writing skills, writing science correctly & designing report templates
- Planning, design and implementation of a scientific project in the context of a
  literature review
- 'Precision and error measurement: relative and fixed bias, random errors, propagation
  of errors and accuracy, comparing and combining standard deviations and means of
  data sets, limit of detection'
- 'Sampling distributions: point estimation, sampling from continuous and discrete
  distributions'
- 'Statistical inference: inference for single, two or more samples, including t-test,
  ANOVA, correlations, linear regression, and principal component analysis'
- Implementation and interpretation of generalized linear models(GLMs)
learning_outcomes:
- Locate and review information from the primary literature relating to a given research
  topic and determine its relative importance.
- Construct and develop a cohesive and fully referenced literature review report on
  a given research topic that conforms to a high standard of technical writing.
- Analyse the parameters and components of an area of study, presenting these in the
  form of a hypothesis or problem statement and describing a methodology for investigation.
- Assess and interpret data sets based on applied inter-comparison significance tests.
- Synthesise and prepare analytical data using statistical software packages for scientific
  papers and reports.
- Develop and demonstrate powers of analysis in the exploration and resolution of
  research problems.
- Critique, evaluate and summarize key findings generated on research problems.
learning_and_teaching_methods:
