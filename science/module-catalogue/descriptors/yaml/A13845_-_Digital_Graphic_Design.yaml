indicative_content:
- Digital Illustration
- 'Structuring Media: single and multi-page layout'
- Designing for screen vs. designing for print
- Interactive PDFs, Digital Magazines and ePUBs
- Packaging and pre-flight
learning_outcomes:
- Utilise a range of digital illustration techniques to enable them to develop a multimedia
  portfolio.
- Compose digital artwork, using a range of techniques and software, for both digital
  and print media.
- Create interactive files, PDF forms and digital publications for various mobile
  devices.
- Design and cost a print job for a business or event.
learning_and_teaching_methods:
- Practical classes will provide students with an opportunity to develop a range of
  technical competencies relating to digital graphic design using industry-standard
  tools and techniques.
