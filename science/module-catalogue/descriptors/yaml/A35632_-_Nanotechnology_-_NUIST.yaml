aim: This module provides an engineering perspective on the interdisciplinary advances
  in nanotechnology. The module is divided in to five sections, (1) Social Perspectives,
  (2) Electronic Devices (3) Nanotechnology and Materials (4) Nanotechnology and Manufacturing
  (5) Environmental Nanotechnology. The module aims at student development gained
  through an understanding of the interdisciplinary nature of nanotechnology, the
  horizontal affects that nanotechnology is having modern industry and the disruptive
  advances that are leading social progress. The research informed ethos of the module
  comprises both student led and tutor led discovery pathways designed to build discipline
  specific theoretical and application knowledge through the framing of pertinent
  research questions and framing a structured response through close interaction with
  the knowledge base.
