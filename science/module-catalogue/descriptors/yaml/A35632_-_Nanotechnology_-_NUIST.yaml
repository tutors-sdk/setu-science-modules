indicative_content:
- Societal Nanotechnology
- Quantum Structures
- Tools of Nanotechnology (Visualisation and Manipulation)
- Nanoelectronic Devices -- (Organic Electronics and Single Electron Devices)
- Nanostructures and Nanocomposites
- Environmental Nanotechnology (Sensors, Mitigation and Energy)
- Natural Nanotechnology (Evolution, Nature's Laboratory )
learning_outcomes:
- Assess the societal implications of nanotechnology as a horizontal technology and
  its positive current and future disruptive potential.
- Develop models to describe quantum systems and thus estimate their size property
  relationship.
- Evaluate the role of 1-D and 0-D systems and synthesise associated nanostructures
  for the development of future electronic devices.
- Apply SEM, SFM and optical technologies to nanoscale characterisation and manipulation.
- Distinguish the properties of different thin film composites, evaluate methods for
  the manufacture and characterisation of thin film materials.
- Describe intricacies involved in Nanometrology and the NIST roadmap for Nanomanufacture.
- Evaluate modern nanotechnology innovations for environmental monitoring (air, water,
  soil) and energy harvesting.
