indicative_content:
- Thermodynamic laws (zeroth, first and second thermodynamic laws)
- PV cycles and compressed gasses
- Entropy
- Refrigeration and heat engines
- Heat exchangers including plate and concentric tube
- Energy and the environment
learning_outcomes:
- Explain the fundamental elements of gas and thermodynamic laws, properties of pure
  substances and the effect of energy on our environment.
- Solve energy calculations using the concepts of thermal efficiency, enthalpy and
  entropy.
- Identify refrigeration and heat engine systems and perform analysis of these systems.
- Demonstrate how heat exchangers of various types operate with their associated calculations.
- Demonstrate how solar panel is used to calculate solar constant.
- Demonstrate how heat engine and refrigeration units operate with calculations of
  efficiency.
