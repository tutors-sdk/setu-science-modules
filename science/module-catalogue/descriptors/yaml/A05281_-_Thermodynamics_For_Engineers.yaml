aim: 'This module takes an analytical approach to the subject of thermodynamics including
  the areas of system definition, energy and the first law of thermodynamics. The
  second law of thermodynamics plus entropy will also be covered in this module. Other
  areas introduced will include: heat engine refrigeration, heat exchangers, energy
  and the environment. Thermodynamic principles are reinforced by lab experiments.'
