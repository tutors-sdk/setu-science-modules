reference: A36342
full_title: Food Management Systems
short_title: Food Management Systems
credits: 5
level: Intermediate
author: JFRISBY
history_comment: ''
school: Science and Computing
department: Science
cluster: Food Science
aim: The module is designed to give students knowledge and understanding of the various
  quality systems that are used in the food industry, including aspects of teamwork,
  benchmarking and problem-solving techniques. The module also prepares the students
  to have the skills to implement a HACCP plan in the food industry.
