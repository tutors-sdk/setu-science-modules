  status: M
prerequisites: []
corequisites: []
indicative_content:
- 'Total Quality Management: quality improvement programmes, customer satisfaction,
  benchmarking'
- 'Quality auditing: types of audits, how to conduct a compliance audit'
- 'Problem-solving techniques and their uses: pareto analysis, cause and effect analysis,
  brainstorming'
- 'Food hazards: microbiological, chemical, physical'
- Application of GHP and GMP as a pre-requisite to HACCP
- Examination of the key components of risk analysis, namely risk assessment, risk
  management and risk communication
- HACCP system and its implementation
- ISO22000, BRC etc.
learning_outcomes:
- Examine the various Food Safety Management Systems such as HACCP, BRC and ISO22000.
- Classify the various types of quality audits.
- Appraise the importance of GHP and GMP as a pre-requisite to HACCP.
- Develop a HACCP plan for the food industry.
- Investigate the various hazards and risks in the food chain.
- Use techniques for critical thinking and decision making.
