reference: A31641
full_title: Artificial Intelligence for Autonomous Systems
short_title: AI Auton Syst
credits: 10
level: Postgraduate
author: POLEARY
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Automotive, Automation and IoT
aim: This module will build on the student s prior knowledge of computer algorithms
  and statistics to provide the student with a thorough understanding of many of the
  latest advancements in AI and Autonomous Systems. The main areas covered in this
  module are End to End Deep Learning, Computer Vision, Reinforcement Learning and
  applications of autonomous systems in real world settings.
