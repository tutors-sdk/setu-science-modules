indicative_content:
- In depth treatment (assuming prior knowledge) of Deep Learning approaches.
- Convolutional Neural Networks
- Recurrent Neural Networks
- Long Term Short Term and Variational Auto Encoders
- Q-Learning and Policy Gradients
- Image Classification, Semantic Segmentation, Object Detection, Transfer Learning
- AI Toolkits and Platforms
- Multi-Input, Multi-Output Neural Networks.
learning_outcomes:
- Evaluate how the latest technologies in deep learning (techniques, architectures)
  operate and how they can be deployed.
- Compare and contrast major deep learning approaches and assess their suitability
  for different scenarios and user requirements.
- Design and implement solutions for autonomous systems.
- Evaluate AI model training performance and fine tuning.
- Assess the key aspects of an autonomous system including perception and action control
  loops.
- Carry out an assessment of applying autonomous concepts to a system.
- Design and implement a fully autonomous system using AI.
learning_and_teaching_methods:
- Combination of lectures and computer-based practical and simulation exercises.
- The practical component will be delivered in one double lab session.
- Self-directed learning
