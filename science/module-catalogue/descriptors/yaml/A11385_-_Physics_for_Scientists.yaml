indicative_content:
- 'Thermal physics: temperature and temperature scales; expansion of solids and liquids;
  heat capacity and change of state; ideal gas laws; thermal transfer'
- 'Electromagnetism: electrostatics; DC components, circuits and circuit laws; magnetism
  and electromagnetism; thermoelectric effects'
- 'Geometrical optics and properties of light: reflection and refraction, lenses and
  mirrors, ray tracing, the lens and mirror equation & lens power; refraction, critical
  angle and total internal reflection'
- 'Atomic physics: photoelectric emission'
- 'Nuclear physics: radioactivity and radioactive decay; nuclear reactions and radiation
  hazards; fundamental forces'
learning_outcomes:
- Describe and explain the fundamental principles of the physics of heat and temperature.
- Describe and explain the fundamental principles of electromagnetism.
- Complete routine calculations on simple electrical circuits.
- Explain how lenses & mirrors form images and describe the properties of light.
- Describe and explain the fundamental principles of atomic and nuclear physics.
- Apply problem-solving skills to generate solutions to problems relating to electromagnetism,
  optics, thermal, atomic and nuclear physics.
- Complete experiments, record and analyse experimental data and present results in
  the form of a report.
learning_and_teaching_methods:
- 'Lectures: The lectures will present new topics and their related concepts. Problem
  solving techniques will also be used in class to analyse physical situations and
  find numerical solutions.'
- 'Tutorials: Online tutorials linked to core text.'
- 'Laboratory-based practicals: An integrated practical programme, designed to run
  in parallel with the lectures, allows the student to develop a range of experimental
  skills. The importance of planning of experiments, data acquisition and analysis
  will be emphasised.'
- Self-directed study.
