aim: This module introduces the student to the fundamentals of thermal physics, electromagnetism
  and geometrical optics. The module will also introduce the fundamentals of atomic
  and nuclear physics. The module contains a practical component, where the student
  can develop measurement, logical thinking, analysis and report-writing skills.
