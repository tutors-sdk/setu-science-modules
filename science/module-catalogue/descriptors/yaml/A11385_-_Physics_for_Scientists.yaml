assessment_criteria:
- '<40%: Inability to demonstrate a basic understanding of the fundamental principles
  of thermal physics, electromagnetism, optics, atomic and nuclear physics. Inability
  to carry out practical skills in the physics laboratory to an adequate level.'
- '40%-49%: Ability to demonstrate a basic understanding of the fundamental concepts
  of thermal physics, electromagnetism, optics, atomic and nuclear physics. Ability
  to provide partial solutions to numerical problems. Has a basic level of competency
  in the required skills in the physics laboratory.'
- '50%-59%: Ability to clearly describe and define concepts encountered in thermal
  physics, electromagnetism, optics, atomic and nuclear physics. Ability to analyse
  physical situations and apply suitable problem-solving techniques to find numerical
  solutions. Good practical skills in the physics laboratory, good clear reporting
  of practical work.'
- '60%-69%: In addition to the above, ability to apply problem-solving techniques
  to new similar problems. Demonstrates a good understanding of the majority of the
  topics relating to thermal physics, electromagnetism, optics, atomic and nuclear
  physics. Has a high level of skills in the physics laboratory.'
- '70%-100%: All the previous to an excellent level. Demonstrates an ability to put
  a numerical solution into a context and assess whether such solutions are meaningful.
  Has a very high level of efficiency in the physics laboratory. Can critically assess
  experiments undertaken.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
