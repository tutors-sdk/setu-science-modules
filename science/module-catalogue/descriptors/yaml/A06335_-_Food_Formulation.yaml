assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of the
  learning outcomes. Lack of competence with regards to use of associated laboratory
  skills, techniques and instrumentation.'
- '40%-49%: Demonstrate limited understanding of the fundamentals of the learning
  outcomes. Will display some ability with regard to the use of associated laboratory
  skills, techniques and instrumentation.'
- '50%-59%: Demonstrate satisfactory understanding of the fundamentals of the learning
  outcomes. Will display reasonable competence with regards to use of associated laboratory
  techniques instrumentation and good laboratory practice.'
- '60%-69%: Demonstrate sound knowledge of the all topics contained in the learning
  outcomes and display good competence with regards to use of associated laboratory
  instrumentation and very good laboratory practice.'
- '70%-100%: Demonstrate comprehensive knowledge and understanding of all learning
  outcomes. Will display advanced competence and independence with regards to use
  of associated laboratory techniques and instrumentation and excellent laboratory
  practice.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
