indicative_content:
- 'Food proteins: properties and functionality'
- 'Food lipids: properties, functionality; emulsion formation'
- 'Food carbohydrates: properties and functionality'
- Starter cultures for fermented food products
- 'Sensory aspects of food: colour, flavour and texture'
- 'New food product development: probiotics, functional foods'
learning_outcomes:
- Appraise the functions of a variety of food ingredients for use in food products.
- Determine the rationale for using particular ingredients in food products.
- Apply microbiology to food processing and especially in fermented food development
  and production.
- Illustrate the application of sensory analysis in food development.
- Differentiate different functional foods.
- Investigate food ingredient functionality using standard laboratory techniques.
- Integrate theoretical knowledge and practical skills to conduct food formulation
  on a given product.
learning_and_teaching_methods:
- Lectures will provide the theory of food formulation and functionality.
- Practical classes will enable students to investigate food ingredient functionality,
  analyse results and prepare reports.
- A group project will encourage the students to apply the theory of food ingredient
  functionality in the manufacture of food products.
