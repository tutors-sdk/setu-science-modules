reference: A32365
full_title: Agroforestry and Landscape Biodiversity
short_title: Agroforestry and Biodiversity
credits: 10
level: Postgraduate
author: JGERAGHTY
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: The module will provide participants with an in depth appreciation for the role
  of agroforestry and biodiversity as a vital part of a functional landscape approach
  in organic and biological production systems. Participants will be able to identify
  native species and multi-purpose uses of trees from food, fodder, and fuel production
  to habitat provision. The vital role and management of field boundary hedgerows
  for biodiversity, carbon sequestration and water cycling will be emphasised as will
  the importance of developing linked habitats for both domestic and wild native species.
  Participants will develop field survey skills in aquatic and terrestrial habitats
  for biodiversity assessment, evaluation, and monitoring. Support initiatives and
  policy developments will be reviewed in the context of their relevance to incorporating
  agroforestry and biodiversity management for ecosystem services and climate resilient
  farming systems.
