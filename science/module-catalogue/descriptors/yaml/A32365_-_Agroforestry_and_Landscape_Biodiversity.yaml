assessment_criteria:
- '<40%: Very limited knowledge and understanding of the indicative content and topics
  covered. Unable to carry out critical thinking or practical skills.'
- '40%--59%: Will be able to show general knowledge of the key learning outcomes,
  including an appreciation for the contribution that agro-forestry and biodiversity
  can make to the agricultural landscapes. The student will be able to write and present
  a quality development plan for agro-forestry and habitat for biodiversity.'
- '60%--69%: In addition to the above, the student will be able to demonstrate an
  in-depth understanding of the inter-relationships between agro-forestry and biodiversity
  in the landscape and identify how these may be used to improve farm productivity.
  The student be able to write and present a good quality plan for agro-forestry and
  biodiverse habitat development.'
- '70%--100%: The learner will be able to demonstrate comprehensive knowledge and
  understanding of all learning outcomes, including the vital role of agro-forestry
  and biodiversity in climate resilient farm enterprises and create a high quality
  plan for agro-forestry and biodiverse habitat development for an existing farm.'
