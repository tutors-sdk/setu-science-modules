indicative_content:
- Agroforestry systems forming integrated functional landscapes in regenerative agriculture
- Silvo-pasture and silvo-arable systems for enhanced productivity and profitability
- Right tree in the right place to deliver integrated systems and ecosystem services
- Hedgerow management for enhanced soil carbon, biodiverse habitats, and livestock
  protection
- Role of landscape biodiversity for carbon and water cycling in climate resilient
  ecosystems
- Farming to conserve and enhance functional habitats for both domestic and wild species
- Field surveying for assessing, evaluating, and scoring biodiverse landscapes
- Policy support and regulations for agroforestry and biodiverse habitat provision
  under Pillar 1 and Pillar 2 of the CAP
learning_outcomes:
- Describe and explain the beneficial role of and ecosystem functions provided by
  agroforestry and biodiverse landscapes.
- Review, recognize and compare different silvo-pasture and silvo-arable methods and
  systems being practised across Europe.
- Identify and select native tree species with suitable growth habits in different
  environments for their satisfactory development.
- Devise, design and develop an integrated agroforestry plan for a selected farm landscape
  and crop or livestock production system.
- Assess and evaluate the quality of, and produce remedial actions for, the enhancement
  of field boundaries and hedgerow habitats on a sample farm..
- Conduct a biodiversity analysis and survey of a farm landscape and prepare and describe
  a biodiversity enhancement plan that sensitively integrates domestic and native
  wild species.
- Analyse, interpret and summarize research findings and developing support policy
  for agroforestry and biodiversity and their likely impact for developing climate
  resilient and functional farming landscapes.
learning_and_teaching_methods:
- Online lectures, guest lectures and webinars
- Assignment for class discussion and self-directed learning
- Case studies on agroforestry and enhanced biodiversity on organic farms
