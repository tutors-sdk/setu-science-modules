assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamentals of physiology
  and pharmacology. Unable to perform critical thinking and analysis.'
- '40%-49%: Shows a limited understanding of the fundamentals of physiology and pharmacology.
  Has difficulty with critical thinking and analysis.'
- '50%-59%: Shows a reasonable understanding of the fundamentals of physiology and
  pharmacology. Shows some ability to analyse and think critically and independently.'
- '60%-69%: Shows a good understanding of the fundamentals of physiology and pharmacology.
  Has good critical thinking and analyses and debates in an effective manner.'
- '70%-100%: All of the above to an excellent level. Demonstrates a highly developed
  and extensive comprehension of the subject manner. Shows ability to evaluate, debate
  and relate topics and shows evidence of extensive independent learning and knowledge
  of current literature and recent developments in the area.'
