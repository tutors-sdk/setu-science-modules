indicative_content:
- Organisation of cells, tissues and organs and relationships to functions
- 'An introduction to the major systems in the body: cardiovascular, nervous, endocrine,
  gastrointestinal and renal'
- Introduction to pharmacological concepts; drugs and how they act; pharmacology in
  the 21st century; introduction to pharmacodynamics and pharmacokinetics
- Identification of drug targets and drug design; bioassays, animal models and clinical
  trials
- Pharmacodynamics and mechanisms of action of selected biopharmaceuticals; receptors
  and signalling
- 'Pharmacokinetics: absorption, distribution, metabolism, elimination, excretion,
  bioavailability and half-life'
- Pharmacokinetics of some selected biopharmaceuticals including proteins and peptides,
  monoclonal antibodies and nucleic-acid based biologics
- Drug-drug interactions; immunogenicity of biologics
- Individual variation in drug responsiveness and pharmacogenomics
learning_outcomes:
- Comment on how the structure of cells, tissues and organs is related to their physiological
  functions.
- Interpret the theories and concepts underlying pharmacodynamics and pharmacokinetics.
- Evaluate the importance of bioassays, animal models and clinical trials in the development
  of biologics for clinical use.
- Distinguish between small molecule drugs and biologics and determine the relationship
  between the properties of biologics and their unique pharmacokinetic characteristics
  in vivo.
- Select new and emerging biopharmaceuticals and debate their pharmacological strengths
  and weaknesses.
- Present findings on research into the pharmacological properties of novel pharmaceutical drugs.
learning_and_teaching_methods:
- This module will use a blended learning approach combining face-to-face lectures
  with e-learning available through the platform Moodle.
- Student engagement will be enhanced through use of the interactive e-learning platform,
  in-class discussions through workshops, research of current relevant literature
  and informative presentations.
- A learning and teaching strategy appropriate to level 8 will be adopted throughout
  with opportunities for formative assessment to encourage reflective, critical thinking.
