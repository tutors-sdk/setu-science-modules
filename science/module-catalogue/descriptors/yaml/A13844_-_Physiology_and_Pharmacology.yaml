aim: This module aims to provide students with an overview of human anatomy and physiology
  of the main body systems, and the role of pharmacological interventions. The module
  also provides the students with an introduction to the pharmacological actions of
  drugs, including pharmacodynamics and pharmacokinetics. In particular, the course
  focuses on the pharmacological properties and in vivo behaviour of biopharmaceuticals
  including bioactive proteins, peptides, nucleic acids and monoclonal antibodies.
  Pharmacological principles of these biomacromolecules and challenges to their pharmacological
  action in vivo are discussed and illustrated with examples from the literature.
