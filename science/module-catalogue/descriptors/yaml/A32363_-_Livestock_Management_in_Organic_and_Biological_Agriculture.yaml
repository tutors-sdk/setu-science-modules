indicative_content:
- Organic and biological livestock production systems, climate impact, resilience,
  and human protein needs
- Rumen nutrition for balanced dietary intake and optimal meat and milk production
- Monogastric pig and poultry nutrition and dietary requirements for optimal field
  performance and production
- Dealing with livestock management transition challenges organic, and biological
  production systems
- Pasture and forage production and management systems to reduce external inputs and
  associated costs
- Integrated pest management and low-stress handling to maintain animal health and
  welfare
- One welfare initiative and sustainable anti-microbial management and use in regenerative
  agriculture systems
- Policy and regulation related to organic livestock production in the F2F Strategy,
  the CAP, and the Programme for Climate Action
learning_outcomes:
- Demonstrate a detailed knowledge of organic and biological principles for livestock
  management.
- Explain and illustrate the impact of poor nutrition on animal performance for sustainable
  meat and milk production.
- Apply nutritional needs and requirements to formulate dietary ingredients for the
  different livestock categories and groups.
- Compare, contrast and discriminate between different pasture and forage management
  systems for livestock production.
- Review different IPM methods and practices to design and develop appropriate treatments
  for livestock diseases and pests.
- Judge the importance of, and critically assess and evaluate, the sustainability
  of anti-microbial use in livestock production.
- Appraise and justify the impact of livestock production systems on biodiversity,
  climate, environment, and water quality based on contemporary knowledge and research
  findings.
learning_and_teaching_methods:
- Online lectures, guest lectures and webinars
- Farm and processing visits (meat and dairy) for class assignment and discussion
- Self-directed case-study on sustainable livestock production
