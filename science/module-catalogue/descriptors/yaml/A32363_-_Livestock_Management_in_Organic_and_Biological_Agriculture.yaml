reference: A32363
full_title: Livestock Management in Organic and Biological Agriculture
short_title: Organic Livestock Management
credits: 10
level: Postgraduate
author: JGERAGHTY
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: The module will assess the importance of different livestock production systems
  for human protein needs. Animal nutrition requirements will be appraised with a
  focus on maintaining condition and health for optimum output. Conversion to organic
  livestock production will be described and discussed. Pasture production systems
  including set-stocking, rotational grazing, mob-grazing, and holistic planned grazing
  will be compared and contrasted with a focus on regenerative agriculture practices.
  Integrated pest management approaches to prevent and manage common livestock pests
  and diseases will be considered. The challenge of anti-microbial resistance will
  be an important aspect of the material covered. The primary objective of the module
  is for graduates to understand the inter-relationship between achieving optimal
  nutrition for sustainable livestock production thereby guaranteeing high standards
  of animal welfare, output and performance.
