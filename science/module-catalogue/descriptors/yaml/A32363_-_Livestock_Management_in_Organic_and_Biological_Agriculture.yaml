assessment_criteria:
- '<40%: Very little knowledge and understanding of the subject matter. Unable to
  carry out critical thinking or practical skills.'
- '40%--59%: The learner will be able to demonstrate a good understanding of sustainable
  livestock management techniques and production of healthy animals. The student will
  be able to write and present a topical case study on an aspect of livestock production
  and welfare.'
- '60%--69%: In addition to the above, the student will demonstrate more detailed
  knowledge of all the module topics covered, including livestock management developments
  and market trends. The student will also be able to write and present a good quality
  case study on livestock production and welfare.'
- '70%--100%: The learner will be able to demonstrate comprehensive knowledge and
  understanding of all learning outcomes, including the vital role of animal nutrition
  in livestock health and diseases. Write and present a related high quality case
  study on livestock management, production and welfare.'
