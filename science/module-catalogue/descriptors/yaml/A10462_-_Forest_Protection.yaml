indicative_content:
- Introduction to forest pathology
- 'Abiotic agents: frost, chemicals, pollution'
- Mammal and bird pests and their control
- Wind and windthrow hazard classification
- Important insect pests and their control
- Important forest diseases, their life cycles and control
- 'Fire: ecology of fire; losses and susceptibility of forests to fire; nature and
  prevention of forest fires'
learning_outcomes:
- Describe the abiotic agents causing problems in Irish forests.
- Identify and recognise the symptoms of the important forest pests and diseases.
- Record and collect both insect and foliage samples for dispatch to a laboratory.
- Use the windthrow hazard class system.
- Describe the implications of fire in forests and outline methods of reducing the
  incidence of outbreaks.
- Describe the life cycles and control of forest pests and diseases.
- Review relevant papers in the field of forest protection.
