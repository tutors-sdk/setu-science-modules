reference: A10462
full_title: Forest Protection
short_title: Forest Protection
credits: 5
level: Introductory
author: NMCCARTHY
history_comment: ''
school: Science and Computing
department: Science
cluster: Forestry
aim: This module will help students to obtain knowledge of the concepts and techniques
  for understanding, identifying and controlling tree diseases, disorders and pests.
  It will also give them the ability and confidence to diagnose problems in plantation
  forestry, and suggest remedies for these. Students will also learn about the problems
  associated with fire and wind in plantations, and assess ways of reducing these
  problems.
