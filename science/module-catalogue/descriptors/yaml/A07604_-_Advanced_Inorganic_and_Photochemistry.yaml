aim: This module gives the student and in-depth knowledge of bonding, formation and
  interpretation of organometallic complexes and catalytic cycles. The student should
  also be to apply point group theory to molecules to determine their structure. A
  detailed understanding of bioinorganic compounds of interest, including pharmaceutical
  products will be given. Students will also get an introduction to the significance
  of photochemical processes in a number of scientific fields including, synthetic
  chemistry, analytical chemistry and environmental science.
