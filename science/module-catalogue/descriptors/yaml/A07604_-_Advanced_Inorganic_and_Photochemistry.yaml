indicative_content:
- 'Organometallic chemistry: chemistry of metal carbonyls and metal alkyls, methods
  of formation, bonding'
- 'Catalytic cycles: properties of catalysts using transition metal complexes, examples
  of catalytic cycles such as acetic acid synthesis, Ziegler-Natta process, Wilkinson
  Catalyst'
- 'Point group theory: assigning point groups, determining the number of IR active
  band in a spectrum of a molecule, use of point group theory'
- Bioinorganic chemistry including Heme cycle, photosynthesis, anti-cancer drugs,
  As- & Fe-based antibiotics
- Photochemical deactivation processes, advantages/disadvantages of photochemical
  reactions
- Photophysical processes, fluorescence, phosphorescence, etc. (significance in pharmaceutical
  analysis and modern sensing)
- Photochemical photodissociation, photosensitised reactions etc
- 'Efficiency of photochemical reactions: quantum yield measurements, primary and
  overall QY; measurement of QY'
- 'Applications of photochemistry: inorganic, solar energy conversion; atmospheric
  reactions; environmentally significant reactions'
- Photochemistry and pharmaceutical stability
learning_outcomes:
- Distinguish the bonding, methods of formation and analysis of orgnometallic complexes.
- Assess the reaction mechanism for a number of fundamental catalytic cycles and account
  for their reactivity.
- Formulate point groups and predicting infra-red spectra of complexes.
- Assess the use of bioinorganic molecules in different applications.
- Distinguish the properties and possible fates of photochemically excited molecules.
- Determine the various processes involved in monomolecular photophysical decay including
  fluorescence and phosphorescence and give examples of photosensitised reactions.
- Formulate quantum yield calculations in photochemistry.
- Verify the relevance of photochemistry in a range of scientific fields including
  the pharmaceutical sector.
