indicative_content:
- Electron configuration and periodicity, wave mechanics and Schrodinger's equation,
  radial distribution functions
- Atomic properties, effective nuclear charge, ionisation energy, electronegativity
- Ionic bonding, ionic crystals, radius ratio, unit cell, lattice energy, typical
  crystal structures
- Further treatment of covalent bonding, atomic orbitals, molecular orbitals, valence
  shell electron pair repulsion theory and molecular shape
- Metallic bonding, metallic crystals, band theory
- Intermediate bond types, polar covalent, hydrogen bonding, van der Waals forces
- Non-aqueous systems, protic and aprotic solvents, hard-soft acid-base principle,
  acid-base titrations in non-aqueous solvents
- An introduction to inorganic polymers, their synthesis and applications
- Inorganic compounds in nanotechnology and their applications
- 'Chemistry of the non-metals and their compounds: hydrogen, nitrogen group, oxygen
  group, the halogens and including oxides and hydrides of these elements'
- Physical and chemical properties of the alkali, the alkaline and transition metals
- Associated practicals that reflect the content of the module
learning_outcomes:
- Determine electronic structure, coordination number, unit cell type and crystal
  structure.
- Compare the wave-particle nature of the electron, radial distribution diagrams,
  the different solvent systems and the various bonding theories of this module.
- Calculate lattice energy and effective nuclear charge.
- Examine the role of inorganic compounds/polymers in nanotechnology including their
  synthesis/application and the physical and chemical properties of the alkali, alkaline,
  transition metals and their complexes.
- Interpret the chemistry of non-metallic elements and their compounds.
- Complete the preparation of co-ordination complexes in the laboratory.
- Apply error calculations to volumetric analysis.
