aim: This module gives an appreciation of the various bonding theories and structural
  characteristics of inorganic compounds, and introduces the concept of molecular
  orbitals. Other topics include dual nature of the electron, chemistry of non-aqueous
  systems, non-metals including hydrogen, nitrogen, oxygen, the halogens, and metals
  including the alkali, alkaline and transition metals. An introduction to the role
  of inorganic chemistry in the field of polymer science and nanotechnology is also
  provided.
