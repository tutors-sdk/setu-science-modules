indicative_content:
- 'Climate Change: The role of plants in carbon sequestration and carbon release.
  Early earth environments. Climate change through the eons Plant fossils. Global
  average temperatures. The greenhouse effect.'
- 'Evolution: Fundamentals of evolution and speciation. Cladistics and the tree of
  life. Evidence for Evolution. Evolution controversies. Antibiotic use in plant propagation
  and evolution in the context of antibiotic resistance'
- 'Food security: Fundamentals of GM technology. Terminator technology. Land use change.
  Rising populations. Intergovernmental policies regarding food security'
- 'Science communication: Distinguishing between reliable sources of information.
  Responsible use of social media, blogs and message boards. Using evidence based
  reasoning to participate in constructive and informative arguments'
- 'Nature deficit disorder: Specifically, the reasoning behind why society may not
  appreciate plant life'
- 'Popular Science: Evaluating the quality of popular science and methods of incorporating
  popular science in life-long learning.'
learning_outcomes:
- Explore reliable scientific information from a variety of print and online resources.
- Appraise popular science publications from a variety of print and online resources.
- Investigate the on-going environmental impacts of fertiliser, antibiotic and GM
  plant use.
- Analyse the process of inquiry and the assimilation of knowledge.
- Establish how plants have contributed to and can be used to mitigate global climate
  change.
- Research and discuss an appropriate topic.
- Produce a researched and informative presentation on a given topic.
- Express opinions logically and persuasively in group discussions.
