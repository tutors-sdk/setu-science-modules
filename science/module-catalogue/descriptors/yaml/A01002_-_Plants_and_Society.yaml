reference: A01002
full_title: Plants and Society
short_title: Plants and Society
credits: 5
level: Intermediate
author: CDALY
history_comment: ''
school: Science and Computing
department: Science
cluster: Horticulture
aim: This module examines the importance of plants in modern society and tackles some
  of the increasingly complex issues that surround the biotechnology of plants. It
  is necessary for science students to understand these issues and to practice defending
  their informed opinions, the protocols used and also the plant science research
  that takes place during the development of new biotechnologies. Society increasingly
  looks to science graduates to bridge the gap in their understanding of novel biotechnology
  and this module will help science students to develop skills in evaluating news
  sources and debating, and ultimately, will produce graduates who will inform society
  and foster trust in the scientific process. This elective is offered to any science
  student in WIT who seeks to develop their knowledge of plant biotechnology, the
  importance of plants in society, and who wants to learn how to generate convincing
  arguments.
