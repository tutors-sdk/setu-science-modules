assessment_criteria:
- '<40%: Very little knowledge and understanding of Computational Environments and
  Toolchains. Unable to carry out critical thinking or practical skills.'
- '40%-49%: Demonstrate a limited knowledge of Computational Environments and Toolchains.
  May have some problems with critical thinking and problem solving. Adequate practical
  skills.'
- '50%-59%: Demonstrate satisfactory general knowledge of the main issues within Computational
  Environments and Toolchains. Good practical skills.'
- '60%-69%: Demonstrate skilled and sound knowledge of the subject matter. Show ability
  to analyse and logically discuss in an effective way. Good critical thinking and
  a high level of competence and efficiency in theoretical and practical areas of
  this subject.'
- '70%-100%: All of the above to an excellent level. Demonstrate authoritative handling
  of material and ability to develop innovative solutions to problems that rise in
  the configuration and management of Computational environments.'
