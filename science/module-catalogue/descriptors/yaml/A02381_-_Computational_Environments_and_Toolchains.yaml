indicative_content:
- 'Linux overview: OS fundamentals; distributions; commonly used applications & tools,
  shell scripting'
- 'Operating systems resources and virtualisation: file systems, virtual machines,
  hypervisors, resource and configuration management'
- 'Introduction to computational science: survey of various computational tools (e.g.
  Python-based) used in exploring and analysing data in physics'
- 'Networking services: IP addressing, DNS, DHCP, NAT'
- 'Security: encryption, authentication, public key infrastructure'
- 'Concepts and applications of parallel and distributed programs: process interaction
  using shared variables and message passing; parallel computing; development of correct
  programs; general problem solving techniques; scientific computing; distributed
  systems; programming on multiple processor machines'
learning_outcomes:
- Build, configure and manage secure network infrastructure services.
- Use the Unix/Linux terminal interface, such as for data retrieval, text file manipulation,
  and scripting.
- Use a variety of Web-based and other computational resources and applications for
  retrieving and analysing data from scientific repositories (Open Access Directory).
- Develop solutions to problems in the retrieval and analysis of scientific data using
  modern programming languages (such as Python).
- Construct a pipeline of different programs that automates collation, analysis, and
  reporting of data.
learning_and_teaching_methods:
- This module adopts a practical approach with weekly hands-on laboratories and simulation
  exercises. Extensive use will be made of virtualised environments and microcontroller
  hardware in the practical work.
- This module will delivered as two double lab-based sessions.
