reference: A13743
full_title: Beef and Sheep Production
short_title: Beef and Sheep Production
credits: 5
level: Introductory
author: SWALSH
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will enable the student to gain a comprehensive knowledge of and
  the skills required to manage beef and sheep production systems. It will enable
  the student to appraise the physical and financial aspects of the cattle and sheep
  industry. It will also allow the student to produce cattle and sheep in line with
  animal welfare and environmental regulations.
programmes:
- timetable: PROD-0005
  code: WD_SAGRI_B
  name: Bachelor of Science (Honours) in Agricultural Science
  stage: 2
  semester: 4
  status: M
prerequisites: []
corequisites: []
indicative_content:
- Beef production systems and evaluation of financial returns
- Examination of housing and handling facilities for bovines
- Examination of bovine health, nutrition and breeding
- Sheep production systems and evaluation of financial returns
- Examination of housing and handling facilities for sheep
- Examination of sheep health, nutrition and breeding
learning_outcomes:
- Describe the feeding and management requirements of beef cattle and sheep production.
- Describe the main markets, market requirements and financial returns from beef and
  sheep production.
- Describe the types of housing and handling facilities for the main beef and sheep
  enterprises.
- Complete safely routine skills associated with the operation of a cattle and sheep
  enterprise with due regard to good environmental practice and the animal's health
  and welfare.
- Describe good environmental practices in animal production.
- Describe appropriate actions to promote and maintain animal good health and welfare.
learning_and_teaching_methods:
- Lectures.
- Practical instruction, including participation in flock and herd management.
