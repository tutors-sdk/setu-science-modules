aim: This module is comprised of a series of in-class discussions, debates and presentations
  on current topical issues in biology, as well as lectures on specific topics. The
  aim of this module is to expose students to current research and topics of relevance
  in biology, and to aid in the development of skills in reviewing scientific literature
  by researching published sources of information.
