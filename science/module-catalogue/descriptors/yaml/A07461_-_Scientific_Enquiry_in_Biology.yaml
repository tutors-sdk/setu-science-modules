assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter. No attempt
  to research, discuss or debate issues.'
- '40%-49%: Demonstrate a limited knowledge of biology. Some participation in debate
  but little evidence of independent thinking.'
- '50%-59%: Demonstrate satisfactory general knowledge of the main issues within the
  subject. Participate actively in debate, communicating clearly with some independent
  ideas.'
- '60%-69%: Demonstrate sound knowledge of the subject matter. Show ability to analyse
  and logically argue in an effective and mature style.'
- '70%-100%: Demonstrate authoritative handling of complex material and a highly developed
  and extensive understanding of the subject. Provide well focused analysis and convincing
  argument on the subject Show initiative, individual thought, and enthusiasm in self
  study and independent learning.'
