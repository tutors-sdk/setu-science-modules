indicative_content:
- The fundamentals of scientific research and how research is conducted
- How research findings are disseminated via publications in peer-reviewed scientific
  journals etc.
- How to search and read scientific research papers
- How to deliver an effective presentation
- Media reports on topical issues in biology including, safety of vaccines, genetically
  modified organisms, biofuels, cloning, antibiotic-resistant bacteria, emerging pathogens
  and topical pathogens such as Ebola virus, diseases and disorders, stem cell research,
  obesity, allergy, functional foods, new drugs, synthetic meat, probiotics, the gut
  microflora etc.
learning_outcomes:
- Discuss scientific research papers and media reports on topical biology-related
  issues.
- Use appropriate tools for gathering scientific information, e.g. scientific databases,
  library etc.
- Operate effectively as a member of a team.
- Communicate scientific principles to peers.
learning_and_teaching_methods:
- Lectures.
- Self-directed learning.
- In-class discussions, debates, presentations.
