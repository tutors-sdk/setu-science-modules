reference: A18023
full_title: Lean Manufacturing
short_title: Lean Manufacturing
credits: 10
level: Introductory
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Engineering
aim: The aim of this module is to provide the student with an understanding of the
  Principles of Lean Manufacturing as well as gaining an important insight into its
  effective implementation using the fundamental tools that have played a vital role
  in its success.
programmes:
- timetable: ''
  code: WD_EMANF_C
