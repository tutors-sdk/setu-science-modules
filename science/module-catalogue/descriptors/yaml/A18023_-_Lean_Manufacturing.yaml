indicative_content:
- Fundamentals of Lean, Lean Thinking, Background, Seven Wastes, 5 Principles of Lean,
  Lean Tools, Continuous Improvement, JIT, Six Sigma, Education Training and Development,
  Teamwork.
- Standardised Work, Standard Work Chart, Standard Work Combination Chart, Problem
  Countermeasure Sheet.
- 5S Workplace Organisation, Sort Out, Storage, Shine, Standardise and Sustain, Numbers
  Game.
- Problem Solving, Problem statement, Root Cause, Direct Causes, Contributing Causes,
  SQC Tools, Pareto analysis, Why-Why analysis, Kepner Tregoe, SIPOC, Brainstorming,
  Fishbone diagrams, Corrective and Preventative action, intro to DMAIC model, Process
  Analytical Technology (PAT), Why-Why analysis, Polar Diagrams, Process Mapping.
learning_outcomes:
- Explain the general principles, approaches, and key components of Lean and why Lean
  makes good business sense.
- List the main elements of Standardised Work, understand and list the main benefits
  to the company and the individual.
- Apply World Class Manufacturing (WCM) techniques to effect continuous improvement.
- List the attributes and requirements of a well organised storage system including
  5S implementation.
- Create an accurate problem statement and perform root cause analysis, distinguishing
  between Direct, Contributing and Root causes.
- Use basic tools including Pareto analysis, Brainstorming and Fishbone diagrams and
  distinguish between Corrective and Preventative actions.
