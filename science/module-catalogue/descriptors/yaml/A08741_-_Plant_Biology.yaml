indicative_content:
- Plant cell structure and function
- Plant evolution, classification and taxonomy
- Plant reproduction, genes and cell division
- 'Plant physiology: from embryo to establishment including anatomy of seeds, stems,
  roots, leaves and flowers; function of specialised stems, roots and leaves. Function
  of mycorrhizae on roots; secondary growth in wood; transport within plants'
- 'Biochemical processes of plants: photosynthesis and respiration'
- Plant growth and development as a function of plant growth regulators, light, water
  and nutrient availability
- The carbon cycle and plants' role in mitigating climate change
learning_outcomes:
- Illustrate the structure and function of plant cells and plant organelles.
- Summarise the structure, function and anatomical variability of plants.
- Describe the major biochemical processes in plants.
- Identify wild plants using their Latin names.
- Operate safely in a laboratory and perform basic laboratory experiments with plants.
