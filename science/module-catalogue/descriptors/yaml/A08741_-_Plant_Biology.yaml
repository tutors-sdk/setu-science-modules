aim: This module is designed to equip students with a basic knowledge of plant growth
  and physiology, including the structure and function of various parts of the plant.
  Students will also learn about the main living processes in the plant, and the responses
  of plants to environmental conditions. The module also deals with the basics of
  plant inheritance and biotechnology. The student will learn to operate safely in
  a laboratory, and perform basic laboratory experiments with plants.
