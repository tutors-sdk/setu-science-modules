indicative_content:
- 'Lexical Contexts covered may include - work; personality; family; language terminology;
  word building: abstract nouns; time.'
- 'Grammatical Features covered may include - discourse markers: linkers; the verb
  to have; pronouns; the past: narrative tenses, used to and would.'
- 'Discourse/Functions covered may include - writing a letter of application for employment;
  language of confidentiality; language used in the media (distancing); describing
  your personality & family traits; giving your opinion; formal & informal language
  : tone & register; talking about childhood.'
- Exercise Types - multiple-choice, gap-fill, close tests, word formation, sentence
  transformation, question and answer comprehensions, group definition activities,
  pairwork, information gap, anecdote descriptions, questionnaires, roleplays
learning_outcomes:
- Apply the language systems (lexis, grammar) and skills (productive and interactive)
  covered in the module to a range of spoken communications .
- Deduce the meaning of a variety of short and extended aural texts within the lexical
  contexts covered in the module.
- Assess a variety of text types within the lexical contexts covered in the module
  for general academic purposes, and employ those reading skills practised within
  the module.
- Produce stylistically appropriate written texts demonstrating a command of the lexical
  and grammatical elements covered in the module.
- Demonstrate appropriate awareness of cultural diversity based on class discussion
  and independent reflection.
learning_and_teaching_methods:
- Adopting a broadly communicative and integrated approach to language teaching, methods
  may include inter-active seminars, short talks and presentations and workshops using
  both traditional and ICT-based materials. Emphasis will be placed on class participation,
  independent learning and skills development. Teaching approaches that recognise
  and foster a variety of learning and teaching styles and/or promote learner motivation
  may be employed.
