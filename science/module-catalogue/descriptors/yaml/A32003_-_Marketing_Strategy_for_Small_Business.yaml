indicative_content:
- 'Marketing an overview: concepts, principles and the small business context'
- The marketing environment for land-based enterprises - macro & micro environmental
  forces
- Market segmentation; market positioning; target market analysis
- 'Marketing research: the market research process; market research techniques; marketing
  information systems'
- 'Product: product classifications; the product life cycle; new product development;
  branding strategies'
- 'Price: factors influencing pricing decisions; pricing strategies'
- 'Promoting small businesses: the promotional mix; advertising & direct mail; PR'
- Consumer and business buyer behaviour
- 'Place: distribution process and strategies'
- Marketing strategy for small business
learning_outcomes:
- Evaluate the principles of marketing small land based businesses.
- Assess the marketing mix- product, price, place and promotion for small business.
- Appraise examples of best practice marketing strategies.
- Determine the theoretical concepts underpinning marketing planning.
