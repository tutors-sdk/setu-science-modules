indicative_content:
- Sources of law - Common Law, Legislation, Judicial Precedent and EU law
- The Structure of the Courts - the Structure and Jurisdiction of the Criminal and
  Civil Courts including the Jurisdiction of the Small Claims Court process
- Tortious Liability - Negligence, Nuisance, Rylands and Fletcher, Trespass to Land,
  Occupiers' Liability
- Contract Law - the Formation of the Contract including the tendering process, the
  Discharge of the Contract and Remedies for Breach of the Contract
- Real and Personal Property Rights, Acquisition and Ownership of Property including
  Intellectual Property Rights, Property and Boundary Disputes, Easements and Profits
  a Prendre
- Planning and Environmental Law - Planning Rules and Procedures, Authorised, Unauthorised
  and Exempted Developments, Environment Regulations impacting on Horticulturalists
- Plants, Hedges and Trees -- the law related to the development, cultivation, growth,
  sale, import and export of plants, hedges and trees
learning_outcomes:
- Debate the impact of current and future Irish and EU sources of law on the day-to-day
  operation and regulation of the horticulture industry.
- Show how the court process, including the small claims court procedure, operates
  in this Jurisdiction.
- Analyse the various tortious liabilities which the horticulturist may be exposed
  to in the workplace.
- Illustrate how contractual agreements are formed and/or terminated and how contractual
  breaches can be remedied.
- Explore the law in relation to the development, cultivation, growth, sale, import
  and export of plants, hedges and trees.
- Investigate the various ways in which property rights can be acquired and owned
  and how property disputes can be resolved or avoided.
- Determine the impact which Planning and Environmental Law has on the provision of
  horticultural services.
