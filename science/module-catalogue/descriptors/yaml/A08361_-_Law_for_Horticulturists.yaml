reference: A08361
full_title: Law for Horticulturists
short_title: Law for Horticulturists
credits: 5
level: Intermediate
author: DGKEATING
history_comment: ''
school: Science and Computing
department: Science
cluster: Business
aim: The aims of this module is to give students a knowledge of the laws which frequently
  impact upon the work of the Horticulturist, to give the Horticulturist an appreciation
  of the potential legal liabilities which he/she may encounter in the workplace,
  and the relevant rules and regulations which must be complied with in order to limit
  their exposure to such liabilities.
