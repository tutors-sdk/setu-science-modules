indicative_content:
- Definitions around shelf-life, factors influencing shelf-life, types of deterioration
- Measuring and predicting shelf-life
- Design of shelf-life experiments
- Extending shelf-life
- Glass transition
- 'Modelling shelf-life: software models'
- Accelerated shelf-life tests
- Advanced instrumental methods for starch retrogradation
learning_outcomes:
- Establish the factors that affect the shelf-life of food.
- Verify and critique how to measure, predict and extend the shelf-life of various
  foods.
- Determine the microbial load and estimate shelf-life of a food product.
- Evaluate various predictive computer modelling packages and relevant scientific
  literature.
- Compose a laboratory-based group project to assess the microbial load of a specific
  food type.
learning_and_teaching_methods:
- Blended learning approach.
- Pre-lecture activites include online discussion forums, use of online software programmes.
- Post-lecture activities include production of mindmaps as a method of reviewing
  relevant scientific literature.
- Peer assessment for learning - students grade each other's work.
- Construction of flowcharts/portfolios to capture student learning activities within
  the laboratory setting.
- Discussion forums designed so that students can reflect on their contributions thus
  promoting reflective practice.
