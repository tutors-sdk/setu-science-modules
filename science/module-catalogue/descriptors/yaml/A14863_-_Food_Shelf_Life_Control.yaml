aim: The aim of this module is to cover the theoretical aspects surrounding the shelf
  life of food. Factors that influence shelf life along with methods for extending
  the shelf life of various foods are visited. Analysing and predicting the shelf
  life of food is performed on a practical basis in this module. Predicting the rates
  of shelf life using modern day technology is investigated.
