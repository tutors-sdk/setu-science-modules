indicative_content:
- Pre-formulation studies with reference to ICH Q8 Pharmaceutical Development
- 'Development pharmaceutics: pre-formulation studies purpose and implementation,
  role of excipients; drug properties and the practical execution of these studies,
  (ratio of materials, justification for inclusion and explanation of results) with
  a view to section 3.2.P.2 in the Quality section of the Common Technical'
- Formulation of Immediate and modified drug release profiles --/dissolution profiles
- Bioavailability and Bioequivalence considerations for generic formulations/Biowaivers.
- Process development to pilot scale and manufacturing scale up with reference to
  new manufacturing guideline effective 2018
- Stability requirements with reference to ICH Q1, Q6A and 6B
- Formulation development of a range of dosage forms including oral dose, parenterals,
  inhalations and topical formulations with particular emphasis on the principles
  of achieving acceptable efficacy/bioavailability
- Blending/wet/ dry /fluid bed granulation/solid oral dose encapsulation, compression
  and spray drying
- Lyophilisation/Protein Stabilisation
- Aerosol drug/nasal /pulmonary formulation
- Liquid/Suspension/Emulsions
- Sterilisation requirements for parenterals and ophthalmic products
learning_outcomes:
- Appraise the principles of pharmaceutical/biopharmaceutical pre-formulation with
  respect to the overall design and development of drug delivery systems.
- Evaluate how the physicochemical properties of drug molecules and excipients influence
  the choice of drug dosage form and subsequent formulation and manufacturing procedures.
- Propose a formulation design and method of manufacture taking into account the physicochemical
  properties of drug molecules and excipients.
- Establish method development strategies involved in lyophilisation, spray drying
  and aerosol drug formulation.
- Produce a protocol for the stability testing of a pharmaceutical product.
