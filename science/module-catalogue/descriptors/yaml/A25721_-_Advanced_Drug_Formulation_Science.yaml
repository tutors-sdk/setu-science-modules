aim: The certificate in Advanced Drug Formulation Science will provide the learner
  with a clear understanding of the pharmaceutical development pathway from pre-clinical
  to clinical and pharmaceutical development. The module will cover the physicochemical
  basis of pre-formulation studies and the development of dosage forms for achieving
  acceptable bioavailability and required efficacy. The student will gain a detailed
  understanding of specific drug formulation methodologies such as spray drying for
  poorly soluble drugs, aerosol drug formulation and oral liquid/suspension formulation.
  Learners will also be exposed to the area of sterilisation requirements for parenteral
  drugs as well as stability involving lyophilisation for protein stabilisation.
