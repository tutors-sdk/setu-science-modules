aim: 'The module aims to: enable the student to understand the main points of clear
  standard input on familiar matters regularly encountered in work, school, leisure
  etc; give the students the skills to deal with most situations likely to arise whilst
  travelling in an area where the language is spoken; teach the student to produce
  simple connected text on topics which are familiar or of personal interest; enable
  to student to describe experiences, feelings and reactions and briefly give reasons
  for opinions; give the student an understanding of some of the underlying meaning
  of the other language and images used in film, literature, the media and advertising
  from the other culture.'
