indicative_content:
- 'Contexts / themes that will be used to achieve the learning outcomes for this level
  may include:'
- a. Describing the details of events
- b. Feelings and reactions to everyday situations relevant to learners lives
- c. Organising and describing holidays
- 'd. Student life and part-time employment: work-life balance'
- e. Health and well-being
- 'Linguistic structures to be covered at this level will include:'
- a. Past Imperfect tense
- b. Prepositions taking genitive
- c. Constructions with es
- d. Reflexive verbs (nominative, accusative & dative)
- e. Verbs with prepositions (Introductory)
learning_outcomes:
- Spoken Production and Interaction.
- 'The learner is expected to be able to: initiate, maintain and close simple face
  to face conversations on topics that are familiar and of personal interest; relate
  the plot of a book or film and describe his / her reactions; give or seek personal
  views and opinions in discussing topics of interest; deal with most transactions
  likely to arise whilst travelling and cope with less routine.'
- situations in shops, post offices, banks, hospitals.
- Writing
- 'The learner is expected to be able to: write straightforward detailed descriptions
  on a range of familiar subjects within his / her field of interest; produce letters
  (of a pen-pal nature) recounting details of personal activities and feelings.'
- Listening
- 'The learner is expected to be able to: understand straightforward factual information
  about common everyday or job-related topics, identifying both general messages and
  specific details, provided speech is clearly articulated in a generally familiar
  accent; catch the main points in TV programmes/films on familiar topics when the
  delivery is relatively slow and clear.'
- Reading
- 'The learner is expected to be able to: comprehend unfamiliar words from the context
  on topics related to his / her field and interests; recognise significant points
  in straightforward newspaper articles on familiar subjects.'
- Intercultural Competence
- The learner is expected to understand the reasons for the different values, beliefs
  and practices of the other culture.
learning_and_teaching_methods:
- Interactive seminars will be the main teaching approach. A variety of media will
  be used in the teaching process (traditional print materials, audio and video material,
  CALL programmes and online language learning resources). The course will be characterised
  by a high level of student participation in
- both classroom activities and self-directed learning activities outside the classroom.
