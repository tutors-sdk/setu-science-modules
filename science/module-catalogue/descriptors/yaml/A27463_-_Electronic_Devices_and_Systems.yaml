aim: This module introduces the student to digital devices and systems. The structure
  and principle of operation of bipolar and field effect devices will be described.
  The fundamental building blocks of digital design across several levels of abstraction,
  from semiconductor devices to logic gates to registers, will be introduced. The
  student will learn how to design a range of basic combinational and sequential circuits
  with implementation at logic circuit level. This will be accompanied by a comprehensive
  study of digital electronics and digital circuits in the laboratory setting.
