assessment_criteria:
- '<40%: Unable to demonstrate a basic understanding of elementary digital devices
  and systems. An understanding of very little of the course content.'
- '40%-49%: Able to produce diagrams of digital devices and systems but unable to
  explain clearly principle of operation. Able to provide partial solutions to circuit
  problems.'
- '50%-59%: Able to describe clearly principles of operation of a range of digital
  circuits. Able to analyse digital devices and systems and provide solutions to circuit
  problems. Demonstrates an understanding of the mathematical techniques used in circuit
  analysis.'
- '60%-69%: Able to apply problem-solving techniques to new similar circuit problems.
  Demonstrates an ability to design a digital system from a number of component parts.'
- '70%-100%: All the previous to an excellent level. Demonstrates an understanding
  of the limitations of digital circuits and systems and subsequent consequences.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
