indicative_content:
- 'Bipolar devices: review of pn junction diode and characteristics; bipolar junction
  transistor: structure, principle of operation and characteristics'
- 'Field effect devices: field effect transistor (MOSFET and CMOS); structure, principle
  of operation and characteristics'
- 'Digital devices: digital concepts and components, logic families'
- 'Combinational logic: circuits and design'
- 'Sequential logic: latches and flip-flops, registers, asynchronous and synchronous
  counters; waveform/timing diagrams'
- Decoders, demultiplexers and multiplexers
learning_outcomes:
- Describe and explain the structure and principle of operation of bipolar and field
  effect devices.
- Describe a range of digital devices based on combinational and sequential logic.
- Discuss a range of design issues in digital devices; plot and analyze timing diagrams.
- Demonstrate problem solving and investigative skills in conjunction with the integrated
  practical programme, and present results in the form of a report.
learning_and_teaching_methods:
- 'Lectures: The lectures will be used to present new topics and their related concepts.
  Techniques used to design a range of combinational and sequential logic circuits
  and devices will be introduced in lectures.'
- 'Laboratory-based practicals: An integrated practical programme is designed to run
  in parallel with lectures. This will allow the student to develop experimental skills
  in the design and construction of a range of combinational and sequential circuits.
  The importance of planning of experiments, data acquisition, and data analysis will
  be emphasised throughout.'
- Self-directed study.
