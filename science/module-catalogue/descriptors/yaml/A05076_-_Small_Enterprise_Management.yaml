indicative_content:
- 'Business entity: sole trader, partnership, limited company or co-operative'
- 'Evaluate a new business idea: market research, interpreting research results; define
  what and where is the market; the importance of market conditions and trends'
- 'Principles of marketing: product, price, distribution and promotion, unique selling
  point, SWOT analysis'
- 'Financial issues relating to a small business: equity and debt, source of finance,
  financial records, profit and loss account, balance sheet'
- 'Taxation: general tax issues, corporation tax, self assessment, income tax, calculating
  taxable profits, PAYE/PRSI; contractors tax clearance and C2 certificate'
- 'Human resource management: CV''s, job description, recruiting, interviewing techniques,
  employment legislation, contract of employment, managing staff'
learning_outcomes:
- Distinguish the main types of business entity.
- Examine a new business idea and develop a business strategy.
- Analyse the marketing of a specific product or a range of products.
- Determine the basic financial issues facing small businesses.
- Determine the tax issues relating to a start-up business.
- Examine the issues relevant to human resource management.
learning_and_teaching_methods:
- Lectures.
- Class discussion on lecture content.
- Case study analysis and discussion.
