prerequisites: []
corequisites: []
indicative_content:
- The role of the DBA
- The database architecture
- Managing Files
- Managing Memory
- Managing Processes
- Locking & Latching
- Concurrency Control & Multi-versioning
learning_outcomes:
- Install a database architecture.
- Manage and modify the file system.
- Manage and modify the processes.
- Manage and optimise the memory structures.
- Manage the locking mechanisms.
- Appraise appropriate concurrency control mechanisms.
- Administer the database architecture.
learning_and_teaching_methods:
- The students will be introduced to the theory of the module in lectures.
- The lectures will be interactive and discursive in nature.
- Some topics will be supported with appropriate case studies and examples.
- The theory will be applied in a series of practicals that will be problem solving
  focused and work towards a predefined assignment, all of which is to be completed
  by the end of the semester.
