aim: This module will introduce reactions and mechanisms of key organic functional
  groups. Examples to illustrate the course will be drawn from biologically and pharmaceutically
  important compounds. The laboratory course will include a range of organic syntheses
  to complement the theory section. Products will be characterised via a range of
  analytical techniques.
