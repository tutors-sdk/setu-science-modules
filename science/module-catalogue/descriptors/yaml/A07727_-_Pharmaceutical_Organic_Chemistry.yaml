assessment_criteria:
- '<40%: No understanding of the basic principles of pharmaceutical organic chemistry.
  Inability to carry out associated laboratory work to a satisfactory standard.'
- '40%-49%: Will be able to show a basic knowledge of pharmaceutical organic chemistry
  and demonstrate the ability to carry out associated practical work to a satisfactory
  standard.'
- '50%-59%: As well as the above, the student will be able to demonstrate an understanding
  of some of the complexities of the topics and predict some trends in reactivity
  and behaviour. In addition, the learner will show a consistently good ability as
  reflected in associated laboratory experiments.'
- '60%-69%: In addition, the student will demonstrate a more detailed knowledge of
  the all topics and demonstrate an ability to evaluate detailed knowledge acquired
  in the module to new material. Will demonstrate very good ability in most laboratory
  experiments and preparation of laboratory reports.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of pharmaceutical organic chemistry, predict general trends in behaviour, including
  exceptional behaviour and show the ability to evaluate and relate topics. Will demonstrate
  excellent laboratory skills and a consistently high ability in analysis of results.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the final exam and continuous assessment components of the module. In cases where
  continuous assessment has a practical component attendance of at least 75% in the
  practicals is mandatory.
