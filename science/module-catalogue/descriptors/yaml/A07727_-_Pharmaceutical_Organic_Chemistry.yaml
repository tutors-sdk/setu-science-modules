indicative_content:
- Functional group interconversions to include carbonyls, alkenes, amines, alcohols,
  ethers and epoxides
- Aromatic compounds, electrophilic substitution, effect of substituents on reactivity;
  aromaticity, basicity and reactivity of nitrogen heterocycles
- Carbon-carbon bond formation using organometallic reagents
- Examples of biological and pharmaceutically important compounds to illustrate the
  above reactions
- 'Practical organic chemistry: a range of preparative work designed to teach the
  organic techniques and illustrate reactions'
learning_outcomes:
- Explain the mechanism of a number of fundamental organic reactions and account for
  the trends in reactivity.
- Predict and explain the influence of substrate substituents on these reactions.
- Identify synthetic routes for some reaction pathways, including functional group
  transformations and some carbon-carbon bond formations.
- Employ a range of synthetic organic reactions in the laboratory, including some
  multi-step synthetic procedures.
- Practise purification and characterisation techniques on synthetic products according
  to given procedures..
