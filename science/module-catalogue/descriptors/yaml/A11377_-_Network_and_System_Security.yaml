indicative_content:
- Auditing and assessment
- Communications & network security - link layer, network layer, transport layer
- Mobile & wireless security
- Cloud security
- Identity and access management
- Access control models; firewalls
- Malware and intrusion detection
learning_outcomes:
- Evaluate Internet and cloud security technologies.
- Evaluate a selection of leading Internet security protocols.
- Compare and describe the roles of firewalls, intrusion detection and malware protection.
- Develop security policies (for example firewall rules) for a given scenario.
- Deploy popular network security technologies (e.g. TLS in various configurations).
- Set up test systems and evaluate their security.
- Assess the challenges with securing wireless communications and the main solution
  approaches.
learning_and_teaching_methods:
- This module will be presented by a combination of lectures and practicals.
- The lectures will be used to introduce new topics and their related concepts.
- The practical element allows the student to put into practice the theoretical concepts
  covered in the lectures.
