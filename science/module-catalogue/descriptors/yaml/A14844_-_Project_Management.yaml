indicative_content:
- Project Management Life Cycle Model (PMLC)
- Managing Project Scope
- Managing Project Resources
- Managing Project Quality
- Managing Project Risk
- Managing Project Execution
- Managing Project Implementation and Closure
learning_outcomes:
- Appraise principles of project management.
- Evaluate contemporary issues that may affect the project management process.
- Estimate project duration and costings using a variety of tools and models.
- Produce a project plan based on a business context.
- Plan, control and monitor project schedules using project management software.
learning_and_teaching_methods:
- This module will be presented using a combination of formal lectures and practical
  classes.
- Lectures will introduce project management concepts and an emphasis will be placed
  on interaction, discussions and case studies.
- In practical classes, students will engage with project management software through
  Individual exercises and problem-based learning activities through Group Work.
