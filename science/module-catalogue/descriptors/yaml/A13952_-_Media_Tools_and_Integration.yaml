assessment_criteria:
- '<40%: Unable to propose, conceptualise, plan, develop, create and integrate using
  digital mixed media tools.'
- '40%-49%: Be able to propose, conceptualise, plan, develop, create and integrate
  using digital mixed media tools.'
- '50%-59%: As above, incorporating creative approaches to artefacts and tool use.'
- '60%-69%: As above and be able to problem-solve in a ``live'''' setting.'
- '70%-100%: All the above to an excellent level.'
