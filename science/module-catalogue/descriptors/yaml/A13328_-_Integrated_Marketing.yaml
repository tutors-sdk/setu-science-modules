indicative_content:
- The Marketing Process
- The High Technology Marketing Environment
- The High Technology Marketing Mix
- Developing Market Information in High Technology Industries
- Digital Promotional Campaigns
learning_outcomes:
- Examine the role of marketing in software and hardware development.
- Apply marketing research methods used by high tech companies.
- Apply digital marketing tools to develop an online promotional campaign.
- Examine market dynamics in high technology marketing industries.
- Analyse the marketing strategy of high technology companies.
learning_and_teaching_methods:
- This module will be presented using a combination of formal lectures and practical
  classes. Lectures will introduce concepts and an emphasis will be placed on interaction,
  discussions and in-class exercises. In practical classes, students will engage with
  practical marketing techniques and case studies.
- Self-directed learning activities will require students to reflect upon the module
  materials, diagnose their learning needs and conduct research to satisfy these needs.
