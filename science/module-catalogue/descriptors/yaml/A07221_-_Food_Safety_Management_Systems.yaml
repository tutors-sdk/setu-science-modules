indicative_content:
- 'Food Safety Management Systems: HACCP, ISO22000, BRC etc.'
- 'Food hazards: microbiological, chemical and physical'
- Application of GHP and GMP as a pre-requisite to HACCP
- Examination of the key components of risk analysis, namely risk assessment, risk
  management and risk communication
- Origins of HACCP, basic principles of the HACCP system and its implementation in
  the food industry
- 'Auditing: typical audit sequence and roles'
learning_outcomes:
- Appraise Food Safety Quality Management Systems.
- Investigate microbiological, chemical and physical food hazards.
- Appraise the importance of GHP and GMP as a pre-requisite to HACCP.
- Apply the key components of risk analysis to the implementation of a HACCP plan.
- Complete a HACCP Plan based on HACCP Principles and GMP.
- Classify the various audit types, the audit process, corrective and preventative
  action.
- Develop effective and efficient self-directed study skills.
