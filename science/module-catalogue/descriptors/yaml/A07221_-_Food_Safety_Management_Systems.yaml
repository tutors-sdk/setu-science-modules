aim: This module describes the implementation of Food Safety Management Systems in
  the food processing industry. The importance of GHP and GMP as a pre-requisite to
  HACCP, risk analysis and food contamination are covered. The module prepares the
  student to have the knowledge and skills to implement a HACCP plan in the food industry,
  and to understand the role and importance of auditing in the food industry.
