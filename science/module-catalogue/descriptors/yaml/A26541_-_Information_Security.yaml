indicative_content:
- 'Security threats: attack methods; common vulnerabilities; threat modelling; security
  services'
- 'Cryptography: symmetric block and stream ciphers; public key cryptography; hash
  functions; authentication schemes; key management & certificates'
- 'Network and cloud security: TLS; VPNs; wireless security; identity and access management;
  firewalls; intrusion prevention'
- 'Software security: secure software development practices; OWASP Top 10; malware'
- 'Security assessment: black and white box testing; penetration testing; standards,
  compliance'
- 'Incident response & recovery: steps involved in incident response; the forensic
  process; data recovery; computer forensics'
learning_outcomes:
- Evaluate the various security threats and attacks to which an organisation may be
  susceptible.
- Compare and contrast leading cryptographic techniques and determine their applicability
  in a variety of practical scenarios.
- Assess key aspects of system, network and cloud security in a heterogeneous computing
  environment.
- Evaluate the specific security concerns pertinent when developing and deploying
  software applications.
- Carry out a security assessment on a modern distributed application.
- Recommend incident response approaches and assemble digital evidence from a variety
  of sources.
learning_and_teaching_methods:
