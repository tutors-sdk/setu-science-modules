indicative_content:
- Introduction to project management
- Project life cycle
- Feasibility study
- 'Project design and planning: work breakdown structure, critical path network, project
  risk management, project change management, project quality control'
- 'Project execution: reporting, communication etc.'
- Project completion and handover
- 'Project cost measurement and management: the concept of earned value'
- Project documentation
- 'Managing a project team: leadership, resource allocation, HR implications, the
  role of the project manager'
- Using project management tools and techniques
learning_outcomes:
- Evaluate the application of the principles of project management.
- Design and build project management plans.
- Estimate project durations using appropriate software tools.
- Create, control, monitor project schedules using project management software.
- Evaluate the HR aspects of project management - organisation, roles, attributes
  of the project manager, the role of sponsor etc.
- Estimate project costs, produce project cash flow statements, report on earned value,
  analyse cost variances and produce estimates at completion.
- Evaluate the design and management plans for a variety of projects.
learning_and_teaching_methods:
