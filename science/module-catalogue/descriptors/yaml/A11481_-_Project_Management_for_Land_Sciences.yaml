aim: This module aims to provide the student with the ability to develop an understanding
  of project management in context, to show the importance of the planning process
  in ensuring project success, to provide the student with the ability to define and
  build project plans, to estimate project durations using appropriate software tools,
  and to apply appropriate tools and techniques to control and monitor project schedules.
