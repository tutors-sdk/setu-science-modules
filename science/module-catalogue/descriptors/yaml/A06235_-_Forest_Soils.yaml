indicative_content:
- Soil formation
- Soil identification and classification
- Soil ecology
- Soil texture and structure
- Plant nutrition
- Soil composition
- Soil sampling
- Soil-water interactions
- Soil-plant interaction
learning_outcomes:
- Describe the processes involved in the formation and classification of major soil
  types.
- Describe soil physics, chemistry and biological properties and the uptake and role
  of macronutrients and micronutrients in the plants.
- Explain soil composition, texture, structure and the environmental concerns connected
  to forest soils.
- Identify the main forest soil types (peats, brown earths, gleys, podzols and lithosol)
  from soil pits and identify the most suitable tree species to be planted on different
  soils.
- Complete surveys of forest soils according to the Forestry Schemes Manual procedure
  by the Forest Service.
