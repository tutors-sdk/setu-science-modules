aim: This module is designed to equip students with a basic knowledge of soils, including
  soil formation, composition, structure and texture. The module will focus on soil-plant
  interaction, soil erosion, and the macronutrients and micronutrients involved in
  plant nutrition. Students will learn to identify a forest soil, carry out soil sampling,
  as well as a range of soil analyses, including pH and texture determination.
