indicative_content:
- Static Routing
- 'Dynamic Routing: Distance Vector Routing; Links State Routing; OSPF'
- 'Switching: VLANs; Spanning Tree Protocol; Inter-VLAN Routing'
- 'Network Design: Scalability; Redundancy; Load Balancing'
- 'Network Management: SNMP; Monitoring; Performance'
- 'Network Security: Securing Devices; Access Control Lists'
- Virtual Networking
learning_outcomes:
- Configure Static Routes and Dynamic Routing Protocols.
- Troubleshoot Static Routes and Dynamic Routing Protocols.
- Explain how routing and switching technologies work.
- Discuss the main concepts in Network Design.
- Discuss the main concepts in Network Management.
- Discuss the main concepts in Network Security.
- Determine, configure and troubleshoot Access Control Lists.
- Apply best practices in the configuration and management of network infrastructure.
learning_and_teaching_methods:
- The practical lab component will be delivered in one double lab session.
- Combination of lectures and computer-based practical and simulation exercises.
- Self-directed learning.
