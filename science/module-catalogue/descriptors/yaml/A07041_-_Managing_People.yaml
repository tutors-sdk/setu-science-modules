indicative_content:
- Overview of people management and HR strategies and practices in relation to organisational
  strategy and performance; the role of the line manager
- The employment relationship; motivation theories; the design of work; the psychological
  contract; employee engagement and the role of the line manager
- Organisational strategy and HR planning; the Flexible Firm model; external labour
  markets; internal labour markets - employee demographics; turnover; retention; stability
  and absenteeism measurement; demand forecasting
- Job and competency analysis; job descriptions, person specifications and competency
  frameworks
- The recruitment process; the legal issues relating to recruitment; employer branding;
  internal and external recruitment sources, effectiveness and cost
- The selection process; the legal issues relating to selection; shortlisting; selection
  methods, effectiveness and cost
- Offers of employment; contracts of service and contracts for service; the Terms
  of Employment (Information) Act
- Employment law
- Developing employees; induction training and on-boarding; training methods; training
  records and associated legal issues; management and leadership development
- Reward management
- Managing performance; the performance appraisal/review cycle; on-going performance
  management
- Managing under-performance and the associated legal issues
- Managing individual and collective employment relations
learning_outcomes:
- Evaluate the strategic role of people management theory and human resource practices
  in the context of the agricultural and forestry industries and in small and larger
  organisations.
- Assess the significance of employee motivation; the design of work; the psychological
  contract, and employee engagement and the contribution of the line manager to these.
- Determine the role of the line manager in the context of the key facets of the human
  resource practice including HR planning; recruitment and selection; employee training
  and development, and performance and reward management.
- Distinguish between the key features of Irish employment law.
