aim: The purpose of this module is to develop students' understanding of current people
  management theory and human resources practice, with specific reference to the agricultural
  and forestry industries, and from private and public sector perspectives. The module
  focuses on the central role of the line manager in the management of people in both
  small and larger organisations. Emphasis is placed on the contribution that effective
  people management and human resource strategies and practices may make to individual,
  team and organisational performance.
