assessment_criteria:
- '<40%: Very limited knowledge and understanding of the subject matter.'
- '40%-49%: Will be able to show a good knowledge of the key learning outcomes and
  the main theories, concepts and methods within human resource management.'
- '50%-59%: As well as the above the student will be able to demonstrate a good understanding
  of the key learning outcomes as well as be able to describe and evaluate the effectiveness
  of various HRM practices.'
- '60%-69%: In addition, the student will demonstrate more detailed knowledge of all
  the topics and be able to demonstrate best professional standards within HRM.'
- '70%-100%: The learner will be able to demonstrate comprehensive knowledge and understanding
  of all learning outcomes and be able to facilitate informed decisions when dealing
  with employees.'
