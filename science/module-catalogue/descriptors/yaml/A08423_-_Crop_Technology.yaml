indicative_content:
- Rotation and crop establishment
- Variety selection and crop breeding
- Plant nutrition
- Weeds and control programmes
- Plant pests and control programmes
- Plant diseases and control programmes
- Plant development and growth regulators
- Harvesting and storage
learning_outcomes:
- Plan crop rotations and the establishment of tillage crops.
- Compare different varieties and explore potential new avenues of plant breeding.
- Relate the role of plant nutrition including trace elements to the health and productivity
  of the crop.
- Formulate appropriate control programmes for a range of crop pests, weeds and crop
  diseases.
- Relate the use of plant growth regulators to their impact on plant development.
- Determine appropriate harvest and storage solutions for a given crop.
- Distinguish a range of crop growth stages, crop pests, diseases and weeds and control
  strategies.
