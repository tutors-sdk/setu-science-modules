reference: A08423
full_title: Crop Technology
short_title: Crop Technology
credits: 5
level: Intermediate
author: DFEWER
history_comment: ''
school: Science and Computing
department: Science
cluster: Agriculture
aim: This module will enable the student to acquire an in-depth knowledge of and the
  skills needed to manage high-yielding crops, whilst achieving good economic returns
  from cereal crops, alternative combinable crops and potatoes.
