indicative_content:
- Introduction to Cognition & Perception
- Attention
- Memory
- Mental Imagery
- Concept Formation
- Problem Solving, Reasoning & Decision-making
- Vision and Colour Perception
- Chemical senses
- Depth Perception
- Form & Object Perception
- Hearing
- 'Review: Putting it altogether Cognition & Perception: Language and thought'
learning_outcomes:
- Describe the principles of cognitive psychology.
- Discuss the different modes of perception.
- Distinguish between sensation, perception and attention.
- Summarise the links between cognition and perception.
learning_and_teaching_methods:
- A two-hour lecture and a one-hour tutorial per week
- Within the lectures emphasis is placed on making explicit paradigm-level ideas that
  underpin the cognitive sciences e.g. information processing models and schema theory
- Explicit connections are made to ideas that arise in the statistics and research
  methods modules
- Tutorials are used to reinforce the lecture lessons in the context of practicing
  building coherent exam essay outlines
