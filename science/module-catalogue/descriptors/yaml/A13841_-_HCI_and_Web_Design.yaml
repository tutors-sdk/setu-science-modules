indicative_content:
- 'Cognitive Science: Introduction; Memory; Attention; Perception'
- 'HCI: Guidelines; User requirements; Usability; Interface Design; Evaluation'
- 'Web Design: page layout and web design principles'
- 'World-wide-web: Overview; accessibility; navigation; document construction'
- 'HTML: structure; text; images; tables; forms; DIVs; audio; video'
- 'CSS: text; images; tables; forms; positioning'
- Responsive web design
learning_outcomes:
- Evaluate a website against cognitive science theories and HCI guidelines.
- Critique interface design guidelines and design a usable web interface that adheres
  to accepted standards.
- Develop an interactive website using HTML and CSS.
- Evaluate the website developed in relation to accepted standards.
- For online delivery the lectures and practicals will be a combination of comprehensive
  rich media instructional content (notes), interactive synchronous video (live webinars/classes)
  and asynchronous interactive video playback (on-demand).
learning_and_teaching_methods:
- The lectures will introduce the theory content to the student.
- The student will be encouraged to participate in class discussions and ask questions
  to support their learning process.
- The practical classes facilitate the student in implementing the theory learned
  in the lectures, and allow them to develop practical skills in web development.
- Supplementary material will be accessible online.
- For online delivery the lectures and practicals will be a combination of comprehensive
  rich media instructional content (notes), interactive synchronous video (live webinars/classes)
  and asynchronous interactive video playback (on-demand).
