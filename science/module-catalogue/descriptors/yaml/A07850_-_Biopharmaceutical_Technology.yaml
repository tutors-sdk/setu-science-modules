indicative_content:
- 'Protein production methods and considerations: recombinant and native'
- Protein analysis and purification methods, including downstream processing
- Proteins as analytical tools
- Antibody technology towards the production of immunotherapeutic drugs
- 'Key biopharmaceutical drugs currently available: characteristics and mechanism
  of action'
learning_outcomes:
- Comment on native and recombinant protein expression and purification tasks, including
  issues relevant to biopharmaceutical practice.
- Evaluate modern protein engineering, purification, detection and quantification
  techniques.
- Appraise the applications of proteins as analytical tools as relevant to the biomedical
  and biopharmaceutical industries.
- Comment on the application of antibody technology towards the design and manufacture
  of immuno-based therapies.
- Compare modern protein-based biopharmaceutical drugs of choice, including sub-topics
  such as production, mechanism of action and side-effects.
- Develop optimised virtual protein purification and analysis protocols using relevant
  software.
