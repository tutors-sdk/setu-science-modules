aim: This module is developed to equip students with technical knowledge, practicalities
  and marketing skills needed to develop and commercialise new food products, underpinning
  and implementing in a practical environment, theories taught in Food Innovation
  and Entrepreneurship. Students will develop and assess their products in terms of
  physicochemical and sensory properties, while also developing labelling and packaging
  concepts for the product/process. Global Marketing Communications Strategies will
  explore current and emerging international communications approaches to develop
  an integrated communications approach. The course will challenge students to develop
  creative strategies on international issues in advertising, public relations, diverse
  media channels, personal selling, word-of-mouth marketing, event management, negotiating
  and sales promotion. The course includes a study of innovative digital marketing
  techniques.
