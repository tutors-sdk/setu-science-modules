indicative_content:
- 'Food product development: implementation of new food product development process;
  food prototyping & development evaluation; discovery, scoping and building a business
  case; development, testing and validation of new food product prototypes; post launch
  review and evaluation of metrics; barriers/gates encountered during phased stages
  of new food product development'
- 'Sensory testing & analysis: evaluation of food physical characteristics, i.e. colour,
  texture and viscosity in beverages; sensory evaluation of food - taste panels'
- 'Nutritional declaration, packaging & labelling: design food label based on legal
  legislation for new product; suitable packaging systems for new food products'
- 'International marketing and digital marketing: developing an integrated global
  communication strategy; implementing the elements of the marketing mix; digital
  Marketing; digital media; measuring digital marketing campaigns'
learning_outcomes:
- Appraise, reflect and maintain detailed records of all stages and activities associated
  with new food product development.
- Interpret the regulations involved in food, labelling and nutrition declaration
  of food products.
- Critique the various types of food packaging available.
- Develop a food product/ process and present to industry stakeholders.
- Evaluate the new food product in terms of objective and sensory analysis.
- Determine differences between standardisation and adaptation in communication strategies
  across cultural and international borders.
- Assess appropriate market entry strategies.
- Critique international food marketing case studies.
- Recommend cross-cultural marketing strategies.
- Create effective digital marketing tactics.
learning_and_teaching_methods:
- Lectures will provide the theory for varied aspects of the module.
- Kitchen-based practical classes will enable students to manufacture and develop
  new products.
- Lab-based practical classes will enable students to perform food analysis experiments
  to determine physico-chemical properties of the developed product.
