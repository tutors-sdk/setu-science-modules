indicative_content:
- 'Information Theory: data, information, entropy, equivocation, source coding, efficiency
  - Huffman, Shannon-Fano'
- 'Channel coding: convolutional encoders, systematic/non-systemic, catastrophic error
  propagation.'
- Modulation scheme bandwidth efficiency Performance
- 'Noise and Interference Sources: noise figure, noise temperature, low noise pre-amplifiers'
- 'Satellite Systems: Frame structure, synchronisation, footprints, beamwidth/gain,
  link budget analysis.'
- 'GPS & RADAR: Pseudo-ranges, code phase/carrier phase, ephemeris, almanac, GDOP,
  RADAR equation, ranging and curvature.'
- 'Optical Systems: 1550nm & 1330nm characteristics, fibre events, Optical Time Domain
  Reflectometry'
learning_outcomes:
- Derive and calculate error rates for various modulation schemes and be able to devise
  a realistic choice of scheme for particular applications.
- Discuss the origin and significance of various noise and interference sources and
  be able to compose a realistic link budget.
- Explain source coding and be able to determine code solutions and associated parameters.
- Outline basic channel coding approaches, and know key parameters & the relative
  strengths of approaches.
- Describe the key parameters of GPS, optical comms & radar.
- Write technical reports on selected problems using simulations as appropriate.
