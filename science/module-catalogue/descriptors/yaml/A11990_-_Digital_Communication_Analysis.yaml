reference: A11990
full_title: Digital Communication Analysis
short_title: Digital Communication Analysis
credits: 5
level: Advanced
author: CLAIRE.FITZPATRICK
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electronics
aim: Information theory and the restrictions and guidelines it presents for digital
  communication are treated. The role of probability in quantifying information and
  redundancy is treated leading to source coding, and channel coding. Signal space
  is presented and the error performance of M-ary FSK and PSK modulation schemes is
  developed. The bandwidth efficiency plane is then populated for these schemes, leading
  to power/bandwidth trade-offs and the Shannon limit. Satellite systems are explored
  as a case study in digital communications. Basic features of GPS, Radar and optical
  communications are surveyed.
