aim: Food analysis is an essential part of the agri-food industry, and encompasses
  the determination of nutritional value, compliance with labelling/legal requirements,
  assessment of product quality and detection of adulteration. The aim of this module
  is to introduce the student to the basic principles of analytical techniques commonly
  used to determine the chemical composition of foods. The module will provide the
  student with both theoretical and practical knowledge of techniques for the determination
  of macro- and micronutrients within foods. This module will equip students to work
  in food analysis across a broad range of agri-food industries in Ireland.
