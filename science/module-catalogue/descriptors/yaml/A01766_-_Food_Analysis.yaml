indicative_content:
- Quantitative analysis of foods for moisture, lipids, proteins, carbohydrates, vitamins
  and minerals
- Theory and practise of traditional wet chemistry techniques for food analysis
- Principles and application of spectrophotometric methods, including UV-visible,
  fluorescence and atomic absorption
- Principles and application of chromatographic methods in analysis, e.g. HPLC, GC
learning_outcomes:
- Identify the compositional components of a variety of food products.
- Discuss the principles of and procedures for standard methodologies in food analysis.
- Compare different analytical methods used within the food industry.
- Employ a range of food analytical techniques for a variety of food types.
- Report on a range of food analytical techniques for a variety of food types.
learning_and_teaching_methods:
- Lectures will cover the principles of analytical techniques used in the food industry.
- Practical classes will enable students to perform food analysis experiments, analyse
  results and prepare reports.
