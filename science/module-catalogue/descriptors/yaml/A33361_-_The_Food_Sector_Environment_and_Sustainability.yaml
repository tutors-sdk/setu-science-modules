assessment_criteria:
- '<40%: No understanding of basic principles of environmental aspects of food production
  and food security.'
- '40%-49%: Able to understand principles; may have some difficulty applying this
  theory.'
- '50%-59%: Able to understand principles discussed in the course and also able to
  evaluate practical data and evaluate food processing from an environmental point
  of view.'
- '60%-69%: In addition to the above, able to demonstrate a high level of competence
