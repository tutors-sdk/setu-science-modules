reference: A33361
full_title: 'The Food Sector: Environment and Sustainability'
short_title: Food Environ & Sustainability
credits: 5
level: Advanced
author: EDUGGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Environmental Science
aim: This module examines the impact the food industry has on our environment. The
  waste management hierarchy is examined in detail as well as an introduction to the
  challenges facing the food industry. The value of food wastes is examined. The waste
  management strategy and environmental impact of a food company are investigated
  as part of a case study. The conversion of food waste into energy is studied through
  an introduction to a variety of newly established technologies.
