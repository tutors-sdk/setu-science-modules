corequisites: []
indicative_content:
- Effects of food industry pollution on the environment
- Food security and food waste and the circular bioeconomy
- Types of food waste
- Waste management hierarchy model
- Food waste as a resource, food waste to energy technologies
- Greenhouse gases and carbon footprint
- Legislation relating to food waste / processing and the environment
- Energy conservation and recovery within the food sector
learning_outcomes:
- Assess of the causes and effects of pollution from the food industry.
- Assess the future impact of food security and sustainability.
- Establish the different food waste types, pre- and post-consumer.
- Critique the waste management hierarchy model within the circular bioeconomy.
- Evaluate the importance of greenhouse gas emissions and the carbon footprint from
  farm to retail food product.
- Appraise the legislation associated with the management of food wastes.
- Assess energy conservation and recovery using waste to energy conversion technologies
  within the food sector.
