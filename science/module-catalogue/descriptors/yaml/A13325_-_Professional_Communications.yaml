indicative_content:
- Communication Flows within Industry, within Academia and for Professional Development
- 'Running Professional Meetings: Managing, Recording and Participation'
- Structuring and Writing Academic Papers
- Understanding Audience Expectations
- Structuring and Creating Oral Presentations
- Creation of User Reference Documents
- Creation and Maintenance of Professional Technical Reports
learning_outcomes:
- Record and document meeting action items.
- Complete a professional presentation.
- Give a professional presentation.
- Produce a Technical Review Commentary.
- Construct a well-structured Technical Report.
learning_and_teaching_methods:
- 'Lectures: latest research supporting the development of interpersonal and corporate
  communication skills.'
- 'Lectures: exploring the themes of interpersonal communications, and the management
  of both Academic and Technical Writing.'
- 'Tutorials: review and discussion of topic, team work, writing, oral speaking preparations.'
- 'Practical: exercises using PCs to write, craft and review written and speaking
  exercises.'
