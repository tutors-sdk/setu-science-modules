assessment_criteria:
- '<40%: No understanding of applications of microbiology or biostatistics. Unable
  to carry out critical thinking.'
- '40%-49%: Demonstrate a limited knowledge of microbiology applications and biostatistics.
  May have some difficulty with critical thinking.'
- '50%-59%: A good understanding of analytical microbiology and topical and emerging
  microbiological issues with demonstration of some critical thinking.'
- '60%-69%: In addition to the above, good critical thinking skills and showing an
  ability to interpret statistical analysis of microbiology data.'
- '70%-100%: A highly developed and extensive understanding of analytical microbiology
  and topical and emerging microbiological issues.'
- 'Note: In addition to the normal regulations, a minimum of 35% must be achieved
  in both the final exam and continuous assessment components of the module. In cases
  where continuous assessment has a practical component attendance of at least 75%
  in the practicals is mandatory.'
