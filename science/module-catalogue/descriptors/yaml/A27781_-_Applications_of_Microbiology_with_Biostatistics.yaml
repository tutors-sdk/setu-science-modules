indicative_content:
- 'Review of culture-based microbiological methods for analysis of pharmaceuticals,
  foods, and environmental samples: use in applications such as sterility testing,
  bioburden, environmental monitoring, hygiene testing etc'
- Nucleic acid-based methods for detection, identification and enumeration of micro-organisms,
  such as 16S rRNA gene sequencing, real-time PCR, PFGE, whole genome sequencing etc.
- Use of micro-organisms as analytical tools in applications such as clinical sample
  analysis, toxicity testing, MIC determination etc.
- Topical issues in microbiology, e.g. emerging diseases, drug discovery, the Human
  Microbiome Project etc.
- Topical epidemics and the human response e.g. Ebola, Zika
- Statistical interpretation of microbiological data
learning_outcomes:
- Compare and contrast traditional and more modern microbiological methods.
- Evaluate a wide range of applications of microorganisms and their products.
- Evaluate appropriate analytical methods for microbiological analysis of specific
  samples.
- Comment on new microbiological techniques and their future potential in industry.
- Interpret statistical analysis of microbiology data.
- Compare emerging pathogens and other topical microbiological issues.
