indicative_content:
- Baseband Software Defined Radio Transceiver Line-up
- Radio propagation and spatial domain Processing
- Multiple input and multiple output wireless communications and adaptive antennas
- 'Advanced modulation (Case study: EDGE, UWB)'
learning_outcomes:
- Design and synthesis an entire flexible transmit-receive baseband architecture.
- Circumvent channel distortions and unwanted additive interference, to optimise SNR
  for signal recovery and maximum data throughout.
- Describe and analyse a layered space-time environment to achieve ultra high density
  data throughout, employed in a fixed wireless configuration with smart antennas.
- Explain and compare modern advanced modulation techniques as used in narrowband
  and wideband systems.
- Demonstrate practical operation of experimental apparatus/simulation for each laboratory
  session and mini-project. The student should show a familiarity with the experiment/apparatus
  & a clear understanding of the procedure/topic under consideration.
