school: Science and Computing
department: Engineering Technology
cluster: Discipline Specific Technologies
aim: The course covers software defined radio, where the transmitter and or receiver
  modulation and architecture may be dynamically reconfigured. The emphasis is on
  baseband communications. Optimising signal recovery in a typical high frequency
  wireless system is also covered. Exploitation of diversity is introduced in a section
  on multiple input/ multiple output communications. Finally, advanced wireless modulation
  techniques are explored.
