indicative_content:
- Introduction to Formal Methods
- Mathematics of Formal Specification
- Formal Specification notation (e.g. Z, B)
- Modelling using notation, writing system states and operations using chosen notation
learning_outcomes:
- Choose when formal methods are applicable in software development.
- Read and write formal specifications and explain them clearly using informal means.
- Choose the mathematical model underlying the formal specification language in this
  context.
- Write consistent specifications and be able to explain why they are consistent.
- Assess a complex system, distill an inderstanding of it into an abstracted view,
  and model this view using approproate abstract data models and mathematical description.
- Formally specify part of a real world system (e.g. substantial student project)
  with appropriate narrative text.
learning_and_teaching_methods:
- As this module requires a strong mathematical foundation, it is important that the
  student be presented with these foundations in a lecture context and that these
  concepts practiced on specification examples in tutorials.
- Lectures and tutorials will be interleaved, with small examples regularly being
  attempted in class.
- When the student has learned the necessary component skills, s/he will practice
  these skills on part of a substantial project.
- This will enliven his/her understanding of the notation as well as demonstrating
  to him/her the advantages of rigour in software development.
