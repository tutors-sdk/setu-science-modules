reference: A17690
full_title: Finite State Machines
short_title: Finite State Machines
credits: 5
level: Intermediate
author: MFURLONG
history_comment: ''
school: Science and Computing
department: Engineering Technology
cluster: Electronics
aim: Finite state machines, also known as sequential circuits, are analysed in this
  module using formal models (Moore and Mealy ) to define and specify the system requirements
  and produce a structured design approach. An appreciation of the problems generated
  by the absence of a master clock signal in asynchronous circuits will also be developed.
  Design solutions will be implemented using MSI components and simulated using an
  appropriate HDL.
