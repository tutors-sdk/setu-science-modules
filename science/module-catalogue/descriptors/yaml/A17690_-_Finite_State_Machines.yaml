indicative_content:
- Finite State Machines
- Synchronous Finite State Machines
- Asynchronous Finite State Machines
- Good state machine design
- HDL Implementations of Finite State Machines
- Clock switching techniques.
learning_outcomes:
- Define the fundamental concepts of finite state design.
- Demonstrate the relevance of finite state machine optimisation.
- Generate and test finite state machine implementations and ensure that critical
  race and hazard conditions, in particular, do not materialise in the asynchronous
  design options explored.
- Implement linear sequential circuit applications.
- Use HDL as a basis for the description and simulation of finite state machines.
- Build, test and simulate the behaviour of finite state machines, relevant to the
  theory lectures, in a laboratory setting.
