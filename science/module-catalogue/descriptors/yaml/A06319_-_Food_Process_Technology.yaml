reference: A06319
full_title: Food Process Technology
short_title: Food Process Technology
credits: 5
level: Introductory
author: EDUGGAN
history_comment: ''
school: Science and Computing
department: Science
cluster: Food Science
aim: This module introduces students to food processing and preservation methods currently
  used in the food industry. It focuses on both the theory of the methodology and
  the equipment used for conventional processing methods.
