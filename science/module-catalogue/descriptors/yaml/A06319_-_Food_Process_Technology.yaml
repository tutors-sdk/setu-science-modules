indicative_content:
- 'Thermal processing: thermisation, pasteurisation, sterilisation'
- 'Concentration and dehydration: evaporation, spraydrying, fluidised bed, freeze-drying'
- Cooling and freezing of foods
- Size reduction:- milling, mincing, grinding
- Fermentation:- cheese and yogurt
- Processing of meat in abattoir, meat products
- 'Packaging: types and purpose'
learning_outcomes:
- Describe typical food process flow diagrams used in the food industry.
- Outline the principles of unit processes for the food industry.
- Compare and contrast items of equipment for different unit processes.
- Compare different preservation and packaging technologies for fresh and manufactured
  foods with enhanced shelf-life.
- Complete a range of food process operations.
- Report on a range of food process operations.
learning_and_teaching_methods:
- Lectures will provide the theory and design of equipment used for food production
  and preservation. Case studies will be used to elucidate unit processes.
- Laboratory practicals will give students experience in performing food processing
  experiments, analysing data and writing reports.
- Taste panels will be used to introduce students to sensory analysis.
