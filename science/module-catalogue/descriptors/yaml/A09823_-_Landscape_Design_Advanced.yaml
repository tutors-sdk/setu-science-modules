assessment_criteria:
- '<40%: Survey and analysis weak or absent and/or design portfolio missing more than
  50 % of drawings.'
- '40%-49%: Identifies key site constraints and opportunities of site, portfolio of
  drawings complete, but design fails to fully exploit site or meet the needs of the
  client.'
- '50%-59%: Identifies key site constraints and opportunities as well as subtle details,
  portfolio of drawings complete, design adequately meets needs of clients but fails
  to fully exploit site opportunities.'
- '60%-69%: Identifies key site constraints and opportunities as well as subtle details,
  portfolio of drawings complete, design meets needs of clients well and exploits
  site opportunities.'
- '70%-100%: Identifies key site constraints and opportunities as well as subtle details,
  portfolio of drawings complete, design expertly meets needs of clients, fully exploits
  site opportunities and ameliorates site difficulties.'
