reference: A09823
full_title: Landscape Design Advanced
short_title: Landscape Design Advanced
credits: 5
level: Intermediate
author: LMMURPHY
history_comment: ''
school: Science and Computing
department: Science
cluster: Horticulture
aim: This is a studio based module where students build on knowledge and skills acquired
  in the 'Landscape Design' major elective. Students will concentrate totally on studio
  projects for public and semi public schemes and will include knowledge of correct
  maintenance (short-term) and ongoing management (long-term) procedures.
