assessment_criteria:
- '<40%: No understanding of the basic concepts of regulatory affairs. Unable to apply
  the knowledge given to an industrial environment.'
- '40%-59%: Adequate consideration of the concepts of advanced regulatory affairs.
  Sufficient attempt at application of theory to practice.'
- '60%-69%: Show evidence of underpinning knowledge of subject area. Some evidence
  of evaluation and synthesis of subject area and ability to incorporate new regulatory
  affairs in industrial setting.'
- '70%-100%: Excellent level of critical analysis, originality of thought and comprehensive
  knowledge of the subject area. Able to evaluate and synthesise relevant issues.'
