indicative_content:
- 'Introduction to pharmaceutical legislation: structure and role of the US, European
  and other regulatory authorities'
- Licensing of Drug Products, legal basis for an application; licensing routes in
  EU-centralised, decentralised, Mutual Recognition following decentralised procedure
  and national applications
- Applications to US FDA
- 'Introduction to procedures in emerging markets: use of Certificates of Pharmaceutical
  Products (CPP)'
- 'Structure of the common technical document: full and abridged applications'
- Strategy for managing marketing authorisations, variations, parallel procedures,
  renewals and line extensions
- Harmonisation of standards in the Pharmaceutical Industry ICH Guidelines
- 'European Directorate for the quality of medicines (EDQM): structure and functions
  (TSE) certificates; Ph.Eur.; counterfeit medicines'
- Falsified Medicines Directive
- Pharmacovigilance Monitoring Drug Safety Pharmacovigilance system master file (PSMF)
  Periodic Safety Update Report; risk benefit evaluation
- Interface between regulatory affairs and operations (Compliance files Quality agreements)
  GxP GLP, GMP. GDP, GCP
learning_outcomes:
- Evaluate legislation and regulations governing the pharmaceutical and medical device
  industry to ensure compliance with regulatory requirements.
- Compile regulatory documentation in a format for submission to authorities in EU/US/Japan
  (Common Technical Document) applications and maintenance.
- Develop a strategy for submission and maintenance of marketing authorisations.
- Interpret the roles of the various regulatory agencies including EDQM, EMA and National
  Competent authorities, and assess the various licencing routes in the EU.
- Design a pharmacovigilance system in compliance with the regulations.
- Assess the regulations and specific commitments to agencies to ensure compliance
  between regulatory affairs and operations.
