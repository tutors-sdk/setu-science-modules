cluster: Quality, Regulatory and Compliance
aim: This module will provide the student with an advanced understanding of the procedures
  involved in the regulation of pharmaceutical products and medical devices in the
  European Union, US and other markets. The structure and role of US, European and
  other regulatory authorities will be studied. Harmonisation of standards in the
  pharmaceutical industry and the various licensing routes for drug products in the
  EU will also be objectives of the module. The learner will be exposed to the interface
  between regulatory affairs and operations. Pharmacovigilance and the pharmaceutical
  inspection convention will also be emphasised throughout the course of the module.
