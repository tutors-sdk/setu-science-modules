reference: A13882
full_title: Audio Visual 2
short_title: Audio Visual 2
credits: 5
level: Intermediate
author: ROCONNOR
history_comment: ''
school: Science and Computing
department: Computing and Mathematics
cluster: Media Production
aim: This module focuses on visual media. Students develop design skills further in
  composition, graphic design, advertising, typeface, layout and audio synchronisation.
  Photography skills are developed and then applied to video capture. All elements
  are combined in the creation, editing and publishing of a short video.
programmes:
- timetable: COMP-0646
  code: WD_KCOMP_B
  name: Bachelor of Science (Honours) in Applied Computing
  stage: 2
  semester: 4
  status: E
prerequisites: []
corequisites: []
indicative_content:
- Visual image principles
- Design Principles
- Camera Settings
- Video recording, editing and rendering
- Audio synchronisation
- Titles, transitions and simple motion graphics
learning_outcomes:
- Compare and contrast artwork using design principles.
- Demonstrate practical use of image composition.
- Produce digital video based on a prescribed script/storyboard.
- Combine audio and visual media to create a multi-layered asset.
learning_and_teaching_methods:
- This module will be characterised by student participation in both formal theoretical
  and practical/studio classroom activities in which students learn theoretical concepts
  and apply them immediately using dedicated hardware and software.
- Studio Classes will be delivered in two 2-hour blocks.
- Apple Mac Computer Lab with relevant hardware & software (kept up to date at least
  annually e.g. AdobeCC, iMovie).
- Accessible, professional sound proofed recording studios with professional microphones
  and audio workstations (Vibe FM studios).
- Access to cameras.
- Video/Photography Studio
- 'Sample Assignment: Create or recreate a static poster/ad/visual artefact to a specific
  design.'
- 'Sample Project: Record, edit and finalise a video based on a script/storyboard.'
