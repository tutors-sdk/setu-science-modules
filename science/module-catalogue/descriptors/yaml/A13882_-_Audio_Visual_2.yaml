assessment_criteria:
- '<40%: Unable to interpret and describe key concepts of the audio/visual communications
  and associated tools.'
- '40%-49%: Be able to interpret and describe key concepts of the audio/visual communications
  and associated tools.'
- '50%-59%: Ability to discuss key concepts of the specific audio/visual communications
  and ability to discover and integrate related knowledge from design and computing
  disciplines.'
- '60%-69%: Be able to solve problems within the specific audio/visual domain by experimenting
  with the skills and tools.'
- '70%-100%: All the above to an excellent level. Be able to analyse and design solutions
  to a high standard for a range of both complex and unforeseen problems through the
  creative use and modification of appropriate audio/visual skills and tools.'
