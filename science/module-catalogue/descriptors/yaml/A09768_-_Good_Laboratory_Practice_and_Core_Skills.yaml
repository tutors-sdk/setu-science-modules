aim: This module will emphasise the importance of Good Laboratory Practice (GLP) in
  the chemistry and biology laboratory environments. It will provide students with
  training in the necessary skills and practices involved in performing a variety
  of routine laboratory tasks. The core skills component of this module will allow
  the student to develop learning and information-handling strategies, develop scientific
  writing, presentation and report writing skills, as well as critical thinking skills
  essential to their progress in study at third level.
