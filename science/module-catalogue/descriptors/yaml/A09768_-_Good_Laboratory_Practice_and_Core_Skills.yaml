assessment_criteria:
- '<40%: Little or no demonstration of an understanding of the fundamental core learning
  skills & concepts. Little or no demonstration of good laboratory practices.'
- '40%-49%: Will be able to show limited understanding of the fundamental core learning
  skills & concepts. Some display of good laboratory practices.'
- '50%-59%: As well as the above, will show reasonable understanding of the fundamental
  core learning skills & concepts. Will display reasonably good laboratory practices.'
- '60%-69%: In addition, will demonstrate a more detailed knowledge of core learning
  skills & concepts. Will display very good laboratory practices.'
- '70%-100%: All the above to an excellent level. In addition, will demonstrate comprehensive
  knowledge of core learning skills & concepts. Will display advanced competence and
  independence with regards to good laboratory practices.'
- In addition to the normal regulations, a minimum of 35% must be achieved in both
  the theory and practical components of the module. In cases where continuous assessment
  has a practical component attendance of at least 75% in the practicals is mandatory.
