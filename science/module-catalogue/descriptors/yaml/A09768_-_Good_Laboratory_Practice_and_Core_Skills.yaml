indicative_content:
- Good laboratory practices with regard to the use, care and cleaning of laboratory
  glassware
- Correct use of top-loading and analytical balances & calibration of balances, pH
  meter, pipette and micro-pipettes
- Cleaning of apparatus and work areas and aseptic techniques in biology laboratories;
  use of centrifuge
- Fundamental practices of solution preparation
- Laboratory safety, including the safe disposal of chemical and other wastes & familiarity
  with material safety data sheets (MSDS) for toxic chemicals
- Good laboratory practices with regard to filtration techniques (gravity & vacuum)
  and correct pipetting techniques (glass & micro-pipettes)
- Scientific writing styles, report writing skills and bibliographic conventions;
  introduction to research methodology; guide to learning styles
- Use of the internet search engines and databases for searching and critically evaluating
  scientific literature
- Presentation skills
learning_outcomes:
- Operate safely in a laboratory, identify hazards involved with certain chemicals
  and dispose of laboratory waste in accordance with environmental guidelines.
- Identify, operate and clean laboratory balances, pipettes, filtration apparatuses
  and pH meters.
- Complete their experimental work in a safe manner and identify hazards involved
  with certain chemicals from material safety data sheets (MSDS).
- Recognise a clean workbench & an aseptic work environment where necessary.
- Account for laboratory waste safely in accordance with environmental guidelines.
- Locate and use laboratory glassware for the accurate measurement of solution volume
  and the preparation of standard solutions.
- Record scientific reports using appropriate writing skills using library searching
  techniques.
- Complete a presentation outlining a scientific topic of interest.
learning_and_teaching_methods:
