indicative_content:
- Lean and six sigma---concepts and goals
- Basic probability, statistics, central limit theorem, distributions
- Collecting & summarising data, exploratory data analysis and hypothesis testing
- SPC, control charts, measurement system analysis, GR&R studies, Cpk, Ppk
- Design of experiments
- Lean process control, TPM, visual factory
- Project management basics from identification through closure, team performance
- Lean tools application, root cause analysis, problem solving, kaizen
- Management & planning tools, activity networks, PDPC, QFD
learning_outcomes:
- Collect and summarise data, conduct hypothesis tests and interpret results.
- Construct statistical process control charts, and apply a range of process capability
  indices.
- Define basic DOE factors, and design DOE graphs and plots.
- Apply lean tools to waste elimination, cycle time reduction and kaizen.
- Utilise project planning tools, and evaluate the performance of project teams.
- Plan and control processes through the implementation of TPM and visual factory.
