aim: This module focuses on the tools and concepts associated with developing lean
  systems and achieving six sigma levels of excellence. Addressed at green belt level,
  this module examines the fundamentals of statistics, six sigma, and its application,
  as well as lean concepts and tools and their implementation. Related critical issues,
  including team performance, project management and voice of the customer, are examined
  in the context of achieving operational excellence.
