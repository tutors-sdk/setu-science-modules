indicative_content:
- Architecture of Embedded Systems
- System Expansion
- Interrupt and exception handlers
- Test, debug and verify embedded applications
- Real Time Operating System
- Web Servers Ethernet and Wireless
- Subroutines & Parameter Passing
- Development Tools
- System Integration
- Serial & Network Bootstrapping
learning_outcomes:
- Design embedded MPU systems with aid of hardware and software development tools.
- Develop Distributed Multiprocessor and Multitasking systems.
- Set up a master slave protocol design pattern.
- Produce Embedded applications using Real Time Operating System Design Pattern.
- Test, Debug and Verify embedded applications.
- Manage and maintain embedded software/hardware applications.
