indicative_content:
- 'Advanced Spectroscopy: fourier transform NMR techniques such as decoupling and
  the nuclear Overhauser effect (NOE); multi-pulse techniques such as DEPT; two-dimensional
  NMR spectra; use of expert systems'
- Application and detailed analysis of advanced spectroscopic techniques for the identification
  of complex organic and pharmaceutical compounds
- A comprehensive review of functional group transformations, carbon-carbon and carbon-nitrogen
  bond forming reactions; application of such reactions to the synthesis of targeted
  pharmaceuticals along with relevant precursors such as heterocyclic components.
- Organometallic reactions, reagent formation and selectivity in reactions, Palladium
  catalysed carbon-carbon bond formation including Heck, Suzuki and Stille reactions,
  regio- and stereochemical aspects are discussed.
- Design aspects of synthetic routes, retrosynthesis; importance of chemoselectivity,
  regioselectivity and protecting groups
- Research-based examples of advanced organic synthesis and application of synthesised
  compounds, e.g. supramolecular compounds, organocatalysts
learning_outcomes:
- Propose and design synthetic routes to targets by applying an in-depth knowledge
  of organic reactions.
- Interpret such routes towards the syntheses of pharmaceuticals by applying knowledge
  of functional group transformations and carbon-carbon and carbon-nitrogen bond forming
  reactions.
- Compare the various C-C forming reactions which utilise organometallic reagents
  and describe in detail reagent formation and selectivity. Distinguish between Suzuki,
  Heck and Stille palladium catalysed reactions.
- Distinguish issues of chemoselectivity and regioselectivity when designing or interpreting
  synthetic routes.
- Determine complex product structure by applying a thorough knowledge of advanced
  nuclear magnetic resonance (NMR) spectroscopy and its applications.
