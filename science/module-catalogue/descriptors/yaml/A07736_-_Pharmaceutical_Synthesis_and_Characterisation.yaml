aim: This module will cover the role of spectroscopic methods, specifically nuclear
  magnetic resonance (NMR), for the structural elucidation of organic compounds. A
  review of functional group transformations and carbon-carbon bond forming reactions
  will be undertaken, with a focus on evaluating routes to synthesise pharmaceuticals.
  Additional techniques for the design of efficient selective organic syntheses will
  be presented.
