assessment_criteria:
- '<40%: Inadequate understanding of pharmaceutical synthesis and characterisation
  at even a basic level.'
- '40%-49%: Will be able to show a basic knowledge of pharmaceutical synthesis and
  characterisation.'
- '50%-59%: As well as the above, the student will be able to demonstrate an understanding
  of some of the complexities of pharmaceutical synthesis and characterisation and
  predict trends in characterisation results.'
- '60%-69%: In addition, the student will demonstrate a more detailed knowledge of
  pharmaceutical synthesis and characterisation and demonstrate an ability to evaluate
  detailed knowledge acquired in the module to new material.'
- '70%-100%: All of the above to an excellent level. The learner will be able to demonstrate
  comprehensive knowledge and understanding of pharmaceutical synthesis and characterisation,
  predict general trends in behaviour, including exceptional behaviour and critically
  evaluate and relate topics.'
