indicative_content:
- Reflective writing and maintenance of weekly activity and reflection journal.
- Report writing.
- Industrial placement OR placement in a designated research environment
learning_outcomes:
- Plan learning objectives for the placement.
- Operate independently and/or as part of a team towards the set objectives of the
  work environment.
- Apply competently their scientific and technical knowledge and skills in a range
  of settings.
- Examine their personal, professional and technical achievements on the placement.
- Communicate effectively their activities in an appropriate and professional manner.
- Complete a portfolio of work consisting of weekly reflective logs; a comprehensive
  end-of-semester report on work carried out over the placement period; and an up-to-date
  professional curriculum vitae.
learning_and_teaching_methods:
- At the beginning of the placement period, the student develops a set of job objectives
  in consultation with their flexible semester mentor.
- The student monitors their own learning on a weekly basis by maintaining a weekly
  activity and reflection journal.
- In addition, the student submits a work placement report on completion of the placement
  period.
