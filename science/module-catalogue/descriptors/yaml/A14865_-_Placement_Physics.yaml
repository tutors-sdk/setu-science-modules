aim: During the placement period students are given the opportunity to complete work
  placement in an industrial or research environment. Students usually undertake the
  work placement element, which allows them to acquire valuable technical and professional
  skills within an organisation. The placement is typically of six month's duration;
  a student must complete a minimum of 16 weeks in order to gain credit for this module.
  Each student is expected to monitor their own performance by maintaining a weekly
  activity and reflection journal. In addition, the student must submit a work placement
  report on completion of the placement period. The employer submits an evaluation
  of the students' work at the end of the placement. Placement is assessed on a pass/fail
  basis. In order to gain credit for this module, the student must submit all relevant
  documentation to the placement coordinator. Arrangements for the work placement
  are detailed in the course placement handbook.
