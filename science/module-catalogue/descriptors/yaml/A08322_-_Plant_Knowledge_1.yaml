prerequisites: []
corequisites: []
indicative_content:
- 'Classification: Binomial system'
- Categorizing trees, shrubs, perennial
- Plant selection and planting specification for the landscape industry
- Plant identification of 60 plants
- Turfgrass establishment
- Identification of Grass Genera
learning_outcomes:
- Identify a range of plants using the correct botanical names.
- Describe and categorise plant material.
- Describe the industry specifications for plant material.
- Describe and select appropriate planting techniques.
- Describe turfgrass establishment.
- Identify the main grass genera.
learning_and_teaching_methods:
- Using live plant material.
- Lectures
- Practical demonstrations.
- Visit to plant producers and retailers.
