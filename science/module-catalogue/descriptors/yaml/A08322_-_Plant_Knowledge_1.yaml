reference: A08322
full_title: Plant Knowledge 1
short_title: Plant Knowledge 1
credits: 5
level: Introductory
author: LCASSIN
history_comment: ''
school: Science and Computing
department: Science
cluster: Horticulture
aim: This module for horticulturists will introduce the learner to a range of plant
  material, the use of botanical names, industry specifications for plants and planting
  techniques, turf grass establishment and maintenance, plant identification and identification
  of grass genera.
