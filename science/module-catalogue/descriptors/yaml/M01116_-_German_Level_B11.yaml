aim: 'This module aims to: enable the student to understand the main points of clear
  standard input on familiar matters regularly encountered in work, school, leisure
  etc; train the student to deal with rehearsed situations likely to arise whilst
  travelling in an area where the language is spoken; allow the student to produce
  simple connected text on topics which are familiar or of personal interest; enable
  the student to describe experiences and narrate simple sequences of events. give
  the student an understanding of the underlying beliefs and values that make him/her
  and members of the other culture behave the way they do.'
