indicative_content:
- 'Contexts / themes that will be used to achieve the learning outcomes for this level
  may include:'
- a. Eating and drinking; shopping, invitations, social interactions in restaurants
- b. Household activities, furnishings and dcor as they refer to learners personal
  environment
- 'c. Fashion and personal taste; description of people, clothing and objects Linguistic
  structures to be covered at this level will include:'
- a. Perfect tense (with haben and sein) for separable and inseparable verbs (review)
- b. Adverbs of time for sequential events (dann, nachher, zuerst usw.)
- c. Nouns in genitive case
- d. Adjectives; endings (all cases), comparative and superlative
- e. Quantities
- f. Imperative mood (Review)
- g. Subordinate clauses using conjunctions
- h. Articles definite, indefinite, jeder, dieser, jener, welcher
learning_outcomes:
- Spoken Production and Interaction.
- 'The learner is expected to be able to: exploit a wide range of simple language
  to deal with most situations likely to arise while travelling; sustain a reasonably
  straightforward description of one of a variety of subjects within his / her field
  of interest in a reasonably fluent manner; deliver short rehearsed announcements
  on a topic pertinent to everyday occurrences in his / her field which, despite possibly
  very foreign stress and intonation, are nevertheless clearly intelligible.'
- Writing
- 'The learner is expected to be able to: write straightforward connected texts on
  a range of familiar subjects within his / her field of interest.'
- Listening
- 'The learner is expected to be able to: understand straightforward factual information
  about common everyday or job-related topics, identifying general messages, provided
  speech is clearly articulated in a generally familiar accent; generally follow the
  main points in an informal discussion with friends provided speech is clearly articulated
  in standard dialect; follow many shorter films in which visuals and actions carry
  much of the story line and when the delivery is relatively slow and clear.'
- Reading
- 'The learner is expected to be able to: understand shorter texts related to work,
  school, leisure etc. in which a sequence of familiar events is described in relatively
  simple and familiar language; find and understand relevant information in everyday
  materials/signs/timetables/notices etc. encountered while travelling in countries
  where the language is spoken.'
learning_and_teaching_methods:
- Interactive seminars will be the main teaching approach. A variety of media will
  be used in the teaching process (traditional print materials, audio and video material,
  CALL programmes and online language learning resources). The course will be characterised
  by a high level of student participation in both classroom activities and self-directed
  learning activities outside the classroom.
